  Bóng lăn cồn cát: GIỮ để dive lấy đà xuống dốc → bật bay vượt VẠCH TRẮNG ăn điểm
  (càng cao càng nhiều, tới mặt trăng). Đáp mượt sườn kế → COMBO; đâm vách dốc ngược

const AudioFX = (() => {

  ctx.clearRect(0, 0, W, H); ctx.save(); ctx.translate(ox, oy);
  const sf = spaceF, sky = ctx.createLinearGradient(0, 0, 0, H);
  sky.addColorStop(0, mix('#2ecab6', '#05060f', sf)); sky.addColorStop(0.5, mix('#a4e6ce', '#0a0a1e', sf)); sky.addColorStop(1, mix('#f6e6b4', '#1a1230', sf));

  if (sf > 0.02) drawStars(sf);
  drawMoon();
  drawRidge(2, mix('#80c4ad', '#0d0b24', sf), 0.30);
  drawRidge(1, mix('#d5bc72', '#140f2c', sf), 0.55);
  drawScoreLines(); drawTerrain(); drawTrail(); drawBall();
  ctx.restore();
}
function drawMoon() {
  const mx = sx(camWX + (W * 0.55) / Z), my = sy(moonWorldY());
  if (my > H + 80) return;
  ctx.save(); ctx.globalAlpha = Math.min(1, 0.15 + spaceF * 1.2);                            // mặt trăng HIỆN RÕ DẦN khi càng lên vũ trụ
  const r = Math.max(10, BALL_R() * 2.2 * Z + W * 0.06 * Z);
  const gl = ctx.createRadialGradient(mx, my, r * 0.4, mx, my, r * 2.2); gl.addColorStop(0, 'rgba(240,240,255,0.5)'); gl.addColorStop(1, 'rgba(200,210,255,0)');
  ctx.fillStyle = gl; ctx.beginPath(); ctx.arc(mx, my, r * 2.2, 0, TAU); ctx.fill();
  ctx.fillStyle = '#eef0ff'; ctx.beginPath(); ctx.arc(mx, my, r, 0, TAU); ctx.fill();
  ctx.fillStyle = 'rgba(190,195,225,0.55)'; ctx.beginPath(); ctx.arc(mx - r * 0.3, my - r * 0.2, r * 0.18, 0, TAU); ctx.fill(); ctx.beginPath(); ctx.arc(mx + r * 0.25, my + r * 0.28, r * 0.13, 0, TAU); ctx.fill();
  ctx.restore();
}
function drawStars(sf) { ctx.save(); const ox = -(camWX * 0.05) % W; for (const s of STARS) { let px = (s.fx * W + ox) % W; if (px < 0) px += W; const py = s.fy * H; ctx.globalAlpha = sf * (0.5 + 0.5 * s.r); ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(px, py, s.r, 0, TAU); ctx.fill(); } ctx.globalAlpha = 1; ctx.restore(); }
function drawScoreLines() {
  const y = sy(lineWorldY()); if (y < -60 || y > H + 60) return;
  ctx.save();
  // ── MÂY trôi ngang trên vạch (như drawTheLine của dune.html) ──
  ctx.fillStyle = 'rgba(255,255,255,0.30)';
  const cw = 200 * Z, ch = 30 * Z, wrap = 2000 * Z, drift = ((camWX * 0.5 * Z) % wrap + wrap) % wrap;
  for (let i = 0; i < 6; i++) {
    let cx = (i * 450 * Z - drift) % wrap; if (cx < -cw) cx += wrap;
    ctx.beginPath();
    if (ctx.roundRect) ctx.roundRect(cx, y - ch / 2, cw, ch, ch / 2); else ctx.rect(cx, y - ch / 2, cw, ch);
    ctx.fill();
  }
  // ── VẠCH ĂN ĐIỂM duy nhất ──
  ctx.setLineDash([10, 9]); ctx.strokeStyle = 'rgba(255,255,255,0.85)'; ctx.lineWidth = 2; ctx.shadowColor = 'rgba(255,255,255,0.5)'; ctx.shadowBlur = 5;
  ctx.beginPath(); ctx.moveTo(-20, y); ctx.lineTo(W + 20, y); ctx.stroke();
  ctx.restore();
}
function drawRidge(layer, color, parallax) { ctx.beginPath(); ctx.moveTo(-40, H + 40); for (let sxp = -40; sxp <= W + 40; sxp += 8) ctx.lineTo(sxp, sy(ridgeY(camWX * parallax + sxp / Z, layer))); ctx.lineTo(W + 40, H + 40); ctx.closePath(); ctx.fillStyle = color; ctx.fill(); }
function terrainPath() {
  ctx.beginPath(); ctx.moveTo(-40, H + 40); const pts = [];
  for (let sxp = -40; sxp <= W + 40; sxp += 4) { const wx = camWX + sxp / Z, yy = sy(terrainY(wx)); pts.push([sxp, yy]); ctx.lineTo(sxp, yy); }
  ctx.lineTo(W + 40, H + 40); ctx.closePath();
  return pts;
}
function drawTerrain() {
  const pts = terrainPath();
  // thân cát (gradient) + VIỀN TRẮNG DÀY ở mép trên — như foreground dune.html
  const sand = ctx.createLinearGradient(0, H * 0.28, 0, H); sand.addColorStop(0, '#ffe268'); sand.addColorStop(0.5, '#eab54a'); sand.addColorStop(1, '#c98f43');
  ctx.fillStyle = sand; ctx.fill();
  ctx.beginPath(); for (let i = 0; i < pts.length; i++) { const p = pts[i]; i === 0 ? ctx.moveTo(p[0], p[1]) : ctx.lineTo(p[0], p[1]); }
  ctx.strokeStyle = 'rgba(255,255,255,0.92)'; ctx.lineWidth = Math.max(4, 6 * Z); ctx.lineJoin = 'round'; ctx.lineCap = 'round'; ctx.stroke();
}
function drawTrail() {
  if (boostFlight && trail.length > 1) {
    // ── ĐUÔI LỬA COMET khi BOOST (rực hơn theo combo) ──
    const lvl = Math.max(1, boostLvl()), intf = Math.min(1.6, 0.7 + lvl * 0.13);
    ctx.save(); ctx.globalCompositeOperation = 'lighter';
    for (let i = 0; i < trail.length; i++) {
      const p = trail[i], f = i / trail.length, px = sx(p.x), py = sy(p.y);
      const r = BALL_R() * Z * (0.35 + 1.3 * f) * intf;                                      // to dần về phía bóng
      const g = ctx.createRadialGradient(px, py, 0, px, py, r);
      g.addColorStop(0, 'rgba(255,255,225,' + (0.55 * f * intf).toFixed(3) + ')');           // lõi trắng nóng
      g.addColorStop(0.4, 'rgba(255,' + Math.floor(110 + 130 * f) + ',40,' + (0.42 * f * intf).toFixed(3) + ')');
      g.addColorStop(1, 'rgba(255,50,15,0)');                                                // đuôi đỏ tan
      ctx.fillStyle = g; ctx.beginPath(); ctx.arc(px, py, r, 0, TAU); ctx.fill();
    }
    ctx.restore();
  } else {
    for (let i = 0; i < trail.length; i++) { const p = trail[i], f = i / trail.length, r = BALL_R() * Z * (0.25 + 0.6 * f); ctx.fillStyle = boostGlow > 0 ? 'rgba(255,' + Math.floor(150 + 80 * f) + ',60,' + (0.28 * f).toFixed(3) + ')' : 'rgba(120,90,60,' + (0.16 * f).toFixed(3) + ')'; ctx.beginPath(); ctx.arc(sx(p.x), sy(p.y), r, 0, TAU); ctx.fill(); }
  }
  ctx.fillStyle = '#f2c078';
  for (const p of particles) { const a = Math.max(0, p.life / p.max); ctx.globalAlpha = a; const s = (2 + a * 2) * Z; ctx.fillRect(sx(p.x) - s / 2, sy(p.y) - s / 2, s, s); }
  ctx.globalAlpha = 1;
}
function drawBall() {
  const r = BALL_R() * Z, px = sx(bx), py = sy(by);
  if (boostGlow > 0) { const g = ctx.createRadialGradient(px, py, r * 0.3, px, py, r * 2.6); g.addColorStop(0, 'rgba(255,180,80,' + (0.6 * boostGlow / 0.5).toFixed(3) + ')'); g.addColorStop(1, 'rgba(255,120,40,0)'); ctx.fillStyle = g; ctx.beginPath(); ctx.arc(px, py, r * 2.6, 0, TAU); ctx.fill(); }
  const bg = ctx.createRadialGradient(px - r * 0.35, py - r * 0.4, r * 0.15, px, py, r); bg.addColorStop(0, '#ffffff'); bg.addColorStop(1, '#dfe3ea');
  ctx.fillStyle = bg; ctx.beginPath(); ctx.arc(px, py, r, 0, TAU); ctx.fill();
  ctx.strokeStyle = 'rgba(120,120,140,0.35)'; ctx.lineWidth = 1.4; ctx.beginPath(); ctx.arc(px, py, r - 0.7, 0, TAU); ctx.stroke();
  ctx.fillStyle = 'rgba(150,160,180,0.5)';
  for (let k = 0; k < 2; k++) { const a = angle + k * Math.PI; ctx.beginPath(); ctx.arc(px + Math.cos(a) * r * 0.45, py + Math.sin(a) * r * 0.45, r * 0.13, 0, TAU); ctx.fill(); }
}

function showScorePop(pts, mult, label, moon) {
  const e = el('boost-pop'); e.style.color = moon ? '#bfe0ff' : (mult >= 4 ? '#ffd23f' : mult >= 2 ? '#7fe3a0' : '#fff');
  const top = moon ? t('moon') : label;
  e.innerHTML = (top ? '<div style="font-size:.62em">' + top + '</div>' : '') + '+' + pts + (mult > 1 ? ' <span style="opacity:.9">×' + mult + '</span>' : '');
  e.classList.remove('show'); void e.offsetWidth; e.classList.add('show');
}
function updateComboInd() {
  const e = el('combo-ind');
  if (combo > 1) { e.innerHTML = (combo >= BOOST_COMBO ? '🚀 ' : '') + '<span class="cl">' + t('combo').toUpperCase() + '</span>×' + combo; e.classList.add('on', 'bump'); setTimeout(() => e.classList.remove('bump'), 320); }
  else e.classList.remove('on');
}

const TICK_MS = 1000 / 60, DT = 1 / 60, SLOWMO = 0.8;                                      // slow-mo TOÀN CỤC ngay từ đầu: sim chạy 0.8× thời gian thật
let lastTime = 0, acc = 0;
function frame(now) {
  if (!lastTime) lastTime = now;
  let dt = now - lastTime; lastTime = now; if (dt > 250) dt = 250; acc += dt;
  let n = 0; while (acc >= TICK_MS && n < 8) { if (running && !over && !paused && started) stepPhysics(DT * SLOWMO); acc -= TICK_MS; n++; }
  draw(); requestAnimationFrame(frame);
}

const stage = el('stage');
stage.addEventListener('pointerdown', (e) => {
  if (over) return; AudioFX.resume();
  if (paused) { paused = false; lastTime = 0; }
  if (!started) { started = true; vx = 0.18 * W; }
  diving = true; hideHint(); e.preventDefault();
});
window.addEventListener('pointerup', () => { diving = false; });
window.addEventListener('pointercancel', () => { diving = false; });

el('back-btn').addEventListener('click', (e) => { e.stopPropagation(); sendMessage('quit'); });
el('ov-btn').addEventListener('click', (e) => { e.stopPropagation(); AudioFX.resume(); sendMessage('retry_level'); newRun(); });
const soundBtn = el('sound-btn');
function updateSoundBtn() { soundBtn.classList.toggle('muted', !AudioFX.isEnabled()); }
soundBtn.addEventListener('click', (e) => { e.stopPropagation(); AudioFX.resume(); AudioFX.setEnabled(!AudioFX.isEnabled()); updateSoundBtn(); });
window.onAppPause = function () { paused = true; diving = false; };
window.onNextLevel = function () {};
window.onRetryLevel = function () { newRun(); };

let hintTimer = null;
function showHint() { const h = el('hint'); h.innerHTML = '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 2a2 2 0 0 1 2 2v7h1V7a2 2 0 0 1 4 0v8.5c0 3.6-2.6 6.5-6.2 6.5H11c-2 0-3.3-.9-4.4-2.6l-2.3-3.7a2 2 0 0 1 3.1-2.5l1 1.1V6a2 2 0 0 1 2-2z"/></svg>' + t('hint'); h.classList.remove('gone'); clearTimeout(hintTimer); hintTimer = setTimeout(hideHint, 3600); }
function hideHint() { el('hint').classList.add('gone'); }
function applyStatusBarPad() { el('topbar').style.paddingTop = 'calc(max(' + getStatusBarHeight() + 'px, env(safe-area-inset-top)) + 8px)'; }
function applyStaticI18n() { el('lbl-score').textContent = t('score').toUpperCase(); el('lbl-best').textContent = t('best').toUpperCase(); el('ov-k-score').textContent = t('score').toUpperCase(); el('ov-k-best').textContent = t('best').toUpperCase(); el('ov-btn-txt').textContent = t('playAgain'); }
function resize() {
  const wasGrounded = grounded;
  W = stage.clientWidth || window.innerWidth; H = stage.clientHeight || window.innerHeight;
  DPR = Math.min(window.devicePixelRatio || 1, 2); cv.width = Math.round(W * DPR); cv.height = Math.round(H * DPR);
  const sc = Math.min(Math.max(W / 360, 1), 2.2); document.documentElement.style.setProperty('--sc', sc.toFixed(3));
  const pill = document.querySelector('.stat'); if (pill) { const ph = pill.getBoundingClientRect().height; if (ph > 0) document.documentElement.style.setProperty('--btn-size', Math.round(ph * 0.92) + 'px'); }
  if (wasGrounded && running) by = terrainY(bx) - BALL_R();
}
function boot() {
  LANG = getLanguage(); applyUiFont(LANG); applyStatusBarPad(); applyStaticI18n();
  best = parseInitialBest(); updateBestHud(); updateSoundBtn();
  resize(); newRun(); requestAnimationFrame(frame);
}
window.addEventListener('resize', resize);
window.addEventListener('load', resize);
document.addEventListener('visibilitychange', function () { if (document.hidden) { paused = true; diving = false; } else if (!over) { paused = false; lastTime = 0; } });
(function waitForNativeInjection() { const start = Date.now(); (function check() { if (typeof window.language === 'string' || typeof window.data === 'string' || Date.now() - start > 200) boot(); else setTimeout(check, 10); })(); })();
</script>
