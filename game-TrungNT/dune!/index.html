<!--
  Dune! (clone) — TrungNT. MỘT FILE tự chứa, VẼ HẾT bằng canvas (không texture,
  không file ảnh/âm) → chạy thẳng file:// & trong WebView, không cần server.
  Bóng lăn cồn cát: GIỮ để dive lấy đà xuống dốc → bật bay vượt VẠCH TRẮNG ăn điểm
  (càng cao càng nhiều, tới mặt trăng). Đáp mượt sườn kế → COMBO; đâm vách dốc ngược
  → CRASH; hết đà → thua. Bóng TRẮNG, không xu. Endless / điểm cao (KHÔNG level).
  Tuân thủ .claude/game-common.md (bridge · i18n inline · font · reset · nút Back).
-->
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<title>Dune!</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Google+Sans+Flex:opsz,wght@6..144,1..1000&display=swap" rel="stylesheet" />

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; -webkit-touch-callout: none; }
  :root { --ui-font: 'Google Sans Flex', system-ui, sans-serif; --ink: #fff2e0; --gold: #ffd23f; --sc: 1; }
  html, body { height: 100%; overflow: hidden; }
  body { font-family: var(--ui-font); font-weight: 700; color: var(--ink); background: #17102b; -webkit-user-select: none; user-select: none; touch-action: none; }
  .app { position: relative; width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; }

  .topbar { position: absolute; top: 0; left: 0; right: 0; z-index: 5; display: flex; align-items: center; justify-content: space-between; gap: 18px; padding: 0 calc(12px + env(safe-area-inset-right)) 4px calc(12px + env(safe-area-inset-left)); }
  .scoreboard { flex: 1 1 0; min-width: 0; display: flex; align-items: stretch; gap: 6px; }
  .stat { flex: 1 1 0; min-width: 0; overflow: hidden; display: flex; align-items: center; justify-content: center; gap: 5px; background: rgba(2,32,48,.55); border: 2px solid rgba(255,255,255,.16); border-radius: 14px; padding: 7px 8px 9px 4px; box-shadow: inset 0 2px 6px rgba(255,255,255,.06), 0 3px 8px rgba(0,0,0,.35); backdrop-filter: blur(3px); }
  .stat-ico { flex: 0 0 auto; display: block; width: clamp(16px,4.8vw,21px); height: clamp(16px,4.8vw,21px); fill: var(--gold); filter: drop-shadow(0 1px 1px rgba(0,0,0,.4)); }
  .stat-txt { display: flex; flex-direction: column; align-items: center; min-width: 0; flex: 1 0 auto; }
  .stat .k { font-size: clamp(10px,3.2vw,13px); font-family: system-ui,-apple-system,'Segoe UI',sans-serif; font-weight: 600; letter-spacing: .5px; color: #8fd0ff; text-transform: uppercase; line-height: 1.05; white-space: nowrap; }
  .stat .v { font-size: clamp(16px,5vw,24px); line-height: 1.1; color: #fff; white-space: nowrap; font-family: system-ui,-apple-system,'Segoe UI',sans-serif; font-weight: 800; text-shadow: 0 2px 2px rgba(0,0,0,.4); }
  .stat .v.best { color: var(--gold); }

  .btn3d { --radius: 14px; position: relative; display: inline-block; padding: 0; border: 0; background: transparent; cursor: pointer; font: inherit; color: inherit; }
  .btn3d-shadow { display: none; }
  .btn3d-surface { position: relative; z-index: 1; display: flex; align-items: center; justify-content: center; border-radius: var(--radius); background-color: #b0532a; color: #fff; box-shadow: 0 3px 0 rgba(0,0,0,.4), 0 6px 14px rgba(0,0,0,.35); transition: transform .09s ease-out; }
  .btn3d:active .btn3d-surface { transform: scale(.95); }
  .btn3d.btn-icon .btn3d-surface { width: var(--btn-size,46px); height: var(--btn-size,46px); border-radius: 16px; background-color: #1e4e7a; border: 2px solid #12344f; box-shadow: none; }
  #sound-btn .btn3d-surface { border-radius: 13px; }
  .btn3d.btn-icon { flex: 0 0 auto; -webkit-user-select: none; user-select: none; }
  .back-ico { width: 52%; height: 52%; fill: currentColor; display: block; }
  .snd-ico { width: 58%; height: 58%; display: block; }
  #sound-btn .snd-slash { display: none; }
  #sound-btn.muted .snd-wave { display: none; }
  #sound-btn.muted .snd-slash { display: block; }
  #sound-btn.muted .snd-ico { opacity: .75; }

  .stage { flex: 1; width: 100%; position: relative; }
  #game { display: block; width: 100%; height: 100%; touch-action: none; }


  .boost-pop { position: absolute; left: 50%; top: 30%; transform: translate(-50%,-50%) scale(.5); text-align: center; pointer-events: none; opacity: 0; z-index: 6; font-weight: 900; letter-spacing: .5px; white-space: nowrap; font-size: calc(30px * var(--sc)); text-shadow: 0 2px 14px rgba(0,0,0,.7); }
  .boost-pop.show { animation: boostPop 1s ease-out forwards; }
  @keyframes boostPop { 0% { opacity: 0; transform: translate(-50%,-42%) scale(.5); } 18% { opacity: 1; transform: translate(-50%,-56%) scale(1.15); } 75% { opacity: 1; transform: translate(-50%,-60%) scale(1); } 100% { opacity: 0; transform: translate(-50%,-74%) scale(1); } }

  .overlay { position: absolute; inset: 0; z-index: 40; display: flex; align-items: center; justify-content: center; background: rgba(10,4,20,.7); opacity: 1; transition: opacity .25s; }
  .overlay.hidden { opacity: 0; pointer-events: none; }
  .card { width: min(82%, calc(360px * var(--sc))); padding: calc(26px * var(--sc)); text-align: center; border-radius: calc(22px * var(--sc)); background: linear-gradient(180deg,#2a5f9e,#12294a); border: 2px solid rgba(150,210,255,.32); box-shadow: 0 18px 50px rgba(0,0,0,.5); transform: scale(1); transition: transform .25s; }
  .overlay.hidden .card { transform: scale(.9); }
  .card-title { color: #fff; font-size: calc(30px * var(--sc)); margin-bottom: calc(14px * var(--sc)); }
  .sb { display: flex; justify-content: center; gap: calc(30px * var(--sc)); margin-bottom: calc(18px * var(--sc)); }
  .sb .k { font-family: system-ui,sans-serif; font-size: calc(11px * var(--sc)); letter-spacing: 2px; color: #8fb4ff; font-weight: 800; }
  .sb .v { font-size: calc(32px * var(--sc)); color: #fff; }
  .sb .v.best { color: var(--gold); }
  .btn3d.play { --radius: calc(14px * var(--sc)); }
  .btn3d.play .btn3d-surface { height: calc(52px * var(--sc)); padding: 0 calc(34px * var(--sc)); background-color: #35d67a; color: #063018; font-family: var(--ui-font); font-size: calc(17px * var(--sc)); letter-spacing: .6px; box-shadow: 0 6px 16px rgba(53,214,122,.42); }

  /* ── TUTORIAL 3 bước (minh hoạ + NGÓN TAY lấy từ sandblock) ── */
  .tut { position: absolute; inset: 0; z-index: 55; display: flex; align-items: center; justify-content: center; background: rgba(10,4,20,.72); transition: opacity .28s; }
  .tut.hidden { opacity: 0; pointer-events: none; }
  .tut-card { width: min(94%, calc(560px * var(--sc))); max-height: 94%; overflow-y: auto; padding: calc(18px * var(--sc)); text-align: center; border-radius: calc(22px * var(--sc)); background: linear-gradient(180deg,#2a5f9e,#12294a); border: 2px solid rgba(150,210,255,.32); box-shadow: 0 18px 50px rgba(0,0,0,.5); transform: scale(1); transition: transform .28s; }
  .tut.hidden .tut-card { transform: scale(.92); }
  .tut-title { color: #fff; font-size: calc(22px * var(--sc)); margin-bottom: calc(12px * var(--sc)); }
  .tut-steps { display: flex; gap: calc(12px * var(--sc)); justify-content: center; align-items: flex-start; }
  .tut-step { flex: 1 1 0; min-width: 0; display: flex; flex-direction: column; align-items: center; gap: calc(8px * var(--sc)); text-align: center; }
  .tut-illus { position: relative; flex: 0 0 auto; width: calc(100px * var(--sc)); height: calc(66px * var(--sc)); border-radius: calc(12px * var(--sc)); overflow: hidden; background: linear-gradient(180deg,#7fd0ec,#c6ecf6); box-shadow: inset 0 0 0 1px rgba(255,255,255,.18); }
  .tut-illus svg { position: absolute; inset: 0; width: 100%; height: 100%; display: block; }

    for (let k = 0; k < 9; k++) {               // SPARKLE trắng lấp lánh

      const ang = k * 2.3999 + fxT * 0.05, rad = BALL_R() * Z * (0.5 + 1.1 * f) * (0.5 + (k % 3) * 0.4);
      const px = sx(p.x) + Math.cos(ang) * rad, py = sy(p.y) + Math.sin(ang) * rad;
      const tw = 0.4 + 0.6 * Math.abs(Math.sin(fxT * 0.28 + k * 1.7)), s = Math.max(1, 1.4 * Z) * (0.6 + f);
      ctx.fillStyle = 'rgba(255,255,255,' + (tw * 0.7 * f + 0.08).toFixed(3) + ')';
      ctx.beginPath(); ctx.arc(px, py, s, 0, TAU); ctx.fill();
    }
    ctx.restore();
  } else if (trail.length > 1 && !grounded) {
    // ── VỆT VẬN TỐC: CHỈ khi ĐANG BAY (lúc lăn dưới đất thì ẩn để không thành "cọng lông") ──
    // dùng vài điểm CUỐI sát bóng → vệt NGẮN, mềm, thon dần
    const n = trail.length, P = trail.map(p => [sx(p.x), sy(p.y)]), start = Math.max(0, n - 8);
    ctx.lineCap = 'round'; ctx.lineJoin = 'round';
    for (let i = start + 1; i < n; i++) {
      const f = (i - start) / (n - 1 - start);
      ctx.strokeStyle = boostGlow > 0 ? 'rgba(255,190,90,' + (0.45 * f).toFixed(3) + ')' : 'rgba(255,255,255,' + (0.28 * f).toFixed(3) + ')';
      ctx.lineWidth = Math.max(1, 2.6 * Z * (0.25 + 0.75 * f));
      ctx.beginPath(); ctx.moveTo(P[i - 1][0], P[i - 1][1]); ctx.lineTo(P[i][0], P[i][1]); ctx.stroke();
    }
  }
  ctx.fillStyle = '#f2c078';
  for (const p of particles) { const a = Math.max(0, p.life / p.max); ctx.globalAlpha = a; const s = (2 + a * 2) * Z; ctx.fillRect(sx(p.x) - s / 2, sy(p.y) - s / 2, s, s); }
  ctx.globalAlpha = 1;
}
function drawCometHead(px, py, r) {
  // ── ĐẦU COMET: quầng sáng ẤM rực + xoáy nhẹ ở đầu (khớp ảnh mẫu: đầu trắng nóng, hào quang cam) ──
  ctx.save(); ctx.globalCompositeOperation = 'lighter';
  const R = r * 2.1, hg = ctx.createRadialGradient(px, py, r * 0.2, px, py, R);
  hg.addColorStop(0, 'rgba(255,248,225,0.95)');   // lõi trắng nóng
  hg.addColorStop(0.35, 'rgba(255,185,90,0.5)');  // hào quang cam-vàng
  hg.addColorStop(1, 'rgba(255,120,40,0)');
  ctx.fillStyle = hg; ctx.beginPath(); ctx.arc(px, py, R, 0, TAU); ctx.fill();
  ctx.strokeStyle = 'rgba(255,215,150,0.5)'; ctx.lineWidth = Math.max(1, 1.4 * Z);           // vòng XOÁY mảnh quay quanh đầu
  ctx.beginPath(); ctx.arc(px, py, r * 1.5, fxT * 0.09, fxT * 0.09 + Math.PI * 1.35); ctx.stroke();
  ctx.restore();
}
function drawWhiteHead(px, py, r) {
  // ── ĐẦU BOOST ×2: quầng TRẮNG mềm để viên bi LẪN vào dải trắng ──
  ctx.save(); ctx.globalCompositeOperation = 'lighter';
  const R = r * 1.5, hg = ctx.createRadialGradient(px, py, r * 0.2, px, py, R);
  hg.addColorStop(0, 'rgba(255,255,255,0.6)'); hg.addColorStop(0.5, 'rgba(230,245,255,0.22)'); hg.addColorStop(1, 'rgba(200,230,255,0)');
  ctx.fillStyle = hg; ctx.beginPath(); ctx.arc(px, py, R, 0, TAU); ctx.fill();
  ctx.restore();
}
function drawBall() {
  const r = BALL_R() * Z, px = sx(bx), py = sy(by);
  if (boostFlight) { boostLvl() >= 2 ? drawCometHead(px, py, r) : drawWhiteHead(px, py, r); }   // (ĐÃ BỎ) quầng cam quanh bóng khi trượt xuống
  ctx.fillStyle = '#ffffff'; ctx.beginPath(); ctx.arc(px, py, r, 0, TAU); ctx.fill();   // bóng TRẮNG THUẦN, PHẲNG (không gradient/viền/đốm)
}

function showScorePop(pts, mult, label, moon, ufo) {
  const e = el('boost-pop'); e.style.color = ufo ? '#5cff88' : moon ? '#bfe0ff' : (mult >= 4 ? '#ffd23f' : mult >= 2 ? '#7fe3a0' : '#fff');   // UFO = XANH LÁ
  const top = ufo ? '🛸 UFO' : moon ? t('moon') : label;
  e.innerHTML = (top ? '<div style="font-size:.62em">' + top + '</div>' : '') + '+' + pts;   // bỏ ×combo sau +điểm
  e.classList.remove('show'); void e.offsetWidth; e.classList.add('show');
}

const TICK_MS = 1000 / 60, DT = 1 / 60, SLOWMO = 0.8;                                      // slow-mo TOÀN CỤC ngay từ đầu: sim chạy 0.8× thời gian thật
let lastTime = 0, acc = 0;
function frame(now) {
  if (!lastTime) lastTime = now;
  let dt = now - lastTime; lastTime = now; if (dt > 250) dt = 250;
  const active = running && !over && !paused && started;
  // ── PHYSICS bước cố định 60Hz (độc lập tần số quét); lưu prev-state trước MỖI bước để nội suy ──
  if (active) { acc += dt; let n = 0; while (acc >= TICK_MS && n < 8) { pbx = bx; pby = by; pcamWX = camWX; pcamWY = camWY; pZ = Z; stepPhysics(DT * SLOWMO); acc -= TICK_MS; n++; } }
  else { acc = 0; pbx = bx; pby = by; pcamWX = camWX; pcamWY = camWY; pZ = Z; }
  AudioFX.slide(active && grounded ? Math.min(1, Math.abs(vx) / (540 * S())) : 0);   // tiếng LƯỚT CÁT theo tốc lăn
  AudioFX.boostAir(active && boostFlight ? Math.min(2, boostLvl()) : 0);              // tiếng BAY BOOST: ×2 vù vù · ×3 xèo xèo
  // ── NỘI SUY RENDER: vẽ ở điểm giữa prev↔current theo phần dư accumulator → MƯỢT ở 120/144Hz ──
  const a = Math.min(1, acc / TICK_MS), _bx = bx, _by = by, _cx = camWX, _cy = camWY, _z = Z;
  bx = pbx + (bx - pbx) * a; by = pby + (by - pby) * a; camWX = pcamWX + (camWX - pcamWX) * a; camWY = pcamWY + (camWY - pcamWY) * a; Z = pZ + (Z - pZ) * a;
  draw();
  bx = _bx; by = _by; camWX = _cx; camWY = _cy; Z = _z;   // trả lại state THẬT cho physics
  requestAnimationFrame(frame);
}

const stage = el('stage');
stage.addEventListener('pointerdown', (e) => {
  if (over) return; AudioFX.resume();
  if (paused) { paused = false; lastTime = 0; }
  if (!started) { started = true; vx = 0.18 * W; }
  diving = true; e.preventDefault();
});
window.addEventListener('pointerup', () => { diving = false; });
window.addEventListener('pointercancel', () => { diving = false; });

el('back-btn').addEventListener('click', (e) => { e.stopPropagation(); sendMessage('quit'); });
el('ov-btn').addEventListener('click', (e) => { e.stopPropagation(); AudioFX.resume(); sendMessage('retry_level'); newRun(); });
el('tut-btn').addEventListener('click', (e) => { e.stopPropagation(); AudioFX.resume(); dismissTutorial(); });
const soundBtn = el('sound-btn');
function updateSoundBtn() { soundBtn.classList.toggle('muted', !AudioFX.isEnabled()); }
soundBtn.addEventListener('click', (e) => { e.stopPropagation(); AudioFX.resume(); AudioFX.setEnabled(!AudioFX.isEnabled()); updateSoundBtn(); });
window.onAppPause = function () { paused = true; diving = false; };
window.onNextLevel = function () {};
window.onRetryLevel = function () { newRun(); };

function applyStatusBarPad() { el('topbar').style.paddingTop = 'calc(max(' + getStatusBarHeight() + 'px, env(safe-area-inset-top)) + 8px)'; }
function applyStaticI18n() { el('lbl-score').textContent = t('score').toUpperCase(); el('lbl-best').textContent = t('best').toUpperCase(); el('ov-k-score').textContent = t('score').toUpperCase(); el('ov-k-best').textContent = t('best').toUpperCase(); el('ov-btn-txt').textContent = t('playAgain'); el('tut-title').textContent = t('tutTitle'); el('tut-btn-txt').textContent = t('tutStart'); el('tut-c1').innerHTML = t('tut1'); el('tut-c2').innerHTML = t('tut2'); el('tut-c3').innerHTML = t('tut3'); el('rotate-txt').textContent = t('rotate'); }
function resize() {
  const wasGrounded = grounded;
  W = stage.clientWidth || window.innerWidth; H = stage.clientHeight || window.innerHeight;
  DPR = Math.min(window.devicePixelRatio || 1, 2); cv.width = Math.round(W * DPR); cv.height = Math.round(H * DPR);
  // --sc theo CẠNH NGẮN (chiều cao ở màn ngang) để UI/popup/tutorial vừa khít, không bị phóng to quá
  const sc = Math.min(Math.max(Math.min(W, H) / 360, 0.9), 1.9); document.documentElement.style.setProperty('--sc', sc.toFixed(3));
  const pill = document.querySelector('.stat'); if (pill) { const ph = pill.getBoundingClientRect().height; if (ph > 0) document.documentElement.style.setProperty('--btn-size', Math.round(ph * 0.92) + 'px'); }
  if (wasGrounded && running) by = terrainY(bx) - BALL_R();
  // KHOÁ NGANG: để DỌC → tạm dừng game (màn "xoay máy" hiện qua CSS); về NGANG → chơi tiếp
  if (H > W) { paused = true; diving = false; }
  else if (paused && !over && document.visibilityState !== 'hidden') { paused = false; lastTime = 0; }
}
function boot() {
  LANG = getLanguage(); applyUiFont(LANG); applyStatusBarPad(); applyStaticI18n();
  best = parseInitialBest(); tutorialSeen = parseTutSeen(); updateBestHud(); updateSoundBtn();
  resize(); newRun(); if (TUT_FORCE || !tutorialSeen) showTutorial(); requestAnimationFrame(frame);
}
window.addEventListener('resize', resize);
window.addEventListener('orientationchange', () => setTimeout(resize, 60));
window.addEventListener('load', resize);
document.addEventListener('visibilitychange', function () { if (document.hidden) { paused = true; diving = false; } else if (!over) { paused = false; lastTime = 0; } });
(function waitForNativeInjection() { const start = Date.now(); (function check() { if (typeof window.language === 'string' || typeof window.data === 'string' || Date.now() - start > 200) boot(); else setTimeout(check, 10); })(); })();
</script>
