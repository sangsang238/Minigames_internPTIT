<!DOCTYPE html>
<html lang="en">
<head>
<!--
  Tap Away (clone Tap Away / Tile Away Story) — HaND
  Flat theme. Single-file HTML (CSS + JS inline).
  LỐI CHƠI
  · Khay (tray) vừa màn hình — KHÔNG pan/zoom. Mỗi ô có 1 mũi tên (lên/phải/xuống/trái).
  · Chạm ô: nếu đường theo hướng mũi tên tới mép khay đang trống ⇒ ô trượt hẳn ra
    ngoài. Nếu đường bị ô khác chặn ⇒ không đi được, MẤT 1 TIM (3 tim mỗi màn).
  · Dọn SẠCH mọi ô của khay ⇒ THẮNG màn. Hết tim ⇒ THUA màn.
  · Hai "khay chờ" (.plate p1/p2) xếp chồng phía sau CHỈ là trang trí — mỗi màn chỉ
    có 1 khay thật phải dọn hết.

  MÀN (level)
  · LEVELS = mảng cấu hình từng màn (cols×rows). Map TO DẦN theo màn ⇒ khó tăng.
  · Khay dựng NGƯỢC (reverse peel: chỉ gán hướng ô khi đã có đường thoát) ⇒ khay
    LUÔN dọn hết được, KHÔNG bao giờ bế tắc.
  · Thắng màn thường ⇒ game_result/'win' (app hiện popup Next/Retry). Thắng màn CUỐI
    ⇒ victory. Thua ⇒ game_result/'lose'. Game KHÔNG tự vẽ modal (app lo popup).

  Tuân thủ game-common.md (native bridge, game CÓ level).
-->
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<title>Tap Away</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Google+Sans+Flex:opsz,wght@6..144,1..1000&display=swap" rel="stylesheet" />

<style>
  /* ── Reset + tắt highlight khi chạm (game-common §UI) ─────────────── */
  *, *::before, *::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    -webkit-tap-highlight-color: transparent;
    -webkit-touch-callout: none;
  }

  :root {
    --ui-font: 'Google Sans Flex', system-ui, sans-serif;
    --bg-1: #ffcf94;
    --bg-2: #93b7f2;
    --ink: #24304d;
    --ink-soft: #5b6b8f;
    --accent: #3b5bdb;
    --gold: #f5b301;
    --cell: 56px;   /* set bởi JS */
  }

  html, body { height: 100%; overflow: hidden; }
  body {
    font-family: var(--ui-font);
    font-weight: 700;
    color: var(--ink);
    /* nền mix cam→xanh dương ĐẬM/TƯƠI: quầng cam trên, quầng xanh dưới + chuyển gradient */
    background:
      radial-gradient(90% 55% at 50% -8%, rgba(255,160,70,.75) 0%, rgba(255,160,70,0) 62%),
      radial-gradient(100% 62% at 50% 108%, rgba(80,135,235,.8) 0%, rgba(80,135,235,0) 62%),
      linear-gradient(180deg, var(--bg-1) 0%, #dcd7e6 50%, var(--bg-2) 100%);
    background-attachment: fixed;
    -webkit-user-select: none;
    user-select: none;
    touch-action: none;
  }

  .app {
    position: relative;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    /* Ẩn tới khi boot dựng xong level ĐÚNG ⇒ không lộ số "1" tĩnh + khay trống
       (tránh "giật về level 1 rồi mới hiện level tiến trình"). Nền gradient ở body
       vẫn hiển thị trong lúc chờ. */
    opacity: 0;
  }
  .app.ready { opacity: 1; transition: opacity .15s ease; }

  /* ── HUD trên cùng ────────────────────────────────────────────────── */
  .topbar {
    width: 100%;
    max-width: 560px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    padding: 0 14px 8px;
  }
  /* ── Thanh Level — 1 khung thẻ số màn (dạng thẻ giống Score/Best các game khác) ── */
  .scorebar {
    flex: 1;
    min-width: 0;
    display: flex;
    justify-content: center;
    gap: 10px;
    padding: 0 8px;
  }
  .sc-box {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    line-height: 1.02;
    min-width: 0;
    flex: 1 1 0;
    max-width: 150px;
    padding: 7px 12px 6px;
    background: rgba(255, 255, 255, .94);
    border-radius: 16px;
    box-shadow: 0 4px 14px rgba(24, 20, 60, .18);
    overflow: hidden;
  }
  .sc-k {
    font-size: 10px; letter-spacing: 1.5px; font-weight: 800;
    color: var(--accent); text-transform: uppercase;
    max-width: 100%; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .sc-v { font-size: 26px; font-weight: 800; line-height: .9; color: var(--ink); max-width: 100%; white-space: nowrap; }

  /* ── Tim (lượt chơi) — 3 tim mỗi lần chơi ─────────────────────────── */
  .lives {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    width: 100%;
    max-width: 560px;
    min-height: 32px;      /* cao ổn định dù trống/đầy ⇒ đo .stage chuẩn mọi lúc */
    padding: 2px 0 4px;
  }
  .heart { width: 26px; height: 26px; display: block; color: #ff5a72; }
  .heart svg { width: 100%; height: 100%; display: block; filter: drop-shadow(0 2px 3px rgba(255, 90, 114, .35)); }
  .heart.empty { color: #c7cede; }
  .heart.empty svg { filter: none; }
  .heart.lose { animation: heartLose .45s ease; }
  @keyframes heartLose {
    0% { transform: scale(1); }
    30% { transform: scale(1.4); }
    100% { transform: scale(1); }
  }

  /* Btn3d — biến thể flat (shadow ẩn), icon vuông */
  .btn3d {
    --radius: 14px;
    --surface-color: #ffffff;
    --surface-text: var(--accent);
    position: relative;
    display: inline-block;
    padding: 0;
    border: 0;
    background: transparent;
    cursor: pointer;
    font: inherit;
    color: inherit;
  }
  .btn3d-shadow { display: none; }
  .btn3d-surface {
    position: relative;
    z-index: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: var(--radius);
    background-color: var(--surface-color);
    color: var(--surface-text);
    box-shadow: 0 4px 12px rgba(36, 48, 77, .14);   /* phẳng: chỉ bóng đổ mềm, KHÔNG gờ 3D */
    transition: transform .09s ease-out;
  }
  .btn3d:active .btn3d-surface { transform: scale(.95); }
  .btn3d.btn-icon .btn3d-surface { width: 46px; height: 46px; }
  .btn3d.btn-icon { -webkit-user-select: none; user-select: none; }
  .back-ico { width: 52%; height: 52%; fill: currentColor; display: block; }
  .restart-ico { width: 62%; height: 62%; fill: currentColor; display: block; }

  /* ── Sân khấu: chồng khay (deck) ở giữa màn hình ───────────────────── */
  .stage {
    position: relative;
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
    /* chừa safe-area đáy (thanh home iPhone) + lề 2 bên theo notch ngang (landscape) */
    padding:
      8px
      calc(8px + env(safe-area-inset-right))
      calc(20px + env(safe-area-inset-bottom))
      calc(8px + env(safe-area-inset-left));
    overflow: visible;   /* KHÔNG cắt ">>>" gợi ý ở ô sát mép khay */
  }
  .deck {
    position: relative;   /* width/height = kích thước khay (set bởi JS) */
  }

  /* Các "khay chờ" xếp chồng phía sau ⇒ ảo giác một chồng khay */
  .plate {
    position: absolute;
    left: 50%;
    top: 0;
    width: 100%;
    height: 100%;
    border-radius: 18px;
    transform-origin: 50% 0;
  }
  .plate.p1 {
    transform: translate(-50%, 16px) scale(.955);
    background: linear-gradient(180deg, #e6edfb, #d3ddf3);
    box-shadow:
      inset 0 2px 0 rgba(255, 255, 255, .7),
      0 9px 0 #b0bfe0,
      0 18px 22px rgba(36, 48, 77, .18);
    z-index: 0;
  }
  .plate.p2 {
    transform: translate(-50%, 31px) scale(.912);
    background: linear-gradient(180deg, #dbe4f6, #c8d5ef);
    box-shadow:
      inset 0 2px 0 rgba(255, 255, 255, .55),
      0 9px 0 #9fb0d6,
      0 18px 22px rgba(36, 48, 77, .16);
    z-index: 0;
  }

  /* Khay đang chơi — khung 3D (thành khay nổi, lòng khay lõm) */
  .tray {
    position: relative;
    z-index: 1;
    width: 100%;
    height: 100%;
    border-radius: 18px;
    background:
      linear-gradient(0deg, rgba(59,91,219,.05) 1px, transparent 1px) 0 var(--pad, 0) / 100% var(--cell),
      linear-gradient(90deg, rgba(59,91,219,.05) 1px, transparent 1px) var(--pad, 0) 0 / var(--cell) 100%,
      #ffffff;
    box-shadow:
      0 13px 0 #aebedf,                       /* độ dày thành khay (3D) */
      0 15px 0 #9fb0d6,                        /* mép đáy đậm hơn */
      0 30px 36px -8px rgba(36, 48, 77, .40);  /* bóng đổ nền */
    cursor: pointer;
  }
  /* Khung/bevel: vành viền + gờ trên sáng, gờ dưới tối, lòng khay lõm.
     Dùng pseudo-element ⇒ KHÔNG ảnh hưởng layout ô. */
  .tray::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 18px;
    pointer-events: none;
    box-shadow:
      inset 0 0 0 6px #e8eefb,                     /* vành khung sáng */
      inset 0 0 0 8px rgba(59, 91, 219, .22),       /* đường viền khung */
      inset 0 7px 0 2px rgba(255, 255, 255, .95),   /* gờ trên sáng */
      inset 0 -9px 0 2px rgba(36, 48, 77, .14),     /* gờ dưới tối */
      inset 0 12px 14px -13px rgba(36, 48, 77, .14); /* lòng khay lõm (nhẹ) */
  }
  .tray.out { animation: trayOut .3s ease forwards; }
  .tray.in  { animation: trayIn .36s cubic-bezier(.2, .7, .3, 1) both; }
  @keyframes trayOut {
    to { transform: translateY(-34px) scale(.9); opacity: 0; }
  }
  @keyframes trayIn {
    from { transform: translateY(30px) scale(.92); opacity: 0; }
    to   { transform: none; opacity: 1; }
  }

  /* lóe sáng ô vừa được dọn */
  .reveal {
    position: absolute;
    width: var(--cell);
    height: var(--cell);
    border-radius: 24%;
    background: rgba(255, 255, 255, .85);
    pointer-events: none;
    z-index: 3;
    animation: revealFade .5s ease forwards;
  }
  @keyframes revealFade {
    0% { opacity: .85; transform: scale(1); }
    100% { opacity: 0; transform: scale(1.18); }
  }

  .tile {
    position: absolute;
    width: var(--cell);
    height: var(--cell);
    cursor: pointer;
    z-index: 2;
    will-change: transform;
  }
  .tile-face {
    position: absolute;
    inset: 3px;                     /* mặc định; JS chỉnh từng cạnh để chụm khối */
    border-radius: 24%;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: inset 0 -4px 0 rgba(0, 0, 0, .18), 0 2px 5px rgba(36, 48, 77, .28);
    transition: transform .1s ease;
  }
  .tile-face svg { width: 76%; height: 76%; display: block; }
  .tile:active .tile-face { transform: scale(.92); }

  .tile.spawn .tile-face { animation: pop .28s ease; }
  @keyframes pop {
    0% { transform: scale(0); opacity: 0; }
    60% { transform: scale(1.08); }
    100% { transform: scale(1); opacity: 1; }
  }

  .tile.slide {
    transition: transform .34s cubic-bezier(.45, 0, .85, .6);
    z-index: 4;
    pointer-events: none;
  }
  /* Cả VIÊN đổi xanh lá KHI được gỡ và bay ra (lúc trượt); mũi tên giữ trắng.
     background của .tile-face do JS gán inline ⇒ dùng !important để phủ lúc slide. */
  .tile.slide .tile-face { background: #37b24d !important; }
  .tile.blocked .tile-face { animation: shake .32s ease; }
  @keyframes shake {
    0%, 100% { transform: translate(0, 0); }
    20% { transform: translate(-3px, 0); }
    40% { transform: translate(3px, 0); }
    60% { transform: translate(-2px, 0); }
    80% { transform: translate(2px, 0); }
  }

  /* ── Onboarding: chuỗi popup mẫu (hiện LẦN ĐẦU, trước khi chơi) ───────
     Mỗi bước có DEMO minh hoạ bằng chính viên/mũi tên của game. Flat theme:
     thẻ trắng, chữ mực, điểm nhấn accent — khớp phần còn lại của game. */
  .ob {
    position: fixed;
    inset: 0;
    z-index: 20;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
    background: rgba(24, 30, 55, .52);
    transition: opacity .25s ease;
  }
  .ob.hidden { opacity: 0; pointer-events: none; }
  .ob-card {
    width: min(92%, 360px);
    padding: 20px 22px 18px;
    border-radius: 24px;
    text-align: center;
    background: #ffffff;
    box-shadow: 0 20px 50px rgba(24, 30, 55, .4);
    transform: scale(1);
    transition: transform .25s ease;
  }
  .ob.hidden .ob-card { transform: scale(.9); }
  /* overflow:hidden ⇒ ô trượt ra ngoài khung demo thì BIẾN MẤT (không bay lồ ra thẻ). */
  .ob-demo { position: relative; height: 208px; margin-bottom: 8px; overflow: hidden; border-radius: 12px; }
  .ob-stage { position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); }
  /* Khay demo — bản thu nhỏ của .tray (nền trắng + gờ 3D nhẹ) */
  .ob-tray {
    position: absolute;
    border-radius: 14px;
    background: #ffffff;
    box-shadow:
      inset 0 0 0 3px #e8eefb,
      inset 0 0 0 4px rgba(59, 91, 219, .2),
      0 8px 0 #aebedf,
      0 14px 20px -6px rgba(36, 48, 77, .35);
  }
  .ob-tile { position: absolute; width: 44px; height: 44px; }
  .ob-tile .face {
    position: absolute;
    inset: 2px;
    border-radius: 11px;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: inset 0 -4px 0 rgba(0, 0, 0, .16), 0 3px 6px rgba(36, 48, 77, .22);
  }
  .ob-tile .face svg { width: 72%; height: 72%; display: block; }
  .ob-hand {
    position: absolute;
    z-index: 6;
    font-size: 30px;
    pointer-events: none;
    filter: drop-shadow(0 4px 4px rgba(0, 0, 0, .3));
  }
  /* Hàng tim mini (bước "ô bị chặn") */
  .ob-hearts { position: absolute; left: 50%; transform: translateX(-50%); display: flex; gap: 6px; }
  .ob-hearts .h { width: 22px; height: 22px; color: #ff5a72; }
  .ob-hearts .h svg { width: 100%; height: 100%; display: block; }
  .ob-hearts .h.empty { color: #c7cede; }
  /* Dấu tick "thắng" (bước cuối) */
  .ob-check {
    position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%);
    width: 74px; height: 74px; border-radius: 50%;
    background: #37b24d; color: #fff; display: flex; align-items: center; justify-content: center;
    box-shadow: 0 8px 20px rgba(55, 178, 77, .45);
  }
  .ob-check svg { width: 52%; height: 52%; display: block; fill: currentColor; }

  .ob-title { font-size: 22px; font-weight: 800; color: var(--ink); margin-bottom: 6px; }
  .ob-desc { font-size: 14px; font-weight: 600; color: var(--ink-soft); line-height: 1.5; min-height: 42px; }
  .ob-dots { display: flex; gap: 7px; justify-content: center; margin: 12px 0 14px; }
  .ob-dots i { width: 8px; height: 8px; border-radius: 50%; background: rgba(59, 91, 219, .2); transition: background .2s; }
  .ob-dots i.on { background: var(--accent); }
  .ob-btns { display: flex; align-items: center; justify-content: center; gap: 12px; }
  .ob-nav {
    width: 48px; height: 48px; border-radius: 14px; border: 0; padding: 0;
    font: inherit; font-size: 24px; font-weight: 800; line-height: 1; cursor: pointer;
    background: #eef2fe; color: var(--accent); flex: 0 0 auto;
    transition: transform .09s ease-out;
  }
  .ob-nav:active { transform: scale(.94); }
  .ob-nav.go { background: var(--accent); color: #fff; box-shadow: 0 4px 12px rgba(59, 91, 219, .3); }
  .ob-nav.play { width: auto; padding: 0 26px; font-size: 16px; font-weight: 800; }
  .ob-nav.disabled { opacity: .3; pointer-events: none; }
  .ob-skip {
    height: 48px; padding: 0 12px; border: 0; background: transparent;
    font: inherit; font-size: 14px; font-weight: 700; color: var(--ink-soft); cursor: pointer; flex: 0 0 auto;
  }

  .hidden { display: none !important; }
</style>
</head>
<body>

<div class="app" id="app">
  <div class="topbar" id="topbar">
    <div class="btn3d btn-icon" id="back-btn" role="button" aria-label="Back">
      <span class="btn3d-shadow"></span>
      <span class="btn3d-surface">
        <svg class="back-ico" viewBox="0 0 447.243 447.243" aria-hidden="true">
          <path fill="currentColor" d="M420.361 192.229a31.967 31.967 0 0 0-5.535-.41H99.305l6.88-3.2a63.998 63.998 0 0 0 18.08-12.8l88.48-88.48c11.653-11.124 13.611-29.019 4.64-42.4-10.441-14.259-30.464-17.355-44.724-6.914a32.018 32.018 0 0 0-3.276 2.754l-160 160c-12.504 12.49-12.515 32.751-.025 45.255l.025.025 160 160c12.514 12.479 32.775 12.451 45.255-.063a32.084 32.084 0 0 0 2.745-3.137c8.971-13.381 7.013-31.276-4.64-42.4l-88.32-88.64a64.002 64.002 0 0 0-16-11.68l-9.6-4.32h314.24c16.347.607 30.689-10.812 33.76-26.88 2.829-17.445-9.019-33.88-26.464-36.71z"/>
        </svg>
      </span>
    </div>

    <div class="scorebar" id="scorebar">
      <div class="sc-box">
        <div class="sc-k" id="level-label">Level</div>
        <div class="sc-v" id="level-num">1</div>
      </div>
    </div>

    <div class="btn3d btn-icon" id="restart-btn" role="button" aria-label="Restart">
      <span class="btn3d-shadow"></span>
      <span class="btn3d-surface">
        <svg class="restart-ico" viewBox="0 0 100 100" aria-hidden="true">
          <path fill="currentColor" d="m50.7 19.003 4.793-4.793c2.696-2.697 2.696-6.991 0-9.688s-6.991-2.696-9.687 0L29.327 21.001a6.812 6.812 0 0 0 0 9.687l16.479 16.478a6.9 6.9 0 0 0 4.793 1.998c1.798 0 3.496-.7 4.794-1.998a6.812 6.812 0 0 0 0-9.687l-4.794-4.794c13.682.4 24.768 11.685 24.768 25.467 0 14.081-11.485 25.466-25.467 25.466S24.534 72.233 24.534 58.252c0-3.096.599-6.192 1.597-8.989 1.299-3.495-.4-7.49-3.994-8.788-3.496-1.298-7.49.4-8.789 3.995-1.698 4.394-2.496 9.088-2.496 13.882C10.852 79.923 28.428 97.5 50 97.5s39.148-17.577 39.148-39.148c0-21.472-17.177-38.95-38.449-39.349z"/>
        </svg>
      </span>
    </div>
  </div>

  <div class="lives" id="lives"></div>

  <div class="stage">
    <div class="deck" id="deck">
      <div class="plate p2"></div>
      <div class="plate p1"></div>
      <div class="tray" id="tray"></div>
    </div>
  </div>
</div>

<script>
/* =====================================================================
 * 0. Localization (inline — game-common §5)
 * ===================================================================== */
const SUPPORTED_LANGS = [
  'en','vi','zh-Hans','zh-Hant','ja','ko','es','es-MX','es-AR','pt-BR','pt',
  'fr','de','it','nl','pl','ru','tr','ar','hi','th','id','fil',
];
const DEFAULT_LANG = 'en';
const LATIN_LANGS = new Set([
  'en','vi','es','es-MX','es-AR','pt-BR','pt','fr','de','it','nl','pl','tr','id','fil',
]);

const I18N = {
  en: {
    level: 'Level', tut: 'Tap a tile — it slides where its arrow points',
    obTapT: 'Tap to slide out', obTapD: 'Tap a tile and it slides off the tray in the direction its arrow points.',
    obBlockT: 'Mind the path', obBlockD: 'If another tile blocks the way, it can\'t move — and you lose a heart. You get 3 per level.',
    obWinT: 'Clear the tray', obWinD: 'Empty every tile to win the level. Plan your order so nothing gets stuck!',
    obSkip: 'Skip', obPlay: 'Play',
  },
  vi: {

    obTapT: 'Chạm để trượt ra', obTapD: 'Chạm một ô, nó sẽ trượt ra khỏi khay theo hướng mũi tên.',

function getLanguage() {
  const fromWin = typeof window.language === 'string' ? window.language : null;
  const fromUrl = new URLSearchParams(location.search).get('language');
  const raw = fromWin != null ? fromWin : fromUrl;
  return SUPPORTED_LANGS.includes(raw) ? raw : DEFAULT_LANG;
}
let LANG = getLanguage();
function t(key) { return (I18N[LANG] && I18N[LANG][key]) || I18N.en[key] || key; }
function applyUiFont(lang) {
  if (!LATIN_LANGS.has(lang)) {
    document.documentElement.style.setProperty('--ui-font', 'system-ui, sans-serif');
  }

/* =====================================================================
 * 1. Native bridge (game-common §1) — game CÓ level
 * ===================================================================== */
function post(msg) {
  try {
    if (window.ReactNativeWebView && window.ReactNativeWebView.postMessage) {
      window.ReactNativeWebView.postMessage(JSON.stringify(msg));
    } else {
      console.log('[tap-away → native]', msg);
    }
  } catch (e) { /* ignore */ }
}
function isNative() {
  return !!(window.ReactNativeWebView && window.ReactNativeWebView.postMessage);
}
function sendMessage(type, opts) {
  opts = opts || {};
  post({
    type,
    level: currentLevelIdx + 1,   // game CÓ level → 1-indexed
    result: opts.result != null ? opts.result : null,
    data: opts.data != null ? opts.data : null,
    showModal: opts.showModal === true,
  });
}
function saveData(payload) {
  const data = typeof payload === 'string' ? payload : JSON.stringify(payload);
  sendMessage('save_data', { data });
}
/* Trạng thái ván NẶNG (khay đang chơi dở) → localStorage của WebView, KHÔNG qua
   native (game-common §1.2). Bọc try/catch: chế độ riêng tư / hết quota không throw.
   Đây cũng là lý do F5 trên trình duyệt vẫn khôi phục được ván. */
const LS_KEY = 'tapaway_save';
function saveLocal(payload) {
  try { localStorage.setItem(LS_KEY, typeof payload === 'string' ? payload : JSON.stringify(payload)); }
  catch (e) { /* private mode / quota — bỏ qua */ }
}
function readLocal() {
  try { return localStorage.getItem(LS_KEY) || ''; } catch (e) { return ''; }
}
function getStatusBarHeight() {
  const params = new URLSearchParams(location.search);
  const fromUrl = params.get('statusBarHeight');
  const fromWin = typeof window.statusBarHeight !== 'undefined' ? window.statusBarHeight : null;
  let h = Number(fromUrl != null ? fromUrl : fromWin);
  if (Number.isNaN(h) || h < 0) h = 0;
  return h;
}
/* Gộp data nhẹ (native: seen/levelIdx) + trạng thái ván (localStorage: board).
   - seen: true nếu bất kỳ nguồn nào đánh dấu đã xem.
   - board: CHỈ từ localStorage (native không giữ ván nặng).
   - levelIdx: ưu tiên native, rồi tới localStorage (dùng làm fallback level khi
     native KHÔNG truyền currentLevel — vd chạy trên trình duyệt / F5). */
function getInitialSaved() {
  const parse = (raw) => {
    if (!raw) return null;
    try { const o = JSON.parse(raw); return (o && typeof o === 'object') ? o : null; }
    catch (e) { return null; }
  };
  const fromWin = typeof window.data === 'string' ? window.data : null;
  const fromUrl = new URLSearchParams(location.search).get('data');
  const nativeObj = parse(fromWin != null ? fromWin : (fromUrl || ''));
  const localObj = parse(readLocal());
  const seen = !!((nativeObj && nativeObj.seen === true) || (localObj && localObj.seen === true));
  const board = (localObj && localObj.board && typeof localObj.board === 'object') ? localObj.board : null;
  let levelIdx = null;
  if (nativeObj && Number.isFinite(nativeObj.levelIdx)) levelIdx = nativeObj.levelIdx;
  else if (localObj && Number.isFinite(localObj.levelIdx)) levelIdx = localObj.levelIdx;
  return { seen, board, levelIdx };
}
/* Level từ native (1-indexed) → 0-indexed, clamp. Trả null khi native KHÔNG truyền
   currentLevel ⇒ boot sẽ fallback về level trong save (localStorage). */
function getInitialLevelIdx() {
  const fromWin = typeof window.currentLevel === 'number' ? window.currentLevel : null;
  const fromUrl = new URLSearchParams(location.search).get('currentLevel');
  if (fromWin == null && fromUrl == null) return null;
  const raw = Number(fromWin != null ? fromWin : fromUrl);
  if (!Number.isFinite(raw) || raw < 1) return 0;
  return Math.min(Math.floor(raw), LEVELS.length) - 1;
}

/* =====================================================================
 * 2. Hướng + màu + mũi tên   (dir: 0=lên, 1=phải, 2=xuống, 3=trái)
 * ===================================================================== */
const DR = [-1, 0, 1, 0];
const DC = [0, 1, 0, -1];
const DIRS = [0, 1, 2, 3];
// KHÔNG dùng xanh lá làm màu có sẵn (xanh lá dành riêng cho viên lúc bay ra).
const PALETTE = [
  '#ff6b6b', '#4dabf7', '#5c7cfa', '#fab005', '#b197fc', '#ff922b',
  '#22b8cf', '#f783ac', '#748ffc', '#e64980', '#f06595', '#ffa94d',
];
const ARROW = '<path d="M50 20 L78 52 L60 52 L60 80 L40 80 L40 52 L22 52 Z" ' +
  'stroke="#ffffff" stroke-width="11" stroke-linejoin="round" stroke-linecap="round"/>';
function arrowSvg(dir) {
  return '<svg viewBox="0 0 100 100" fill="#ffffff" aria-hidden="true" ' +
    'style="transform:rotate(' + (dir * 90) + 'deg)">' + ARROW + '</svg>';
}
/* =====================================================================
 * 3. State — MÀN (level): map to dần theo màn. Khay (khung) cỡ COLS×ROWS.
 * ===================================================================== */
// 100 MÀN sinh tự động: cỡ lưới (cols×rows) TO DẦN theo màn ⇒ khó tăng đều tới màn 100.
// Kết hợp thuật toán dựng khay "mắc chéo" (assignDirections) ⇒ vừa to hơn vừa rối hơn dần.
// cols 4→8, rows 5→13 (nội suy tuyến tính) — đơn điệu không giảm, ô ≥28px luôn vừa màn dọc điện thoại.
const LEVEL_COUNT = 100;
const LEVELS = Array.from({ length: LEVEL_COUNT }, (_, i) => {
  const t = i / (LEVEL_COUNT - 1);                 // 0 ở màn 1 → 1 ở màn cuối
  return {
    cols: Math.round(4 + t * 4),                   // 4 → 8
    rows: Math.round(5 + t * 8),                   // 5 → 13
  };
});
let currentLevelIdx = 0;      // màn hiện tại (0-indexed)

let tutorialSeen = false;     // đã xem onboarding lần đầu chưa (persist)
let advancing = false;        // đang chuyển khung / chờ thắng màn (khoá thao tác)
let pendingRestore = null;    // ván dở nạp từ save — dùng 1 lần lúc boot (khôi phục đúng khay + tim)

const MAX_HEARTS = 3;         // số tim mỗi màn
let hearts = MAX_HEARTS;      // tim còn lại của màn hiện tại

let COLS = 6, ROWS = 8;       // kích thước khung màn hiện tại (đặt bởi loadLevel)
let CELL = 56;                // cỡ ô (px) — tính theo viewport
const PAD = 10;               // lề trong khay = độ dày khung 3D ⇒ ô KHÔNG tràn ra khung

let live = new Map();         // "r,c" -> { dir, color, el }
let viewW = 320, viewH = 400; // vùng sân khấu khả dụng (px)

const trayEl = document.getElementById('tray');
const deckEl = document.getElementById('deck');
const livesEl = document.getElementById('lives');

const KEY = (r, c) => r + ',' + c;
function getCell(r, c) { return live.get(KEY(r, c)) || null; }
function inBounds(r, c) { return r >= 0 && r < ROWS && c >= 0 && c < COLS; }

/* =====================================================================
 * 4. Đường thoát + dựng khay (dựng ngược trên khay 4 mép)
 *   Đặt ô chỉ khi đường tới mép theo hướng của nó đang trống ⇒ đảo thứ tự đặt
 *   là một thứ tự dọn hợp lệ. Gỡ ô chỉ mở đường (đơn điệu) ⇒ khay LUÔN dọn hết
 *   được ⇒ không bao giờ bế tắc.
 * ===================================================================== */
function pathClear(r, c, dir) {
  if (dir === 0) { for (let rr = r - 1; rr >= 0;    rr--) if (getCell(rr, c)) return false; return true; }
  if (dir === 1) { for (let cc = c + 1; cc < COLS;  cc++) if (getCell(r, cc)) return false; return true; }
  if (dir === 2) { for (let rr = r + 1; rr < ROWS;  rr++) if (getCell(rr, c)) return false; return true; }
  if (dir === 3) { for (let cc = c - 1; cc >= 0;    cc--) if (getCell(r, cc)) return false; return true; }
  return false;
}

function placeTile(r, c, dir, color, animate) {
  const el = document.createElement('div');
  el.className = animate ? 'tile spawn' : 'tile';
  el.dataset.r = r;
  el.dataset.c = c;
  el.style.left = (PAD + c * CELL) + 'px';
  el.style.top = (PAD + r * CELL) + 'px';
  el.innerHTML = '<div class="tile-face" style="background:' + PALETTE[color] + '">' +
    arrowSvg(dir) + '</div>';
  trayEl.appendChild(el);
  live.set(KEY(r, c), { dir, color, el });
  if (animate) setTimeout(() => el.classList.remove('spawn'), 300);
}

/* Đánh dấu ô đang có đường thoát (để hover hiện ">>") */
function markMoves() {
  for (const [k, tl] of live) {
    if (!tl.el) continue;
    const i = k.indexOf(',');
    const r = +k.slice(0, i), c = +k.slice(i + 1);
    tl.el.classList.toggle('can-move', pathClear(r, c, tl.dir));
  }
}

/* MỖI ô là 1 viên RIÊNG (bo góc + khe quanh) — KHÔNG nối các ô thành khối.
   Khe nhỏ (GAP) để các viên sát nhau nhưng vẫn tách bạch, mỗi mũi tên 1 ô. */
const GAP = 1;
function styleBlocks() {
  const R = Math.round(CELL * 0.26);   // bán kính bo góc viên
  for (const [, tl] of live) {
    if (!tl.el) continue;
    const f = tl.el.firstElementChild;   // .tile-face
    f.style.top = f.style.bottom = f.style.left = f.style.right = GAP + 'px';
    f.style.borderRadius = R + 'px';     // bo cả 4 góc ⇒ viên độc lập
    f.style.boxShadow = 'inset 0 -4px 0 rgba(0, 0, 0, .16), 0 3px 6px rgba(36, 48, 77, .22)';
  }
}

/* Số ô 1 viên phải đi để ra tới mép theo hướng dir (càng lớn = càng chĩa SÂU vào trong,
   càng dễ bị viên khác chặn về sau ⇒ dây chuyền chặt hơn). */
function distEdge(r, c, dir) {
  return dir === 0 ? r : dir === 1 ? COLS - 1 - c : dir === 2 ? ROWS - 1 - r : c;
}
/* Chọn hướng cho viên mới sao cho nó "MẮC" vào NHIỀU viên KHÁC CHIỀU nhất.
   Lúc gán, mọi ô trên đường thoát của các hướng ứng viên đều đã có hướng (đã bóc trước),
   nên ta biết được: đi theo hướng d sẽ bị chặn bởi bao nhiêu viên KHÁC chiều d.
   Điểm 1 hướng:
     • crossBlockers — số viên trên đường thoát mà CHĨA KHÁC hướng d (mỗi viên = 1 lần bị
       chặn chéo: muốn dọn viên này phải dọn viên kia trước, mà nó lại đi hướng khác). ⇒ trọng số CAO nhất.
     • hàng xóm 4 phía đã gán: thưởng nếu KHÁC chiều, phạt nếu CÙNG chiều ⇒ không còn "quét
       nguyên hàng cùng hướng" một phát, bàn rối hơn.
     • distEdge — chĩa sâu (phụ, phá thế hoà).
   Vẫn chỉ chọn trong `dirs` hợp lệ của thuật toán bóc-ngược ⇒ ĐẢM BẢO không bế tắc. */
function chooseSpreadDir(r, c, dirs, dirOf) {
  let best = [], bestScore = -Infinity;
  for (const d of dirs) {
    let crossBlockers = 0;                    // viên khác chiều nằm trên đường thoát
    let rr = r + DR[d], cc = c + DC[d];
    while (inBounds(rr, cc)) {
      const kk = KEY(rr, cc);
      if (dirOf.has(kk) && dirOf.get(kk) !== d) crossBlockers++;
      rr += DR[d]; cc += DC[d];
    }
    let diffNb = 0, sameNb = 0;               // hàng xóm 4 phía đã gán: khác / cùng chiều
    for (const nd of DIRS) {
      const nk = KEY(r + DR[nd], c + DC[nd]);
      if (!dirOf.has(nk)) continue;
      if (dirOf.get(nk) === d) sameNb++; else diffNb++;
    }
    const score = crossBlockers * 80 + diffNb * 24 - sameNb * 36 + distEdge(r, c, d) * 6;
    if (score > bestScore) { bestScore = score; best = [d]; }
    else if (score === bestScore) best.push(d);
  }
  return best[(Math.random() * best.length) | 0];   // hoà điểm ⇒ bốc ngẫu nhiên (giữ biến thiên)
}

/* Gán hướng cho MỌI ô bằng cách "BÓC NGƯỢC" (reverse peel):
   Khay đầy 100% ô. Mô phỏng thứ tự THÁO: mỗi bước tìm ô còn lại mà có 1 hướng ra mép
   với toàn bộ đường đi đã bị tháo trước đó (removed), gán hướng đó rồi đánh dấu tháo.
   Vì ô ở "biên còn lại" ngoài cùng luôn có đường ra (vd ô có hàng nhỏ nhất luôn thoát
   được lên trên), quá trình KHÔNG BAO GIỜ bế tắc ⇒ phủ kín mọi ô, và thứ tự bóc chính
   là một thứ tự dọn hợp lệ ⇒ khay luôn dọn hết được, KHÔNG khoảng trắng, KHÔNG chồng ô. */
function assignDirections() {
  const removed = new Set();
  const dirOf = new Map();
  const pathRemoved = (r, c, dir) => {           // đường tới mép theo dir đã tháo hết chưa?
    let rr = r + DR[dir], cc = c + DC[dir];
    while (inBounds(rr, cc)) {
      if (!removed.has(KEY(rr, cc))) return false;
      rr += DR[dir]; cc += DC[dir];
    }
    return true;
  };
  let left = ROWS * COLS;
  while (left > 0) {
    // THỨ TỰ BÓC "SÂU NHẤT TRƯỚC": mỗi bước, trong các ô đủ điều kiện bóc, chọn ô nào có
    // hướng thoát SÂU nhất (distEdge lớn nhất). Bóc ưu tiên viên "chĩa sâu" ⇒ trì hoãn các
    // viên trong lõi, ép chúng có đường thoát dài & bị nhiều viên khác chặn ⇒ chuỗi phụ thuộc
    // dài hơn nhiều, ÍT viên dọn-được-ngay ⇒ KHÓ hơn hẳn. Vẫn chỉ bóc ô hợp lệ ⇒ KHÔNG bế tắc.
    const cands = [];
    let deepest = -1;
    for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) {
      if (removed.has(KEY(r, c))) continue;
      const dirs = DIRS.filter(d => pathRemoved(r, c, d));
      if (!dirs.length) continue;
      let dd = -1;
      for (const d of dirs) dd = Math.max(dd, distEdge(r, c, d));
      if (dd > deepest) deepest = dd;
      cands.push([r, c, dirs, dd]);
    }
    const deep = cands.filter(x => x[3] === deepest);     // các ô sâu nhất bước này
    const [r, c, dirs] = deep[(Math.random() * deep.length) | 0];
    dirOf.set(KEY(r, c), chooseSpreadDir(r, c, dirs, dirOf));   // ưu tiên MẮC nhiều viên khác chiều
    removed.add(KEY(r, c));
    left--;
  }
  return dirOf;
}

/* Tô màu RẢI ĐỀU: mỗi ô một màu, PHẦN LỚN tránh trùng hàng xóm (4 phía) ⇒ không tụ
   mảng lớn cùng màu một góc, nhìn lẫn lộn hơn. Nhưng CHỪA ~15% xác suất bốc màu bất kỳ
   ⇒ thỉnh thoảng vẫn có 2 ô cạnh nhau cùng màu (ÍT), tự nhiên hơn là cấm tuyệt đối.
   Không phụ thuộc hướng mũi tên. */
const SAME_COLOR_CHANCE = 0.15;   // xác suất cho phép trùng màu hàng xóm
function colorClusters(dirOf) {
  const color = new Map();
  for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) {
    if (Math.random() < SAME_COLOR_CHANCE) {          // đôi khi bốc bất kỳ ⇒ có thể trùng hàng xóm
      color.set(KEY(r, c), (Math.random() * PALETTE.length) | 0);
      continue;
    }
    const used = new Set();
    for (const nd of DIRS) {
      const nk = KEY(r + DR[nd], c + DC[nd]);
      if (color.has(nk)) used.add(color.get(nk));
    }
    const avail = [];
    for (let i = 0; i < PALETTE.length; i++) if (!used.has(i)) avail.push(i);
    color.set(KEY(r, c), avail[(Math.random() * avail.length) | 0]);
  }
  return color;
}

/* Dựng một khay ĐẦY KÍN (mọi ô đều có 1 viên) — không khoảng trắng, không chồng ô. */
function buildTray() {
  trayEl.innerHTML = '';
  live = new Map();
  const dirOf = assignDirections();
  const color = colorClusters(dirOf);
  for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) {
    placeTile(r, c, dirOf.get(KEY(r, c)), color.get(KEY(r, c)), false);
  }
  markMoves();
  styleBlocks();
}

/* Dựng lại khay từ ván dở đã lưu (khôi phục đúng ô còn lại: vị trí, hướng, màu). */
function buildTrayFromState(board) {
  trayEl.innerHTML = '';
  live = new Map();
  for (const tl of board.tiles) placeTile(tl.r, tl.c, tl.d, tl.col, false);
  markMoves();
  styleBlocks();
}

/* =====================================================================
 * 5. Chơi — chạm ô để trượt ra mép; dọn sạch khay ⇒ khay mới
 * ===================================================================== */
function tapCell(r, c) {
  if (advancing) return;
  const tile = getCell(r, c);
  if (!tile || !tile.el) return;
  if (tile.el.classList.contains('slide')) return;

  if (!pathClear(r, c, tile.dir)) {
    tile.el.classList.remove('blocked');
    void tile.el.offsetWidth;
    tile.el.classList.add('blocked');
    loseHeart();                        // chạm ô bị chặn = 1 lỗi ⇒ mất 1 tim
    return;
  }

  live.delete(KEY(r, c));

  // lóe sáng ô vừa dọn
  const rv = document.createElement('div');
  rv.className = 'reveal';
  rv.style.left = (PAD + c * CELL) + 'px';
  rv.style.top = (PAD + r * CELL) + 'px';
  trayEl.appendChild(rv);
  setTimeout(() => rv.remove(), 480);

  // trượt HẲN ra khỏi màn hình theo hướng mũi tên (không mờ dần):
  // quãng = số ô tới mép khay + trọn kích thước viewport ⇒ chắc chắn bay khuất.
  const dist = (distEdge(r, c, tile.dir) + 1) * CELL +
    Math.max(window.innerWidth, window.innerHeight);
  const el = tile.el;
  el.classList.add('slide');
  requestAnimationFrame(() => {
    el.style.transform = 'translate(' + (DC[tile.dir] * dist) + 'px,' + (DR[tile.dir] * dist) + 'px)';
  });
  setTimeout(() => el.remove(), 340);

  markMoves();
  styleBlocks();   // dọn bớt ⇒ bo lại mép khối vừa lộ ra
  if (live.size === 0) winLevel();   // dọn sạch khay ⇒ THẮNG màn
  persist();       // lưu ván dở sau mỗi nước (khay trống/đang chuyển màn ⇒ serializeBoard null)
}

/* Thắng màn: bắn event lên native (app hiện popup Next/Retry). Level cuối ⇒ victory.
   Game KHÔNG tự vẽ modal (game-common §1.1). Mở bằng browser thường (không native)
   thì tự qua màn kế sau 1 nhịp cho dễ chơi/test. */
function winLevel() {
  advancing = true;   // khoá thao tác trong lúc chờ app / chuyển màn
  if (currentLevelIdx === LEVELS.length - 1) sendMessage('victory');
  else sendMessage('game_result', { result: 'win', showModal: true });
  if (!isNative()) {
    setTimeout(() => {
      const next = currentLevelIdx < LEVELS.length - 1 ? currentLevelIdx + 1 : 0;
      loadLevel(next);
    }, 750);
  }
}

/* =====================================================================
 * 6. HUD màn/khung + lưu tiến độ (game-common §1.2)
 * ===================================================================== */
/* Chụp trạng thái khay đang chơi để lưu ván dở. Trả null khi KHÔNG nên lưu ván
   (đang chuyển màn hoặc khay đã trống) ⇒ lần sau mở lại sẽ dựng khay mới cho màn. */
function serializeBoard() {
  if (advancing || live.size === 0) return null;
  const tiles = [];
  for (const [k, tl] of live) {
    const i = k.indexOf(',');
    tiles.push({ r: +k.slice(0, i), c: +k.slice(i + 1), d: tl.dir, col: tl.color });
  }
  return { levelIdx: currentLevelIdx, cols: COLS, rows: ROWS, hearts, tiles };
}
function persist() {
  const light = { levelIdx: currentLevelIdx, seen: tutorialSeen };
  saveData(light);                                 // nhẹ → native (best/tiến độ/cờ)
  saveLocal({ ...light, board: serializeBoard() });// nhẹ + ván nặng → localStorage (khôi phục F5)
}
function updateHud() {
  document.getElementById('level-num').textContent = String(currentLevelIdx + 1);
}

/* ── Tim (lượt chơi): 3 tim/lần. Chạm ô bị chặn ⇒ mất 1 tim; hết tim ⇒ thua ── */
const HEART_SVG = '<svg viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" ' +
  'd="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09' +
  'C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>';
function renderLives() {
  livesEl.innerHTML = '';
  for (let i = 0; i < MAX_HEARTS; i++) {
    const h = document.createElement('span');
    h.className = 'heart' + (i < hearts ? '' : ' empty');
    h.innerHTML = HEART_SVG;
    livesEl.appendChild(h);
  }
}
function loseHeart() {
  if (advancing || hearts <= 0) return;
  hearts--;
  renderLives();
  const el = livesEl.children[hearts];   // trái tim vừa mất
  if (el) el.classList.add('lose');
  if (hearts <= 0) loseGame();
  persist();   // lưu số tim còn lại vào ván dở
}
/* Thua hết tim: báo native (app hiện popup) rồi CHƠI LẠI ĐÚNG MÀN ĐÓ (đầy tim).
   game-common §1.1 — game KHÔNG tự vẽ modal; app gọi window.onRetryLevel. */
function loseGame() {
  advancing = true;      // khoá thao tác chờ app
  sendMessage('game_result', { result: 'lose', showModal: true });
  if (!isNative()) setTimeout(() => loadLevel(currentLevelIdx), 900);   // browser: tự chơi lại màn đó
}

/* ── Onboarding (lần đầu chơi): chuỗi popup mẫu 3 bước, có DEMO động ────
 *   Bước 1: chạm ô → trượt ra theo mũi tên.
 *   Bước 2: ô bị chặn → rung + mất 1 tim (3 tim/màn).
 *   Bước 3: dọn sạch khay → thắng màn.
 *   Demo vẽ bằng chính viên/mũi tên của game. Lặp lại tới khi qua bước khác.
 * ===================================================================== */
const OB_CELL = 46;                 // bước ô demo (px)
const OB_STEPS = [
  { demo: 'tap',   titleKey: 'obTapT',   descKey: 'obTapD' },
  { demo: 'block', titleKey: 'obBlockT', descKey: 'obBlockD' },
  { demo: 'win',   titleKey: 'obWinT',   descKey: 'obWinD' },
];
const CHECK_SVG = '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M9 16.2 4.8 12l-1.4 1.4' +
  'L9 19 21 7l-1.4-1.4z"/></svg>';
let obEl = null, obStep = 0, obTimers = [];

function obClearTimers() { obTimers.forEach(clearTimeout); obTimers = []; }
function obT(ms, fn) { const id = setTimeout(fn, ms); obTimers.push(id); return id; }

function buildOnboardDOM() {
  const ov = document.createElement('div');
  ov.className = 'ob hidden'; ov.id = 'ob';
  ov.innerHTML =
    '<div class="ob-card">' +
      '<div class="ob-demo" id="ob-demo"></div>' +
      '<div class="ob-title" id="ob-title"></div>' +
      '<div class="ob-desc" id="ob-desc"></div>' +
      '<div class="ob-dots" id="ob-dots"></div>' +
      '<div class="ob-btns">' +
        '<button class="ob-nav" id="ob-prev" aria-label="Prev">&lsaquo;</button>' +
        '<button class="ob-skip" id="ob-skip"></button>' +
        '<button class="ob-nav go" id="ob-next" aria-label="Next">&rsaquo;</button>' +
      '</div>' +
    '</div>';
  document.body.appendChild(ov);
  ov.querySelector('#ob-skip').addEventListener('click', finishOnboarding);
  ov.querySelector('#ob-prev').addEventListener('click', () => { if (obStep > 0) showObStep(obStep - 1); });
  ov.querySelector('#ob-next').addEventListener('click', () => {
    if (obStep >= OB_STEPS.length - 1) finishOnboarding();
    else showObStep(obStep + 1);
  });
  return ov;
}
function startOnboarding() {
  if (!obEl) obEl = buildOnboardDOM();
  obboarding = true;
  showObStep(0);
  obEl.classList.remove('hidden');
}
function showObStep(i) {
  obStep = i;
  obClearTimers();
  const step = OB_STEPS[i];
  document.getElementById('ob-title').textContent = t(step.titleKey);
  document.getElementById('ob-desc').textContent = t(step.descKey);
  const dots = document.getElementById('ob-dots'); dots.innerHTML = '';
  for (let k = 0; k < OB_STEPS.length; k++) {
    const d = document.createElement('i'); if (k === i) d.className = 'on'; dots.appendChild(d);
  }
  const last = i >= OB_STEPS.length - 1;
  const nextBtn = document.getElementById('ob-next');
  nextBtn.textContent = last ? t('obPlay') : '›';
  nextBtn.classList.toggle('play', last);
  document.getElementById('ob-skip').textContent = t('obSkip');
  document.getElementById('ob-prev').classList.toggle('disabled', i === 0);
  playObDemo(step.demo);
}
function finishOnboarding() {
  obClearTimers();
  obboarding = false;
  if (!tutorialSeen) { tutorialSeen = true; persist(); }
  if (obEl) {
    const el = obEl; el.classList.add('hidden');
    setTimeout(() => { if (el && el.parentNode) el.remove(); }, 320);
    obEl = null;
  }
}

/* ── Trình chạy demo (lặp lại tới khi sang bước khác) ────────────────── */
function playObDemo(kind) {
  const demo = document.getElementById('ob-demo');
  const run = () => {
    demo.innerHTML = '';
    const stage = document.createElement('div'); stage.className = 'ob-stage'; demo.appendChild(stage);
    const total = OB_DEMOS[kind](stage);
    obT(total + 700, run);   // nghỉ rồi lặp
  };
  run();
}
/* Khay demo: đặt nền .ob-tray phủ đúng lưới cols×rows rồi trả về stage đã set kích thước. */
function obSetTray(stage, cols, rows) {
  stage.style.width = (cols * OB_CELL) + 'px';
  stage.style.height = (rows * OB_CELL) + 'px';
  const tray = document.createElement('div'); tray.className = 'ob-tray';
  tray.style.left = '-6px'; tray.style.top = '-6px';
  tray.style.width = (cols * OB_CELL + 12) + 'px';
  tray.style.height = (rows * OB_CELL + 12) + 'px';
  stage.appendChild(tray);
}
function obTile(stage, r, c, dir, colorIdx) {
  const el = document.createElement('div'); el.className = 'ob-tile';
  el.style.left = (c * OB_CELL) + 'px'; el.style.top = (r * OB_CELL) + 'px';
  el.innerHTML = '<div class="face" style="background:' + PALETTE[colorIdx] + '">' + arrowSvg(dir) + '</div>';
  stage.appendChild(el);
  return el;
}
/* "Bàn tay" ảo chạm xuống 1 ô: hiện, nhấn xuống, nhả lên */
function obHand(stage, r, c, delay) {
  const hand = document.createElement('div'); hand.className = 'ob-hand';
  hand.textContent = '👆';
  hand.style.left = (c * OB_CELL + OB_CELL * 0.5) + 'px';
  hand.style.top = (r * OB_CELL + OB_CELL * 0.62) + 'px';
  stage.appendChild(hand);
  hand.animate([
    { transform: 'translateY(-4px)', opacity: 0 },
    { transform: 'translateY(-4px)', opacity: 1, offset: .25 },
    { transform: 'translateY(6px)',  opacity: 1, offset: .5 },
    { transform: 'translateY(-4px)', opacity: 1, offset: .78 },
    { transform: 'translateY(-4px)', opacity: 0 },
  ], { duration: 900, delay: delay || 0, fill: 'forwards' });
  return hand;
}
/* Nhún viên (bị ấn) */
function obPress(el, delay) {
  const f = el.firstElementChild;
  f.animate([{ transform: 'scale(1)' }, { transform: 'scale(.9)', offset: .5 }, { transform: 'scale(1)' }],
    { duration: 300, delay: delay || 0, easing: 'ease-out' });
}
/* Viên được dọn: đổi xanh lá + trượt hẳn ra ngoài theo hướng dir */
function obSlideOut(el, dir, delay) {
  obT(delay || 0, () => { el.firstElementChild.style.background = '#37b24d'; });
  const dist = 210;
  el.animate([
    { transform: 'translate(0,0)', opacity: 1, offset: 0 },
    { transform: 'translate(0,0)', opacity: 1, offset: .15 },
    { transform: 'translate(' + (DC[dir] * dist) + 'px,' + (DR[dir] * dist) + 'px)', opacity: 1 },
  ], { duration: 460, delay: delay || 0, easing: 'cubic-bezier(.45,0,.85,.6)', fill: 'forwards' });
}
/* Rung viên (bị chặn) */
function obShake(el, delay) {
  el.animate([
    { transform: 'translateX(0)' }, { transform: 'translateX(-3px)', offset: .2 },
    { transform: 'translateX(3px)', offset: .4 }, { transform: 'translateX(-2px)', offset: .6 },
    { transform: 'translateX(2px)', offset: .8 }, { transform: 'translateX(0)' },
  ], { duration: 340, delay: delay || 0, easing: 'ease' });
}
/* Hàng tim mini (bước "bị chặn"): trả về hàm làm rỗng tim cuối */
function obHearts(stage, r, cols) {
  const wrap = document.createElement('div'); wrap.className = 'ob-hearts';
  wrap.style.left = (cols * OB_CELL / 2) + 'px';
  wrap.style.top = (r * OB_CELL) + 'px';
  const hs = [];
  for (let i = 0; i < 3; i++) {
    const h = document.createElement('span'); h.className = 'h'; h.innerHTML = HEART_SVG;
    wrap.appendChild(h); hs.push(h);
  }
  stage.appendChild(wrap);
  return (idx) => {
    const h = hs[idx]; if (!h) return;
    h.classList.add('empty');
    h.animate([{ transform: 'scale(1)' }, { transform: 'scale(1.4)', offset: .3 }, { transform: 'scale(1)' }],
      { duration: 420, easing: 'ease' });
  };
}

/* Ba kịch bản demo → mỗi hàm dựng stage, trả về tổng thời lượng (ms). */
const OB_DEMOS = {
  // Chạm ô góc phải-trên (mũi tên LÊN, đường trống) → trượt ra ngoài.
  tap(stage) {
    obSetTray(stage, 3, 2);
    obTile(stage, 0, 0, 1, 0); obTile(stage, 0, 1, 3, 3);
    const target = obTile(stage, 0, 2, 0, 1);     // mũi tên lên, hàng 0 ⇒ đường trống
    obTile(stage, 1, 0, 0, 4); obTile(stage, 1, 1, 1, 6); obTile(stage, 1, 2, 0, 5);
    obHand(stage, 0, 2, 200);
    obPress(target, 560);
    obSlideOut(target, 0, 760);
    return 1300;
  },
  // Chạm ô trên (mũi tên XUỐNG) nhưng bị ô dưới chặn → rung + mất 1 tim.
  block(stage) {
    obSetTray(stage, 3, 3);
    const setHeart = obHearts(stage, 0, 3);        // hàng tim ở đỉnh (bù chỗ: dùng 3 hàng ô)
    obTile(stage, 1, 0, 1, 0);
    const target = obTile(stage, 1, 1, 2, 3);      // mũi tên xuống…
    obTile(stage, 2, 1, 0, 6);                     // …nhưng ô ngay dưới chặn đường
    obTile(stage, 1, 2, 3, 4); obTile(stage, 2, 0, 1, 5); obTile(stage, 2, 2, 0, 1);
    obHand(stage, 1, 1, 200);
    obPress(target, 560);
    obT(760, () => { obShake(target, 0); setHeart(2); });
    return 1400;
  },
  // Dọn 3 viên lần lượt → khay trống → hiện dấu tick "thắng".
  win(stage) {
    obSetTray(stage, 3, 2);
    const t0 = obTile(stage, 0, 0, 3, 0);          // trái
    const t1 = obTile(stage, 0, 2, 1, 3);          // phải
    const t2 = obTile(stage, 1, 1, 2, 5);          // xuống
    obSlideOut(t0, 3, 200);
    obSlideOut(t1, 1, 560);
    obSlideOut(t2, 2, 920);
    obT(1500, () => {
      const chk = document.createElement('div'); chk.className = 'ob-check';
      chk.style.left = (3 * OB_CELL / 2) + 'px'; chk.style.top = (2 * OB_CELL / 2) + 'px';
      chk.innerHTML = CHECK_SVG; stage.appendChild(chk);
      chk.animate([
        { transform: 'translate(-50%,-50%) scale(0)', opacity: 0 },
        { transform: 'translate(-50%,-50%) scale(1.15)', opacity: 1, offset: .6 },
        { transform: 'translate(-50%,-50%) scale(1)', opacity: 1 },
      ], { duration: 420, easing: 'ease-out', fill: 'forwards' });
    });
    return 2200;
  },
};

/* =====================================================================
 * 7. Tap input (KHÔNG pan/zoom — khay đứng yên)
 *   Dùng pointerdown (KHÔNG dùng click): click trên mobile hay bị rớt/độ trễ khi
 *   chạm nhanh liên tiếp (trình duyệt gộp double-tap). pointerdown ăn NGAY mỗi chạm.
 * ===================================================================== */
trayEl.addEventListener('pointerdown', (e) => {
  const t = e.target.closest('.tile');
  if (!t) return;
  e.preventDefault();            // chặn tổng hợp click/zoom ⇒ không nuốt chạm kế tiếp
  tapCell(Number(t.dataset.r), Number(t.dataset.c));
});

/* =====================================================================
 * 8. Sizing — khay vừa vùng sân khấu, ô vuông, canh giữa
 * ===================================================================== */
function computeSizing() {
  // Đo TRỰC TIẾP ô nội dung của .stage (đã trừ HUD phía trên + padding safe-area).
  // Cách này tự khớp mọi thiết bị: notch/home-indicator, thanh công cụ trình duyệt
  // co dãn, xoay ngang/dọc… mà không cần cộng trừ thủ công theo innerHeight.
  const stage = document.querySelector('.stage');
  const cs = getComputedStyle(stage);
  const rect = stage.getBoundingClientRect();
  const padX = parseFloat(cs.paddingLeft) + parseFloat(cs.paddingRight);
  const padY = parseFloat(cs.paddingTop) + parseFloat(cs.paddingBottom);

  // Bề rộng bàn cap 560px (tablet/desktop) để ô không quá to; chiều cao lấy hết khả dụng.
  viewW = Math.min(rect.width, 560) - padX;
  viewH = Math.max(200, rect.height - padY);

  // Lề nhỏ 2 bên cho khay thoáng (không còn ">>>" gợi ý nên không cần gutter lớn).
  const CHEV = 0.15;
  // Chừa chỗ dưới cho các "khay chờ" + gờ 3D ló ra (~78px) và lề trong PAD ở 4 cạnh.
  CELL = Math.floor(Math.min(
    (viewW - 2 * PAD) / (COLS + 2 * CHEV),
    (viewH - 78 - 2 * PAD) / (ROWS + CHEV)));
  CELL = Math.max(28, CELL);   // sàn nhỏ hơn ⇒ map lớn vẫn vừa máy nhỏ, ít tràn
  document.documentElement.style.setProperty('--cell', CELL + 'px');
  document.documentElement.style.setProperty('--pad', PAD + 'px');
  deckEl.style.width = (COLS * CELL + 2 * PAD) + 'px';    // khay = lưới ô + lề khung 2 bên
  deckEl.style.height = (ROWS * CELL + 2 * PAD) + 'px';
}
/* Đổi cỡ màn hình: tính lại CELL rồi đặt lại vị trí ô hiện có */
function relayout() {
  computeSizing();
  for (const [k, tl] of live) {
    if (!tl.el) continue;
    const i = k.indexOf(',');
    const r = +k.slice(0, i), c = +k.slice(i + 1);
    tl.el.style.left = (PAD + c * CELL) + 'px';
    tl.el.style.top = (PAD + r * CELL) + 'px';
  }
  styleBlocks();   // CELL đổi ⇒ tính lại bán kính bo góc khối
}

/* =====================================================================
 * 9. Nạp màn / chơi lại
 * ===================================================================== */
/* Nạp 1 màn: đặt kích thước map theo màn, dựng khay + HUD. */
function loadLevel(idx) {
  currentLevelIdx = Math.max(0, Math.min(idx, LEVELS.length - 1));
  const lv = LEVELS[currentLevelIdx];
  COLS = lv.cols; ROWS = lv.rows;
  advancing = false;
  trayEl.classList.remove('out', 'in');
  computeSizing();
  // Nếu có ván dở khớp ĐÚNG màn/cỡ khay ⇒ khôi phục nguyên trạng (ô còn lại + tim);
  // ngược lại dựng khay mới, đủ 3 tim. pendingRestore chỉ dùng 1 lần (lúc boot).
  const rb = pendingRestore; pendingRestore = null;
  if (rb && rb.levelIdx === currentLevelIdx && rb.cols === COLS && rb.rows === ROWS &&
      Array.isArray(rb.tiles) && rb.tiles.length) {
    hearts = (typeof rb.hearts === 'number' && rb.hearts > 0 && rb.hearts <= MAX_HEARTS)
      ? rb.hearts : MAX_HEARTS;
    buildTrayFromState(rb);
  } else {
    hearts = MAX_HEARTS;      // mỗi màn có đủ 3 tim (thua ⇒ loadLevel lại ⇒ đầy tim)
    buildTray();
  }
  renderLives();
  updateHud();
  persist();                 // lưu tiến độ (levelIdx) — resume đúng màn
  // Onboarding CHỈ hiện ở màn 1 lần đầu chơi (chưa từng xem) — các màn/lần sau bỏ qua.
  if (!tutorialSeen && currentLevelIdx === 0) startOnboarding();
}

/* =====================================================================
 * 10. HUD buttons + native callbacks
 * ===================================================================== */
document.getElementById('back-btn').addEventListener('click', (e) => {
  e.stopPropagation(); sendMessage('quit');
});
// Nút Restart: dựng lại màn hiện tại (game-common §1.6 — KHÔNG bắn event).
document.getElementById('restart-btn').addEventListener('click', (e) => {
  e.stopPropagation(); loadLevel(currentLevelIdx);
});
window.onAppPause = function () { persist(); };   // app vào nền ⇒ lưu ngay ván dở
// App gọi khi bấm Next Level trên popup → qua màn kế.
window.onNextLevel = function () {
  if (currentLevelIdx < LEVELS.length - 1) loadLevel(currentLevelIdx + 1);
};
// App gọi khi bấm Retry/Play Again → chơi lại màn hiện tại (đầy 3 tim).
window.onRetryLevel = function () { loadLevel(currentLevelIdx); };
// Game không dùng force_ads — vẫn định nghĩa no-op để native gọi an toàn (game-common §1.3).
window.onAdResult = function () { /* no-op */ };

/* =====================================================================
 * 11. Boot
 * ===================================================================== */
function applyStaticI18n() {
  document.getElementById('level-label').textContent = t('level');
}
function applyStatusBarPad() {
  const sb = getStatusBarHeight();
  document.getElementById('topbar').style.paddingTop =
    'calc(max(' + sb + 'px, env(safe-area-inset-top)) + 8px)';
}
function boot() {
  LANG = getLanguage();
  applyUiFont(LANG);
  applyStatusBarPad();
  applyStaticI18n();
  const saved = getInitialSaved();
  tutorialSeen = saved.seen;
  pendingRestore = saved.board;      // ván dở (nếu có) — loadLevel khôi phục nếu khớp màn/cỡ khay
  // Level: native currentLevel là nguồn chính; nếu native KHÔNG truyền (trình duyệt /
  // F5 / standalone) thì dùng level đã lưu (native data hoặc localStorage), mặc định 0.
  const nativeLvl = getInitialLevelIdx();
  const idx = nativeLvl != null ? nativeLvl
    : (saved.levelIdx != null ? Math.max(0, Math.min(Math.floor(saved.levelIdx), LEVELS.length - 1)) : 0);
  loadLevel(idx);                    // loadLevel tự nạp 3 tim (hoặc khôi phục tim từ ván dở)
  document.getElementById('app').classList.add('ready');   // hiện app sau khi level đúng đã dựng xong
}

// Gộp mọi tín hiệu đổi cỡ vào 1 lần relayout/khung hình ⇒ tránh layout thrashing.
let _relayoutRaf = 0;
function scheduleRelayout() {
  if (_relayoutRaf) return;
  _relayoutRaf = requestAnimationFrame(() => { _relayoutRaf = 0; relayout(); });
}
window.addEventListener('resize', scheduleRelayout);
window.addEventListener('orientationchange', scheduleRelayout);
// visualViewport: bắt cả lúc thanh công cụ trình duyệt mobile co/dãn (innerHeight đổi mượt)
if (window.visualViewport) {
  window.visualViewport.addEventListener('resize', scheduleRelayout);
  window.visualViewport.addEventListener('scroll', scheduleRelayout);
}

// Đợi native inject (chống race) — game-common §3.
// Game CÓ level ⇒ currentLevel là NGUỒN LEVEL CHÍNH. Trong WebView native ta ĐỢI
// đúng currentLevel trước khi boot; nếu boot sớm lúc mới có language/data, level sẽ
// rơi về mặc định rồi "giật" sang level đúng khi currentLevel tới. Ngoài trình duyệt
// (không native) không bao giờ có currentLevel ⇒ boot theo timeout ngắn, dùng localStorage.
(function waitForNativeInjection() {
  const start = Date.now();
  const native = isNative();
  (function check() {
    const haveLevel = typeof window.currentLevel === 'number';
    const haveAny = haveLevel ||
      typeof window.language === 'string' || typeof window.data === 'string';
    const ready = native ? haveLevel : haveAny;
    const timedOut = Date.now() - start > (native ? 1500 : 150);
    if (ready || timedOut) boot();
    else setTimeout(check, 10);
  })();
})();
</script>
