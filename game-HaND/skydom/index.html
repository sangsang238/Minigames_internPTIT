<!--
  Skydom — HaND
  Match-3 score-attack (endless, KHÔNG level), flat theme. Single-file HTML.
  Tuân thủ .claude/game-common.md (bridge), popup-common.md, zip-common.md.
-->
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<title>Skydom</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Google+Sans+Flex:opsz,wght@6..144,1..1000&display=swap" rel="stylesheet" />

<style>
  /* ── Reset + tắt highlight khi chạm (game-common §UI) ─────────────── */
  *, *::before, *::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    -webkit-tap-highlight-color: transparent;
    -webkit-touch-callout: none;
  }

  :root {
    --ui-font: 'Google Sans Flex', system-ui, sans-serif;
    /* Candy Crush — nền sáng candyland, theme phẳng */
    --bg-1: #43a9ff;       /* trời trên (xanh) */
    --bg-2: #ffbcd2;       /* trời dưới (hồng nhạt) */
    --board-bg: #cda680;   /* dự phòng */
    --cell-bg: #f4e7cf;    /* mặt bàn — kem sáng (ô caro sáng) */
    --cell-b:  #e6d2ab;    /* ô caro tối xen kẽ (kiểu bàn cờ) */
    --ink: #2b2350;        /* chữ đậm trên panel sáng */
    --ink-soft: #6a4bbd;   /* chữ phụ / icon (grape) */
    --royal: #3b5bdb;
    --gold: #ffd23f;
    --green: #14b358;
    --danger: #ff5a5f;
    --cell: 40px; /* set bởi JS */
  }

  html, body {
    height: 100%;
    overflow: hidden;
  }
  body {
    font-family: var(--ui-font);
    font-weight: 700;
    color: var(--ink);
    /* Nền cảnh: quầng sáng dịu phía trên + gradient xanh → hồng (bầu trời) */
    background:
      radial-gradient(130% 90% at 50% -12%, rgba(255,255,255,.55), rgba(255,255,255,0) 55%),
      linear-gradient(180deg, var(--bg-1) 0%, #bcd8ff 46%, var(--bg-2) 100%);
    background-attachment: fixed;
    -webkit-user-select: none;
    user-select: none;
    touch-action: none;
  }

  .app {
    position: relative;
    width: 100%;
    height: 100%;
  }
  /* HUD nổi ở đỉnh (không chiếm chỗ) để lưới căn giữa toàn màn hình */
  .hud {
    position: absolute;
    top: 0; left: 0; right: 0;
    z-index: 5;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* ── HUD trên cùng ────────────────────────────────────────────────── */
  .topbar {
    width: 100%;
    max-width: 560px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    padding: 0 14px;
    /* padding-top set bởi JS = max(statusBar, safe) + 8 */
  }
  .top-center {
    display: flex;
    flex-direction: column;
    align-items: center;
    line-height: 1.1;
  }
  /* Btn3d — biến thể flat (shadow ẩn), icon vuông */
  .btn3d {
    --radius: 14px;
    --surface-color: #ffffff;
    --surface-text: var(--ink-soft);
    position: relative;
    display: inline-block;
    padding: 0;
    border: 0;
    background: transparent;
    cursor: pointer;
    font: inherit;
    color: inherit;
  }
  .btn3d-shadow { display: none; }
  .btn3d-surface {
    position: relative;
    z-index: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: var(--radius);
    background-color: var(--surface-color);
    color: var(--surface-text);
    box-shadow: 0 3px 0 rgba(59, 91, 219, .18), 0 6px 14px rgba(36, 48, 77, .12);
    transition: transform .09s ease-out;
  }
  .btn3d:active .btn3d-surface { transform: scale(.95); }
  .btn3d.btn-icon .btn3d-surface { width: 46px; height: 46px; }
  .btn3d.btn-icon { -webkit-user-select: none; user-select: none; }
  .back-ico { width: 52%; height: 52%; fill: currentColor; display: block; }
  .restart-ico { width: 62%; height: 62%; fill: currentColor; display: block; }
  .sound-ico { width: 60%; height: 60%; display: block; }
  #sound-btn.muted .snd-on { display: none; }
  #sound-btn:not(.muted) .snd-off { display: none; }

  /* ── Thanh điểm (Score / Best) — cụm giữa, cùng hàng với 2 nút ────── */
  .scorebar {
    flex: 1;
    min-width: 0;
    display: flex;
    justify-content: center;
    gap: 10px;
    padding: 0 8px;
  }
  /* Hai khung điểm dạng thẻ: nền sáng, bo góc lớn, đổ bóng nhẹ (giữ tông sáng) */
  .sc-box {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    line-height: 1.02;
    min-width: 0;
    flex: 1 1 0;
    max-width: 150px;
    padding: 5px 12px 7px;
    background: rgba(255, 255, 255, .94);
    border-radius: 16px;
    box-shadow: 0 4px 14px rgba(24, 20, 60, .18);
    overflow: hidden;   /* nhãn + số LUÔN nằm trong khung (không tràn ra ngoài) */
  }
  .sc-k {
    font-size: 10px; letter-spacing: 1.5px; font-weight: 800;
    color: #e6467e; text-transform: uppercase;   /* nhãn hồng kẹo */
    max-width: 100%; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .sc-v { font-size: 26px; color: var(--ink); max-width: 100%; white-space: nowrap; }
  .sc-v.best { color: #d99a00; }   /* BEST — vàng ĐẬM đọc rõ trên thẻ sáng (khớp ý "best = vàng") */

  /* ── Hiệu ứng (juice) ──────────────────────────────────────────────── */
  .fx-pop {
    position: absolute; z-index: 6; pointer-events: none; white-space: nowrap;
    font-family: var(--ui-font); font-weight: 900; font-size: 20px; color: #fff;
    text-shadow: 0 2px 6px rgba(20, 30, 90, .6); transform: translate(-50%, -50%);
  }
  .fx-particle {
    position: absolute; z-index: 5; pointer-events: none;
    width: 16px; height: 16px; border-radius: 50%; transform: translate(-50%, -50%);
    box-shadow: 0 0 8px currentColor;
  }
  .fx-combo {
    position: absolute; left: 50%; top: 40%; z-index: 7; pointer-events: none; white-space: nowrap;
    font-family: var(--ui-font); font-weight: 900; font-size: 32px; color: var(--gold);
    text-shadow: 0 3px 10px rgba(20, 30, 90, .7); transform: translate(-50%, -50%);
    display: flex; flex-direction: column; align-items: center; gap: 2px;
  }
  /* Flat design: chữ đậm màu theo cấp combo (--cc), đặt trên chip tối mờ để luôn nổi rõ */
  .fx-praise {
    font-size: 36px; color: var(--cc, #3ee87f);
    text-shadow: 0 2px 4px rgba(0, 0, 0, .55);
  }
  .fx-mult { font-size: 15px; font-weight: 800; letter-spacing: 2px; color: rgba(255,255,255,.95);
    text-shadow: 0 1px 3px rgba(0, 0, 0, .5); }
  /* Câu khen combo — không nền (chữ đã có bóng đổ để dễ đọc) */
  .fx-combo.combo-pop {
    padding: 8px 24px;
  }
  /* Hạt phẳng tỏa quanh câu khen (tròn/vuông bo/dấu cộng/thoi) — hình & màu đặt trong JS */
  .fx-particle {
    position: absolute; z-index: 7; pointer-events: none;
    transform: translate(-50%, -50%);
  }
  /* Hiệu ứng riêng khi cầu vồng nổ: vòng cầu vồng (conic gradient khoét lỗ) + chớp trắng */
  .fx-rainbow {
    position: absolute; z-index: 7; pointer-events: none; border-radius: 50%;
    background: conic-gradient(from 0deg, #ff4d6a, #ff9838, #ffcf3a, #2ed673, #3aa0ff, #b268ff, #ff4d6a);
    -webkit-mask: radial-gradient(circle, transparent 52%, #000 55%);
            mask: radial-gradient(circle, transparent 52%, #000 55%);
  }
  .fx-rainbow-flash {
    position: absolute; z-index: 7; pointer-events: none; border-radius: 50%;
    background: radial-gradient(circle, rgba(255,255,255,.95), rgba(255,255,255,0) 70%);
  }
  /* Tia sáng kẹo sọc (row/col) — lõi trắng, hào quang theo màu kẹo (currentColor) */
  .fx-beam {
    position: absolute; z-index: 6; pointer-events: none; border-radius: 999px;
    background: linear-gradient(90deg, transparent, #fff 28%, #fff 72%, transparent);
    box-shadow: 0 0 16px currentColor, 0 0 34px currentColor, 0 0 8px #fff;
  }
  .fx-beam.col {
    background: linear-gradient(180deg, transparent, #fff 28%, #fff 72%, transparent);
  }
  /* Vòng nổ kẹo gói (bomb) — vành sáng lan ra theo màu kẹo */
  .fx-ring {
    position: absolute; z-index: 6; pointer-events: none; border-radius: 50%;
    transform: translate(-50%, -50%);
    background: radial-gradient(circle, transparent 38%, currentColor 56%, transparent 72%);
    box-shadow: 0 0 22px currentColor;
  }
  /* Pháo hoa chúc mừng: tia tròn phát sáng + chớp trắng ở tâm nổ */
  .fw {
    position: absolute; z-index: 60; width: 8px; height: 8px; border-radius: 50%;
    pointer-events: none; box-shadow: 0 0 7px currentColor, 0 0 3px #fff;
  }
  .fw-flash {
    position: absolute; z-index: 60; width: 54px; height: 54px; border-radius: 50%;
    pointer-events: none; background: radial-gradient(circle, rgba(255,255,255,.95), rgba(255,255,255,0) 70%);
  }

  /* ── Bàn chơi ─────────────────────────────────────────────────────── */
  .stage {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  /* Khung 4 lớp (khay bánh):
     L1 viền hồng-cam ngoài · L2 khung gỗ caramel · L3 viền tối trong (::before) · L4 mặt bàn kem */
  .board-wrap {
    position: relative;
    padding: 13px;                 /* độ dày khung (L2) */
    border-radius: 24px;
    background: linear-gradient(180deg, #f0c48a, #d99560);   /* L2: gỗ caramel, sáng trên → tối dưới */
    box-shadow:
      inset 0 0 0 4px #ffb08a,                    /* L1: viền hồng-cam ngoài cùng */
      inset 0 5px 7px rgba(255, 240, 220, .55),   /* highlight mép trên (khung dày) */
      inset 0 -4px 7px rgba(90, 45, 15, .22),     /* tối mép dưới */
      0 10px 24px rgba(0, 0, 0, .28);             /* bóng đổ ngoài, tách khỏi nền */
  }
  /* L3: đường viền tối chìm quanh mặt bàn → mặt bàn "lõm" so với khung */
  .board-wrap::before {
    content: "";
    position: absolute;
    inset: 12px;
    border-radius: 15px;
    box-shadow: inset 0 0 0 2px rgba(95, 52, 20, .45), inset 0 3px 8px rgba(70, 35, 12, .3);
    pointer-events: none;
    z-index: 1;
  }
  .grid-bg {
    position: absolute;
    inset: 13px;                 /* = padding khung → khớp với lưới */
    display: grid;
    border-radius: 13px;
    overflow: hidden;
    background: var(--cell-bg);  /* L4: mặt bàn kem */
  }
  .grid-bg .slot { background: var(--cell-bg); }
  .grid-bg .slot.b { background: var(--cell-b); }    /* ô caro xen kẽ kiểu bàn cờ */
  .board {
    position: relative;
  }

  .tile {
    position: absolute;
    top: 0;
    left: 0;
    width: var(--cell);
    height: var(--cell);
    padding: 3px;
    transition: transform .26s cubic-bezier(.2, .8, .3, 1);
    will-change: transform;
    z-index: 2;
  }
  .tile.no-anim { transition: none; }
  .tile-face {
    width: 100%;
    height: 100%;
    border-radius: 22%;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    transition: transform .12s ease, box-shadow .12s ease;
    /* Ánh sáng từ góc TRÊN-PHẢI → bóng mềm đổ về phía dưới-trái (theo đúng hình) */
    filter: drop-shadow(-2px 4px 3px rgba(63, 43, 114, 0.38));
  }
  /* Khối CHÍNH LÀ hình (không nền vuông) — hình tô màu, gần đầy ô */
  .tile-face svg {
    width: 100%; height: 100%; display: block;
  }
  .tile.sel .tile-face { transform: scale(1.16); }
  .tile.sel .tile-face svg {
    filter: drop-shadow(0 0 2px #fff) drop-shadow(0 0 5px var(--gold));
  }
  /* Gợi ý nước đi:
     · viên CẦN KÉO → nhích 1 chút về hướng ghép (var --nx/--ny) rồi lắc lắc
     · các viên SẼ ĐƯỢC GHÉP cùng → lắc lắc tại chỗ */
  /* Nhịp: NHẢY (lắc ~0.8s) → DỪNG 2s → lặp lại. Chu kỳ 2.8s, cùng pha → mọi viên ĐỀU NHAU.
     Phần lắc dồn vào 0–30% chu kỳ, 30–100% giữ yên (nghỉ 2s). */
  .tile.hint-move .tile-face { animation: hintmove 2.8s ease-in-out infinite; }
  @keyframes hintmove {
    0%           { transform: translate(0, 0) rotate(0deg) scale(1); }
    4%           { transform: translate(var(--nx, 0), var(--ny, 0)) rotate(0deg) scale(1.12); }  /* phóng to trước */
    9%           { transform: translate(var(--nx, 0), var(--ny, 0)) rotate(-5deg) scale(1.12); }
    15%          { transform: translate(var(--nx, 0), var(--ny, 0)) rotate(5deg) scale(1.12); }
    21%          { transform: translate(var(--nx, 0), var(--ny, 0)) rotate(-5deg) scale(1.12); }
    27%          { transform: translate(var(--nx, 0), var(--ny, 0)) rotate(5deg) scale(1.12); }
    32%, 100%    { transform: translate(0, 0) rotate(0deg) scale(1); }
  }
  .tile.hint-shake .tile-face { animation: hintshake 2.8s ease-in-out infinite; }
  @keyframes hintshake {
    0%           { transform: rotate(0deg) scale(1); }
    4%           { transform: rotate(0deg) scale(1.12); }   /* phóng to trước */
    9%           { transform: rotate(-5deg) scale(1.12); }
    15%          { transform: rotate(5deg) scale(1.12); }
    21%          { transform: rotate(-5deg) scale(1.12); }
    27%          { transform: rotate(5deg) scale(1.12); }
    32%, 100%    { transform: rotate(0deg) scale(1); }
  }
  .tile.clearing {
    transition: transform .42s ease, opacity .42s ease;
    transform: scale(1.6);
    opacity: 0;
    z-index: 3;
  }

  /* ── Bom đếm ngược theo lượt ──────────────────────────────────────── */
  .tile-face.bomb-face {
    background: #2b3350;
    color: #fff;
    box-shadow: inset 0 0 0 3px rgba(255,255,255,.16);
  }
  .bomb-num {
    font-family: var(--ui-font);
    font-weight: 900;
    font-size: calc(var(--cell) * .42);
    color: #fff;
    line-height: 1;
    text-shadow: 0 1px 2px rgba(0,0,0,.4);
  }
  .tile.bomb-low .tile-face { animation: bombpulse .55s ease-in-out infinite; }
  @keyframes bombpulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.12); }
  }

  /* ── Popup thua (Game Over / New Best) — popup-common ─────────────── */
  .overlay {
    position: absolute; inset: 0; z-index: 80;
    display: flex; align-items: center; justify-content: center;
    background: rgba(3, 9, 24, .7); opacity: 1; transition: opacity .25s;
  }
  .overlay.hidden { opacity: 0; pointer-events: none; }
  .card {
    width: min(82%, 360px); padding: 26px; text-align: center; border-radius: 22px;
    background: linear-gradient(180deg, #1c2f63, #0c1838);
    border: 2px solid rgba(120,160,255,.22); box-shadow: 0 18px 50px rgba(0,0,0,.5);
    transform: scale(1); transition: transform .25s;
  }
  .overlay.hidden .card { transform: scale(.9); }
  .card-title { color: #fff; font-size: 30px; font-weight: 900; margin-bottom: 14px; }
  .sb { display: flex; justify-content: center; gap: 30px; margin-bottom: 18px; }
  .sb .k { font-size: 11px; letter-spacing: 2px; color: #8fb4ff; font-weight: 800; }
  .sb .v { font-size: 32px; color: #fff; font-weight: 900; }
  .sb .v.best { color: var(--gold); }
  .btn3d.play { --surface-color: #ffb02e; --surface-text: #3a2400; }
  .btn3d.play .btn3d-surface {
    height: 52px; padding: 0 34px; font-size: 17px; font-weight: 800; letter-spacing: .5px;
  }

</style>

<div class="app" id="app">
  <div class="hud">
  <div class="topbar" id="topbar">
    <div class="btn3d btn-icon" id="back-btn" role="button" aria-label="Back">
      <span class="btn3d-shadow"></span>
      <span class="btn3d-surface">
        <svg class="back-ico" viewBox="0 0 447.243 447.243" aria-hidden="true">
          <path fill="currentColor" d="M420.361 192.229a31.967 31.967 0 0 0-5.535-.41H99.305l6.88-3.2a63.998 63.998 0 0 0 18.08-12.8l88.48-88.48c11.653-11.124 13.611-29.019 4.64-42.4-10.441-14.259-30.464-17.355-44.724-6.914a32.018 32.018 0 0 0-3.276 2.754l-160 160c-12.504 12.49-12.515 32.751-.025 45.255l.025.025 160 160c12.514 12.479 32.775 12.451 45.255-.063a32.084 32.084 0 0 0 2.745-3.137c8.971-13.381 7.013-31.276-4.64-42.4l-88.32-88.64a64.002 64.002 0 0 0-16-11.68l-9.6-4.32h314.24c16.347.607 30.689-10.812 33.76-26.88 2.829-17.445-9.019-33.88-26.464-36.71z"/>
        </svg>
      </span>
    </div>

    <div class="scorebar" id="scorebar">
      <div class="sc-box">
        <div class="sc-k" id="score-k">SCORE</div>
        <div class="sc-v" id="score-val">0</div>

    <div class="btn3d btn-icon" id="restart-btn" role="button" aria-label="Restart">

        </svg>
      </span>
    </div>

    <div class="btn3d btn-icon" id="sound-btn" role="button" aria-label="Sound">
      <span class="btn3d-shadow"></span>
      <span class="btn3d-surface">
        <svg class="sound-ico" viewBox="0 0 100 100" aria-hidden="true">
          <path fill="currentColor" d="M20 40 L36 40 L56 24 L56 76 L36 60 L20 60 Z"/>
          <g class="snd-on" fill="none" stroke="currentColor" stroke-width="7" stroke-linecap="round">
            <path d="M66 38 Q76 50 66 62"/><path d="M76 30 Q92 50 76 70"/>
          </g>
          <path class="snd-off" fill="none" stroke="currentColor" stroke-width="7" stroke-linecap="round" d="M70 40 L88 60 M88 40 L70 60"/>
        </svg>
      </span>
    </div>
  </div>
  </div><!-- /.hud -->

  <div class="stage">
    <div class="board-wrap" id="board-wrap">
      <div class="grid-bg" id="grid-bg"></div>
      <div class="board" id="board"></div>
    </div>
  </div>

  <div id="overlay" class="overlay hidden">
    <div class="card">
      <div class="card-title" id="ov-title">Game Over</div>
      <div class="sb">
        <div><div class="k" id="ov-score-k">SCORE</div><div class="v" id="ov-score">0</div></div>
        <div><div class="k" id="ov-best-k">BEST</div><div class="v best" id="ov-best">0</div></div>
      </div>
      <button class="btn3d play" id="ov-btn" type="button">
        <span class="btn3d-shadow"></span><span class="btn3d-surface" id="ov-btn-label">Play Again</span>
      </button>
    </div>
  </div>

</div>

<script>
/* =====================================================================
 * 0. Localization (inline — game-common §5)
 * ===================================================================== */
const SUPPORTED_LANGS = [
  'en','vi','zh-Hans','zh-Hant','ja','ko','es','es-MX','es-AR','pt-BR','pt',
  'fr','de','it','nl','pl','ru','tr','ar','hi','th','id','fil',
];
const DEFAULT_LANG = 'en';
const LATIN_LANGS = new Set([
  'en','vi','es','es-MX','es-AR','pt-BR','pt','fr','de','it','nl','pl','tr','id','fil',
]);

const I18N = {

// Làm sáng một hex về phía trắng (amt 0..1) — dùng cho sheen "bóng nhẹ"
function lighten(hex, amt) {
  const n = parseInt(hex.slice(1), 16);
  let r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  r = Math.round(r + (255 - r) * amt);
  g = Math.round(g + (255 - g) * amt);
  b = Math.round(b + (255 - b) * amt);
  return '#' + ((1 << 24) + (r << 16) + (g << 8) + b).toString(16).slice(1);
}
// Làm sẫm một hex về phía đen (amt 0..1) — dùng cho đáy gradient & viền đậm
function darken(hex, amt) {
  const n = parseInt(hex.slice(1), 16);
  let r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  r = Math.round(r * (1 - amt));
  g = Math.round(g * (1 - amt));
  b = Math.round(b * (1 - amt));
  return '#' + ((1 << 24) + (r << 16) + (g << 8) + b).toString(16).slice(1);
}

// SVG hình = khối kẹo 3D: gradient sáng→tối + highlight trắng + viền đậm hơn; bo góc
// lớn bằng stroke round; special vẽ chồng (clip theo hình). Shadow mềm đặt ở CSS .tile-face.
function shapeSvg(color, special, uid) {
  const ROUND = 15;   // độ dày stroke = độ bo góc
  const pid = 'p' + uid, cid = 'c' + uid;
  const clip = '<clipPath id="' + cid + '"><use href="#' + pid + '"/></clipPath>';

  // Bom màu: quả cầu CẦU VỒNG THẬT (bánh xe nhiều múi) + bóng gương + vignette tối mép
  if (special === 'rainbow') {
    const RB = ['#ff4d6a', '#ff9838', '#ffcf3a', '#2ed673', '#3aa0ff', '#b268ff'];
    const R = 56;
    let wedges = '';
    for (let i = 0; i < RB.length; i++) {
      const a1 = (i / RB.length) * 2 * Math.PI - Math.PI / 2;
      const a2 = ((i + 1) / RB.length) * 2 * Math.PI - Math.PI / 2;
      const x1 = (50 + R * Math.cos(a1)).toFixed(1), y1 = (50 + R * Math.sin(a1)).toFixed(1);
      const x2 = (50 + R * Math.cos(a2)).toFixed(1), y2 = (50 + R * Math.sin(a2)).toFixed(1);
      wedges += '<path d="M50 50 L' + x1 + ' ' + y1 + ' A' + R + ' ' + R + ' 0 0 1 ' + x2 + ' ' + y2 + ' Z" fill="' + RB[i] + '"/>';
    }
    const sh = 'sh' + uid, sp = 'sp' + uid;
    return '<svg viewBox="0 0 100 100" aria-hidden="true"><defs>' +
      // vignette: tối dần ở mép (tạo khối cầu), đậm hơn phía dưới-trái
      '<radialGradient id="' + sh + '" cx="0.62" cy="0.34" r="0.72">' +
      '<stop offset="0" stop-color="#000" stop-opacity="0"/>' +
      '<stop offset=".62" stop-color="#000" stop-opacity="0"/>' +
      '<stop offset="1" stop-color="#000" stop-opacity=".42"/></radialGradient>' +
      // đốm sáng gương (specular) góc trên-phải
      '<radialGradient id="' + sp + '" cx="0.5" cy="0.5" r="0.5">' +
      '<stop offset="0" stop-color="#fff" stop-opacity=".95"/>' +
      '<stop offset=".5" stop-color="#fff" stop-opacity=".3"/>' +
      '<stop offset="1" stop-color="#fff" stop-opacity="0"/></radialGradient>' +
      clip + '</defs>' +
      '<circle id="' + pid + '" cx="50" cy="50" r="37" fill="#fff"/>' +
      '<g clip-path="url(#' + cid + ')">' +
      wedges +
      '<circle cx="50" cy="50" r="37" fill="url(#' + sh + ')"/>' +
      '<ellipse cx="62" cy="29" rx="21" ry="13" fill="url(#' + sp + ')" transform="rotate(24 62 29)"/>' +
      '</g></svg>';
  }

  const col = COLORS[color];
  const gid = 'g' + uid;
  // Thân: gradient HÌNH CẦU (radial), tâm sáng lấy từ LIGHT[color] (chỉnh live).
  const L = LIGHT[color] || LIGHT_DEFAULT;
  const grad = '<radialGradient id="' + gid + '" cx="' + L.lx + '" cy="' + L.ly + '" r="' + L.lr + '">' +
    '<stop offset="0" stop-color="' + lighten(col, 0.20) + '"/>' +   // highlight tâm bớt bợt
    '<stop offset=".5" stop-color="' + col + '"/>' +                 // giữ đúng màu gốc (tươi hơn)
    '<stop offset="1" stop-color="' + darken(col, 0.16) + '"/></radialGradient>';   // đáy sẫm → đậm, nổi khối
  let bodyId = SHAPES[color].replace(/<(path|circle|rect|ellipse)/, '<$1 id="' + pid + '"');
  if (color === 2) bodyId = bodyId.replace('<path', '<path stroke-linejoin="miter"');   // tam giác: góc nhọn
  const open = '<svg viewBox="0 0 100 100" fill="url(#' + gid + ')" stroke="url(#' + gid + ')" ' +
    'stroke-width="' + ROUND + '" stroke-linejoin="round" stroke-linecap="round" aria-hidden="true">';

  // Kí hiệu chức năng đặc biệt (kiểu Candy Crush) — clip theo hình
  let marksG = '', spDefs = '';
  if (special === 'row' || special === 'col') {
    // Kẹo sọc 3D: sọc chạy hết viên & UỐN CONG theo bề mặt cầu (quấn quanh khối).
    //   Mỗi sọc = dải cong (gradient ống bóng), sọc trên vồng lên ∩, sọc dưới võng
    //   xuống ∪; kèm đường sáng mép trên + rãnh tối mép dưới bám theo đúng đường cong.
    const isRow = special === 'row';
    const sg = 'sg' + uid;
    spDefs = isRow
      ? '<linearGradient id="' + sg + '" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#fff" stop-opacity=".5"/><stop offset=".5" stop-color="#fff" stop-opacity="1"/><stop offset="1" stop-color="#fff" stop-opacity=".45"/></linearGradient>'
      : '<linearGradient id="' + sg + '" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#fff" stop-opacity=".5"/><stop offset=".5" stop-color="#fff" stop-opacity="1"/><stop offset="1" stop-color="#fff" stop-opacity=".45"/></linearGradient>';
    const TH = 12, SAG = 0.42, LO = -12, HI = 112;   // dày sọc · độ cong · chạy tràn 2 đầu
    // Dải cong dày TH quanh tâm cc: 2 mép là 2 cung Bézier cùng độ võng sag
    const band = (cc) => {
      const sag = (cc - 50) * SAG, a = cc - TH / 2, b = cc + TH / 2;
      return isRow
        ? 'M' + LO + ' ' + a + ' Q50 ' + (a + 2 * sag) + ' ' + HI + ' ' + a + ' L' + HI + ' ' + b + ' Q50 ' + (b + 2 * sag) + ' ' + LO + ' ' + b + ' Z'
        : 'M' + a + ' ' + LO + ' Q' + (a + 2 * sag) + ' 50 ' + a + ' ' + HI + ' L' + b + ' ' + HI + ' Q' + (b + 2 * sag) + ' 50 ' + b + ' ' + LO + ' Z';
    };
    // Cung mảnh chạy dọc mép sọc (highlight / rãnh) — off = lệch so với tâm cc
    const edge = (cc, off) => {
      const sag = (cc - 50) * SAG, y = cc + off;
      return isRow ? 'M' + LO + ' ' + y + ' Q50 ' + (y + 2 * sag) + ' ' + HI + ' ' + y
                   : 'M' + y + ' ' + LO + ' Q' + (y + 2 * sag) + ' 50 ' + y + ' ' + HI;
    };
    let bars = '';
    for (const cc of [36, 64]) {
      bars += '<path d="' + band(cc) + '" fill="url(#' + sg + ')"/>' +
        '<path d="' + edge(cc, -TH / 2 + 1.2) + '" fill="none" stroke="#fff" stroke-width="2.4" opacity=".9"/>' +
        '<path d="' + edge(cc, TH / 2 - 0.9) + '" fill="none" stroke="#000" stroke-width="2.2" opacity=".12"/>';
    }
    // Mask theo silhouette CÓ cả viền (fill + stroke) → sọc phủ full hình tới tận mép,
    // không chừa vành viền như clip-path (clip chỉ tính vùng fill).
    const mid = 'm' + uid;
    spDefs += '<mask id="' + mid + '" maskUnits="userSpaceOnUse"><use href="#' + pid + '" fill="#fff" stroke="#fff" stroke-width="' + ROUND + '" stroke-linejoin="round" stroke-linecap="round"/></mask>';
    marksG = '<g mask="url(#' + mid + ')" stroke-linecap="round">' + bars + '</g>';
  } else if (special === 'bomb') {
    // Kẹo gói: VIỀN TRẮNG chạy quanh mép viên (dày, bo mềm) + rãnh tối mảnh phía trong
    marksG =
      '<use href="#' + pid + '" fill="none" stroke="#fff" stroke-width="7.5" stroke-linejoin="round" opacity=".95" clip-path="url(#' + cid + ')"/>' +
      '<use href="#' + pid + '" fill="none" stroke="#000" stroke-width="1.4" stroke-linejoin="round" opacity=".1" clip-path="url(#' + cid + ')"/>';
  }

  // Inner shadow ôm MÉP DƯỚI ("góc tối") — vị trí/đậm nhạt lấy từ LIGHT[color]
  const bsg = 'bs' + uid;
  const dk = darken(col, 0.5);
  const bsGrad = '<radialGradient id="' + bsg + '" cx="' + L.sx + '" cy="' + L.sy + '" r="' + L.sr + '">' +
    '<stop offset="0" stop-color="' + dk + '" stop-opacity="' + L.so + '"/>' +
    '<stop offset=".6" stop-color="' + dk + '" stop-opacity="' + (L.so * 0.36).toFixed(3) + '"/>' +
    '<stop offset="1" stop-color="' + dk + '" stop-opacity="0"/></radialGradient>';
  const botSh = '<ellipse cx="50" cy="88" rx="36" ry="24" fill="url(#' + bsg + ')" stroke="none" clip-path="url(#' + cid + ')"/>';

  // Highlight mềm & tản ("góc vệt sáng") — vị trí/góc/kích thước/đậm từ LIGHT[color]
  const hlg = 'hl' + uid;
  const hlGrad = '<radialGradient id="' + hlg + '" cx="0.5" cy="0.5" r="0.5">' +
    '<stop offset="0" stop-color="#fff" stop-opacity="' + L.ho + '"/>' +
    '<stop offset=".55" stop-color="#fff" stop-opacity="' + (L.ho * 0.36).toFixed(3) + '"/>' +
    '<stop offset="1" stop-color="#fff" stop-opacity="0"/></radialGradient>';
  const hl = '<ellipse cx="' + L.hx + '" cy="' + L.hy + '" rx="' + L.hrx + '" ry="' + L.hry + '" ' +
    'fill="url(#' + hlg + ')" stroke="none" transform="rotate(' + L.ha + ' ' + L.hx + ' ' + L.hy + ')" ' +
    'clip-path="url(#' + cid + ')"/>';
  return open + '<defs>' + grad + hlGrad + bsGrad + spDefs + clip + '</defs>' +
    bodyId + botSh + hl + marksG + '</svg>';
}

/* =====================================================================
 * 3c. Âm thanh vui nhộn (Web Audio tổng hợp — KHÔNG file rời, giữ single-file)
 * ===================================================================== */
const Sound = (function () {
  let ctx = null, master = null, musicGain = null, muted = false;
  const VOL = 0.92;
  const mtof = (m) => 440 * Math.pow(2, (m - 69) / 12);

  function ensure() {
    if (ctx) return;
    try {
      const AC = window.AudioContext || window.webkitAudioContext;
      if (!AC) return;
      ctx = new AC();
      master = ctx.createGain(); master.gain.value = muted ? 0 : VOL;
      const comp = ctx.createDynamicsCompressor();  // limiter: to & vui nhưng không vỡ
      comp.threshold.value = -10; comp.knee.value = 22; comp.ratio.value = 5;
      comp.attack.value = 0.003; comp.release.value = 0.25;
      master.connect(comp); comp.connect(ctx.destination);
      musicGain = ctx.createGain(); musicGain.gain.value = 0.42;  // nhạc nền nhỏ, nhường tiếng nổ
      const musicLP = ctx.createBiquadFilter();                  // lọc bớt tần cao → ấm, mượt dịu
      musicLP.type = 'lowpass'; musicLP.frequency.value = 2600; musicLP.Q.value = 0.4;
      musicGain.connect(musicLP); musicLP.connect(master);       // qua master → nút tắt tiếng cũng tắt nhạc
    } catch (e) { ctx = null; }
  }
  function resume() { if (ctx && ctx.state === 'suspended') ctx.resume(); }
  function suspend() { if (ctx && ctx.state === 'running') ctx.suspend(); }
  function setMuted(m) { muted = !!m; if (master) master.gain.value = muted ? 0 : VOL; }
  function isMuted() { return muted; }

  // Nốt tổng hợp — mặc định square (chất "vui nhộn" retro), có thể trượt cao độ
  function tone(o) {
    if (!ctx || muted) return;
    const t0 = ctx.currentTime + (o.delay || 0);
    const dur = o.dur || 0.12;
    const osc = ctx.createOscillator(), g = ctx.createGain();
    osc.type = o.type || 'square';
    osc.frequency.setValueAtTime(o.freq, t0);
    if (o.freqTo) osc.frequency[o.slide === 'lin' ? 'linearRampToValueAtTime' : 'exponentialRampToValueAtTime'](o.freqTo, t0 + dur);
    const peak = o.gain != null ? o.gain : 0.2;
    g.gain.setValueAtTime(0.0001, t0);
    g.gain.exponentialRampToValueAtTime(peak, t0 + (o.attack || 0.005));
    g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
    let node = osc;
    if (o.lp) { const f = ctx.createBiquadFilter(); f.type = 'lowpass'; f.frequency.value = o.lp; osc.connect(f); node = f; }
    node.connect(g); g.connect(master);
    osc.start(t0); osc.stop(t0 + dur + 0.03);
  }
  function noise(o) {
    if (!ctx || muted) return;
    const t0 = ctx.currentTime + (o.delay || 0), dur = o.dur || 0.2;
    const n = Math.max(1, (ctx.sampleRate * dur) | 0);
    const buf = ctx.createBuffer(1, n, ctx.sampleRate), d = buf.getChannelData(0);
    for (let i = 0; i < n; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / n);
    const src = ctx.createBufferSource(); src.buffer = buf;
    const g = ctx.createGain();
    g.gain.setValueAtTime(0.0001, t0);
    g.gain.exponentialRampToValueAtTime(o.gain != null ? o.gain : 0.2, t0 + 0.008);
    g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
    const lp = ctx.createBiquadFilter(); lp.type = 'lowpass';
    lp.frequency.setValueAtTime(o.lp || 1600, t0);
    if (o.lpTo) lp.frequency.exponentialRampToValueAtTime(o.lpTo, t0 + dur);
    src.connect(lp); lp.connect(g); g.connect(master);
    src.start(t0); src.stop(t0 + dur);
  }
  // ── Nhạc nền vui nhộn (tổng hợp, lặp vô hạn; đi qua master nên nút tắt tiếng cũng tắt) ──
  const BPM = 116;
  const STEP = 60 / BPM / 2;                   // độ dài 1 nốt móc đơn
  // Giai điệu sáng, nảy (MIDI; null = nghỉ) — 32 bước ≈ 7.6s/lặp
  const MELODY = [
    72, 76, 79, 76,  81, 79, 76, 74,   72, 74, 76, 79,  76, 72, 69, null,
    74, 77, 81, 79,  77, 74, 72, 74,   76, 72, 74, 76,  72, 69, 67, null,
  ];
  const BASS = [
    48, null, null, null, 43, null, null, null, 45, null, null, null, 43, null, null, null,
    50, null, null, null, 43, null, null, null, 48, null, null, null, 43, null, null, null,
  ];
  let bgmOn = false, bgmTimer = null, bgmStep = 0, nextTime = 0;

  function bgmNote(midi, time, o) {
    const osc = ctx.createOscillator(), g = ctx.createGain();
    osc.type = o.type || 'square';
    osc.frequency.setValueAtTime(mtof(midi), time);
    const dur = o.dur || STEP * 0.9;
    g.gain.setValueAtTime(0.0001, time);
    g.gain.linearRampToValueAtTime(o.gain != null ? o.gain : 0.11, time + (o.atk || 0.05));  // vào êm
    g.gain.exponentialRampToValueAtTime(0.0001, time + dur);                                   // tắt mượt
    let node = osc;
    if (o.lp) { const f = ctx.createBiquadFilter(); f.type = 'lowpass'; f.frequency.value = o.lp; osc.connect(f); node = f; }
    node.connect(g); g.connect(musicGain);
    osc.start(time); osc.stop(time + dur + 0.05);
  }
  function bgmSchedule() {                       // lookahead scheduler
    if (!ctx || !bgmOn) return;
    if (nextTime < ctx.currentTime) nextTime = ctx.currentTime + 0.05;   // tránh dồn nốt sau khi resume
    while (nextTime < ctx.currentTime + 0.2) {
      const i = bgmStep % MELODY.length;
      const m = MELODY[i];
      if (m != null) bgmNote(m, nextTime, { type: 'triangle', gain: 0.1, dur: STEP * 1.25, lp: 2000, atk: 0.06 });
      const b = BASS[i];
      if (b != null) bgmNote(b, nextTime, { type: 'sine', gain: 0.2, dur: STEP * 1.95, lp: 800, atk: 0.05 });
      bgmStep++;
      nextTime += STEP;
    }
  }
  function startMusic() {
    ensure();
    if (!ctx || bgmOn) return;
    bgmOn = true; bgmStep = 0; nextTime = ctx.currentTime + 0.12;
    bgmSchedule();
    bgmTimer = setInterval(bgmSchedule, 60);
  }
  function stopMusic() {
    bgmOn = false;
    if (bgmTimer) { clearInterval(bgmTimer); bgmTimer = null; }
  }

  return {
    ensure, resume, suspend, setMuted, isMuted, startMusic, stopMusic,
    // ÂM THANH DUY NHẤT: tiếng nổ khi ăn khối (hợp âm rải trưởng vui, cao độ tăng theo chuỗi)
    blast(chain, count) {
      ensure();
      const tier = Math.min(Math.max((chain || 1) - 1, 0), 5);
      [0, 4, 7, 12].forEach((iv, i) =>
        tone({ freq: mtof(67 + tier + iv), dur: 0.26, type: 'sine', gain: 0.22, delay: i * 0.055, lp: 2600, attack: 0.02 }));
    },
  };
})();

/* =====================================================================

function resize() {
  const hud = document.querySelector('.hud');
  const usedTop = hud.offsetHeight;                      // chiều cao HUD (topbar + scorebar)
  // Khung khay (.board-wrap) dày hơn bàn WRAP px (padding 13px × 2) → phải trừ để
  // khung KHÔNG chui lên đè hàng Score/Best khi bàn to.
  const WRAP = 26;
  // Chừa khoảng trống trên–dưới bằng nhau (2×usedTop) → lưới cân giữa màn hình
  const availH = Math.max(0, window.innerHeight - 2 * usedTop - WRAP - 16);
  const availW = Math.min(window.innerWidth, 560) - WRAP - 6;
  const boardPx = Math.min(availW, availH);
  cell = Math.max(20, Math.floor(boardPx / COLS));       // sàn 20px cho dễ chạm
  // Máy thấp / xoay ngang: nếu sàn làm bàn vượt không gian → co lại cho VỪA (không tràn)
  if (cell * COLS > boardPx && boardPx >= COLS) cell = Math.floor(boardPx / COLS);
  const size = cell * COLS;
  document.documentElement.style.setProperty('--cell', cell + 'px');
  boardEl.style.width = size + 'px';
  boardEl.style.height = size + 'px';
  gridBgEl.style.width = size + 'px';
  gridBgEl.style.height = size + 'px';
  gridBgEl.style.gridTemplateColumns = 'repeat(' + COLS + ',1fr)';
  gridBgEl.style.gridTemplateRows = 'repeat(' + ROWS + ',1fr)';
  if (!gridBgEl.childElementCount) {
    for (let i = 0; i < ROWS * COLS; i++) {
      const s = document.createElement('div');
      const r = (i / COLS) | 0, c = i % COLS;
      s.className = 'slot' + ((r + c) % 2 ? ' b' : '');   // ô caro Candy Crush
      gridBgEl.appendChild(s);
    }
  }
  layout();
}

/* =====================================================================
 * 6. Match / special detection
 * ===================================================================== */
function computeRunLens() {
  const H = Array.from({ length: ROWS }, () => new Array(COLS).fill(0));
  const V = Array.from({ length: ROWS }, () => new Array(COLS).fill(0));
  // Ô chặn run: trống / bom đếm ngược / đang chờ-nổ / CẦU VỒNG (cầu vồng không match thụ động)
  const blk = (t) => !t || t.bomb || t.wave || t.special === 'rainbow';
  for (let r = 0; r < ROWS; r++) {
    let c = 0;
    while (c < COLS) {
      const t0 = board[r][c];
      if (blk(t0)) { c++; continue; }
      let j = c;
      while (j < COLS && !blk(board[r][j]) && board[r][j].color === t0.color) j++;
      const len = j - c;
      if (len >= 3) for (let k = c; k < j; k++) H[r][k] = len;
      c = j;
    }
  }
  for (let c = 0; c < COLS; c++) {
    let r = 0;
    while (r < ROWS) {
      const t0 = board[r][c];
      if (blk(t0)) { r++; continue; }
      let j = r;
      while (j < ROWS && !blk(board[j][c]) && board[j][c].color === t0.color) j++;
      const len = j - r;
      if (len >= 3) for (let k = r; k < j; k++) V[k][c] = len;
      r = j;
    }
  }
  return { H, V };
}

// Trả về { clearCells:Set, specialPlans:[{r,c,type,color}] }
function findMatches(swapCells) {
  const { H, V } = computeRunLens();
  const seen = Array.from({ length: ROWS }, () => new Array(COLS).fill(false));
  const clearCells = new Set();
  const specialPlans = [];

  for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) {
    if (seen[r][c] || (H[r][c] < 3 && V[r][c] < 3)) continue;
    // BFS component (nối các ô matched cùng màu)
    const color = board[r][c].color;
    const comp = [];
    const stack = [[r, c]];
    seen[r][c] = true;
    let maxH = 0, maxV = 0, inter = null;
    while (stack.length) {
      const [cr, cc] = stack.pop();
      comp.push({ r: cr, c: cc });
      maxH = Math.max(maxH, H[cr][cc]);
      maxV = Math.max(maxV, V[cr][cc]);
      if (H[cr][cc] >= 3 && V[cr][cc] >= 3 && !inter) inter = { r: cr, c: cc };
      const nb = [[cr - 1, cc], [cr + 1, cc], [cr, cc - 1], [cr, cc + 1]];
      for (const [nr, nc] of nb) {
        if (inb(nr, nc) && !seen[nr][nc] && (H[nr][nc] >= 3 || V[nr][nc] >= 3) &&
            board[nr][nc] && board[nr][nc].color === color) {
          seen[nr][nc] = true; stack.push([nr, nc]);
        }
      }
    }

    // Loại special cho component
    let type = null;
    if (maxH >= 5 || maxV >= 5) type = 'rainbow';
    else if (inter) type = 'bomb';
    else if (maxH >= 4) type = 'row';
    else if (maxV >= 4) type = 'col';

    let spPos = null;
    if (type) {
      const sw = (swapCells || []).find(s => comp.some(p => p.r === s.r && p.c === s.c));
      if (sw) spPos = sw;
      else if (type === 'bomb' && inter) spPos = inter;
      else spPos = comp[(comp.length / 2) | 0];
      // cells: các viên trong cụm (trừ ô sinh special) → dùng cho hiệu ứng TỤ LẠI
      const cells = comp.filter(p => !(p.r === spPos.r && p.c === spPos.c)).map(p => ({ r: p.r, c: p.c }));
      specialPlans.push({ r: spPos.r, c: spPos.c, type, color, cells });
    }
    for (const p of comp) {
      if (spPos && p.r === spPos.r && p.c === spPos.c) continue;
      clearCells.add(key(p.r, p.c));
    }
  }
  return { clearCells, specialPlans };
}

function anyMatch(swapCells) {
  const m = findMatches(swapCells);
  return m.clearCells.size > 0 || m.specialPlans.length > 0;
}

/* Ô bị ảnh hưởng khi 1 special phát nổ */
function specialBlast(r, c, type, color) {
  const out = [];
  if (type === 'row') for (let cc = 0; cc < COLS; cc++) out.push(key(r, cc));
  else if (type === 'col') for (let rr = 0; rr < ROWS; rr++) out.push(key(rr, c));
  else if (type === 'bomb') {
    for (let dr = -1; dr <= 1; dr++) for (let dc = -1; dc <= 1; dc++)
      if (inb(r + dr, c + dc)) out.push(key(r + dr, c + dc));
  } else if (type === 'rainbow') {
    // Nổ mọi viên CÙNG MÀU — nhưng KHÔNG cuốn cầu vồng khác vào (chúng chỉ nổ khi bị nổ trúng)
    for (let rr = 0; rr < ROWS; rr++) for (let cc = 0; cc < COLS; cc++)
      if (board[rr][cc] && board[rr][cc].color === color && board[rr][cc].special !== 'rainbow')
        out.push(key(rr, cc));
  }
  return out;
}

/* Kích hoạt dây chuyền: mọi special trong clr sẽ nổ, kéo theo special khác */
function expandActivations(clr) {
  const rainbows = [];                 // vị trí các cầu vồng phát nổ → thêm hiệu ứng riêng
  const stack = [];
  for (const k of clr) {
    const [r, c] = k.split(',').map(Number);
    const t = board[r][c];
    if (t && t.special) stack.push(k);
  }
  const done = new Set();
  while (stack.length) {
    const k = stack.pop();
    if (done.has(k)) continue;
    const [r, c] = k.split(',').map(Number);
    const t = board[r][c];
    if (!t || !t.special) continue;
    done.add(k);
    if (t.special === 'rainbow') rainbows.push([r, c]);
    for (const b of specialBlast(r, c, t.special, t.color)) {
      const [br, bc] = b.split(',').map(Number);
      const bt = board[br][bc];
      if (bt && bt.wave) continue;          // special đang chờ đợt sau → không nổ/không xóa lúc này
      if (!clr.has(b)) clr.add(b);
      if (bt && bt.special && !done.has(b)) stack.push(b);
    }
    // Kẹo gói NỔ 2 LẦN: lần 1 chỉ nổ 3×3 quanh, GIỮ viên gói → rơi xuống rồi nổ lần 2
    if (t.special === 'bomb' && !t.boomedOnce) {
      t.boomedOnce = true;                  // đánh dấu đã nổ lần 1 → chờ nổ lần 2 sau khi rơi
      clr.delete(key(r, c));                // không xoá viên gói lần này (sống sót)
      drawSpecialFx(r, c, 'bomb', t.color, 0);   // vẽ hiệu ứng nổ lần 1
    }
  }
  return rainbows;
}

/* =====================================================================
 * 7. Player move + cascade
 * ===================================================================== */
function swapModel(a, b) {
  const t = board[a.r][a.c];
  board[a.r][a.c] = board[b.r][b.c];
  board[b.r][b.c] = t;
}
// Tìm vị trí hiện tại của 1 tile (dùng cho combo theo đợt — tile có thể đã rơi)
function findTilePos(tile) {
  for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) if (board[r][c] === tile) return { r, c };
  return null;
}

async function animateSwap() { layout(); await sleep(150); }

function comboClears(ta, a, tb, b) {
  const clr = new Set();
  const raInvolved = ta.special === 'rainbow' || tb.special === 'rainbow';
  if (raInvolved) {
    if (ta.special === 'rainbow' && tb.special === 'rainbow') {
      for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) clr.add(key(r, c));
    } else {
      const ra = ta.special === 'rainbow' ? a : b;
      const other = ta.special === 'rainbow' ? tb : ta;
      const oPos = ta.special === 'rainbow' ? b : a;
      // 🌈 + (thường / sọc / gói): đều NỔ HẾT viên CÙNG MÀU với viên được đổi,
      // dùng chung hiệu ứng NỐI XẸT rồi nổ cùng lúc (giữ cầu vồng là special để tia xẹt chạy).
      const col = other.color;
      const raTile = board[ra.r][ra.c];
      if (raTile) raTile.color = col;   // cầu vồng lấy màu được đổi → nổ đúng màu đó
      for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++)
        if (board[r][c] && board[r][c].color === col && board[r][c].special !== 'rainbow')
          clr.add(key(r, c));
      clr.add(key(ra.r, ra.c));
      clr.add(key(oPos.r, oPos.c));
    }
    return clr;
  }
  // hai special thường (row/col/bomb)
  if (ta.special && tb.special) {
    const s1 = ta.special, s2 = tb.special, ctr = b;
    // 2 viên tham gia combo: hình nổ do COMBO quyết định — KHÔNG để chúng tự nổ đường riêng
    // (tránh sọc+sọc ra chữ H; gói+sọc/gói+gói thừa đường). Xoá special để expandActivations bỏ qua.
    ta.special = null; tb.special = null;
    const hasBomb = s1 === 'bomb' || s2 === 'bomb';
    const bothRocket = (s1 === 'row' || s1 === 'col') && (s2 === 'row' || s2 === 'col');
    if (s1 === 'bomb' && s2 === 'bomb') {
      // gói + gói → nổ vùng 5×5 quanh điểm đổi
      for (let dr = -2; dr <= 2; dr++) for (let dc = -2; dc <= 2; dc++)
        if (inb(ctr.r + dr, ctr.c + dc)) clr.add(key(ctr.r + dr, ctr.c + dc));
      bombBurst(ctr.r, ctr.c, COLORS[ta.color] || '#fff', 0);   // hiệu ứng nổ ở tâm
    } else if (bothRocket) {
      // sọc + sọc (mọi tổ hợp: ngang+dọc, ngang+ngang, dọc+dọc) → LUÔN nổ chữ thập (1 HÀNG + 1 CỘT)
      for (let cc = 0; cc < COLS; cc++) clr.add(key(ctr.r, cc));
      for (let rr = 0; rr < ROWS; rr++) clr.add(key(rr, ctr.c));
      // hiệu ứng: 1 tia ngang + 1 tia dọc cho thấy rõ CHỮ THẬP
      const bcol = COLORS[ta.color] || '#fff';
      beamFx(ctr.r, 0, 'row', bcol, 0);
      beamFx(0, ctr.c, 'col', bcol, 0);
    } else if (hasBomb) {
      // CC: sọc + gói → nổ 3 HÀNG + 3 CỘT (dấu cộng dày) qua điểm đổi
      for (let dr = -1; dr <= 1; dr++) for (let cc = 0; cc < COLS; cc++)
        if (inb(ctr.r + dr, cc)) clr.add(key(ctr.r + dr, cc));
      for (let dc = -1; dc <= 1; dc++) for (let rr = 0; rr < ROWS; rr++)
        if (inb(rr, ctr.c + dc)) clr.add(key(rr, ctr.c + dc));
      // Hiệu ứng: 3 tia NGANG + 3 tia DỌC cho thấy rõ dấu cộng dày
      const bcol = COLORS[(s1 === 'bomb' ? tb : ta).color] || '#fff';
      for (let dr = -1; dr <= 1; dr++) if (inb(ctr.r + dr, 0)) beamFx(ctr.r + dr, 0, 'row', bcol, 0);
      for (let dc = -1; dc <= 1; dc++) if (inb(0, ctr.c + dc)) beamFx(0, ctr.c + dc, 'col', bcol, 0);
    }
    return clr;
  }
  // 1 special thường + 1 thường → KHÔNG tự nổ khi đổi chỗ.
  // Special (row/col/bomb) chỉ nổ khi được MATCH cùng màu như khối thường:
  // findMatches sẽ bắt run cùng màu (special vẫn mang màu) → expandActivations kích nổ.
  return clr;
}

// 🌈 + SỌC/GÓI: nối xẹt lần lượt tới từng viên cùng màu → viên đó hoá SỌC (ngẫu nhiên ngang/dọc)
//   hoặc GÓI (kind='bomb'); nối hết → xẹt biến mất → NỔ LẦN LƯỢT (sọc nổ hàng/cột · gói nổ 3×3).
async function rainbowSpecialCombo(raPos, col, kind) {
  const NS = 'http://www.w3.org/2000/svg';
  const [rx, ry] = fxCenter(raPos.r, raPos.c);
  const tiles = [];
  for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) {
    const t = board[r][c];
    if (!t || t.bomb || t.special === 'rainbow' || t.color !== col) continue;
    tiles.push({ t, r, c, d: Math.hypot(r - raPos.r, c - raPos.c) });
  }
  tiles.sort((p, q) => p.d - q.d);

  const size = cell * COLS;
  const svg = document.createElementNS(NS, 'svg');
  svg.setAttribute('width', size); svg.setAttribute('height', size);
  svg.style.cssText = 'position:absolute;left:0;top:0;z-index:8;pointer-events:none;overflow:visible';
  boardEl.appendChild(svg);
  const SP = ['#ff4d6a', '#ffcf3a', '#2ed673', '#3aa0ff', '#b268ff', '#ff9838'];
  const jag = (x1, y1, x2, y2) => {
    const dx = x2 - x1, dy = y2 - y1, len = Math.hypot(dx, dy) || 1;
    const nx = -dy / len, ny = dx / len, segs = 5;
    let d = 'M' + x1.toFixed(1) + ' ' + y1.toFixed(1);
    for (let i = 1; i < segs; i++) {
      const tt = i / segs, off = (Math.random() * 2 - 1) * Math.min(16, len * 0.2);
      d += ' L' + (x1 + dx * tt + nx * off).toFixed(1) + ' ' + (y1 + dy * tt + ny * off).toFixed(1);
    }
    return d + ' L' + x2.toFixed(1) + ' ' + y2.toFixed(1);
  };

  // PHA 1: nối xẹt lần lượt + biến thành sọc ngẫu nhiên (giữ tia lại)
  for (let i = 0; i < tiles.length; i++) {
    const { t, r, c } = tiles[i];
    const [tx, ty] = fxCenter(r, c);
    const g = document.createElementNS(NS, 'g');
    const dp = jag(rx, ry, tx, ty);
    const glow = document.createElementNS(NS, 'path');
    glow.setAttribute('d', dp); glow.setAttribute('fill', 'none');
    glow.setAttribute('stroke', SP[i % SP.length]); glow.setAttribute('stroke-width', '5');
    glow.setAttribute('stroke-opacity', '.5'); glow.setAttribute('stroke-linecap', 'round'); glow.setAttribute('stroke-linejoin', 'round');
    const core = document.createElementNS(NS, 'path');
    core.setAttribute('d', dp); core.setAttribute('fill', 'none');
    core.setAttribute('stroke', '#fff'); core.setAttribute('stroke-width', '1.8');
    core.setAttribute('stroke-linecap', 'round'); core.setAttribute('stroke-linejoin', 'round');
    g.appendChild(glow); g.appendChild(core); svg.appendChild(g);
    g.animate([{ opacity: 0 }, { opacity: 1 }], { duration: 90, easing: 'ease-out', fill: 'forwards' });

    if (board[r][c] === t) { t.special = kind === 'bomb' ? 'bomb' : (Math.random() < 0.5 ? 'row' : 'col'); paintTile(t); }
    const p = pos(r, c);
    t.el.animate([{ transform: p + ' scale(.7)' }, { transform: p + ' scale(1.2)', offset: .6 }, { transform: p }], { duration: 240, easing: 'ease-out' });
    await sleep(130);
  }

  // Xoá cầu vồng
  const raT = board[raPos.r][raPos.c];
  if (raT) { raT.el.remove(); board[raPos.r][raPos.c] = null; }
  await sleep(200);

  // PHA 2: tia xẹt biến mất
  svg.animate([{ opacity: 1 }, { opacity: 0 }], { duration: 180, easing: 'ease-out' }).onfinish = () => svg.remove();
  await sleep(140);

  // PHA 3: các sọc NỔ LẦN LƯỢT — mỗi sọc nổ hàng/cột của nó
  const clr = new Set();
  const mark = (br, bc) => {
    const bt = board[br][bc];
    if (bt && !bt.bomb && !clr.has(key(br, bc))) {
      clr.add(key(br, bc));
      bt.el.classList.add('clearing');
      bt.el.style.transform = pos(br, bc) + ' scale(1.6)';
      return true;
    }
    return false;
  };
  let cleared = 0, sx = 0, sy = 0;
  const bcol = COLORS[col] || '#fff';
  for (let i = 0; i < tiles.length; i++) {
    const { t, r, c } = tiles[i];
    if (board[r][c] !== t) continue;
    let list;
    if (t.special === 'bomb') {          // GÓI: nổ 3×3
      bombBurst(r, c, bcol, 0);
      list = [];
      for (let dr = -1; dr <= 1; dr++) for (let dc = -1; dc <= 1; dc++)
        if (inb(r + dr, c + dc)) list.push([r + dr, c + dc]);
    } else {                             // SỌC: nổ hàng/cột
      const type = t.special === 'col' ? 'col' : 'row';
      beamFx(r, c, type, bcol, 0);
      list = type === 'row'
        ? Array.from({ length: COLS }, (_, cc) => [r, cc])
        : Array.from({ length: ROWS }, (_, rr) => [rr, c]);
    }
    for (const [br, bc] of list) {
      if (mark(br, bc)) { cleared++; const [ccx, ccy] = fxCenter(br, bc); sx += ccx; sy += ccy; }
    }
    t.special = null;   // đã nổ trong combo → bỏ special để KHÔNG nổ lại (gói không nổ đôi)
    await sleep(95);
  }
  if (cleared) {
    addScore(cleared, 1);
    spawnPop(sx / cleared, sy / cleared, '+' + cleared * 10);
    flyToScore(sx / cleared, sy / cleared);
    Sound.blast(2, cleared);
  }
  await sleep(340);
  // Chain: special khác bị trúng (bom gói, sọc lạ...) → đánh dấu & xoá luôn
  expandActivations(clr);
  for (const k of clr) { const [r, c] = k.split(',').map(Number); mark(r, c); }
  defuseBombs(clr);
  for (const k of clr) { const [r, c] = k.split(',').map(Number); const t = board[r][c]; if (t) { t.el.remove(); board[r][c] = null; } }
  gravityAndRefill();
  await sleep(380);
  await cascade(null, []);   // tiếp tục chuỗi match mới sau khi rơi đầy
}

async function tryMove(a, b) {
  if (busy || ended) return;
  if (!(Math.abs(a.r - b.r) + Math.abs(a.c - b.c) === 1)) return;
  const ta = tileAt(a.r, a.c), tb = tileAt(b.r, b.c);
  if (!ta || !tb) return;
  if (ta.bomb || tb.bomb) return;   // không đổi chỗ bom (chỉ gỡ bằng nổ trúng ô kề)

  busy = true;
  clearHint();
  clearSelection();
  swapModel(a, b);
  await animateSwap();

  // 🌈 + SỌC/GÓI: luồng riêng — nối xẹt lần lượt, mỗi viên cùng màu hoá sọc/gói, rồi nổ lần lượt
  {
    const t1 = tileAt(a.r, a.c), t2 = tileAt(b.r, b.c);
    const rbSel = t1.special === 'rainbow' ? t1 : (t2.special === 'rainbow' ? t2 : null);
    const oth = t1.special === 'rainbow' ? t2 : t1;
    if (rbSel && oth && (oth.special === 'row' || oth.special === 'col' || oth.special === 'bomb')) {
      const raPos = t1.special === 'rainbow' ? a : b;
      const kind = oth.special === 'bomb' ? 'bomb' : 'stripe';
      await rainbowSpecialCombo(raPos, oth.color, kind);
      onMoveResolved();
      await settleAfterMove();
      busy = false;
      resetIdle();
      return;
    }
  }

  const pending = comboClears(tileAt(a.r, a.c), a, tileAt(b.r, b.c), b);
  const test = findMatches([a, b]);
  const valid = pending.size > 0 || test.clearCells.size > 0 || test.specialPlans.length > 0;

  if (!valid) {
    swapModel(a, b);           // hoàn tác
    await animateSwap();
    busy = false;
    resetIdle();
    return;
  }

  await cascade(pending, [a, b]);
  onMoveResolved();          // đếm ngược bom + spawn (có thể kích nổ → thua)
  await settleAfterMove();
  busy = false;
  resetIdle();
}

async function cascade(pending, swapCells) {
  let first = true;
  let chain = 1;             // hệ số điểm tăng theo mỗi bước cascade (combo)
  let forcedNext = null;     // kẹo gói nổ lần 2 sau khi rơi
  while (true) {
    const { clearCells, specialPlans } = findMatches(first ? swapCells : []);
    const clr = new Set(clearCells);
    if (first && pending) for (const k of pending) clr.add(k);
    if (forcedNext) { for (const k of forcedNext) clr.add(k); forcedNext = null; }   // gói nổ lần 2
    // Combo 🌈: mỗi vòng lặp nổ 1 ĐỢT special; giữa các đợt bàn đã rơi đầy lại (không nổ vào ô trống)
    let pulledCombo = false;
    if (comboQueue && comboQueue.length) {
      pulledCombo = true;
      const wave = comboQueue.shift();
      for (const tile of wave) { tile.wave = false; const p = findTilePos(tile); if (p) clr.add(key(p.r, p.c)); }
    }

    const rbHits = expandActivations(clr);     // vị trí cầu vồng phát nổ (để thêm hiệu ứng riêng)
    for (const p of specialPlans) clr.delete(key(p.r, p.c));
    if (first && pending) for (const k of pending) clr.add(k);   // combo: nổ hết ô đã định, không giữ lại làm special mới

    if (clr.size === 0 && specialPlans.length === 0) {
      if (comboQueue && comboQueue.length) { first = false; continue; }   // còn đợt → sang đợt sau
      break;
    }

    // Tính điểm + hiệu ứng + đánh dấu clear.
    // Cầu vồng: tia xẹt NỐI lần lượt (chậm) tới từng viên → nối hết mới nổ CÙNG LÚC.
    let maxDelay = 0;
    let connectAt = null, explodeAt = 0;
    if (rbHits.length) {
      const rbSet = new Set(rbHits.map(([r, c]) => key(r, c)));
      const tgts = [];
      for (const kk of clr) {
        if (rbSet.has(kk)) continue;
        const [tr, tc] = kk.split(',').map(Number);
        const t = board[tr][tc];
        if (t && !t.bomb) tgts.push([tr, tc]);
      }
      const distTo = ([r, c]) => { let bb = 1e9; for (const [or, oc] of rbHits) { const dd = Math.hypot(r - or, c - oc); if (dd < bb) bb = dd; } return bb; };
      tgts.sort((a, b) => distTo(a) - distTo(b));
      const step = Math.min(0.12, 1.6 / Math.max(1, tgts.length));   // nối CHẬM; co lại nếu nhiều viên
      connectAt = new Map();
      tgts.forEach(([tr, tc], i) => connectAt.set(key(tr, tc), 0.16 + i * step));   // nối lần lượt
      explodeAt = 0.16 + Math.max(0, tgts.length - 1) * step + 0.35;               // nối hết + giữ 0.35s → nổ chung
    }
    // HIỆU ỨNG TỤ LẠI: viên trong cụm tạo special trượt DỒN về ô sinh special rồi biến mất
    const merged = new Set();
    if (specialPlans.length) {
      for (const p of specialPlans) {
        if (!p.cells) continue;
        for (const cc of p.cells) {
          const t = board[cc.r] && board[cc.r][cc.c];
          if (!t || !clr.has(key(cc.r, cc.c))) continue;
          merged.add(key(cc.r, cc.c));
          const from = pos(cc.r, cc.c), tx = (p.c - cc.c) * cell, ty = (p.r - cc.r) * cell;
          t.el.style.zIndex = 3;
          t.el.animate([
            { transform: from, opacity: 1 },
            { transform: from + ' translate(' + tx + 'px,' + ty + 'px)', opacity: 0 },
          ], { duration: 210, easing: 'cubic-bezier(.4,.2,.4,1)', fill: 'forwards' });
        }
      }
      if (merged.size) await sleep(190);
    }
    let cleared = 0, sx = 0, sy = 0;
    const spTypes = new Set();          // loại special phát nổ ở bước này → chọn tiếng
    const parts = [];
    for (const k of clr) {
      const [r, c] = k.split(',').map(Number);
      const t = board[r][c];
      if (t && !t.bomb) {          // bom không tính điểm ở đây (xử lý riêng ở defuse)
        cleared++;
        if (t.special) spTypes.add(t.special);
        const [cx, cy] = fxCenter(r, c);
        sx += cx; sy += cy;
        // cầu vồng: nối xẹt xong (explodeAt) rồi NỔ TỎA RA từ tâm cầu vồng (gần trước, xa sau)
        let d = 0;
        if (rbHits.length) {
          let best = 1e9;
          for (const [or, oc] of rbHits) { const dd = Math.hypot(r - or, c - oc); if (dd < best) best = dd; }
          d = explodeAt + Math.min(best * 0.06, 0.7);   // sóng ~0.06s/ô, tối đa +0.7s
        }
        if (d > maxDelay) maxDelay = d;
        parts.push([cx, cy, COLORS[t.color], d]);
        if (t.special) drawSpecialFx(r, c, t.special, t.color, d);   // tia/vòng nổ kiểu CC
        if (!merged.has(k)) {   // viên đã tụ về ô special thì giữ nguyên (không phóng to)
          t.el.style.transitionDelay = d + 's';
          t.el.classList.add('clearing');
          t.el.style.transform = pos(r, c) + ' scale(1.6)';
        }
      }
    }
    if (cleared) {
      const pts = cleared * 10 * chain;
      addScore(cleared, chain);
      spawnPop(sx / cleared, sy / cleared, '+' + pts);
      flyToScore(sx / cleared, sy / cleared);   // đốm điểm bay về thẻ SCORE
      // (đã bỏ) spawnParticles(parts) — không rải mảnh vỡ rơi chậm khi ăn khối
      if (rbHits.length) {
        // Tia xẹt nối cầu vồng → các viên bị xoá (theo đúng thứ tự nổ trong zapDelay)
        const zapTargets = [];
        for (const k of clr) { const [zr, zc] = k.split(',').map(Number); const zt = board[zr][zc]; if (zt && !zt.bomb) zapTargets.push([zr, zc]); }
        for (const [rr, rc] of rbHits) rainbowBurst(rr, rc, zapTargets, connectAt, explodeAt);
      }
      // Mọi lần nổ — match 3/4 thường lẫn special (hàng/cột/bom/cầu vồng) — đều dùng "tiếng combo"
      Sound.blast(chain, cleared);
      if (chain >= 2) spawnCombo(chain);
    }
    // Tạo special (nâng cấp tile tại chỗ) + pop
    for (const p of specialPlans) {
      const t = board[p.r][p.c];
      if (t) {
        t.special = p.type; paintTile(t);
        const bpos = pos(p.r, p.c);
        t.el.style.transform = bpos;
        t.el.animate(
          [{ transform: bpos + ' scale(.7)' }, { transform: bpos + ' scale(1.25)', offset: .6 }, { transform: bpos }],
          { duration: 300, easing: 'ease-out' });
      }
    }

    await sleep(clr.size ? (pulledCombo ? 300 : (420 + maxDelay * 1000)) : 90);   // combo: mỗi đợt nhanh gọn

    defuseBombs(clr);   // bom có ô kề (hoặc chính nó) bị xoá → gỡ an toàn

    // Xoá các tile đã clear
    for (const k of clr) {
      const [r, c] = k.split(',').map(Number);
      const t = board[r][c];
      if (t) { t.el.remove(); board[r][c] = null; }
    }

    gravityAndRefill();
    await sleep(pulledCombo ? 230 : 380);   // combo: rơi đầy nhanh rồi sang viên kế
    // Kẹo gói đã nổ lần 1 → sau khi rơi, ép NỔ LẦN 2 ở vòng kế
    const reboom = [];
    for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) {
      const bt = board[r][c];
      if (bt && bt.special === 'bomb' && bt.boomedOnce) reboom.push(key(r, c));
    }
    if (reboom.length) forcedNext = reboom;
    first = false;
    chain++;
  }
  comboQueue = null;   // dọn hàng đợi combo (nếu còn)
}

function gravityAndRefill() {
  const drops = [];   // {t, from, to, c} — mỗi tile phải rơi (kèm quãng đường)
  for (let c = 0; c < COLS; c++) {
    let ptr = ROWS - 1;
    for (let r = ROWS - 1; r >= 0; r--) {
      if (board[r][c]) {
        if (r !== ptr) {                       // tile cũ tụt xuống lấp chỗ trống
          board[ptr][c] = board[r][c]; board[r][c] = null;
          drops.push({ t: board[ptr][c], from: r, to: ptr, c });
        }
        ptr--;
      }
    }
    // ptr..0 trống → tile mới rơi từ trên bàn xuống
    let above = 1;
    for (let r = ptr; r >= 0; r--) {
      const t = makeTile(randColor());
      board[r][c] = t;
      drops.push({ t, from: r - (ptr + above), to: r, c });
    }
  }
  // Đặt sẵn ở điểm xuất phát (không animation) rồi reflow, để không nháy khung đầu
  for (const d of drops) { d.t.el.classList.add('no-anim'); d.t.el.style.transform = pos(d.from, d.c); }
  void boardEl.offsetWidth;
  for (const d of drops) { d.t.el.classList.remove('no-anim'); bounceDrop(d.t, d.from, d.to, d.c); }
  layout();   // vị trí nghỉ cuối cùng (khớp keyframe cuối của bounceDrop)
}

/* Rơi mượt về vị trí (đã bỏ hiệu ứng vật lý: không nảy, không ép dẹp) */
function bounceDrop(t, from, to, c) {
  const endT = pos(to, c);
  const dist = Math.max(1, to - from);
  const dur = Math.min(440, 170 + dist * 40);
  t.el.animate([
    { transform: pos(from, c) },
    { transform: endT },
  ], { duration: dur, easing: 'cubic-bezier(.25,.6,.4,1)' });
}

// Hiệu ứng RIÊNG khi cầu vồng phát nổ: TIA XẸT nối lần lượt (giật giật, giữ lại) + vòng/chớp lúc NỔ
function rainbowBurst(r, c, targets, connectAt, explodeAt) {
  const [cx, cy] = fxCenter(r, c);
  if (targets && targets.length) drawZaps(cx, cy, r, c, targets, connectAt, explodeAt || 0);
  const dl = (explodeAt || 0) * 1000;   // chớp nổ ra đúng lúc tất cả nổ (nối hết)
  const flash = document.createElement('div');
  flash.className = 'fx-rainbow-flash';
  flash.style.width = flash.style.height = (cell * 1.2) + 'px';
  flash.style.left = cx + 'px'; flash.style.top = cy + 'px';
  boardEl.appendChild(flash);
  flash.animate([
    { transform: 'translate(-50%,-50%) scale(.2)', opacity: .9 },
    { transform: 'translate(-50%,-50%) scale(1.9)', opacity: 0 },
  ], { duration: 380, delay: dl, easing: 'ease-out', fill: 'backwards' }).onfinish = () => flash.remove();
}

// Tia xẹt (sét cầu vồng): mỗi tia HIỆN lần lượt (connectAt), GIỮ lại + GIẬT GIẬT, tới explodeAt thì tắt
function drawZaps(sx, sy, sr, sc, targets, connectAt, explodeAt) {
  const NS = 'http://www.w3.org/2000/svg';
  const size = cell * COLS;
  const svg = document.createElementNS(NS, 'svg');
  svg.setAttribute('width', size); svg.setAttribute('height', size);
  svg.style.cssText = 'position:absolute;left:0;top:0;z-index:8;pointer-events:none;overflow:visible';
  boardEl.appendChild(svg);
  const SP = ['#ff4d6a', '#ffcf3a', '#2ed673', '#3aa0ff', '#b268ff', '#ff9838'];
  const jag = (x1, y1, x2, y2) => {
    const dx = x2 - x1, dy = y2 - y1, len = Math.hypot(dx, dy) || 1;
    const nx = -dy / len, ny = dx / len, segs = 5;
    let d = 'M' + x1.toFixed(1) + ' ' + y1.toFixed(1);
    for (let i = 1; i < segs; i++) {
      const t = i / segs, off = (Math.random() * 2 - 1) * Math.min(16, len * 0.2);
      d += ' L' + (x1 + dx * t + nx * off).toFixed(1) + ' ' + (y1 + dy * t + ny * off).toFixed(1);
    }
    return d + ' L' + x2.toFixed(1) + ' ' + y2.toFixed(1);
  };
  const expMs = (explodeAt || 0) * 1000;
  let i = 0;
  for (const [tr, tc] of targets) {
    if (tr === sr && tc === sc) continue;
    const [tx, ty] = fxCenter(tr, tc);
    const appear = (connectAt && connectAt.has(key(tr, tc)) ? connectAt.get(key(tr, tc)) : 0) * 1000;
    const g = document.createElementNS(NS, 'g');
    const glow = document.createElementNS(NS, 'path');
    glow.setAttribute('d', jag(sx, sy, tx, ty)); glow.setAttribute('fill', 'none');
    glow.setAttribute('stroke', SP[i++ % SP.length]);
    glow.setAttribute('stroke-width', '5'); glow.setAttribute('stroke-opacity', '.5');
    glow.setAttribute('stroke-linecap', 'round'); glow.setAttribute('stroke-linejoin', 'round');
    const core = document.createElementNS(NS, 'path');
    core.setAttribute('d', jag(sx, sy, tx, ty)); core.setAttribute('fill', 'none');
    core.setAttribute('stroke', '#fff'); core.setAttribute('stroke-width', '1.8');
    core.setAttribute('stroke-linecap', 'round'); core.setAttribute('stroke-linejoin', 'round');
    g.appendChild(glow); g.appendChild(core);
    g.style.opacity = '0';
    svg.appendChild(g);
    // Pha 1: hiện + GIỮ + giật giật (nhấp opacity) từ lúc nối tới lúc nổ
    const life = Math.max(80, expMs - appear);
    const rise = Math.min(.25, 45 / life);
    g.animate([
      { opacity: 0, offset: 0 },
      { opacity: 1, offset: rise },
      { opacity: .5, offset: rise + (1 - rise) * .2 },
      { opacity: 1, offset: rise + (1 - rise) * .38 },
      { opacity: .65, offset: rise + (1 - rise) * .6 },
      { opacity: 1, offset: rise + (1 - rise) * .8 },
      { opacity: 1, offset: 1 },
    ], { duration: life, delay: appear, easing: 'linear', fill: 'forwards' });
    // Pha 2: nổ → tia tắt nhanh
    g.animate([{ opacity: 1 }, { opacity: 0 }], { duration: 170, delay: expMs, easing: 'ease-out', fill: 'forwards' });
    // Giật vị trí: đổi nhẹ đường zíc-zắc giữa chừng cho cảm giác "giật giật"
    const flick = () => { const dd = jag(sx, sy, tx, ty); glow.setAttribute('d', dd); core.setAttribute('d', dd); };
    for (let f = 1; f <= 3; f++) setTimeout(flick, appear + (life * f / 4));
  }
  setTimeout(() => svg.remove(), expMs + 260);
}

// ── Hiệu ứng kích nổ kiểu Candy Crush: tia sáng (kẹo sọc) + vòng nổ (kẹo gói) ──
function drawSpecialFx(r, c, type, color, delay) {
  const col = COLORS[color] || '#fff';
  if (type === 'row' || type === 'col') beamFx(r, c, type, col, delay);
  else if (type === 'bomb') bombBurst(r, c, col, delay);
}
// Nổ kẹo gói: Ô VUÔNG TRẮNG đúng vùng 3×3, CĂN ĐÚNG TÂM (không xoay), style khớp beam
function bombBurst(r, c, col, delay) {
  const [cx, cy] = fxCenter(r, c);
  const dl = (delay || 0) * 1000;
  const S = cell * 3;   // đúng vùng nổ 3×3
  // Lõi vuông trắng mềm (radial trắng + hào quang) — giống lõi trắng của beam
  const sq = document.createElement('div');
  sq.style.cssText = 'position:absolute;z-index:6;pointer-events:none;border-radius:16%;left:' + cx + 'px;top:' + cy + 'px;' +
    'background:radial-gradient(closest-side, rgba(255,255,255,.95), rgba(255,255,255,.6) 68%, rgba(255,255,255,0));' +
    'box-shadow:0 0 18px currentColor,0 0 8px #fff;color:' + col + ';';
  sq.style.width = sq.style.height = S + 'px';
  boardEl.appendChild(sq);
  sq.animate([
    { transform: 'translate(-50%,-50%) scale(.35)', opacity: 1 },
    { transform: 'translate(-50%,-50%) scale(1)', opacity: 1, offset: .45 },
    { transform: 'translate(-50%,-50%) scale(1)', opacity: 0 },
  ], { duration: 460, delay: dl, easing: 'ease-out', fill: 'backwards' }).onfinish = () => sq.remove();
  // Khung viền trắng lan nhẹ (đúng 3×3, không vượt vùng nổ)
  const fr = document.createElement('div');
  fr.style.cssText = 'position:absolute;z-index:6;pointer-events:none;border-radius:18%;background:transparent;left:' + cx + 'px;top:' + cy + 'px;' +
    'border:' + Math.max(3, cell * 0.13) + 'px solid #fff;box-shadow:0 0 14px currentColor;color:' + col + ';';
  fr.style.width = fr.style.height = S + 'px';
  boardEl.appendChild(fr);
  fr.animate([
    { transform: 'translate(-50%,-50%) scale(.4)', opacity: .9 },
    { transform: 'translate(-50%,-50%) scale(1.12)', opacity: 0 },
  ], { duration: 560, delay: dl, easing: 'ease-out', fill: 'backwards' }).onfinish = () => fr.remove();
}
function beamFx(r, c, type, col, delay) {
  const el = document.createElement('div');

    el.animate([
      { transform: 'translateY(-50%) scaleX(0)', opacity: .35 },
      { transform: 'translateY(-50%) scaleX(1)', opacity: 1, offset: .35 },
      { transform: 'translateY(-50%) scaleX(1)', opacity: 0 },
    ], { duration: 440, delay: dl, easing: 'ease-out', fill: 'backwards' }).onfinish = () => el.remove();
  } else {
    el.style.top = '0px';
    el.style.left = (c * cell + cell / 2) + 'px';
    el.style.height = (cell * ROWS) + 'px';
    el.style.width = Math.max(6, cell * 0.62) + 'px';
    boardEl.appendChild(el);
    el.animate([
      { transform: 'translateX(-50%) scaleY(0)', opacity: .35 },
      { transform: 'translateX(-50%) scaleY(1)', opacity: 1, offset: .35 },

function ringFx(r, c, col, delay) {
  const [cx, cy] = fxCenter(r, c);
  const ring = document.createElement('div');
  ring.className = 'fx-ring';
  ring.style.color = col;
