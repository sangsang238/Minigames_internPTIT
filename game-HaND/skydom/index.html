function defuseBombs(clr) {
  for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) {
    const t = board[r][c];
    if (!t || !t.bomb) continue;
    const near = clr.has(key(r, c)) || clr.has(key(r - 1, c)) || clr.has(key(r + 1, c)) ||
                 clr.has(key(r, c - 1)) || clr.has(key(r, c + 1));
    if (!near) continue;
    const [cx, cy] = fxCenter(r, c);
    defuseBurst(cx, cy);               // nổ khói/mảnh MÀU ĐEN khi gỡ bom
    spawnPop(cx, cy, '+50');
    addScore(5, 1);                    // thưởng gỡ bom = 50 điểm
    flyToScore(cx, cy, 5, 1);          // ngôi sao thu thập điểm về thẻ SCORE
    t.el.remove(); board[r][c] = null; // gỡ xong biến mất (gravity sẽ lấp)
  }
}

// Gọi sau mỗi lượt hợp lệ: đếm ngược mọi bom, nổ nếu về 0, rồi spawn định kỳ.
async function onMoveResolved() {
  if (ended) return;
  moves++;
  let boom = null;
  for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) {
    const t = board[r][c];
    if (t && t.bomb) {
      t.timer--;
      if (t.timer <= 0) { if (!boom) boom = { r, c }; }
      else paintBomb(t);
    }
  }
  if (boom) { await explodeBomb(boom.r, boom.c); return; }   // về 0 → nổ & thua
  movesSinceBomb++;
  if (movesSinceBomb >= bombSpawnEvery() && bombCount() < MAX_BOMBS) {
    movesSinceBomb = 0;
    spawnBomb();
  }
}

// Sinh 1 bom ở ô ngẫu nhiên (thay 1 tile thường đang có trên bàn).
function spawnBomb() {
  const cells = [];
  for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) {
    const t = board[r][c];
    // chỉ thay viên thường — KHÔNG biến viên đặc biệt (sọc/gói/cầu vồng/sóng) thành bom
    if (t && !t.bomb && !t.special && !t.wave) cells.push([r, c]);
  }
  if (!cells.length) return;
  const [r, c] = cells[(Math.random() * cells.length) | 0];
  board[r][c].el.remove();
  const b = makeBomb(randBombStart());
  board[r][c] = b;
  const p = pos(r, c);
  b.el.style.transform = p;
  b.el.animate([
    { transform: p + ' scale(.2)', opacity: 0 },
    { transform: p + ' scale(1.2)', opacity: 1, offset: .6 },
    { transform: p },
  ], { duration: 360, easing: 'ease-out' });
  if (!hasAnyMove()) reshuffle(true);  // phòng khi bom chặn hết nước đi (kèm toast + anim)
}

// Bom nổ (đếm về 0) → đợi hạt nổ của lượt vừa rồi tan hết → NỔ LỚN → khựng 2s → Game Over.
const FX_SETTLE = 550;   // ms: thời gian đợi các hạt nổ của lượt trước tan hết
async function explodeBomb(r, c) {
  const t = board[r][c];
  const [cx, cy] = fxCenter(r, c);
  if (t) { t.el.remove(); board[r][c] = null; }
  await sleep(FX_SETTLE);   // đợi các hạt/hiệu ứng nổ của lượt vừa rồi tan hết
  bigBoom(cx, cy);
  await sleep(2000);        // khựng lại 2s cho người chơi thấy vụ nổ trước khi hiện màn thua
  gameOver();
}
// Nổ lớn (bom đếm ngược): chớp trắng bùng · rung màn · nhiều vòng sốc · cầu lửa · mảnh & tia lửa · khói

/* =====================================================================
 * 8. Score / HUD / end
 * ===================================================================== */
let dispScore = 0;        // điểm ĐANG hiển thị (chạy dần tới score)
let scoreRAF = 0;

function addScore(n, chainMul) {
  score += n * 10 * chainMul;
  if (score > best) { best = score; persistBest(); }   // lưu ngay; HUD Best chỉ refresh khi hết màn/ván mới (§1.2)
  if (!recordHit && runRecord > 0 && score > runRecord) {           // vừa vượt kỷ lục cũ
    recordHit = true; confetti(); spawnRecordToast();
  }
  // KHÔNG cập nhật số ngay — để đốm điểm bay về thẻ rồi số mới chạy dần lên (xem flyToScore)
}

// Số điểm CHẠY DẦN tới score (count-up)
function tweenScore() {
  if (scoreRAF) return;
  const step = () => {
    const diff = score - dispScore;
    if (diff <= 0.6) { dispScore = score; renderScore(); scoreRAF = 0; return; }
    dispScore = Math.min(score, dispScore + Math.max(1, diff * 0.16));
    renderScore();
    scoreRAF = requestAnimationFrame(step);
  };
  scoreRAF = requestAnimationFrame(step);
}
// Thẻ SCORE nảy nhẹ khi nhận điểm
function bumpScoreCard() {
  const val = document.getElementById('score-val');
  const box = val && val.closest('.sc-box');
  if (!box) return;
  box.animate([{ transform: 'scale(1)' }, { transform: 'scale(1.12)', offset: .4 }, { transform: 'scale(1)' }],
    { duration: 240, easing: 'ease-out' });
}
// Ghi nhận điểm — Hiệu ứng THU THẬP: nhiều NGÔI SAO nhỏ tản ra từ cụm nổ rồi
// hội tụ, bay theo đường cong (chậm rồi tăng tốc về đích) lên thẻ SCORE, kéo
// theo vệt sáng. Chạm bảng điểm → lóe sáng + thẻ nảy + số đếm tăng + tiếng "ting".
// count = số khối vừa ăn, chain = cấp combo → match lớn/combo: nhiều sao, nhanh & sáng hơn.
function flyToScore(bx, by, count, chain) {
  count = count || 1; chain = chain || 1;
  const scoreVal = document.getElementById('score-val');
  const target = scoreVal && scoreVal.closest('.sc-box');
  if (!target || !boardEl) { bumpScoreCard(); tweenScore(); return; }

  const bRect = boardEl.getBoundingClientRect();
  const tRect = target.getBoundingClientRect();
  const ox = bRect.left + bx, oy = bRect.top + by;             // tâm cụm nổ (viewport)
  const tx = tRect.left + tRect.width / 2;                     // đích: tâm thẻ SCORE
  const ty = tRect.top + tRect.height / 2;

  // MỖI khối ăn được = 1 ngôi sao bay lên (merge 3 cục → 3 sao); giới hạn 24 để khỏi quá tải
  const n = Math.max(1, Math.min(24, count));
  const rush = 1 - Math.min(0.36, (chain - 1) * 0.08);         // combo cao → bay nhanh hơn
  let landed = false;

  const onLanded = () => {                                     // sao ĐẦU TIÊN chạm bảng điểm
    if (landed) return; landed = true;
    scoreFlash(tx, ty);
    bumpScoreCard();
    tweenScore();
    Sound.sparkle();
  };

  const HOLD = 0.42;   // hiện lên xong KHỰNG tới mốc này (tỉ lệ thời gian) rồi mới bay
  const BURST = 430;   // chờ khối NỔ XONG (.clearing ~.42s) rồi ngôi sao mới hiện tại chỗ nổ

  for (let i = 0; i < n; i++) {
    // Xuất phát tản nhẹ quanh tâm rồi cùng hội tụ về thẻ
    const a = Math.random() * Math.PI * 2, rad = 6 + Math.random() * 26;
    const sx = ox + Math.cos(a) * rad, sy = oy + Math.sin(a) * rad;
    const dx = tx - sx, dy = ty - sy;

    const star = document.createElement('div');
    star.className = 'fx-star';
    star.textContent = '★';
    star.style.left = sx + 'px'; star.style.top = sy + 'px';
    star.style.fontSize = (15 + Math.random() * 11) + 'px';
    document.body.appendChild(star);

    const dur = (1100 + Math.random() * 280 + i * 40) * rush;
    const delay = BURST + i * 44 + Math.random() * 50;   // sau khi nổ xong mới xuất hiện
    const spin = (Math.random() * 360 - 60) | 0;

    const r1 = (spin * .06) | 0, r2 = (spin * .15) | 0;
    const anim = star.animate([
      // Hiện lên NẢY MÚP (squash & stretch jelly) rồi ĐỨNG YÊN tại chỗ (khựng)...
      { offset: 0,     transform: 'translate(-50%,-50%) scale(.2) rotate(0deg)', opacity: 0, easing: 'cubic-bezier(.2,1.5,.5,1)' },
      { offset: .10,   transform: 'translate(-50%,-50%) scale(1.5, 1.32) rotate(' + r1 + 'deg)', opacity: 1, easing: 'ease-out' },   // vọt phồng
      { offset: .17,   transform: 'translate(-50%,-52%) scale(1.16, .82) rotate(' + r1 + 'deg)', opacity: 1, easing: 'ease-in-out' }, // dẹt xuống (múp)
      { offset: .25,   transform: 'translate(-50%,-49%) scale(.92, 1.12) rotate(' + r2 + 'deg)', opacity: 1, easing: 'ease-in-out' }, // bật cao lại
      { offset: .33,   transform: 'translate(-50%,-50%) scale(1.06, .96) rotate(' + r2 + 'deg)', opacity: 1, easing: 'ease-out' },    // nảy nhỏ dần
      { offset: HOLD,  transform: 'translate(-50%,-50%) scale(1) rotate(' + r2 + 'deg)', opacity: 1, easing: 'cubic-bezier(.5,0,.85,1)' }, // yên
      // ...rồi BAY THẲNG về thẻ SCORE, tăng tốc dần (hơi kéo dãn theo hướng bay)
      { offset: .55,   transform: 'translate(calc(-50% + ' + (dx * .12) + 'px), calc(-50% + ' + (dy * .12) + 'px)) scale(1.12, .9) rotate(' + ((spin * .4) | 0) + 'deg)', opacity: 1 },
      { offset: 1,     transform: 'translate(calc(-50% + ' + dx + 'px), calc(-50% + ' + dy + 'px)) scale(.42) rotate(' + spin + 'deg)', opacity: .95 },
    ], { duration: dur, delay: delay, fill: 'both' });

    anim.onfinish = () => { star.remove(); onLanded(); };
  }
}

// Lóe sáng tại bảng điểm khi ngôi sao chạm vào
function scoreFlash(x, y) {
  const f = document.createElement('div');
  f.className = 'fx-score-flash';
  f.style.left = x + 'px'; f.style.top = y + 'px';
  document.body.appendChild(f);
  f.animate([
    { transform: 'translate(-50%,-50%) scale(.3)', opacity: .9 },
    { transform: 'translate(-50%,-50%) scale(1.15)', opacity: 0 },
  ], { duration: 340, easing: 'ease-out', fill: 'both' }).onfinish = () => f.remove();
}
/* Co cỡ chữ SỐ trong mỗi khung điểm để LUÔN vừa khung (số lớn → nhỏ dần, không bị cắt). */
function fitHudScores() {
  document.querySelectorAll('.scorebar .sc-box').forEach((box) => {
    const v = box.querySelector('.sc-v');
    if (!v) return;
    v.style.fontSize = '';                                   // reset về cỡ CSS trước khi đo
    const cs = getComputedStyle(box);
    const avail = box.clientWidth - parseFloat(cs.paddingLeft) - parseFloat(cs.paddingRight);
    if (avail <= 0) return;
    let fz = parseFloat(getComputedStyle(v).fontSize) || 26;
    while (v.scrollWidth > avail && fz > 10) { fz -= 1; v.style.fontSize = fz + 'px'; }
  });
}

function renderScore() {
  const val = document.getElementById('score-val');
  if (val) val.textContent = Math.round(dispScore);
  fitHudScores();
}

const LS_KEY = 'skydom_save';
function readLocal() { try { return localStorage.getItem(LS_KEY) || ''; } catch (e) { return ''; } }
function saveLocal(obj) { try { localStorage.setItem(LS_KEY, JSON.stringify(obj)); } catch (e) { /* quota */ } }
function getInitialData() {

async function settleAfterMove() {

/* =====================================================================
 * 9. No-move detection + reshuffle
 * ===================================================================== */
function hasAnyMove() {
  for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) {
    const t = board[r][c];
    if (!t || t.bomb) continue;                          // bom không di chuyển được
    if (t.special) return true;                          // special luôn dùng được
    for (const [nr, nc] of [[r, c + 1], [r + 1, c]]) {
      if (!inb(nr, nc)) continue;
      const nt = board[nr][nc];
      if (!nt || nt.bomb) continue;                      // không đổi chỗ với bom
      swapPlain(r, c, nr, nc);
      const ok = anyMatch(null);
      swapPlain(r, c, nr, nc);
      if (ok) return true;
    }
  }
  return false;
}
function swapPlain(r1, c1, r2, c2) {
  const t = board[r1][c1]; board[r1][c1] = board[r2][c2]; board[r2][c2] = t;
}
function reshuffle(announce) {
  let tries = 0;
  do {
    const cells = [], colors = [];
    for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) {
      const t = board[r][c];
      if (t && !t.bomb) { cells.push([r, c]); colors.push(t.color); }  // chừa bom tại chỗ
    }
    for (let i = colors.length - 1; i > 0; i--) {
      const j = (Math.random() * (i + 1)) | 0;
      [colors[i], colors[j]] = [colors[j], colors[i]];
    }
    cells.forEach(([r, c], i) => { board[r][c].color = colors[i]; paintTile(board[r][c]); });
    tries++;
  } while ((anyMatch(null) || !hasAnyMove()) && tries < 40);
  layout();
  if (announce) shuffleFx();   // toast + animation khi xáo do kẹt (không dùng lúc dựng bàn)
}

// Hiệu ứng xáo bài: pop-xoay từng ô (lệch pha nhẹ) + toast giữa bàn
function shuffleFx() {
  for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) {
    const tl = board[r][c];

    const p = pos(r, c);

      { transform: p + ' scale(1) rotate(0deg)' },
    ], { duration: 520, easing: 'ease-in-out', delay: ((r + c) % 6) * 35 });
  }
  spawnToast(t('shuffle'));
}

/* =====================================================================
 * 9b. Gợi ý nước đi (hint khi để yên lâu)
 * ===================================================================== */
let idleTimer = null;
let hintCells = [];
const IDLE_MS = 5000;

// Tìm 1 nước đi: ưu tiên cặp swap tạo match → trả về { mover, dest, matchers }
//   mover  = viên người chơi cần KÉO (nhích về phía dest + lắc)
//   dest   = ô đích khi kéo (để suy ra hướng nhích)
//   matchers = các viên sẽ ghép cùng (lắc tại chỗ)
// Nếu không có swap nào, trỏ vào 1 special: { special }.
function findHint() {
  for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) {
    const t = board[r][c];
    if (!t || t.bomb) continue;
    for (const [nr, nc] of [[r, c + 1], [r + 1, c]]) {
      if (!inb(nr, nc)) continue;
      const nt = board[nr][nc];
      if (!nt || nt.bomb) continue;
      swapPlain(r, c, nr, nc);
      const mm = findMatches(null);
      swapPlain(r, c, nr, nc);
      if (mm.clearCells.size || mm.specialPlans.length) {
        // Tập ô được ghép sau khi đổi chỗ (gồm cả ô sinh special)
        const M = new Set(mm.clearCells);
        for (const p of mm.specialPlans) M.add(key(p.r, p.c));
        // Viên nào rơi vào tập match ở ô đích thì đó là viên cần kéo
        let mover, dest;
        if (M.has(key(nr, nc))) { mover = { r, c }; dest = { r: nr, c: nc }; }
        else { mover = { r: nr, c: nc }; dest = { r, c }; }
        const matchers = [];
        for (const k of M) {
          if (k === key(dest.r, dest.c)) continue;   // ô đích là chỗ viên kéo tới → không lắc tại chỗ
          const [mr, mc] = k.split(',').map(Number);
          matchers.push({ r: mr, c: mc });
        }
        return { mover, dest, matchers };
      }
    }
  }
  for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) {
    const t = board[r][c];
    if (t && t.special) return { special: { r, c } };
  }
  return null;
}
function clearHint() {
  for (const t of hintCells) if (t.el) {
    t.el.classList.remove('hint-move', 'hint-shake');
    if (t.face) { t.face.style.removeProperty('--nx'); t.face.style.removeProperty('--ny'); }
  }
  hintCells = [];
}
function showHint() {
  clearHint();
  if (busy || ended || onboarding) return;   // đang onboarding → không chèn gợi ý idle
  const h = findHint();
  if (!h) return;
  if (h.special) {   // special đơn lẻ: lắc tại chỗ nhắc "dùng được"
    const t = board[h.special.r][h.special.c];
    if (t) { t.el.classList.add('hint-shake'); hintCells.push(t); }
    return;
  }
  // Viên cần kéo: nhích 1 chút về hướng dest rồi lắc
  const mv = board[h.mover.r][h.mover.c];
  if (mv) {
    const nd = Math.max(3, cell * 0.14);                       // quãng nhích nhẹ ~14% ô
    mv.face.style.setProperty('--nx', ((h.dest.c - h.mover.c) * nd) + 'px');
    mv.face.style.setProperty('--ny', ((h.dest.r - h.mover.r) * nd) + 'px');
    mv.el.classList.add('hint-move');
    hintCells.push(mv);
  }
  // Các viên sẽ ghép cùng: lắc tại chỗ
  for (const p of h.matchers) {
    const t = board[p.r] && board[p.r][p.c];
    if (t) { t.el.classList.add('hint-shake'); hintCells.push(t); }
  }
}
function resetIdle() {
  clearHint();
  if (idleTimer) { clearTimeout(idleTimer); idleTimer = null; }
  if (busy || ended || onboarding) return;   // đang onboarding → chưa cần gợi ý idle
  idleTimer = setTimeout(showHint, IDLE_MS);
}

function buildOnboardDOM() {

function finishOnboarding() {
  obClearTimers();

    setTimeout(() => { if (el && el.parentNode) el.remove(); }, 320);

function obGem(stage, r, c, color, special) {
  const d = document.createElement('div'); d.className = 'ob-cell';
  d.style.left = (c * OB_STEP) + 'px'; d.style.top = (r * OB_STEP) + 'px';
  d.innerHTML = shapeSvg(color, special || null, 'ob' + (++obUid));
  stage.appendChild(d); return d;
}
function obMarkAt(stage, r, c, delay) {
  const m = document.createElement('div'); m.className = 'ob-mark';
  m.style.left = (c * OB_STEP) + 'px'; m.style.top = (r * OB_STEP) + 'px';
  stage.appendChild(m);
  m.animate([{ opacity: 0 }, { opacity: 1 }], { duration: 180, delay: delay || 0, fill: 'forwards' });
  return m;
}
function obPop(el, delay) {
  el.animate([
    { transform: 'scale(1)', opacity: 1 },
    { transform: 'scale(1.28)', opacity: 1, offset: .3 },
    { transform: 'scale(0)', opacity: 0 },
  ], { duration: 430, delay: delay || 0, easing: 'ease-in', fill: 'forwards' });
}
// Hiệu ứng "match": chớp trắng + mảnh vỡ bắn ra tại ô nổ (color = index màu, hoặc 'rb' = cầu vồng nhiều màu)
function obBurst(stage, r, c, color, delay) {
  const cx = c * OB_STEP + OB_SZ / 2, cy = r * OB_STEP + OB_SZ / 2;
  const fl = document.createElement('div'); fl.className = 'ob-flash';
  fl.style.left = cx + 'px'; fl.style.top = cy + 'px'; stage.appendChild(fl);
  fl.animate([
    { transform: 'translate(-50%,-50%) scale(.4)', opacity: .9 },
    { transform: 'translate(-50%,-50%) scale(1.7)', opacity: 0 },
  ], { duration: 380, delay: delay || 0, easing: 'ease-out', fill: 'forwards' }).onfinish = () => fl.remove();
  for (let k = 0; k < 6; k++) {
    const p = document.createElement('div'); p.className = 'ob-shard';
    const col = color === 'rb' ? COLORS[k % COLORS.length] : (COLORS[color] || '#fff');
    p.style.left = cx + 'px'; p.style.top = cy + 'px'; p.style.background = col; p.style.color = col;
    stage.appendChild(p);
    const ang = (k / 6) * Math.PI * 2 + 0.3, dist = 17 + (k % 3) * 6;
    const dx = Math.cos(ang) * dist, dy = Math.sin(ang) * dist;
    p.animate([
      { transform: 'translate(-50%,-50%) scale(1)', opacity: 1 },
      { transform: 'translate(calc(-50% + ' + dx + 'px), calc(-50% + ' + dy + 'px)) scale(.2)', opacity: 0 },
    ], { duration: 440, delay: delay || 0, easing: 'cubic-bezier(.3,.6,.4,1)', fill: 'forwards' }).onfinish = () => p.remove();
  }
}
// Nổ 1 viên trong demo: co nhỏ (pop) + hiệu ứng match (mảnh vỡ) ngay sau đó
function obClear(stage, gem, r, c, color, delay) {
  obPop(gem, delay);
  obBurst(stage, r, c, color, (delay || 0) + 150);
}
// "Ngón tay" ảo kéo từ ô (fromR,fromC) sang (toR,toC)
function obHand(stage, fromR, fromC, toR, toC, delay, dur) {
  const hand = document.createElement('div'); hand.className = 'ob-hand';
  hand.style.left = (fromC * OB_STEP + OB_SZ / 2 - 12) + 'px';
  hand.style.top = (fromR * OB_STEP + OB_SZ / 2 - 12) + 'px';
  stage.appendChild(hand);
  const dx = (toC - fromC) * OB_STEP, dy = (toR - fromR) * OB_STEP;
  hand.animate([
    { transform: 'translate(0,0)', opacity: 0 }, { transform: 'translate(0,0)', opacity: 1, offset: .18 },
    { transform: 'translate(' + dx + 'px,' + dy + 'px)', opacity: 1, offset: .9 }, { transform: 'translate(' + dx + 'px,' + dy + 'px)', opacity: 0 },
  ], { duration: dur || 900, delay: delay || 0, fill: 'forwards' });

}
// Trượt 1 viên sang ô kề (đổi chỗ) — animate transform, giữ nguyên vị trí cuối
function obSlide(gem, dR, dC, delay, dur) {
  gem.animate([{ transform: 'translate(0,0)' }, { transform: 'translate(' + (dC * OB_STEP) + 'px,' + (dR * OB_STEP) + 'px)' }],
    { duration: dur || 500, delay: delay || 0, easing: 'ease-in-out', fill: 'forwards' });
}
// Chốt viên về đúng ô: huỷ animation trượt (fill) rồi đặt lại left/top để pop/morph tại chỗ
function obSettle(gem, r, c) {
  gem.getAnimations().forEach(a => a.cancel());
  gem.style.transform = ''; gem.style.left = (c * OB_STEP) + 'px'; gem.style.top = (r * OB_STEP) + 'px';
}
// Tia sáng quét ngang 1 hàng (kẹo sọc kích hoạt)

// Vòng sóng lan ra từ 1 ô (bom gói kích hoạt)

// Tia xẹt cầu vồng: sét zíc-zắc nhiều màu nối từ (sr,sc) tới các viên đích, giật giật rồi tắt khi nổ
function obZaps(stage, sr, sc, targets, holdMs) {
  const NS = 'http://www.w3.org/2000/svg';
  const w = parseFloat(stage.style.width) || 0, h = parseFloat(stage.style.height) || 0;
  const svg = document.createElementNS(NS, 'svg');
  svg.setAttribute('width', w); svg.setAttribute('height', h);
  svg.style.cssText = 'position:absolute;left:0;top:0;z-index:9;pointer-events:none;overflow:visible';
  stage.appendChild(svg);
  const SP = ['#ff4d6a', '#ffcf3a', '#2ed673', '#3aa0ff', '#b268ff', '#ff9838'];
  const ctr = (r, c) => [c * OB_STEP + OB_SZ / 2, r * OB_STEP + OB_SZ / 2];
  const [sx, sy] = ctr(sr, sc);
  const jag = (x1, y1, x2, y2) => {
    const dx = x2 - x1, dy = y2 - y1, len = Math.hypot(dx, dy) || 1;
    const nx = -dy / len, ny = dx / len, segs = 5;
    let d = 'M' + x1.toFixed(1) + ' ' + y1.toFixed(1);
    for (let i = 1; i < segs; i++) {
      const t = i / segs, off = (Math.random() * 2 - 1) * Math.min(12, len * 0.18);
      d += ' L' + (x1 + dx * t + nx * off).toFixed(1) + ' ' + (y1 + dy * t + ny * off).toFixed(1);
    }
    return d + ' L' + x2.toFixed(1) + ' ' + y2.toFixed(1);
  };
  let i = 0;
  for (const [tr, tc] of targets) {
    const [tx, ty] = ctr(tr, tc);
    const g = document.createElementNS(NS, 'g');
    const glow = document.createElementNS(NS, 'path');
    glow.setAttribute('d', jag(sx, sy, tx, ty)); glow.setAttribute('fill', 'none');
    glow.setAttribute('stroke', SP[i++ % SP.length]); glow.setAttribute('stroke-width', '5'); glow.setAttribute('stroke-opacity', '.5');
    glow.setAttribute('stroke-linecap', 'round'); glow.setAttribute('stroke-linejoin', 'round');
    const core = document.createElementNS(NS, 'path');
    core.setAttribute('d', jag(sx, sy, tx, ty)); core.setAttribute('fill', 'none');
    core.setAttribute('stroke', '#fff'); core.setAttribute('stroke-width', '1.8');
    core.setAttribute('stroke-linecap', 'round'); core.setAttribute('stroke-linejoin', 'round');
    g.appendChild(glow); g.appendChild(core); svg.appendChild(g);
    g.animate([                                                       // hiện + giữ + giật giật
      { opacity: 0 }, { opacity: 1, offset: .2 }, { opacity: .55, offset: .45 },
      { opacity: 1, offset: .65 }, { opacity: .7, offset: .82 }, { opacity: 1, offset: 1 },
    ], { duration: holdMs, easing: 'linear', fill: 'forwards' });
    g.animate([{ opacity: 1 }, { opacity: 0 }], { duration: 180, delay: holdMs, easing: 'ease-out', fill: 'forwards' });
    for (let fk = 1; fk <= 3; fk++) obTimers.push(setTimeout(() => { const d = jag(sx, sy, tx, ty); glow.setAttribute('d', d); core.setAttribute('d', d); }, holdMs * fk / 4));
  }
  obTimers.push(setTimeout(() => svg.remove(), holdMs + 320));
}
// Biến 1 viên thường thành special (đổi hình + nảy nhẹ)
function obMorph(gem, color, special) {

// Viên mới RƠI xuống lấp ô trống (sau khi nổ tạo special)

const OB_DEMOS = {

  rainbow(stage) {

  // BOM ĐẾM NGƯỢC: cho nổ trúng ô KỀ để gỡ (nếu về 0 sẽ nổ & thua)

    const a1 = obGem(stage, 1, 0, 0);                                    // đỏ (cột 0, KỀ bom)
    const bomb = obBombCell(stage, 1, 1, 3, true);                       // bom "3"
    obGem(stage, 1, 2, 4);
    const tgt = obGem(stage, 2, 0, 1);                                   // xanh ở đích (2,0)
    const drag = obGem(stage, 2, 1, 0);                                  // đỏ kéo sang trái
    obGem(stage, 2, 2, 2);
    obTimers.push(setTimeout(() => { const s = bomb.querySelector('span'); if (s) s.textContent = '2'; bomb.animate([{ transform: 'scale(1)' }, { transform: 'scale(1.12)', offset: .5 }, { transform: 'scale(1)' }], { duration: 260 }); }, 260));
    obHand(stage, 2, 1, 2, 0, 480, 900);
    obSlide(drag, 0, -1, 780, 520); obSlide(tgt, 0, 1, 780, 520);
    const M = 1420;
    obTimers.push(setTimeout(() => {                                     // cột 0 = 3 đỏ (kề bom) → sáng
      obSettle(drag, 2, 0);
      obMarkAt(stage, 0, 0); obMarkAt(stage, 1, 0); obMarkAt(stage, 2, 0);
    }, M));
    obTimers.push(setTimeout(() => {                                     // nổ cột 0 + GỠ bom (+50)
      obClear(stage, a0, 0, 0, 0, 0); obClear(stage, a1, 1, 0, 0, 0); obClear(stage, drag, 2, 0, 0, 0);
      obPop(bomb, 120); obBurst(stage, 1, 1, 3, 260); obFloat(stage, 1, 1, '+50', 200);
    }, M + 320));
    return M + 320 + 700;
  },
};

/* =====================================================================
 * 10. Build board / new run
 * ===================================================================== */
function buildBoard() {
  boardEl.innerHTML = '';
  board = Array.from({ length: ROWS }, () => new Array(COLS).fill(null));
  for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) {
    let color;
    let guard = 0;
    do {
      color = randColor();
      guard++;
    } while (guard < 40 && (
      (c >= 2 && board[r][c - 1] && board[r][c - 2] &&
        board[r][c - 1].color === color && board[r][c - 2].color === color) ||
      (r >= 2 && board[r - 1][c] && board[r - 2][c] &&
        board[r - 1][c].color === color && board[r - 2][c].color === color)
    ));
    board[r][c] = makeTile(color);
  }
  if (!hasAnyMove()) reshuffle();
  resize();
}

function newRun() {
  score = 0;
  dispScore = 0;         // reset số hiển thị (count-up)
  if (scoreRAF) { cancelAnimationFrame(scoreRAF); scoreRAF = 0; }
  runRecord = best;      // mốc kỷ lục để mừng khi vượt trong ván này
  recordHit = false;
  ended = false;
  busy = false;
  cascading = false; stableWindow = false; injectedSwaps = [];
  sel = null;
  moves = 0;
  movesSinceBomb = 0;
  const ov = document.getElementById('overlay');
  if (ov) ov.classList.add('hidden');
  buildBoard();
  renderScore();
  renderBest();
  resetIdle();           // bắt đầu đếm giờ gợi ý cho ván mới
  if (!tutorialSeen) startOnboarding();   // lần đầu chơi: chuỗi popup mẫu → rồi mới vào game
}

/* Game Over (bom nổ) — game điểm-cao tự vẽ popup (popup-common) */
function gameOver() {
  if (ended) return;
  ended = true;
  clearHint();
  if (idleTimer) { clearTimeout(idleTimer); idleTimer = null; }
  const isNew = recordHit || score > runRecord;
  document.getElementById('ov-title').textContent = isNew ? t('newBest') : t('gameOver');
  document.getElementById('ov-score').textContent = score;
  document.getElementById('ov-best').textContent = best;
  renderBest();                 // refresh HUD Best khi hết màn (§1.2)
  fitScores();
  sendMessage('game_result');   // endless: result=null, showModal=false
  setTimeout(() => document.getElementById('overlay').classList.remove('hidden'), 550);
}
// Tự co cỡ điểm cho vừa card khi điểm nhiều chữ số (popup-common §5b)
function fitScores() {
  const r = document.querySelector('.sb'); if (!r) return;
  const card = r.closest('.card');
  const vals = r.querySelectorAll('.v');
  vals.forEach(v => { v.style.fontSize = ''; });
  const pad = parseFloat(getComputedStyle(card).paddingLeft) || 26;
  const max = card.clientWidth - 2 * pad;
  let fz = parseFloat(getComputedStyle(vals[0]).fontSize) || 32;
  while (r.scrollWidth > max && fz > 14) { fz -= 1; vals.forEach(v => { v.style.fontSize = fz + 'px'; }); }
}

/* =====================================================================
 * 11. Input (tap + swipe)
 * ===================================================================== */
function cellFromEvent(e) {
  const rect = boardEl.getBoundingClientRect();
  const c = Math.floor((e.clientX - rect.left) / cell);
  const r = Math.floor((e.clientY - rect.top) / cell);
  return inb(r, c) ? { r, c } : null;
}
function clearSelection() {
  if (sel && board[sel.r] && board[sel.r][sel.c]) board[sel.r][sel.c].el.classList.remove('sel');
  sel = null;
}
function selectCell(p) {
  clearSelection();
  const t = board[p.r][p.c];
  if (!t || t.bomb) return;         // bom không chọn/đổi chỗ được
  sel = p;
  t.el.classList.add('sel');
}

let downCell = null, downX = 0, downY = 0, swiped = false;
boardEl.addEventListener('pointerdown', (e) => {
  resetIdle();               // chạm bàn → tắt hint, hẹn lại giờ gợi ý
  if (ended) return;         // đang nổ vẫn cho chạm (để CHÈN nước đi viên tĩnh)
  const p = cellFromEvent(e);
  if (!p) return;
  downCell = p; downX = e.clientX; downY = e.clientY; swiped = false;
});
boardEl.addEventListener('pointermove', (e) => {
  if (ended || !downCell || swiped) return;
  const dx = e.clientX - downX, dy = e.clientY - downY;
  if (Math.abs(dx) < cell * 0.4 && Math.abs(dy) < cell * 0.4) return;
  swiped = true;
  let nr = downCell.r, nc = downCell.c;
  if (Math.abs(dx) > Math.abs(dy)) nc += dx > 0 ? 1 : -1;
  else nr += dy > 0 ? 1 : -1;
  if (inb(nr, nc)) requestMove(downCell, { r: nr, c: nc });
  downCell = null;
});
window.addEventListener('pointerup', (e) => {
  if (ended || !downCell || swiped) { downCell = null; return; }
  const p = downCell; downCell = null;
  if (sel) {
    if (sel.r === p.r && sel.c === p.c) { clearSelection(); return; }
    if (Math.abs(sel.r - p.r) + Math.abs(sel.c - p.c) === 1) {
      const a = sel; clearSelection(); requestMove(a, p); return;
    }
  }
  if (!busy) selectCell(p);   // chọn-để-đổi chỉ khi rảnh (đang nổ dùng vuốt để chèn)
});

/* =====================================================================
 * 12. HUD buttons + native callbacks
 * ===================================================================== */
document.getElementById('back-btn').addEventListener('click', (e) => {
  e.stopPropagation(); sendMessage('quit');
});
document.getElementById('ov-btn').addEventListener('click', (e) => {
  e.stopPropagation();
  sendMessage('retry_level');     // game điểm-cao tự lo Play Again (game-common §1.1)
  newRun();
});

// Nút tắt/bật tiếng
const soundBtn = document.getElementById('sound-btn');
function renderSoundBtn() { soundBtn.classList.toggle('muted', Sound.isMuted()); }
soundBtn.addEventListener('click', (e) => {
  e.stopPropagation();
  Sound.ensure(); Sound.resume();
  Sound.setMuted(!Sound.isMuted());
  renderSoundBtn();
  persistBest();                          // lưu lựa chọn tắt/bật tiếng
});

// Mở khoá AudioContext ở lần chạm đầu (chính sách autoplay mobile); thường trực để resume sau pause
function unlockAudio() { Sound.ensure(); Sound.resume(); Sound.startMusic(); }
window.addEventListener('pointerdown', unlockAudio);
window.addEventListener('touchstart', unlockAudio, { passive: true });

window.onAppPause = function () { Sound.suspend(); };   // ra nền → tạm dừng audio
window.onAppResume = function () { Sound.resume(); };
window.onRetryLevel = function () { newRun(); };   // native gọi thì vẫn an toàn

/* =====================================================================
 * 13. Boot
 * ===================================================================== */
function applyStaticI18n() {
  document.getElementById('score-k').textContent = t('score');
  document.getElementById('best-k').textContent = t('best');
  document.getElementById('ov-score-k').textContent = t('score');
  document.getElementById('ov-best-k').textContent = t('best');
  document.getElementById('ov-btn-label').textContent = t('playAgain');
}
function applyStatusBarPad() {
  const sb = getStatusBarHeight();
  document.getElementById('topbar').style.paddingTop =
    'calc(max(' + sb + 'px, env(safe-area-inset-top)) + 28px)';
}

function boot() {
  LANG = getLanguage();
  applyUiFont(LANG);
  applyStatusBarPad();
  applyStaticI18n();
  loadPersist();
  renderSoundBtn();
  newRun();
}

// Tính lại kích thước khi: đổi cỡ, xoay, tải xong, và khi FONT web nạp trễ
// (font đổi chiều cao HUD sau khi resize() đầu đã chạy → phải đo lại, tránh lệch).
window.addEventListener('resize', () => { resize(); fitHudScores(); });
window.addEventListener('orientationchange', () => setTimeout(resize, 120));
window.addEventListener('load', () => { resize(); setTimeout(resize, 250); });
if (document.fonts && document.fonts.ready) document.fonts.ready.then(() => resize());

/* =====================================================================
 * 14. Debug bridge (CHỈ khi ?debug=1) — cho màn test.html điều khiển engine
 * Không ảnh hưởng production: native nạp index.html KHÔNG có debug=1 nên
 * IIFE này thoát ngay, không gắn listener, không đổi hành vi game.
 * Giao tiếp qua postMessage → chạy được cả file:// (cross-origin an toàn).
 * ===================================================================== */
(function debugBridge() {
  if (new URLSearchParams(location.search).get('debug') !== '1') return;

  const dbgClearCell = (r, c) => {
    if (!inb(r, c)) return;
    const t = board[r][c];
    if (t) { t.el.remove(); board[r][c] = null; }
  };
  const dbgClearAll = () => { for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) dbgClearCell(r, c); };
  // Nền caro 2 màu (vàng/tím) — KHÔNG bao giờ có 3-liên-tiếp → không match ngoài ý muốn
  const dbgFillChecker = () => {
    for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++)
      if (!board[r][c]) board[r][c] = makeTile((r + c) % 2 ? 3 : 4);
  };
  const dbgPlace = (r, c, color, special) => {
    if (!inb(r, c)) return;
    dbgClearCell(r, c);
    board[r][c] = makeTile(color || 0, special || null);
  };
  const dbgPlaceBomb = (r, c, timer) => {
    if (!inb(r, c)) return;
    dbgClearCell(r, c);
    board[r][c] = makeBomb(timer);
  };
  const dbgStopIdle = () => { if (idleTimer) { clearTimeout(idleTimer); idleTimer = null; } clearHint(); };

  // Vẽ lại toàn bộ viên thường trên bàn (áp cấu hình LIGHT mới)
  const dbgRepaint = () => {
    for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) {
      const t = board[r][c];
      if (t && !t.bomb) paintTile(t);
    }
  };

  function dbgSetup(m) {
    dbgStopIdle();
    ended = false; busy = false; cascading = false; stableWindow = false; injectedSwaps = [];
    const ov = document.getElementById('overlay'); if (ov) ov.classList.add('hidden');
    if (m.clear !== false) dbgClearAll();
    if (m.fill !== 'none') dbgFillChecker();
    (m.tiles || []).forEach((t) => {
      if (t.bomb != null) dbgPlaceBomb(t.r, t.c, t.bomb);
      else dbgPlace(t.r, t.c, t.color, t.special);
    });
    layout();
    if (m.swap) setTimeout(() => tryMove(m.swap[0], m.swap[1]), m.swapDelay || 550);
    else if (m.tick) setTimeout(() => onMoveResolved(), m.swapDelay || 450);
  }

  window.addEventListener('message', function (e) {
    const m = e.data;
    if (!m || m.__skydom !== 'cmd') return;
    const ack = (data) => { try { e.source.postMessage({ __skydom: 'ack', id: m.id, data: data || { ok: true } }, '*'); } catch (_) {} };
    try {
      switch (m.op) {
        case 'reset': newRun(); ack(); break;
        case 'setup': dbgSetup(m); ack(); break;
        case 'place': dbgStopIdle(); dbgPlace(m.r, m.c, m.color, m.special); layout(); ack(); break;
        case 'placeBomb': dbgStopIdle(); dbgPlaceBomb(m.r, m.c, m.timer); layout(); ack(); break;
        case 'clearCell': dbgStopIdle(); dbgClearCell(m.r, m.c); layout(); ack(); break;
        case 'tryMove': tryMove(m.a, m.b); ack(); break;
        case 'geom': { const b = boardEl.getBoundingClientRect(); ack({ left: b.left, top: b.top, cell: cell, size: b.width, rows: ROWS, cols: COLS }); break; }
        case 'getLight': ack({ light: LIGHT, def: LIGHT_DEFAULT }); break;
        case 'setLight':
          if (m.color != null && m.patch) { Object.assign(LIGHT[m.color], m.patch); dbgRepaint(); }
          ack(); break;
        case 'fillColor':   // phủ cả bàn 1 màu để xem thử loại viên đó
          dbgStopIdle(); dbgClearAll();
          for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) board[r][c] = makeTile(m.color, m.special || null);
          layout(); ack(); break;
        case 'onboard':     // xem lại chuỗi popup onboarding từ đầu
          tutorialSeen = false; startOnboarding(); ack(); break;
        default: ack({ ok: false });
      }
    } catch (err) { ack({ ok: false, error: String(err) }); }
  });

  // Báo cho màn test biết bridge đã sẵn sàng (test.html cũng chủ động poll)
  try { if (window.parent && window.parent !== window) window.parent.postMessage({ __skydom: 'ready' }, '*'); } catch (_) {}
})();

// Đợi native inject (chống race) — game-common §3
(function waitForNativeInjection() {
  const start = Date.now();
  (function check() {
    if (typeof window.language === 'string' ||
        typeof window.data === 'string' ||
        Date.now() - start > 200) {
      boot();
    } else {
      setTimeout(check, 10);
    }
  })();
})();
</script>
