<!--
  Skydom — HaND
  Match-3 score-attack (endless, KHÔNG level), flat theme. Single-file HTML.
  Tuân thủ .claude/game-common.md (bridge), popup-common.md, zip-common.md.
-->
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<title>Skydom</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Google+Sans+Flex:opsz,wght@6..144,1..1000&display=swap" rel="stylesheet" />

<style>
  /* ── Reset + tắt highlight khi chạm (game-common §UI) ─────────────── */
  *, *::before, *::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    -webkit-tap-highlight-color: transparent;
    -webkit-touch-callout: none;
  }

  :root {
    --ui-font: 'Google Sans Flex', system-ui, sans-serif;
    /* Dark navy theme — khớp màu màn Game Over */
    --bg-1: #1c2f63;
    --bg-2: #0c1838;
    --board-bg: #22386a;   /* bảng bàn cờ + thẻ điểm + nút */
    --cell-bg: #2f4880;    /* ô lưới (navy sáng hơn để thấy lưới) */
    --ink: #eaf1ff;
    --ink-soft: #9fc0ff;
    --royal: #3b5bdb;
    --gold: #ffd23f;
    --green: #34e07a;
    --danger: #ff5a5f;
    --cell: 40px; /* set bởi JS */
  }

  html, body {
    height: 100%;
    overflow: hidden;
  }
  body {
    font-family: var(--ui-font);
    font-weight: 700;
    color: var(--ink);
    background: linear-gradient(180deg, var(--bg-1), var(--bg-2));
    -webkit-user-select: none;
    user-select: none;
    touch-action: none;
  }

  .app {
    position: relative;
    width: 100%;
    height: 100%;
  }
  /* HUD nổi ở đỉnh (không chiếm chỗ) để lưới căn giữa toàn màn hình */
  .hud {
    position: absolute;
    top: 0; left: 0; right: 0;
    z-index: 5;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* ── HUD trên cùng ────────────────────────────────────────────────── */
  .topbar {
    width: 100%;
    max-width: 560px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    padding: 0 14px;
    /* padding-top set bởi JS = max(statusBar, safe) + 8 */
  }
  .top-center {
    display: flex;
    flex-direction: column;
    align-items: center;
    line-height: 1.1;
  }
  /* Btn3d — biến thể flat (shadow ẩn), icon vuông */
  .btn3d {
    --radius: 14px;
    --surface-color: var(--board-bg);
    --surface-text: var(--ink-soft);
    position: relative;
    display: inline-block;
    padding: 0;
    border: 0;
    background: transparent;
    cursor: pointer;
    font: inherit;
    color: inherit;
  }
  .btn3d-shadow { display: none; }
  .btn3d-surface {
    position: relative;
    z-index: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: var(--radius);
    background-color: var(--surface-color);
    color: var(--surface-text);
    box-shadow: 0 3px 0 rgba(59, 91, 219, .18), 0 6px 14px rgba(36, 48, 77, .12);
    transition: transform .09s ease-out;
  }
  .btn3d:active .btn3d-surface { transform: scale(.95); }
  .btn3d.btn-icon .btn3d-surface { width: 46px; height: 46px; }
  .btn3d.btn-icon { -webkit-user-select: none; user-select: none; }
  .back-ico { width: 52%; height: 52%; fill: currentColor; display: block; }
  .restart-ico { width: 62%; height: 62%; fill: currentColor; display: block; }
  .sound-ico { width: 60%; height: 60%; display: block; }
  #sound-btn.muted .snd-on { display: none; }
  #sound-btn:not(.muted) .snd-off { display: none; }

  /* ── Thanh điểm (Score / Best) — cụm giữa, cùng hàng với 2 nút ────── */
  .scorebar {
    flex: 1;
    min-width: 0;
    display: flex;
    justify-content: center;
    gap: 10px;
    padding: 0 8px;
  }
  /* Hai khung điểm dạng thẻ: nền trắng, bo góc lớn, đổ bóng nhẹ */
  .sc-box {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    line-height: 1.02;
    min-width: 0;
    flex: 1 1 0;
    max-width: 150px;
    padding: 5px 12px 7px;
    background: var(--board-bg);
    border-radius: 16px;
    box-shadow: 0 4px 14px rgba(36, 48, 77, .12);
  }
  .sc-k {
    font-size: 10px; letter-spacing: 1.5px; font-weight: 800;
    color: var(--ink-soft); text-transform: uppercase;
  }
  .sc-v { font-size: 26px; color: var(--ink); }
  .sc-v.best { color: var(--green); }

  /* ── Hiệu ứng (juice) ──────────────────────────────────────────────── */
  .fx-pop {
    position: absolute; z-index: 6; pointer-events: none; white-space: nowrap;
    font-family: var(--ui-font); font-weight: 900; font-size: 20px; color: #fff;
    text-shadow: 0 2px 6px rgba(20, 30, 90, .6); transform: translate(-50%, -50%);
  }
  .fx-particle {
    position: absolute; z-index: 5; pointer-events: none;
    width: 16px; height: 16px; border-radius: 50%; transform: translate(-50%, -50%);
    box-shadow: 0 0 8px currentColor;
  }
  .fx-combo {
    position: absolute; left: 50%; top: 40%; z-index: 7; pointer-events: none; white-space: nowrap;
    font-family: var(--ui-font); font-weight: 900; font-size: 32px; color: var(--gold);
    text-shadow: 0 3px 10px rgba(20, 30, 90, .7); transform: translate(-50%, -50%);
    display: flex; flex-direction: column; align-items: center; gap: 2px;
  }
  /* Flat design: chữ đậm màu theo cấp combo (--cc), đặt trên chip tối mờ để luôn nổi rõ */
  .fx-praise {
    font-size: 36px; color: var(--cc, #3ee87f);
    text-shadow: 0 2px 4px rgba(0, 0, 0, .55);
  }
  .fx-mult { font-size: 15px; font-weight: 800; letter-spacing: 2px; color: rgba(255,255,255,.95);
    text-shadow: 0 1px 3px rgba(0, 0, 0, .5); }
  /* Chip nền tối bo tròn phía sau câu khen → chữ màu nào cũng dễ đọc (chỉ popup combo) */
  .fx-combo.combo-pop {
    padding: 8px 24px; border-radius: 16px;
    background: rgba(14, 20, 42, .58);
    box-shadow: inset 0 0 0 1.5px rgba(255, 255, 255, .1);
  }
  /* Hạt phẳng tỏa quanh câu khen (tròn/vuông bo/dấu cộng/thoi) — hình & màu đặt trong JS */
  .fx-particle {
    position: absolute; z-index: 7; pointer-events: none;
    transform: translate(-50%, -50%);
  }
  /* Hiệu ứng riêng khi cầu vồng nổ: vòng cầu vồng (conic gradient khoét lỗ) + chớp trắng */
  .fx-rainbow {
    position: absolute; z-index: 7; pointer-events: none; border-radius: 50%;
    background: conic-gradient(from 0deg, #ff4d6a, #ff9838, #ffcf3a, #2ed673, #3aa0ff, #b268ff, #ff4d6a);
    -webkit-mask: radial-gradient(circle, transparent 52%, #000 55%);
            mask: radial-gradient(circle, transparent 52%, #000 55%);
  }
  .fx-rainbow-flash {
    position: absolute; z-index: 7; pointer-events: none; border-radius: 50%;
    background: radial-gradient(circle, rgba(255,255,255,.95), rgba(255,255,255,0) 70%);
  }
  /* Pháo hoa chúc mừng: tia tròn phát sáng + chớp trắng ở tâm nổ */
  .fw {
    position: absolute; z-index: 60; width: 8px; height: 8px; border-radius: 50%;
    pointer-events: none; box-shadow: 0 0 7px currentColor, 0 0 3px #fff;
  }
  .fw-flash {
    position: absolute; z-index: 60; width: 54px; height: 54px; border-radius: 50%;
    pointer-events: none; background: radial-gradient(circle, rgba(255,255,255,.95), rgba(255,255,255,0) 70%);
  }

  /* ── Bàn chơi ─────────────────────────────────────────────────────── */
  .stage {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .board-wrap {
    position: relative;
    background: var(--board-bg);
    border-radius: 20px;
    padding: 6px;
    box-shadow: 0 10px 30px rgba(36, 48, 77, .16);
  }
  .grid-bg {
    position: absolute;
    inset: 6px;
    display: grid;
    border-radius: 14px;
    overflow: hidden;
  }
  .grid-bg .slot { background: var(--cell-bg); outline: 2px solid var(--board-bg); }
  .board {
    position: relative;
  }

  .tile {
    position: absolute;
    top: 0;
    left: 0;
    width: var(--cell);
    height: var(--cell);
    padding: 3px;
    transition: transform .26s cubic-bezier(.2, .8, .3, 1);
    will-change: transform;
    z-index: 2;
  }
  .tile.no-anim { transition: none; }
  .tile-face {
    width: 100%;
    height: 100%;
    border-radius: 22%;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    transition: transform .12s ease, box-shadow .12s ease;
  }
  /* Khối CHÍNH LÀ hình (không nền vuông) — hình tô màu, gần đầy ô */
  .tile-face svg {
    width: 100%; height: 100%; display: block;
  }
  .tile.sel .tile-face { transform: scale(1.16); }
  .tile.sel .tile-face svg {
    filter: drop-shadow(0 0 2px #fff) drop-shadow(0 0 5px var(--gold));
  }
  /* Gợi ý nước đi: nhún + phát sáng */
  .tile.hint .tile-face { animation: hintpulse .7s ease-in-out infinite; }
  @keyframes hintpulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.18); } }
  .tile.hint .tile-face svg {
    filter: drop-shadow(0 0 3px #fff) drop-shadow(0 0 7px var(--gold));
  }
  .tile.clearing {
    transition: transform .42s ease, opacity .42s ease;
    transform: scale(1.6);
    opacity: 0;
    z-index: 3;
  }

  /* ── Bom đếm ngược theo lượt ──────────────────────────────────────── */
  .tile-face.bomb-face {
    background: #2b3350;
    color: #fff;
    box-shadow: inset 0 0 0 3px rgba(255,255,255,.16);
  }
  .bomb-num {
    font-family: var(--ui-font);
    font-weight: 900;
    font-size: calc(var(--cell) * .42);
    color: #fff;
    line-height: 1;
    text-shadow: 0 1px 2px rgba(0,0,0,.4);
  }
  .tile.bomb-low .tile-face { animation: bombpulse .55s ease-in-out infinite; }
  @keyframes bombpulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.12); }
  }

  /* ── Popup thua (Game Over / New Best) — popup-common ─────────────── */
  .overlay {
    position: absolute; inset: 0; z-index: 80;
    display: flex; align-items: center; justify-content: center;
    background: rgba(3, 9, 24, .7); opacity: 1; transition: opacity .25s;
  }
  .overlay.hidden { opacity: 0; pointer-events: none; }
  .card {
    width: min(82%, 360px); padding: 26px; text-align: center; border-radius: 22px;
    background: linear-gradient(180deg, #1c2f63, #0c1838);
    border: 2px solid rgba(120,160,255,.22); box-shadow: 0 18px 50px rgba(0,0,0,.5);
    transform: scale(1); transition: transform .25s;
  }
  .overlay.hidden .card { transform: scale(.9); }
  .card-title { color: #fff; font-size: 30px; font-weight: 900; margin-bottom: 14px; }
  .sb { display: flex; justify-content: center; gap: 30px; margin-bottom: 18px; }
  .sb .k { font-size: 11px; letter-spacing: 2px; color: var(--ink-soft); font-weight: 800; }
  .sb .v { font-size: 32px; color: #fff; font-weight: 900; }
  .sb .v.best { color: var(--green); }
  .btn3d.play { --surface-color: #ffb02e; --surface-text: #3a2400; }
  .btn3d.play .btn3d-surface {
    height: 52px; padding: 0 34px; font-size: 17px; font-weight: 800; letter-spacing: .5px;
  }

</style>

<div class="app" id="app">
  <div class="hud">
  <div class="topbar" id="topbar">
    <div class="btn3d btn-icon" id="back-btn" role="button" aria-label="Back">
      <span class="btn3d-shadow"></span>
      <span class="btn3d-surface">
        <svg class="back-ico" viewBox="0 0 447.243 447.243" aria-hidden="true">
          <path fill="currentColor" d="M420.361 192.229a31.967 31.967 0 0 0-5.535-.41H99.305l6.88-3.2a63.998 63.998 0 0 0 18.08-12.8l88.48-88.48c11.653-11.124 13.611-29.019 4.64-42.4-10.441-14.259-30.464-17.355-44.724-6.914a32.018 32.018 0 0 0-3.276 2.754l-160 160c-12.504 12.49-12.515 32.751-.025 45.255l.025.025 160 160c12.514 12.479 32.775 12.451 45.255-.063a32.084 32.084 0 0 0 2.745-3.137c8.971-13.381 7.013-31.276-4.64-42.4l-88.32-88.64a64.002 64.002 0 0 0-16-11.68l-9.6-4.32h314.24c16.347.607 30.689-10.812 33.76-26.88 2.829-17.445-9.019-33.88-26.464-36.71z"/>
        </svg>
      </span>
    </div>

    <div class="scorebar" id="scorebar">
      <div class="sc-box">
        <div class="sc-k" id="score-k">SCORE</div>
        <div class="sc-v" id="score-val">0</div>
      </div>
      <div class="sc-box">
        <div class="sc-k" id="best-k">BEST</div>

      </div>
    </div>

    <div class="btn3d btn-icon" id="restart-btn" role="button" aria-label="Restart">
      <span class="btn3d-shadow"></span>
      <span class="btn3d-surface">
        <svg class="restart-ico" viewBox="0 0 100 100" aria-hidden="true">
          <path fill="currentColor" d="m50.7 19.003 4.793-4.793c2.696-2.697 2.696-6.991 0-9.688s-6.991-2.696-9.687 0L29.327 21.001a6.812 6.812 0 0 0 0 9.687l16.479 16.478a6.9 6.9 0 0 0 4.793 1.998c1.798 0 3.496-.7 4.794-1.998a6.812 6.812 0 0 0 0-9.687l-4.794-4.794c13.682.4 24.768 11.685 24.768 25.467 0 14.081-11.485 25.466-25.467 25.466S24.534 72.233 24.534 58.252c0-3.096.599-6.192 1.597-8.989 1.299-3.495-.4-7.49-3.994-8.788-3.496-1.298-7.49.4-8.789 3.995-1.698 4.394-2.496 9.088-2.496 13.882C10.852 79.923 28.428 97.5 50 97.5s39.148-17.577 39.148-39.148c0-21.472-17.177-38.95-38.449-39.349z"/>
        </svg>
      </span>
    </div>

    <div class="btn3d btn-icon" id="sound-btn" role="button" aria-label="Sound">
      <span class="btn3d-shadow"></span>
      <span class="btn3d-surface">
        <svg class="sound-ico" viewBox="0 0 100 100" aria-hidden="true">
          <path fill="currentColor" d="M20 40 L36 40 L56 24 L56 76 L36 60 L20 60 Z"/>
          <g class="snd-on" fill="none" stroke="currentColor" stroke-width="7" stroke-linecap="round">
            <path d="M66 38 Q76 50 66 62"/><path d="M76 30 Q92 50 76 70"/>
          </g>
          <path class="snd-off" fill="none" stroke="currentColor" stroke-width="7" stroke-linecap="round" d="M70 40 L88 60 M88 40 L70 60"/>
        </svg>
      </span>
    </div>
  </div>
  </div><!-- /.hud -->

  <div class="stage">
    <div class="board-wrap" id="board-wrap">
      <div class="grid-bg" id="grid-bg"></div>
      <div class="board" id="board"></div>
    </div>
  </div>

  <div id="overlay" class="overlay hidden">
    <div class="card">
      <div class="card-title" id="ov-title">Game Over</div>
      <div class="sb">
        <div><div class="k" id="ov-score-k">SCORE</div><div class="v" id="ov-score">0</div></div>
        <div><div class="k" id="ov-best-k">BEST</div><div class="v best" id="ov-best">0</div></div>
      </div>
      <button class="btn3d play" id="ov-btn" type="button">
        <span class="btn3d-shadow"></span><span class="btn3d-surface" id="ov-btn-label">Play Again</span>
      </button>
    </div>
  </div>

</div>

<script>
/* =====================================================================
 * 0. Localization (inline — game-common §5)
 * ===================================================================== */
const SUPPORTED_LANGS = [
  'en','vi','zh-Hans','zh-Hant','ja','ko','es','es-MX','es-AR','pt-BR','pt',
  'fr','de','it','nl','pl','ru','tr','ar','hi','th','id','fil',
];
const DEFAULT_LANG = 'en';
const LATIN_LANGS = new Set([
  'en','vi','es','es-MX','es-AR','pt-BR','pt','fr','de','it','nl','pl','tr','id','fil',
]);

const I18N = {
  en: { moves: 'Moves', score: 'Score', best: 'Best', gameOver: 'Game Over', newBest: 'New Best!', playAgain: 'Play Again', shuffle: 'Shuffle!', combo: 'COMBO',
        praise: ['Nice!', 'Great!', 'Awesome!', 'Amazing!', 'Unstoppable!', 'Legendary!'] },
  vi: { moves: 'Lượt', score: 'Điểm', best: 'Cao nhất', gameOver: 'Thua rồi', newBest: 'Kỷ lục mới!', playAgain: 'Chơi lại', shuffle: 'Trộn lại!',
        praise: ['Tốt lắm!', 'Tuyệt vời!', 'Xuất sắc!', 'Đỉnh cao!', 'Không thể cản phá!', 'Huyền thoại!'] },
  es: { level: 'Nivel', moves: 'Mov.', win: '¡Nivel completo!', lose: 'Sin movimientos', victory: '¡Ganaste!', next: 'Siguiente', retry: 'Reintentar' },
  fr: { level: 'Niveau', moves: 'Coups', win: 'Niveau terminé !', lose: 'Plus de coups', victory: 'Vous avez gagné !', next: 'Suivant', retry: 'Réessayer' },
  de: { level: 'Level', moves: 'Züge', win: 'Level geschafft!', lose: 'Keine Züge', victory: 'Gewonnen!', next: 'Weiter', retry: 'Nochmal' },
  'pt-BR': { level: 'Nível', moves: 'Jogadas', win: 'Nível concluído!', lose: 'Sem jogadas', victory: 'Você venceu!', next: 'Próximo', retry: 'Repetir' },
  ja: { level: 'レベル', moves: '手数', win: 'クリア！', lose: '手数切れ', victory: 'ゲームクリア！', next: '次へ', retry: '再挑戦' },
  ko: { level: '레벨', moves: '이동', win: '레벨 완료!', lose: '이동 부족', victory: '게임 클리어!', next: '다음', retry: '다시' },
  'zh-Hans': { level: '关卡', moves: '步数', win: '过关！', lose: '步数用尽', victory: '通关啦！', next: '下一关', retry: '重玩' },
  ru: { level: 'Уровень', moves: 'Ходы', win: 'Уровень пройден!', lose: 'Ходы кончились', victory: 'Вы выиграли!', next: 'Дальше', retry: 'Заново' },
  tr: { level: 'Bölüm', moves: 'Hamle', win: 'Bölüm tamam!', lose: 'Hamle bitti', victory: 'Kazandın!', next: 'İleri', retry: 'Tekrar' },
  id: { level: 'Level', moves: 'Langkah', win: 'Level selesai!', lose: 'Langkah habis', victory: 'Kamu menang!', next: 'Lanjut', retry: 'Ulangi' },
};

function getLanguage() {
  const fromWin = typeof window.language === 'string' ? window.language : null;
  const fromUrl = new URLSearchParams(location.search).get('language');
  const raw = fromWin != null ? fromWin : fromUrl;
  return SUPPORTED_LANGS.includes(raw) ? raw : DEFAULT_LANG;
}
let LANG = getLanguage();
function t(key) { return (I18N[LANG] && I18N[LANG][key]) || I18N.en[key] || key; }
function applyUiFont(lang) {
  if (!LATIN_LANGS.has(lang)) {
    document.documentElement.style.setProperty('--ui-font', 'system-ui, sans-serif');
  }
}

/* =====================================================================
 * 1. Native bridge (game-common §1) — game KHÔNG level (điểm cao)
 * ===================================================================== */
function post(msg) {
  try {
    if (window.ReactNativeWebView && window.ReactNativeWebView.postMessage) {
      window.ReactNativeWebView.postMessage(JSON.stringify(msg));
    } else {
      console.log('[skydom → native]', msg);
    }
  } catch (e) { /* ignore */ }
}
function sendMessage(type, opts) {
  opts = opts || {};
  post({
    type,
    level: null,                       // game KHÔNG level → luôn null
    result: opts.result != null ? opts.result : null,
    data: opts.data != null ? opts.data : null,
    showModal: opts.showModal === true,
  });
}
function saveData(payload) {
  const data = typeof payload === 'string' ? payload : JSON.stringify(payload);
  sendMessage('save_data', { data });
}

function getStatusBarHeight() {
  const params = new URLSearchParams(location.search);
  const fromUrl = params.get('statusBarHeight');
  const fromWin = typeof window.statusBarHeight !== 'undefined' ? window.statusBarHeight : null;
  let h = Number(fromUrl != null ? fromUrl : fromWin);
  if (Number.isNaN(h) || h < 0) h = 0;
  return h;
}
/* =====================================================================
 * 2. Cấu hình ván (score-attack, KHÔNG level)
 * Colors: 0 red · 1 blue · 2 green · 3 yellow · 4 purple · 5 orange
 * ===================================================================== */
const COLS = 8, ROWS = 8, NCOLORS = 5;
// Endless: KHÔNG giới hạn lượt. Điểm: mỗi tile clear = 10đ × hệ số chuỗi cascade (1,2,3…).

const COLORS = ['#ff4d6a', '#3aa0ff', '#2ed673', '#ffcf3a', '#b268ff', '#ff9838'];
// SVG shape cho từng màu (đồng thời phân biệt cho người mù màu)
// Khối CHÍNH LÀ hình — path lấp gần đầy viewBox, tô bằng màu khối (xem shapeSvg).
// Bo góc nhẹ nhờ stroke cùng màu + linejoin round.
const SHAPES = [
  // 0 đỏ — trái tim (kẹo tim, bo mềm)
  '<path d="M50 86 C14 60 14 26 40 26 C48 26 50 32 50 39 C50 32 52 26 60 26 C86 26 86 60 50 86 Z"/>',
  // 1 xanh dương — giọt nước / oval đứng
  '<path d="M50 12 C58 34 80 46 80 60 A30 30 0 1 1 20 60 C20 46 42 34 50 12 Z"/>',
  // 2 xanh lá — tam giác mũi xuống, cạnh phình (béo)
  '<path d="M14 30 Q50 22 86 30 Q75 61 50 84 Q25 61 14 30 Z"/>',
  // 3 vàng — hình tròn đặc
  '<circle cx="50" cy="50" r="34"/>',
  // 4 tím — hình thoi, cạnh phình (béo)
  '<path d="M50 12 Q74 26 88 50 Q74 74 50 88 Q26 74 12 50 Q26 26 50 12 Z"/>',
  // 5 cam — "gối" vuông cạnh phình (kẹo caramel/thạch, béo)
  '<path d="M20 28 Q50 22 80 28 Q86 50 80 72 Q50 78 20 72 Q14 50 20 28 Z"/>',
];
const RAINBOW_STAR = '<path d="M50 10 L61 40 L92 41 L67 60 L76 90 L50 72 L24 90 L33 60 L8 41 L39 40 Z"/>';

/* =====================================================================
 * 3. State
 * ===================================================================== */
let board = [];          // board[r][c] = tile | null
let score = 0;
let best = 0;            // điểm cao nhất mọi thời — persist + hiển thị live
let runRecord = 0;       // best lúc bắt đầu ván — mốc để mừng khi phá kỷ lục
let recordHit = false;   // đã phá kỷ lục trong ván này chưa
let cell = 40;
let busy = false;
let ended = false;
let sel = null;          // {r,c} đang chọn
let idc = 0;
let moves = 0;           // số lượt đã đi (mốc đếm ngược & spawn bom)
let comboQueue = null;   // [[tile,...], ...] — combo 🌈+special: nổ theo từng đợt, giữa đợt rơi đầy lại

// Bom đếm ngược: cứ SPAWN_EVERY lượt sinh 1 bom, đếm BOMB_START → 0 thì NỔ & thua.
// Gỡ bom = cho nổ trúng 1 ô kề (trên/dưới/trái/phải) hoặc chính ô bom.
const BOMB_START = 12;
const SPAWN_EVERY = 10;

const boardEl = document.getElementById('board');
const wrapEl = document.getElementById('board-wrap');
const gridBgEl = document.getElementById('grid-bg');

const sleep = (ms) => new Promise(r => setTimeout(r, ms));
const key = (r, c) => r + ',' + c;
const inb = (r, c) => r >= 0 && r < ROWS && c >= 0 && c < COLS;
function tileAt(r, c) { return inb(r, c) ? board[r][c] : null; }
// Làm sáng một hex về phía trắng (amt 0..1) — dùng cho sheen "bóng nhẹ"
function lighten(hex, amt) {
  const n = parseInt(hex.slice(1), 16);
  let r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  r = Math.round(r + (255 - r) * amt);
  g = Math.round(g + (255 - g) * amt);
  b = Math.round(b + (255 - b) * amt);
  return '#' + ((1 << 24) + (r << 16) + (g << 8) + b).toString(16).slice(1);
}

// SVG hình = khối; tô sheen dọc (sáng trên → màu dưới) cho bóng nhẹ; bo góc lớn bằng
// stroke round; special vẽ chồng (clip theo hình).
function shapeSvg(color, special, uid) {
  const ROUND = 15;   // độ dày stroke = độ bo góc
  const pid = 'p' + uid, cid = 'c' + uid, hid = 'h' + uid;
  // Vệt bóng (specular): đốm trắng ở góc trên-trái fade dần → cảm giác bóng loáng
  const gloss = '<radialGradient id="' + hid + '" cx="0.36" cy="0.24" r="0.62">' +
    '<stop offset="0" stop-color="#fff" stop-opacity=".78"/>' +
    '<stop offset=".45" stop-color="#fff" stop-opacity=".16"/>' +
    '<stop offset="1" stop-color="#fff" stop-opacity="0"/></radialGradient>';
  const clip = '<clipPath id="' + cid + '"><use href="#' + pid + '"/></clipPath>';
  const glossRect = '<rect width="100" height="100" fill="url(#' + hid + ')" clip-path="url(#' + cid + ')"/>';

  // Rainbow: hình sao tô gradient cầu vồng + bóng
  if (special === 'rainbow') {
    const rg = 'rg' + uid;
    const bodyId = RAINBOW_STAR.replace('<path', '<path id="' + pid + '"');
    return '<svg viewBox="0 0 100 100" stroke-linejoin="round" stroke-linecap="round" aria-hidden="true">' +
      '<defs><linearGradient id="' + rg + '" x1="0" y1="0" x2="1" y2="1">' +
      '<stop offset="0" stop-color="#ff4d6a"/><stop offset=".2" stop-color="#ffcf3a"/>' +
      '<stop offset=".4" stop-color="#2ed673"/><stop offset=".6" stop-color="#3aa0ff"/>' +
      '<stop offset=".8" stop-color="#b268ff"/><stop offset="1" stop-color="#ff9838"/>' +
      '</linearGradient>' + gloss + clip + '</defs>' +
      '<g fill="url(#' + rg + ')" stroke="url(#' + rg + ')" stroke-width="' + ROUND + '">' + bodyId + '</g>' +
      glossRect + '</svg>';
  }

  const col = COLORS[color];
  const gid = 'g' + uid;
  // Sheen dọc: trên sáng (+38% về trắng) → dưới màu gốc
  const grad = '<linearGradient id="' + gid + '" x1="0" y1="0" x2="0" y2="1">' +
    '<stop offset="0" stop-color="' + lighten(col, 0.38) + '"/>' +
    '<stop offset=".55" stop-color="' + col + '"/>' +
    '<stop offset="1" stop-color="' + col + '"/></linearGradient>';
  const bodyId = SHAPES[color].replace(/<(path|circle|rect|ellipse)/, '<$1 id="' + pid + '"');
  const open = '<svg viewBox="0 0 100 100" fill="url(#' + gid + ')" stroke="url(#' + gid + ')" ' +
    'stroke-width="' + ROUND + '" stroke-linejoin="round" stroke-linecap="round" aria-hidden="true">';

  // Rocket (row/col) & bomb: dấu hiệu trắng clip theo hình (trên lớp bóng)
  let marksG = '';
  if (special === 'row' || special === 'col' || special === 'bomb') {
    const marks = special === 'row'
      // kẻ ngang chạy hết chiều rộng
      ? '<rect x="0" y="30" width="100" height="6"/><rect x="0" y="47" width="100" height="6"/><rect x="0" y="64" width="100" height="6"/>'
      : special === 'col'
      // kẻ dọc chạy hết chiều cao
      ? '<rect x="30" y="0" width="6" height="100"/><rect x="47" y="0" width="6" height="100"/><rect x="64" y="0" width="6" height="100"/>'
      // bomb: tia lấp lánh (sparkle) thay cho vòng tròn trắng
      : '<path d="M50 20 C53 44 56 47 80 50 C56 53 53 56 50 80 C47 56 44 53 20 50 C44 47 47 44 50 20 Z"/>';
    marksG = '<g clip-path="url(#' + cid + ')" fill="#fff" stroke="none" opacity=".92">' + marks + '</g>';
  }

  return open + '<defs>' + grad + gloss + clip + '</defs>' +
    bodyId + glossRect + marksG + '</svg>';
}

/* =====================================================================
 * 3c. Âm thanh vui nhộn (Web Audio tổng hợp — KHÔNG file rời, giữ single-file)
 * ===================================================================== */
const Sound = (function () {
  let ctx = null, master = null, musicGain = null, muted = false;
  const VOL = 0.92;
  const mtof = (m) => 440 * Math.pow(2, (m - 69) / 12);

  function ensure() {
    if (ctx) return;
    try {
      const AC = window.AudioContext || window.webkitAudioContext;
      if (!AC) return;
      ctx = new AC();
      master = ctx.createGain(); master.gain.value = muted ? 0 : VOL;
      const comp = ctx.createDynamicsCompressor();  // limiter: to & vui nhưng không vỡ
      comp.threshold.value = -10; comp.knee.value = 22; comp.ratio.value = 5;
      comp.attack.value = 0.003; comp.release.value = 0.25;
      master.connect(comp); comp.connect(ctx.destination);
      musicGain = ctx.createGain(); musicGain.gain.value = 0.42;  // nhạc nền nhỏ, nhường tiếng nổ
      const musicLP = ctx.createBiquadFilter();                  // lọc bớt tần cao → ấm, mượt dịu
      musicLP.type = 'lowpass'; musicLP.frequency.value = 2600; musicLP.Q.value = 0.4;
      musicGain.connect(musicLP); musicLP.connect(master);       // qua master → nút tắt tiếng cũng tắt nhạc
    } catch (e) { ctx = null; }
  }
  function resume() { if (ctx && ctx.state === 'suspended') ctx.resume(); }
  function suspend() { if (ctx && ctx.state === 'running') ctx.suspend(); }
  function setMuted(m) { muted = !!m; if (master) master.gain.value = muted ? 0 : VOL; }
  function isMuted() { return muted; }

  // Nốt tổng hợp — mặc định square (chất "vui nhộn" retro), có thể trượt cao độ
  function tone(o) {
    if (!ctx || muted) return;
    const t0 = ctx.currentTime + (o.delay || 0);
    const dur = o.dur || 0.12;
    const osc = ctx.createOscillator(), g = ctx.createGain();
    osc.type = o.type || 'square';
    osc.frequency.setValueAtTime(o.freq, t0);
    if (o.freqTo) osc.frequency[o.slide === 'lin' ? 'linearRampToValueAtTime' : 'exponentialRampToValueAtTime'](o.freqTo, t0 + dur);
    const peak = o.gain != null ? o.gain : 0.2;
    g.gain.setValueAtTime(0.0001, t0);
    g.gain.exponentialRampToValueAtTime(peak, t0 + (o.attack || 0.005));
    g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
    let node = osc;
    if (o.lp) { const f = ctx.createBiquadFilter(); f.type = 'lowpass'; f.frequency.value = o.lp; osc.connect(f); node = f; }
    node.connect(g); g.connect(master);
    osc.start(t0); osc.stop(t0 + dur + 0.03);
  }
  function noise(o) {
    if (!ctx || muted) return;
    const t0 = ctx.currentTime + (o.delay || 0), dur = o.dur || 0.2;
    const n = Math.max(1, (ctx.sampleRate * dur) | 0);
    const buf = ctx.createBuffer(1, n, ctx.sampleRate), d = buf.getChannelData(0);
    for (let i = 0; i < n; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / n);
    const src = ctx.createBufferSource(); src.buffer = buf;
    const g = ctx.createGain();
    g.gain.setValueAtTime(0.0001, t0);
    g.gain.exponentialRampToValueAtTime(o.gain != null ? o.gain : 0.2, t0 + 0.008);
    g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
    const lp = ctx.createBiquadFilter(); lp.type = 'lowpass';
    lp.frequency.setValueAtTime(o.lp || 1600, t0);
    if (o.lpTo) lp.frequency.exponentialRampToValueAtTime(o.lpTo, t0 + dur);
    src.connect(lp); lp.connect(g); g.connect(master);
    src.start(t0); src.stop(t0 + dur);
  }
  // ── Nhạc nền vui nhộn (tổng hợp, lặp vô hạn; đi qua master nên nút tắt tiếng cũng tắt) ──
  const BPM = 116;
  const STEP = 60 / BPM / 2;                   // độ dài 1 nốt móc đơn
  // Giai điệu sáng, nảy (MIDI; null = nghỉ) — 32 bước ≈ 7.6s/lặp
  const MELODY = [
    72, 76, 79, 76,  81, 79, 76, 74,   72, 74, 76, 79,  76, 72, 69, null,
    74, 77, 81, 79,  77, 74, 72, 74,   76, 72, 74, 76,  72, 69, 67, null,
  ];
  const BASS = [
    48, null, null, null, 43, null, null, null, 45, null, null, null, 43, null, null, null,
    50, null, null, null, 43, null, null, null, 48, null, null, null, 43, null, null, null,
  ];
  let bgmOn = false, bgmTimer = null, bgmStep = 0, nextTime = 0;

  function bgmNote(midi, time, o) {
    const osc = ctx.createOscillator(), g = ctx.createGain();
    osc.type = o.type || 'square';
    osc.frequency.setValueAtTime(mtof(midi), time);
    const dur = o.dur || STEP * 0.9;
    g.gain.setValueAtTime(0.0001, time);
    g.gain.linearRampToValueAtTime(o.gain != null ? o.gain : 0.11, time + (o.atk || 0.05));  // vào êm
    g.gain.exponentialRampToValueAtTime(0.0001, time + dur);                                   // tắt mượt
    let node = osc;
    if (o.lp) { const f = ctx.createBiquadFilter(); f.type = 'lowpass'; f.frequency.value = o.lp; osc.connect(f); node = f; }
    node.connect(g); g.connect(musicGain);
    osc.start(time); osc.stop(time + dur + 0.05);
  }
  function bgmSchedule() {                       // lookahead scheduler
    if (!ctx || !bgmOn) return;
    if (nextTime < ctx.currentTime) nextTime = ctx.currentTime + 0.05;   // tránh dồn nốt sau khi resume
    while (nextTime < ctx.currentTime + 0.2) {
      const i = bgmStep % MELODY.length;
      const m = MELODY[i];
      if (m != null) bgmNote(m, nextTime, { type: 'triangle', gain: 0.1, dur: STEP * 1.25, lp: 2000, atk: 0.06 });
      const b = BASS[i];
      if (b != null) bgmNote(b, nextTime, { type: 'sine', gain: 0.2, dur: STEP * 1.95, lp: 800, atk: 0.05 });
      bgmStep++;
      nextTime += STEP;
    }
  }
  function startMusic() {
    ensure();
    if (!ctx || bgmOn) return;
    bgmOn = true; bgmStep = 0; nextTime = ctx.currentTime + 0.12;
    bgmSchedule();
    bgmTimer = setInterval(bgmSchedule, 60);
  }
  function stopMusic() {
    bgmOn = false;
    if (bgmTimer) { clearInterval(bgmTimer); bgmTimer = null; }
  }

  return {
    ensure, resume, suspend, setMuted, isMuted, startMusic, stopMusic,
    // ÂM THANH DUY NHẤT: tiếng nổ khi ăn khối (hợp âm rải trưởng vui, cao độ tăng theo chuỗi)
    blast(chain, count) {
      ensure();
      const tier = Math.min(Math.max((chain || 1) - 1, 0), 5);
      [0, 4, 7, 12].forEach((iv, i) =>
        tone({ freq: mtof(67 + tier + iv), dur: 0.26, type: 'sine', gain: 0.22, delay: i * 0.055, lp: 2600, attack: 0.02 }));
    },
  };
})();

/* =====================================================================
 * 4. Tile / DOM
 * ===================================================================== */
function makeTile(color, special) {
  const el = document.createElement('div');
  el.className = 'tile';
  el.innerHTML = '<div class="tile-face"></div>';
  boardEl.appendChild(el);
  const tile = { id: ++idc, color, special: special || null, el, face: el.firstChild };
  paintTile(tile);
  return tile;
}
function paintTile(tile) {
  tile.el.className = 'tile' +
    (tile.special ? ' sp-' + tile.special : '');
  tile.face.style.background = 'transparent';   // khối = hình, không nền vuông
  tile.face.innerHTML = shapeSvg(tile.color, tile.special, tile.id);
}
// Tile bom đếm ngược (không màu, không match — chỉ gỡ bằng cách nổ trúng ô kề)
function makeBomb(timer) {
  const el = document.createElement('div');
  el.className = 'tile';
  el.innerHTML = '<div class="tile-face bomb-face"><span class="bomb-num"></span></div>';
  boardEl.appendChild(el);
  const face = el.firstChild;
  const tile = { id: ++idc, bomb: true, timer, el, face, num: face.firstChild };
  paintBomb(tile);
  return tile;
}
function paintBomb(tile) {
  tile.num.textContent = tile.timer;
  const low = tile.timer <= 3;
  tile.el.classList.toggle('bomb-low', low);
  tile.face.style.background = low ? 'var(--danger)' : '#2b3350';
}
function pos(r, c) { return 'translate(' + (c * cell) + 'px,' + (r * cell) + 'px)'; }
function layout() {
  for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) {
    const tl = board[r][c];
    if (tl) tl.el.style.transform = pos(r, c);
  }
}

/* =====================================================================
 * 5. Sizing
 * ===================================================================== */
function resize() {
  const hud = document.querySelector('.hud');
  const usedTop = hud.offsetHeight;                      // chiều cao HUD (topbar + scorebar)
  // Chừa khoảng trống trên–dưới bằng nhau (2×usedTop) → lưới cân giữa màn hình
  const availH = Math.max(0, window.innerHeight - 2 * usedTop - 16);
  const availW = Math.min(window.innerWidth, 560) - 28;
  const boardPx = Math.min(availW, availH);
  cell = Math.max(20, Math.floor(boardPx / COLS));       // sàn 20px cho dễ chạm
  // Máy thấp / xoay ngang: nếu sàn làm bàn vượt không gian → co lại cho VỪA (không tràn)
  if (cell * COLS > boardPx && boardPx >= COLS) cell = Math.floor(boardPx / COLS);
  const size = cell * COLS;
  document.documentElement.style.setProperty('--cell', cell + 'px');
  boardEl.style.width = size + 'px';
  boardEl.style.height = size + 'px';
  gridBgEl.style.width = size + 'px';
  gridBgEl.style.height = size + 'px';
  gridBgEl.style.gridTemplateColumns = 'repeat(' + COLS + ',1fr)';
  gridBgEl.style.gridTemplateRows = 'repeat(' + ROWS + ',1fr)';
  if (!gridBgEl.childElementCount) {
    for (let i = 0; i < ROWS * COLS; i++) {
      const s = document.createElement('div'); s.className = 'slot'; gridBgEl.appendChild(s);
    }
  }
  layout();
}

/* =====================================================================
 * 6. Match / special detection
 * ===================================================================== */
function computeRunLens() {
  const H = Array.from({ length: ROWS }, () => new Array(COLS).fill(0));
  const V = Array.from({ length: ROWS }, () => new Array(COLS).fill(0));
  for (let r = 0; r < ROWS; r++) {
    let c = 0;
    while (c < COLS) {
      const t0 = board[r][c];
      if (!t0 || t0.bomb || t0.wave) { c++; continue; }     // bom/ô trống/đang chờ-nổ chặn run
      let j = c;
      while (j < COLS && board[r][j] && !board[r][j].bomb && !board[r][j].wave && board[r][j].color === t0.color) j++;
      const len = j - c;
      if (len >= 3) for (let k = c; k < j; k++) H[r][k] = len;
      c = j;
    }
  }
  for (let c = 0; c < COLS; c++) {
    let r = 0;
    while (r < ROWS) {
      const t0 = board[r][c];
      if (!t0 || t0.bomb || t0.wave) { r++; continue; }
      let j = r;
      while (j < ROWS && board[j][c] && !board[j][c].bomb && !board[j][c].wave && board[j][c].color === t0.color) j++;
      const len = j - r;
      if (len >= 3) for (let k = r; k < j; k++) V[k][c] = len;
      r = j;
    }
  }
  return { H, V };
}

// Trả về { clearCells:Set, specialPlans:[{r,c,type,color}] }
function findMatches(swapCells) {
  const { H, V } = computeRunLens();
  const seen = Array.from({ length: ROWS }, () => new Array(COLS).fill(false));
  const clearCells = new Set();
  const specialPlans = [];

  for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) {
    if (seen[r][c] || (H[r][c] < 3 && V[r][c] < 3)) continue;
    // BFS component (nối các ô matched cùng màu)
    const color = board[r][c].color;
    const comp = [];
    const stack = [[r, c]];
    seen[r][c] = true;
    let maxH = 0, maxV = 0, inter = null;
    while (stack.length) {
      const [cr, cc] = stack.pop();
      comp.push({ r: cr, c: cc });
      maxH = Math.max(maxH, H[cr][cc]);
      maxV = Math.max(maxV, V[cr][cc]);
      if (H[cr][cc] >= 3 && V[cr][cc] >= 3 && !inter) inter = { r: cr, c: cc };
      const nb = [[cr - 1, cc], [cr + 1, cc], [cr, cc - 1], [cr, cc + 1]];
      for (const [nr, nc] of nb) {
        if (inb(nr, nc) && !seen[nr][nc] && (H[nr][nc] >= 3 || V[nr][nc] >= 3) &&
            board[nr][nc] && board[nr][nc].color === color) {
          seen[nr][nc] = true; stack.push([nr, nc]);
        }
      }
    }

    // Loại special cho component
    let type = null;
    if (maxH >= 5 || maxV >= 5) type = 'rainbow';
    else if (inter) type = 'bomb';
    else if (maxH >= 4) type = 'row';
    else if (maxV >= 4) type = 'col';

    let spPos = null;
    if (type) {
      const sw = (swapCells || []).find(s => comp.some(p => p.r === s.r && p.c === s.c));
      if (sw) spPos = sw;
      else if (type === 'bomb' && inter) spPos = inter;
      else spPos = comp[(comp.length / 2) | 0];
      specialPlans.push({ r: spPos.r, c: spPos.c, type, color });
    }
    for (const p of comp) {
      if (spPos && p.r === spPos.r && p.c === spPos.c) continue;
      clearCells.add(key(p.r, p.c));
    }
  }
  return { clearCells, specialPlans };
}

function anyMatch(swapCells) {
  const m = findMatches(swapCells);
  return m.clearCells.size > 0 || m.specialPlans.length > 0;
}

/* Ô bị ảnh hưởng khi 1 special phát nổ */
function specialBlast(r, c, type, color) {
  const out = [];
  if (type === 'row') for (let cc = 0; cc < COLS; cc++) out.push(key(r, cc));
  else if (type === 'col') for (let rr = 0; rr < ROWS; rr++) out.push(key(rr, c));
  else if (type === 'bomb') {
    for (let dr = -1; dr <= 1; dr++) for (let dc = -1; dc <= 1; dc++)
      if (inb(r + dr, c + dc)) out.push(key(r + dr, c + dc));
  } else if (type === 'rainbow') {
    for (let rr = 0; rr < ROWS; rr++) for (let cc = 0; cc < COLS; cc++)
      if (board[rr][cc] && board[rr][cc].color === color) out.push(key(rr, cc));
  }
  return out;
}

/* Kích hoạt dây chuyền: mọi special trong clr sẽ nổ, kéo theo special khác */
function expandActivations(clr) {
  const rainbows = [];                 // vị trí các cầu vồng phát nổ → thêm hiệu ứng riêng
  const stack = [];
  for (const k of clr) {
    const [r, c] = k.split(',').map(Number);
    const t = board[r][c];
    if (t && t.special) stack.push(k);
  }
  const done = new Set();
  while (stack.length) {
    const k = stack.pop();
    if (done.has(k)) continue;
    const [r, c] = k.split(',').map(Number);
    const t = board[r][c];
    if (!t || !t.special) continue;
    done.add(k);
    if (t.special === 'rainbow') rainbows.push([r, c]);
    for (const b of specialBlast(r, c, t.special, t.color)) {
      const [br, bc] = b.split(',').map(Number);
      const bt = board[br][bc];
      if (bt && bt.wave) continue;          // special đang chờ đợt sau → không nổ/không xóa lúc này
      if (!clr.has(b)) clr.add(b);
      if (bt && bt.special && !done.has(b)) stack.push(b);
    }
  }
  return rainbows;
}

/* =====================================================================
 * 7. Player move + cascade
 * ===================================================================== */
function swapModel(a, b) {
  const t = board[a.r][a.c];
  board[a.r][a.c] = board[b.r][b.c];
  board[b.r][b.c] = t;
}
// Tìm vị trí hiện tại của 1 tile (dùng cho combo theo đợt — tile có thể đã rơi)
function findTilePos(tile) {
  for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) if (board[r][c] === tile) return { r, c };
  return null;
}

async function animateSwap() { layout(); await sleep(150); }

function comboClears(ta, a, tb, b) {
  const clr = new Set();
  const raInvolved = ta.special === 'rainbow' || tb.special === 'rainbow';
  if (raInvolved) {
    if (ta.special === 'rainbow' && tb.special === 'rainbow') {
      for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) clr.add(key(r, c));
    } else {
      const ra = ta.special === 'rainbow' ? a : b;
      const other = ta.special === 'rainbow' ? tb : ta;
      const oPos = ta.special === 'rainbow' ? b : a;
      if (other.special) {
        // 🌈 + Special: biến MỌI viên cùng màu với special đó thành cùng loại
        //   🚀 (row/col) → ngẫu nhiên row hoặc col · 💥 bom → bom
        //   (viên nào đã là special thì giữ nguyên), rồi nổ hết các viên cùng màu
        //   → các special vừa tạo kích nổ dây chuyền (expandActivations).
        const col = other.color;
        const toBomb = other.special === 'bomb';
        const cells = [];
        for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) {
          const t = board[r][c];
          if (!t || t.bomb || t.color !== col) continue;   // chỉ viên cùng màu (bỏ bom đếm ngược)
          if (!t.special) {                                 // chưa là special → biến đổi + vẽ lại
            t.special = toBomb ? 'bomb' : (Math.random() < 0.5 ? 'row' : 'col');
            paintTile(t);
          }
          t.wave = true;                                    // chờ nổ theo đợt (chặn match sớm)
          cells.push({ tile: t, d: Math.hypot(r - oPos.r, c - oPos.c) });
        }
        // Nổ theo ĐỢT từ điểm gộp ra ngoài; giữa các đợt bàn rơi đầy lại (không nổ vào ô trống)
        cells.sort((p, q) => p.d - q.d);
        comboQueue = cells.map(x => [x.tile]);   // mỗi special 1 đợt → nổ từng viên một (từ gần ra xa)
        const raTile = board[ra.r][ra.c];
        if (raTile) raTile.special = null;   // cầu vồng chỉ biến mất, không nổ theo màu riêng
        clr.add(key(ra.r, ra.c));
      } else {
        for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++)
          if (board[r][c] && board[r][c].color === other.color) clr.add(key(r, c));
        clr.add(key(ra.r, ra.c));
        clr.add(key(oPos.r, oPos.c));
      }
    }
    return clr;
  }
  // hai special thường (row/col/bomb)
  if (ta.special && tb.special) {
    const s1 = ta.special, s2 = tb.special, ctr = b;
    const both = s1 + '+' + s2;
    const hasBomb = s1 === 'bomb' || s2 === 'bomb';
    const bothRocket = (s1 === 'row' || s1 === 'col') && (s2 === 'row' || s2 === 'col');
    if (s1 === 'bomb' && s2 === 'bomb') {
      for (let dr = -2; dr <= 2; dr++) for (let dc = -2; dc <= 2; dc++)
        if (inb(ctr.r + dr, ctr.c + dc)) clr.add(key(ctr.r + dr, ctr.c + dc));
    } else if (bothRocket) {
      if (s1 === 'row' && s2 === 'row') {
        // row + row → nổ đúng (các) HÀNG chứa 2 tên lửa
        for (let cc = 0; cc < COLS; cc++) { clr.add(key(a.r, cc)); clr.add(key(b.r, cc)); }
      } else if (s1 === 'col' && s2 === 'col') {
        // col + col → nổ đúng (các) CỘT chứa 2 tên lửa
        for (let rr = 0; rr < ROWS; rr++) { clr.add(key(rr, a.c)); clr.add(key(rr, b.c)); }
      } else {
        // row + col → chữ thập (1 hàng + 1 cột) tại ctr
        for (let cc = 0; cc < COLS; cc++) clr.add(key(ctr.r, cc));
        for (let rr = 0; rr < ROWS; rr++) clr.add(key(rr, ctr.c));
      }
    } else if (hasBomb) { // bomb + tên lửa → 3 HÀNG (nếu row) hoặc 3 CỘT (nếu col)
      const rocketType = (s1 === 'bomb') ? s2 : s1;   // loại tên lửa quyết định hướng
      if (rocketType === 'row') {
        for (let dr = -1; dr <= 1; dr++) for (let cc = 0; cc < COLS; cc++)
          if (inb(ctr.r + dr, cc)) clr.add(key(ctr.r + dr, cc));
      } else {
        for (let dc = -1; dc <= 1; dc++) for (let rr = 0; rr < ROWS; rr++)
          if (inb(rr, ctr.c + dc)) clr.add(key(rr, ctr.c + dc));
      }
    }
    return clr;
  }
  // 1 special thường + 1 thường → KHÔNG tự nổ khi đổi chỗ.
  // Special (row/col/bomb) chỉ nổ khi được MATCH cùng màu như khối thường:
  // findMatches sẽ bắt run cùng màu (special vẫn mang màu) → expandActivations kích nổ.
  return clr;
}

async function tryMove(a, b) {
  if (busy || ended) return;
  if (!(Math.abs(a.r - b.r) + Math.abs(a.c - b.c) === 1)) return;
  const ta = tileAt(a.r, a.c), tb = tileAt(b.r, b.c);
  if (!ta || !tb) return;
  if (ta.bomb || tb.bomb) return;   // không đổi chỗ bom (chỉ gỡ bằng nổ trúng ô kề)

  busy = true;
  clearHint();
  clearSelection();
  swapModel(a, b);
  await animateSwap();

  const pending = comboClears(tileAt(a.r, a.c), a, tileAt(b.r, b.c), b);
  const test = findMatches([a, b]);
  const valid = pending.size > 0 || test.clearCells.size > 0 || test.specialPlans.length > 0;

  if (!valid) {
    swapModel(a, b);           // hoàn tác
    await animateSwap();
    busy = false;
    resetIdle();
    return;
  }

  await cascade(pending, [a, b]);
  onMoveResolved();          // đếm ngược bom + spawn (có thể kích nổ → thua)
  await settleAfterMove();
  busy = false;
  resetIdle();
}

async function cascade(pending, swapCells) {
  let first = true;
  let chain = 1;             // hệ số điểm tăng theo mỗi bước cascade (combo)
  while (true) {
    const { clearCells, specialPlans } = findMatches(first ? swapCells : []);
    const clr = new Set(clearCells);
    if (first && pending) for (const k of pending) clr.add(k);
    // Combo 🌈: mỗi vòng lặp nổ 1 ĐỢT special; giữa các đợt bàn đã rơi đầy lại (không nổ vào ô trống)
    let pulledCombo = false;
    if (comboQueue && comboQueue.length) {
      pulledCombo = true;
      const wave = comboQueue.shift();
      for (const tile of wave) { tile.wave = false; const p = findTilePos(tile); if (p) clr.add(key(p.r, p.c)); }
    }

    const rbHits = expandActivations(clr);     // vị trí cầu vồng phát nổ (để thêm hiệu ứng riêng)
    for (const p of specialPlans) clr.delete(key(p.r, p.c));
    if (first && pending) for (const k of pending) clr.add(k);   // combo: nổ hết ô đã định, không giữ lại làm special mới

    if (clr.size === 0 && specialPlans.length === 0) {
      if (comboQueue && comboQueue.length) { first = false; continue; }   // còn đợt → sang đợt sau
      break;
    }

    // Tính điểm + hiệu ứng + đánh dấu clear
    // Nổ ĐẶC BIỆT "từ từ": viên gần tâm special biến mất trước, xa hơn theo sau → sóng lan ra
    const origins = [];
    for (const k of clr) { const [r, c] = k.split(',').map(Number); const t = board[r][c]; if (t && t.special) origins.push([r, c]); }
    const staggered = origins.length > 0 && !pulledCombo;   // combo: nổ gọn từng đợt, không rải sóng
    let maxDelay = 0;
    let cleared = 0, sx = 0, sy = 0;
    const spTypes = new Set();          // loại special phát nổ ở bước này → chọn tiếng
    const parts = [];
    for (const k of clr) {
      const [r, c] = k.split(',').map(Number);
      const t = board[r][c];
      if (t && !t.bomb) {          // bom không tính điểm ở đây (xử lý riêng ở defuse)
        cleared++;
        if (t.special) spTypes.add(t.special);
        const [cx, cy] = fxCenter(r, c);
        sx += cx; sy += cy;
        let d = 0;
        if (staggered) {                                   // trễ theo khoảng cách tới tâm nổ gần nhất
          let best = 1e9;
          for (const [or, oc] of origins) { const dd = Math.hypot(r - or, c - oc); if (dd < best) best = dd; }
          d = Math.min(best * 0.05, 0.6);                  // 0.05s/ô, tối đa 0.6s
          if (d > maxDelay) maxDelay = d;
        }
        parts.push([cx, cy, COLORS[t.color], d]);
        t.el.style.transitionDelay = d + 's';
        t.el.classList.add('clearing');
        t.el.style.transform = pos(r, c) + ' scale(1.6)';
      }
    }
    if (cleared) {
      const pts = cleared * 10 * chain;
      addScore(cleared, chain);
      spawnPop(sx / cleared, sy / cleared, '+' + pts);
      spawnParticles(parts);
      for (const [rr, rc] of rbHits) rainbowBurst(rr, rc);   // hiệu ứng riêng khi cầu vồng phát nổ
      // Mọi lần nổ — match 3/4 thường lẫn special (hàng/cột/bom/cầu vồng) — đều dùng "tiếng combo"
      Sound.blast(chain, cleared);
      if (chain >= 2) spawnCombo(chain);
      if (cleared >= 8 || chain >= 3) shake();
    }
    if (cleared >= 4) shockwave(clr);   // chỉ nổ ≥4 viên mới hất các khối kề (bỏ qua match 3 thường)
    // Tạo special (nâng cấp tile tại chỗ) + pop
    for (const p of specialPlans) {
      const t = board[p.r][p.c];
      if (t) {
        t.special = p.type; paintTile(t);
        const bpos = pos(p.r, p.c);
        t.el.style.transform = bpos;
        t.el.animate(
          [{ transform: bpos + ' scale(.7)' }, { transform: bpos + ' scale(1.25)', offset: .6 }, { transform: bpos }],
          { duration: 300, easing: 'ease-out' });
      }
    }

    await sleep(clr.size ? (pulledCombo ? 300 : (420 + maxDelay * 1000)) : 90);   // combo: mỗi đợt nhanh gọn

    defuseBombs(clr);   // bom có ô kề (hoặc chính nó) bị xoá → gỡ an toàn

    // Xoá các tile đã clear
    for (const k of clr) {
      const [r, c] = k.split(',').map(Number);
      const t = board[r][c];
      if (t) { t.el.remove(); board[r][c] = null; }
    }

    gravityAndRefill();
    await sleep(pulledCombo ? 230 : 380);   // combo: rơi đầy nhanh rồi sang viên kế
    first = false;
    chain++;
  }
  comboQueue = null;   // dọn hàng đợi combo (nếu còn)
}

function gravityAndRefill() {
  const drops = [];   // {t, from, to, c} — mỗi tile phải rơi (kèm quãng đường)
  for (let c = 0; c < COLS; c++) {
    let ptr = ROWS - 1;
    for (let r = ROWS - 1; r >= 0; r--) {
      if (board[r][c]) {
        if (r !== ptr) {                       // tile cũ tụt xuống lấp chỗ trống
          board[ptr][c] = board[r][c]; board[r][c] = null;
          drops.push({ t: board[ptr][c], from: r, to: ptr, c });
        }
        ptr--;
      }
    }
    // ptr..0 trống → tile mới rơi từ trên bàn xuống
    let above = 1;
    for (let r = ptr; r >= 0; r--) {
      const t = makeTile(randColor());
      board[r][c] = t;
      drops.push({ t, from: r - (ptr + above), to: r, c });
    }
  }
  // Đặt sẵn ở điểm xuất phát (không animation) rồi reflow, để không nháy khung đầu
  for (const d of drops) { d.t.el.classList.add('no-anim'); d.t.el.style.transform = pos(d.from, d.c); }
  void boardEl.offsetWidth;
  for (const d of drops) { d.t.el.classList.remove('no-anim'); bounceDrop(d.t, d.from, d.to, d.c); }
  layout();   // vị trí nghỉ cuối cùng (khớp keyframe cuối của bounceDrop)
}

/* Rơi có "trọng lực": tăng tốc khi xuống + ép dẹp/nảy khi chạm đáy (squash & stretch) */
function bounceDrop(t, from, to, c) {
  const endT = pos(to, c);
  const dist = Math.max(1, to - from);
  const dur = Math.min(680, 280 + dist * 66);   // rơi xa hơn → lâu hơn (chậm)
  t.el.style.transformOrigin = '50% 100%';       // ép dẹp bám "chân" cho cảm giác tiếp đất
  const anim = t.el.animate([
    { transform: pos(from, c), easing: 'cubic-bezier(.34,0,.66,.5)' },                         // gia tốc rơi
    { transform: endT, offset: .70, easing: 'ease-out' },                                      // chạm đáy
    { transform: endT + ' scaleY(.80) scaleX(1.15)', offset: .80, easing: 'ease-in-out' },     // nén dẹp
    { transform: endT + ' scaleY(1.08) scaleX(.94)', offset: .90, easing: 'ease-in-out' },     // bật nảy
    { transform: endT },                                                                        // ổn định
  ], { duration: dur });
  anim.onfinish = () => { t.el.style.transformOrigin = ''; };
}

/* Sóng xung kích: các tile còn lại quanh vùng nổ bị đẩy ra xa tâm rồi nảy về (spring),
   lực giảm dần theo khoảng cách. clr = tập ô đang bị xoá ở bước cascade này. */
function shockwave(clr) {
  if (!clr.size) return;
  const cleared = [];
  for (const k of clr) { const [r, c] = k.split(',').map(Number); cleared.push([r, c]); }
  const RANGE = 2.4;                 // bán kính ảnh hưởng (đơn vị ô)
  const MAXPUSH = cell * 0.38;       // độ đẩy tối đa (ô ngay sát tâm)
  for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) {
    const t = board[r][c];
    if (!t || clr.has(key(r, c))) continue;         // bỏ ô trống & ô sắp bị xoá
    // Ô nổ gần nhất → hướng đẩy ra xa nó
    let best = 1e9, nr = 0, nc = 0;
    for (const [er, ec] of cleared) {
      const d = Math.hypot(r - er, c - ec);
      if (d < best) { best = d; nr = er; nc = ec; }
    }
    if (best === 0 || best > RANGE) continue;
    let dx = c - nc, dy = r - nr;
    const len = Math.hypot(dx, dy) || 1; dx /= len; dy /= len;
    const mag = MAXPUSH * (1 - best / RANGE);        // gần tâm → đẩy mạnh
    const bx = c * cell, by = r * cell, rest = pos(r, c);
    const ox = dx * mag, oy = dy * mag;
    // translate + scale (squash/stretch) cho cảm giác thạch
    const tr = (mx, my, s) => 'translate(' + (bx + mx) + 'px,' + (by + my) + 'px) scale(' + s + ')';
    // Dao động tắt dần nhiều nhịp → "nhún nhún"
    t.el.animate([
      { transform: rest + ' scale(1)', offset: 0, easing: 'cubic-bezier(.2,.8,.3,1)' },
      { transform: tr(ox, oy, 1.10), offset: .15 },                       // bị hất ra + phồng
      { transform: tr(-ox * 0.5, -oy * 0.5, 0.93), offset: .35 },         // nảy ngược + nén
      { transform: tr(ox * 0.34, oy * 0.34, 1.06), offset: .54 },         // nhún ra (nhẹ hơn)
      { transform: tr(-ox * 0.20, -oy * 0.20, 0.97), offset: .72 },       // nhún vào
      { transform: tr(ox * 0.09, oy * 0.09, 1.02), offset: .88 },         // nhún ra (rất nhẹ)
      { transform: rest + ' scale(1)', offset: 1 },                       // ổn định
    ], { duration: 600, easing: 'ease-out' });
  }
}

// Hiệu ứng RIÊNG khi cầu vồng phát nổ: vòng cầu vồng lan ra (xoay) + chớp sáng trung tâm
function rainbowBurst(r, c) {
  const [cx, cy] = fxCenter(r, c);
  const ring = document.createElement('div');
  ring.className = 'fx-rainbow';
  ring.style.width = ring.style.height = (cell * 1.4) + 'px';
  ring.style.left = cx + 'px'; ring.style.top = cy + 'px';
  boardEl.appendChild(ring);
  ring.animate([
    { transform: 'translate(-50%,-50%) scale(.25) rotate(0deg)', opacity: .95 },
    { transform: 'translate(-50%,-50%) scale(2.7) rotate(150deg)', opacity: 0 },
  ], { duration: 660, easing: 'cubic-bezier(.2,.7,.3,1)' }).onfinish = () => ring.remove();
  const flash = document.createElement('div');
  flash.className = 'fx-rainbow-flash';
  flash.style.width = flash.style.height = (cell * 1.2) + 'px';
  flash.style.left = cx + 'px'; flash.style.top = cy + 'px';
  boardEl.appendChild(flash);
  flash.animate([
    { transform: 'translate(-50%,-50%) scale(.2)', opacity: .9 },
    { transform: 'translate(-50%,-50%) scale(1.9)', opacity: 0 },
  ], { duration: 380, easing: 'ease-out' }).onfinish = () => flash.remove();
}

function randColor() { return (Math.random() * NCOLORS) | 0; }

/* =====================================================================
 * 7b. Bom đếm ngược theo lượt
 * ===================================================================== */
// Gỡ mọi bom có ô kề (trên/dưới/trái/phải) hoặc chính ô bom nằm trong tập vừa xoá.
function defuseBombs(clr) {
  for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) {
    const t = board[r][c];
    if (!t || !t.bomb) continue;
    const near = clr.has(key(r, c)) || clr.has(key(r - 1, c)) || clr.has(key(r + 1, c)) ||
                 clr.has(key(r, c - 1)) || clr.has(key(r, c + 1));
    if (!near) continue;
    const [cx, cy] = fxCenter(r, c);
    spawnParticles([[cx, cy, '#22c55e'], [cx, cy, '#7CFFB0']]);
    spawnPop(cx, cy, '+50');
    addScore(5, 1);                    // thưởng gỡ bom = 50 điểm
    t.el.remove(); board[r][c] = null; // gỡ xong biến mất (gravity sẽ lấp)
  }
}

// Gọi sau mỗi lượt hợp lệ: đếm ngược mọi bom, nổ nếu về 0, rồi spawn định kỳ.
function onMoveResolved() {
  if (ended) return;
  moves++;
  let boom = null;
  for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) {
    const t = board[r][c];
    if (t && t.bomb) {
      t.timer--;
      if (t.timer <= 0) { if (!boom) boom = { r, c }; }
      else paintBomb(t);
    }
  }
  if (boom) { explodeBomb(boom.r, boom.c); return; }   // về 0 → nổ & thua
  if (moves % SPAWN_EVERY === 0) spawnBomb();
}

// Sinh 1 bom ở ô ngẫu nhiên (thay 1 tile thường đang có trên bàn).
function spawnBomb() {
  const cells = [];
  for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) {
    const t = board[r][c];
    if (t && !t.bomb) cells.push([r, c]);
  }
  if (!cells.length) return;
  const [r, c] = cells[(Math.random() * cells.length) | 0];
  board[r][c].el.remove();
  const b = makeBomb(BOMB_START);
  board[r][c] = b;
  const p = pos(r, c);
  b.el.style.transform = p;
  b.el.animate([
    { transform: p + ' scale(.2)', opacity: 0 },
    { transform: p + ' scale(1.2)', opacity: 1, offset: .6 },
    { transform: p },
  ], { duration: 360, easing: 'ease-out' });
  if (!hasAnyMove()) reshuffle(true);  // phòng khi bom chặn hết nước đi (kèm toast + anim)
}

// Bom nổ (đếm về 0) → hiệu ứng + Game Over.
function explodeBomb(r, c) {
  const t = board[r][c];
  const [cx, cy] = fxCenter(r, c);
  const parts = [];
  for (let i = 0; i < 16; i++) parts.push([cx, cy, i % 2 ? '#ff5a5f' : '#ffb02e']);
  spawnParticles(parts);
  shake();
  if (t) { t.el.remove(); board[r][c] = null; }
  gameOver();
}

/* =====================================================================
 * 8. Score / HUD / end
 * ===================================================================== */
function addScore(n, chainMul) {
  score += n * 10 * chainMul;
  if (score > best) { best = score; persistBest(); }   // lưu ngay; HUD Best chỉ refresh khi hết màn/ván mới (§1.2)
  if (!recordHit && runRecord > 0 && score > runRecord) {           // vừa vượt kỷ lục cũ
    recordHit = true; confetti(); spawnRecordToast();
  }
  renderScore();
}
function renderScore() {
  const val = document.getElementById('score-val');
  if (val) val.textContent = score;
}

/* =====================================================================
 * 8b. Persistence: điểm cao nhất (best) — game-common §1.2
 * ===================================================================== */
const LS_KEY = 'skydom_save';
function readLocal() { try { return localStorage.getItem(LS_KEY) || ''; } catch (e) { return ''; } }
function saveLocal(obj) { try { localStorage.setItem(LS_KEY, JSON.stringify(obj)); } catch (e) { /* quota */ } }
function getInitialData() {
  const fromWin = typeof window.data === 'string' ? window.data : null;
  const fromUrl = new URLSearchParams(location.search).get('data');
  return fromWin != null ? fromWin : (fromUrl || '');
}
function loadPersist() {
  let nativeObj = null, localObj = null;
  const raw = getInitialData(); if (raw) { try { nativeObj = JSON.parse(raw); } catch (e) {} }
  const lraw = readLocal(); if (lraw) { try { localObj = JSON.parse(lraw); } catch (e) {} }
  const merged = Object.assign({}, localObj || {}, nativeObj || {}); // native thắng data nhẹ
  best = Number(merged.best) || 0;
  Sound.setMuted(merged.muted === true);
}
function persistBest() {
  const payload = { best, muted: Sound.isMuted() };
  saveData(payload);   // native (data nhẹ) — ghi đè
  saveLocal(payload);  // localStorage backup
}
function renderBest() {
  const b = document.getElementById('best-val');
  if (b) b.textContent = best;   // endless: best chạy live
}

/* =====================================================================
 * 8c. Hiệu ứng (juice)
 * ===================================================================== */
function fxCenter(r, c) { return [c * cell + cell / 2, r * cell + cell / 2]; }

function spawnPop(x, y, text) {
  const el = document.createElement('div');
  el.className = 'fx-pop';
  el.textContent = text;
  el.style.left = x + 'px'; el.style.top = y + 'px';
  boardEl.appendChild(el);
  el.animate([
    { transform: 'translate(-50%,-50%) scale(.6)', opacity: 0 },
    { transform: 'translate(-50%,-95%) scale(1.15)', opacity: 1, offset: .3 },
    { transform: 'translate(-50%,-175%) scale(1)', opacity: 0 },
  ], { duration: 820, easing: 'ease-out' }).onfinish = () => el.remove();
}

function spawnParticles(list) {
  const cap = Math.min(list.length, 26);
  const step = Math.max(1, Math.floor(list.length / cap));
  for (let i = 0; i < list.length; i += step) {
    const [x, y, color, delay] = list[i];
    for (let k = 0; k < 3; k++) {   // nhiều mảnh hơn → nổ "đầy" hơn
      const p = document.createElement('div');
      p.className = 'fx-particle';
      p.style.background = color;
      p.style.color = color;        // cho box-shadow glow ăn theo màu mảnh
      p.style.left = x + 'px'; p.style.top = y + 'px';
      boardEl.appendChild(p);
      // Bắn mảnh vỡ ra ngoài + lên cao, rồi trọng lực kéo rơi xuống (quỹ đạo parabol) — TO & CHẬM hơn
      const ang = Math.random() * Math.PI * 2;
      const spd = cell * (0.75 + Math.random() * 1.1);                          // văng xa hơn
      const dx = Math.cos(ang) * spd;
      const up = Math.abs(Math.sin(ang)) * spd * 0.6 + cell * (0.5 + Math.random() * 0.4);
      const fall = cell * (1.9 + Math.random() * 1.3);                          // rơi xa hơn
      const rot = (Math.random() * 640 - 320) | 0;
      p.animate([
        { transform: 'translate(-50%,-50%) rotate(0deg) scale(1.35)', opacity: 1, offset: 0 },
        { transform: 'translate(calc(-50% + ' + (dx * 0.55) + 'px), calc(-50% - ' + up + 'px)) rotate(' + (rot * 0.5) + 'deg) scale(1.05)', opacity: 1, offset: .42 },
        { transform: 'translate(calc(-50% + ' + dx + 'px), calc(-50% + ' + fall + 'px)) rotate(' + rot + 'deg) scale(.2)', opacity: 0, offset: 1 },
      ], { duration: 1250 + Math.random() * 450, delay: (delay || 0) * 1000, fill: 'backwards', easing: 'cubic-bezier(.3,.5,.55,1)' }).onfinish = () => p.remove();
    }
  }
}

// Câu khen tăng dần theo cấp combo (chain 2 → phần tử đầu; cao hơn → mạnh hơn)
function praiseWord(chain) {
  const arr = (I18N[LANG] && I18N[LANG].praise) || I18N.en.praise;   // theo ngôn ngữ, fallback en
  const i = Math.min(Math.max(chain - 2, 0), arr.length - 1);
  return arr[i];
}
// Màu câu khen theo cấp: ×2 lá · ×3 dương · ×4 tím · ×5 cam · ×6 đỏ cam · ×7+ vàng
// (sáng hơn để nổi rõ trên chip nền tối)
const COMBO_COLORS = ['#3ee87f', '#5bb8ff', '#c795ff', '#ffab54', '#ff7a5c', '#ffe066'];
function spawnCombo(chainMul) {
  const tier = Math.min(Math.max(chainMul - 2, 0), 5);   // 0..5 → ×2..×7+
  const color = COMBO_COLORS[tier];
  const sc = 1 + tier * 0.08;                            // combo cao → chữ to hơn (nhẹ)
  const el = document.createElement('div');
  el.className = 'fx-combo combo-pop';
  el.style.setProperty('--cc', color);
  el.innerHTML = '<span class="fx-praise">' + praiseWord(chainMul) + '</span>' +
                 '<span class="fx-mult">' + t('combo') + ' ×' + chainMul + '</span>';
  boardEl.appendChild(el);
  // Flat: hiện nhanh (0.7→1.2→1.0) → giữ & bay lên nhẹ → mờ dần khi vẫn bay lên
  el.animate([
    { transform: 'translate(-50%,-50%) scale(.7)', opacity: 0, offset: 0 },
    { transform: 'translate(-50%,-50%) scale(1.2)', opacity: 1, offset: .2 },
    { transform: 'translate(-50%,-50%) scale(' + sc + ')', opacity: 1, offset: .32 },
    { transform: 'translate(-50%,calc(-50% - 20px)) scale(' + sc + ')', opacity: 1, offset: .6 },
    { transform: 'translate(-50%,calc(-50% - 42px)) scale(' + sc + ')', opacity: 0, offset: 1 },
  ], { duration: 1000, easing: 'ease-out' }).onfinish = () => el.remove();
  comboParticles(tier, color);
  if (tier >= 5) confetti();     // ×7+ : thêm confetti đơn giản
}
// Hạt phẳng tỏa quanh câu khen: tròn · vuông bo góc · dấu cộng · thoi. Nhiều hơn khi combo cao.
function comboParticles(tier, color) {
  const cx = (cell * COLS) / 2, cy = (cell * ROWS) * 0.4;
  const n = 6 + tier * 4;
  for (let i = 0; i < n; i++) {
    const p = document.createElement('div');
    p.className = 'fx-particle';
    const size = 7 + Math.random() * 5;
    p.style.width = p.style.height = size + 'px';
    p.style.left = cx + 'px'; p.style.top = cy + 'px';
    p.style.background = color;
    const shape = i % 4;
    if (shape === 0) p.style.borderRadius = '50%';                             // tròn
    else if (shape === 1) p.style.borderRadius = '3px';                        // vuông bo góc
    else if (shape === 2) p.style.clipPath =                                   // dấu cộng
      'polygon(38% 0,62% 0,62% 38%,100% 38%,100% 62%,62% 62%,62% 100%,38% 100%,38% 62%,0 62%,0 38%,38% 38%)';
    else p.style.clipPath = 'polygon(50% 0,100% 50%,50% 100%,0 50%)';          // thoi
    boardEl.appendChild(p);
    const a = (i / n) * Math.PI * 2 + Math.random() * 0.5;
    const dist = cell * (0.8 + Math.random() * 1.0 + tier * 0.18);
    const dx = Math.cos(a) * dist;
    const dy = Math.sin(a) * dist - cell * 0.35;    // hơi thiên lên trên
    p.animate([
      { transform: 'translate(-50%,-50%) scale(0)', opacity: 1 },
      { transform: 'translate(calc(-50% + ' + (dx * 0.6) + 'px),calc(-50% + ' + (dy * 0.6) + 'px)) scale(1)', opacity: 1, offset: .35 },
      { transform: 'translate(calc(-50% + ' + dx + 'px),calc(-50% + ' + dy + 'px)) scale(.3)', opacity: 0 },
    ], { duration: 620 + Math.random() * 260, easing: 'cubic-bezier(.2,.7,.3,1)' }).onfinish = () => p.remove();
  }
}

// Rung TỪNG KHỐI (không rung khay): mỗi tile giật nhẹ theo hướng ngẫu nhiên rồi về chỗ
function shake() {
  for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) {
    const t = board[r][c];
    if (!t || t.el.classList.contains('clearing')) continue;   // bỏ khối đang nổ
    const p = pos(r, c), bx = c * cell, by = r * cell;
    const a = Math.random() * Math.PI * 2;
    const m = 3 + Math.random() * 3;                            // biên độ rung nhỏ (px)
    const dx = Math.cos(a) * m, dy = Math.sin(a) * m;
    t.el.animate([
      { transform: p },
      { transform: 'translate(' + (bx + dx) + 'px,' + (by + dy) + 'px)', offset: .25 },
      { transform: 'translate(' + (bx - dx * 0.7) + 'px,' + (by - dy * 0.7) + 'px)', offset: .55 },
      { transform: 'translate(' + (bx + dx * 0.4) + 'px,' + (by + dy * 0.4) + 'px)', offset: .8 },
      { transform: p },
    ], { duration: 300, easing: 'ease-out' });
  }
}

function spawnRecordToast() {
  const el = document.createElement('div');
  el.className = 'fx-combo';
  el.style.top = '30%';
  el.textContent = t('newBest');
  boardEl.appendChild(el);
  el.animate([
    { transform: 'translate(-50%,-50%) scale(.5)', opacity: 0 },
    { transform: 'translate(-50%,-50%) scale(1.15)', opacity: 1, offset: .3 },
    { transform: 'translate(-50%,-90%) scale(1)', opacity: 0 },
  ], { duration: 1100, easing: 'ease-out' }).onfinish = () => el.remove();
}

// Pháo hoa chúc mừng: nhiều quả nổ bung ở các điểm khác nhau, lệch thời gian
function confetti() {
  const app = document.getElementById('app');
  const W = window.innerWidth, H = window.innerHeight;
  const shells = 6;
  for (let s = 0; s < shells; s++) {
    const bx = W * (0.15 + Math.random() * 0.7);      // điểm nổ ngang
    const by = H * (0.18 + Math.random() * 0.34);     // độ cao nổ
    fireworkBurst(app, bx, by, s * 240 + Math.random() * 140);
  }
}
function fireworkBurst(app, bx, by, delay) {
  const color = COLORS[(Math.random() * COLORS.length) | 0];
  const n = 22, R = 90 + Math.random() * 90;
  // Chớp sáng tại tâm nổ
  const flash = document.createElement('div');
  flash.className = 'fw-flash';
  flash.style.left = bx + 'px'; flash.style.top = by + 'px';
  app.appendChild(flash);
  flash.animate([
    { transform: 'translate(-50%,-50%) scale(.2)', opacity: .95 },
    { transform: 'translate(-50%,-50%) scale(2.4)', opacity: 0 },
  ], { duration: 360, delay, easing: 'ease-out', fill: 'backwards' }).onfinish = () => flash.remove();
  // Tia bắn toả tròn rồi rơi xuống + mờ dần
  for (let i = 0; i < n; i++) {
    const p = document.createElement('div');
    p.className = 'fw';
    p.style.background = color; p.style.color = color;   // color → box-shadow glow
    p.style.left = bx + 'px'; p.style.top = by + 'px';
    app.appendChild(p);
    const ang = (i / n) * Math.PI * 2 + Math.random() * 0.25;
    const dist = R * (0.6 + Math.random() * 0.5);
