  ring.animate([
    { transform: 'translate(-50%,-50%) scale(.2)', opacity: .95 },
    { transform: 'translate(-50%,-50%) scale(1)', opacity: 0 },
  ], { duration: 660, delay: (delay || 0) * 1000, easing: 'ease-out', fill: 'backwards' }).onfinish = () => ring.remove();
}

function randColor() { return (Math.random() * NCOLORS) | 0; }

/* =====================================================================
 * 7b. Bom đếm ngược theo lượt
 * ===================================================================== */
// Gỡ mọi bom có ô kề (trên/dưới/trái/phải) hoặc chính ô bom nằm trong tập vừa xoá.
// Nổ MÀU ĐEN khi gỡ bom: khói tối lan ra + mảnh đen bắn tỏa nhanh
function defuseBurst(cx, cy) {
  const ring = document.createElement('div');
  ring.className = 'fx-ring';
  ring.style.color = '#1a1a1a';
  ring.style.left = cx + 'px'; ring.style.top = cy + 'px';
  ring.style.width = ring.style.height = (cell * 2.1) + 'px';
  boardEl.appendChild(ring);
  ring.animate([
    { transform: 'translate(-50%,-50%) scale(.25)', opacity: .85 },
    { transform: 'translate(-50%,-50%) scale(1)', opacity: 0 },
  ], { duration: 440, easing: 'ease-out' }).onfinish = () => ring.remove();
  const n = 10;
  for (let i = 0; i < n; i++) {
    const p = document.createElement('div');
    p.className = 'fx-particle';
    const sz = 5 + Math.random() * 5;
    p.style.width = p.style.height = sz + 'px';
    p.style.borderRadius = '50%';
    p.style.background = i % 3 ? '#111' : '#3a3a3a';
    p.style.left = cx + 'px'; p.style.top = cy + 'px';
    boardEl.appendChild(p);
    const a = (i / n) * Math.PI * 2 + Math.random() * 0.4;
    const dist = cell * (1.1 + Math.random() * 0.9);
    const dx = Math.cos(a) * dist, dy = Math.sin(a) * dist;
    p.animate([
      { transform: 'translate(-50%,-50%) scale(1.2)', opacity: .95 },
      { transform: 'translate(calc(-50% + ' + dx + 'px),calc(-50% + ' + dy + 'px)) scale(.2)', opacity: 0 },
    ], { duration: 430 + Math.random() * 170, easing: 'cubic-bezier(.2,.7,.3,1)' }).onfinish = () => p.remove();
  }
}

function defuseBombs(clr) {
  for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) {
    const t = board[r][c];
    if (!t || !t.bomb) continue;
    const near = clr.has(key(r, c)) || clr.has(key(r - 1, c)) || clr.has(key(r + 1, c)) ||
                 clr.has(key(r, c - 1)) || clr.has(key(r, c + 1));
    if (!near) continue;
    const [cx, cy] = fxCenter(r, c);
    defuseBurst(cx, cy);               // nổ khói/mảnh MÀU ĐEN khi gỡ bom
    spawnPop(cx, cy, '+50');
    addScore(5, 1);                    // thưởng gỡ bom = 50 điểm
    flyToScore(cx, cy);                // đốm điểm bay về thẻ SCORE
    t.el.remove(); board[r][c] = null; // gỡ xong biến mất (gravity sẽ lấp)
  }
}

// Gọi sau mỗi lượt hợp lệ: đếm ngược mọi bom, nổ nếu về 0, rồi spawn định kỳ.
function onMoveResolved() {
  if (ended) return;
  moves++;
  let boom = null;
  for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) {
    const t = board[r][c];
    if (t && t.bomb) {
      t.timer--;
      if (t.timer <= 0) { if (!boom) boom = { r, c }; }
      else paintBomb(t);
    }
  }
  if (boom) { explodeBomb(boom.r, boom.c); return; }   // về 0 → nổ & thua
  if (moves % SPAWN_EVERY === 0) spawnBomb();
}

// Sinh 1 bom ở ô ngẫu nhiên (thay 1 tile thường đang có trên bàn).
function spawnBomb() {
  const cells = [];
  for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) {
    const t = board[r][c];
    if (t && !t.bomb) cells.push([r, c]);
  }
  if (!cells.length) return;
  const [r, c] = cells[(Math.random() * cells.length) | 0];
  board[r][c].el.remove();
  const b = makeBomb(BOMB_START);
  board[r][c] = b;
  const p = pos(r, c);
  b.el.style.transform = p;
  b.el.animate([
    { transform: p + ' scale(.2)', opacity: 0 },
    { transform: p + ' scale(1.2)', opacity: 1, offset: .6 },
    { transform: p },
  ], { duration: 360, easing: 'ease-out' });
  if (!hasAnyMove()) reshuffle(true);  // phòng khi bom chặn hết nước đi (kèm toast + anim)
}

// Bom nổ (đếm về 0) → NỔ LỚN + Game Over.
function explodeBomb(r, c) {
  const t = board[r][c];
  const [cx, cy] = fxCenter(r, c);
  if (t) { t.el.remove(); board[r][c] = null; }
  bigBoom(cx, cy);
  gameOver();
}
// Nổ lớn (bom đếm ngược): chớp trắng + 2 vòng sốc đỏ/cam + mảnh bắn tỏa nhanh
function bigBoom(cx, cy) {
  const flash = document.createElement('div');
  flash.className = 'fx-rainbow-flash';
  flash.style.width = flash.style.height = (cell * 3.4) + 'px';
  flash.style.left = cx + 'px'; flash.style.top = cy + 'px';
  boardEl.appendChild(flash);
  flash.animate([
    { transform: 'translate(-50%,-50%) scale(.2)', opacity: 1 },
    { transform: 'translate(-50%,-50%) scale(2.2)', opacity: 0 },
  ], { duration: 360, easing: 'ease-out' }).onfinish = () => flash.remove();
  [['#ff5a5f', 3.6, 520], ['#ffb02e', 4.6, 640]].forEach(([col, sc, dur]) => {
    const ring = document.createElement('div');
    ring.className = 'fx-ring';
    ring.style.color = col;
    ring.style.left = cx + 'px'; ring.style.top = cy + 'px';
    ring.style.width = ring.style.height = (cell * sc) + 'px';
    boardEl.appendChild(ring);
    ring.animate([
      { transform: 'translate(-50%,-50%) scale(.25)', opacity: .95 },
      { transform: 'translate(-50%,-50%) scale(1)', opacity: 0 },
    ], { duration: dur, easing: 'ease-out' }).onfinish = () => ring.remove();
  });
  const n = 18;
  for (let i = 0; i < n; i++) {
    const p = document.createElement('div');
    p.className = 'fx-particle';
    const sz = 6 + Math.random() * 6;
    p.style.width = p.style.height = sz + 'px';
    p.style.borderRadius = '50%';
    const col = i % 2 ? '#ff5a5f' : '#ffb02e';
    p.style.background = col; p.style.color = col;
    p.style.left = cx + 'px'; p.style.top = cy + 'px';
    boardEl.appendChild(p);
    const a = (i / n) * Math.PI * 2 + Math.random() * 0.3;
    const dist = cell * (2 + Math.random() * 1.6);
    const dx = Math.cos(a) * dist, dy = Math.sin(a) * dist;
    p.animate([
      { transform: 'translate(-50%,-50%) scale(1.4)', opacity: 1 },
      { transform: 'translate(calc(-50% + ' + (dx * 0.6) + 'px),calc(-50% + ' + (dy * 0.6) + 'px)) scale(1)', opacity: 1, offset: .5 },
      { transform: 'translate(calc(-50% + ' + dx + 'px),calc(-50% + ' + dy + 'px)) scale(.2)', opacity: 0 },
    ], { duration: 480 + Math.random() * 220, easing: 'cubic-bezier(.2,.7,.3,1)' }).onfinish = () => p.remove();
  }
}

/* =====================================================================
 * 8. Score / HUD / end
 * ===================================================================== */
let dispScore = 0;        // điểm ĐANG hiển thị (chạy dần tới score)
let scoreRAF = 0;

function addScore(n, chainMul) {
  score += n * 10 * chainMul;
  if (score > best) { best = score; persistBest(); }   // lưu ngay; HUD Best chỉ refresh khi hết màn/ván mới (§1.2)
  if (!recordHit && runRecord > 0 && score > runRecord) {           // vừa vượt kỷ lục cũ
    recordHit = true; confetti(); spawnRecordToast();
  }
  // KHÔNG cập nhật số ngay — để đốm điểm bay về thẻ rồi số mới chạy dần lên (xem flyToScore)
}

// Số điểm CHẠY DẦN tới score (count-up)
function tweenScore() {
  if (scoreRAF) return;
  const step = () => {
    const diff = score - dispScore;
    if (diff <= 0.6) { dispScore = score; renderScore(); scoreRAF = 0; return; }
    dispScore = Math.min(score, dispScore + Math.max(1, diff * 0.16));
    renderScore();
    scoreRAF = requestAnimationFrame(step);
  };
  scoreRAF = requestAnimationFrame(step);
}
// Thẻ SCORE nảy nhẹ khi nhận điểm
function bumpScoreCard() {
  const val = document.getElementById('score-val');
  const box = val && val.closest('.sc-box');
  if (!box) return;
  box.animate([{ transform: 'scale(1)' }, { transform: 'scale(1.12)', offset: .4 }, { transform: 'scale(1)' }],
    { duration: 240, easing: 'ease-out' });
}
// Ghi nhận điểm: số CHẠY DẦN lên + thẻ SCORE nảy (đã bỏ hiệu ứng đốm bay về score)
function flyToScore(bx, by) {
  bumpScoreCard();
  tweenScore();
}
/* Co cỡ chữ SỐ trong mỗi khung điểm để LUÔN vừa khung (số lớn → nhỏ dần, không bị cắt). */
function fitHudScores() {
  document.querySelectorAll('.scorebar .sc-box').forEach((box) => {
    const v = box.querySelector('.sc-v');
    if (!v) return;
    v.style.fontSize = '';                                   // reset về cỡ CSS trước khi đo
    const cs = getComputedStyle(box);
    const avail = box.clientWidth - parseFloat(cs.paddingLeft) - parseFloat(cs.paddingRight);
    if (avail <= 0) return;
    let fz = parseFloat(getComputedStyle(v).fontSize) || 26;
    while (v.scrollWidth > avail && fz > 10) { fz -= 1; v.style.fontSize = fz + 'px'; }
  });
}

function renderScore() {
  const val = document.getElementById('score-val');
  if (val) val.textContent = Math.round(dispScore);
  fitHudScores();
}

/* =====================================================================
 * 8b. Persistence: điểm cao nhất (best) — game-common §1.2
 * ===================================================================== */
const LS_KEY = 'skydom_save';
function readLocal() { try { return localStorage.getItem(LS_KEY) || ''; } catch (e) { return ''; } }
function saveLocal(obj) { try { localStorage.setItem(LS_KEY, JSON.stringify(obj)); } catch (e) { /* quota */ } }
function getInitialData() {
  const fromWin = typeof window.data === 'string' ? window.data : null;
  const fromUrl = new URLSearchParams(location.search).get('data');
  return fromWin != null ? fromWin : (fromUrl || '');
}
function loadPersist() {
  let nativeObj = null, localObj = null;
  const raw = getInitialData(); if (raw) { try { nativeObj = JSON.parse(raw); } catch (e) {} }
  const lraw = readLocal(); if (lraw) { try { localObj = JSON.parse(lraw); } catch (e) {} }
  const merged = Object.assign({}, localObj || {}, nativeObj || {}); // native thắng data nhẹ
  best = Number(merged.best) || 0;
  Sound.setMuted(merged.muted === true);
}
function persistBest() {
  const payload = { best, muted: Sound.isMuted() };
  saveData(payload);   // native (data nhẹ) — ghi đè
  saveLocal(payload);  // localStorage backup
}
function renderBest() {
  const b = document.getElementById('best-val');
  if (b) b.textContent = best;   // endless: best chạy live
  fitHudScores();
}

/* =====================================================================
 * 8c. Hiệu ứng (juice)
 * ===================================================================== */
function fxCenter(r, c) { return [c * cell + cell / 2, r * cell + cell / 2]; }

function spawnPop(x, y, text) {
  const el = document.createElement('div');
  el.className = 'fx-pop';
  el.textContent = text;
  el.style.left = x + 'px'; el.style.top = y + 'px';
  boardEl.appendChild(el);
  el.animate([
    { transform: 'translate(-50%,-50%) scale(.6)', opacity: 0 },
    { transform: 'translate(-50%,-95%) scale(1.15)', opacity: 1, offset: .3 },
    { transform: 'translate(-50%,-175%) scale(1)', opacity: 0 },
  ], { duration: 820, easing: 'ease-out' }).onfinish = () => el.remove();
}

function spawnParticles(list) {
  const cap = Math.min(list.length, 26);
  const step = Math.max(1, Math.floor(list.length / cap));
  for (let i = 0; i < list.length; i += step) {
    const [x, y, color, delay] = list[i];
    for (let k = 0; k < 3; k++) {   // nhiều mảnh hơn → nổ "đầy" hơn
      const p = document.createElement('div');
      p.className = 'fx-particle';
      p.style.background = color;
      p.style.color = color;        // cho box-shadow glow ăn theo màu mảnh
      p.style.left = x + 'px'; p.style.top = y + 'px';
      boardEl.appendChild(p);
      // Bắn mảnh vỡ ra ngoài + lên cao, rồi trọng lực kéo rơi xuống (quỹ đạo parabol) — TO & CHẬM hơn
      const ang = Math.random() * Math.PI * 2;
      const spd = cell * (0.75 + Math.random() * 1.1);                          // văng xa hơn
      const dx = Math.cos(ang) * spd;
      const up = Math.abs(Math.sin(ang)) * spd * 0.6 + cell * (0.5 + Math.random() * 0.4);
      const fall = cell * (1.9 + Math.random() * 1.3);                          // rơi xa hơn
      const rot = (Math.random() * 640 - 320) | 0;
      p.animate([
        { transform: 'translate(-50%,-50%) rotate(0deg) scale(1.35)', opacity: 1, offset: 0 },
        { transform: 'translate(calc(-50% + ' + (dx * 0.55) + 'px), calc(-50% - ' + up + 'px)) rotate(' + (rot * 0.5) + 'deg) scale(1.05)', opacity: 1, offset: .42 },
        { transform: 'translate(calc(-50% + ' + dx + 'px), calc(-50% + ' + fall + 'px)) rotate(' + rot + 'deg) scale(.2)', opacity: 0, offset: 1 },
      ], { duration: 1250 + Math.random() * 450, delay: (delay || 0) * 1000, fill: 'backwards', easing: 'cubic-bezier(.3,.5,.55,1)' }).onfinish = () => p.remove();
    }
  }
}

// Câu khen tăng dần theo cấp combo (chain 2 → phần tử đầu; cao hơn → mạnh hơn)
function praiseWord(chain) {
  const arr = (I18N[LANG] && I18N[LANG].praise) || I18N.en.praise;   // theo ngôn ngữ, fallback en
  const i = Math.min(Math.max(chain - 2, 0), arr.length - 1);
  return arr[i];
}
// Màu câu khen theo cấp: ×2 lá · ×3 dương · ×4 tím · ×5 cam · ×6 đỏ cam · ×7+ vàng
// (sáng hơn để nổi rõ trên chip nền tối)
const COMBO_COLORS = ['#3ee87f', '#5bb8ff', '#c795ff', '#ffab54', '#ff7a5c', '#ffe066'];
function spawnCombo(chainMul) {
  const tier = Math.min(Math.max(chainMul - 2, 0), 5);   // 0..5 → ×2..×7+
  const color = COMBO_COLORS[tier];
  const sc = 1 + tier * 0.08;                            // combo cao → chữ to hơn (nhẹ)
  const el = document.createElement('div');
  el.className = 'fx-combo combo-pop';
  el.style.setProperty('--cc', color);
  el.innerHTML = '<span class="fx-praise">' + praiseWord(chainMul) + '</span>' +
                 '<span class="fx-mult">' + t('combo') + ' ×' + chainMul + '</span>';
  boardEl.appendChild(el);
  // Flat: hiện nhanh (0.7→1.2→1.0) → giữ & bay lên nhẹ → mờ dần khi vẫn bay lên
  el.animate([
    { transform: 'translate(-50%,-50%) scale(.7)', opacity: 0, offset: 0 },
    { transform: 'translate(-50%,-50%) scale(1.2)', opacity: 1, offset: .2 },
    { transform: 'translate(-50%,-50%) scale(' + sc + ')', opacity: 1, offset: .32 },
    { transform: 'translate(-50%,calc(-50% - 20px)) scale(' + sc + ')', opacity: 1, offset: .6 },
    { transform: 'translate(-50%,calc(-50% - 42px)) scale(' + sc + ')', opacity: 0, offset: 1 },
  ], { duration: 1000, easing: 'ease-out' }).onfinish = () => el.remove();
  comboParticles(tier, color);
}
// Hạt phẳng tỏa quanh câu khen: tròn · vuông bo góc · dấu cộng · thoi. Nhiều hơn khi combo cao.
function comboParticles(tier, color) {
  const cx = (cell * COLS) / 2, cy = (cell * ROWS) * 0.4;
  const n = 6 + tier * 4;
  for (let i = 0; i < n; i++) {
    const p = document.createElement('div');
    p.className = 'fx-particle';
    const size = 7 + Math.random() * 5;
    p.style.width = p.style.height = size + 'px';
    p.style.left = cx + 'px'; p.style.top = cy + 'px';
    p.style.background = color;
    const shape = i % 4;
    if (shape === 0) p.style.borderRadius = '50%';                             // tròn
    else if (shape === 1) p.style.borderRadius = '3px';                        // vuông bo góc
    else if (shape === 2) p.style.clipPath =                                   // dấu cộng
      'polygon(38% 0,62% 0,62% 38%,100% 38%,100% 62%,62% 62%,62% 100%,38% 100%,38% 62%,0 62%,0 38%,38% 38%)';
    else p.style.clipPath = 'polygon(50% 0,100% 50%,50% 100%,0 50%)';          // thoi
    boardEl.appendChild(p);
    const a = (i / n) * Math.PI * 2 + Math.random() * 0.5;
    const dist = cell * (0.8 + Math.random() * 1.0 + tier * 0.18);
    const dx = Math.cos(a) * dist;
    const dy = Math.sin(a) * dist - cell * 0.35;    // hơi thiên lên trên
    p.animate([
      { transform: 'translate(-50%,-50%) scale(0)', opacity: 1 },
      { transform: 'translate(calc(-50% + ' + (dx * 0.6) + 'px),calc(-50% + ' + (dy * 0.6) + 'px)) scale(1)', opacity: 1, offset: .35 },
      { transform: 'translate(calc(-50% + ' + dx + 'px),calc(-50% + ' + dy + 'px)) scale(.3)', opacity: 0 },
    ], { duration: 620 + Math.random() * 260, easing: 'cubic-bezier(.2,.7,.3,1)' }).onfinish = () => p.remove();
  }
}

function spawnRecordToast() {
  const el = document.createElement('div');
  el.className = 'fx-combo';
  el.style.top = '30%';
  el.textContent = t('newBest');
  boardEl.appendChild(el);
  el.animate([
    { transform: 'translate(-50%,-50%) scale(.5)', opacity: 0 },
    { transform: 'translate(-50%,-50%) scale(1.15)', opacity: 1, offset: .3 },
    { transform: 'translate(-50%,-90%) scale(1)', opacity: 0 },
  ], { duration: 1100, easing: 'ease-out' }).onfinish = () => el.remove();
}

// Pháo hoa chúc mừng: nhiều quả nổ bung ở các điểm khác nhau, lệch thời gian
function confetti() {
  const app = document.getElementById('app');
  const W = window.innerWidth, H = window.innerHeight;
  const shells = 6;
  for (let s = 0; s < shells; s++) {
    const bx = W * (0.15 + Math.random() * 0.7);      // điểm nổ ngang
    const by = H * (0.18 + Math.random() * 0.34);     // độ cao nổ
    fireworkBurst(app, bx, by, s * 240 + Math.random() * 140);
  }
}
function fireworkBurst(app, bx, by, delay) {
  const color = COLORS[(Math.random() * COLORS.length) | 0];
  const n = 22, R = 90 + Math.random() * 90;
  // Chớp sáng tại tâm nổ
  const flash = document.createElement('div');
  flash.className = 'fw-flash';
  flash.style.left = bx + 'px'; flash.style.top = by + 'px';
  app.appendChild(flash);
  flash.animate([
    { transform: 'translate(-50%,-50%) scale(.2)', opacity: .95 },
    { transform: 'translate(-50%,-50%) scale(2.4)', opacity: 0 },
  ], { duration: 360, delay, easing: 'ease-out', fill: 'backwards' }).onfinish = () => flash.remove();
  // Tia bắn toả tròn rồi rơi xuống + mờ dần
  for (let i = 0; i < n; i++) {
    const p = document.createElement('div');
    p.className = 'fw';
    p.style.background = color; p.style.color = color;   // color → box-shadow glow
    p.style.left = bx + 'px'; p.style.top = by + 'px';
    app.appendChild(p);
    const ang = (i / n) * Math.PI * 2 + Math.random() * 0.25;
    const dist = R * (0.6 + Math.random() * 0.5);
    const dx = Math.cos(ang) * dist, dy = Math.sin(ang) * dist;
    const fall = 70 + Math.random() * 90;
    p.animate([
      { transform: 'translate(-50%,-50%) scale(1.25)', opacity: 1, offset: 0 },
      { transform: 'translate(calc(-50% + ' + dx + 'px),calc(-50% + ' + dy + 'px)) scale(.95)', opacity: 1, offset: .55 },
      { transform: 'translate(calc(-50% + ' + dx + 'px),calc(-50% + ' + (dy + fall) + 'px)) scale(.15)', opacity: 0, offset: 1 },
    ], { duration: 950 + Math.random() * 450, delay, easing: 'cubic-bezier(.15,.6,.4,1)', fill: 'backwards' }).onfinish = () => p.remove();
  }
}

async function settleAfterMove() {
  if (ended) return;                    // bom vừa nổ → thua, không xáo nữa
  if (!hasAnyMove()) reshuffle(true);   // endless: chỉ xáo khi kẹt (kèm toast + anim)
}

/* =====================================================================
 * 9. No-move detection + reshuffle
 * ===================================================================== */
function hasAnyMove() {
  for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) {
    const t = board[r][c];
    if (!t || t.bomb) continue;                          // bom không di chuyển được
    if (t.special) return true;                          // special luôn dùng được
    for (const [nr, nc] of [[r, c + 1], [r + 1, c]]) {
      if (!inb(nr, nc)) continue;
      const nt = board[nr][nc];
      if (!nt || nt.bomb) continue;                      // không đổi chỗ với bom
      swapPlain(r, c, nr, nc);
      const ok = anyMatch(null);
      swapPlain(r, c, nr, nc);
      if (ok) return true;
    }
  }
  return false;
}
function swapPlain(r1, c1, r2, c2) {
  const t = board[r1][c1]; board[r1][c1] = board[r2][c2]; board[r2][c2] = t;
}
function reshuffle(announce) {
  let tries = 0;
  do {
    const cells = [], colors = [];
    for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) {
      const t = board[r][c];
      if (t && !t.bomb) { cells.push([r, c]); colors.push(t.color); }  // chừa bom tại chỗ
    }
    for (let i = colors.length - 1; i > 0; i--) {
      const j = (Math.random() * (i + 1)) | 0;
      [colors[i], colors[j]] = [colors[j], colors[i]];
    }
    cells.forEach(([r, c], i) => { board[r][c].color = colors[i]; paintTile(board[r][c]); });
    tries++;
  } while ((anyMatch(null) || !hasAnyMove()) && tries < 40);
  layout();
  if (announce) shuffleFx();   // toast + animation khi xáo do kẹt (không dùng lúc dựng bàn)
}

// Hiệu ứng xáo bài: pop-xoay từng ô (lệch pha nhẹ) + toast giữa bàn
function shuffleFx() {
  for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) {
    const tl = board[r][c];
    if (!tl) continue;
    const p = pos(r, c);
    tl.el.animate([
      { transform: p + ' scale(1) rotate(0deg)' },
      { transform: p + ' scale(.5) rotate(-24deg)', offset: .4 },
      { transform: p + ' scale(1.12) rotate(10deg)', offset: .75 },
      { transform: p + ' scale(1) rotate(0deg)' },
    ], { duration: 520, easing: 'ease-in-out', delay: ((r + c) % 6) * 35 });
  }
  spawnToast(t('shuffle'));
}
function spawnToast(text) {
  const el = document.createElement('div');
  el.className = 'fx-combo';
  el.style.top = '50%';
  el.textContent = text;
  boardEl.appendChild(el);
  el.animate([
    { transform: 'translate(-50%,-50%) scale(.6)', opacity: 0 },
    { transform: 'translate(-50%,-50%) scale(1.12)', opacity: 1, offset: .3 },
    { transform: 'translate(-50%,-50%) scale(1)', opacity: 1, offset: .7 },
    { transform: 'translate(-50%,-50%) scale(1)', opacity: 0 },
  ], { duration: 1050, easing: 'ease-out' }).onfinish = () => el.remove();
}

/* =====================================================================
 * 9b. Gợi ý nước đi (hint khi để yên lâu)
 * ===================================================================== */
let idleTimer = null;
let hintCells = [];
const IDLE_MS = 5000;

// Tìm 1 nước đi: ưu tiên cặp swap tạo match → trả về { mover, dest, matchers }
//   mover  = viên người chơi cần KÉO (nhích về phía dest + lắc)
//   dest   = ô đích khi kéo (để suy ra hướng nhích)
//   matchers = các viên sẽ ghép cùng (lắc tại chỗ)
// Nếu không có swap nào, trỏ vào 1 special: { special }.
function findHint() {
  for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) {
    const t = board[r][c];
    if (!t || t.bomb) continue;
    for (const [nr, nc] of [[r, c + 1], [r + 1, c]]) {
      if (!inb(nr, nc)) continue;
      const nt = board[nr][nc];
      if (!nt || nt.bomb) continue;
      swapPlain(r, c, nr, nc);
      const mm = findMatches(null);
      swapPlain(r, c, nr, nc);
      if (mm.clearCells.size || mm.specialPlans.length) {
        // Tập ô được ghép sau khi đổi chỗ (gồm cả ô sinh special)
        const M = new Set(mm.clearCells);
        for (const p of mm.specialPlans) M.add(key(p.r, p.c));
        // Viên nào rơi vào tập match ở ô đích thì đó là viên cần kéo
        let mover, dest;
        if (M.has(key(nr, nc))) { mover = { r, c }; dest = { r: nr, c: nc }; }
        else { mover = { r: nr, c: nc }; dest = { r, c }; }
        const matchers = [];
        for (const k of M) {
          if (k === key(dest.r, dest.c)) continue;   // ô đích là chỗ viên kéo tới → không lắc tại chỗ
          const [mr, mc] = k.split(',').map(Number);
          matchers.push({ r: mr, c: mc });
        }
        return { mover, dest, matchers };
      }
    }
  }
  for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) {
    const t = board[r][c];
    if (t && t.special) return { special: { r, c } };
  }
  return null;
}
function clearHint() {
  for (const t of hintCells) if (t.el) {
    t.el.classList.remove('hint-move', 'hint-shake');
    if (t.face) { t.face.style.removeProperty('--nx'); t.face.style.removeProperty('--ny'); }
  }
  hintCells = [];
}
function showHint() {
  clearHint();
  if (busy || ended) return;
  const h = findHint();
  if (!h) return;
  if (h.special) {   // special đơn lẻ: lắc tại chỗ nhắc "dùng được"
    const t = board[h.special.r][h.special.c];
    if (t) { t.el.classList.add('hint-shake'); hintCells.push(t); }
    return;
  }
  // Viên cần kéo: nhích 1 chút về hướng dest rồi lắc
  const mv = board[h.mover.r][h.mover.c];
  if (mv) {
    const nd = Math.max(3, cell * 0.14);                       // quãng nhích nhẹ ~14% ô
    mv.face.style.setProperty('--nx', ((h.dest.c - h.mover.c) * nd) + 'px');
    mv.face.style.setProperty('--ny', ((h.dest.r - h.mover.r) * nd) + 'px');
    mv.el.classList.add('hint-move');
    hintCells.push(mv);
  }
  // Các viên sẽ ghép cùng: lắc tại chỗ
  for (const p of h.matchers) {
    const t = board[p.r] && board[p.r][p.c];
    if (t) { t.el.classList.add('hint-shake'); hintCells.push(t); }
  }
}
function resetIdle() {
  clearHint();
  if (idleTimer) { clearTimeout(idleTimer); idleTimer = null; }
  if (busy || ended) return;
  idleTimer = setTimeout(showHint, IDLE_MS);
}

/* =====================================================================
 * 10. Build board / new run
 * ===================================================================== */
function buildBoard() {
  boardEl.innerHTML = '';
  board = Array.from({ length: ROWS }, () => new Array(COLS).fill(null));
  for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) {
    let color;
    let guard = 0;
    do {
      color = randColor();
      guard++;
    } while (guard < 40 && (
      (c >= 2 && board[r][c - 1] && board[r][c - 2] &&
        board[r][c - 1].color === color && board[r][c - 2].color === color) ||
      (r >= 2 && board[r - 1][c] && board[r - 2][c] &&
        board[r - 1][c].color === color && board[r - 2][c].color === color)
    ));
    board[r][c] = makeTile(color);
  }
  if (!hasAnyMove()) reshuffle();
  resize();
}

function newRun() {
  score = 0;
  dispScore = 0;         // reset số hiển thị (count-up)
  if (scoreRAF) { cancelAnimationFrame(scoreRAF); scoreRAF = 0; }
  runRecord = best;      // mốc kỷ lục để mừng khi vượt trong ván này
  recordHit = false;
  ended = false;
  busy = false;
  sel = null;
  moves = 0;
  const ov = document.getElementById('overlay');
  if (ov) ov.classList.add('hidden');
  buildBoard();
  renderScore();
  renderBest();
  resetIdle();           // bắt đầu đếm giờ gợi ý cho ván mới
}

/* Game Over (bom nổ) — game điểm-cao tự vẽ popup (popup-common) */
function gameOver() {
  if (ended) return;
  ended = true;
  clearHint();
  if (idleTimer) { clearTimeout(idleTimer); idleTimer = null; }
  const isNew = recordHit || score > runRecord;
  document.getElementById('ov-title').textContent = isNew ? t('newBest') : t('gameOver');
  document.getElementById('ov-score').textContent = score;
  document.getElementById('ov-best').textContent = best;
  renderBest();                 // refresh HUD Best khi hết màn (§1.2)
  fitScores();
  sendMessage('game_result');   // endless: result=null, showModal=false
  setTimeout(() => document.getElementById('overlay').classList.remove('hidden'), 550);
}
// Tự co cỡ điểm cho vừa card khi điểm nhiều chữ số (popup-common §5b)
function fitScores() {
  const r = document.querySelector('.sb'); if (!r) return;
  const card = r.closest('.card');
  const vals = r.querySelectorAll('.v');
  vals.forEach(v => { v.style.fontSize = ''; });
  const pad = parseFloat(getComputedStyle(card).paddingLeft) || 26;
  const max = card.clientWidth - 2 * pad;
  let fz = parseFloat(getComputedStyle(vals[0]).fontSize) || 32;
  while (r.scrollWidth > max && fz > 14) { fz -= 1; vals.forEach(v => { v.style.fontSize = fz + 'px'; }); }
}

/* =====================================================================
 * 11. Input (tap + swipe)
 * ===================================================================== */
function cellFromEvent(e) {
  const rect = boardEl.getBoundingClientRect();
  const c = Math.floor((e.clientX - rect.left) / cell);
  const r = Math.floor((e.clientY - rect.top) / cell);
  return inb(r, c) ? { r, c } : null;
}
function clearSelection() {
  if (sel && board[sel.r] && board[sel.r][sel.c]) board[sel.r][sel.c].el.classList.remove('sel');
  sel = null;
}
function selectCell(p) {
  clearSelection();
  const t = board[p.r][p.c];
  if (!t || t.bomb) return;         // bom không chọn/đổi chỗ được
  sel = p;
  t.el.classList.add('sel');
}

let downCell = null, downX = 0, downY = 0, swiped = false;
boardEl.addEventListener('pointerdown', (e) => {
  resetIdle();               // chạm bàn → tắt hint, hẹn lại giờ gợi ý
  if (busy || ended) return;
  const p = cellFromEvent(e);
  if (!p) return;
  downCell = p; downX = e.clientX; downY = e.clientY; swiped = false;
});
boardEl.addEventListener('pointermove', (e) => {
  if (busy || ended || !downCell || swiped) return;
  const dx = e.clientX - downX, dy = e.clientY - downY;
  if (Math.abs(dx) < cell * 0.4 && Math.abs(dy) < cell * 0.4) return;
  swiped = true;
  let nr = downCell.r, nc = downCell.c;
  if (Math.abs(dx) > Math.abs(dy)) nc += dx > 0 ? 1 : -1;
  else nr += dy > 0 ? 1 : -1;
  if (inb(nr, nc)) tryMove(downCell, { r: nr, c: nc });
  downCell = null;
});
window.addEventListener('pointerup', (e) => {
  if (busy || ended || !downCell || swiped) { downCell = null; return; }
  const p = downCell; downCell = null;
  if (sel) {
    if (sel.r === p.r && sel.c === p.c) { clearSelection(); return; }
    if (Math.abs(sel.r - p.r) + Math.abs(sel.c - p.c) === 1) {
      const a = sel; clearSelection(); tryMove(a, p); return;
    }
  }
  selectCell(p);
});

/* =====================================================================
 * 12. HUD buttons + native callbacks
 * ===================================================================== */
document.getElementById('back-btn').addEventListener('click', (e) => {
  e.stopPropagation(); sendMessage('quit');
});
document.getElementById('restart-btn').addEventListener('click', (e) => {
  e.stopPropagation(); newRun();  // ván mới: score về 0, giữ best (không bắn event)
});
document.getElementById('ov-btn').addEventListener('click', (e) => {
  e.stopPropagation();
  sendMessage('retry_level');     // game điểm-cao tự lo Play Again (game-common §1.1)
  newRun();
});

// Nút tắt/bật tiếng
const soundBtn = document.getElementById('sound-btn');
function renderSoundBtn() { soundBtn.classList.toggle('muted', Sound.isMuted()); }
soundBtn.addEventListener('click', (e) => {
  e.stopPropagation();
  Sound.ensure(); Sound.resume();
  Sound.setMuted(!Sound.isMuted());
  renderSoundBtn();
  persistBest();                          // lưu lựa chọn tắt/bật tiếng
});

// Mở khoá AudioContext ở lần chạm đầu (chính sách autoplay mobile); thường trực để resume sau pause
function unlockAudio() { Sound.ensure(); Sound.resume(); Sound.startMusic(); }
window.addEventListener('pointerdown', unlockAudio);
window.addEventListener('touchstart', unlockAudio, { passive: true });

window.onAppPause = function () { Sound.suspend(); };   // ra nền → tạm dừng audio
window.onAppResume = function () { Sound.resume(); };
window.onRetryLevel = function () { newRun(); };   // native gọi thì vẫn an toàn

/* =====================================================================
 * 13. Boot
 * ===================================================================== */
function applyStaticI18n() {
  document.getElementById('score-k').textContent = t('score');
  document.getElementById('best-k').textContent = t('best');
  document.getElementById('ov-score-k').textContent = t('score');
  document.getElementById('ov-best-k').textContent = t('best');
  document.getElementById('ov-btn-label').textContent = t('playAgain');
}
function applyStatusBarPad() {
  const sb = getStatusBarHeight();
  document.getElementById('topbar').style.paddingTop =
    'calc(max(' + sb + 'px, env(safe-area-inset-top)) + 28px)';
}

function boot() {
  LANG = getLanguage();
  applyUiFont(LANG);
  applyStatusBarPad();
  applyStaticI18n();
  loadPersist();
  renderSoundBtn();
  newRun();
}

// Tính lại kích thước khi: đổi cỡ, xoay, tải xong, và khi FONT web nạp trễ
// (font đổi chiều cao HUD sau khi resize() đầu đã chạy → phải đo lại, tránh lệch).
window.addEventListener('resize', () => { resize(); fitHudScores(); });
window.addEventListener('orientationchange', () => setTimeout(resize, 120));
window.addEventListener('load', () => { resize(); setTimeout(resize, 250); });
if (document.fonts && document.fonts.ready) document.fonts.ready.then(() => resize());

/* =====================================================================
 * 14. Debug bridge (CHỈ khi ?debug=1) — cho màn test.html điều khiển engine
 * Không ảnh hưởng production: native nạp index.html KHÔNG có debug=1 nên
 * IIFE này thoát ngay, không gắn listener, không đổi hành vi game.
 * Giao tiếp qua postMessage → chạy được cả file:// (cross-origin an toàn).
 * ===================================================================== */
(function debugBridge() {
  if (new URLSearchParams(location.search).get('debug') !== '1') return;

  const dbgClearCell = (r, c) => {
    if (!inb(r, c)) return;
    const t = board[r][c];
    if (t) { t.el.remove(); board[r][c] = null; }
  };
  const dbgClearAll = () => { for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) dbgClearCell(r, c); };
  // Nền caro 2 màu (vàng/tím) — KHÔNG bao giờ có 3-liên-tiếp → không match ngoài ý muốn
  const dbgFillChecker = () => {
    for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++)
      if (!board[r][c]) board[r][c] = makeTile((r + c) % 2 ? 3 : 4);
  };
  const dbgPlace = (r, c, color, special) => {
    if (!inb(r, c)) return;
    dbgClearCell(r, c);
    board[r][c] = makeTile(color || 0, special || null);
  };
  const dbgPlaceBomb = (r, c, timer) => {
    if (!inb(r, c)) return;
    dbgClearCell(r, c);
    board[r][c] = makeBomb(timer);
  };
  const dbgStopIdle = () => { if (idleTimer) { clearTimeout(idleTimer); idleTimer = null; } clearHint(); };

  // Vẽ lại toàn bộ viên thường trên bàn (áp cấu hình LIGHT mới)
  const dbgRepaint = () => {
    for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) {
      const t = board[r][c];
      if (t && !t.bomb) paintTile(t);
    }
  };

  function dbgSetup(m) {
    dbgStopIdle();
    ended = false; busy = false;
    const ov = document.getElementById('overlay'); if (ov) ov.classList.add('hidden');
    if (m.clear !== false) dbgClearAll();
    if (m.fill !== 'none') dbgFillChecker();
    (m.tiles || []).forEach((t) => {
      if (t.bomb != null) dbgPlaceBomb(t.r, t.c, t.bomb);
      else dbgPlace(t.r, t.c, t.color, t.special);
    });
    layout();
    if (m.swap) setTimeout(() => tryMove(m.swap[0], m.swap[1]), m.swapDelay || 550);
    else if (m.tick) setTimeout(() => onMoveResolved(), m.swapDelay || 450);
  }

  window.addEventListener('message', function (e) {
    const m = e.data;
    if (!m || m.__skydom !== 'cmd') return;
    const ack = (data) => { try { e.source.postMessage({ __skydom: 'ack', id: m.id, data: data || { ok: true } }, '*'); } catch (_) {} };
    try {
      switch (m.op) {
        case 'reset': newRun(); ack(); break;
        case 'setup': dbgSetup(m); ack(); break;
        case 'place': dbgStopIdle(); dbgPlace(m.r, m.c, m.color, m.special); layout(); ack(); break;
        case 'placeBomb': dbgStopIdle(); dbgPlaceBomb(m.r, m.c, m.timer); layout(); ack(); break;
        case 'clearCell': dbgStopIdle(); dbgClearCell(m.r, m.c); layout(); ack(); break;
        case 'tryMove': tryMove(m.a, m.b); ack(); break;
        case 'geom': { const b = boardEl.getBoundingClientRect(); ack({ left: b.left, top: b.top, cell: cell, size: b.width, rows: ROWS, cols: COLS }); break; }
        case 'getLight': ack({ light: LIGHT, def: LIGHT_DEFAULT }); break;
        case 'setLight':
          if (m.color != null && m.patch) { Object.assign(LIGHT[m.color], m.patch); dbgRepaint(); }
          ack(); break;
        case 'fillColor':   // phủ cả bàn 1 màu để xem thử loại viên đó
          dbgStopIdle(); dbgClearAll();
          for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) board[r][c] = makeTile(m.color, m.special || null);
          layout(); ack(); break;
        default: ack({ ok: false });
      }
    } catch (err) { ack({ ok: false, error: String(err) }); }
  });

  // Báo cho màn test biết bridge đã sẵn sàng (test.html cũng chủ động poll)
  try { if (window.parent && window.parent !== window) window.parent.postMessage({ __skydom: 'ready' }, '*'); } catch (_) {}
})();

// Đợi native inject (chống race) — game-common §3
(function waitForNativeInjection() {
  const start = Date.now();
  (function check() {
    if (typeof window.language === 'string' ||
        typeof window.data === 'string' ||
        Date.now() - start > 200) {
      boot();
    } else {
      setTimeout(check, 10);
    }
  })();
})();
</script>
