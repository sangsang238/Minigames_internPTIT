<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#96c4dd">
<title>Hamster Jump</title>

<!-- Google Sans Flex (game-common.md — UI font chung) -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Google+Sans+Flex:opsz,wght@6..144,1..1000&display=swap" rel="stylesheet">

<style>
/* ── Reset chung (game-common.md — bắt buộc, đặt đầu stylesheet) ── */
*,
*::before,
*::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  -webkit-tap-highlight-color: transparent; /* tắt ô xanh dương khi chạm */
  -webkit-touch-callout: none;              /* tắt menu giữ-để-chọn */
}

:root {
  --ui-font: 'Google Sans Flex', system-ui, sans-serif;
  --sbh: 0px;                /* statusBarHeight (dp) — JS set lúc boot */
  --text: #5a4326;
  --glass-border: rgba(255, 255, 255, .6);
}

html, body {
  position: fixed;
  inset: 0;
  overflow: hidden;
  overscroll-behavior: none;
  background: #96c4dd;
  font-family: var(--ui-font);
  font-weight: 700;
  color: var(--text);
}

#app { position: fixed; inset: 0; }

#game-canvas {
  display: block;
  width: 100%;
  height: 100%;
  touch-action: none;
  -webkit-user-select: none;
  user-select: none;
}

/* ── Header chuẩn — BỐ CỤC copy từ index(exampleforheader.html):
      Back/Volume neo 2 mép (absolute), 2 pill SCORE+BEST BẰNG NHAU căn giữa;
      top + width do layoutHud() đặt. Màu giữ tông kem ấm của game. ──────── */
.hud {
  position: absolute;
  top: 0; left: 0; right: 0;
  z-index: 5;
  pointer-events: none;
}
.hud > * { pointer-events: auto; }
.btn3d.hud-back { position: absolute; left: 12px; }
.btn3d.hud-mute { position: absolute; right: 12px; }
.hud-scores {
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 6px;
}
.hud-pill {
  flex: 1 1 0;
  min-width: 0;
  overflow: hidden;
  background: rgba(255, 250, 236, .94);
  border: 2px solid rgba(150, 105, 45, .3);
  border-radius: 14px;
  padding: 7px 8px 9px 4px;
  text-align: center;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 5px;
  box-shadow: inset 0 1px 0 rgba(255, 255, 255, .7), 0 3px 0 rgba(150, 100, 40, .22);
}
.pill-text { display: flex; flex-direction: column; align-items: center; min-width: 0; flex: 1 0 auto; }
.pill-ico {
  flex: 0 0 auto;
  width: clamp(16px, 4.8vw, 21px); height: clamp(16px, 4.8vw, 21px); display: block;
  filter: drop-shadow(0 1px 1px rgba(150, 100, 30, .35));
}
.hud-pill .label {
  font-size: clamp(10px, 3.2vw, 13px);
  font-weight: 700; letter-spacing: .5px;
  color: #a9803f; line-height: 1.05; white-space: nowrap;
}
.hud-pill .value {
  font-size: clamp(16px, 5vw, 24px); line-height: 1.1;
  color: #6f4a1c; white-space: nowrap;
  font-weight: 800; text-shadow: 0 1px 0 rgba(255, 255, 255, .55);
}
#best-val { color: #e8842c; }
.back-ico { width: 52%; height: 52%; fill: currentColor; display: block; }
.snd-ico { width: 58%; height: 58%; display: block; }

/* Nút Back / Volume: icon vuông, nền kem phẳng đồng bộ pill (top/size do JS) */
.btn3d.hud-back, .btn3d.hud-mute { --surface-height: 44px; --surface-width: 44px; --radius: 13px; }
.btn3d.hud-back .btn3d-shadow, .btn3d.hud-mute .btn3d-shadow { display: none; }
.btn3d.hud-back .btn3d-surface, .btn3d.hud-mute .btn3d-surface {
  background: rgba(255, 250, 236, .94);
  border: 2px solid rgba(150, 105, 45, .3);
  color: #7a4f1e;
  backdrop-filter: none;
  box-shadow: inset 0 1px 0 rgba(255, 255, 255, .7), 0 3px 0 rgba(150, 100, 40, .22);
}
.btn3d.hud-back:active .btn3d-surface, .btn3d.hud-mute:active .btn3d-surface { background: rgba(244, 232, 210, .95); }
#mute-btn .ico-off { display: none; }
#mute-btn.muted .ico-on { display: none; }
#mute-btn.muted .ico-off { display: block; }

/* phụ: độ cao tháp + xu (top do layoutHud đặt, dưới hàng điểm) */
#substat {
  position: absolute;
  top: calc(max(var(--sbh), env(safe-area-inset-top, 0px)) + 62px);
  left: 0; right: 0;
  display: flex; justify-content: center; gap: 16px;
  pointer-events: none; z-index: 5;
}
#substat > div {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: 16px; font-weight: 800; color: #7a5a2e;
  text-shadow: 0 1px 0 rgba(255, 255, 255, .6);
}
.stack-ico { width: 19px; height: 19px; display: block; }
.coin-ico2 { width: 18px; height: 18px; display: block; }
#coin-ind span { color: #c98a12; }

/* chỉ báo chuỗi Perfect */
#streak {
  position: absolute;
  top: calc(max(var(--sbh), env(safe-area-inset-top, 0px)) + 88px);
  left: 0; right: 0;
  text-align: center; font-size: 16px; font-weight: 800;
  color: #e8842c; text-shadow: 0 1px 0 rgba(255, 255, 255, .85);
  pointer-events: none; z-index: 5;
  opacity: 1; transition: opacity .25s;
}
#streak.hidden { opacity: 0; }
#streak.pop { animation: streakPop .3s ease-out; }
@keyframes streakPop {
  0%   { transform: scale(1.45); }
  100% { transform: scale(1); }
}

/* ── btn3d (game-common §1.4 / popup-common §6) ───────────────── */
.btn3d {
  --radius: 12px;
  --surface-color: rgba(255, 255, 255, .5);
  --surface-text: var(--text);
  --surface-height: 42px;
  --surface-width: auto;
  --surface-padding-x: 16px;
  --surface-font-size: 18px;
  position: relative;
  display: inline-block;
  padding: 0;
  border: 0;
  background: transparent;
  cursor: pointer;
  font: inherit;
  color: inherit;
  -webkit-user-select: none;
  user-select: none;
}
.btn3d-shadow { display: none; }
.btn3d-surface {
  position: relative;
  z-index: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  height: var(--surface-height);
  width: var(--surface-width);
  padding: 0 var(--surface-padding-x);
  border-radius: var(--radius);
  background: var(--surface-color);
  border: 1px solid var(--glass-border);
  color: var(--surface-text);
  font-family: var(--ui-font);
  font-size: var(--surface-font-size);
  letter-spacing: .5px;
  backdrop-filter: blur(8px);
  transition: transform .09s ease-out, background .1s;
}
.btn3d:active { transform: scale(.94); }
.btn3d:active .btn3d-surface { background: rgba(255, 255, 255, .75); }

.btn3d.btn-icon {
  --surface-height: 42px;
  --surface-width: 42px;
  --surface-padding-x: 0;
}
.back-ico { width: 52%; height: 52%; fill: currentColor; display: block; }

/* ── Menu chờ (không phải popup kết quả) ──────────────────────── */

}

  position: absolute;
  top: calc(max(var(--sbh), env(safe-area-inset-top, 0px)) + 88px);
  left: 0; right: 0;

@keyframes streakPop {
  0%   { transform: scale(1.45); }

}

/* ── Nút Back / Volume trên header: nền kem phẳng, đồng bộ pill ─ */
.btn3d.hud-back, .btn3d.hud-mute { --surface-height: 44px; --surface-width: 44px; }
.btn3d.hud-back .btn3d-surface, .btn3d.hud-mute .btn3d-surface {

#mute-btn.muted .ico-off { display: block; }

/* ── Tutorial: gợi ý + nhắc bấm ───────────────────────────────── */
#tut-hint {
  position: absolute;
  left: 10%;
  right: 10%;
  bottom: 17%;
  text-align: center;
  font-size: 19px;
  color: #5a4326;
  text-shadow: 0 1px 0 rgba(255, 255, 255, .8);
  background: rgba(255, 255, 255, .6);
  border: 1px solid var(--glass-border);
  border-radius: 14px;
  padding: 10px 14px;
  backdrop-filter: blur(6px);
  z-index: 4;
  pointer-events: none;
  opacity: 1;
  transition: opacity .25s;
}
#tut-hint.hidden { opacity: 0; }
#tut-tap {
  position: absolute;
  left: 0; right: 0;
  bottom: 27%;
  text-align: center;
  font-size: 36px;
  color: #e8842c;
  text-shadow: 0 2px 0 rgba(255, 255, 255, .9);
  z-index: 4;
  pointer-events: none;
  animation: tapPulse .5s ease-in-out infinite;
}
#tut-tap.hidden { display: none; }

/* ── Panel hướng dẫn (document ngắn) ──────────────────────────── */
.card.info-card {
  max-height: 78%;
  display: flex;
  flex-direction: column;
  text-align: left;
  position: relative;
}
.info-card .card-title { text-align: center; padding: 0 40px; }
#info-close {
  position: absolute;
  top: 12px;
  right: 12px;
  --surface-height: 34px;
  --surface-width: 34px;
}
#info-close .btn3d-surface {
  background: rgba(255, 255, 255, .12);
  border-color: rgba(255, 255, 255, .25);
  color: #fff;
  font-size: 16px;
  backdrop-filter: none;
}
#info-body {
  overflow-y: auto;
  font-family: system-ui, sans-serif;
  font-weight: 500;
  font-size: 14.5px;
  line-height: 1.45;
  color: rgba(255, 255, 255, .92);
}
/* hàng luật chơi: icon vẽ bằng renderer thật + chú thích ngắn */
.info-rule {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 4px;
}
.info-rule canvas { flex: 0 0 auto; }
.info-rule span { font-size: 14px; }
/* lưới các loại phô mai — icon là hình trong game */
.info-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 8px;
  margin-top: 10px;
}
.info-item {
  background: rgba(255, 255, 255, .07);
  border-radius: 12px;
  padding: 8px 4px 6px;
  text-align: center;
}
.info-item canvas { display: block; margin: 0 auto 4px; }
.info-item .cap { font-size: 12.5px; line-height: 1.25; }
@keyframes tapPulse {
  0%, 100% { opacity: .55; transform: scale(1); }
  50%      { opacity: 1;   transform: scale(1.06); }
}

/* ── Popup Game Over / New Best (popup-common.md) ─────────────── */
.overlay {
  position: absolute;
  inset: 0;
  z-index: 10;
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(3, 9, 24, .7);
  opacity: 1;
  transition: opacity .25s;
}
.overlay.hidden { opacity: 0; pointer-events: none; }

.card {
  width: min(82%, 360px);
  padding: 26px;
  text-align: center;
  border-radius: 22px;
  background: linear-gradient(180deg, #4a3520, #241708);  /* gradient theme phô mai nướng — tông tối */
  border: 2px solid rgba(255, 205, 120, .25);
  box-shadow: 0 18px 50px rgba(0, 0, 0, .5);
  transform: scale(1);
  transition: transform .25s;
}
.overlay.hidden .card { transform: scale(.9); }

.card-title { color: #fff; font-size: 30px; margin-bottom: 14px; }

.sb { display: flex; justify-content: center; gap: 30px; margin-bottom: 18px; }
.sb .k {
  font-family: system-ui, sans-serif;
  font-size: 11px;
  letter-spacing: 2px;
  color: #8fb4ff;
  font-weight: 800;
}
.sb .v { font-size: 32px; color: #fff; }
.sb .v.best { color: #ffd23f; }

.btn3d.play {
  --surface-height: 52px;
  --surface-padding-x: 34px;
  --surface-color: #ffb02e;
  --surface-text: #3a2400;
  --surface-font-size: 17px;
}
.btn3d.play .btn3d-surface { border: 0; backdrop-filter: none; }
/* popup-common §7: amber CTA là màu cố định — không cho :active glass đè */
.btn3d.play:active .btn3d-surface { background: var(--surface-color); }

/* nút Menu phụ trên popup kết quả — glass tối */
.ov-menu-row { margin-top: 10px; }
#ov-menu-btn {
  --surface-height: 40px;
  --surface-padding-x: 24px;
  --surface-font-size: 15px;
}
#ov-menu-btn .btn3d-surface {
  background: rgba(255, 255, 255, .12);
  border-color: rgba(255, 255, 255, .25);
  color: #fff;
  backdrop-filter: none;
}

/* Chữ Ả Rập là chữ nối liền — bỏ letter-spacing để không đứt nét */
body.lang-ar #score-label,
body.lang-ar .chip .lbl,
body.lang-ar .sb .k,
body.lang-ar .btn3d-surface { letter-spacing: 0; }

/* ── Responsive: co giãn theo bề rộng, chỉnh layout khi màn thấp ── */
#topbar { gap: 8px; }
#hud-mid { flex: 1 1 auto; min-width: 0; }
#back-btn, #hud-right { flex: 0 0 auto; }
#score-num { font-size: clamp(28px, 9vw, 40px); }
.chip { min-width: clamp(64px, 17vw, 87px); }
.chip .val { font-size: clamp(19px, 5.2vw, 25px); }
#hud-coin { font-size: clamp(16px, 4.4vw, 21px); }
#start-title { font-size: clamp(28px, 8.5vw, 44px); }

@media (max-width: 380px) {
  .chip .lbl { font-size: 11px; letter-spacing: 2px; }
  #coin-ico { width: 18px; height: 18px; }
  #score-label { font-size: 10px; }
  #streak { font-size: 13px; }
  #info-btn { right: 10px; }
  #snd-btn { left: 10px; }
}

@media (max-height: 600px) {
  /* màn thấp / landscape: dồn menu lên, nút hướng dẫn nằm cạnh cột chip */
  #menu { top: 6%; }
  #start-title { margin-bottom: 12px; }
  #play-btn { --surface-height: 48px; --surface-font-size: 18px; }
  #tut-btn { --surface-height: 40px; }
  #menu .btn-row { margin-top: 10px; }
  #tut-hint { bottom: 7%; font-size: 16px; padding: 7px 12px; }
  #tut-tap { bottom: 24%; font-size: 30px; }
  #info-btn {
    top: calc(max(var(--sbh), env(safe-area-inset-top, 0px)) + 8px);
    right: calc(12px + clamp(64px, 17vw, 87px) + 12px);
  }
  .card.info-card { max-height: 92%; }
}
</style>

<body>

<div id="app">

  <canvas id="game-canvas"></canvas>

  <!-- Header chuẩn (bố cục copy từ index(exampleforheader).html) -->
  <div class="hud">
    <div class="btn3d btn-icon hud-back" id="back-btn" role="button" aria-label="Back" tabindex="0">
      <span class="btn3d-shadow"></span>
      <span class="btn3d-surface">
        <svg class="back-ico" viewBox="0 0 447.243 447.243" aria-hidden="true">
          <path fill="currentColor" d="M420.361 192.229a31.967 31.967 0 0 0-5.535-.41H99.305l6.88-3.2a63.998 63.998 0 0 0 18.08-12.8l88.48-88.48c11.653-11.124 13.611-29.019 4.64-42.4-10.441-14.259-30.464-17.355-44.724-6.914a32.018 32.018 0 0 0-3.276 2.754l-160 160c-12.504 12.49-12.515 32.751-.025 45.255l.025.025 160 160c12.514 12.479 32.775 12.451 45.255-.063a32.084 32.084 0 0 0 2.745-3.137c8.971-13.381 7.013-31.276-4.64-42.4l-88.32-88.64a64.002 64.002 0 0 0-16-11.68l-9.6-4.32h314.24c16.347.607 30.689-10.812 33.76-26.88 2.829-17.445-9.019-33.88-26.464-36.71z"/>
        </svg>
      </span>
    </div>

    <div class="hud-scores" id="hud-scores">
      <div class="hud-pill">
        <svg class="pill-ico" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M12 2 L14.9 8.6 L22 9.3 L16.7 14 L18.3 21 L12 17.3 L5.7 21 L7.3 14 L2 9.3 L9.1 8.6 Z" fill="#ffc63f" stroke="#c8901a" stroke-width="1" stroke-linejoin="round"/>
        </svg>
        <div class="pill-text">
          <div class="label" id="lbl-score">SCORE</div>
          <div class="value" id="score-val">0</div>

          <path d="M3 18 L4.2 8 L9 12.5 L12 5.5 L15 12.5 L19.8 8 L21 18 Z" fill="#ffc63f" stroke="#a9740a" stroke-width="1.2" stroke-linejoin="round"/>
          <rect x="3.4" y="16.6" width="17.2" height="3" rx="1.2" fill="#f0b400"/>
        </svg>
        <div class="pill-text">
          <div class="label" id="lbl-best">BEST</div>
          <div class="value" id="best-val">0</div>
        </div>
      </div>
    </div>

    <div class="btn3d btn-icon hud-mute" id="mute-btn" role="button" aria-label="Sound" tabindex="0">
      <span class="btn3d-shadow"></span>
      <span class="btn3d-surface">
        <svg class="snd-ico ico-on" viewBox="0 0 24 24" aria-hidden="true">
          <path fill="currentColor" d="M3 9v6h4l5 4.5v-15L7 9H3z"/>
          <path fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" d="M15.5 8.8a4.5 4.5 0 0 1 0 6.4M18.2 6.1a8.3 8.3 0 0 1 0 11.8"/>

        <svg class="snd-ico ico-off" viewBox="0 0 24 24" aria-hidden="true">
          <path fill="currentColor" d="M3 9v6h4l5 4.5v-15L7 9H3z"/>
          <path fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" d="M15.5 9.5l5 5m0-5l-5 5"/>
        </svg>
      </span>
    </div>
  </div>

let LANG = DEFAULT_LANG;
function t(key) {
  return (I18N[LANG] && I18N[LANG][key]) || I18N.en[key] || key;
}

function getLanguage() {
  const fromWin = typeof window.language === 'string' ? window.language : null;
  const fromUrl = new URLSearchParams(window.location.search).get('language');
  const raw = fromWin != null ? fromWin : fromUrl;
  return SUPPORTED_LANGS.includes(raw) ? raw : DEFAULT_LANG;
}

function applyUiFont(lang) {
  if (!LATIN_LANGS.has(lang)) {
    document.documentElement.style.setProperty('--ui-font', 'system-ui, sans-serif');
  }
}

/* Font cho chữ vẽ lên canvas (game-common §UI — canvas không đọc CSS) */
let CANVAS_FONT_STACK = "'Google Sans Flex', system-ui, sans-serif";

/* ================================================================
 * §1. Native bridge (game-common §1 — game KHÔNG level)
 * ================================================================ */
function post(msg) {
  try {
    if (window.ReactNativeWebView && window.ReactNativeWebView.postMessage) {
      window.ReactNativeWebView.postMessage(JSON.stringify(msg));
    } else {
      console.log('[hamster-jump → native]', msg);
    }
  } catch (e) { /* ignore */ }
}

function sendMessage(type, opts) {
  opts = opts || {};
  post({
    type,
    level: null,                        // game không có level → luôn null
    result: opts.result ?? null,
    data: opts.data ?? null,
    showModal: opts.showModal === true,
  });
}

function saveData(payload) {
  const data = typeof payload === 'string' ? payload : JSON.stringify(payload);
  sendMessage('save_data', { data });
}

/* ── localStorage (game-common §1.2 — chỉ data nhẹ) ───────────── */
const LS_KEY = 'hamster_jump_v1';

function saveLocal(payload) {
  try {
    const s = typeof payload === 'string' ? payload : JSON.stringify(payload);
    localStorage.setItem(LS_KEY, s);
  } catch (e) { /* private mode / quota */ }
}
function readLocal() {
  try { return localStorage.getItem(LS_KEY) || ''; } catch (e) { return ''; }
}

/* ── statusBarHeight (game-common §2 — ưu tiên URL) ───────────── */
function getStatusBarHeight() {
  const params = new URLSearchParams(window.location.search);
  const fromUrl = params.get('statusBarHeight');
  const fromWin = typeof window.statusBarHeight !== 'undefined' ? window.statusBarHeight : null;
  let h = Number(fromUrl != null ? fromUrl : fromWin);
  if (Number.isNaN(h) || h < 0) h = 0;
  return h;
}

/* ── data (game-common §4 — ưu tiên window) ───────────────────── */
function getInitialData() {
  const fromWin = typeof window.data === 'string' ? window.data : null;
  const fromUrl = new URLSearchParams(window.location.search).get('data');
  return fromWin != null ? fromWin : (fromUrl || '');
}

/** Đọc {best, tut, mute} từ native (ưu tiên) + localStorage; lấy max để không mất dữ liệu. */
function loadSaved() {
  const out = { best: 0, tut: 0, mute: 0 };
  const pick = raw => {
    try {
      const o = JSON.parse(raw || 'null');
      if (o) {
        if (Number.isFinite(+o.best)) out.best = Math.max(out.best, Math.floor(+o.best));
        if (o.tut) out.tut = 1;
        if (o.mute) out.mute = 1;
      }
    } catch (e) { /* data bẩn → bỏ qua */ }
  };
  pick(getInitialData());
  pick(readLocal());
  return out;
}

 *      Mở khoá ở cử chỉ đầu tiên (autoplay policy); nút loa tắt/bật,
 *      trạng thái lưu cùng save_data ({mute}).

let bgmTimer = null, bgmNextT = 0, bgmStep = 0;

/* nội bộ block này */
let sfxBus = null, masterLP = null, masterHP = null, noiseBuf = null;
const VOL = 0.72;                // âm lượng master (đã hạ cho êm hơn)

/* Dựng đồ thị: voice → (sfxBus|bgmOut) → masterLP → masterHP
   → audioMaster(VOL) → compressor → destination. */
function audioEnsure() {
  if (audioCtx) return true;
  try {
    const AC = window.AudioContext || window.webkitAudioContext;
    if (!AC) return false;
    audioCtx = new AC();

    const comp = audioCtx.createDynamicsCompressor();
    comp.threshold.value = -18; comp.knee.value = 24;
    comp.ratio.value = 4; comp.attack.value = 0.01; comp.release.value = 0.18;

    audioMaster = audioCtx.createGain();
    audioMaster.gain.value = muted ? 0 : VOL;
    audioMaster.connect(comp);
    comp.connect(audioCtx.destination);

    masterLP = audioCtx.createBiquadFilter();
    masterLP.type = 'lowpass'; masterLP.frequency.value = 2800; masterLP.Q.value = 0.5;

    masterHP = audioCtx.createBiquadFilter();
    masterHP.type = 'highpass'; masterHP.frequency.value = 100; masterHP.Q.value = 0.4;

    masterLP.connect(masterHP);
    masterHP.connect(audioMaster);

    sfxBus = audioCtx.createGain();
    sfxBus.gain.value = 1.0;
    sfxBus.connect(masterLP);

    bgmOut = audioCtx.createGain();
    bgmOut.gain.value = 0.1;                 // BGM luôn nằm dưới SFX
    bgmOut.connect(masterLP);

    noiseBuf = audioCtx.createBuffer(1, audioCtx.sampleRate, audioCtx.sampleRate);
    const nd = noiseBuf.getChannelData(0);
    for (let i = 0; i < nd.length; i++) nd[i] = Math.random() * 2 - 1;

    startBgm();
    return true;
  } catch (e) { return false; }
}

function audioUnlock() {
  if (!audioEnsure()) return;
  if (audioCtx.state === 'suspended') { audioCtx.resume().catch(function () {}); }
}

function setMuted(v) {
  muted = v;
  if (audioMaster) audioMaster.gain.value = muted ? 0 : VOL;
  $('mute-btn').classList.toggle('muted', muted);
  persistSaved();
}

/* voice() — 1 giọng có bao êm (attack ≥ 8ms, tắt mượt bằng setTargetAtTime).
   Ấm nhờ detune + hài âm 2 (body) + quãng tám dưới (sub). Mỗi giọng có
   lowpass riêng nên luôn tròn tiếng. */
function voice(o) {
  if (!audioCtx) return;
  o = o || {};
  const t = audioCtx.currentTime + (o.at || 0);
  const type = o.type || 'sine';
  const f0 = o.freq || 440;
  const dur = o.dur || 0.18;
  const peak = (o.peak == null ? 0.07 : o.peak);
  const atk = Math.max(0.008, o.attack || 0.012);
  const rel = Math.max(0.06, o.release || 0.11);
  const bus = o.bus || sfxBus;

  const g = audioCtx.createGain();
  g.gain.setValueAtTime(0.0001, t);
  g.gain.linearRampToValueAtTime(peak, t + atk);
  const relStart = Math.max(t + atk + 0.005, t + dur);
  g.gain.setTargetAtTime(0.0001, relStart, rel / 3);
  const stop = relStart + rel * 4 + 0.05;

  const lp = audioCtx.createBiquadFilter();
  lp.type = 'lowpass';
  lp.frequency.value = o.lp || 1500;
  lp.Q.value = (o.q == null ? 0.7 : o.q);
  g.connect(lp); lp.connect(bus);

  let lfo = null, lg = null;
  if (o.vib) {
    lfo = audioCtx.createOscillator(); lfo.type = 'sine';
    lfo.frequency.value = o.vib.rate || 6;
    lg = audioCtx.createGain(); lg.gain.value = o.vib.depth || 8;
    lfo.connect(lg); lfo.start(t); lfo.stop(stop);
  }

  function mkOsc(freq, detune, gscale, tp) {
    const node = audioCtx.createOscillator();
    node.type = tp || type;
    node.frequency.setValueAtTime(freq, t);
    if (o.slide) {
      node.frequency.exponentialRampToValueAtTime(
        Math.max(20, o.slide * (freq / f0)), t + dur);
    }
    if (detune) node.detune.value = detune;
    if (lg) lg.connect(node.detune);
    if (gscale != null && gscale !== 1) {
      const ng = audioCtx.createGain(); ng.gain.value = gscale;
      node.connect(ng); ng.connect(g);
    } else {
      node.connect(g);
    }
    node.start(t); node.stop(stop);
  }

  mkOsc(f0, -(o.detune || 0));
  if (o.detune) mkOsc(f0, o.detune);
  if (o.body) mkOsc(f0 * 2, 0, o.body, 'sine');
  if (o.sub)  mkOsc(f0 / 2, 0, 0.5, 'sine');
}

/* noiseVoice() — noise trắng LỌC THẤP mạnh (thud/tap/poof), không bao giờ
   bandpass rít. Ngắn & nhỏ. */
function noiseVoice(o) {
  if (!audioCtx || !noiseBuf) return;
  o = o || {};
  const t = audioCtx.currentTime + (o.at || 0);
  const dur = o.dur || 0.2;
  const peak = (o.peak == null ? 0.05 : o.peak);
  const rel = Math.max(0.05, o.release || 0.12);

  const src = audioCtx.createBufferSource();
  src.buffer = noiseBuf; src.loop = true;

  const lp = audioCtx.createBiquadFilter();
  lp.type = 'lowpass'; lp.frequency.value = o.lp || 500; lp.Q.value = o.q || 0.5;

  const g = audioCtx.createGain();
  g.gain.setValueAtTime(0.0001, t);
  g.gain.linearRampToValueAtTime(peak, t + Math.max(0.008, o.attack || 0.01));
  const relStart = Math.max(t + 0.02, t + dur);
  g.gain.setTargetAtTime(0.0001, relStart, rel / 3);

  src.connect(lp); lp.connect(g); g.connect(o.bus || sfxBus);
  src.start(t); src.stop(relStart + rel * 4 + 0.05);
}

/* ---- BGM: "Toy-Chip March" — polka đồ chơi vui nhộn, ẤM & MỀM (C trưởng, ~128 BPM).
   Bass oom-pah + giai điệu music-box hỏi/đáp; 3 biến tấu giai điệu xoay vòng (chu kỳ
   thật ~24 nhịp ≈ 45s) để không nhàm. Mọi nốt qua bgmOut (đã lọc), peak nhỏ, ≤ D5. ---- */
const NT = {
  F2: 87.31, G2: 98.00, A2: 110.00,
  C3: 130.81, D3: 146.83, E3: 164.81, F3: 174.61, G3: 196.00, A3: 220.00, B3: 246.94,
  C4: 261.63, D4: 293.66, E4: 329.63, F4: 349.23, G4: 392.00, A4: 440.00, B4: 493.88,
  C5: 523.25, D5: 587.33
};
const STEP_DUR      = 0.2344;    // móc đơn @ ~128 BPM
const SWING         = 0.028;     // trễ nhẹ phách lẻ → nảy/springy
const STEPS_PER_BAR = 8;
const BARS          = 8;         // 1 vòng = 8 nhịp (A: hỏi, B: đáp)
const TOTAL_STEPS   = STEPS_PER_BAR * BARS;
let   bgmVariant    = 0;         // 0/1/2 → MEL_A/B/C, xoay mỗi vòng

/* Hợp âm 8 nhịp: C Am F G | C F G C. root/fifth = oom-pah; pah = 3 nốt đệm ngắn. */
const PROG = [
  { root: 'C3', fifth: 'G3', pah: ['C4', 'E4', 'G4'] },
  { root: 'A2', fifth: 'E3', pah: ['A3', 'C4', 'E4'] },
  { root: 'F2', fifth: 'C3', pah: ['F3', 'A3', 'C4'] },
  { root: 'G2', fifth: 'D3', pah: ['G3', 'B3', 'D4'] },
  { root: 'C3', fifth: 'G3', pah: ['C4', 'E4', 'G4'] },
  { root: 'F2', fifth: 'C3', pah: ['F3', 'A3', 'C4'] },
  { root: 'G2', fifth: 'D3', pah: ['G3', 'B3', 'D4'] },
  { root: 'C3', fifth: 'G3', pah: ['C4', 'E4', 'G4'] }
];
/* null = LẶNG (chừa khoảng thở). Đỉnh cao nhất D5 → không chói. */
const MEL_A = [
  ['E4', 'G4', 'C5', null, 'G4', null, 'E4', null],
  ['D4', 'F4', 'A4', null, 'F4', null, 'D4', null],
  ['C4', 'F4', 'A4', null, 'C5', null, 'A4', 'G4'],
  ['G4', null, 'D4', null, 'G4', null, null, null],
  ['G4', 'A4', 'B4', 'C5', null, 'B4', 'G4', null],
  ['A4', null, 'F4', 'A4', 'C5', null, 'A4', null],
  ['B4', null, 'G4', 'B4', 'D5', null, 'B4', 'A4'],
  ['C5', null, 'G4', null, 'E4', null, 'C4', null]
];
const MEL_B = [
  ['G4', 'E4', 'G4', 'C5', null, 'E4', 'G4', null],
  ['A4', 'E4', 'A4', null, 'C5', null, 'E4', null],
  ['A4', 'C5', 'A4', 'F4', null, 'A4', 'G4', null],
  ['B4', null, 'G4', 'D4', null, 'G4', null, null],
  ['C5', 'B4', 'G4', 'E4', 'G4', null, 'C5', null],
  ['C5', null, 'A4', 'F4', 'A4', null, 'C5', null],
  ['D5', null, 'B4', 'G4', 'B4', null, 'D5', 'B4'],
  ['C5', 'G4', 'E4', null, 'C4', null, null, null]
];
const MEL_C = [
  ['C5', 'G4', 'E4', 'G4', null, 'C5', null, 'G4'],
  ['C5', 'A4', 'E4', null, 'A4', null, 'C5', null],
  ['A4', 'F4', 'C5', null, 'A4', 'F4', null, 'G4'],
  ['D4', 'G4', 'B4', null, 'D5', null, 'B4', null],
  ['E4', 'G4', 'C5', 'E4', 'G4', null, 'C5', null],
  ['F4', 'A4', 'C5', null, 'A4', null, 'F4', null],
  ['G4', 'B4', 'D5', null, 'B4', 'G4', 'D4', null],
  ['E4', 'G4', 'C5', null, 'G4', null, 'C4', null]
];
const MELS = [MEL_A, MEL_B, MEL_C];

/* nốt giai điệu: MARIMBA/MUSIC-BOX ấm — sine tròn + hài âm quãng tám nhẹ (body),
   gảy mềm rồi ngân dịu; dễ nghe hơn hẳn tiếng triangle "chip" cũ. */
function chip(name, at, dur, peak) {
  const f = NT[name]; if (f == null) return;
  voice({ freq: f, type: 'sine', dur: dur * 0.7, peak: peak,
    attack: .008, release: .2, lp: 2200, q: .5, body: .3, detune: 2, at: at, bus: bgmOut });
}
/* bass oom: sine tròn trầm ngắn (không sub — dưới ~100Hz bị masterHP cắt). */
function oom(name, at, peak) {
  const f = NT[name]; if (f == null) return;
  voice({ freq: f, type: 'sine', dur: .17, peak: peak,
    attack: .010, release: .17, lp: 380, q: .5, at: at, bus: bgmOut });
}
/* "pah": chùm 3 nốt đệm ngắn êm (sine tròn) — cú nảy đặc trưng polka. */
function pah(names, at, peak) {
  for (let i = 0; i < names.length; i++) {
    const f = NT[names[i]]; if (f == null) continue;
    voice({ freq: f, type: 'sine', dur: .1, peak: peak,
      attack: .012, release: .12, lp: 1200, q: .5, body: .12, detune: 3, at: at, bus: bgmOut });
  }
}
/* tick trầm MỜ cực nhỏ ở phách mạnh — cảm giác bước chân, không hi-hat chói. */
function bgmTick(at) {
  noiseVoice({ lp: 800, dur: .05, peak: .010, attack: .008, release: .06, at: at, bus: bgmOut });
}

/* Lên lịch 1 móc đơn. at = độ trễ (giây) từ audioCtx.currentTime. */
function scheduleStep(step, at) {
  const bar = Math.floor(step / STEPS_PER_BAR) % BARS;
  const slot = step % STEPS_PER_BAR;
  const chord = PROG[bar];
  const mel = MELS[bgmVariant][bar];
  const swung = (slot % 2 === 1) ? SWING : 0;

  if (slot === 0)                    oom(chord.root,  at, .070);
  else if (slot === 4)               oom(chord.fifth, at, .060);
  else if (slot === 2 || slot === 6) pah(chord.pah,   at, .026);
  if (slot === 0 || slot === 4) bgmTick(at);

  const note = mel[slot];
  if (note) chip(note, at + swung, STEP_DUR * 1.1, .055);
}

function startBgm() {
  if (bgmTimer || !audioCtx) return;
  bgmNextT = audioCtx.currentTime + 0.15;
  bgmStep = 0;
  bgmVariant = 0;
  bgmTimer = setInterval(function () {
    if (!audioCtx || audioCtx.state !== 'running' || muted) return;
    const now = audioCtx.currentTime;
    if (bgmNextT < now - 0.5) bgmNextT = now + 0.05;   // bù trễ sau resume, không dồn
    const horizon = now + 0.9;
    while (bgmNextT < horizon) {
      scheduleStep(bgmStep, bgmNextT - now);
      bgmStep++;
      if (bgmStep >= TOTAL_STEPS) { bgmStep = 0; bgmVariant = (bgmVariant + 1) % MELS.length; }
      bgmNextT += STEP_DUR;
    }
  }, 200);
}

/* NHẢY & ĐÁP dùng CHUNG một tiếng "pop/tap" tự nhiên, mềm (ý người dùng: 1 sound).
   Sine trượt xuống nhanh + một chạm noise lọc thấp rất khẽ = tiếng chạm thật mà êm. */
function sPop() {
  voice({ freq: 336, slide: 178, type: 'sine', dur: .1, peak: .05, lp: 1050, attack: .009, release: .1, body: .12, sub: true });
  noiseVoice({ lp: 620, dur: .028, peak: .013, attack: .008, release: .05 });
}

// Nhảy lò xo: nảy hơn, cao hơn, dài hơn + vibrato → khác rõ tiếng pop thường.
function sBoing() {

}

// Đáp chính giữa (streak n): ngũ cung dâng nhẹ theo n, ĐỈNH luôn êm (≤988Hz).
function sPerfect(n) {
  n = Math.max(1, n | 0);
  const sc = [523.25, 587.33, 659.25, 783.99, 880.00, 987.77];
  const f = sc[Math.min(n - 1, sc.length - 1)];
  voice({ freq: f, type: 'sine', dur: .16, peak: .055, lp: 2200, release: .14, detune: 5 });
  voice({ freq: f / 2, type: 'triangle', dur: .18, peak: .03, lp: 1000, release: .16 });
  voice({ freq: Math.min(f * 1.18, 1050), type: 'sine', at: .06, dur: .14, peak: .038, lp: 2200, release: .12 });
}

// Nhặt lò xo: gợi ý tích cực kín đáo.
function sArm() {
  voice({ freq: 440, type: 'sine', dur: .1, peak: .042, lp: 1600, release: .1, body: .15 });
  voice({ freq: 660, type: 'sine', at: .07, dur: .14, peak: .038, lp: 1800, release: .12 });
}

}

// Nhảy vọt qua → MẤT 5 TẦNG: chuỗi nốt rơi dần (rõ ràng) + "whump" trầm mềm.
function sCrash() {
  const desc = [523.25, 440.00, 349.23, 293.66, 233.08];  // 5 nốt rơi = 5 tầng đổ
  desc.forEach(function (f, i) {
    voice({ freq: f, type: 'triangle', at: i * 0.075, dur: .12, peak: .07, lp: 1600, release: .12, body: .12 });
  });
  voice({ freq: 150, slide: 60, type: 'sine', at: .05, dur: .42, peak: .09, lp: 420, release: .32, sub: true });
  noiseVoice({ lp: 320, dur: .34, peak: .04, attack: .01, release: .28, q: .4, at: .05 });
}

// Bị hất khỏi tháp → bắt đầu thua: cú va trầm, ngắn.

// Popup kết quả: best → fanfare vui nhỏ; không → nhịp "tiếc nuối" dịu.
function sOver(isBest) {

    [523.25, 659.25, 783.99, 1046.5].forEach(function (f, i) {

      voice({ freq: f, type: 'sine', at: i * 0.16, dur: .28, peak: .046, lp: 1800, release: .22, body: .15, detune: 4 });

}
