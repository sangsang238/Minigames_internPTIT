/* ================================================================
 * §4. Canvas & camera
 * ================================================================ */
function resize() {
  const dpr = Math.min(window.devicePixelRatio || 1, 3);
  const app = $('app');
  cssW = app.clientWidth;
  cssH = app.clientHeight;
  canvas.width = Math.round(cssW * dpr);
  canvas.height = Math.round(cssH * dpr);
  canvas.style.width = cssW + 'px';
  canvas.style.height = cssH + 'px';
  scale = cssW / LW;
  LH = cssH / scale;
  ctx.setTransform(dpr * scale, 0, 0, dpr * scale, 0, 0);
  layoutHud();
}

function safeTop() {
  const v = getComputedStyle(document.documentElement).getPropertyValue('--sat');
  return parseFloat(v) || 0;
}
/* Bố cục header — CƠ CHẾ copy từ index(exampleforheader).html: Back/Volume neo 2
   mép, 2 pill SCORE+BEST BẰNG NHAU căn giữa, top căn theo chiều cao pill. */
function layoutHud() {
  const hudScores = $('hud-scores'), hudBack = $('back-btn'), hudMute = $('mute-btn');
  if (!hudScores || !hudBack || !hudMute) return;
  const rectW = $('app').clientWidth;
  const topInset = Math.max(getStatusBarHeight(), safeTop()) + 8;
  hudScores.style.top = topInset + 'px';
  const pillH = Math.round(hudScores.getBoundingClientRect().height);
  const btnSize = Math.round(pillH * 0.92);
  [hudBack, hudMute].forEach(function (b) {
    b.style.setProperty('--surface-height', btnSize + 'px');
    b.style.setProperty('--surface-width', btnSize + 'px');
  });
  const wrapH = hudBack.getBoundingClientRect().height || btnSize;
  const btnTop = topInset + Math.round((pillH - wrapH) / 2);
  hudBack.style.top = btnTop + 'px';
  hudMute.style.top = btnTop + 'px';
  const btnW = hudBack.getBoundingClientRect().width || btnSize;
  hudScores.style.width = Math.round(rectW - 2 * (12 + btnW + 18)) + 'px';
  const belowTop = topInset + pillH + 6;
  const sk = $('streak');
  if (sk) sk.style.top = belowTop + 'px';
}

function surfaceY() { return -tower.length * BLOCK_H; }   // mặt trên tháp (world)
function topCx() { return tower[tower.length - 1].cx; }
function camTargetOff() { return LH * 0.62 + tower.length * BLOCK_H; }
function camTargetX() { return topCx() - LW / 2; }
function sx(wx) { return wx - camX; }                      // world → screen X
function sy(wy) { return wy + camOff; }                    // world → screen Y
/* biên cull nới theo zoom (zoom < 1 nhìn thấy nhiều thế giới hơn) */
function cullPad() { return LH / Math.max(viewZoom, 0.05); }

/* ================================================================
 * §5. Helpers vẽ
 * ================================================================ */
function seededRand(seed) {
  let u = seed + 0x6D2B79F5;
  u = Math.imul(u ^ (u >>> 15), u | 1);
  u ^= u + Math.imul(u ^ (u >>> 7), u | 61);
  return ((u ^ (u >>> 14)) >>> 0) / 4294967296;
}

function rr(x, y, w, h, r) {
  const rad = Math.min(r, w / 2, h / 2);
  ctx.beginPath();
  ctx.moveTo(x + rad, y);
  ctx.arcTo(x + w, y, x + w, y + h, rad);
  ctx.arcTo(x + w, y + h, x, y + h, rad);
  ctx.arcTo(x, y + h, x, y, rad);
  ctx.arcTo(x, y, x + w, y, rad);
  ctx.closePath();
}

/* Mặt trước của khối 3D: góc TRÊN sắc (để nối liền với cạnh mặt trên),
   góc dưới bo tròn */
function frontFacePath(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x, y);
  ctx.lineTo(x + w, y);
  ctx.lineTo(x + w, y + h - r);
  ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
  ctx.lineTo(x + r, y + h);
  ctx.arcTo(x, y + h, x, y + h - r, r);
  ctx.closePath();
}

/* ================================================================
 * §6. Vẽ — bếp, bàn, phô mai, hamster, hiệu ứng
 * ================================================================ */

/* ── Nền: tường bếp có chiều sâu — giấy dán tường + đồ treo + bụi sáng ── */
const DECOR = {
  line: 'rgba(40,72,104,.45)',
  wood: '#b08356',
  woodDark: '#8f6740',
  paper: '#f3e9d2',
};

let wallPattern = null;
/* Giấy dán tường dựng 1 LẦN thành pattern (sọc dọc + motif phô mai lặp đều) */
function makeWallPattern() {
  const c = document.createElement('canvas');
  c.width = 120;
  c.height = 120;
  const g = c.getContext('2d');
  g.strokeStyle = 'rgba(30,65,100,.08)';
  g.lineWidth = 8;
  g.beginPath(); g.moveTo(4, 0); g.lineTo(4, 120); g.stroke();
  g.fillStyle = 'rgba(30,65,100,.11)';
  for (const m of [[38, 34], [98, 94]]) {
    g.save();
    g.translate(m[0], m[1]);
    g.beginPath();
    g.moveTo(-11, 7); g.lineTo(11, 7); g.lineTo(11, -1);
    g.quadraticCurveTo(0, -9, -11, 7);
    g.closePath(); g.fill();
    g.restore();
  }
  return g.createPattern(c, 'repeat');
}

/* Tranh treo tường (vẽ phô mai) */
function drawDecorFrame(x, y) {
  ctx.strokeStyle = DECOR.line;
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(x + 8, y); ctx.lineTo(x + 48, y - 16); ctx.lineTo(x + 88, y);
  ctx.stroke();
  ctx.fillStyle = DECOR.wood;
  rr(x, y, 96, 76, 6); ctx.fill();
  ctx.strokeStyle = DECOR.woodDark; ctx.stroke();
  ctx.fillStyle = DECOR.paper;
  rr(x + 8, y + 8, 80, 60, 3); ctx.fill();
  ctx.fillStyle = '#e8cf6e';
  ctx.beginPath();
  ctx.moveTo(x + 24, y + 52); ctx.lineTo(x + 72, y + 52); ctx.lineTo(x + 72, y + 34);
  ctx.quadraticCurveTo(x + 48, y + 18, x + 24, y + 52);
  ctx.closePath(); ctx.fill();
  ctx.fillStyle = 'rgba(190,160,70,.8)';
  ctx.beginPath(); ctx.arc(x + 52, y + 42, 3.4, 0, Math.PI * 2); ctx.fill();
}

/* Kệ gỗ + lọ gia vị + miếng phô mai */
function drawDecorShelf(x, y) {
  ctx.fillStyle = 'rgba(210,230,240,.55)';
  rr(x + 14, y - 34, 24, 34, 5); ctx.fill();
  ctx.fillStyle = 'rgba(226,180,120,.7)';
  rr(x + 50, y - 26, 28, 26, 6); ctx.fill();
  ctx.fillStyle = DECOR.woodDark;
  rr(x + 14, y - 40, 24, 8, 3); ctx.fill();
  rr(x + 52, y - 31, 24, 7, 3); ctx.fill();
  ctx.fillStyle = '#e8cf6e';
  ctx.beginPath();
  ctx.moveTo(x + 96, y); ctx.lineTo(x + 134, y); ctx.lineTo(x + 134, y - 14);
  ctx.quadraticCurveTo(x + 115, y - 28, x + 96, y);
  ctx.closePath(); ctx.fill();
  ctx.fillStyle = DECOR.wood;
  rr(x, y, 150, 10, 3); ctx.fill();
  ctx.strokeStyle = DECOR.woodDark;
  ctx.lineWidth = 2;
  ctx.stroke();
}

/* Cửa sổ sáng nhìn ra trời + quầng nắng hắt xuống */
function drawDecorWindow(x, y) {
  ctx.fillStyle = 'rgba(255,250,220,.10)';
  ctx.beginPath();
  ctx.moveTo(x + 8, y + 96);
  ctx.lineTo(x - 26, y + 190);
  ctx.lineTo(x + 158, y + 190);
  ctx.lineTo(x + 124, y + 96);
  ctx.closePath();
  ctx.fill();
  ctx.fillStyle = DECOR.wood;
  rr(x, y, 132, 104, 8); ctx.fill();
  ctx.fillStyle = '#c8e9f6';
  rr(x + 8, y + 8, 116, 88, 5); ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,.85)';
  ctx.beginPath();
  ctx.ellipse(x + 44, y + 40, 20, 8, 0, 0, Math.PI * 2);
  ctx.ellipse(x + 62, y + 34, 14, 7, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = DECOR.wood;
  ctx.lineWidth = 5;
  ctx.beginPath();
  ctx.moveTo(x + 66, y + 8); ctx.lineTo(x + 66, y + 96);
  ctx.moveTo(x + 8, y + 52); ctx.lineTo(x + 124, y + 52);
  ctx.stroke();
}

/* Dây đèn màu nhấp nháy vắt ngang tường */
function drawDecorLights(y, seed) {
  ctx.strokeStyle = DECOR.line;
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(-10, y);
  ctx.quadraticCurveTo(LW / 2, y + 46, LW + 10, y);
  ctx.stroke();
  const cols = ['#ffd23f', '#ff8fb2', '#8fd3ff', '#b8e986'];
  for (let k = 0; k <= 8; k++) {
    const tt = k / 8;
    const bx2 = -10 + tt * (LW + 20);
    const by2 = y + 92 * tt * (1 - tt) + 5;
    const tw = 0.5 + 0.5 * Math.sin(timeMs * 0.004 + k * 1.9 + seed);
    ctx.globalAlpha = 0.45 + 0.5 * tw;
    ctx.fillStyle = cols[k % 4];
    ctx.beginPath();
    ctx.arc(bx2, by2, 4.6, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

/* Chậu cây treo — lá đung đưa nhẹ */
function drawDecorPlant(x, y, seed) {
  ctx.strokeStyle = DECOR.line;
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(x, y); ctx.lineTo(x - 20, y + 26);
  ctx.moveTo(x, y); ctx.lineTo(x + 20, y + 26);
  ctx.stroke();
  const sway = Math.sin(timeMs * 0.0012 + seed) * 0.1;
  ctx.fillStyle = 'rgba(96,150,96,.9)';
  for (let k = 0; k < 5; k++) {
    ctx.save();
    ctx.translate(x, y + 34);
    ctx.rotate(-0.9 + k * 0.45 + sway);
    ctx.beginPath();
    ctx.ellipse(0, 26, 7, 22, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
  ctx.fillStyle = '#c9764a';
  rr(x - 26, y + 26, 52, 26, 7); ctx.fill();
  ctx.strokeStyle = DECOR.woodDark;
  ctx.stroke();
}

function drawBackground() {
  /* nền tường — tối hơn một tông để phô mai & hamster nổi khối */
  const g = ctx.createLinearGradient(0, 0, 0, LH);
  g.addColorStop(0, C.bgTop);
  g.addColorStop(0.55, C.bgMid);
  g.addColorStop(1, C.bgBot);
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, LW, LH);

  /* giấy dán tường lặp đều — cuộn theo camera (parallax) */
  if (wallPattern) {
    const ox = -(camX * 0.3) % 120;
    const oy = (camOff * 0.3) % 120;
    ctx.save();
    ctx.translate(ox, oy);
    ctx.fillStyle = wallPattern;
    ctx.fillRect(-ox - 120, -oy - 120, LW + 240, LH + 240);
    ctx.restore();
  }

  /* đồ treo tường theo dải (parallax 0.4): tranh / kệ / cửa sổ / đèn dây / cây */
  const par = 0.4, bandH = 330;
  const yTop = -camOff;
  const first = Math.floor((yTop - bandH) / bandH);
  const last = Math.ceil((yTop + LH / par) / bandH);
  for (let i = first; i <= last; i++) {
    const by = i * bandH * par + camOff * par;
    /* xoay vòng 5 loại + jitter nhẹ — không bao giờ lặp 3 lần cùng loại */
    const kind = (((i % 5) + 5) + Math.floor(seededRand(i * 137 + 11) * 2)) % 5;
    const bx = 40 + seededRand(i * 71 + 3) * (LW - 240) - camX * 0.15;
    if (kind === 0) drawDecorFrame(bx, by + 60);
    else if (kind === 1) drawDecorShelf(bx, by + 116);
    else if (kind === 2) drawDecorWindow(bx, by + 40);
    else if (kind === 3) drawDecorLights(by + 50, i);
    else drawDecorPlant(bx + 60, by + 30, i);
  }

  /* bụi sáng lơ lửng — nền "thở" nhẹ */
  ctx.fillStyle = '#ffffff';
  for (let k = 0; k < 8; k++) {
    const sd = seededRand(k * 97 + 5);
    const px = (sd * LW + timeMs * (0.006 + sd * 0.008)) % LW;
    const py = (seededRand(k * 41 + 9) * LH + Math.sin(timeMs * 0.0006 + k) * 40 + LH) % LH;
    ctx.globalAlpha = 0.10 + 0.14 * (0.5 + 0.5 * Math.sin(timeMs * 0.002 + k * 2.1));
    ctx.beginPath();
    ctx.arc(px, py, 2.4 + sd * 2, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  /* vignette 2 mép — dồn tương phản vào giữa màn */
  const vg = ctx.createLinearGradient(0, 0, LW, 0);
  vg.addColorStop(0, 'rgba(28,52,82,.15)');
  vg.addColorStop(0.18, 'rgba(28,52,82,0)');
  vg.addColorStop(0.82, 'rgba(28,52,82,0)');
  vg.addColorStop(1, 'rgba(28,52,82,.15)');
  ctx.fillStyle = vg;
  ctx.fillRect(0, 0, LW, LH);
}

/* Nĩa hoạt hình — 4 răng, vòm, cán bo tròn có vệt sáng */
function drawForkAt(px2, py2, rot, s) {
  ctx.save();
  ctx.translate(px2, py2);
  ctx.rotate(rot);
  ctx.scale(s || 1, s || 1);
  ctx.lineJoin = 'round';
  ctx.lineWidth = 2.5;
  ctx.strokeStyle = 'rgba(95,100,115,.5)';
  ctx.fillStyle = '#dfe3ea';
  for (let k = 0; k < 4; k++) {           // 4 răng
    rr(-16.5 + k * 9, -56, 6, 26, 3);
    ctx.fill(); ctx.stroke();
  }
  ctx.beginPath();                         // vòm đầu nĩa thu về cổ
  ctx.moveTo(-17, -34);
  ctx.lineTo(17, -34);
  ctx.quadraticCurveTo(17, -14, 6, -10);
  ctx.lineTo(6, -6);
  ctx.lineTo(-6, -6);
  ctx.lineTo(-6, -10);
  ctx.quadraticCurveTo(-17, -14, -17, -34);
  ctx.closePath();
  ctx.fill(); ctx.stroke();
  rr(-5.5, -8, 11, 62, 5.5);               // cán
  ctx.fill(); ctx.stroke();
  ctx.fillStyle = 'rgba(255,255,255,.55)';
  rr(-2, -2, 3, 46, 1.5);                  // vệt sáng
  ctx.fill();
  ctx.restore();
}

/* Dao hoạt hình kiểu dao bếp cổ điển — sống dao thẳng, lưỡi cong về mũi,
   cán gỗ có 2 đinh tán */
function drawKnifeAt(px2, py2, rot, s) {
  ctx.save();
  ctx.translate(px2, py2);
  ctx.rotate(rot);
  ctx.scale(s || 1, s || 1);
  ctx.lineJoin = 'round';
  ctx.lineWidth = 2.5;
  ctx.strokeStyle = 'rgba(95,100,115,.5)';
  /* lưỡi dao */
  ctx.fillStyle = '#e8ebf1';
  ctx.beginPath();
  ctx.moveTo(-9, -2);                          // gốc lưỡi (cạnh sống)
  ctx.lineTo(-9, -48);                         // sống dao thẳng
  ctx.quadraticCurveTo(-9, -60, 0, -63);       // bo về mũi dao
  ctx.quadraticCurveTo(14, -52, 14, -28);      // cạnh cắt cong
  ctx.quadraticCurveTo(14, -9, 10, -2);
  ctx.closePath();
  ctx.fill(); ctx.stroke();
  /* ánh thép dọc sống dao */
  ctx.fillStyle = 'rgba(255,255,255,.6)';
  rr(-6.5, -52, 3, 44, 1.5);
  ctx.fill();
  /* viền cạnh cắt sáng */
  ctx.strokeStyle = 'rgba(255,255,255,.7)';
  ctx.lineWidth = 1.6;
  ctx.beginPath();
  ctx.moveTo(1, -61);
  ctx.quadraticCurveTo(12, -50, 12, -28);
  ctx.stroke();
  /* gờ chắn (bolster) */
  ctx.fillStyle = '#c9ccd4';
  rr(-8, -3, 17, 7, 3);
  ctx.fill();
  ctx.strokeStyle = 'rgba(95,100,115,.5)';
  ctx.lineWidth = 2;
  ctx.stroke();
  /* cán gỗ + 2 đinh tán */
  ctx.fillStyle = '#b5762e';
  rr(-6.5, 4, 14, 52, 7);
  ctx.fill();
  ctx.strokeStyle = 'rgba(120,75,25,.65)';
  ctx.stroke();
  ctx.fillStyle = '#e6c78f';
  ctx.beginPath(); ctx.arc(0.5, 16, 2.4, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(0.5, 42, 2.4, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,.3)';
  rr(-3.5, 8, 3, 42, 1.5);
  ctx.fill();
  ctx.restore();
}

/* Bàn ăn + tấm lót (rug) + đĩa + dao nĩa. World y = 0 là ĐÁY miếng phô mai
   gốc: tâm đĩa đặt py-2 (đáy phô mai thấp hơn tâm đĩa 2px) + bóng tiếp xúc
   → miếng phô mai ĐẶT hẳn trên đĩa, không lơ lửng */
function drawTable() {
  const py = sy(0);
  if (py - 120 > LH / 2 + cullPad()) return;
  const mx = sx(LW / 2);
  /* mặt bàn — mép sau cao hơn để chứa trọn rug */
  ctx.fillStyle = C.table;
  ctx.fillRect(-LW, py - 110, LW * 3, Math.max(0, LH / 2 + cullPad() - (py - 110)));
  ctx.fillStyle = C.tableEdge;
  ctx.fillRect(-LW, py - 110, LW * 3, 9);

  /* rug: nền hồng + viền chỉ may + chấm bi xếp lưới so le (tâm = tâm đĩa) */
  ctx.fillStyle = C.mat;
  rr(mx - 235, py - 97, 470, 190, 26);
  ctx.fill();
  ctx.strokeStyle = 'rgba(255,255,255,.75)';    // đường chỉ may
  ctx.lineWidth = 4;
  ctx.setLineDash([12, 8]);
  rr(mx - 220, py - 82, 440, 160, 18);
  ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle = C.matDot;
  for (let row = 0; row < 4; row++) {           // lưới chấm so le đều đặn
    const yD = py - 68 + row * 44;
    const off = (row % 2) * 27;
    for (let col = 0; col < 8; col++) {
      const xD = mx - 189 + off + col * 54;
      if (Math.abs(xD - mx) < 150 && yD > py - 50 && yD < py + 45) continue; // chừa chỗ đĩa
      ctx.beginPath();
      ctx.arc(xD, yD, 7, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  /* đĩa — tâm giữa rug, vành sau ló ra sau miếng phô mai */
  ctx.fillStyle = C.plate;
  ctx.beginPath();
  ctx.ellipse(mx, py - 2, 165, 36, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = C.plateShade;
  ctx.beginPath();
  ctx.ellipse(mx, py + 2, 128, 22, 0, 0, Math.PI * 2);
  ctx.fill();
  /* bóng tiếp xúc dưới đáy tháp phô mai */
  ctx.fillStyle = 'rgba(120,90,40,.18)';
  ctx.beginPath();
  ctx.ellipse(mx, py + 1, BLOCK_W * 0.56, 10, 0, 0, Math.PI * 2);
  ctx.fill();

  /* nĩa (trái) + dao (phải) nằm gọn trên rug */
  drawForkAt(mx - 198, py + 42, -0.15, 0.9);
  drawKnifeAt(mx + 198, py + 40, 0.15, 0.9);
}

/* Miếng phô mai (hoặc hộp quà) — vẽ theo world coords */
/* 5 vị trí lỗ cách xa nhau — chọn 3 theo seed nên lỗ KHÔNG bao giờ chồng nhau */
const HOLE_SLOTS = [
  [0.20, 0.30], [0.50, 0.56], [0.80, 0.28], [0.34, 0.76], [0.68, 0.80],
];

/* Phô mai lò xo: 2 LÁT phô mai mỏng kẹp 2 lò xo — sq (0..1) nén lò xo lại */
function drawSpringSandwich(x, y, w, seed, sq, SK, inset) {
  const SLAB = 26;                         // độ dày mỗi lát
  const gap0 = BLOCK_H - SLAB * 2;         // khoảng lò xo khi nghỉ
  const off = sq * gap0 * 0.55;            // nén → lát trên tụt xuống
  const topY = y + off;
  const coilTop = topY + SLAB;
  const coilBot = y + BLOCK_H - SLAB;

  /* LÁT DƯỚI */
  ctx.fillStyle = SK.body;
  frontFacePath(x, y + BLOCK_H - SLAB, w, SLAB, 8);
  ctx.fill();
  ctx.strokeStyle = SK.line;
  ctx.lineWidth = 2;
  ctx.lineJoin = 'round';
  ctx.stroke();
  ctx.fillStyle = SK.hole;
  ctx.beginPath();
  ctx.ellipse(x + w * 0.62, y + BLOCK_H - SLAB / 2, 5, 4, 0, 0, Math.PI * 2);
  ctx.fill();

  /* 2 LÒ XO — chồng vòng ellipse, nén theo sq */
  ctx.strokeStyle = C.spring;
  ctx.lineWidth = 3;
  const loops = 4;
  const step = (coilBot - coilTop) / loops;
  for (const fx of [x + w * 0.28, x + w * 0.72]) {
    for (let k = 0; k < loops; k++) {
      ctx.beginPath();
      ctx.ellipse(fx, coilTop + step * (k + 0.5), 15, Math.max(2.5, step * 0.38), 0, 0, Math.PI * 2);
      ctx.stroke();
    }
  }

  /* LÁT TRÊN + mặt trên (tụt theo độ nén) */
  ctx.fillStyle = SK.top;
  ctx.beginPath();
  ctx.moveTo(x, topY);
  ctx.lineTo(x + w, topY);
  ctx.lineTo(x + w - inset, topY - 22);
  ctx.lineTo(x + inset, topY - 22);
  ctx.closePath();
  ctx.fill();
  ctx.strokeStyle = SK.line;
  ctx.stroke();
  ctx.fillStyle = SK.holeTop;
  ctx.beginPath();
  ctx.ellipse(x + w * 0.42, topY - 11, 6, 2.8, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = SK.body;
  frontFacePath(x, topY, w, SLAB, 6);
  ctx.fill();
  ctx.strokeStyle = SK.line;
  ctx.stroke();
  ctx.fillStyle = SK.hole;
  ctx.beginPath();
  ctx.ellipse(x + w * 0.3, topY + SLAB / 2 + 1, 5.5, 4.2, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = SK.fold;
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(x + 1, topY);
  ctx.lineTo(x + w - 1, topY);
  ctx.stroke();
}

function drawBlock(cxW, topW, kind, seed, w, sq) {
  w = w || BLOCK_W;
  const x = sx(cxW - w / 2), y = sy(topW);
  if (y > LH / 2 + cullPad() || y < LH / 2 - cullPad() - BLOCK_H) return;
  if (kind !== 'gift') {
    const SK = BLOCK_SKINS[kind] || BLOCK_SKINS.normal;
    const inset = Math.round(w * 0.1);
    const kw = w / BLOCK_W;               // tỉ lệ co (mini)
    if (kind === 'spring') {
      drawSpringSandwich(x, y, w, seed, sq || 0, SK, inset);
      return;
    }
    /* MẶT TRÊN — hình thang lùi về sau; góc trước TRÙNG góc trên mặt trước */
    ctx.fillStyle = SK.top;
    ctx.beginPath();
    ctx.moveTo(x, y);
    ctx.lineTo(x + w, y);
    ctx.lineTo(x + w - inset, y - 22);
    ctx.lineTo(x + inset, y - 22);
    ctx.closePath();
    ctx.fill();
    /* lỗ trên mặt trên (dẹt theo phối cảnh) */
    ctx.fillStyle = SK.holeTop;
    ctx.beginPath();
    ctx.ellipse(x + w * 0.38, y - 10, 7 * kw, 3.2 * kw, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(x + w * 0.68, y - 14, 5 * kw, 2.4 * kw, 0, 0, Math.PI * 2);
    ctx.fill();

    /* MẶT TRƯỚC — góc trên sắc, góc dưới bo */
    ctx.fillStyle = SK.body;
    frontFacePath(x, y, w, BLOCK_H, 8);
    ctx.fill();
    /* lỗ phô mai — 3 lỗ từ 5 slot cố định (không chồng nhau), jitter nhẹ */
    ctx.fillStyle = SK.hole;
    const slot0 = Math.floor(seededRand(seed * 7 + 1) * 5);
    for (let k = 0; k < 3; k++) {
      const s2 = HOLE_SLOTS[(slot0 + k * 2) % 5];
      const hx = x + (s2[0] + (seededRand(seed * 53 + k * 17) - 0.5) * 0.07) * w;
      const hy = y + 16 + (s2[1] + (seededRand(seed * 29 + k * 41) - 0.5) * 0.09) * (BLOCK_H - 26);
      const hr = (5.5 + seededRand(seed * 11 + k * 7) * 3.5) * kw;
      ctx.beginPath(); ctx.ellipse(hx, hy, hr, hr * 0.85, 0, 0, Math.PI * 2); ctx.fill();
    }

    /* trang trí riêng từng loại */
    if (kind === 'gold') {
      /* ánh kim lấp lánh */
      ctx.fillStyle = 'rgba(255,255,255,.9)';
      const g1x = x + w * 0.24, g1y = y + 24, g2x = x + w * 0.74, g2y = y + 60;
      rr(g1x - 7, g1y - 1.5, 14, 3, 1.5); ctx.fill();
      rr(g1x - 1.5, g1y - 7, 3, 14, 1.5); ctx.fill();
      rr(g2x - 5, g2y - 1.2, 10, 2.4, 1.2); ctx.fill();
      rr(g2x - 1.2, g2y - 5, 2.4, 10, 1.2); ctx.fill();
    } else if (kind === 'ice') {
      /* vệt băng bóng loáng */
      ctx.strokeStyle = 'rgba(255,255,255,.7)';
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(x + 10, y + 30); ctx.lineTo(x + 30, y + 10);
      ctx.moveTo(x + 20, y + 40); ctx.lineTo(x + 46, y + 14);
      ctx.stroke();
    } else if (kind === 'mold') {
      /* đốm mốc + khói hôi bay lên */
      ctx.fillStyle = 'rgba(98,124,54,.55)';
      for (let k = 0; k < 3; k++) {
        const mx2 = x + (0.2 + seededRand(seed * 19 + k * 23) * 0.6) * w;
        const my2 = y + 24 + seededRand(seed * 37 + k * 13) * (BLOCK_H - 40);
        ctx.beginPath(); ctx.arc(mx2, my2, 5 + seededRand(seed * 5 + k) * 3.5, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(mx2 + 8, my2 + 4, 2.5, 0, Math.PI * 2); ctx.fill();
      }
      ctx.strokeStyle = 'rgba(130,150,80,.6)';
      ctx.lineWidth = 2.5;
      for (const fx of [x + w * 0.35, x + w * 0.65]) {
        const sway = Math.sin(timeMs * 0.004 + fx) * 3;
        ctx.beginPath();
        ctx.moveTo(fx, y - 24);
        ctx.quadraticCurveTo(fx - 5 + sway, y - 34, fx + sway, y - 42);
        ctx.stroke();
      }
    }

    /* cạnh gấp giữa 2 mặt (B) — MỘT nét mảnh màu nhạt, nối đúng 2 góc */
    ctx.strokeStyle = SK.fold;
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(x + 1, y);
    ctx.lineTo(x + w - 1, y);
    ctx.stroke();

    /* viền ngoài TOÀN KHỐI một nét liền (A–E–sau–F–C–đáy) */
    ctx.strokeStyle = SK.line;
    ctx.lineWidth = 2;
    ctx.lineJoin = 'round';
    ctx.beginPath();
    ctx.moveTo(x, y);
    ctx.lineTo(x + inset, y - 22);
    ctx.lineTo(x + w - inset, y - 22);
    ctx.lineTo(x + w, y);
    ctx.lineTo(x + w, y + BLOCK_H - 8);
    ctx.arcTo(x + w, y + BLOCK_H, x + w - 8, y + BLOCK_H, 8);
    ctx.lineTo(x + 8, y + BLOCK_H);
    ctx.arcTo(x, y + BLOCK_H, x, y + BLOCK_H - 8, 8);
    ctx.closePath();
    ctx.stroke();
  } else {
    /* hộp quà: thân + NẮP có mặt trên (cùng góc nhìn với phô mai) + nơ trên nắp */
    const cxm = x + BLOCK_W / 2;
    /* mặt trên của nắp — góc trước TRÙNG góc trên mặt trước nắp */
    ctx.fillStyle = C.giftLid;
    ctx.beginPath();
    ctx.moveTo(x - 3, y + 8);
    ctx.lineTo(x + BLOCK_W + 3, y + 8);
    ctx.lineTo(x + BLOCK_W - 12, y - 13);
    ctx.lineTo(x + 12, y - 13);
    ctx.closePath();
    ctx.fill();
    /* ruy băng dọc chạy trên mặt nắp */
    ctx.fillStyle = C.ribbon;
    ctx.beginPath();
    ctx.moveTo(cxm - 9, y + 8);
    ctx.lineTo(cxm + 9, y + 8);
    ctx.lineTo(cxm + 7, y - 13);
    ctx.lineTo(cxm - 7, y - 13);
    ctx.closePath();
    ctx.fill();
    /* thân hộp */
    ctx.fillStyle = C.gift;
    rr(x + 4, y + 26, BLOCK_W - 8, BLOCK_H - 26, 8);
    ctx.fill();
    ctx.strokeStyle = C.giftOutline;
    ctx.lineWidth = 2;
    ctx.stroke();
    /* ruy băng dọc trên thân */
    ctx.fillStyle = C.ribbon;
    ctx.fillRect(cxm - 9, y + 26, 18, BLOCK_H - 26);
    /* mặt trước nắp — góc trên sắc, rộng hơn thân */
    ctx.fillStyle = C.giftLid;
    frontFacePath(x - 3, y + 8, BLOCK_W + 6, 22, 6);
    ctx.fill();
    /* ruy băng ngang qua mặt trước nắp */
    ctx.fillStyle = C.ribbon;
    ctx.fillRect(cxm - 9, y + 8, 18, 22);
    /* cạnh gấp nắp — nét mảnh nhạt */
    ctx.strokeStyle = 'rgba(150,55,80,.25)';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(x - 2, y + 8);
    ctx.lineTo(x + BLOCK_W + 2, y + 8);
    ctx.stroke();
    /* viền ngoài nắp một nét liền (mặt trên + mặt trước) */
    ctx.strokeStyle = C.giftOutline;
    ctx.lineWidth = 2;
    ctx.lineJoin = 'round';
    ctx.beginPath();
    ctx.moveTo(x - 3, y + 8);
    ctx.lineTo(x + 12, y - 13);
    ctx.lineTo(x + BLOCK_W - 12, y - 13);
    ctx.lineTo(x + BLOCK_W + 3, y + 8);
    ctx.lineTo(x + BLOCK_W + 3, y + 24);
    ctx.arcTo(x + BLOCK_W + 3, y + 30, x + BLOCK_W - 3, y + 30, 6);
    ctx.lineTo(x + 3, y + 30);
    ctx.arcTo(x - 3, y + 30, x - 3, y + 24, 6);
    ctx.closePath();
    ctx.stroke();
    /* đuôi nơ rủ từ mặt trên xuống mặt trước nắp */
    ctx.beginPath();
    ctx.moveTo(cxm - 4, y + 9);
    ctx.lineTo(cxm - 16, y + 25);
    ctx.lineTo(cxm - 7, y + 25);
    ctx.closePath();
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(cxm + 4, y + 9);
    ctx.lineTo(cxm + 16, y + 25);
    ctx.lineTo(cxm + 7, y + 25);
    ctx.closePath();
    ctx.fill();
    /* nơ: 2 vòng + nút giữa, đặt TRÊN mặt nắp */
    ctx.strokeStyle = 'rgba(190,150,60,.55)';
    ctx.lineWidth = 2;
    ctx.fillStyle = C.ribbon;
    ctx.beginPath(); ctx.ellipse(cxm - 13, y - 8, 12, 7.5, -0.5, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
    ctx.beginPath(); ctx.ellipse(cxm + 13, y - 8, 12, 7.5, 0.5, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
    ctx.beginPath(); ctx.arc(cxm, y - 6, 5.5, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
  }
}

/* Ván gỗ đưa phô mai vào — thò ra / rút về mượt (world-anchored) */
function drawBoards() {
  for (const b of boards) {
    let ext = Math.min(1, (timeMs - b.extendT0) / BOARD_MS);
    ext = 1 - Math.pow(1 - ext, 3);                 // ease-out khi thò ra
    if (b.retractT0) {
      const r = Math.min(1, (timeMs - b.retractT0) / BOARD_MS);
      ext *= 1 - r * r;                              // ease-in khi rút về
    }
    if (ext <= 0.01) continue;
    const yv = sy(b.yW);
    if (yv > LH / 2 + cullPad() || yv < LH / 2 - cullPad()) continue;
    const fullLen = LW * 1.15;
    const startX = b.endX - b.dir * fullLen;         // đầu phía "tường" (ngoài màn)
    const curEnd = startX + b.dir * fullLen * ext;
    const x1 = sx(Math.min(startX, curEnd));
    const x2 = sx(Math.max(startX, curEnd));
    ctx.fillStyle = C.board;
    ctx.strokeStyle = C.boardEdge;
    ctx.lineWidth = 2;
    rr(x1, yv + 1, x2 - x1, 12, 5);
    ctx.fill(); ctx.stroke();
  }
}

/* Hamster — vẽ tại (cxW, feetW) world; opts điều khiển pose */
function drawHam(cxW, feetW, opts) {
  opts = opts || {};
  const x = sx(cxW), y = sy(feetW);
  const sq = opts.squash || 0;
  ctx.save();
  /* pivotX ≠ 0 → xoay quanh chân trụ thay vì giữa thân (loạng choạng) */
  ctx.translate(x + (opts.pivotX || 0), y);
  ctx.rotate(opts.rot || 0);
  ctx.translate(-(opts.pivotX || 0), 0);
  ctx.scale(1 + sq, 1 - sq);

  const armUp = opts.armsUp;
  ctx.lineWidth = 2;
  ctx.strokeStyle = 'rgba(150,110,80,.35)';

  /* nền đặc silhouette: 2 tai + thân cùng màu C.ham, LÓT TRƯỚC (không viền) —
     khi xoay lúc loạng choạng, khe ghép tai↔thân luôn có lớp lông đặc phía sau
     nên không bao giờ hở ra nền bếp qua vành tai */
  const earY = -52;
  ctx.fillStyle = C.ham;
  ctx.beginPath(); ctx.arc(-19, earY, 14, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(19, earY, 14, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(0, -26, 27, 26, 0, 0, Math.PI * 2); ctx.fill();

  /* tai */
  ctx.beginPath(); ctx.arc(-19, earY, 14, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
  ctx.fillStyle = C.hamPatch;                    // tai phải màu cam
  ctx.beginPath(); ctx.arc(19, earY, 14, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
  ctx.fillStyle = C.earIn;
  ctx.beginPath(); ctx.arc(-19, earY, 8, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(19, earY, 8, 0, Math.PI * 2); ctx.fill();

  /* thân */
  ctx.fillStyle = C.ham;
  ctx.beginPath(); ctx.ellipse(0, -26, 27, 26, 0, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
  /* mảng lông cam trên đầu (bên phải) */
  ctx.save();
  ctx.beginPath(); ctx.ellipse(0, -26, 27, 26, 0, 0, Math.PI * 2); ctx.clip();
  ctx.fillStyle = C.hamPatch;
  ctx.beginPath(); ctx.ellipse(16, -42, 15, 13, 0.4, 0, Math.PI * 2); ctx.fill();
  ctx.restore();

  /* mắt + má + mũi + miệng */
  ctx.fillStyle = '#3a2a20';
  ctx.beginPath(); ctx.arc(-9, -32, 2.7, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(9, -32, 2.7, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(-8.2, -32.9, 1, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(9.8, -32.9, 1, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = C.blush;
  ctx.beginPath(); ctx.arc(-16, -26, 4.2, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(16, -26, 4.2, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#e8798f';
  ctx.beginPath(); ctx.arc(0, -27, 1.9, 0, Math.PI * 2); ctx.fill();
  ctx.strokeStyle = '#c98a5a';
  ctx.lineWidth = 1.3;
  ctx.beginPath();
  ctx.arc(-2.6, -24, 2.6, 0.15 * Math.PI, 0.85 * Math.PI);
  ctx.arc(2.6, -24, 2.6, 0.15 * Math.PI, 0.85 * Math.PI);
  ctx.stroke();

  /* tay */
  ctx.fillStyle = C.ham;
  ctx.strokeStyle = 'rgba(150,110,80,.35)';
  ctx.lineWidth = 1.5;
  if (opts.flap) {
    /* 2 tay vẫy nhanh khi loạng choạng */
    const fa = Math.sin(timeMs * 0.045) * 9;
    ctx.beginPath(); ctx.ellipse(-27, -34 + fa * 0.7, 6, 8, -0.9 + fa * 0.05, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
    ctx.beginPath(); ctx.ellipse(27, -34 - fa * 0.7, 6, 8, 0.9 - fa * 0.05, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
  } else if (armUp) {
    ctx.beginPath(); ctx.ellipse(-27, -40, 6, 8, -0.5, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
    ctx.beginPath(); ctx.ellipse(27, -40, 6, 8, 0.5, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
  } else {
    ctx.beginPath(); ctx.ellipse(-25, -20, 6, 7, 0.4, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
    ctx.beginPath(); ctx.ellipse(25, -20, 6, 7, -0.4, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
  }

  /* chân — lift = -1/1: chân bên đó nhấc lên quơ trong không khí */
  ctx.fillStyle = C.hamShade;
  const swing = Math.sin(timeMs * 0.02) * 5;
  if (opts.lift === -1) {
    ctx.beginPath(); ctx.ellipse(-12 - swing * 0.6, -12 - Math.abs(swing) * 0.8, 7, 4, -0.3, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(10, -2, 7, 4, 0, 0, Math.PI * 2); ctx.fill();
  } else if (opts.lift === 1) {
    ctx.beginPath(); ctx.ellipse(-10, -2, 7, 4, 0, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(12 + swing * 0.6, -12 - Math.abs(swing) * 0.8, 7, 4, 0.3, 0, Math.PI * 2); ctx.fill();
  } else {
    ctx.beginPath(); ctx.ellipse(-10, -2, 7, 4, 0, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(10, -2, 7, 4, 0, 0, Math.PI * 2); ctx.fill();
  }

  ctx.restore();

  /* dấu chấm than đỏ khi bị xô ngã */
  if (opts.bang) {
    const bx = x, byv = y - 88;
    ctx.fillStyle = '#e83a3a';
    rr(bx - 4, byv - 20, 8, 16, 4);
    ctx.fill();
    ctx.beginPath(); ctx.arc(bx, byv + 3, 4.4, 0, Math.PI * 2); ctx.fill();
  }

  /* dù khi rơi xuống cuối ván */
  if (opts.chute) {
    ctx.save();
    ctx.translate(x, y - 96);
    ctx.rotate((opts.rot || 0) * 0.4);
    for (let k = 0; k < 5; k++) {
      ctx.fillStyle = k % 2 ? '#fff2dd' : '#ff9d4d';
      ctx.beginPath();
      ctx.moveTo(0, 0);
      const a1 = Math.PI + (k / 5) * Math.PI;
      const a2 = Math.PI + ((k + 1) / 5) * Math.PI;
      ctx.arc(0, 0, 40, a1, a2);
      ctx.closePath();
      ctx.fill();
    }
    ctx.strokeStyle = 'rgba(150,110,80,.6)';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(-36, -8); ctx.lineTo(-13, 48);
    ctx.moveTo(36, -8); ctx.lineTo(13, 48);
    ctx.stroke();
    ctx.restore();
  }
}

function drawFx() {
  const now = timeMs;
  /* vòng sáng Perfect */
  for (const r of rings) {
    const p = (now - r.born) / 450;
    if (p >= 1) continue;
    ctx.globalAlpha = 1 - p;
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 4 * (1 - p);
    ctx.beginPath();
    ctx.ellipse(sx(r.x), sy(r.y), 56 + p * 84, 20 + p * 28, 0, 0, Math.PI * 2);
    ctx.stroke();
  }
  /* lấp lánh (dấu cộng xoay) */
  for (const s of sparkles) {
    const p = (now - s.born) / 500;
    if (p >= 1) continue;
    ctx.globalAlpha = 1 - p;
    ctx.fillStyle = '#fff';
    ctx.save();
    ctx.translate(sx(s.x), sy(s.y) - p * 30);
    ctx.rotate(p * 1.5);
    const r2 = 8 * (1 - p * 0.5);
    rr(-r2, -1.5, r2 * 2, 3, 1.5); ctx.fill();
    rr(-1.5, -r2, 3, r2 * 2, 1.5); ctx.fill();
    ctx.restore();
  }
  /* chữ nổi */
  ctx.textAlign = 'center';
  for (const f of floatTexts) {
    const p = (now - f.born) / 800;
    if (p >= 1) continue;
    ctx.globalAlpha = 1 - p;
    ctx.font = '800 ' + (f.size || 34) + 'px ' + CANVAS_FONT_STACK;
    ctx.fillStyle = f.color || '#fff';
    ctx.strokeStyle = 'rgba(120,80,30,.8)';
    ctx.lineWidth = 5;
    const y = sy(f.y) - p * 52;
    ctx.strokeText(f.text, sx(f.x), y);
    ctx.fillText(f.text, sx(f.x), y);
  }
  ctx.globalAlpha = 1;
}

function render() {
  drawBackground();

  /* lớp thế giới — zoom trình diễn quanh tâm màn (pan-out cuối ván) */
  ctx.save();
  if (Math.abs(viewZoom - 1) > 0.001) {
    ctx.translate(LW / 2, LH / 2);
    ctx.scale(viewZoom, viewZoom);
    ctx.translate(-LW / 2, -LH / 2);
  }

  drawTable();

  /* nhún của miếng trên cùng khi hamster vừa đáp (impact).
     Miếng LÒ XO có nhịp riêng: nén–nhả 2 lần, tắt dần, dài gấp đôi */
  let bSq = 0, bSqS = 0, bTilt = 0;
  const bp = (timeMs - landBounceT0) / BOUNCE_MS;
  if (bp >= 0 && bp < 1) {
    bSq = Math.sin(bp * Math.PI);
    /* NHÚNG SANG BÊN: miếng nghiêng về phía hamster vừa đáp rồi bật lại */
    bTilt = Math.sin(bp * Math.PI) * landBounceOff * 0.15;
  }
  const bpS = (timeMs - landBounceT0) / (BOUNCE_MS * 2);
  if (bpS >= 0 && bpS < 1) bSqS = Math.abs(Math.sin(bpS * Math.PI * 2)) * (1 - bpS * 0.55);
  const topIsSpring = (tower[tower.length - 1].kind === 'spring');

  /* tháp phô mai (chỉ vẽ phần trong khung nhìn) */
  for (let i = 0; i < tower.length; i++) {
    const isTop = i === tower.length - 1;
    const kd = tower[i].kind || 'normal';
    const seed = tower[i].seed != null ? tower[i].seed : i;
    if (isTop && (bSq > 0 || bSqS > 0 || bTilt !== 0)) {
      /* impact khi đáp: nén dọc + NGHIÊNG quanh mép DƯỚI về phía đáp (nhúng) */
      const bx = sx(tower[i].cx), byB = sy(-i * BLOCK_H);
      ctx.save();
      ctx.translate(bx, byB);
      if (bTilt) ctx.rotate(bTilt);
      if (kd !== 'spring' && bSq > 0) ctx.scale(1 + 0.10 * bSq, 1 - 0.12 * bSq);
      ctx.translate(-bx, -byB);
      /* lò xo TỰ NÉN bên trong (truyền bSqS); miếng thường không cần sq */
      drawBlock(tower[i].cx, -(i + 1) * BLOCK_H, kd, seed, tower[i].w, kd === 'spring' ? bSqS : undefined);
      ctx.restore();
    } else {
      drawBlock(tower[i].cx, -(i + 1) * BLOCK_H, kd, seed, tower[i].w);
    }
  }

  /* miếng trượt hụt đang rơi khỏi tháp */
  for (const fb of fallBlocks) {
    const cxS = sx(fb.cx), cyS = sy(fb.yTop + BLOCK_H / 2);
    ctx.save();
    ctx.translate(cxS, cyS);
    ctx.rotate(fb.rot);
    ctx.translate(-cxS, -cyS);
    drawBlock(fb.cx, fb.yTop, fb.kind || 'normal', fb.seed, fb.w);
    ctx.restore();
  }

  drawBoards();
  /* các miếng đang trượt vào (neo yTopW — miếng mốc ở làn cao) */
  for (const s of sliders) {
    drawBlock(s.cx, s.yTopW, s.kind, s.seed, s.w);
  }

  /* hamster theo trạng thái */
  if (ham) {
    if (ham.state === 'jump') {
      const p = Math.min(1, (timeMs - ham.t0) / (ham.jumpDur || JUMP_DUR));
      const h = (ham.jumpH || JUMP_H) * Math.sin(p * Math.PI);
      drawHam(ham.x, surfaceY() - 8 - h, { armsUp: true, squash: -0.1 * Math.sin(p * Math.PI) });
    } else if (ham.state === 'stumble') {
      /* nghiêng người về 1 phía quanh chân trụ, chân kia quơ, 2 tay vẫy */
      const p = Math.min(1, (timeMs - ham.t0) / STUMBLE_MS);
      const lean = ham.stumbleDir || -1;
      const rot = lean * 0.24 * Math.sin(p * Math.PI) * (1 + 0.12 * Math.sin(p * 22));
      /* chân PHÍA MÉP (đối diện hướng nghiêng) quơ trong không khí,
         chân phía nghiêng làm trụ */
      drawHam(ham.x, surfaceY() - 8 + (topIsSpring ? 22 * bSqS : BLOCK_H * 0.12 * bSq), {
        rot, flap: true, lift: -lean, pivotX: lean * 10,
      });
    } else if (ham.state === 'drop') {
      /* rơi tự do sau khi tháp sập */
      drawHam(ham.x, ham.drop.y - 8, { armsUp: true, squash: -0.06 });
    } else if (ham.state === 'knock') {
      const k = ham.knock;
      drawHam(k.x, k.y, { rot: k.rot, bang: true });
    } else if (ham.state === 'chute') {
      const c2 = ham.chute;
      drawHam(c2.x, c2.y, { chute: true, rot: Math.sin(timeMs * 0.003) * 0.1, armsUp: true });
    } else {
      /* idle — thở nhẹ, lún theo nhún của miếng vừa đáp (đứng trên mặt trên) */
      drawHam(ham.x, surfaceY() - 8 + (topIsSpring ? 22 * bSqS : BLOCK_H * 0.12 * bSq), {
        squash: Math.sin(timeMs * 0.004) * 0.03 + 0.1 * (topIsSpring ? bSqS : bSq),
      });
    }

    /* chỉ báo lò xo đã nạp — mũi tên xanh nhấp nhô trên đầu */
    if (springArmed && (ham.state === 'idle' || ham.state === 'stumble')) {
      const ax = sx(ham.x);
      const ay = sy(surfaceY() - 8) - 100 + Math.sin(timeMs * 0.008) * 5;
      ctx.fillStyle = 'rgba(120,200,255,.9)';
      ctx.beginPath();
      ctx.moveTo(ax, ay - 9);
      ctx.lineTo(ax + 8, ay + 4);
      ctx.lineTo(ax - 8, ay + 4);
      ctx.closePath();
      ctx.fill();
    }
  }

  drawFx();
  ctx.restore();                        // kết thúc lớp thế giới (zoom)

  /* màn mờ khi pause */
  if (paused && state === 'playing') {
    ctx.fillStyle = 'rgba(20,10,30,.45)';
    ctx.fillRect(0, 0, LW, LH);
    ctx.textAlign = 'center';
    ctx.fillStyle = '#fff';
    ctx.font = '700 34px ' + CANVAS_FONT_STACK;
    ctx.fillText(t('tapToResume'), LW / 2, LH / 2);
  }
}

/* ================================================================
 * §7. Logic gameplay
 * ================================================================ */
/* Bắt đầu 1 lượt: ván gỗ thò ra + miếng phô mai đậu chờ ở mép, rồi mới trượt */
/* Chọn loại miếng theo trọng số, mở khóa dần theo độ cao */
function pickKind() {
  const n = tower.length;
  const pool = [['normal', 62]];
  if (n >= 5) pool.push(['gold', 7]);
  if (n >= 6) pool.push(['spring', 7]);
  if (n >= 8) pool.push(['mini', 8]);
  if (n >= 12) pool.push(['ice', 8]);
  if (n >= 15) pool.push(['mold', 8]);
  let total = 0;
  for (const p of pool) total += p[1];
  let r = rand01() * total;
  for (const p of pool) {
    r -= p[1];
    if (r <= 0) return p[0];
  }
  return 'normal';
}

/* Sinh 1 miếng + ván gỗ của nó (mốc bay ở làn cao hơn) */
/* Nhịp độ đầu ván dịu hơn: 3 tầng đầu ×0.75, tăng dần lên ×1.0 tại tầng 20.
   (Vẫn nhanh dần theo độ cao qua SPEED_INC — ramp chỉ làm mềm khúc mở đầu.) */
function speedRamp(level) {
  if (level <= 3) return 0.75;
  if (level >= 20) return 1;
  return 0.75 + (level - 3) / 17 * 0.25;
}

function spawnOne(dir, kind, extraDelay) {
  const w = kind === 'mini' ? MINI_W : BLOCK_W;
  const lift = kind === 'mold' ? MOLD_LIFT : 0;
  const gap = BLOCK_W * 0.62 + 10;
  boards.push({
    dir,
    yW: surfaceY() - lift,
    endX: topCx() - dir * gap,
    extendT0: timeMs,
    retractT0: 0,
  });
  const spdMul = kind === 'gold' ? GOLD_SPEED : 1;
  const board = boards[boards.length - 1];   // ván của chính miếng này
  sliders.push({
    board,
    cx: topCx() - dir * (LW * 0.5 + BLOCK_W * 0.75),
    dir, kind, w,
    /* tốc độ tăng theo tầng + jitter ngẫu nhiên từng miếng */
    speed: Math.min(MAX_SPEED * spdMul,
      (BASE_SPEED + tower.length * SPEED_INC) * (0.85 + rand01() * SPEED_JITTER) * spdMul * speedRamp(tower.length)),
    seed: tower.length + (dir > 0 ? 0 : 137),  // seed cố định — đáp xuống KHÔNG đổi hình
    slideAt: timeMs + WAIT_MS * (0.8 + rand01() * 0.6) + (extraDelay || 0),
    yTopW: surfaceY() - BLOCK_H - lift,        // neo world — không nhảy tầng khi tháp cao lên
    dead: false,
    passed: false,
  });
}

function scheduleCycle() {
  if (tutorial) { tutorialCycle(); return; }
  /* giữ lại miếng "chết" (double trouble) cho nó trượt nốt rồi rơi */
  sliders = sliders.filter(s => s.dead);
  const dir = rand01() < 0.5 ? 1 : -1;
  const kind = pickKind();
  /* đang nạp lò xo → miếng kế vào TRỄ thêm 320ms: cú nhảy lò xo (828ms)
     không bao giờ rơi vào thế "tap sớm là chết chắc" với miếng nhanh */
  const springDelay = springArmed ? 320 : 0;
  /* double trouble: 2 miếng thường vào từ 2 phía so le, chỉ đáp được 1 */
  if (kind === 'normal' && tower.length >= DOUBLE_FROM && rand01() < 0.09) {
    spawnOne(dir, 'normal', springDelay);
    spawnOne(-dir, 'normal', springDelay + 380 + rand01() * 240);
  } else {
    spawnOne(dir, kind, springDelay);
  }
}

/* Rút mọi ván gỗ đang thò ra (gọi khi miếng đã đậu / thua) */
function retractBoards() {
  for (const b of boards) {
    if (!b.retractT0) b.retractT0 = timeMs;
  }
}

function updateScoreHud() { elScore.textContent = String(score); }
function updateBestHud() { elBest.textContent = String(best); }

/* Chỉ báo "Perfect ×n" dưới điểm — hiện từ chuỗi 2, pop khi tăng */
function updateStreakHud() {
  const el = $('streak');
  if (combo >= 2) {
    el.textContent = t('perfect') + ' ×' + combo;
    el.classList.remove('hidden');
    el.classList.remove('pop');
    void el.offsetWidth;               // reset animation để pop lại
    el.classList.add('pop');
  } else {
    el.classList.add('hidden');
  }
}

function persistSaved() {
  const light = { best, tut: tutSeen ? 1 : 0, mute: muted ? 1 : 0 };
  saveData(light);
  saveLocal(light);
}

/* Điểm = SỐ PHÔ MAI trong tháp (kể cả miếng gốc). Gọi sau mỗi lần tháp
   thay đổi (đáp thêm / sập tầng). */
function syncScore() {
  score = tower.length;
  updateScoreHud();
  if (score > best) {                 // best đổi → persist NGAY (game-common §1.2)
    best = score;
    persistSaved();
  }
}

/* Miếng phô mai dừng lại & thành tầng mới (hamster đáp lên nó) */
function pinSlider(s) {
  if (tutorial) s.cx = topCx();        // tutorial: canh đúng tâm → LUÔN Perfect
  const prevTop = topCx();
  const offset = s.cx - prevTop;
  tower.push({ cx: s.cx, kind: s.kind, w: s.w, seed: s.seed });
  /* miếng còn lại của round (double trouble) → "chết": trượt nốt rồi rơi, vô hại */
  for (const o of sliders) {
    if (o !== s) o.dead = true;
  }
  sliders = sliders.filter(x => x !== s);
  /* chỉ rút ván KHÔNG còn miếng nào sở hữu — ván của miếng "chết" giữ lại
     cho tới khi nó trượt qua hẳn (tránh phô mai lơ lửng giữa trời) */
  for (const b of boards) {
    if (!b.retractT0 && !sliders.some(o => o.board === b)) b.retractT0 = timeMs;
  }

  /* epsilon nới theo tốc độ để cửa sổ THỜI GIAN bấm Perfect (~55ms) không co lại
     khi phô mai chạy nhanh */
  const eps = PERFECT_EPS * Math.max(1, s.speed / BASE_SPEED);
  const perfect = Math.abs(offset) <= eps;

  if (tutorial) {
    /* tutorial: không tính điểm/chuỗi — chỉ đếm lần đáp */
    tutorial.landed += 1;
  } else {
    if (perfect) combo += 1; else combo = 0;
    syncScore();                        // điểm = số phô mai (tháp vừa cao thêm 1)
    updateStreakHud();
    if (s.kind === 'spring') {
      springArmed = true;              // cú nhảy KẾ TIẾP cao & lâu hơn
      sArm();
      floatTexts.push({
        x: s.cx, y: surfaceY() - 74, born: timeMs, text: '▲', color: '#9adcff', size: 28,
      });
    }
    if (s.kind === 'ice') {
      /* mặt băng TRƠN HƠN — hamster lướt theo đà mạnh & lâu hơn (dễ trượt tới mép) */
      ham.slideVx = s.dir * Math.max(3.6, s.speed * 0.82);
    }
  }

  landBounceT0 = timeMs;               // miếng trên cùng nhún nhẹ khi đáp
  landBounceOff = Math.max(-1, Math.min(1, (ham.x - s.cx) / (s.w / 2)));  // nghiêng về phía đáp
  sLand();

  if (perfect) {
    sPerfect(Math.max(1, combo));      // tutorial: combo = 0 → nốt đầu thang
    rings.push({ x: s.cx, y: surfaceY(), born: timeMs });
    floatTexts.push({
      x: s.cx, y: surfaceY() - 46, born: timeMs,
      text: combo >= 2 ? t('perfect') + ' ×' + combo : t('perfect'), color: '#fff',
    });
    ham.state = 'idle';
  } else {
    /* đáp sát mép miếng → loạng choạng NGHIÊNG về phía có chỗ đứng:
       gần mép PHẢI → nghiêng TRÁI (chân trái trụ, chân phải quơ) */
    const hamRel = ham.x - s.cx;
    if (s.w / 2 - Math.abs(hamRel) < STUMBLE_EDGE) {
      ham.state = 'stumble';
      ham.t0 = timeMs;
      ham.stumbleDir = hamRel > 0 ? -1 : 1;
      sStumble();
    } else {
      ham.state = 'idle';
    }
  }
  scheduleCycle();
}

/* Biến 1 miếng đang trượt thành miếng rơi tự do */
function dropSlider(s) {
  fallBlocks.push({
    cx: s.cx, yTop: s.yTopW,
    vx: s.dir * Math.max(2, s.speed) * 0.7, vy: 0.4,
    rot: 0, vr: s.dir * 0.045,
    kind: s.kind, w: s.w, seed: s.seed,
  });
}

/* Dọn mọi miếng còn lại thành miếng rơi (khi thua) */
function dropAllSliders() {
  for (const s of sliders) dropSlider(s);
  sliders = [];
}

/* Bị phô mai xô ngã → thua. fromY = vị trí chân hamster lúc bị tông
   (đang bay lên mà bị tông thì knock bắt đầu đúng chỗ đó, không giật hình) */
function failRun(s, dir, fromY) {
  if (tutorial) { tutorialRetry(s); return; }   // tutorial: không thua, thử lại
  /* chốt vị trí knock TRƯỚC khi tháp cao thêm (tower.push làm surfaceY đổi) */
  const fy = fromY != null ? fromY : surfaceY();
  if (s.kind === 'mold') {
    /* miếng mốc bay cao — không xếp vào tháp, văng ra rơi tự do */
    sliders = sliders.filter(x => x !== s);
    dropSlider(s);
  } else {
    /* miếng thường vẫn nằm lên tháp (như game gốc) */
    const clampedCx = topCx() + Math.max(
      -BLOCK_W * MAX_OVERSHOOT,
      Math.min(BLOCK_W * MAX_OVERSHOOT, s.cx - topCx())
    );
    tower.push({ cx: clampedCx, kind: s.kind, w: s.w, seed: s.seed });
    sliders = sliders.filter(x => x !== s);
  }
  dropAllSliders();
  retractBoards();

  sKnock();
  ham.state = 'knock';
  ham.knock = {
    x: ham.x, y: fy,
    vx: dir * 2.6, vy: -6.5, rot: 0, vr: dir * 0.14,
  };
  endRun();
}

/* Nhảy vọt qua miếng phô mai (không đáp được) → KHÔNG thua: miếng văng đi
   kéo SẬP 5 tầng trên cùng của tháp (trừ 5 điểm), hamster rơi tự do xuống
   đáp lên tầng thứ 6 (luôn chừa tầng gốc trên đĩa) */
function missPenalty(dir) {
  if (tutorial) { tutorialRetry(null); return; }   // tutorial: không phạt, thử lại
  sCrash();
  /* vị trí chân hiện tại (đang bay thì giữa trời) làm điểm bắt đầu rơi */
  let fromY = surfaceY();
  if (ham.state === 'jump') {
    const p = Math.min(1, (timeMs - ham.t0) / (ham.jumpDur || JUMP_DUR));
    fromY = surfaceY() - (ham.jumpH || JUMP_H) * Math.sin(p * Math.PI);
  }

  /* 5 tầng trên cùng đổ nhào theo miếng văng đi */
  const drop = Math.min(5, tower.length - 1);
  for (let i = 0; i < drop; i++) {
    const b = tower.pop();
    fallBlocks.push({
      cx: b.cx,
      yTop: -(tower.length + 1) * BLOCK_H,     // đúng vị trí cũ của tầng vừa rớt
      vx: dir * (1.2 + rand01() * 1.6) * (i % 2 ? 0.6 : 1),
      vy: -1.5 + i * 0.5,
      rot: 0,
      vr: dir * (0.03 + rand01() * 0.05),
      kind: b.kind || 'normal', w: b.w || BLOCK_W, seed: b.seed || 0,
    });
  }

  syncScore();                         // tháp vừa mất tầng → điểm giảm theo
  combo = 0;
  updateStreakHud();
  floatTexts.push({
    x: topCx(), y: surfaceY() - BLOCK_H * 2, born: timeMs, text: '-' + drop, color: '#ff6b6b',
  });

  /* hamster rơi tự do, vừa rơi vừa trôi về chỗ đứng được trên tầng mới */
  ham.state = 'drop';
  ham.drop = { y: fromY, vy: 0 };
  ham.slideVx = 0;
  scheduleCycle();
}

function endRun() {
  state = 'over';
  combo = 0;
  updateStreakHud();
  runsEnded += 1;
  persistSaved();                      // chốt best cuối ván

  const isNew = score > bestStart;     // best đã persist live trong syncScore
  elOvTitle.textContent = isNew ? t('newBest') : t('gameOver');
  elOvScore.textContent = String(score);
  elOvBest.textContent = String(best);
  fitScores();
  updateBestHud();                     // HUD Best chỉ refresh khi hết màn

  sendMessage('game_result');          // không level: result=null, showModal=false
  if (runsEnded % ADS_EVERY === 0) sendMessage('ads');

  /* camera pan-out: khung trọn tháp giữa màn hình */
  const towerH = tower.length * BLOCK_H;
  let mn = Infinity, mx = -Infinity;
  for (const b of tower) {
    mn = Math.min(mn, b.cx);
    mx = Math.max(mx, b.cx);
  }
  zoomTarget = Math.min(1, (LH * 0.72) / (towerH + 340));
  overOff = LH * 0.5 + towerH * 0.5;   // tâm tháp (world -towerH/2) → giữa màn
  overX = (mn + mx) / 2 - LW / 2;

  /* delay cho animation ngã chạy xong rồi mới hiện popup (popup-common §5).
     Guard state: native có thể gọi onRetryLevel trong cửa sổ này */
  clearTimeout(overTimer);
  overTimer = setTimeout(() => {
    if (state === 'over') {
      elOverlay.classList.remove('hidden');
      sOver(isNew);
    }
  }, 700);
}

function resetWorld() {
  tower = [{ cx: LW / 2, kind: 'normal', w: BLOCK_W, seed: 0 }];
  boards = [];
  fallBlocks = [];
  landBounceT0 = -1e9;
  landBounceOff = 0;
  viewZoom = 1;
  zoomTarget = 1;
  floatTexts = [];
  rings = [];
  sparkles = [];
  combo = 0;
  bestStart = best;
  ham = {
    x: LW / 2, state: 'idle', t0: 0, knock: null, chute: null,
    jumpH: JUMP_H, jumpDur: JUMP_DUR, slideVx: 0,
  };
  sliders = [];
  springArmed = false;
  camOff = camTargetOff();
  camX = camTargetX();
  syncScore();                         // điểm = số phô mai hiện có (miếng gốc = 1)
  updateBestHud();
  updateStreakHud();
}

function newRun() {
  clearTimeout(overTimer);             // hủy popup đang chờ hiện của ván trước
  elOverlay.classList.add('hidden');
  tutorial = null;
  setTutHint(null);
  resetWorld();
  state = 'playing';
  paused = false;
  scheduleCycle();
}

/* ================================================================
 * §7b. Tutorial — 3 lần đáp có gợi ý, không thua, không tính điểm
 * ================================================================ */
function setTutHint(txt) {
  const el = $('tut-hint');
  if (!txt) {
    el.classList.add('hidden');
    $('tut-tap').classList.add('hidden');
    return;
  }
  el.textContent = txt;
  el.classList.remove('hidden');
}

function tutorialSpawn() {
  const dir = rand01() < 0.5 ? 1 : -1;
  spawnOne(dir, 'normal', 250);
  const s = sliders[sliders.length - 1];
  s.speed = 4.6;                        // trôi vào từ tốn rồi FREEZE (đợi người chơi bấm)
  tutorial.s = s;
  tutorial.phase = 'approach';
  setTutHint(null);
}

function startTutorial() {
  tutorial = null;                     // resetWorld không đụng tutorial đang null
  resetWorld();
  state = 'playing';
  tutorial = { landed: 0, phase: 'approach', s: null };
  tutorialSpawn();
}

/* Bấm khi miếng đang FREEZE → hamster nhảy, miếng trôi tiếp đúng nhịp để đáp Perfect. */
function tutorialJump() {
  const s = tutorial.s;
  if (!s) return;
  ham.state = 'jump';
  ham.t0 = timeMs;
  ham.slideVx = 0;
  ham.jumpH = JUMP_H;
  ham.jumpDur = JUMP_DUR;
  sJump();
  /* tốc độ để miếng tới đúng tâm lúc hamster chạm đất (tới sớm ~10% cho chắc; đáp vẫn snap tâm) */
  const pLand = 1 - Math.asin(Math.min(1, BLOCK_H / ham.jumpH)) / Math.PI;
  const framesToLand = Math.max(1, pLand * ham.jumpDur / 16.667);
  s.speed = Math.abs(ham.x - s.cx) / (framesToLand * 0.9);
  tutorial.phase = 'jumping';
  setTutHint(null);
}

/* Xong tutorial → bấm màn hình lần nữa để bắt đầu chơi bình thường. */
function tutorialFinish() {
  tutorial = null;
  setTutHint(null);
  combo = 0; updateStreakHud();
  syncScore();                          // điểm = số phô mai đang có (giữ nguyên tháp)
  scheduleCycle();
}

/* pinSlider (tutorial) gọi scheduleCycle → vào đây: khen ngợi rồi lặp / kết thúc. */
function tutorialCycle() {
  sliders = sliders.filter(s => s.dead);
  tutorial.phase = 'praise';
  setTutHint(t('tutGood'));             // lời khen (kèm "Perfect!" bay lên từ pinSlider)
  if (tutorial.landed >= 3) {
    tutSeen = true;
    persistSaved();
    setTimeout(() => {
      if (!tutorial) return;
      tutorial.phase = 'done';
      setTutHint(t('tutHaveFun'));       // "Chúc chơi vui vẻ!"
      $('tut-tap').classList.remove('hidden');   // nhắc bấm màn hình để bắt đầu
    }, 1100);
  } else {
    setTimeout(() => {
      if (tutorial && state === 'playing') tutorialSpawn();   // miếng kế tiếp trôi vào
    }, 1000);
  }
}

/* an toàn (không nên xảy ra vì đáp luôn Perfect có canh): thử lại bước hiện tại. */
function tutorialRetry(s) {
  if (s) { sliders = sliders.filter(x => x !== s); dropSlider(s); }
  dropAllSliders();
  retractBoards();
  ham.state = 'idle';
  setTutHint(null);
  setTimeout(() => {
    if (tutorial && state === 'playing') tutorialSpawn();
  }, 500);
}

/* ================================================================
 * §8. Popup (popup-common.md §5/§5b)
 * ================================================================ */
function fitScores() {
  var r = document.querySelector('.sb');
  if (!r) return;
  var card = r.closest('.card');
  var vals = r.querySelectorAll('.v');
  vals.forEach(function (v) { v.style.fontSize = ''; });
  var pad = parseFloat(getComputedStyle(card).paddingLeft) || 26;
  var max = card.clientWidth - 2 * pad;
  var fz = parseFloat(getComputedStyle(vals[0]).fontSize) || 32;
  while (r.scrollWidth > max && fz > 14) {
    fz -= 1;
    vals.forEach(function (v) { v.style.fontSize = fz + 'px'; });
  }
}

/* ================================================================
 * §9. Vòng lặp update
 * ================================================================ */
function update(dt) {
  if (paused) return;                  // pause đóng băng toàn bộ thế giới
  const dtf = dt / 16.667;

  if (state === 'playing') {
    /* các miếng phô mai: đậu chờ trên ván → trượt vào */
    const grounded0 = ham.state === 'idle' || ham.state === 'stumble';
    for (const s of sliders) {
      if (timeMs < s.slideAt) continue;
      s.cx += s.dir * s.speed * dtf;

      /* miếng mốc bay cao — đứng yên là an toàn, không xô đẩy khi grounded.
         Tutorial: KHÔNG bao giờ xô ngã (miếng freeze trước mặt, an toàn). */
      if (!s.dead && s.kind !== 'mold' && grounded0 && !tutorial) {
        /* nhảy trễ (hoặc không nhảy) → miếng CHỒNG LẤN thân hamster → xô ngã
           (test overlap 2 mép: miếng đã trượt QUA hẳn thì không tính) */
        const hit = s.cx + s.w / 2 >= ham.x - HAM_HALF &&
                    s.cx - s.w / 2 <= ham.x + HAM_HALF;
        if (hit) { failRun(s, s.dir); return; }
      }

      /* miếng trượt hết qua mép xa của tháp */
      const trail = s.cx - s.dir * s.w / 2;
      const farEdge = topCx() + s.dir * (BLOCK_W / 2 + 6);
      if (s.dir === 1 ? trail > farEdge : trail < farEdge) s.passed = true;
    }

    /* xử lý các miếng đã trượt qua hẳn */
    for (let i = sliders.length - 1; i >= 0; i--) {
      const s = sliders[i];
      if (!s.passed) continue;
      sliders.splice(i, 1);
      dropSlider(s);
      /* rút ván của chính miếng này khi nó rời đi */
      if (s.board && !s.board.retractT0) s.board.retractT0 = timeMs;
      if (s.dead) continue;            // miếng thừa của double trouble — vô hại
      if (s.kind === 'mold') {
        /* NÉ ĐƯỢC phô mai mốc → an toàn, chơi tiếp (không cộng điểm: điểm
           chỉ đếm số phô mai xếp được) */
        sDodge();
        floatTexts.push({
          x: topCx(), y: surfaceY() - 40, born: timeMs, text: '✓', color: '#bede76', size: 26,
        });
        if (!sliders.some(x => !x.dead)) scheduleCycle();
      } else if (!sliders.some(x => !x.dead)) {
        /* NHẢY VỌT QUA miếng cuối của round → phạt: sập 5 tầng, chơi tiếp */
        missPenalty(s.dir);
      }
    }

    /* hamster đang nhảy — xét va chạm & tiếp đất */
    if (ham.state === 'jump') {
      const jDur = ham.jumpDur || JUMP_DUR;
      const jH = ham.jumpH || JUMP_H;
      const p = (timeMs - ham.t0) / jDur;
      const h = jH * Math.sin(Math.min(1, p) * Math.PI);

      /* va chạm gây THUA — tutorial bỏ qua hoàn toàn (cú nhảy hướng dẫn luôn an toàn) */
      if (!tutorial) for (const s of sliders) {
        if (s.dead || timeMs < s.slideAt) continue;
        const horiz = s.cx + s.w / 2 >= ham.x - HAM_HALF &&
                      s.cx - s.w / 2 <= ham.x + HAM_HALF;
        if (!horiz) continue;

        if (s.kind === 'mold') {
          /* ĐÂM ĐẦU vào phô mai mốc đang bay cao → thua */
          const headTop = h + 74;              // đỉnh đầu (cả tai) so với mặt tháp
          if (headTop > MOLD_LIFT + 4 && h < MOLD_LIFT + BLOCK_H) {
            failRun(s, s.dir, surfaceY() - h);
            return;
          }
        } else if (p < 0.5 && h < BLOCK_H - 6) {
          /* nhảy QUÁ TRỄ: thân chưa vượt qua đỉnh miếng mà mép miếng đã tới */
          failRun(s, s.dir, surfaceY() - h);
          return;
        }
      }

      if (p >= 0.5) {
        /* đang rơi xuống: chạm mặt miếng phô mai nếu nó ở dưới chân.
           NỘI SUY DƯỚI KHUNG HÌNH: lùi miếng về đúng vị trí tại THỜI ĐIỂM
           chân chạm mặt miếng — vị trí đáp (và Perfect) không phụ thuộc
           refresh rate (30/60/90/120Hz cho cùng kết quả) */
        const pLand = 1 - Math.asin(Math.min(1, BLOCK_H / jH)) / Math.PI;
        const overMs = Math.max(0, timeMs - (ham.t0 + pLand * jDur));
        for (const s of sliders) {
          if (s.dead || s.kind === 'mold' || timeMs < s.slideAt) continue;
          if (h > BLOCK_H) continue;
          const cxAt = s.speed > 0
            ? s.cx - s.dir * s.speed * (overMs / 16.667)
            : s.cx;
          if (Math.abs(ham.x - cxAt) < s.w / 2) {
            s.cx = cxAt;
            pinSlider(s);              // đáp lên miếng mới → thành tầng
            break;
          }
          if (Math.abs(ham.x - s.cx) < s.w / 2) {
            pinSlider(s);              // dự phòng: chồng lấn ở khung hiện tại
            break;
          }
        }
      }
      if (ham.state === 'jump' && p >= 1) {
        ham.state = 'idle';            // rơi lại mặt tháp cũ (nhảy quá sớm)
      }
    }

    /* hamster rơi tự do xuống tầng mới sau khi tháp sập (miss penalty) */
    if (ham.state === 'drop') {
      const d = ham.drop;
      d.y += (d.vy + 0.275 * dtf) * dtf;   // nửa bước — không lệch theo Hz
      d.vy += 0.55 * dtf;
      /* trôi nhẹ về vùng đứng được trên tầng mới */
      const tb = tower[tower.length - 1];
      const half = (tb.w || BLOCK_W) / 2 - 20;
      const clampX = Math.max(tb.cx - half, Math.min(tb.cx + half, ham.x));
      ham.x += (clampX - ham.x) * (1 - Math.pow(0.9, dtf));
      if (d.y >= surfaceY()) {
        ham.state = 'idle';
        ham.drop = null;
        landBounceT0 = timeMs;
        sLand();
      }
    }

    /* trượt trên mặt băng (phô mai băng) — trôi theo đà, tới mép thì loạng choạng */
    if (ham.slideVx && (ham.state === 'idle' || ham.state === 'stumble')) {
      ham.x += ham.slideVx * dtf;
      ham.slideVx *= Math.pow(0.955, dtf);   // ma sát băng nhỏ → trượt xa hơn, khó ghìm
      const tb = tower[tower.length - 1];
      const maxOff = (tb.w || BLOCK_W) / 2 - 16;
      const rel = ham.x - tb.cx;
      if (Math.abs(rel) > maxOff) {
        ham.x = tb.cx + Math.sign(rel) * maxOff;
        ham.slideVx = 0;
        if (ham.state !== 'stumble') {
          ham.state = 'stumble';
          ham.t0 = timeMs;
          ham.stumbleDir = rel > 0 ? -1 : 1;
          sStumble();
        }
      }
      if (Math.abs(ham.slideVx) < 0.05) ham.slideVx = 0;
    }

    /* hamster loạng choạng xong → đứng lại (đứng NGUYÊN chỗ đáp, không tự nhích) */
    if (ham.state === 'stumble' && timeMs - ham.t0 > STUMBLE_MS) ham.state = 'idle';

    /* tutorial: miếng trôi tới gần rồi FREEZE → hiện "Chạm để nhảy", chờ người chơi bấm */
    if (tutorial && tutorial.phase === 'approach') {
      const s = tutorial.s;
      if (s && !s.dead && timeMs >= s.slideAt && (ham.x - s.cx) * s.dir <= 118) {
        s.speed = 0;                     // FREEZE ngay trước mặt hamster (chưa chồng lấn)
        tutorial.phase = 'frozen';
        setTutHint(t('tutJump'));
        $('tut-tap').classList.remove('hidden');
        sTutTap();
      }
    }

  }

  /* miếng phô mai trượt hụt đang rơi (tích phân nửa bước) */
  for (const fb of fallBlocks) {
    fb.yTop += (fb.vy + 0.275 * dtf) * dtf;
    fb.vy += 0.55 * dtf;
    fb.cx += fb.vx * dtf;
    fb.rot += fb.vr * dtf;
  }
  fallBlocks = fallBlocks.filter(fb => sy(fb.yTop) < LH / 2 + cullPad() + 220);

  /* dọn ván gỗ đã rút xong */
  boards = boards.filter(b => !b.retractT0 || timeMs - b.retractT0 < BOARD_MS + 40);

  /* hamster bị xô ngã → bay ra rồi bung dù */
  if (ham && ham.state === 'knock') {
    const k = ham.knock;
    /* tích phân nửa bước — quỹ đạo giống nhau ở mọi refresh rate */
    k.y += (k.vy + 0.25 * dtf) * dtf;
    k.vy += 0.5 * dtf;
    k.x += k.vx * dtf;
    k.rot += k.vr * dtf;
    if (k.vy > 2.2) {                  // qua đỉnh và bắt đầu rơi nhanh → bung dù
      ham.state = 'chute';
      /* dù mở NGAY TẠI vị trí đang bay, giữ nguyên vận tốc → không giật hình */
      ham.chute = { x: k.x, y: k.y, vx: k.vx, vy: k.vy };
      sChute();
    }
  }
  if (ham && ham.state === 'chute') {
    const c2 = ham.chute;
    c2.vy += (1.15 - c2.vy) * (1 - Math.pow(0.93, dtf));   // dù hãm rơi từ từ
    c2.vx *= Math.pow(0.95, dtf);                          // trôi ngang tắt dần
    c2.x += c2.vx * dtf + Math.sin(timeMs * 0.003) * 0.5 * dtf;
    c2.y += c2.vy * dtf;
  }

  /* camera: chơi → đuổi theo đỉnh tháp; thua → pan-out khung trọn tháp */
  const k2 = 1 - Math.pow(0.88, dtf);
  if (state === 'over') {
    const k3 = 1 - Math.pow(0.9, dtf);
    camOff += (overOff - camOff) * k3;
    camX += (overX - camX) * k3;
    viewZoom += (zoomTarget - viewZoom) * k3;
  } else {
    camOff += (camTargetOff() - camOff) * k2;
    camX += (camTargetX() - camX) * k2;
    viewZoom += (1 - viewZoom) * k2;
  }

  /* dọn FX hết hạn */
  floatTexts = floatTexts.filter(f => timeMs - f.born < 800);
  rings = rings.filter(r => timeMs - r.born < 450);
  sparkles = sparkles.filter(s => timeMs - s.born < 500);
}

function loop(ts) {
  if (!lastTs) lastTs = ts;
  let dt = ts - lastTs;
  lastTs = ts;
  if (dt > 100) dt = 100;              // tab ngủ / khựng dài → kẹp lại
  if (!paused) timeMs += dt;
  update(dt);
  render();
  requestAnimationFrame(loop);
}

/* ================================================================
 * §10. Input
 * ================================================================ */
function onTap() {
  if (state === 'ready') return;       // menu: chỉ nút Play/Tutorial khởi động
  if (state === 'playing') {
    if (paused) { paused = false; return; }   // tap đầu chỉ resume, không nhảy
    if (tutorial) {                            // tutorial hướng dẫn: điều khiển riêng
      if (tutorial.phase === 'frozen') tutorialJump();
      else if (tutorial.phase === 'done') tutorialFinish();
      return;                                  // approach/jumping/praise: bỏ qua tap
    }
    if (ham.state === 'idle' || ham.state === 'stumble') {
      ham.state = 'jump';
      ham.t0 = timeMs;
      ham.slideVx = 0;
      if (springArmed) {
        /* tiêu lò xo: cú nhảy này cao & lâu hơn */
        springArmed = false;
        ham.jumpH = JUMP_H * SPRING_MULT;
        ham.jumpDur = JUMP_DUR * SPRING_MULT;
        sBoing();
      } else {
        ham.jumpH = JUMP_H;
        ham.jumpDur = JUMP_DUR;
        sJump();
      }
    }
    /* đang bay / bị ngã → tap không làm gì */
  }
}

/* ================================================================
 * §11. Callback native → game (game-common §1.3 — định nghĩa sớm)
 * ================================================================ */
window.onAppPause = function () {
  if (state === 'playing') paused = true;
  /* app xuống nền → im lặng; cử chỉ resume nào cũng đi qua audioUnlock */
  if (audioCtx && audioCtx.state === 'running') audioCtx.suspend().catch(function () {});
};
window.onNextLevel = function () { /* game không level — no-op */ };
window.onRetryLevel = function () {
  if (state === 'over' || state === 'playing') newRun();
};

/* ================================================================
 * §12. Boot (game-common §3 — đợi native inject, fallback 200ms)
 * ================================================================ */
/* Vẽ icon panel bằng CHÍNH renderer của game: tráo ctx/camera tạm thời,
   vẽ lên canvas nhỏ (2x cho nét) rồi trả lại */
function iconCanvas(pxW, pxH, lw, drawFn) {
  const c = document.createElement('canvas');
  c.width = pxW * 2;
  c.height = pxH * 2;
  c.style.width = pxW + 'px';
  c.style.height = pxH + 'px';
  const pCtx = ctx, pX = camX, pOff = camOff, pZ = viewZoom, pLH = LH;
  ctx = c.getContext('2d');
  camX = 0; camOff = 0; viewZoom = 1; LH = 100000;   // tắt cull
  ctx.setTransform(pxW * 2 / lw, 0, 0, pxW * 2 / lw, 0, 0);
  drawFn(lw, lw * pxH / pxW);
  ctx = pCtx; camX = pX; camOff = pOff; viewZoom = pZ; LH = pLH;
  return c;
}

function blockIcon(kind, w) {
  const lw = BLOCK_W + 24;
  return iconCanvas(56, 63, lw, function (lw2) {
    drawBlock(lw2 / 2, 46, kind, 3, w);
  });
}

function hamIcon(opts, extraFn) {
  return iconCanvas(46, 50, 120, function (lw2, lh2) {
    drawHam(lw2 / 2, 112, opts);
    if (extraFn) extraFn(lw2, lh2);
  });
}

function buildInfoPanel() {
  const body = $('info-body');
  body.innerHTML = '';

  /* luật chơi — 4 hàng icon + chú thích ngắn */
  const rules = [
    [hamIcon({ armsUp: true }, function () {
      /* mũi tên nhảy lên */
      ctx.strokeStyle = '#e8842c';
      ctx.fillStyle = '#e8842c';
      ctx.lineWidth = 7;
      ctx.beginPath(); ctx.moveTo(22, 108); ctx.lineTo(22, 50); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(22, 30); ctx.lineTo(38, 56); ctx.lineTo(6, 56);
      ctx.closePath(); ctx.fill();
    }), t('infoJump')],
    [iconCanvas(56, 63, BLOCK_W + 24, function (lw2) {
      drawBlock(lw2 / 2, 46, 'normal', 3, BLOCK_W);
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 5;
      ctx.beginPath();
      ctx.ellipse(lw2 / 2, 48, 62, 17, 0, 0, Math.PI * 2);
      ctx.stroke();
    }), t('infoPerfect')],
    [iconCanvas(56, 26, 260, function (lw2, lh2) {
      /* chuỗi Perfect — vẽ đúng kiểu chữ nổi trong game */
      const txt = t('perfect') + ' ×3';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      let fs = 44;
      ctx.font = '800 ' + fs + 'px ' + CANVAS_FONT_STACK;
      while (ctx.measureText(txt).width > lw2 - 12 && fs > 16) {
        fs -= 2;
        ctx.font = '800 ' + fs + 'px ' + CANVAS_FONT_STACK;
      }
      ctx.lineJoin = 'round';
      ctx.strokeStyle = 'rgba(120,80,30,.8)';
      ctx.lineWidth = 6;
      ctx.strokeText(txt, lw2 / 2, lh2 / 2);
      ctx.fillStyle = '#ffd23f';
      ctx.fillText(txt, lw2 / 2, lh2 / 2);
    }), t('infoStreak')],
    [iconCanvas(56, 56, 180, function (lw2, lh2) {
      /* các miếng đổ nhào */
      for (const [ox, oy, rot] of [[50, 40, -0.4], [118, 66, 0.35], [86, 118, 0.15]]) {
        ctx.save();
        ctx.translate(ox, oy);
        ctx.rotate(rot);
        ctx.translate(-ox, -oy);
        drawBlock(ox, oy, 'normal', 3, BLOCK_W * 0.7);
        ctx.restore();
      }
    }), t('infoMiss')],
    [hamIcon({ bang: true, rot: 0.35 }), t('infoLose')],
  ];
  for (const r of rules) {
    const row = document.createElement('div');
    row.className = 'info-rule';
    const tx = document.createElement('span');
    tx.textContent = r[1];
    row.appendChild(r[0]);
    row.appendChild(tx);
    body.appendChild(row);
  }

  /* các loại phô mai — icon là hình THẬT trong game */
  const grid = document.createElement('div');
  grid.className = 'info-grid';
  const pieces = [
    ['gold', BLOCK_W, t('infoGold')],
    ['mini', MINI_W, t('infoMini')],
    ['ice', BLOCK_W, t('infoIce')],
    ['spring', BLOCK_W, t('infoSpring')],
    ['mold', BLOCK_W, t('infoMold')],
    ['gift', BLOCK_W, t('infoGift')],
  ];
  for (const p of pieces) {
    const item = document.createElement('div');
    item.className = 'info-item';
    item.appendChild(blockIcon(p[0], p[1]));
    const cap = document.createElement('div');
    cap.className = 'cap';
    cap.textContent = p[2];
    item.appendChild(cap);
    grid.appendChild(item);
  }
  /* double trouble: 2 miếng từ 2 phía */
  const dItem = document.createElement('div');
  dItem.className = 'info-item';
  dItem.appendChild(iconCanvas(56, 63, 300, function (lw2) {
    drawBlock(78, 70, 'normal', 3, BLOCK_W);
    drawBlock(lw2 - 78, 130, 'normal', 5, BLOCK_W);
  }));
  const dCap = document.createElement('div');
  dCap.className = 'cap';
  dCap.textContent = t('infoDouble');
  dItem.appendChild(dCap);
  grid.appendChild(dItem);
  body.appendChild(grid);
}

function localizeDom() {
  document.title = 'Hamster Jump';
  $('mute-btn').setAttribute('aria-label', t('sound'));
  $('tut-tap').textContent = t('tutTap');
  $('lbl-score').textContent = t('score');
  $('lbl-best').textContent = t('best');
  $('ov-lbl-score').textContent = t('score');
  $('ov-lbl-best').textContent = t('best');
  $('ov-btn-text').textContent = t('playAgain');
  $('back-btn').setAttribute('aria-label', t('back'));
}

function boot() {
  LANG = getLanguage();
  applyUiFont(LANG);
  document.documentElement.lang = LANG;
  if (LANG === 'ar') document.body.classList.add('lang-ar');
  if (!LATIN_LANGS.has(LANG)) CANVAS_FONT_STACK = 'system-ui, sans-serif';
  /* nạp sớm font cho chữ vẽ canvas (Perfect!) — lỗi thì rơi về fallback */
  if (document.fonts && document.fonts.load) {
    try { document.fonts.load("800 22px 'Google Sans Flex'"); } catch (e) { /* ignore */ }
  }

  canvas = $('game-canvas');
  ctx = canvas.getContext('2d');
  wallPattern = makeWallPattern();
  elScore = $('score-val');
  elBest = $('best-val');
  elOverlay = $('overlay');
  elOvTitle = $('ov-title');
  elOvScore = $('ov-score');
  elOvBest = $('ov-best');

  /* statusBarHeight → CSS var (max với env(safe-area-inset-top) làm trong CSS) */
  document.documentElement.style.setProperty('--sbh', getStatusBarHeight() + 'px');

  /* tiện chơi thử: ?reset=1 xoá kỷ lục đã lưu (native không bao giờ gửi) */
  if (new URLSearchParams(window.location.search).get('reset') === '1') {
    try { localStorage.removeItem(LS_KEY); } catch (e) { /* ignore */ }
    saveData({ best: 0, tut: 0, mute: 0 });
  }

  const saved = loadSaved();
  best = saved.best;
  tutSeen = !!saved.tut;
  muted = !!saved.mute;
  bestStart = best;

  localizeDom();
  resize();
  window.addEventListener('resize', resize);
  resetWorld();
  /* KHÔNG còn menu: vào thẳng gameplay. Lần đầu (chưa xem tutorial) -> tutorial,
     xong tutorial chảy thẳng vào ván thật (không reset). */
  if (!tutSeen) startTutorial();
  else { state = 'playing'; scheduleCycle(); }

  /* input */
  canvas.addEventListener('pointerdown', function (e) { e.preventDefault(); onTap(); });
  window.addEventListener('keydown', function (e) {
    if (e.code !== 'Space' && e.code !== 'Enter') return;
    if (state === 'over') return;                     // để nút Play Again nhận phím
    if (e.target && e.target.closest && e.target.closest('.btn3d')) return;
    e.preventDefault();
    onTap();
  });
  $('back-btn').addEventListener('click', function (e) {
    e.stopPropagation();
    sButton();
    sendMessage('quit');
  });
  $('back-btn').addEventListener('keydown', function (e) {
    if (e.code === 'Enter' || e.code === 'Space') {
      e.preventDefault();
      sendMessage('quit');
    }
  });
  $('ov-btn').addEventListener('click', function () {
    sButton();
    sendMessage('retry_level');        // game tự xử lý chơi lại (game-common §1.3)
    newRun();
  });
  /* âm thanh: WebAudio chỉ mở được sau cử chỉ đầu tiên (autoplay policy) —
     nghe ở capture để chạy trước mọi handler khác; nút loa bật/tắt + lưu */
  document.addEventListener('pointerdown', audioUnlock, true);
  window.addEventListener('keydown', audioUnlock, true);
  $('mute-btn').classList.toggle('muted', muted);
  $('mute-btn').addEventListener('click', function (e) {
    e.stopPropagation();
    setMuted(!muted);
    sButton();
  });

  /* app chuyển nền khi chạy trong browser thường → cũng pause */
  document.addEventListener('visibilitychange', function () {
    if (document.hidden) window.onAppPause();
    else if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume().catch(function () {});
  });

  requestAnimationFrame(loop);
}

(function waitForNativeInjection() {
  const start = Date.now();
  (function check() {
    const injected = typeof window.language === 'string' || typeof window.data === 'string';
    if (injected || Date.now() - start > 200) {
      boot();
    } else {
      setTimeout(check, 10);
    }
  })();
})();
</script>
</body>
</html>
