<!DOCTYPE html>
<!--
  CURSED KNIVES — Knife-Hit dark fantasy (game điểm cao / endless, KHÔNG level)
  Tuân thủ: .claude/game-common.md (bridge, statusBarHeight, data, i18n 23 ngôn ngữ)
            .claude/popup-common.md (popup Game Over / New Best tự vẽ, btn3d)
            .claude/zip-common.md   (single-file index.html)
  Cơ chế: totem đá xoay — chạm để phóng dao găm; trúng dao đã cắm = thua;
  cắm đủ dao = totem vỡ → stage kế (vô hạn, sinh deterministic theo stageConfig).
-->
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<title>Cursed Knives</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Google+Sans+Flex:opsz,wght@6..144,1..1000&display=swap" rel="stylesheet" />
<style>
/* ── Reset chung (game-common §UI) ───────────────────────────── */
*,
*::before,
*::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  -webkit-tap-highlight-color: transparent; /* tắt ô xanh dương khi chạm */
  -webkit-touch-callout: none;              /* tắt menu giữ-để-chọn */
}

:root {
  --ui-font: 'Google Sans Flex', system-ui, sans-serif;
  --bg-a: #05070f;
  --bg-b: #0b1424;
  --bg-c: #060a16;
  --text: #eaf2ff;
  --text-soft: #8ea6c8;
  --glass: rgba(255,255,255,.06);
  --glass-border: rgba(255,255,255,.11);
  --accent: #52ff9d;       /* xanh nguyền — accent chính */
  --steel: #6fd8ff;        /* thép lạnh — lưỡi dao */
  --gold: #ffd23f;         /* BEST (popup-common §7 — cố định) */
  --danger: #ff3d5a;
  --sat: env(safe-area-inset-top, 0px);
}

html, body {
  position: fixed;
  inset: 0;
  overflow: hidden;
  overscroll-behavior: none;
  height: 100%;
  width: 100%;
}

body {
  font-family: var(--ui-font);
  font-weight: 700;
  color: var(--text);
  user-select: none;
  -webkit-user-select: none;
  touch-action: none;
  background: var(--bg-b);        /* FLAT: nền tối đặc 1 màu, bỏ nebula gradient */
}

/* Chữ Ả Rập là chữ nối — bỏ letter-spacing trên MỌI phần tử kẻo vỡ chữ */
body.lang-ar, body.lang-ar * { letter-spacing: 0 !important; }

/* ── Canvas layers ───────────────────────────────────────────── */
#bg-canvas   { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
#game-canvas {
  position: fixed;
  inset: 0;
  z-index: 1;
  display: block;
  width: 100%;
  height: 100%;
  touch-action: none;
  -webkit-user-select: none;
  user-select: none;
}

/* ── btn3d (game-common §1.4 / popup-common §6 — bản kính phẳng) ── */
.btn3d {
  --radius: 12px;
  --surface-color: rgba(255,255,255,.08);
  --surface-text: var(--text);
  --surface-height: 42px;
  --surface-width: auto;
  --surface-padding-x: 16px;
  --surface-font-size: 18px;
  position: relative;
  display: inline-block;
  padding: 0;
  border: 0;
  background: transparent;
  cursor: pointer;
  font: inherit;
  color: inherit;
  -webkit-user-select: none;
  user-select: none;
}

.btn3d-shadow { display: none; }

.btn3d-surface {
  position: relative;
  z-index: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  height: var(--surface-height);
  width: var(--surface-width);
  padding: 0 var(--surface-padding-x);
  border-radius: var(--radius);
  background: var(--surface-color);
  border: 1px solid var(--glass-border);
  color: var(--surface-text);
  font-family: var(--ui-font);
  font-size: var(--surface-font-size);
  font-weight: 700;
  letter-spacing: .5px;
  transition: transform .09s ease-out, background .1s;
}

.btn3d:active { transform: scale(.94); }
.btn3d:active .btn3d-surface { background: rgba(255,255,255,.14); }

.btn3d.btn-icon {
  --surface-height: 42px;
  --surface-width: 42px;
  --surface-padding-x: 0;
}

/* Nút Play Again trên popup (popup-common §6) */
.btn3d.play {
  --surface-height: 52px;
  --surface-padding-x: 34px;
  --surface-color: #ffb02e;
  --surface-text: #3a2400;
  --surface-font-size: 17px;
  --radius: 14px;
}
.btn3d.play .btn3d-surface { border: none; }
.btn3d.play:active .btn3d-surface { background: var(--surface-color); }

/* nút mini (Skip trong tutorial) */
.btn3d.mini {
  --surface-height: 30px;
  --surface-padding-x: 12px;
  --surface-font-size: 13px;
  --radius: 9px;
}

.back-ico  { width: 52%; height: 52%; fill: currentColor; display: block; }
.sound-ico { width: 58%; height: 58%; fill: currentColor; display: block; }
#sound-btn .ico-off { display: none; }
#sound-btn.muted .ico-on  { display: none; }
#sound-btn.muted .ico-off { display: block; }

/* ── Topbar HUD — header chuẩn chung: Back | SCORE ★ | BEST ♛ | Volume ── */
#topbar {
  position: fixed;
  top: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 100%;
  max-width: 520px;
  z-index: 5;
  display: flex;
  flex-direction: column;
  gap: 3px;
  padding: 0 max(10px, env(safe-area-inset-right)) 0 max(10px, env(safe-area-inset-left));
  pointer-events: none;          /* không nuốt tap gameplay */
}
#topbar .btn3d { pointer-events: auto; }

#hud-bar { display: flex; align-items: center; gap: 8px; }

.hud-scores {
  flex: 1;
  min-width: 0;
  display: flex;
  gap: 6px;
}
.hud-pill {
  flex: 1 1 0;
  min-width: 0;
  overflow: hidden;
  background: #101a2c;            /* FLAT: fill đặc, bỏ box-shadow bevel */
  border: 2px solid rgba(255, 255, 255, 0.16);
  border-radius: 14px;
  padding: 5px 8px 6px 4px;       /* icon ghim sát mép trái (chuẩn chung) */
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 5px;
}
.pill-text { display: flex; flex-direction: column; align-items: center; min-width: 0; flex: 1 0 auto; }
.pill-ico {
  flex: 0 0 auto;
  width: clamp(16px, 4.8vw, 21px); height: clamp(16px, 4.8vw, 21px); display: block;
}
.hud-pill .label {
  font-size: clamp(9px, 3vw, 12px);
  font-family: system-ui, sans-serif;
  font-weight: 600;
  letter-spacing: 0.5px;
  color: #8fb4ff;                 /* nhãn xanh (đồng bộ popup-common) */
  line-height: 1.05;
  white-space: nowrap;
}
.hud-pill .value {
  font-size: clamp(15px, 4.6vw, 22px);
  line-height: 1.1;
  color: #fff;
  white-space: nowrap;
  font-family: var(--ui-font);
  font-weight: 800;
}
#hud-best { color: #ffd86b; }     /* BEST accent vàng (chuẩn chung) */

#hud-stage {
  font-size: 11px;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  text-align: center;
  color: var(--text-soft);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
#hud-stage.boss { color: #ff5d76; animation: bossPulse 1s ease-in-out infinite; }
@keyframes bossPulse { 50% { opacity: .55; } }

/* ── Banner tutorial ─────────────────────────────────────────── */
#tut-banner {
  position: fixed;
  bottom: 25%;                    /* cao hơn hẳn dao chờ ở đáy (khỏi che) */
  left: 50%;
  transform: translateX(-50%);
  z-index: 6;
  width: min(86%, 420px);
  padding: 12px 16px;
  border-radius: 14px;
  background: rgba(8,14,26,.85);
  border: 1px solid var(--glass-border);
  text-align: center;
  transition: opacity .25s;
  pointer-events: none;           /* banner phủ lên dao chờ → cho tap xuyên xuống canvas để phóng */
}
#tut-banner.hidden { opacity: 0; }
#tut-text { font-size: 15px; line-height: 1.35; }
#tut-skip { margin-top: 8px; pointer-events: auto; }   /* riêng nút Skip vẫn bấm được */

/* ── Popup kết quả (popup-common.md — game điểm cao TỰ vẽ) ───── */
.overlay {
  position: fixed;
  inset: 0;
  z-index: 10;
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(3,9,24,.7);
  opacity: 1;
  transition: opacity .25s;
}
.overlay.hidden { opacity: 0; pointer-events: none; }

.card {
  width: min(82%, 360px);
  padding: 26px;
  text-align: center;
  border-radius: 22px;
  background: #16233d;            /* FLAT: fill đặc, bỏ gradient + box-shadow */
  border: 2px solid rgba(120,160,255,.28);
  transform: scale(1);
  transition: transform .25s;
}
.overlay.hidden .card { transform: scale(.9); }

.card-title { color: #fff; font-size: 30px; margin-bottom: 14px; }

.sb { display: flex; justify-content: center; gap: 30px; margin-bottom: 18px; }
.sb .k { font-family: system-ui, sans-serif; font-size: 11px; letter-spacing: 2px; color: #8fb4ff; font-weight: 800; }
.sb .v { font-size: 32px; color: #fff; }
.sb .v.best { color: #ffd23f; }

/* ── Responsive ──────────────────────────────────────────────── */
@media (max-width: 380px) {
  .btn3d.btn-icon { --surface-height: 36px; --surface-width: 36px; }
}
</style>
</head>

/* ================================================================
 * §1. Native bridge (game-common) — game KHÔNG level → level: null
 * ================================================================ */
function post(msg) {
  try {
    if (window.ReactNativeWebView && window.ReactNativeWebView.postMessage) {
      window.ReactNativeWebView.postMessage(JSON.stringify(msg));
    } else {
      console.log('[cursed-knives → native]', msg);
    }
  } catch (e) { /* ignore */ }
}

function sendMessage(type, opts) {
  opts = opts || {};
  post({
    type,
    level: null,                        // game không có level → luôn null
    result: opts.result ?? null,
    data: opts.data ?? null,
    showModal: opts.showModal === true,
  });
}

function saveData(payload) {
  const data = typeof payload === 'string' ? payload : JSON.stringify(payload);
  sendMessage('save_data', { data });
}

/* ── statusBarHeight (game-common §2 — URL ưu tiên) ───────────── */
function getStatusBarHeight() {
  const params = new URLSearchParams(window.location.search);
  const fromUrl = params.get('statusBarHeight');
  const fromWin = typeof window.statusBarHeight !== 'undefined' ? window.statusBarHeight : null;
  let h = Number(fromUrl != null ? fromUrl : fromWin);
  if (Number.isNaN(h) || h < 0) h = 0;
  return h;
}

/* ── data (game-common §4 — window ưu tiên) ───────────────────── */
function getInitialData() {
  const fromWin = typeof window.data === 'string' ? window.data : null;
  const fromUrl = new URLSearchParams(window.location.search).get('data');
  return fromWin != null ? fromWin : (fromUrl || '');
}

/* ── localStorage 2 tầng (game-common §1.2) ───────────────────── */
const LS_KEY = 'cursed_knives_v1';

function saveLocal(payload) {
  try {
    const s = typeof payload === 'string' ? payload : JSON.stringify(payload);
    localStorage.setItem(LS_KEY, s);
  } catch (e) { /* private mode / quota */ }
}
function readLocal() {
  try { return localStorage.getItem(LS_KEY) || ''; } catch (e) { return ''; }
}

/** Gộp data native + localStorage: số lấy MAX, cờ lấy OR — không bao giờ mất best.
 *  Cặp echo (eS/eK) phải đi CÙNG NHAU: lấy từ nguồn có best cao hơn (echo gắn với run best).
 *  skipNative: ?reset=1 phải bỏ qua window.data/?data= (payload cũ còn trong session). */
function loadSaved(skipNative) {
  const out = { best: 0, tut: 0, muted: 0, mutedSet: false, deep: -1, eS: -1, eK: -1 };
  const pick = raw => {
    try {
      const o = JSON.parse(raw || 'null');
      if (o) {
        const b = Number.isFinite(+o.best) ? Math.floor(+o.best) : -1;
        if (b >= out.best) {             // nguồn thắng best → mang theo cặp echo của nó
          if (Number.isFinite(+o.eS)) out.eS = Math.floor(+o.eS);
          if (Number.isFinite(+o.eK)) out.eK = Math.floor(+o.eK);
        }
        if (b > 0) out.best = Math.max(out.best, b);
        if (Number.isFinite(+o.deep)) out.deep = Math.max(out.deep, Math.floor(+o.deep));
        if (o.tut) out.tut = 1;
        if (typeof o.muted !== 'undefined') { out.muted = o.muted ? 1 : 0; out.mutedSet = true; }
      }
    } catch (e) { /* data bẩn → bỏ qua */ }
  };
  if (!skipNative) pick(getInitialData());
  pick(readLocal());      // local đọc sau → thắng cho cờ muted (người chơi vừa chỉnh)
  return out;
}

/** Data NHẸ → native + localStorage (best/tut/muted/deep/echo — game-common §1.2). */
function persistSaved() {
  const light = { best, tut: tutSeen ? 1 : 0, muted: muted ? 1 : 0, deep, eS: echoS, eK: echoK };
  saveData(light);
  saveLocal(light);
}

/* ================================================================
 * §4. Stage vô hạn — sinh deterministic theo idx (như runic-blaze).

 * ================================================================ */
/** splitmix-lite: hash (idx, salt) → [0,1) ổn định giữa các lần chạy. */
function hash01(idx, salt) {
  let x = (idx * 374761393 + salt * 668265263 + 0x9E3779B9) | 0;
  x = Math.imul(x ^ (x >>> 16), 0x21F0AAAD);
  x = Math.imul(x ^ (x >>> 15), 0x735A2D97);
  x = (x ^ (x >>> 15)) >>> 0;
  return x / 4294967296;
}

/** Config 1 stage: dao cần cắm 6→9 (boss +2), tốc độ 1.8→trần 3.4 rad/s,
 *  pattern mở khóa dần (steady → wobble → flip → burst) — nhanh ngay từ
 *  đầu, ngẫu nhiên theo stage để đánh lạc nhịp, nhưng có trần độ khó. */
function stageConfig(idx) {
  const boss = (idx + 1) % 5 === 0;
  const h1 = hash01(idx, 1), h2 = hash01(idx, 2), h3 = hash01(idx, 3);
  const h4 = hash01(idx, 4), h5 = hash01(idx, 5);
  const knives = Math.min(6 + (idx >> 1), 9) + (boss ? 2 : 0);
  const speed = Math.min(1.8 + idx * 0.14, 3.4) * (0.92 + h1 * 0.16);
  const dir = h2 < 0.5 ? -1 : 1;
  const pool = ['steady'];
  if (idx >= 2) pool.push('wobble', 'wobble');
  if (idx >= 4) pool.push('flip', 'flip');
  if (idx >= 6) pool.push('burst', 'burst');
  let pattern = pool[Math.min(pool.length - 1, Math.floor(h3 * pool.length))];
  if (boss && idx >= 4) pattern = ['wobble', 'flip', 'burst'][Math.floor(h3 * 3) % 3];
  const maxPre = idx < 2 ? 0 : Math.min(3, Math.floor(idx / 3) + 1);
  const nPre = Math.min(maxPre, Math.floor(h4 * (maxPre + 1)));
  // boss: 3 ngọc-sọ (Skull Tithe) — tham thì giàu, tham nữa thì totem nổi giận
  const nGems = boss ? 3 : (idx === 0 ? 1 : (h5 < 0.22 ? 0 : (h5 < 0.72 ? 1 : 2)));
  const placed = placeAngles(idx, nPre, nGems);
  return {
    boss, knives, speed, dir, pattern,
    period: 1.6 + h1 * 1.0,          // chu kỳ wobble (s)
    flipT: 1.5 + h2 * 1.2,           // nhịp đảo chiều (s)
    phase0: h3 * Math.PI * 2,
    pre: placed.pre, gems: placed.gems,
    accent: boss ? BOSS_ACCENT : ACCENTS[Math.floor(h4 * ACCENTS.length) % ACCENTS.length],
    sigil: boss ? 5 : Math.floor(h5 * 5) % 5,
  };
}

/** Rải góc dao-cắm-sẵn + ngọc trên totem, deterministic, giữ khe hở công
 *  bằng (dao cách dao ≥.5 rad; ngọc cách dao ≥.36 để trúng ngọc không chết oan). */
function placeAngles(idx, nPre, nGems) {
  const pre = [], gemA = [];
  let s = 100;
  const farFrom = (a, list, gap) => list.every(b => angDiff(a, b) >= gap);
  for (let i = 0; i < nPre; i++) {
    for (let tr = 0; tr < 40; tr++) {
      const a = hash01(idx, s++) * Math.PI * 2;
      if (farFrom(a, pre, 0.5)) { pre.push(a); break; }
    }
  }
  for (let i = 0; i < nGems; i++) {
    for (let tr = 0; tr < 40; tr++) {
      const a = hash01(idx, s++) * Math.PI * 2;
      if (farFrom(a, pre, 0.36) && farFrom(a, gemA, 0.5)) { gemA.push(a); break; }
    }
  }
  return { pre, gems: gemA };
}

/* Chuẩn hoá góc về [0, 2π) và khoảng cách góc ngắn nhất */
function normAng(a) {
  a %= Math.PI * 2;
  return a < 0 ? a + Math.PI * 2 : a;
}
function angDiff(a, b) {
  let d = Math.abs(normAng(a) - normAng(b));
  return d > Math.PI ? Math.PI * 2 - d : d;
}
/* ================================================================
 * §5. Âm thanh — WebAudio tổng hợp, không file ngoài (như runic-blaze)
 * ================================================================ */
let audioCtx = null, audioMaster = null, bgmOut = null, sfxOut = null;
let bgmLp = null;           // lowpass BGM — Executioner's Breath sweep 1500→400Hz
let bgmTimer = null, bgmNextT = 0, bgmStep = 0;

function audioEnsure() {
  if (audioCtx) return true;
  try {
    const AC = window.AudioContext || window.webkitAudioContext;
    if (!AC) return false;
    audioCtx = new AC();
    const comp = audioCtx.createDynamicsCompressor();
    comp.threshold.value = -14; comp.knee.value = 22; comp.ratio.value = 9;
    audioMaster = audioCtx.createGain();
    audioMaster.gain.value = muted ? 0 : 0.9;
    audioMaster.connect(comp); comp.connect(audioCtx.destination);
    /* bus SFX riêng — một núm cân bằng SFX↔BGM, cộng dồn không clip */
    sfxOut = audioCtx.createGain();
    sfxOut.gain.value = 0.9;
    sfxOut.connect(audioMaster);
    const lp = audioCtx.createBiquadFilter();
    lp.type = 'lowpass'; lp.frequency.value = 1500;   // tối màu (taste: dark/low)
    bgmLp = lp;
    bgmOut = audioCtx.createGain();
    bgmOut.gain.value = 0.16;
    bgmOut.connect(lp); lp.connect(audioMaster);
    startBgm();
    return true;
  } catch (e) { return false; }
}

function audioUnlock() {
  if (!audioEnsure()) return;
  if (audioCtx.state === 'suspended') { audioCtx.resume().catch(() => {}); }
}
document.addEventListener('pointerdown', audioUnlock, { passive: true });

function setMuted(v) {
  muted = v;
  if (audioMaster) audioMaster.gain.value = muted ? 0 : 0.9;
  document.getElementById('sound-btn').classList.toggle('muted', muted);
  persistSaved();
}

/** 1 nốt đơn: osc + envelope. dest mặc định = master. */
function tone(o) {
  if (!audioCtx || muted) return;
  const t0 = audioCtx.currentTime + (o.at || 0);
  const osc = audioCtx.createOscillator();
  osc.type = o.type || 'sine';
  osc.frequency.setValueAtTime(o.freq, t0);
  if (o.slide) osc.frequency.exponentialRampToValueAtTime(Math.max(30, o.slide), t0 + (o.d || 0.15));
  const g = audioCtx.createGain();
  const a = o.a || 0.006, d = o.d || 0.15, peak = o.peak || 0.15;
  g.gain.setValueAtTime(0, t0);
  g.gain.linearRampToValueAtTime(peak, t0 + a);
  g.gain.exponentialRampToValueAtTime(0.0004, t0 + a + d);
  osc.connect(g); g.connect(o.dest || sfxOut || audioMaster);
  osc.start(t0); osc.stop(t0 + a + d + 0.05);
}

/** Noise burst qua bandpass (whoosh / va chạm). */
function noiseBurst(o) {
  if (!audioCtx || muted) return;
  const t0 = audioCtx.currentTime + (o.at || 0);
  const d = o.d || 0.2;
  const len = Math.max(1, Math.floor(audioCtx.sampleRate * d));
  const buf = audioCtx.createBuffer(1, len, audioCtx.sampleRate);
  const ch = buf.getChannelData(0);
  for (let i = 0; i < len; i++) ch[i] = Math.random() * 2 - 1;
  const src = audioCtx.createBufferSource();
  src.buffer = buf;
  const bp = audioCtx.createBiquadFilter();
  bp.type = 'bandpass';
  bp.frequency.setValueAtTime(o.f0 || 900, t0);
  if (o.f1) bp.frequency.exponentialRampToValueAtTime(o.f1, t0 + d);
  bp.Q.value = o.q || 1.1;
  const g = audioCtx.createGain();
  g.gain.setValueAtTime(o.peak || 0.12, t0);
  g.gain.exponentialRampToValueAtTime(0.0004, t0 + d);
  src.connect(bp); bp.connect(g); g.connect(sfxOut || audioMaster);
  src.start(t0); src.stop(t0 + d + 0.02);
}

/* BGM — dark & epic theo taste đã duyệt: TIMBRE quyết định độ tối, không
   phải hợp âm. Bed dây saw detune qua lowpass + drone chủ âm A giữ suốt +
   màu Neapolitan ♭II (Am→Dm→B♭→E), KHÔNG arpeggio — chỉ 1 swell mỗi hợp
   âm + timpani mềm khi đổi hợp âm; ~6.5s/hợp âm. Lookahead chống dồn nốt. */
const BGM_CHORD_S = 6.5;
const BGM_CHORDS = [                       // voicing trầm (B2–A3)
  [110.00, 130.81, 164.81],                // Am  (A2 C3 E3)
  [146.83, 174.61, 220.00],                // Dm  (D3 F3 A3)
  [116.54, 146.83, 174.61],                // B♭  (♭II — Neapolitan)
  [123.47, 164.81, 207.65],                // E   (V — sức căng chức năng)
];

function scheduleBgmChord(at) {
  const ch = BGM_CHORDS[bgmStep % BGM_CHORDS.length];
  /* drone chủ âm — giữ A suốt vòng cho sức nặng cinematic */
  tone({ freq: 55,  type: 'sine',     at, a: 1.2, d: BGM_CHORD_S + 0.8, peak: .1,  dest: bgmOut });
  tone({ freq: 110, type: 'sawtooth', at, a: 1.5, d: BGM_CHORD_S + 0.8, peak: .05, dest: bgmOut });
  /* bed dây — mỗi nốt 2 saw detune ±0.3% */
  for (const f of ch) {
    tone({ freq: f * 1.003, type: 'sawtooth', at, a: 1.4, d: BGM_CHORD_S * 0.85, peak: .028, dest: bgmOut });
    tone({ freq: f * 0.997, type: 'sawtooth', at, a: 1.4, d: BGM_CHORD_S * 0.85, peak: .028, dest: bgmOut });
  }
  /* swell đơn giữa hợp âm (thay cho arpeggio) */
  tone({ freq: ch[0] * 2, type: 'sine', at: at + BGM_CHORD_S * 0.45, a: 1.1, d: 2.2, peak: .05, dest: bgmOut });
  /* timpani mềm ở nhịp đổi hợp âm */
  tone({ freq: 150, slide: 68, type: 'sine', at, a: .005, d: .5, peak: .17, dest: bgmOut });
}

function startBgm() {
  if (bgmTimer || !audioCtx) return;
  bgmNextT = audioCtx.currentTime + 0.15;
  bgmStep = 0;
  bgmTimer = setInterval(() => {
    if (!audioCtx || audioCtx.state !== 'running' || muted) return;
    const now = audioCtx.currentTime;
    if (bgmNextT < now - 0.4) bgmNextT = now + 0.1;      // chống dồn sau khi resume
    while (bgmNextT < now + 1.0) {
      scheduleBgmChord(bgmNextT - now);
      bgmNextT += BGM_CHORD_S;
      bgmStep++;
    }
  }, 250);
}

/* ================================================================
 * §6. Canvas + layout — không gian logic LW cố định (như hamster-jump)
 * ================================================================ */
const $ = id => document.getElementById(id);
const canvas = $('game-canvas'), ctx = canvas.getContext('2d');
const bgCanvas = $('bg-canvas'), bgCtx = bgCanvas.getContext('2d');
let LW = 720, LH = 0, scale = 1;
let knifeIdleY = 0;         // vị trí dao chờ (logic)
let envSafeTop = 0;

function measureEnvSafeTop() {
  const probe = document.createElement('div');
  probe.style.cssText = 'position:fixed;top:0;left:0;height:env(safe-area-inset-top,0px);width:1px;pointer-events:none;visibility:hidden';
  document.body.appendChild(probe);
  envSafeTop = probe.offsetHeight || 0;
  probe.remove();
}

function resize() {
  const dpr = Math.min(window.devicePixelRatio || 1, 3);
  const cssW = window.innerWidth, cssH = window.innerHeight;
  canvas.width = Math.round(cssW * dpr);
  canvas.height = Math.round(cssH * dpr);
  canvas.style.width = cssW + 'px';
  canvas.style.height = cssH + 'px';
  if (cssW <= cssH) {                    // dọc: khớp bề rộng 720
    LW = 720; scale = cssW / LW; LH = cssH / scale;
  } else {                               // ngang: khớp chiều cao 1180, thế giới rộng ra
    LH = 1180; scale = cssH / LH; LW = cssW / scale;
  }
  ctx.setTransform(dpr * scale, 0, 0, dpr * scale, 0, 0);

  /* bg canvas vẽ theo px CSS, DPR hạ 1.5 cho nhẹ (nền mờ — không cần nét) */
  const bdpr = Math.min(dpr, 1.5);
  bgCanvas.width = Math.round(cssW * bdpr);
  bgCanvas.height = Math.round(cssH * bdpr);
  bgCanvas.style.width = cssW + 'px';
  bgCanvas.style.height = cssH + 'px';
  bgCtx.setTransform(bdpr, 0, 0, bdpr, 0, 0);
  initBgItems();

  /* HUD chừa status bar (game-common §2) */
  measureEnvSafeTop();
  const topPad = Math.max(getStatusBarHeight(), envSafeTop) + 8;
  $('topbar').style.paddingTop = topPad + 'px';

  /* Hình học màn chơi: totem trên, dao chờ dưới, luôn đủ đường bay */
  const topbarLg = (topPad + 70) / scale;          // đáy HUD (logic)
  disc.x = LW / 2;
  disc.R = Math.min(158, LW * 0.3, LH * 0.235);
  knifeIdleY = LH - Math.max(120, LH * 0.135);
  disc.y = Math.max(topbarLg + disc.R + 24, Math.min(LH * 0.34, knifeIdleY - KNIFE_LEN - 130 - disc.R));
  /* màn quá lùn → thu nhỏ totem để giữ khoảng bay tối thiểu */
  const gap = (knifeIdleY - KNIFE_TIP) - (disc.y + disc.R);
  if (gap < 90) disc.R = Math.max(64, disc.R - (90 - gap));
  if (cfg) buildDiscSprite();                       // R đổi → dựng lại sprite
}
window.addEventListener('resize', resize);
window.addEventListener('orientationchange', () => setTimeout(resize, 120));
if (document.fonts && document.fonts.ready) document.fonts.ready.then(() => resize());
try { if (document.fonts) document.fonts.load("800 22px 'Google Sans Flex'"); } catch (e) {}

/* ================================================================
 * §7. Art — sprite vẽ sẵn (không shadowBlur per-frame — đắt trên WebView)
 * ================================================================ */
const SS = 2;               // supersample sprite ×2 cho nét

/** Sigil khắc — THEME PHẲNG (flat): 1 nét đặc duy nhất, KHÔNG bloom/lõi trắng. */
function strokeSigil(c, path, hex, w) {
  c.lineCap = 'round'; c.lineJoin = 'round';
  c.globalAlpha = 1; c.strokeStyle = hex; c.lineWidth = w; c.stroke(path);
}

/* 6 sigil (viewBox 100×100): 5 thường + 1 TRÙM (sọ quỷ) */
const SIGIL_D = [
  'M50 12 L63 35 L55 42 L69 58 L50 88 L31 58 L45 42 L37 35 Z',                          // ngọn lửa gãy khúc
  'M50 14 L50 86 M30 32 L70 68 M70 32 L30 68 M50 14 L38 26 M50 14 L62 26',              // sao băng rune
  'M18 50 C32 22, 68 22, 82 50 C68 78, 32 78, 18 50 Z M50 38 A12 12 0 1 0 50 62 A12 12 0 1 0 50 38', // con mắt
  'M50 12 A38 38 0 1 0 50 88 A28 28 0 1 1 50 12 Z',                                     // trăng khuyết
  'M50 10 L58 40 L88 40 L64 58 L73 88 L50 70 L27 88 L36 58 L12 40 L42 40 Z',            // tinh tú gai
  'M32 24 A24 24 0 0 1 68 24 L70 52 L60 60 L60 74 L52 66 L48 66 L40 74 L40 60 L30 52 Z M40 42 A5 5 0 1 0 40 43 M60 42 A5 5 0 1 0 60 43', // sọ quỷ (TRÙM)
];

/* ── Sprite dao găm ─────────────────────────────────────────────
 * Vẽ 1 lần vào offscreen canvas rồi drawImage xoay — mũi dao hướng LÊN,
 * tâm sprite = tâm dao. 3 biến thể: thép (dao của mình), tím mờ (dao cắm
 * sẵn), pip (mờ để đếm đạn — dùng chung sprite thép).
 */
const KNIFE_SPR_W = 44, KNIFE_SPR_H = 120;   // px logic (sprite ×SS)
let knifeSpr = null, preKnifeSpr = null, redKnifeSpr = null;
let echoSigPath = null;     // Path2D sọ quỷ cho Echo Wraith (cache 1 lần)

function buildKnifeSprite(edgeHex, bodyFill, handleFill) {
  const cv = document.createElement('canvas');
  cv.width = KNIFE_SPR_W * SS; cv.height = KNIFE_SPR_H * SS;
  const c = cv.getContext('2d');
  c.scale(SS, SS);
  const cx = KNIFE_SPR_W / 2;                  // 22
  /* lưỡi: mũi (cx,8) → vai (cx±7.5, 62) — hơi thon */
  const blade = new Path2D(`M ${cx} 8 L ${cx + 7.5} 60 L ${cx + 6} 64 L ${cx - 6} 64 L ${cx - 7.5} 60 Z`);
  c.fillStyle = bodyFill;
  c.fill(blade);
  strokeSigil(c, blade, edgeHex, 3.6);
  /* rãnh máu — lõi trắng mảnh giữa lưỡi */
  const fuller = new Path2D(`M ${cx} 16 L ${cx} 56`);
  c.strokeStyle = '#fff'; c.globalAlpha = .8; c.lineWidth = 1.4; c.lineCap = 'round';
  c.stroke(fuller); c.globalAlpha = 1;
  /* chắn tay */
  const guard = new Path2D();
  guard.roundRect ? guard.roundRect(cx - 13, 64, 26, 7, 3.5)
                  : guard.rect(cx - 13, 64, 26, 7);
  c.fillStyle = '#0d1524';
  c.fill(guard);
  c.strokeStyle = edgeHex; c.lineWidth = 2; c.stroke(guard);
  /* cán quấn da */
  const grip = new Path2D();
  grip.roundRect ? grip.roundRect(cx - 6, 71, 12, 33, 6) : grip.rect(cx - 6, 71, 12, 33);
  c.fillStyle = handleFill;
  c.fill(grip);
  c.strokeStyle = '#3a3358'; c.lineWidth = 2; c.stroke(grip);
  c.strokeStyle = 'rgba(255,255,255,.18)'; c.lineWidth = 1.4;
  for (let y = 77; y <= 98; y += 7) {
    c.beginPath(); c.moveTo(cx - 5, y); c.lineTo(cx + 5, y + 3); c.stroke();
  }
  /* chuôi ngọc */
  c.beginPath(); c.arc(cx, 109, 6, 0, Math.PI * 2);
  c.fillStyle = '#0d1524'; c.fill();
  c.strokeStyle = edgeHex; c.lineWidth = 2; c.stroke();
  c.beginPath(); c.arc(cx, 109, 2.2, 0, Math.PI * 2);
  c.fillStyle = '#fff'; c.fill();
  return cv;
}

function buildKnifeSprites() {
  knifeSpr = buildKnifeSprite('#6fd8ff', '#1b2740', '#141026');
  preKnifeSpr = buildKnifeSprite('#8a6cd8', '#221a38', '#181226');
  redKnifeSpr = buildKnifeSprite('#ff3d5a', '#2a1220', '#1a0d16');   // kill-cam: dao thủ phạm
}

/** Vẽ dao tại (x,y) tâm sprite, xoay rot (0 = mũi hướng lên), scale s. */
function drawKnife(spr, x, y, rot, s, alpha) {
  ctx.save();
  ctx.translate(x, y);
  if (rot) ctx.rotate(rot);
  if (alpha != null) ctx.globalAlpha = alpha;
  const w = KNIFE_SPR_W * (s || 1), h = KNIFE_SPR_H * (s || 1);
  ctx.drawImage(spr, -w / 2, -h / 2, w, h);
  ctx.restore();
  ctx.globalAlpha = 1;
}

/* ── Sprite totem ───────────────────────────────────────────────
 * Đĩa obsidian + vành sáng accent + vòng arcane đứt nét + sigil giữa.
 * Dựng lại mỗi stage (accent/sigil đổi); xoay bằng drawImage.
 */
function buildDiscSprite() {
  const R = disc.R;
  const pad = 14;                              // chừa viền glow
  const size = Math.ceil((R + pad) * 2);
  const cv = document.createElement('canvas');
  cv.width = cv.height = size * SS;
  const c = cv.getContext('2d');
  c.scale(SS, SS);
  c.translate(size / 2, size / 2);
  const ac = cfg.accent;

  /* thân đá — FLAT: fill đặc 1 màu, KHÔNG radial gradient */
  c.fillStyle = cfg.boss ? '#241019' : '#151c2e';
  c.beginPath(); c.arc(0, 0, R, 0, Math.PI * 2); c.fill();

  /* vân nứt đá — chord mờ phẳng (trang trí, không tạo chiều sâu) */
  c.strokeStyle = 'rgba(255,255,255,.05)';
  c.lineWidth = 1.5;
  for (let i = 0; i < 7; i++) {
    const a1 = hash01(stageIdx, 40 + i) * Math.PI * 2;
    const a2 = a1 + 0.9 + hash01(stageIdx, 50 + i) * 1.6;
    c.beginPath();
    c.moveTo(Math.cos(a1) * R * 0.95, Math.sin(a1) * R * 0.95);
    c.lineTo(Math.cos(a2) * R * 0.6, Math.sin(a2) * R * 0.6);
    c.stroke();
  }

  /* vành ngoài — FLAT: 1 nét đặc, không glow */
  c.globalAlpha = 1;
  c.strokeStyle = ac; c.lineWidth = 3;
  c.beginPath(); c.arc(0, 0, R - 2.5, 0, Math.PI * 2); c.stroke();

  /* vòng arcane đứt nét — FLAT: 1 nét + nan hoa mờ phẳng */
  c.setLineDash([10, 14]);
  c.strokeStyle = ac; c.globalAlpha = .5; c.lineWidth = 3;
  c.beginPath(); c.arc(0, 0, R - 26, 0, Math.PI * 2); c.stroke();
  c.setLineDash([]);
  c.globalAlpha = .12;
  c.lineWidth = 2;
  for (let i = 0; i < 6; i++) {
    const a = i / 6 * Math.PI * 2;
    c.beginPath();
    c.moveTo(Math.cos(a) * (R - 34), Math.sin(a) * (R - 34));
    c.lineTo(Math.cos(a) * (R - 62), Math.sin(a) * (R - 62));
    c.stroke();
  }
  c.globalAlpha = 1;

  /* sigil giữa — FLAT (strokeSigil giờ 1 nét), scale vào ~54% totem */
  const sig = new Path2D(SIGIL_D[cfg.sigil]);
  const k = (R * 1.08) / 100;
  c.save();
  c.scale(k, k);
  c.translate(-50, -50);
  strokeSigil(c, sig, ac, 5);
  c.restore();

  disc.sprite = cv;
  disc.spriteR = size / 2;
}

/** Ngọc hồn — lục giác xanh nguyền, vẽ live (pulse theo timeMs).
 *  Ngọc-sọ (boss, Skull Tithe): đỏ, to hơn — ăn là totem nổi giận. */
function drawGem(gm) {
  const th = disc.rot + gm.a;
  const gr = disc.R + 13;
  const x = disc.x + Math.cos(th) * gr;
  const y = disc.y + Math.sin(th) * gr;
  const pulse = 0.78 + 0.22 * Math.sin(timeMs * 0.005 + gm.a * 7);
  const gemCol = gm.skull ? '#ff5d76' : '#52ff9d';
  const gemFill = gm.skull ? '#3a1420' : '#123a28';   // FLAT: fill đặc tối, không translucent glow
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(th + Math.PI / 2);                // đỉnh ngọc hướng ra ngoài
  ctx.beginPath();
  const r = gm.skull ? 15 : 13;
  for (let i = 0; i < 6; i++) {
    const a = -Math.PI / 2 + i / 6 * Math.PI * 2;
    const rr2 = i % 2 ? r * 0.82 : r;
    ctx[i ? 'lineTo' : 'moveTo'](Math.cos(a) * rr2, Math.sin(a) * rr2);
  }
  ctx.closePath();
  ctx.fillStyle = gemFill;
  ctx.fill();
  ctx.lineJoin = 'round';
  ctx.strokeStyle = gemCol;                    // FLAT: 1 nét đặc (pulse nhẹ cho biết tương tác)
  ctx.globalAlpha = pulse; ctx.lineWidth = 2.4; ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(0, -r * 0.5); ctx.lineTo(r * 0.36, 0); ctx.lineTo(0, r * 0.5); ctx.lineTo(-r * 0.36, 0);
  ctx.closePath();
  ctx.globalAlpha = .55;                        // facet cùng màu accent (flat), bỏ lõi trắng
  ctx.lineWidth = 1;
  ctx.stroke();
  ctx.globalAlpha = 1;
  ctx.restore();
}

/* ── Nền sao + hồn lửa xanh (bg-canvas, px CSS) ────────────────── */
let bgStars = [], bgWisps = [];
let wispSprite = null;      // sprite vẽ sẵn — không shadowBlur per-frame

function makeWispSprite() {
  wispSprite = document.createElement('canvas');
  wispSprite.width = 32; wispSprite.height = 32;
  const c = wispSprite.getContext('2d');
  c.fillStyle = 'rgba(82,255,157,.55)';        // FLAT: chấm tròn đặc, không gradient glow
  c.beginPath(); c.arc(16, 16, 7, 0, Math.PI * 2); c.fill();
}

function initBgItems() {
  if (!wispSprite) makeWispSprite();
  const W = window.innerWidth, H = window.innerHeight;
  const nStars = Math.min(90, Math.floor(W * H / 9000));
  bgStars = Array.from({ length: nStars }, () => ({
    x: Math.random() * W, y: Math.random() * H,
    r: Math.random() * 1.4 + 0.3,
    vy: Math.random() * 8 + 2,
    op: Math.random() * 0.45 + 0.1,
    ph: Math.random() * Math.PI * 2,
    col: `hsl(${Math.round(150 + Math.random() * 80)},85%,78%)`,   // string tính sẵn
  }));
  bgWisps = Array.from({ length: 12 }, () => ({
    x: Math.random() * W, y: Math.random() * H,
    vy: Math.random() * 24 + 12,
    wob: Math.random() * Math.PI * 2,
    r: Math.random() * 2.2 + 1.2,
  }));
}

function stepBg(dt) {
  const W = window.innerWidth, H = window.innerHeight;
  const s = dt / 1000;
  bgCtx.clearRect(0, 0, W, H);
  const tw = timeMs * 0.001;
  for (const p of bgStars) {
    p.y -= p.vy * s;
    if (p.y < -4) { p.y = H + 4; p.x = Math.random() * W; }
    bgCtx.globalAlpha = p.op * (0.65 + 0.35 * Math.sin(tw * 2 + p.ph));
    bgCtx.fillStyle = p.col;
    bgCtx.beginPath();
    bgCtx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    bgCtx.fill();
  }
  for (const e of bgWisps) {
    e.y -= e.vy * s;
    e.wob += s * 2.2;
    e.x += Math.sin(e.wob) * 14 * s;
    if (e.y < -6) { e.y = H + 6; e.x = Math.random() * W; }
    bgCtx.globalAlpha = 0.3 + 0.2 * Math.sin(e.wob * 1.7);
    const d = e.r * 7;
    bgCtx.drawImage(wispSprite, e.x - d / 2, e.y - d / 2, d, d);
  }
  bgCtx.globalAlpha = 1;
}
/* ================================================================
 * §8. Gameplay
 * ================================================================ */
function easeOutBack(k) {
  const c = 1.70158;
  return 1 + (c + 1) * Math.pow(k - 1, 3) + c * Math.pow(k - 1, 2);
}

/** Cơn thịnh nộ Skull Tithe đang hiệu lực → trả về cơn đó (dọn cơn hết hạn). */
function wrathActive() {
  if (wraths.length && timeMs >= wraths[0].end) wraths = wraths.filter(w => timeMs < w.end);
  return wraths.find(w => timeMs >= w.start) || null;
}

/** Độ sáng telegraph cơn thịnh nộ sắp nổ [0..1] — vẽ vignette đỏ dâng dần. */
function wrathTele() {
  for (const w of wraths) {
    if (timeMs < w.start && w.start - timeMs <= 400) return 1 - (w.start - timeMs) / 400;
  }
  return 0;
}

/** Tắt slow-mo dao cuối (Executioner's Breath) + trả lowpass BGM về chỗ cũ. */
function endBreath() {
  if (!breath) return;
  breath = false;
  if (bgmLp && audioCtx) {
    try { bgmLp.frequency.setTargetAtTime(1500, audioCtx.currentTime, 0.08); } catch (e) {}
  }
}

/** Tốc độ xoay mục tiêu (rad/s) theo pattern stage — mượt hoá ở update
 *  (không snap) để giữ tính liên tục chuyển động. */
function patternOmega() {
  const base = cfg.speed, dir = cfg.dir;
  switch (cfg.pattern) {
    case 'wobble':                       // phồng-xẹp, thi thoảng khựng nhẹ
      return base * dir * (0.45 + 0.55 * Math.sin(Math.PI * 2 * stageT / cfg.period + cfg.phase0));
    case 'flip':                         // đảo chiều theo nhịp
      return base * dir * (Math.floor(stageT / cfg.flipT) % 2 === 0 ? 1 : -1);
    case 'burst':                        // bò chậm rồi vọt nhanh
      return base * dir * ((stageT % 1.7) < 0.95 ? 0.45 : 1.55);
    default:
      return base * dir;
  }
}

/** Vào stage idx: dựng totem mới (quiet = totem trang trí cho menu). */
function spawnStage(idx, quiet) {
  stageIdx = Math.min(idx, 9998);        // chặn giá trị vô lý
  cfg = stageConfig(stageIdx);
  stuck = cfg.pre.map(a => ({ a, pre: true }));
  gems = cfg.gems.map(a => ({ a, skull: cfg.boss }));   // boss → ngọc-sọ +8
  knivesLeft = cfg.knives;
  stageT = 0;
  disc.w = cfg.speed * cfg.dir * 0.6;
  buildDiscSprite();
  phase = 'spawn';
  spawnT0 = timeMs;
  pendingBreakAt = 0;
  flying = null;
  /* reset state v1.1 theo stage */
  riskyCount = 0;
  wraths = []; lastWrathEnd = 0;
  lastStand = null; stallRing = 0; spikesGrown = 0; stallTries = 0; overkillPending = false;
  omenFiredAt = -1; omenGlow = 0;
  endBreath();
  echoLive = !quiet && !tutorial && echoS >= 1 && stageIdx === echoS && !echoBrokenRun;
  echoDissolveT0 = 0;
  // Không còn "Stage N" LẪN chữ "BOSS" — totem vào lặng lẽ (phình ra là đủ tín
  // hiệu); TRÙM chỉ báo bằng ÂM THANH + sigil sọ đỏ, không hiện chữ.
  if (!quiet && cfg.boss) sBoss();
  updateStageHud();
}

/** Dao chạm vành totem — nội suy rot tại đúng thời điểm chạm (sub-frame). */
function resolveImpact(rotAt) {
  const a = normAng(Math.PI / 2 - rotAt);
  endBreath();                           // slow-mo dao cuối kết thúc ĐÚNG khoảnh khắc chạm

  /* ngọc hồn: dao xuyên qua ngọc rồi vẫn cắm vào totem. Ngọc-sọ (boss) +8
     nhưng chọc thủng là totem NỔI GIẬN — vọt tốc 0.5s sau telegraph 0.4s */
  for (let i = gems.length - 1; i >= 0; i--) {
    if (angDiff(a, gems[i].a) < GEM_ARC) {
      const gm = gems[i];
      const th = disc.rot + gm.a;
      const gx = disc.x + Math.cos(th) * (disc.R + 13);
      const gy = disc.y + Math.sin(th) * (disc.R + 13);
      const val = gm.skull ? 8 : GEM_SCORE;
      gems.splice(i, 1);
      if (gm.skull) {
        sShriek();
        const start = Math.max(timeMs + 400, lastWrathEnd);
        // dir đóng băng THEO TỪNG CƠN — gem thứ 2 không được đảo hướng cơn đã lên lịch
        wraths.push({ start, end: start + 500, dir: disc.w >= 0 ? 1 : -1 });
        lastWrathEnd = start + 500;
      } else {
        sGem();
      }
      if (!tutorial) {
        addScore(val);
        floatTexts.push({ x: gx, y: gy - 16, born: timeMs, life: 800, size: 30, color: gm.skull ? '#ff5d76' : '#52ff9d', text: '+' + val });
      } else {
        // tutorial: chỉ hiện +5 (không cộng điểm thật để không đụng Best)
        floatTexts.push({ x: gx, y: gy - 16, born: timeMs, life: 950, size: 32, color: '#52ff9d', text: '+' + GEM_SCORE });
      }
      for (let s2 = 0; s2 < 6; s2++) sparks.push({ x: gx, y: gy, born: timeMs });
      rings.push({ x: gx, y: gy, born: timeMs, col: gm.skull ? '#ff5d76' : '#52ff9d' });
    }
  }

  /* dao gần nhất HAI PHÍA (cho Needle) — bỏ qua gai xương đang mọc (vô hại) */
  let dCW = Infinity, dCCW = Infinity, killerA = 0, nearest = Infinity;
  for (const k of stuck) {
    if (k.grow0 && timeMs - k.grow0 < 600) continue;
    const d = normAng(k.a - a);
    if (d > Math.PI) { if (Math.PI * 2 - d < dCCW) dCCW = Math.PI * 2 - d; }
    else { if (d < dCW) dCW = d; }
    const ad = angDiff(a, k.a);
    if (ad < nearest) { nearest = ad; killerA = k.a; }
  }
  if (nearest < KNIFE_GAP) {
    if (tutorial) {
      // pha 'death' (dao #1 ở đáy): cố ý cho CHẾT để dạy; còn lại chỉ nảy ra
      if (tutorial.mode === 'death') tutorialDeath(killerA);
      else tutorialBounce();
      return;
    }
    clashDeath(killerA, nearest);
    return;
  }

  /* cắm ngọt */
  stuck.push({ a, pre: false });
  stagePulseT0 = timeMs;
  flying = null;
  knivesLeft--;
  sStick();
  shakeAmp = Math.max(shakeAmp, 3.5);
  if (!tutorial) {
    /* thang thưởng liều: Needle (lọt giữa 2 dao) > Razor (sát lưỡi) > Close */
    let gain = 1, tag = null;
    if (dCW < 0.30 && dCCW < 0.30) {
      gain += 6; tag = t('needle'); riskyCount++; sNeedle();
    } else if (nearest < 0.135) {
      gain += 4; tag = t('razor'); riskyCount++; sRazor();
    } else if (nearest < NEAR_MISS) {
      gain += 2; tag = t('closeCall'); riskyCount++; sClose();
    }
    if (tag) {
      floatTexts.push({ x: LW / 2, y: disc.y + disc.R + 58, born: timeMs, life: 800, size: tag === t('needle') ? 30 : 24, color: '#ffd23f', text: tag });
    }
    addScore(gain);
    floatTexts.push({ x: LW / 2, y: disc.y + disc.R + 30, born: timeMs, life: 750, size: 28, color: '#fff', text: '+' + gain });

    /* Echo Wraith: vượt qua đúng chỗ run best đã gục → bóng vọng tan */
    if (echoLive && (cfg.knives - knivesLeft) >= echoK + 1) {
      echoLive = false;
      echoBrokenRun = true;
      echoDissolveT0 = timeMs;
      addScore(5);
      sEcho();
      floatTexts.push({ x: disc.x + disc.R + 40, y: disc.y - disc.R * 0.35, born: timeMs, life: 1000, size: 26, color: '#b8ffd9', text: t('echoBroken') + ' +5' });
    }

    if (knivesLeft <= 0) {
      /* Last Stand: kết liễu boss trong pha NHANH của cú giãy chết → OVERKILL */
      if (lastStand && lastStand.mult > 1) overkillPending = true;
      pendingBreakAt = timeMs + 140;     // để dao cuối kịp hiện rồi mới vỡ
    }
  } else {
    tutorialOnStick();
  }
}

/** Trúng dao đã cắm → thua: kill-cam soi thủ phạm, dao văng, popup sau 0.7s. */
function clashDeath(killerA, nearest) {
  sClash();
  flash = 1;
  shakeAmp = 16;
  /* kill-cam "The Culprit": slow-mo 8% trong 560ms THẬT, zoom vào điểm va
     chạm, dao thủ phạm phát sáng đỏ + "hụt N°" — chết phải hiểu vì sao */
  killCam = {
    until: realMs + 560,
    zoomStart: realMs,
    x: LW / 2, y: disc.y + disc.R,
    killerA: killerA,
    missDeg: Math.max(1, Math.ceil((KNIFE_GAP - nearest) * 180 / Math.PI)),
  };
  deadKnife = {
    x: LW / 2, y: flying ? flying.y : knifeIdleY,
    vx: (Math.random() < 0.5 ? -1 : 1) * (0.15 + Math.random() * 0.12),
    vy: -0.55, rot: 0,
    vr: (Math.random() < 0.5 ? -1 : 1) * 0.013,
  };
  flying = null;
  endRun();
}

function endRun() {
  state = 'over';
  runsEnded++;
  /* Echo Wraith: run này lập kỷ lục mới → ghi lại đúng chỗ nó gục ngã
     (stage nào, đã cắm mấy dao) làm bóng vọng cho các run sau */
  if (score > bestStart && stageIdx >= 1 && cfg) {
    echoS = stageIdx;
    echoK = cfg.knives - knivesLeft;
  }
  persistSaved();                        // best đã persist live trong addScore — chốt lại lần cuối

  const isNew = score > bestStart;
  $('ov-title').textContent = isNew ? t('newBest') : t('gameOver');
  $('ov-score').textContent = String(score);
  $('ov-best').textContent = String(best);
  fitScores();
  updateBestHud();                       // HUD Best chỉ refresh khi hết màn (game-common §1.2)

  sendMessage('game_result');            // không level: result=null, showModal=false
  if (runsEnded % ADS_EVERY === 0) sendMessage('ads');

  /* delay cho animation thua chạy rồi mới hiện popup (popup-common §5).
     Guard state: native có thể gọi onRetryLevel trong cửa sổ này */
  clearTimeout(overTimer);
  overTimer = setTimeout(() => {
    if (state === 'over') $('overlay').classList.remove('hidden');
  }, 700);
}

/** Totem vỡ: mảnh đá + dao văng thừa hưởng vận tốc xoay (không snap). */
function breakDisc() {
  phase = 'break';
  breakT0 = timeMs;
  sShatter();
  shakeAmp = Math.max(shakeAmp, 9);
  rings.push({ x: disc.x, y: disc.y, born: timeMs, col: cfg.accent });

  const N = 9, arc = Math.PI * 2 / N;
  const tang = disc.w * disc.R / 1000;   // vận tốc tiếp tuyến tại vành (px/ms)
  for (let i = 0; i < N; i++) {
    const mid = disc.rot + (i + 0.5) * arc;
    const sp = 0.13 + Math.random() * 0.12;
    shards.push({
      x: disc.x, y: disc.y,
      vx: Math.cos(mid) * sp - Math.sin(mid) * tang * 0.6,
      vy: Math.sin(mid) * sp + Math.cos(mid) * tang * 0.6 - 0.1,
      rot: disc.rot, vr: disc.w / 1000 + (Math.random() - 0.5) * 0.006,
      a0: i * arc, a1: (i + 1) * arc,
      born: timeMs, col: cfg.accent, R: disc.R * 0.94,
    });
  }
  for (const k of stuck) {
    if (k.grow0 && timeMs - k.grow0 < 600) continue;   // gai chưa mọc xong → tan cùng totem, không văng nguyên cây
    const th = disc.rot + k.a;
    const cd = disc.R - EMBED + KNIFE_TIP;
    debris.push({
      x: disc.x + Math.cos(th) * cd, y: disc.y + Math.sin(th) * cd,
      vx: Math.cos(th) * 0.18 - Math.sin(th) * tang,
      vy: Math.sin(th) * 0.18 + Math.cos(th) * tang - 0.12,
      rot: th - Math.PI / 2, vr: disc.w / 1000 + (Math.random() - 0.5) * 0.01,
      born: timeMs, spr: k.pre ? preKnifeSpr : knifeSpr,
    });
  }
  for (const gm of gems) {
    const th = disc.rot + gm.a;
    const gx = disc.x + Math.cos(th) * (disc.R + 13), gy = disc.y + Math.sin(th) * (disc.R + 13);
    for (let s2 = 0; s2 < 4; s2++) sparks.push({ x: gx, y: gy, born: timeMs });
  }
  stuck = [];
  gems = [];

  if (!tutorial) {
    /* Unblemished Shatter: thưởng vỡ totem cộng dồn theo số cú liều trong
       stage; boss kết liễu trong pha nhanh (Last Stand) → OVERKILL gấp đôi */
    const base = cfg.boss ? (overkillPending ? BOSS_BONUS * 2 : BOSS_BONUS) : STAGE_BONUS;
    const cap = cfg.boss ? (overkillPending ? 30 : 25) : 10;
    const b = Math.min(cap, base + (cfg.boss ? 3 : 2) * riskyCount);
    if (overkillPending) {
      sOverkill();
      floatTexts.push({ x: LW / 2, y: disc.y - 52, born: timeMs, life: 1300, size: 44, color: '#ff5d76', text: t('overkill') });
    }
    addScore(b);
    floatTexts.push({ x: LW / 2, y: disc.y, born: timeMs, life: 1100, size: 36, color: riskyCount > 0 ? '#ffd23f' : cfg.accent, text: t('stageClear') + '  +' + b });
    /* Deepest Descent: phá sâu hơn mọi run trước → +5 mốc mới */
    if (stageIdx > deep) {
      deep = stageIdx;
      addScore(5);
      floatTexts.push({ x: LW / 2, y: disc.y + 46, born: timeMs, life: 1200, size: 26, color: '#52ff9d', text: t('uncharted') + ' +5' });
      persistSaved();
    }
  } else {
    tutorial.mode = 'done';
    tutorial.doneUntil = timeMs + 1500;
    setTutText(t('tutDone'));
    sTutOk();
  }
  lastStand = null;
  overkillPending = false;
  wraths = [];               // cơn thịnh nộ chết cùng totem — không telegraph lên xác totem
  lastWrathEnd = 0;
}

function addScore(n) {
  score += n;
  updateScoreHud();
  if (score > best) {                    // best persist NGAY khi đổi (game-common §1.2)
    best = score;
    persistSaved();
  }
}

/** Ván mới (boot / Play Again / onRetryLevel) — không còn menu, vào thẳng. */
function newRun() {
  clearTimeout(overTimer);               // hủy popup đang chờ hiện của ván trước
  $('overlay').classList.add('hidden');
  tutorial = null;
  hideTutBanner();
  score = 0;
  bestStart = best;
  shards = []; debris = []; floatTexts = []; rings = []; sparks = [];
  deadKnife = null; flash = 0; shakeAmp = 0;

  echoBrokenRun = false;                 // bóng vọng sống lại mỗi run mới
  updateScoreHud();
  updateBestHud();
  state = 'playing';
  paused = false;
  spawnStage(0, false);
}

/* ================================================================
 * §9. Tutorial — 1 TOTEM DUY NHẤT, choreograph freeze theo góc quay
 *   (không chuyển cảnh; xoay-tới-mốc rồi đứng im chờ tap — chặn touch
 *    trong lúc xoay). mode: spin→wait×3→death→deathWait→free→done.
 * ================================================================ */
function tutCfg() {
  return {
    boss: false, knives: 99, speed: TUT_CRUISE, dir: 1, pattern: 'steady',
    period: 2, flipT: 2, phase0: 0, pre: [], gems: [TUT_GEM_A],
    accent: '#35e0ff', sigil: 2,
  };
}

function startTutorial() {
  clearTimeout(overTimer);
  $('overlay').classList.add('hidden');
  shards = []; debris = []; floatTexts = []; rings = []; sparks = [];
  deadKnife = null; flash = 0; shakeAmp = 0;
  killCam = null; timeScale = 1; endBreath();
  score = 0;
  bestStart = best;
  updateScoreHud();
  state = 'playing';
  paused = false;
  tutorial = {
    mode: 'spin', fi: 0, F: TUT_FREEZES.slice(), hintKey: 'tut1',
    segTo: 0, retryUntil: 0, doneUntil: 0, deathUntil: 0,
  };
  cfg = tutCfg();
  disc.rot = 0;
  disc.w = 0;
  stuck = [];
  gems = [{ a: TUT_GEM_A, skull: false }];   // dao #3 sẽ trúng ngọc này
  knivesLeft = 99;                        // tutorial không đếm đạn (pips ẩn)
  stageT = 0;
  riskyCount = 0;
  wraths = []; lastWrathEnd = 0;
  lastStand = null; stallRing = 0; spikesGrown = 0; overkillPending = false;
  omenFiredAt = -1; omenGlow = 0;
  echoLive = false;
  buildDiscSprite();
  phase = 'spawn';                        // totem phình ra trước, rồi mới xoay
  spawnT0 = timeMs;
  pendingBreakAt = 0;
  flying = null;
  setTutText(t('tut1'));
  hideTutBanner();                         // banner chỉ hiện KHI freeze (tutArrive)
  updateStageHud();
}

/** Bắt đầu 1 đoạn xoay steady tới góc toRot (giảm tốc 20° cuối rồi freeze). */
function tutStartSpin(toRot) {
  const T = tutorial;
  T.mode = 'spin';
  T.segTo = toRot;
  hideTutBanner();                         // đang xoay → ẩn hướng dẫn (hiện lại khi freeze)
}

/** Tới mốc = FREEZE → mới hiện banner. F0..F2 = phóng 3 dao (dao 3 trúng gem);
 *  F3 = "Try to throw" → phi trúng dao #1 = chết. */
function tutArrive() {
  const T = tutorial;
  if (T.fi < 3) {
    T.mode = 'wait';                                // 3 dao đối xứng — cùng lời "tap to throw"
    T.hintKey = 'tut1';
    setTutText(t('tut1'));
  } else {
    T.mode = 'death';                               // F4: dao #1 về đúng đáy — mời phi vào rồi CHẾT
    T.hintKey = 'tutTry';
    setTutText(t('tutTry'));
  }
  $('tut-banner').classList.remove('hidden');       // freeze xong mới hiện hướng dẫn
}

/** Xoay choreograph tutorial: STEADY tốc độ đều, chỉ 20° CUỐI giảm tốc → freeze,
 *  vào mốc mới thì speed-up lại (accel từ 0). */
function tutSpin(dt) {
  const T = tutorial;
  prevRot = disc.rot;
  if (phase === 'spawn') { disc.w = 0; return; }    // đang phình — chưa xoay
  if (T.mode === 'spin') {
    const remaining = T.segTo - disc.rot;
    if (remaining <= 0.004) {                       // mốc đầu (arc 0) hoặc đã tới → freeze ngay
      disc.rot = T.segTo; disc.w = 0; tutArrive();
    } else {
      const targetW = remaining > TUT_DECEL_ARC     // >20° còn lại → chạy đều; ≤20° → giảm dần
        ? TUT_CRUISE
        : Math.max(TUT_MIN_W, TUT_CRUISE * remaining / TUT_DECEL_ARC);
      const k = 1 - Math.pow(0.82, dt / 16.667);    // mượt hoá → speed-up từ 0 mượt, giảm cũng mượt
      disc.w += (targetW - disc.w) * k;
      disc.rot += disc.w * dt / 1000;
      if (disc.rot >= T.segTo - 0.004) { disc.rot = T.segTo; disc.w = 0; tutArrive(); }
    }
  } else if (T.mode === 'free') {                   // cú phi tự do — vẫn xoay STEADY
    const k = 1 - Math.pow(0.82, dt / 16.667);
    disc.w += (TUT_CRUISE - disc.w) * k;
    disc.rot += disc.w * dt / 1000;
  } else if (T.mode === 'done') {                   // xong — coast mượt tới dừng (không khựng)
    disc.w *= Math.pow(0.9965, dt);
    disc.rot += disc.w * dt / 1000;
  } else {
    disc.w = 0;                                     // wait / death / deathWait → đóng băng cứng
  }
}

/** Dao cắm xong trong tutorial → sang mốc kế (hoặc kết thúc nếu là cú tự do). */
function tutorialOnStick() {
  const T = tutorial;
  if (T.mode === 'wait') {
    T.fi++;
    tutStartSpin(T.F[T.fi]);              // xoay tới mốc tiếp theo
  } else if (T.mode === 'free') {
    T.mode = 'done';
    T.doneUntil = timeMs + 1500;
    T.retryUntil = 0;                     // huỷ timer "thử lại" đang treo — kẻo nó đè "Sẵn sàng!"
    T.hintKey = 'tutDone';
    setTutText(t('tutDone'));
    sTutOk();
  }
}

/** F4 tutorial: người chơi phi trúng dao #1 → CHẾT (demo thật, KHÔNG game-over).
 *  Dao thủ phạm sáng đỏ + dao mình văng ra + flash; ~1.5s sau chuyển sang cú tự do. */
function tutorialDeath(killerA) {
  sClash();
  flash = 1;
  shakeAmp = 16;
  deadKnife = {
    x: LW / 2, y: flying ? flying.y : knifeIdleY,
    vx: (Math.random() < 0.5 ? -1 : 1) * (0.15 + Math.random() * 0.12),
    vy: -0.55, rot: 0, vr: (Math.random() < 0.5 ? -1 : 1) * 0.013,
  };
  flying = null;
  rings.push({ x: LW / 2, y: disc.y + disc.R, born: timeMs, col: '#ff3d5a' });
  floatTexts.push({ x: LW / 2, y: disc.y + disc.R + 50, born: timeMs, life: 1400, size: 44, color: '#ff5d76', text: '✗' });
  hideTutBanner();                        // giấu hướng dẫn trong lúc "chết" cho gọn
  tutorial.deathA = killerA;              // dao thủ phạm — render sáng đỏ trong lúc deathWait
  tutorial.mode = 'deathWait';
  tutorial.deathUntil = timeMs + 1500;
}

/** Trong tutorial va dao KHÔNG thua — dao nảy ra, nhắc thử lại (chỉ ở cú tự do). */
function tutorialBounce() {
  sClose();
  flash = 0.35;
  shakeAmp = 6;
  debris.push({
    x: LW / 2, y: flying ? flying.y : knifeIdleY,
    vx: (Math.random() < 0.5 ? -1 : 1) * 0.12, vy: -0.4,
    rot: 0, vr: 0.015, born: timeMs, spr: knifeSpr,
  });
  flying = null;
  setTutText(t('tutRetry'));
  tutorial.retryUntil = timeMs + 1400;
}

function finishTutorial() {
  tutSeen = true;
  persistSaved();
  tutorial = null;
  hideTutBanner();
  newRun();                              // hết tutorial → vào thẳng ván thật
}

function setTutText(s) { $('tut-text').textContent = s; }
function hideTutBanner() { $('tut-banner').classList.add('hidden'); }

/* ================================================================
 * §10. Update — dt tính bằng ms (đã clamp), mọi anim key theo timeMs
 * ================================================================ */
function update(dt) {
  if (paused) return;                    // pause đóng băng toàn bộ thế giới

  flash = Math.max(0, flash - dt / 450);
  shakeAmp *= Math.exp(-dt / 110);

  /* totem xoay — mượt hoá về tốc độ mục tiêu (giữ liên tục chuyển động) */
  if (cfg) {
    stageT += dt / 1000;
    if (state === 'over') {
      disc.w *= Math.pow(0.9992, dt);    // thua: totem chậm dần, không khựng
      prevRot = disc.rot;
      disc.rot += disc.w * dt / 1000;
    } else if (tutorial) {
      tutSpin(dt);                       // choreograph: xoay-tới-mốc rồi freeze
    } else {
      let target = patternOmega();
      if (state === 'playing') {
        /* Last Stand: boss dao cuối — sau 800ms telegraph, totem giãy chết
           (dao động 0.25×→1.35×); ưu tiên trên mọi pattern/wrath */
        if (lastStand && timeMs >= lastStand.t0 + 800) {
          const lsT = (timeMs - lastStand.t0 - 800) / 1000;
          lastStand.mult = 0.8 + 0.55 * Math.sin(Math.PI * 2 * lsT / 1.1);
          target = cfg.speed * cfg.dir * lastStand.mult;
        } else {
          /* Skull Tithe: cơn thịnh nộ — vọt tốc theo chiều đã đóng băng lúc
             ăn gem (đè pattern để flip không cộng dồn thành spike vô lý) */
          const w = wrathActive();
          if (w) target = cfg.speed * w.dir * 1.6;
        }
      }
      const k = 1 - Math.pow(0.82, dt / 16.667);
      disc.w += (target - disc.w) * k;
      prevRot = disc.rot;
      disc.rot += disc.w * dt / 1000;
    }
  }

  /* Last Stand: kích hoạt khi boss còn đúng 1 dao */
  if (state === 'playing' && !tutorial && cfg && cfg.boss && phase === 'aim' &&
      knivesLeft === 1 && !lastStand) {
    lastStand = { t0: timeMs, mult: 1 };
    sLastStand();
  }

  /* Anti-stall Last Stand: rình pha chậm mãi → gai xương mọc dần (max 2).
     Vòng chỉ chạy khi KHÔNG có dao đang bay (không tick oan giữa cú ném). */
  if (lastStand && state === 'playing' && phase === 'aim' && !flying) {
    stallRing += dt / 6000;
    if (stallRing >= 1 && spikesGrown < 2) {
      stallRing = 0;
      stallTries++;          // đổi salt mỗi chu kỳ — vành chật vẫn tìm ra góc mới
      for (let tr = 0; tr < 40; tr++) {
        const a = hash01(stageIdx, 300 + spikesGrown * 40 + stallTries * 97 + tr) * Math.PI * 2;
        const okS = stuck.every(k => angDiff(a, k.a) >= 0.25);
        const okG = gems.every(g => angDiff(a, g.a) >= 0.3);
        if (okS && okG) {
          stuck.push({ a, pre: true, grow0: timeMs });
          spikesGrown++;
          sSpike();
          break;
        }
      }
    }
  }

  /* Omen Flick: 120ms trước khi flip đảo chiều / burst vọt tốc — sigil lóe
     + riser. Cố ý QUÁ NGẮN để phản ứng (dao bay ~120ms): kịch tính chứ
     không phải aim-assist. */
  omenGlow = 0;
  if (state === 'playing' && !tutorial && phase === 'aim' && cfg &&
      !lastStand && !wrathActive()) {
    let dtE = -1, evIdx = -1;
    if (cfg.pattern === 'flip') {
      evIdx = Math.floor(stageT / cfg.flipT) + 1;
      dtE = evIdx * cfg.flipT - stageT;
    } else if (cfg.pattern === 'burst') {
      const pos = stageT % 1.7;
      dtE = pos < 0.95 ? 0.95 - pos : 1.7 - pos + 0.95;
      evIdx = Math.floor((stageT + dtE) / 1.7) * 2 + 1;
    }
    if (dtE >= 0 && dtE <= 0.12) {
      omenGlow = 1 - dtE / 0.12;
      if (omenFiredAt !== evIdx) { omenFiredAt = evIdx; sOmen(); }
    }
  }

  /* Breath an toàn: dao không còn bay mà slow-mo chưa tắt → tắt */
  if (breath && !flying) endBreath();

  /* pha spawn → aim (tutorial: phình xong mới bắt đầu xoay tới mốc F1) */
  if (phase === 'spawn' && timeMs - spawnT0 >= SPAWN_MS) {
    phase = 'aim';
    if (tutorial && tutorial.mode === 'spin') tutStartSpin(tutorial.F[tutorial.fi]);
  }

  /* pha break → stage kế (tutorial thì đứng chờ tutDone) */
  if (phase === 'break' && timeMs - breakT0 >= BREAK_MS && !tutorial && state === 'playing') {
    spawnStage(stageIdx + 1, false);
  }

  /* dao cuối vừa cắm → vỡ totem */
  if (phase === 'aim' && pendingBreakAt && timeMs >= pendingBreakAt) {
    pendingBreakAt = 0;
    breakDisc();
  }

  /* tutorial: khôi phục hint sau "thử lại" · hồi sau demo chết · kết thúc sau tutDone */
  if (tutorial) {
    if (tutorial.retryUntil && timeMs >= tutorial.retryUntil) {
      tutorial.retryUntil = 0;
      // chỉ khôi phục hint khi còn ở pha chờ tap — không đè banner 'done'
      if (tutorial.mode === 'wait' || tutorial.mode === 'free') setTutText(t(tutorial.hintKey || 'tut1'));
    }
    /* sau demo CHẾT (~1.5s) → cho người chơi TỰ phi cú an toàn (vẫn xoay steady) */
    if (tutorial.mode === 'deathWait' && tutorial.deathUntil && timeMs >= tutorial.deathUntil) {
      tutorial.deathUntil = 0;
      tutorial.deathA = undefined;
      tutorial.mode = 'free';
      tutorial.hintKey = 'tutFree';
      setTutText(t('tutFree'));
      $('tut-banner').classList.remove('hidden');   // hiện lại hướng dẫn cho cú tự do
    }
    if (tutorial.mode === 'done' && tutorial.doneUntil && timeMs >= tutorial.doneUntil) {
      finishTutorial();
      return;
    }
  }

  /* dao đang bay — dò chạm vành bằng nội suy sub-frame */
  if (flying && state === 'playing') {
    const prevTip = flying.y - KNIFE_TIP;
    flying.y -= THROW_V * dt;
    const tipY = flying.y - KNIFE_TIP;
    const rimY = disc.y + disc.R;
    if (phase === 'aim' && tipY <= rimY) {
      if (prevTip > rimY) {
        const f = (prevTip - tipY) > 0 ? (prevTip - rimY) / (prevTip - tipY) : 1;
        resolveImpact(prevRot + (disc.rot - prevRot) * f);
      } else {
        // resize/xoay máy giữa lúc dao bay dịch vành qua mũi dao → xử lý ngay
        resolveImpact(disc.rot);
      }
    } else if (flying && flying.y < -KNIFE_LEN) {
      flying = null;                     // phòng vệ — không bao giờ nên xảy ra
    }
  }

  /* vật lý mảnh vỡ / dao văng / dao chết (px/ms, trọng lực nhẹ) */
  const G = 0.0022;
  for (const s of shards) {
    s.x += s.vx * dt; s.y += s.vy * dt; s.vy += G * dt; s.rot += s.vr * dt;
  }
  shards = shards.filter(s => timeMs - s.born < 1100);
  for (const d of debris) {
    d.x += d.vx * dt; d.y += d.vy * dt; d.vy += G * dt; d.rot += d.vr * dt;
  }
  debris = debris.filter(d => d.y < LH + 200 && timeMs - d.born < 2500);
  if (deadKnife) {
    deadKnife.x += deadKnife.vx * dt;
    deadKnife.y += deadKnife.vy * dt;
    deadKnife.vy += G * dt;
    deadKnife.rot += deadKnife.vr * dt;
    if (deadKnife.y > LH + 200) deadKnife = null;
  }

  floatTexts = floatTexts.filter(f => timeMs - f.born < (f.life || 800));
  rings = rings.filter(r => timeMs - r.born < 450);
  sparks = sparks.filter(s => timeMs - s.born < 500);
}

/* ================================================================
 * §11. Render
 * ================================================================ */
function render() {
  ctx.clearRect(0, 0, LW + 2, LH + 2);
  ctx.save();
  if (shakeAmp > 0.3) {
    ctx.translate(Math.sin(timeMs * 0.09) * shakeAmp, Math.cos(timeMs * 0.11) * shakeAmp * 0.7);
  }
  /* kill-cam: nghiêng camera vào điểm va chạm (zoom 1→1.35, đo bằng giờ THẬT) */
  if (killCam) {
    const zp = Math.min(1, (realMs - killCam.zoomStart) / 240);
    const z = 1 + 0.35 * (1 - Math.pow(1 - zp, 3));
    ctx.translate(killCam.x, killCam.y);
    ctx.scale(z, z);
    ctx.translate(-killCam.x, -killCam.y);
  }

  /* mảnh totem vỡ */
  for (const s of shards) {
    const p = (timeMs - s.born) / 1100;
    ctx.save();
    ctx.translate(s.x, s.y);
    ctx.rotate(s.rot);
    ctx.globalAlpha = 1 - p;
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.arc(0, 0, s.R, s.a0, s.a1);
    ctx.closePath();
    ctx.fillStyle = '#101624';
    ctx.fill();
    ctx.strokeStyle = s.col;
    ctx.globalAlpha = (1 - p) * 0.5;
    ctx.lineWidth = 2;
    ctx.stroke();
    ctx.restore();
  }
  ctx.globalAlpha = 1;

  /* dao văng (debris) */
  for (const d of debris) drawKnife(d.spr, d.x, d.y, d.rot, 1, Math.min(1, 2.5 - (timeMs - d.born) / 1000));

  /* totem + dao cắm + ngọc */
  if (cfg && phase !== 'break') {
    let sc = 1;
    if (phase === 'spawn') {                          // phình từ tâm ra (easeOutCubic, mượt, không nảy)
      const sp = Math.min(1, (timeMs - spawnT0) / SPAWN_MS);
      sc = 1 - (1 - sp) * (1 - sp) * (1 - sp);
    }
    const pp = (timeMs - stagePulseT0) / 180;
    if (pp >= 0 && pp < 1) sc *= 1 + 0.03 * Math.sin(pp * Math.PI);   // nhún khi dao cắm

    ctx.save();
    ctx.translate(disc.x, disc.y);
    ctx.scale(sc, sc);
    ctx.rotate(disc.rot);
    const d2 = disc.spriteR * 2;
    ctx.drawImage(disc.sprite, -disc.spriteR, -disc.spriteR, d2, d2);
    ctx.restore();

    /* Omen Flick: vòng accent lóe 120ms trước khi pattern trở mặt */
    if (omenGlow > 0) {
      ctx.beginPath();
      ctx.arc(disc.x, disc.y, (disc.R - 20) * sc, 0, Math.PI * 2);
      ctx.strokeStyle = cfg.accent;
      ctx.globalAlpha = omenGlow * 0.6;
      ctx.lineWidth = 6;
      ctx.stroke();
      ctx.globalAlpha = 1;
    }

    /* Last Stand: telegraph strobe 800ms + vòng anti-stall đỏ dâng dần */
    if (lastStand && state === 'playing') {
      const tele = timeMs - lastStand.t0;
      if (tele < 800) {
        ctx.beginPath();
        ctx.arc(disc.x, disc.y, (disc.R + 8) * sc, 0, Math.PI * 2);
        ctx.strokeStyle = BOSS_ACCENT;
        ctx.globalAlpha = 0.25 + 0.35 * Math.abs(Math.sin(tele * 0.025));
        ctx.lineWidth = 5;
        ctx.stroke();
        ctx.globalAlpha = 1;
      }
      if (stallRing > 0.02 && spikesGrown < 2) {
        ctx.beginPath();
        ctx.arc(disc.x, disc.y, (disc.R + 22) * sc, -Math.PI / 2, -Math.PI / 2 + stallRing * Math.PI * 2);
        ctx.strokeStyle = '#ff3d5a';
        ctx.globalAlpha = 0.5;
        ctx.lineWidth = 3;
        ctx.stroke();
        ctx.globalAlpha = 1;
      }
    }

    for (const gm of gems) drawGemScaled(gm, sc);
    for (const k of stuck) {
      const th = disc.rot + k.a;
      /* gai xương Last Stand mọc dần 600ms (vô hại khi chưa mọc xong) */
      const gk = k.grow0 ? Math.min(1, (timeMs - k.grow0) / 600) : 1;
      const cd = (disc.R - EMBED * gk + KNIFE_TIP * gk) * sc;
      drawKnife(k.pre ? preKnifeSpr : knifeSpr,
        disc.x + Math.cos(th) * cd, disc.y + Math.sin(th) * cd, th - Math.PI / 2, sc * gk, gk < 1 ? 0.4 + 0.6 * gk : 1);
    }

    /* kill-cam: soi dao thủ phạm — sprite đỏ pulse 6Hz + cung cấm ±KNIFE_GAP.
       Nhân cùng sc với dao thật kẻo lệch hình dưới zoom 1.35× */
    if (killCam) {
      const th = disc.rot + killCam.killerA;
      const cd = (disc.R - EMBED + KNIFE_TIP) * sc;
      const pulse = 0.5 + 0.5 * Math.sin(realMs * 0.038);
      drawKnife(redKnifeSpr, disc.x + Math.cos(th) * cd, disc.y + Math.sin(th) * cd, th - Math.PI / 2, sc, 0.45 + 0.55 * pulse);
      ctx.beginPath();
      ctx.arc(disc.x, disc.y, (disc.R + 6) * sc, th - KNIFE_GAP, th + KNIFE_GAP);
      ctx.strokeStyle = '#ff3d5a';
      ctx.globalAlpha = 0.55 + 0.35 * pulse;
      ctx.lineWidth = 5;
      ctx.stroke();
      ctx.globalAlpha = 1;
    }

    /* tutorial demo chết: dao thủ phạm (dao #1) sáng đỏ để người chơi hiểu vì sao chết */
    if (tutorial && tutorial.mode === 'deathWait' && tutorial.deathA !== undefined) {
      const th = disc.rot + tutorial.deathA;
      const cd = (disc.R - EMBED + KNIFE_TIP) * sc;
      const pulse = 0.5 + 0.5 * Math.sin(timeMs * 0.02);
      drawKnife(redKnifeSpr, disc.x + Math.cos(th) * cd, disc.y + Math.sin(th) * cd, th - Math.PI / 2, sc, 0.5 + 0.5 * pulse);
    }

  }

  /* Echo Wraith: bóng vọng của run best lảng vảng đúng stage nó đã gục.
     Vẽ NGOÀI guard phase!=='break' — dao cuối vừa phá echo vừa phá totem
     thì màn tan biến vẫn phải chạy trọn qua lúc totem vỡ */
  if (cfg && (echoLive || echoDissolveT0) && state === 'playing' && !tutorial) {
    const dis = echoDissolveT0 ? Math.min(1, (timeMs - echoDissolveT0) / 600) : 0;
    if (dis >= 1) { echoDissolveT0 = 0; }
    else {
      const bob = Math.sin(timeMs * 0.003) * 8;
      const wx = disc.x + disc.R + 40;
      const wy = disc.y - disc.R * 0.35 + bob - dis * 60;
      const al = (0.22 + 0.12 * Math.sin(timeMs * 0.005)) * (1 - dis);
      ctx.save();
      ctx.translate(wx, wy);
      ctx.scale(0.5, 0.5);
      ctx.translate(-50, -50);
      if (!echoSigPath) echoSigPath = new Path2D(SIGIL_D[5]);   // cache — không alloc mỗi frame
      const sig = echoSigPath;
      ctx.lineCap = 'round'; ctx.lineJoin = 'round';
      ctx.strokeStyle = '#b88cff';                              // FLAT: 1 nét (al lo phần mờ ảo), bỏ lõi trắng
      ctx.globalAlpha = al;
      ctx.lineWidth = 5;
      ctx.stroke(sig);
      ctx.restore();
      ctx.globalAlpha = 1;
    }
  }

  /* dao chết văng xoay */
  if (deadKnife) drawKnife(knifeSpr, deadKnife.x, deadKnife.y, deadKnife.rot, 1, 1);

  /* dao đang bay / dao chờ + đạn còn lại */
  if (state === 'playing') {
    /* tutorial: dao chờ HIỆN SUỐT mọi pha (kể cả lúc xoay/phình); cue "CHẠM!" chỉ
       hiện khi thật sự tới lượt tap (wait/death/free) để không mời tap lúc đang xoay */
    const idleShown = tutorial ? true : (knivesLeft > 0);
    const canThrow = tutorial && (tutorial.mode === 'wait' || tutorial.mode === 'death' || tutorial.mode === 'free');
    if (flying) {
      drawKnife(knifeSpr, LW / 2, flying.y, 0, 1, 1);
    } else if ((phase === 'aim' || (tutorial && phase === 'spawn')) && idleShown && !paused) {
      const bob = Math.sin(timeMs * 0.004) * 6;
      drawKnife(knifeSpr, LW / 2, knifeIdleY + bob, 0, 1, 1);
      if (canThrow) {
        ctx.textAlign = 'center';
        ctx.globalAlpha = 0.55 + 0.45 * Math.sin(timeMs * 0.008);
        ctx.fillStyle = '#fff';
        ctx.font = '800 30px ' + CANVAS_FONT_STACK;
        ctx.fillText(t('tapCue'), LW / 2 + 96, knifeIdleY + 8);
        ctx.globalAlpha = 1;
      }
    }
    drawPips();
  }

  drawFx();
  ctx.restore();

  /* Executioner's Breath: màn tối nhẹ khi thế giới nín thở */
  if (timeScale < 0.95 && breath) {
    ctx.fillStyle = 'rgba(3,6,14,' + ((1 - timeScale) * 0.3).toFixed(3) + ')';
    ctx.fillRect(0, 0, LW, LH);
  }

  /* Skull Tithe: vignette đỏ dâng dần 400ms trước cơn thịnh nộ */
  const wt = (state === 'playing' && !paused) ? wrathTele() : 0;
  if (wt > 0) {
    ctx.fillStyle = 'rgba(255,60,60,' + (wt * 0.1).toFixed(3) + ')';
    ctx.fillRect(0, 0, LW, LH);
  }

  /* flash đỏ khi chết */
  if (flash > 0) {
    ctx.fillStyle = 'rgba(255,45,80,' + (flash * 0.3).toFixed(3) + ')';
    ctx.fillRect(0, 0, LW, LH);
  }

  /* kill-cam: "hụt N°" — vẽ screen-space cho nét (không dính zoom/slow-mo) */
  if (killCam) {
    const ka = Math.min(1, (realMs - killCam.zoomStart) / 160);
    ctx.textAlign = 'center';
    ctx.font = '800 30px ' + CANVAS_FONT_STACK;
    ctx.globalAlpha = ka;
    ctx.strokeStyle = 'rgba(5,10,20,.85)';
    ctx.lineWidth = 5;
    const txt = t('missedBy').replace('{n}', killCam.missDeg);
    ctx.strokeText(txt, LW / 2, disc.y + disc.R + 78);
    ctx.fillStyle = '#ff6b81';
    ctx.fillText(txt, LW / 2, disc.y + disc.R + 78);
    ctx.globalAlpha = 1;
  }

  /* màn mờ khi pause */
  if (paused && state === 'playing') {
    ctx.fillStyle = 'rgba(6,10,20,.5)';
    ctx.fillRect(0, 0, LW, LH);
    ctx.textAlign = 'center';
    ctx.fillStyle = '#fff';
    ctx.font = '700 32px ' + CANVAS_FONT_STACK;
    ctx.fillText(t('tapToResume'), LW / 2, LH / 2);
  }
}

/** Ngọc hồn có scale spawn (bám theo totem đang phóng to). */
function drawGemScaled(gm, sc) {
  if (sc === 1) { drawGem(gm); return; }
  ctx.save();
  ctx.translate(disc.x, disc.y);
  ctx.scale(sc, sc);
  ctx.translate(-disc.x, -disc.y);
  drawGem(gm);
  ctx.restore();
}

/** Cột dao còn lại (đạn) — mờ dần khi đã dùng. */
function drawPips() {
  if (!cfg || tutorial) return;          // tutorial không đếm đạn
  const total = Math.min(cfg.knives, 12);
  const x = Math.max(28, LW / 2 - 320);
  const y0 = LH - 64;
  for (let i = 0; i < total; i++) {
    drawKnife(knifeSpr, x, y0 - i * 30, 0, 0.3, i < knivesLeft ? 0.95 : 0.16);
  }
}

function drawFx() {
  const now = timeMs;
  for (const r of rings) {
    const p = (now - r.born) / 450;
    if (p >= 1) continue;
    ctx.globalAlpha = 1 - p;
    ctx.strokeStyle = r.col || '#fff';
    ctx.lineWidth = 4 * (1 - p);
    ctx.beginPath();
    ctx.arc(r.x, r.y, 22 + p * 70, 0, Math.PI * 2);
    ctx.stroke();
  }
  for (const s of sparks) {
    const p = (now - s.born) / 500;
    if (p >= 1) continue;
    ctx.globalAlpha = 1 - p;
    ctx.fillStyle = '#b8ffd9';
    ctx.save();
    ctx.translate(s.x + Math.sin(s.born + s.x) * p * 26, s.y - p * 34);
    ctx.rotate(p * 1.5);
    const r2 = 7 * (1 - p * 0.5);
    ctx.fillRect(-r2, -1.4, r2 * 2, 2.8);
    ctx.fillRect(-1.4, -r2, 2.8, r2 * 2);
    ctx.restore();
  }
  ctx.textAlign = 'center';
  for (const f of floatTexts) {
    const p = (now - f.born) / (f.life || 800);
    if (p >= 1) continue;
    ctx.globalAlpha = 1 - p;
    ctx.font = '800 ' + (f.size || 30) + 'px ' + CANVAS_FONT_STACK;
    ctx.fillStyle = f.color || '#fff';
    ctx.strokeStyle = 'rgba(5,10,20,.8)';
    ctx.lineWidth = 5;
    const y = f.y - p * 46;
    ctx.strokeText(f.text, f.x, y);
    ctx.fillText(f.text, f.x, y);
  }
  ctx.globalAlpha = 1;
}

/* ================================================================
 * §12. Vòng lặp chính — timeMs đóng băng khi pause (như hamster-jump)
 * ================================================================ */
function loop(ts) {
  if (!lastTs) lastTs = ts;
  let rawDt = ts - lastTs;
  lastTs = ts;
  if (rawDt > 100) rawDt = 100;          // tab ngủ / khựng dài → kẹp lại
  if (rawDt < 0) rawDt = 0;
  realMs += rawDt;                       // đồng hồ THẬT — kill-cam/breath đo bằng cái này

  /* timeScale: kill-cam snap 8%; breath lịm về 35% trong ~60ms; hết → về 1.
     Nhân vào dt ở MỘT chỗ duy nhất — totem, dao, timer, particle cùng chậm
     đồng bộ (slow-mo thuần kịch tính, KHÔNG đổi kết quả cú ném). */
  if (killCam) {
    if (realMs >= killCam.until) { killCam = null; timeScale = 1; }
    else timeScale = 0.08;
  } else {
    const targetTs = breath ? 0.35 : 1;
    timeScale += (targetTs - timeScale) * Math.min(1, rawDt / 60);
    if (Math.abs(timeScale - targetTs) < 0.01) timeScale = targetTs;
  }
  const dt = rawDt * timeScale;

  if (!paused) timeMs += dt;
  stepBg(dt);
  update(dt);
  render();
  requestAnimationFrame(loop);
}

/* ================================================================
 * §13. HUD + popup + menu + info
 * ================================================================ */
function updateScoreHud() { $('hud-score').textContent = String(score); }
function updateBestHud()  { $('hud-best').textContent = String(best); }

/* Không còn nhãn "Stage" LẪN "BOSS" — dòng này ẩn hẳn (totem TRÙM tự phân biệt
   bằng sigil sọ đỏ + ngọc-sọ + âm báo, không cần chữ). */
function updateStageHud() {
  const el = $('hud-stage');
  el.textContent = '';
  el.classList.remove('boss');
  el.style.display = 'none';
}

/* Tự co cỡ điểm cho vừa card khi điểm ≥ 6 chữ số (popup-common §5b) */
function fitScores() {
  var r = document.querySelector('.sb');
  if (!r) return;
  var card = r.closest('.card');
  var vals = r.querySelectorAll('.v');
  vals.forEach(function (v) { v.style.fontSize = ''; });
  var pad = parseFloat(getComputedStyle(card).paddingLeft) || 26;
  var max = card.clientWidth - 2 * pad;
  var fz = parseFloat(getComputedStyle(vals[0]).fontSize) || 32;
  while (r.scrollWidth > max && fz > 14) {
    fz -= 1;
    vals.forEach(function (v) { v.style.fontSize = fz + 'px'; });
  }
}

/** Áp toàn bộ label theo ngôn ngữ (gọi 1 lần lúc boot). */
function updateLabels() {
  $('hud-score-label').textContent = t('score');
  $('hud-best-label').textContent = t('best');
  $('ov-lbl-score').textContent = t('score');
  $('ov-lbl-best').textContent = t('best');
  $('ov-btn-text').textContent = t('playAgain');
  $('tut-skip-text').textContent = t('skip');
  $('back-btn').setAttribute('aria-label', t('back'));
  $('sound-btn').setAttribute('aria-label', t('sound'));
  updateStageHud();
}

/* ================================================================
 * §14. Input
 * ================================================================ */
function onTap() {
  if (killCam) { killCam = null; timeScale = 1; return; }  // tap skip kill-cam ngay
  if (state !== 'playing') return;
  if (paused) { paused = false; audioUnlock(); return; }   // tap đầu chỉ resume
  if (phase !== 'aim' || flying) return;
  if (tutorial) {
    // nhận tap ở: wait (phóng 3 dao) · death (phi vào dao #1 = chết) · free (tự phi)
    const m = tutorial.mode;
    if (m !== 'wait' && m !== 'death' && m !== 'free') return;
  } else if (knivesLeft <= 0) {
    return;
  }
  flying = { y: knifeIdleY };
  /* Executioner's Breath: dao CUỐI trên vành đông (≥6 dao) → thế giới nín
     thở. Kích hoạt SAU khi đã ném — số phận cú ném không đổi, chỉ kịch tính. */
  if (!tutorial && knivesLeft === 1 && stuck.length >= 6) {
    breath = true;
    sBreath();
    if (bgmLp && audioCtx) {
      try { bgmLp.frequency.setTargetAtTime(400, audioCtx.currentTime, 0.05); } catch (e) {}
    }
  }
  sThrow();
}

canvas.addEventListener('pointerdown', function (e) { e.preventDefault(); onTap(); });

window.addEventListener('keydown', function (e) {
  if (e.code !== 'Space' && e.code !== 'Enter') return;
  if (state === 'over') return;                     // để nút Play Again nhận phím
  if (e.target && e.target.closest && e.target.closest('.btn3d')) return;
  e.preventDefault();
  onTap();
});

/** Nút bấm: click + Enter/Space, chặn lan xuống canvas. */
function onBtn(id, fn) {
  const el = $(id);
  el.addEventListener('click', e => { e.stopPropagation(); fn(); });
  el.addEventListener('keydown', e => {
    if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); e.stopPropagation(); fn(); }
  });
}

/* Overlay ẩn bằng opacity nên nút vẫn giữ focus bàn phím → mọi handler
   phải tự guard theo state, kẻo Space/Enter giữa trận kích nút vô hình. */
onBtn('back-btn', () => { sButton(); sendMessage('quit'); });
onBtn('sound-btn', () => { setMuted(!muted); sButton(); });
onBtn('tut-skip', () => { if (!tutorial) return; sButton(); finishTutorial(); });
$('ov-btn').addEventListener('click', function (e) {
  e.stopPropagation();
  if (state !== 'over') return;
  sButton();
  sendMessage('retry_level');            // game tự xử lý chơi lại (game-common §1.3)
  newRun();
});

/* ================================================================
 * §15. Native callbacks (game-common §1.3) + boot
 * ================================================================ */
window.onAppPause = function () {
  if (state === 'playing' && !paused) {
    paused = true;
    if (audioCtx && audioCtx.state === 'running') audioCtx.suspend().catch(() => {});
  } else if (audioCtx && audioCtx.state === 'running') {
    audioCtx.suspend().catch(() => {});
  }
};
window.onNextLevel = function () { /* game không level — no-op */ };
window.onRetryLevel = function () {
  if (state === 'over' || state === 'playing') newRun();
};

/* app chuyển nền khi chạy trong browser thường → cũng pause */
document.addEventListener('visibilitychange', function () {
  if (document.hidden) window.onAppPause();
});

function boot() {
  LANG = getLanguage();
  applyUiFont(LANG);
  document.documentElement.lang = LANG;

  /* ?reset=1 — xoá save khi playtest (native không bao giờ gửi).
     Phải bỏ qua cả window.data/?data= cũ, kẻo loadSaved merge lại best cũ. */
  const didReset = new URLSearchParams(window.location.search).get('reset') === '1';
  if (didReset) {
    try { localStorage.removeItem(LS_KEY); } catch (e) {}
    saveData({ best: 0, tut: 0, muted: 0, deep: -1, eS: -1, eK: -1 });
  }

  const sv = loadSaved(didReset);
  best = sv.best;
  tutSeen = !!sv.tut;
  if (sv.mutedSet) muted = !!sv.muted;
  deep = sv.deep;
  echoS = sv.eS;
  echoK = sv.eK;
  $('sound-btn').classList.toggle('muted', muted);

  buildKnifeSprites();
  resize();
  updateLabels();
  updateScoreHud();
  updateBestHud();
  requestAnimationFrame(loop);
  /* Không còn menu: lần đầu chơi → tutorial; các lần sau vào thẳng ván */
  if (!tutSeen) startTutorial();
  else newRun();
}

/* Đợi native inject (chống race) — fallback 200ms (game-common §3) */
(function waitForNativeInjection() {
  const start = Date.now();
  (function check() {
    const injected = typeof window.language === 'string' || typeof window.data === 'string';
    if (injected || Date.now() - start > 200) {
      boot();
    } else {
      setTimeout(check, 10);
    }
  })();
})();
</script>
