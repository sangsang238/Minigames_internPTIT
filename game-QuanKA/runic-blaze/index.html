<!--
  Runic Blaze — QuanKA
  Match-3 swap game, dark-fantasy rune theme. Single-file HTML (CSS + JS inline).
  Board: 7×7 | Runes: 5–6 màu theo level | Win: đạt score goal trong số moves cho phép
  LEVEL VÔ HẠN — levelConfig(idx) sinh deterministic, không có level cuối (không bắn victory)
  Specials: Match-4 → Blaze Rune (nổ nguyên hàng/cột) · L/T → Nova Rune (nổ 3×3, nổ 2 lần)
            Match-5 → Prism Rune (đốt toàn bộ 1 màu) · swap 2 special → combo riêng
  Engine: single rAF loop + tween engine dt-based (mượt ở mọi refresh rate 60/90/120/144Hz)
  Tuân thủ .claude/game-common.md (bridge, level, i18n 23 ngôn ngữ), popup-common.md, zip-common.md.
-->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<title>Runic Blaze</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Google+Sans+Flex:opsz,wght@6..144,1..1000&display=swap" rel="stylesheet" />
<style>
/* ── Reset + mobile tap fixes (game-common §UI) ───────────────── */
*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  -webkit-tap-highlight-color: transparent;
  -webkit-touch-callout: none;
}

:root {
  --ui-font: 'Google Sans Flex', system-ui, sans-serif;
  /* Background palette — deep purple-black nebula */
  --bg-a: #090614;
  --bg-b: #180b2e;
  --bg-c: #0e0822;
  /* Glass panels */
  --glass: rgba(255,255,255,0.06);
  --glass-border: rgba(255,255,255,0.11);
  /* Text */
  --text: #eddeff;
  --text-soft: rgba(237,222,255,0.5);
  /* Rune colors (0 flame, 1 droplet, 2 leaf, 3 bolt, 4 moon, 5 star) */
  --c0: #ff3d5a;
  --c1: #2f7bff;
  --c2: #2dff8a;
  --c3: #ffb830;
  --c4: #c060ff;
  --c5: #7fefff;
  --sat: env(safe-area-inset-top, 0px);
}

html, body { height: 100%; overflow: hidden; }

body {
  font-family: var(--ui-font);
  font-weight: 700;
  color: var(--text);
  background:
    radial-gradient(ellipse 80% 50% at 50% -10%, rgba(100,40,180,.4), transparent),
    linear-gradient(170deg, var(--bg-a) 0%, var(--bg-b) 55%, var(--bg-c) 100%);
  -webkit-user-select: none;
  user-select: none;
  touch-action: none;
}

/* Tiếng Ả Rập: chữ nối liền — bỏ letter-spacing ở MỌI phần tử để không vỡ chữ */
body.lang-ar, body.lang-ar * { letter-spacing: 0 !important; }

/* ── Canvases: nền sao/ember (z0) + FX particles (z60, trên board dưới overlay) ── */
#bg-canvas { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
#fx-canvas { position: fixed; inset: 0; z-index: 60; pointer-events: none; }

/* ── App wrapper ───────────────────────────────────────────────── */
#app {
  position: relative;
  z-index: 1;
  width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* ── Topbar: [Back, ?] — title — [Sound, Home, Restart] ───────── */
#topbar {
  width: 100%;
  max-width: 520px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 6px;
  padding: 0 max(10px, env(safe-area-inset-right)) 0 max(10px, env(safe-area-inset-left));
  /* padding-top do JS bơm = max(statusBarHeight, env-safe) + 8 */
}

#topbar-left, #topbar-right {
  display: flex;
  align-items: center;
  gap: 6px;
  flex-shrink: 0;
}

#hud-center {
  flex: 1;
  min-width: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  line-height: 1.15;
  gap: 1px;
}

#game-title {
  font-size: 10px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--text-soft);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 100%;
}

#level-num {
  font-size: 18px;
  letter-spacing: .5px;
  color: var(--text);
  white-space: nowrap;
}

/* ── Mid section: HUD strip + board (đổi trục khi landscape) ──── */
#mid {
  flex: 1;
  width: 100%;
  min-height: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* ── Score strip ───────────────────────────────────────────────── */
#score-strip {
  width: 100%;
  max-width: 520px;
  padding: 6px 14px 0;
  display: flex;
  align-items: center;
  gap: 10px;
}

.hud-chip {
  background: var(--glass);
  border: 1px solid var(--glass-border);
  border-radius: 12px;
  padding: 4px 12px;
  display: flex;
  flex-direction: column;
  align-items: center;
  min-width: 56px;
}

.hud-chip .lbl {
  font-size: 9px;
  letter-spacing: 1.8px;
  text-transform: uppercase;
  color: var(--text-soft);
  white-space: nowrap;
}

.hud-chip .val {
  font-size: 17px;
  color: var(--text);
  line-height: 1.2;
  white-space: nowrap;
}

#progress-wrap {
  flex: 1;
  min-width: 0;
  display: flex;
  flex-direction: column;
  gap: 3px;
}

#progress-labels {
  display: flex;
  justify-content: space-between;
  font-size: 10px;
  color: var(--text-soft);
  padding: 0 1px;
}

#progress-bar-bg {
  position: relative;
  height: 10px;
  background: rgba(255,255,255,.08);
  border-radius: 5px;
  overflow: hidden;
  border: 1px solid rgba(255,255,255,.1);
}

#progress-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, #8040ff, #ff3d5a, #ffb830);
  background-size: 200% 100%;
  border-radius: 5px;
  width: 0%;
  transition: width .45s cubic-bezier(.22,1,.36,1);
  animation: barShimmer 2.5s linear infinite;
}

@keyframes barShimmer {
  0%   { background-position: 100% 0; }
  100% { background-position: -100% 0; }
}

/* nhấp nháy khi gần đạt goal */
#progress-bar-fill.near-goal { animation: barShimmer 1s linear infinite; }

/* ── Board ─────────────────────────────────────────────────────── */
#board-outer {
  flex: 1;
  min-height: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  width: 100%;
  padding: 8px;
}

#board-wrap {
  position: relative;
  border-radius: 14px;
  background: rgba(255,255,255,.025);
  border: 1px solid rgba(255,255,255,.07);
  box-shadow: 0 8px 40px rgba(0,0,0,.5), inset 0 1px 0 rgba(255,255,255,.06);
  padding: 4px;
  will-change: transform;
}

/* vòng tròn rune mờ xoay chậm phía sau board */
#board-wrap::before {
  content: '';
  position: absolute;
  inset: -14%;
  border-radius: 50%;
  border: 2px dashed rgba(160,90,255,.10);
  animation: runeRing 60s linear infinite;
  pointer-events: none;
}

@keyframes runeRing {
  from { transform: rotate(0deg); }
  to   { transform: rotate(360deg); }
}

#grid-bg {
  position: absolute;
  inset: 4px;
  display: grid;
  pointer-events: none;
  z-index: 0;
}

.slot {
  border-radius: 7px;
  background: rgba(255,255,255,.03);
  border: 1px solid rgba(255,255,255,.06);
  margin: 2px;
}

#board {
  position: relative;
  z-index: 1;
  overflow: hidden;   /* clip tile refill rơi từ phía trên board */
}

/* ── Tiles ─────────────────────────────────────────────────────── */
.tile {
  position: absolute;
  border-radius: 10px;
  cursor: pointer;
  will-change: transform;
  -webkit-user-select: none;
  user-select: none;
}

.tile-inner {
  width: 100%;
  height: 100%;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
}

.tile-inner::after {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 45%;
  border-radius: 10px 10px 50% 50%;
  background: linear-gradient(180deg, rgba(255,255,255,.18), transparent);
  pointer-events: none;
}

.tile-inner svg {
  width: 72%;
  height: 72%;
  flex-shrink: 0;
  position: relative;
  z-index: 1;
  filter: drop-shadow(0 1px 3px rgba(0,0,0,.45));
}

/* Nền kính neon theo màu rune */
.tile-0 .tile-inner { background: linear-gradient(145deg,#3d0a12,#220610); border:1.5px solid rgba(255,61,90,.55);  box-shadow: 0 0 12px rgba(255,61,90,.28),  inset 0 0 10px rgba(255,61,90,.12); }
.tile-1 .tile-inner { background: linear-gradient(145deg,#0a1a3d,#060d22); border:1.5px solid rgba(47,123,255,.58); box-shadow: 0 0 12px rgba(47,123,255,.28), inset 0 0 10px rgba(47,123,255,.12); }
.tile-2 .tile-inner { background: linear-gradient(145deg,#0a2d1a,#051a0e); border:1.5px solid rgba(45,255,138,.55); box-shadow: 0 0 12px rgba(45,255,138,.28), inset 0 0 10px rgba(45,255,138,.12); }
.tile-3 .tile-inner { background: linear-gradient(145deg,#2d1e06,#1a1103); border:1.5px solid rgba(255,184,48,.55); box-shadow: 0 0 12px rgba(255,184,48,.28), inset 0 0 10px rgba(255,184,48,.12); }
.tile-4 .tile-inner { background: linear-gradient(145deg,#200a3d,#100420); border:1.5px solid rgba(192,96,255,.55); box-shadow: 0 0 12px rgba(192,96,255,.28), inset 0 0 10px rgba(192,96,255,.12); }
.tile-5 .tile-inner { background: linear-gradient(145deg,#053039,#02171e); border:1.5px solid rgba(127,239,255,.62); box-shadow: 0 0 13px rgba(127,239,255,.32), inset 0 0 10px rgba(127,239,255,.15); }
/* Prism — tinh thể ám tím, viền ánh bạc-tím */
.tile-p .tile-inner {
  background: linear-gradient(145deg,#1b1430,#0b0718);
  border: 1.5px solid rgba(216,180,255,.65);
  box-shadow: 0 0 16px rgba(190,140,255,.35), inset 0 0 12px rgba(190,140,255,.14);
}

/* Special: glow thở */
@keyframes specialBreath {
  0%, 100% { filter: brightness(1); }
  50%       { filter: brightness(1.35); }
}
.tile.kind-stripeH .tile-inner, .tile.kind-stripeV .tile-inner,
.tile.kind-nova .tile-inner, .tile.kind-prism .tile-inner {
  animation: specialBreath 1.6s ease-in-out infinite;
}
/* mũi tên stripe chạy shimmer */
@keyframes stripeSlide {
  0%   { opacity: .55; }
  50%  { opacity: 1; }
  100% { opacity: .55; }
}
.tile .stripe-arrows { animation: stripeSlide 1.1s ease-in-out infinite; }
/* lõi prism quay */
@keyframes prismSpin {
  from { transform: rotate(0deg); }
  to   { transform: rotate(360deg); }
}
.tile.kind-prism svg .prism-core { transform-origin: 50px 50px; animation: prismSpin 5s linear infinite; }
/* vòng nova phập phồng */
@keyframes novaPulse {
  0%, 100% { transform: scale(1);    opacity: .85; }
  50%       { transform: scale(1.12); opacity: 1; }
}
.tile.kind-nova svg .nova-ring { transform-origin: 50px 50px; animation: novaPulse 1.2s ease-in-out infinite; }

/* Selected state */
.tile.selected { z-index: 6; }
.tile.selected .tile-inner {
  transform: scale(1.1);
  border-width: 2px !important;
  animation: runeSelectedPulse 1s ease-in-out infinite;
}
@keyframes runeSelectedPulse {
  0%, 100% { filter: brightness(1.35); }
  50%       { filter: brightness(1.05); }
}
.tile-0.selected .tile-inner { box-shadow: 0 0 0 2px rgba(255,61,90,.85),  0 0 24px rgba(255,61,90,.6); }
.tile-1.selected .tile-inner { box-shadow: 0 0 0 2px rgba(47,123,255,.85), 0 0 24px rgba(47,123,255,.6); }
.tile-2.selected .tile-inner { box-shadow: 0 0 0 2px rgba(45,255,138,.85), 0 0 24px rgba(45,255,138,.6); }
.tile-3.selected .tile-inner { box-shadow: 0 0 0 2px rgba(255,184,48,.85), 0 0 24px rgba(255,184,48,.6); }
.tile-4.selected .tile-inner { box-shadow: 0 0 0 2px rgba(192,96,255,.85), 0 0 24px rgba(192,96,255,.6); }
.tile-5.selected .tile-inner { box-shadow: 0 0 0 2px rgba(127,239,255,.85), 0 0 24px rgba(127,239,255,.6); }
.tile-p.selected .tile-inner { box-shadow: 0 0 0 2px rgba(255,255,255,.9), 0 0 26px rgba(255,255,255,.65); }

/* Hint pulse — gợi ý nước đi */
@keyframes hintPulse {
  0%, 100% { box-shadow: 0 0 0 0 rgba(255,240,120,0); }
  50%       { box-shadow: 0 0 0 4px rgba(255,240,120,.55), 0 0 22px rgba(255,220,80,.5); }
}
.tile.hint .tile-inner { animation: hintPulse 1.4s ease-in-out infinite; }

/* Shake (swap không hợp lệ) — dùng margin-left để không đè transform vị trí */
@keyframes tileShake {
  0%, 100% { margin-left: 0; }
  20%  { margin-left: -6px; }
  40%  { margin-left: 6px; }
  60%  { margin-left: -4px; }
  80%  { margin-left: 4px; }
}
.tile.shake .tile-inner { animation: tileShake .24s ease-in-out; }

/* Shuffle spin */
@keyframes tileSpin {
  0%   { transform: scale(1) rotate(0deg); }
  45%  { transform: scale(.45) rotate(-24deg); }
  75%  { transform: scale(1.1) rotate(8deg); }
  100% { transform: scale(1) rotate(0deg); }
}
.tile.spin .tile-inner { animation: tileSpin .5s ease-in-out; }

/* ── Score fly-up text ─────────────────────────────────────────── */
.score-fly {
  position: fixed;
  pointer-events: none;
  font-family: var(--ui-font);
  font-weight: 800;
  font-size: 15px;
  color: #fff;
  text-shadow: 0 0 10px rgba(255,200,80,1), 0 2px 4px rgba(0,0,0,.6);
  z-index: 200;
  white-space: nowrap;
  animation: scoreFlyUp .9s ease-out forwards;
}

@keyframes scoreFlyUp {
  0%   { opacity: 1; transform: translate(-50%,-50%) scale(1); }
  20%  { opacity: 1; transform: translate(-50%,-80%) scale(1.2); }
  100% { opacity: 0; transform: translate(-50%,-150%) scale(.9); }
}

/* ── Combo badge + chữ khen ────────────────────────────────────── */
#combo-badge {
  position: fixed;
  top: 42%;
  left: 50%;
  transform: translate(-50%, -50%);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
  pointer-events: none;
  z-index: 100;
  opacity: 0;
}
#combo-praise {
  font-size: 26px;
  font-weight: 800;
  letter-spacing: 1px;
  text-shadow: 0 0 26px rgba(255,240,80,.9), 0 2px 6px rgba(0,0,0,.7);
}
#combo-mult {
  font-size: 15px;
  letter-spacing: 2px;
  color: #ffe9b0;
  text-shadow: 0 0 14px rgba(255,180,40,.8);
}
@keyframes cascadePop {
  0%   { opacity: 0; transform: translate(-50%,-50%) scale(.4); }
  25%  { opacity: 1; transform: translate(-50%,-50%) scale(1.22); }
  60%  { opacity: 1; transform: translate(-50%,-52%) scale(1); }
  100% { opacity: 0; transform: translate(-50%,-64%) scale(.9); }
}
#combo-badge.cascade-anim { animation: cascadePop .8s ease-out forwards; }

/* ── Toast (shuffle / thông báo) ───────────────────────────────── */
#toast {
  position: fixed;
  top: 24%;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(20,10,40,.92);
  border: 1px solid rgba(200,140,255,.35);
  color: #fff;
  border-radius: 14px;
  padding: 10px 20px;
  font-size: 15px;
  z-index: 240;
  opacity: 0;
  pointer-events: none;
  transition: opacity .25s;
  white-space: nowrap;
  max-width: 90vw;
  overflow: hidden;
  text-overflow: ellipsis;
}
#toast.show { opacity: 1; }

/* ── Level intro banner ────────────────────────────────────────── */
#level-intro {
  position: fixed;
  top: 40%;
  left: 50%;
  transform: translate(-50%,-50%);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  z-index: 210;
  pointer-events: none;
  opacity: 0;
}
#li-level {
  font-size: 34px;
  font-weight: 800;
  letter-spacing: 2px;
  background: linear-gradient(180deg, #fff, #ffd9a0);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  text-shadow: 0 0 30px rgba(255,170,60,.45);
}
#li-goal {
  font-size: 14px;
  color: var(--text-soft);
  letter-spacing: 1px;
}
@keyframes introPop {
  0%   { opacity: 0; transform: translate(-50%,-50%) scale(.6); }
  18%  { opacity: 1; transform: translate(-50%,-50%) scale(1.06); }
  30%  { transform: translate(-50%,-50%) scale(1); }
  78%  { opacity: 1; transform: translate(-50%,-50%) scale(1); }
  100% { opacity: 0; transform: translate(-50%,-56%) scale(.94); }
}
#level-intro.show { animation: introPop 1.5s ease-out forwards; }

/* Banner Level Clear / thua */
#result-banner {
  position: fixed;
  top: 40%;
  left: 50%;
  transform: translate(-50%,-50%);
  z-index: 220;
  pointer-events: none;
  opacity: 0;
  font-size: 30px;
  font-weight: 800;
  letter-spacing: 1.5px;
  text-align: center;
  color: #fff;
  text-shadow: 0 0 34px rgba(255,200,60,.9), 0 2px 8px rgba(0,0,0,.8);
  white-space: nowrap;
}
#result-banner.lose { text-shadow: 0 0 30px rgba(160,60,255,.8), 0 2px 8px rgba(0,0,0,.8); }
@keyframes resultPop {
  0%   { opacity: 0; transform: translate(-50%,-50%) scale(.5); }
  20%  { opacity: 1; transform: translate(-50%,-50%) scale(1.15); }
  38%  { transform: translate(-50%,-50%) scale(1); }
  100% { opacity: 1; transform: translate(-50%,-50%) scale(1); }
}
#result-banner.show { animation: resultPop .9s ease-out forwards; }

/* ── btn3d (game-common §1.4 / popup-common §6 — bản kính phẳng) ── */
.btn3d {
  --radius: 12px;
  --surface-color: rgba(255,255,255,.08);
  --surface-text: var(--text);
  --surface-height: 42px;
  --surface-width: auto;
  --surface-padding-x: 16px;
  --surface-font-size: 18px;
  position: relative;
  display: inline-block;
  padding: 0;
  border: 0;
  background: transparent;
  cursor: pointer;
  font: inherit;
  color: inherit;
  -webkit-user-select: none;
  user-select: none;
}

.btn3d-shadow { display: none; }

.btn3d-surface {
  position: relative;
  z-index: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  height: var(--surface-height);
  width: var(--surface-width);
  padding: 0 var(--surface-padding-x);
  border-radius: var(--radius);
  background: var(--surface-color);
  border: 1px solid var(--glass-border);
  color: var(--surface-text);
  font-family: var(--ui-font);
  font-size: var(--surface-font-size);
  font-weight: 700;
  letter-spacing: .5px;
  transition: transform .09s ease-out, background .1s;
}

.btn3d:active { transform: scale(.94); }
.btn3d:active .btn3d-surface { background: rgba(255,255,255,.14); }

.btn3d.btn-icon {
  --surface-height: 42px;
  --surface-width: 42px;
  --surface-padding-x: 0;
}

/* CTA amber (Play) — theo popup-common §6 */
.btn3d.cta {
  --surface-height: 54px;
  --surface-padding-x: 44px;
  --surface-color: #ffb02e;
  --surface-text: #3a2400;
  --surface-font-size: 19px;
  --radius: 16px;
}
.btn3d.cta .btn3d-surface { border: none; box-shadow: 0 6px 22px rgba(255,150,30,.35); }
.btn3d.cta:active .btn3d-surface { background: var(--surface-color); }

/* nút mini (Skip trong tutorial) */
.btn3d.mini {
  --surface-height: 30px;
  --surface-padding-x: 12px;
  --surface-font-size: 13px;
  --radius: 9px;
}

.back-ico    { width: 52%; height: 52%; fill: currentColor; display: block; }
.restart-ico { width: 62%; height: 62%; fill: currentColor; display: block; }
.home-ico    { width: 58%; height: 58%; fill: currentColor; display: block; }
.help-ico    { width: 58%; height: 58%; fill: currentColor; display: block; }
.sound-ico   { width: 58%; height: 58%; fill: currentColor; display: block; }
.ico-diamond { width: 58%; height: 58%; display: block; color: currentColor; }
#sound-btn .ico-off { display: none; }
#sound-btn.muted .ico-on  { display: none; }
#sound-btn.muted .ico-off { display: block; }
#menu-sound .ico-off { display: none; }
#menu-sound.muted .ico-on  { display: none; }
#menu-sound.muted .ico-off { display: block; }

/* ── Moves danger flash ────────────────────────────────────────── */
@keyframes dangerPulse {
  0%, 100% { color: #ff3d5a; }
  50%       { color: #ff8080; }
}
.moves-danger { animation: dangerPulse .6s ease-in-out infinite; }

/* ── Menu screen ───────────────────────────────────────────────── */
#menu-screen {
  position: fixed;
  inset: 0;
  z-index: 260;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 14px;
  overflow: auto;
  background:
    radial-gradient(ellipse 90% 55% at 50% -12%, rgba(120,50,210,.5), transparent),
    linear-gradient(170deg, #0b0718 0%, #1c0d36 55%, #0e0822 100%);
  opacity: 1;
  transition: opacity .25s;
}
#menu-screen.hidden { opacity: 0; pointer-events: none; }

#menu-corner {
  position: absolute;
  top: 0; left: 0; right: 0;
  display: flex;
  justify-content: space-between;
  padding: 0 max(12px, env(safe-area-inset-right)) 0 max(12px, env(safe-area-inset-left));
  /* padding-top JS bơm */
}
#menu-corner-right { display: flex; gap: 8px; }

.menu-mascots {
  display: flex;
  gap: 14px;
  margin-bottom: 4px;
}
.menu-mascot {
  width: 74px;
  height: 74px;
  border-radius: 15px;
  display: flex;
  align-items: center;
  justify-content: center;
  animation: mascotFloat 3.2s ease-in-out infinite;
}
.menu-mascot svg { width: 72%; height: 72%; }
.menu-mascot:nth-child(1) { transform: rotate(-7deg); animation-delay: 0s; }
.menu-mascot:nth-child(2) { transform: rotate(2deg) translateY(-8px); animation-delay: .6s; width: 84px; height: 84px; }
.menu-mascot:nth-child(3) { transform: rotate(7deg); animation-delay: 1.2s; }
@keyframes mascotFloat {
  0%, 100% { translate: 0 0; }
  50%       { translate: 0 -7px; }
}

#menu-title {
  font-size: 40px;
  font-weight: 800;
  letter-spacing: 3px;
  text-align: center;
  background: linear-gradient(180deg, #fff 20%, #ffd9a0 55%, #ff7a4d 100%);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  filter: drop-shadow(0 0 24px rgba(255,140,50,.35));
  padding: 0 16px;
}

#menu-tagline {
  font-size: 13px;
  color: var(--text-soft);
  letter-spacing: 1px;
  margin-top: -8px;
  text-align: center;
  padding: 0 24px;
}

#menu-play { margin-top: 14px; }

/* ── Info / How-to-play panel ──────────────────────────────────── */
#info-panel {
  position: fixed;
  inset: 0;
  z-index: 280;
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(4,2,12,.72);
  opacity: 1;
  transition: opacity .22s;
}
#info-panel.hidden { opacity: 0; pointer-events: none; }

.doc-card {
  position: relative;
  width: min(88%, 400px);
  max-height: 76%;
  overflow-y: auto;
  border-radius: 20px;
  padding: 20px 18px 16px;
  background: linear-gradient(180deg, #221040, #0e0822);
  border: 1.5px solid rgba(170,110,255,.30);
  box-shadow: 0 18px 60px rgba(0,0,0,.6);
  transform: scale(1);
  transition: transform .22s;
  text-align: left;
}
#info-panel.hidden .doc-card { transform: scale(.92); }

.doc-card h2 {
  font-size: 21px;
  margin: 0 34px 12px 2px;
  color: #fff;
}

#info-close {
  position: absolute;
  top: 10px;
  right: 10px;
  --surface-height: 34px;
  --surface-width: 34px;
  --surface-font-size: 16px;
}

.info-fig {
  background: rgba(255,255,255,.04);
  border: 1px solid rgba(255,255,255,.08);
  border-radius: 14px;
  padding: 8px;
  margin-bottom: 6px;
}
.info-fig svg { width: 100%; height: auto; display: block; }

.info-cap {
  font-family: system-ui, sans-serif;
  font-size: 13px;
  font-weight: 500;
  line-height: 1.45;
  color: rgba(237,222,255,.8);
  margin: 2px 2px 12px;
}

.info-grid2 {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 8px;
  margin-bottom: 12px;
}
.spec-card {
  background: rgba(255,255,255,.04);
  border: 1px solid rgba(255,255,255,.08);
  border-radius: 14px;
  padding: 8px 6px 7px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 5px;
  text-align: center;
}
.spec-card svg { width: 46px; height: 46px; }
.spec-card .sc-name {
  font-size: 11px;
  letter-spacing: .4px;
  color: #ffe9b0;
}
.spec-card .sc-how {
  font-family: system-ui, sans-serif;
  font-size: 10.5px;
  font-weight: 500;
  line-height: 1.3;
  color: rgba(237,222,255,.65);
}

.info-chips {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
}
.info-chip {
  flex: 1;
  min-width: 100px;
  display: flex;
  align-items: center;
  gap: 7px;
  background: rgba(255,255,255,.04);
  border: 1px solid rgba(255,255,255,.08);
  border-radius: 11px;
  padding: 7px 9px;
}
.info-chip svg { width: 30px; height: 22px; flex-shrink: 0; }
.info-chip span {
  font-family: system-ui, sans-serif;
  font-size: 10.5px;
  font-weight: 600;
  letter-spacing: .5px;
  text-transform: uppercase;
  color: rgba(237,222,255,.7);
  line-height: 1.25;
}

/* ── Confirm panel (Home → về menu?) ───────────────────────────── */
#confirm-panel {
  position: fixed;
  inset: 0;
  z-index: 290;
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(4,2,12,.66);
  opacity: 1;
  transition: opacity .2s;
}
#confirm-panel.hidden { opacity: 0; pointer-events: none; }

.confirm-card {
  width: min(80%, 300px);
  border-radius: 18px;
  padding: 22px 18px 18px;
  background: linear-gradient(180deg, #221040, #0e0822);
  border: 1.5px solid rgba(170,110,255,.30);
  box-shadow: 0 16px 50px rgba(0,0,0,.6);
  text-align: center;
  transform: scale(1);
  transition: transform .2s;
}
#confirm-panel.hidden .confirm-card { transform: scale(.92); }

#confirm-text { font-size: 17px; color: #fff; margin-bottom: 16px; }

.confirm-btns { display: flex; justify-content: center; gap: 14px; }
.confirm-btns .btn3d { --surface-width: 74px; --surface-height: 44px; --surface-font-size: 20px; }
#confirm-yes { --surface-color: #ffb02e; --surface-text: #3a2400; }
#confirm-yes:active .btn3d-surface { background: var(--surface-color); }

/* ── Tutorial banner + bàn tay hướng dẫn ───────────────────────── */
#tut-banner {
  position: fixed;
  left: 50%;
  bottom: 12%;
  transform: translateX(-50%);
  z-index: 240;
  display: flex;
  align-items: center;
  gap: 12px;
  max-width: min(92vw, 460px);
  background: rgba(24,12,48,.94);
  border: 1px solid rgba(190,130,255,.4);
  border-radius: 16px;
  padding: 12px 16px;
  box-shadow: 0 10px 34px rgba(0,0,0,.5);
  opacity: 1;
  transition: opacity .25s, transform .25s;
}
#tut-banner.hidden { opacity: 0; pointer-events: none; transform: translateX(-50%) translateY(12px); }
#tut-text {
  font-size: 14px;
  line-height: 1.4;
  color: #fff;
  font-weight: 700;
}

#tut-hand {
  position: fixed;
  z-index: 235;
  width: 44px;
  height: 44px;
  pointer-events: none;
  opacity: 0;
  filter: drop-shadow(0 3px 8px rgba(0,0,0,.6));
  transition: opacity .2s;
}
#tut-hand.show { opacity: 1; }
#tut-hand svg { width: 100%; height: 100%; }

/* ── Pause veil ────────────────────────────────────────────────── */
#pause-veil {
  position: fixed;
  inset: 0;
  z-index: 300;
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(6,3,16,.74);
  opacity: 1;
  transition: opacity .2s;
}
#pause-veil.hidden { opacity: 0; pointer-events: none; }
.pv-txt {
  font-size: 19px;
  color: #fff;
  letter-spacing: 1px;
  text-shadow: 0 2px 10px rgba(0,0,0,.7);
}

/* ── Responsive ────────────────────────────────────────────────── */
@media (max-width: 380px) {
  .btn3d.btn-icon { --surface-height: 36px; --surface-width: 36px; }
  #level-num { font-size: 15px; }
  #game-title { font-size: 9px; letter-spacing: 2px; }
  .hud-chip { min-width: 48px; padding: 3px 8px; }
  .hud-chip .val { font-size: 15px; }
  #menu-title { font-size: 32px; }
}

@media (max-height: 620px) {
  #menu-title { font-size: 30px; }
  .menu-mascots { transform: scale(.8); margin-bottom: -6px; }
  #menu-screen { gap: 10px; }
  .btn3d.cta { --surface-height: 46px; }
  .doc-card { max-height: 88%; }
}

/* Landscape: HUD strip dựng dọc bên trái board */
body.landscape #mid {
  flex-direction: row;
  justify-content: center;
  gap: 4px;
  padding: 0 max(8px, env(safe-area-inset-right)) 0 max(8px, env(safe-area-inset-left));
}
body.landscape #score-strip {
  width: auto;
  max-width: 150px;
  flex-direction: column;
  align-items: stretch;
  padding: 6px 4px;
  gap: 8px;
}
body.landscape #progress-wrap { min-width: 110px; }
body.landscape #board-outer { padding: 4px; flex: 0 1 auto; }
</style>

let LANG = DEFAULT_LANG;
function t(key) {

}

function getLanguage() {
  const fromWin = typeof window.language === 'string' ? window.language : null;
  const fromUrl = new URLSearchParams(window.location.search).get('language');
  const raw = fromWin != null ? fromWin : fromUrl;
  return SUPPORTED_LANGS.includes(raw) ? raw : DEFAULT_LANG;
}

function applyUiFont(lang) {

/* ================================================================
 * §1. Native bridge (game-common §1–§4 full compliance)
 * ================================================================ */
function post(msg) {
  try {
    if (window.ReactNativeWebView && window.ReactNativeWebView.postMessage) {
      window.ReactNativeWebView.postMessage(JSON.stringify(msg));
    } else {
      console.log('[runic-blaze → native]', msg);
      devSimulateNative(msg);
    }
  } catch (e) { /* ignore */ }
}

function sendMessage(type, opts) {
  opts = opts || {};
  post({
    type,
    level: currentLevelIdx + 1,        // 1-indexed per spec
    result: opts.result   ?? null,
    data:   opts.data     ?? null,
    showModal: opts.showModal === true,
  });
}

function saveData(payload) {
  const data = typeof payload === 'string' ? payload : JSON.stringify(payload);
  sendMessage('save_data', { data });
}

/* ── localStorage 2 tầng (game-common §1.2) ──────────────────── */
const LS_KEY = 'runic_blaze_v1';

function saveLocal(payload) {
  try {
    const s = typeof payload === 'string' ? payload : JSON.stringify(payload);
    localStorage.setItem(LS_KEY, s);
  } catch (e) { /* private mode / quota */ }
}

function readLocal() {
  try { return localStorage.getItem(LS_KEY) || ''; } catch (e) { return ''; }
}

/* ── statusBarHeight (game-common §2 — URL ưu tiên) ──────────── */
function getStatusBarHeight() {
  const params = new URLSearchParams(window.location.search);
  const fromUrl = params.get('statusBarHeight');
  const fromWin = typeof window.statusBarHeight !== 'undefined' ? window.statusBarHeight : null;
  let h = Number(fromUrl != null ? fromUrl : fromWin);
  if (Number.isNaN(h) || h < 0) h = 0;
  return h;
}

/* ── currentLevel (game-common §3 — window ưu tiên) ──────────── */
function getInitialLevelIdx() {
  const fromWin = typeof window.currentLevel === 'number' ? window.currentLevel : null;
  const fromUrl = new URLSearchParams(window.location.search).get('currentLevel');
  const raw = Number(fromWin != null ? fromWin : fromUrl);
  if (!Number.isFinite(raw) || raw < 1) return -1;   // -1 = không có → tự quyết theo saved data
  return Math.min(Math.floor(raw), MAX_LEVEL_IDX + 1) - 1;
}

/* ── data (game-common §4 — window ưu tiên) ──────────────────── */
function getInitialData() {
  const fromWin = typeof window.data === 'string' ? window.data : null;
  const fromUrl = new URLSearchParams(window.location.search).get('data');
  return fromWin != null ? fromWin : (fromUrl || '');
}

/** Gộp data nhẹ (native ưu tiên) + trạng thái ván nặng (localStorage). */
function parseInitialData() {
  let nativeObj = null;
  const raw = getInitialData();
  if (raw) { try { nativeObj = JSON.parse(raw); } catch (e) {} }

  let localObj = null;
  const lraw = readLocal();
  if (lraw) { try { localObj = JSON.parse(lraw); } catch (e) {} }

  if (!nativeObj && !localObj) return null;
  const merged = Object.assign({}, localObj || {}, nativeObj || {});
  if (localObj && localObj.game) merged.game = localObj.game;   // ván nặng chỉ có ở local
  return merged;
}

/* ── Dev simulator: mở bằng browser thường thì tự bấm popup app ─ */
let devTimer = null;
function devSimulateNative(msg) {
  if (window.ReactNativeWebView) return;
  if (msg.type === 'game_result' && msg.showModal) {
    clearTimeout(devTimer);
    devTimer = setTimeout(() => {
      if (msg.result === 'win' && typeof window.onNextLevel === 'function') window.onNextLevel();
      else if (msg.result === 'lose' && typeof window.onRetryLevel === 'function') window.onRetryLevel();
    }, 1600);
  } else if (msg.type === 'victory') {
    clearTimeout(devTimer);
    devTimer = setTimeout(() => { showToast('🏆 VICTORY (dev)'); }, 600);
  }
}

/* ================================================================
 * §2. Level & tuning config — LEVEL VÔ HẠN sinh theo công thức
 * ================================================================
 * Không có level cuối → không bao giờ bắn `victory` (deviation có chủ đích
 * so với game-common §1.5, ghi trong README — giống animal-connect).
 * levelConfig(idx) deterministic theo idx: retry sau khi thua dựng lại
 * đúng envelope độ khó, chỉ cách xếp rune là ngẫu nhiên mới.
 */
const COLS = 7, ROWS = 7;
const MAX_LEVEL_IDX = 9998;

/** splitmix-lite: hash idx → [0,1) ổn định giữa các lần chạy. */
function levelHash(idx) {
  let x = (idx + 0x9E3779B9) | 0;
  x = Math.imul(x ^ (x >>> 16), 0x21F0AAAD);
  x = Math.imul(x ^ (x >>> 15), 0x735A2D97);
  x = (x ^ (x >>> 15)) >>> 0;
  return x / 4294967296;
}

/** Config 1 level: moves 20 → sàn 16, điểm-cần-mỗi-lượt tăng dần rồi
 *  plateau (~400) để chơi dài vẫn công bằng; màu thứ 6 từ level 9,
 *  thỉnh thoảng hash cho level 5 màu để đổi nhịp. */
function levelConfig(idx) {
  const h = levelHash(idx);
  const colors = idx < 8 ? 5 : (h < 0.22 ? 5 : 6);
  const moves = Math.max(16, 20 - (idx >> 1)) + (h > 0.65 ? 1 : 0);
  const perMove = Math.min(400, 100 + idx * 22) * (0.95 + h * 0.1);
  const goal = Math.max(1500, Math.round(moves * perMove / 50) * 50);
  return { moves, goal, colors };
}

const PTS_PER_TILE   = 40;   // điểm 1 tile × chain multiplier
const CHAIN_CAP      = 5;    // multiplier tối đa
const SPECIAL_BONUS  = 80;   // thưởng mỗi special được kích hoạt
const IDLE_HINT_MS   = 5000; // ngồi im 5s → gợi ý
const RUSH_MAX       = 6;    // blaze rush: tối đa 6 moves thừa đổi thành stripe
const ADS_EVERY      = 3;    // xin quảng cáo mỗi 3 lần kết thúc ván

// Kind của tile
const K_NORMAL = 0, K_SH = 1, K_SV = 2, K_NOVA = 3, K_PRISM = 4;

/* ================================================================
 * §3. Audio — WebAudio synth toàn bộ, không file ngoài
 * ================================================================ */
let audioCtx = null, audioMaster = null, bgmOut = null, sfxOut = null;
let bgmTimer = null, bgmNextT = 0, bgmStep = 0;
let muted = false;

function audioEnsure() {
  if (audioCtx) return true;
  try {
    const AC = window.AudioContext || window.webkitAudioContext;
    if (!AC) return false;
    audioCtx = new AC();
    const comp = audioCtx.createDynamicsCompressor();
    comp.threshold.value = -14; comp.knee.value = 22; comp.ratio.value = 9;
    audioMaster = audioCtx.createGain();
    audioMaster.gain.value = muted ? 0 : 0.9;
    audioMaster.connect(comp); comp.connect(audioCtx.destination);
    // Bus SFX riêng — một núm cân bằng SFX↔BGM, chống cascade cộng dồn vỡ tiếng
    sfxOut = audioCtx.createGain();
    sfxOut.gain.value = 0.8;
    sfxOut.connect(audioMaster);
    const lp = audioCtx.createBiquadFilter();
    lp.type = 'lowpass'; lp.frequency.value = 1650;   // BGM tối màu, vẫn đủ thân cho dây
    bgmOut = audioCtx.createGain();
    bgmOut.gain.value = 0.13;
    bgmOut.connect(lp); lp.connect(audioMaster);
    startBgm();
    return true;
  } catch (e) { return false; }
}

function audioUnlock() {
  if (!audioEnsure()) return;
  if (audioCtx.state === 'suspended') { audioCtx.resume().catch(() => {}); }
}

function setMuted(v) {
  muted = v;
  if (audioMaster) audioMaster.gain.value = muted ? 0 : 0.9;
  document.getElementById('sound-btn').classList.toggle('muted', muted);
  document.getElementById('menu-sound').classList.toggle('muted', muted);
  persistLight();
}

/** 1 nốt đơn: osc + envelope. dest mặc định = master. */
function tone(o) {
  if (!audioCtx || muted) return;
  const t0 = audioCtx.currentTime + (o.at || 0);
  const osc = audioCtx.createOscillator();
  osc.type = o.type || 'sine';
  osc.frequency.setValueAtTime(o.freq, t0);
  if (o.slide) osc.frequency.exponentialRampToValueAtTime(Math.max(30, o.slide), t0 + (o.d || 0.15));
  const g = audioCtx.createGain();
  const a = o.a || 0.006, d = o.d || 0.15, peak = o.peak || 0.15;
  g.gain.setValueAtTime(0, t0);
  g.gain.linearRampToValueAtTime(peak, t0 + a);
  g.gain.exponentialRampToValueAtTime(0.0004, t0 + a + d);
  osc.connect(g); g.connect(o.dest || sfxOut);
  osc.start(t0); osc.stop(t0 + a + d + 0.05);
}

/** Noise burst qua bandpass (whoosh/hiss). */
function noiseBurst(o) {
  if (!audioCtx || muted) return;
  const t0 = audioCtx.currentTime + (o.at || 0);
  const d = o.d || 0.2;
  const len = Math.max(1, Math.floor(audioCtx.sampleRate * d));
  const buf = audioCtx.createBuffer(1, len, audioCtx.sampleRate);
  const ch = buf.getChannelData(0);
  for (let i = 0; i < len; i++) ch[i] = Math.random() * 2 - 1;
  const src = audioCtx.createBufferSource();
  src.buffer = buf;
  const bp = audioCtx.createBiquadFilter();
  bp.type = 'bandpass';
  bp.frequency.setValueAtTime(o.f0 || 900, t0);
  if (o.f1) bp.frequency.exponentialRampToValueAtTime(o.f1, t0 + d);
  bp.Q.value = o.q || 1.1;
  const g = audioCtx.createGain();
  g.gain.setValueAtTime(o.peak || 0.12, t0);
  g.gain.exponentialRampToValueAtTime(0.0004, t0 + d);
  src.connect(bp); bp.connect(g); g.connect(o.dest || sfxOut);
  src.start(t0); src.stop(t0 + d + 0.02);
}

/* SFX — thang âm lượng THỐNG NHẤT (peak, sau khi qua sfxOut 0.8):
 *   UI nhẹ  ~.05  (select/button/swap/hint)
 *   phản hồi ~.07 (invalid/moves-low/intro)
 *   pop/forge/stripe/prism/rush ~.10–.11
 *   cao trào hiếm ~.17 (nova/win) — có ducking, không lấn cả bản mix
 * Xoá bỏ chênh lệch cũ (nova .4 vs button .06 ≈ 16 dB). */
function sSelect()  { tone({ freq: 760, type: 'triangle', d: .07, peak: .055 }); }
function sSwap()    {
  // lướt mềm 2 bè sine + swish hẹp băng tần — êm, không rít
  tone({ freq: 420, slide: 640, type: 'sine', a: .008, d: .11, peak: .045 });
  tone({ freq: 840, slide: 1280, type: 'sine', a: .008, d: .09, peak: .018 });
  noiseBurst({ f0: 1400, f1: 2600, d: .09, peak: .02, q: 3 });
}
function sInvalid() { tone({ freq: 150, type: 'square', d: .11, peak: .06 }); tone({ freq: 110, type: 'square', at: .07, d: .12, peak: .06 }); }
function sPop(chain) {
  const pent = [0, 3, 5, 7, 10, 12, 15, 17];
  const semi = pent[Math.min(chain - 1, pent.length - 1)];
  const f = 320 * Math.pow(2, semi / 12);
  tone({ freq: f, type: 'triangle', d: .15, peak: .10 });
  tone({ freq: f * 2, type: 'sine', d: .1, peak: .045 });
  noiseBurst({ f0: 2400, d: .05, peak: .03 });
}
function sForge()   { tone({ freq: 1180, d: .28, peak: .10 }); tone({ freq: 1770, at: .05, d: .3, peak: .055 }); }
function sStripe()  { noiseBurst({ f0: 500, f1: 3400, d: .28, peak: .11, q: 2 }); }
function sNova()    {
  // impact sâu — cần ĐỌC ĐƯỢC trên loa điện thoại: thân trung + crack sáng, KHÔNG chỉ sub trượt xuống 40Hz
  tone({ freq: 150, type: 'sine', d: .5, peak: .15, slide: 60 });     // thân trung → xuyên loa nhỏ
  tone({ freq: 74,  type: 'sine', d: .5, peak: .13, slide: 55 });     // sub cho sức nặng (chỉ trượt tới 55)
  noiseBurst({ f0: 1500, f1: 520, d: .16, peak: .07, q: 1 });        // crack/sóng xung kích dải cao → cắt xuyên
  noiseBurst({ f0: 320,  f1: 110, d: .28, peak: .055 });             // đuôi trầm ầm
}
function sPrismCast(){ [620, 830, 1040, 1240, 1480].forEach((f, i) => tone({ freq: f, at: i * .05, d: .18, peak: .065 })); }
function sZap()     { tone({ freq: 1780, type: 'square', d: .1, peak: .05, slide: 500 }); }
function sShuffle() { for (let i = 0; i < 6; i++) noiseBurst({ f0: 1100 + i * 280, at: i * .05, d: .05, peak: .05 }); }
function sWin()     {
  // cao trào anh hùng TỐI MÀU — power-chord Rê + quãng năm dựng lên (không phải arp Đô-trưởng kẹo)
  duckBgm(2.8);
  tone({ freq: 73.42, type: 'sine', d: 1.0, peak: .17 });
  [293.66, 440.00, 587.33, 698.46, 880.00].forEach((f, i) => tone({ freq: f, at: i * .11, type: 'triangle', d: .34, peak: .12 }));
}
function sLose()    { duckBgm(2.2); [392, 330, 262].forEach((f, i) => tone({ freq: f, at: i * .18, type: 'sawtooth', d: .26, peak: .07 })); }
function sRush(i)   { tone({ freq: 480 + i * 84, type: 'triangle', d: .14, peak: .10 }); }
function sButton()  { tone({ freq: 660, d: .05, peak: .05 }); }
function sHint()    { tone({ freq: 940, d: .26, peak: .05 }); tone({ freq: 1410, at: .06, d: .28, peak: .03 }); }
function sIntro()   { tone({ freq: 392, type: 'triangle', d: .3, peak: .08 }); tone({ freq: 587, at: .14, type: 'triangle', d: .42, peak: .085 }); noiseBurst({ f0: 500, f1: 2000, d: .4, peak: .035 }); }
function sMovesLow(){ tone({ freq: 700, d: .09, peak: .07 }); tone({ freq: 525, at: .13, d: .12, peak: .07 }); }

/* ── BGM — dark cinematic: string bed trầm + pedal Rê + căng thẳng Neapolitan ──
 * Tâm điệu RÊ THỨ. Vòng 4 hợp âm, mỗi hợp âm giữ 16 bước (~7.3s) → 1 vòng ~29s.
 *   i (Dm) → iv (Gm) → ♭II (E♭, màu Neapolitan/Phrygian) → V (A)
 * Không hợp âm trưởng sáng ở âm khu cao, KHÔNG arp giai điệu (2 thủ phạm gây "vui").
 * Pedal Rê giữ LIÊN TỤC dưới mọi hợp âm → nghịch nhẹ ở E♭/A = trọng lực & sức nặng
 * phim ("epic"); pad là 2 saw lệch nhẹ qua lowpass → thân đàn dây tối thay cho sine ngọt. */
const BGM_STEP_S = 60 / 66 / 2;          // móc đơn ≈ 0.45s
const BGM_CH_STEPS = 16;                  // mỗi hợp âm giữ 16 bước
const BGM_LOOP = BGM_CH_STEPS * 4;        // 64 bước / vòng
const BGM_CHORDS = [
  { notes: [146.83, 174.61, 220.00], swell: 293.66 },  // Dm  D3 F3 A3   · swell D4
  { notes: [146.83, 196.00, 233.08], swell: 293.66 },  // Gm  D3 G3 B♭3  · swell D4
  { notes: [155.56, 196.00, 233.08], swell: 311.13 },  // E♭  E♭3 G3 B♭3 (Neapolitan) · swell E♭4
  { notes: [220.00, 277.18, 329.63], swell: 277.18 },  // A   A3 C#4 E4 (V — căng) · swell C#4
];
const BGM_PEDAL = 73.42;                  // Rê D2 — pedal giữ trọng lực xuyên suốt

/* Một nốt "dây kéo": 2 saw lệch nhẹ qua lowpass động → thân đàn dây tối, sử thi */
function padNote(freq, at, dur, peak) {
  if (!audioCtx || muted) return;
  const t0 = audioCtx.currentTime + at;
  const lp = audioCtx.createBiquadFilter();
  lp.type = 'lowpass'; lp.Q.value = 0.7;
  lp.frequency.setValueAtTime(680, t0);
  lp.frequency.linearRampToValueAtTime(1150, t0 + dur * 0.4);   // "mở vĩ" rồi khép lại
  lp.frequency.linearRampToValueAtTime(620, t0 + dur);
  const g = audioCtx.createGain();
  g.gain.setValueAtTime(0, t0);
  g.gain.linearRampToValueAtTime(peak, t0 + dur * 0.28);        // attack chậm ~kéo vĩ
  g.gain.linearRampToValueAtTime(peak * 0.8, t0 + dur * 0.72);
  g.gain.exponentialRampToValueAtTime(0.0004, t0 + dur);
  lp.connect(g); g.connect(bgmOut);
  [[freq, 0.6], [freq * 1.006, 0.4]].forEach(([f, mix]) => {
    const o = audioCtx.createOscillator();
    o.type = 'sawtooth'; o.frequency.value = f;
    const og = audioCtx.createGain(); og.gain.value = mix;
    o.connect(og); og.connect(lp);
    o.start(t0); o.stop(t0 + dur + 0.1);
  });
  const so = audioCtx.createOscillator();     // lõi sine mỏng cho mượt
  so.type = 'sine'; so.frequency.value = freq;
  const sg = audioCtx.createGain();
  sg.gain.setValueAtTime(0, t0);
  sg.gain.linearRampToValueAtTime(peak * 0.45, t0 + dur * 0.3);
  sg.gain.exponentialRampToValueAtTime(0.0004, t0 + dur);
  so.connect(sg); sg.connect(bgmOut);
  so.start(t0); so.stop(t0 + dur + 0.1);
}

/* Trống trầm sử thi — sine tụt dốc + click thân, nhẹ, mỗi lần đổi hợp âm ("nhịp tim") */
function bgmDrum(at) {
  tone({ freq: 100, type: 'sine', at, d: .55, peak: .12, slide: 44, dest: bgmOut });
  tone({ freq: 150, type: 'triangle', at, d: .12, peak: .05, slide: 60, dest: bgmOut });
}

function startBgm() {
  if (bgmTimer || !audioCtx) return;
  startWind();
  bgmNextT = audioCtx.currentTime + 0.15;
  bgmStep = 0;
  bgmTimer = setInterval(() => {
    if (!audioCtx || audioCtx.state !== 'running' || muted) return;
    const now = audioCtx.currentTime;
    if (bgmNextT < now - 0.4) bgmNextT = now + 0.05;     // chống dồn sau khi resume
    while (bgmNextT < now + 0.3) {
      const at = bgmNextT - now;
      const ci = ((bgmStep / BGM_CH_STEPS) | 0) % 4;
      const chord = BGM_CHORDS[ci];
      const inChord = bgmStep % BGM_CH_STEPS;
      const loopOdd = ((bgmStep / BGM_LOOP) | 0) % 2 === 1;

      if (inChord === 0) {
        const dur = BGM_STEP_S * BGM_CH_STEPS * 1.02;    // giữ trọn hợp âm, hơi gối đầu
        chord.notes.forEach((f, i) => padNote(f, at, dur, i === 0 ? 0.05 : 0.042));
        // pedal Rê liên tục — sub luôn có; octave D3 chỉ khi D thuận (Dm/Gm) để tránh nghịch m2 với E♭
        tone({ freq: BGM_PEDAL, type: 'sine', at, a: .9, d: dur * 1.02, peak: .15, dest: bgmOut });
        if (ci === 0 || ci === 1) tone({ freq: BGM_PEDAL * 2, type: 'sine', at, a: 1.2, d: dur, peak: .045, dest: bgmOut });
        bgmDrum(at);                                     // nhịp tim sử thi mỗi lần đổi hợp âm
      }
      // swell cao thưa — 1 nốt dâng-rồi-tan giữa mỗi hợp âm (thay arp giai điệu)
      if (inChord === 6) {
        const sd = BGM_STEP_S * 7;
        tone({ freq: chord.swell, type: 'triangle', at, a: sd * 0.45, d: sd, peak: loopOdd ? .03 : .022, dest: bgmOut });
      }
      // chuông vọng trầm — một tiếng gần cuối mỗi vòng, như chuông xa trong bóng tối
      if (bgmStep % BGM_LOOP === BGM_CH_STEPS * 3 + 8) {
        tone({ freq: 146.83, type: 'sine', at, a: .012, d: 2.4, peak: .026, dest: bgmOut });
        tone({ freq: 220.00, type: 'sine', at: at + .02, d: 1.6, peak: .01, dest: bgmOut });
      }
      bgmNextT += BGM_STEP_S;
      bgmStep++;
    }
  }, 90);
}

/* Gió rít nền — noise loop lọc trầm, cực khẽ, chạy cùng bgmOut (ăn theo mute) */
let windStarted = false;
function startWind() {
  if (windStarted || !audioCtx) return;
  windStarted = true;
  try {
    const len = Math.floor(audioCtx.sampleRate * 4);
    const buf = audioCtx.createBuffer(1, len, audioCtx.sampleRate);
    const ch = buf.getChannelData(0);
    for (let i = 0; i < len; i++) ch[i] = Math.random() * 2 - 1;
    const src = audioCtx.createBufferSource();
    src.buffer = buf;
    src.loop = true;
    const lp = audioCtx.createBiquadFilter();
    lp.type = 'lowpass';
    lp.frequency.value = 260;
    lp.Q.value = 0.6;
    const g = audioCtx.createGain();
    g.gain.value = 0.02;
    src.connect(lp); lp.connect(g); g.connect(bgmOut);
    src.start();
  } catch (e) { /* ignore */ }
}

/* Nhún BGM khi có khoảnh khắc lớn (fanfare thắng/thua) rồi bò lại */
function duckBgm(dur) {
  if (!audioCtx || !bgmOut) return;
  try {
    const t = audioCtx.currentTime;
    bgmOut.gain.cancelScheduledValues(t);
    bgmOut.gain.setValueAtTime(bgmOut.gain.value, t);
    bgmOut.gain.linearRampToValueAtTime(0.035, t + 0.08);
    bgmOut.gain.linearRampToValueAtTime(0.13, t + (dur || 2.2));
  } catch (e) { /* ignore */ }
}

/* ================================================================
 * §4. Game state
 * ================================================================ */

let movesLeft  = 0;

let tileIdCtr  = 0;
let levelEpoch = 0;       // tăng mỗi lần loadLevel — huỷ mọi continuation cũ

let confirmOpen = false;

const wrapEl   = document.getElementById('board-wrap');
