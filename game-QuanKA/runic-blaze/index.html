<!--
  Runic Blaze — QuanKA
  Match-3 swap game, dark-fantasy rune theme. Single-file HTML (CSS + JS inline).
  Board: 7×7 | Colors: 5 | Win: reach score goal within moves limit
  No coins, no boosters, no special tiles — pure cascade match-3.
  Tuân thủ .claude/game-common.md (bridge, level), popup-common.md, zip-common.md.
-->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<title>Runic Blaze</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Google+Sans+Flex:opsz,wght@6..144,1..1000&display=swap" rel="stylesheet" />
<style>
/* ── Reset + mobile tap fixes (game-common §UI) ───────────────── */
*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  -webkit-tap-highlight-color: transparent;
  -webkit-touch-callout: none;
}

:root {
  --ui-font: 'Google Sans Flex', system-ui, sans-serif;
  /* Background palette — deep purple-black */
  --bg-a: #090614;
  --bg-b: #180b2e;
  --bg-c: #0e0822;
  /* Glass panels */
  --glass: rgba(255,255,255,0.06);
  --glass-border: rgba(255,255,255,0.11);
  /* Text */
  --text: #eddeff;
  --text-soft: rgba(237,222,255,0.5);
  /* Rune glow colors */
  --c0: #ff3d5a;  --g0: rgba(255,61,90,.55);
  --c1: #3d9fff;  --g1: rgba(61,159,255,.55);
  --c2: #2dff8a;  --g2: rgba(45,255,138,.55);
  --c3: #ffb830;  --g3: rgba(255,184,48,.55);
  --c4: #c060ff;  --g4: rgba(192,96,255,.55);
  /* Layout */
  --cell: 44px;
  --sat: env(safe-area-inset-top, 0px);
}

html, body { height: 100%; overflow: hidden; }

body {
  font-family: var(--ui-font);
  font-weight: 700;
  color: var(--text);
  background:
    radial-gradient(ellipse 80% 50% at 50% -10%, rgba(100,40,180,.4), transparent),
    linear-gradient(170deg, var(--bg-a) 0%, var(--bg-b) 55%, var(--bg-c) 100%);
  -webkit-user-select: none;
  user-select: none;
  touch-action: none;
}

/* ── Background canvas (particle stars) ───────────────────────── */
#bg-canvas {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
}

/* ── App wrapper ───────────────────────────────────────────────── */
#app {
  position: relative;
  z-index: 1;
  width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* ── Topbar ────────────────────────────────────────────────────── */
#topbar {
  width: 100%;
  max-width: 520px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  padding: 0 12px;
  /* padding-top injected by JS = max(statusBarHeight, env-safe) + 8 */
}

#hud-center {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  line-height: 1.15;
  gap: 1px;
}

#game-title {
  font-size: 10px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--text-soft);
}

#level-num {
  font-size: 18px;
  letter-spacing: .5px;
  color: var(--text);
}

/* ── Score strip ───────────────────────────────────────────────── */
#score-strip {
  width: 100%;
  max-width: 520px;
  padding: 6px 14px 0;
  display: flex;
  align-items: center;
  gap: 10px;
}

.hud-chip {
  background: var(--glass);
  border: 1px solid var(--glass-border);
  border-radius: 12px;
  padding: 4px 12px;
  display: flex;
  flex-direction: column;
  align-items: center;
  min-width: 56px;
  backdrop-filter: blur(6px);
}

.hud-chip .lbl {
  font-size: 9px;
  letter-spacing: 1.8px;
  text-transform: uppercase;
  color: var(--text-soft);
}

.hud-chip .val {
  font-size: 17px;
  color: var(--text);
  line-height: 1.2;
}

#progress-wrap {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 3px;
}

#progress-labels {
  display: flex;
  justify-content: space-between;
  font-size: 10px;
  color: var(--text-soft);
  padding: 0 1px;
}

#progress-bar-bg {
  height: 9px;
  background: rgba(255,255,255,.08);
  border-radius: 5px;
  overflow: hidden;
  border: 1px solid rgba(255,255,255,.1);
}

#progress-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, #8040ff, #ff3d5a, #ffb830);
  background-size: 200% 100%;
  border-radius: 5px;
  width: 0%;
  transition: width .45s cubic-bezier(.22,1,.36,1);
  animation: barShimmer 2.5s linear infinite;
}

@keyframes barShimmer {
  0%   { background-position: 100% 0; }
  100% { background-position: -100% 0; }
}

/* ── Board outer ───────────────────────────────────────────────── */
#board-outer {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  width: 100%;
  padding: 8px;
}

#board-wrap {
  position: relative;
  border-radius: 14px;
  background: rgba(255,255,255,.025);
  border: 1px solid rgba(255,255,255,.07);
  box-shadow: 0 8px 40px rgba(0,0,0,.5), inset 0 1px 0 rgba(255,255,255,.06);
  padding: 4px;
}

#grid-bg {
  position: absolute;
  inset: 4px;
  display: grid;
  pointer-events: none;
  z-index: 0;
}

.slot {
  border-radius: 7px;
  background: rgba(255,255,255,.03);
  border: 1px solid rgba(255,255,255,.06);
  margin: 2px;
}

#board {
  position: relative;
  z-index: 1;
}

/* ── Tiles ─────────────────────────────────────────────────────── */
.tile {
  position: absolute;
  border-radius: 10px;
  cursor: pointer;
  will-change: transform;
  transition: transform .17s cubic-bezier(.22,1,.36,1);
  -webkit-user-select: none;
  user-select: none;
}

.tile-inner {
  width: 100%;
  height: 100%;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
  transition: transform .1s ease, box-shadow .2s ease;
}

.tile-inner::after {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 45%;
  border-radius: 10px 10px 50% 50%;
  background: linear-gradient(180deg, rgba(255,255,255,.18), transparent);
  pointer-events: none;
}

.tile-inner svg {
  width: 56%;
  height: 56%;
  flex-shrink: 0;
  position: relative;
  z-index: 1;
  filter: drop-shadow(0 1px 3px rgba(0,0,0,.4));
}

/* Rune color variants */
.tile-0 .tile-inner {
  background: linear-gradient(145deg, #3d0a12, #220610);
  border: 1.5px solid rgba(255,61,90,.55);
  box-shadow: 0 0 12px rgba(255,61,90,.28), inset 0 0 10px rgba(255,61,90,.12);
}
.tile-1 .tile-inner {
  background: linear-gradient(145deg, #0a1e3d, #060f22);
  border: 1.5px solid rgba(61,159,255,.55);
  box-shadow: 0 0 12px rgba(61,159,255,.28), inset 0 0 10px rgba(61,159,255,.12);
}
.tile-2 .tile-inner {
  background: linear-gradient(145deg, #0a2d1a, #051a0e);
  border: 1.5px solid rgba(45,255,138,.55);
  box-shadow: 0 0 12px rgba(45,255,138,.28), inset 0 0 10px rgba(45,255,138,.12);
}
.tile-3 .tile-inner {
  background: linear-gradient(145deg, #2d1e06, #1a1103);
  border: 1.5px solid rgba(255,184,48,.55);
  box-shadow: 0 0 12px rgba(255,184,48,.28), inset 0 0 10px rgba(255,184,48,.12);
}
.tile-4 .tile-inner {
  background: linear-gradient(145deg, #200a3d, #100420);
  border: 1.5px solid rgba(192,96,255,.55);
  box-shadow: 0 0 12px rgba(192,96,255,.28), inset 0 0 10px rgba(192,96,255,.12);
}

/* Selected state */
.tile.selected .tile-inner {
  transform: scale(1.1);
  border-width: 2px !important;
}
.tile-0.selected .tile-inner { box-shadow: 0 0 0 2px rgba(255,61,90,.8), 0 0 24px rgba(255,61,90,.6), inset 0 0 14px rgba(255,61,90,.25); }
.tile-1.selected .tile-inner { box-shadow: 0 0 0 2px rgba(61,159,255,.8), 0 0 24px rgba(61,159,255,.6), inset 0 0 14px rgba(61,159,255,.25); }
.tile-2.selected .tile-inner { box-shadow: 0 0 0 2px rgba(45,255,138,.8), 0 0 24px rgba(45,255,138,.6), inset 0 0 14px rgba(45,255,138,.25); }
.tile-3.selected .tile-inner { box-shadow: 0 0 0 2px rgba(255,184,48,.8), 0 0 24px rgba(255,184,48,.6), inset 0 0 14px rgba(255,184,48,.25); }
.tile-4.selected .tile-inner { box-shadow: 0 0 0 2px rgba(192,96,255,.8), 0 0 24px rgba(192,96,255,.6), inset 0 0 14px rgba(192,96,255,.25); }

/* Pulse animation for selected */
@keyframes runeSelectedPulse {
  0%, 100% { opacity: 1; }
  50%       { opacity: .75; }
}
.tile.selected .tile-inner { animation: runeSelectedPulse 1s ease-in-out infinite; }

/* Pop-in (initial spawn) */
@keyframes tilePopin {
  0%   { opacity: 0; transform: scale(0.4) rotate(-15deg); }
  60%  { transform: scale(1.1) rotate(3deg); }
  100% { opacity: 1; transform: scale(1) rotate(0deg); }
}
.tile.popin { animation: tilePopin .28s ease-out forwards; }

/* Clear animation */
@keyframes tileClear {
  0%   { transform: scale(1); opacity: 1; }
  35%  { transform: scale(1.28); opacity: .7; }
  100% { transform: scale(0); opacity: 0; }
}
.tile.clearing {
  animation: tileClear .22s ease-in forwards;
  pointer-events: none;
  z-index: 5;
}

/* Shake (invalid swap) */
@keyframes tileShake {
  0%, 100% { translate: 0px 0; }
  20%  { translate: -6px 0; }
  40%  { translate: 6px 0; }
  60%  { translate: -4px 0; }
  80%  { translate: 4px 0; }
}
.tile.shake { animation: tileShake .22s ease-in-out; }

/* ── Score fly-up text ─────────────────────────────────────────── */
.score-fly {
  position: fixed;
  pointer-events: none;
  font-family: var(--ui-font);
  font-weight: 800;
  font-size: 15px;
  color: #fff;
  text-shadow: 0 0 10px rgba(255,200,80,1), 0 2px 4px rgba(0,0,0,.6);
  z-index: 200;
  white-space: nowrap;
  animation: scoreFlyUp .9s ease-out forwards;
}

@keyframes scoreFlyUp {
  0%   { opacity: 1; transform: translate(-50%,-50%) scale(1); }
  20%  { opacity: 1; transform: translate(-50%,-80%) scale(1.2); }
  100% { opacity: 0; transform: translate(-50%,-140%) scale(.9); }
}

/* ── Cascade badge ─────────────────────────────────────────────── */
#cascade-badge {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 28px;
  font-weight: 800;
  pointer-events: none;
  z-index: 100;
  opacity: 0;
  letter-spacing: 1px;
  text-shadow: 0 0 30px rgba(255,240,80,.9), 0 0 60px rgba(255,150,30,.5);
  color: #fff;
}

@keyframes cascadePop {
  0%   { opacity: 0; transform: translate(-50%,-50%) scale(.4); }
  30%  { opacity: 1; transform: translate(-50%,-50%) scale(1.25); }
  65%  { opacity: 1; transform: translate(-50%,-50%) scale(1); }
  100% { opacity: 0; transform: translate(-50%,-60%) scale(.85); }
}
.cascade-anim { animation: cascadePop .65s ease-out forwards; }

/* ── btn3d (game-common §1.4 / popup-common §6) ───────────────── */
.btn3d {
  --radius: 12px;
  --surface-color: rgba(255,255,255,.08);
  --surface-text: var(--text);
  --surface-height: 42px;
  --surface-width: auto;
  --surface-padding-x: 16px;
  --surface-font-size: 18px;
  position: relative;
  display: inline-block;
  padding: 0;
  border: 0;
  background: transparent;
  cursor: pointer;
  font: inherit;
  color: inherit;
  -webkit-user-select: none;
  user-select: none;
}

.btn3d-shadow { display: none; }

.btn3d-surface {
  position: relative;
  z-index: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  height: var(--surface-height);
  width: var(--surface-width);
  padding: 0 var(--surface-padding-x);
  border-radius: var(--radius);
  background: var(--surface-color);
  border: 1px solid var(--glass-border);
  color: var(--surface-text);
  font-family: var(--ui-font);
  font-size: var(--surface-font-size);
  letter-spacing: .5px;
  backdrop-filter: blur(8px);
  transition: transform .09s ease-out, background .1s;
}

.btn3d:active { transform: scale(.94); }
.btn3d:active .btn3d-surface { background: rgba(255,255,255,.14); }

.btn3d.btn-icon {
  --surface-height: 42px;
  --surface-width: 42px;
  --surface-padding-x: 0;
}

.back-ico    { width: 52%; height: 52%; fill: currentColor; display: block; }
.restart-ico { width: 62%; height: 62%; fill: currentColor; display: block; }

/* ── Moves danger flash ────────────────────────────────────────── */
@keyframes dangerPulse {
  0%, 100% { color: #ff3d5a; }
  50%       { color: #ff8080; }
}
.moves-danger { animation: dangerPulse .6s ease-in-out infinite; }
</style>
</head>
<body>

<canvas id="bg-canvas"></canvas>

<div id="app">

  <!-- Topbar: Back | Level info | Restart -->
  <div id="topbar">
    <div class="btn3d btn-icon" id="back-btn" role="button" aria-label="Back" tabindex="0">
      <span class="btn3d-shadow"></span>
      <span class="btn3d-surface">
        <svg class="back-ico" viewBox="0 0 447.243 447.243" aria-hidden="true">
          <path fill="currentColor" d="M420.361 192.229a31.967 31.967 0 0 0-5.535-.41H99.305l6.88-3.2a63.998 63.998 0 0 0 18.08-12.8l88.48-88.48c11.653-11.124 13.611-29.019 4.64-42.4-10.441-14.259-30.464-17.355-44.724-6.914a32.018 32.018 0 0 0-3.276 2.754l-160 160c-12.504 12.49-12.515 32.751-.025 45.255l.025.025 160 160c12.514 12.479 32.775 12.451 45.255-.063a32.084 32.084 0 0 0 2.745-3.137c8.971-13.381 7.013-31.276-4.64-42.4l-88.32-88.64a64.002 64.002 0 0 0-16-11.68l-9.6-4.32h314.24c16.347.607 30.689-10.812 33.76-26.88 2.829-17.445-9.019-33.88-26.464-36.71z"/>
        </svg>
      </span>
    </div>

    <div id="hud-center">
      <div id="game-title">Runic Blaze</div>
      <div id="level-num">Level 1</div>
    </div>

    <div class="btn3d btn-icon" id="restart-btn" role="button" aria-label="Restart" tabindex="0">
      <span class="btn3d-shadow"></span>
      <span class="btn3d-surface">
        <svg class="restart-ico" viewBox="0 0 100 100" aria-hidden="true">
          <path fill="currentColor" d="m50.7 19.003 4.793-4.793c2.696-2.697 2.696-6.991 0-9.688s-6.991-2.696-9.687 0L29.327 21.001a6.812 6.812 0 0 0 0 9.687l16.479 16.478a6.9 6.9 0 0 0 4.793 1.998c1.798 0 3.496-.7 4.794-1.998a6.812 6.812 0 0 0 0-9.687l-4.794-4.794c13.682.4 24.768 11.685 24.768 25.467 0 14.081-11.485 25.466-25.467 25.466S24.534 72.233 24.534 58.252c0-3.096.599-6.192 1.597-8.989 1.299-3.495-.4-7.49-3.994-8.788-3.496-1.298-7.49.4-8.789 3.995-1.698 4.394-2.496 9.088-2.496 13.882C10.852 79.923 28.428 97.5 50 97.5s39.148-17.577 39.148-39.148c0-21.472-17.177-38.95-38.449-39.349z"/>
        </svg>
      </span>
    </div>
  </div>

  <!-- HUD: Score chip | Progress bar | Moves chip -->
  <div id="score-strip">
    <div class="hud-chip" id="chip-score">
      <span class="lbl" id="lbl-score">SCORE</span>
      <span class="val" id="hud-score">0</span>
    </div>
    <div id="progress-wrap">
      <div id="progress-labels">
        <span id="lbl-goal">GOAL</span>
        <span id="hud-goal">800</span>
      </div>
      <div id="progress-bar-bg">
        <div id="progress-bar-fill"></div>
      </div>
    </div>
    <div class="hud-chip" id="chip-moves">
      <span class="lbl" id="lbl-moves">MOVES</span>
      <span class="val" id="hud-moves">25</span>
    </div>
  </div>

  <!-- Board -->
  <div id="board-outer">
    <div id="board-wrap">
      <div id="grid-bg"></div>
      <div id="board"></div>
    </div>
  </div>

</div>

<!-- Cascade combo badge (centred overlay) -->
<div id="cascade-badge" aria-live="polite"></div>

<script>
'use strict';

/* ================================================================
 * §0. i18n — bắt buộc khai trước khi dùng (game-common §5)
 * ================================================================ */
const SUPPORTED_LANGS = [
  'en','vi','zh-Hans','zh-Hant','ja','ko','es','es-MX','es-AR',
  'pt-BR','pt','fr','de','it','nl','pl','ru','tr','ar','hi','th','id','fil',
];
const LATIN_LANGS = new Set([
  'en','vi','es','es-MX','es-AR','pt-BR','pt','fr','de','it','nl','pl','tr','id','fil',
]);
const DEFAULT_LANG = 'en';

const I18N = {
  en: { title:'RUNIC BLAZE', level:'Level', score:'SCORE', goal:'GOAL',
        moves:'MOVES', cascade:'CASCADE', back:'Back', restart:'Restart' },
  vi: { title:'RUNIC BLAZE', level:'Màn', score:'ĐIỂM', goal:'MỤC TIÊU',
        moves:'LƯỢT', cascade:'COMBO', back:'Thoát', restart:'Chơi lại' },
  'zh-Hans': { title:'符文烈焰', level:'关卡', score:'得分', goal:'目标',
               moves:'步数', cascade:'连击', back:'返回', restart:'重玩' },
  'zh-Hant': { title:'符文烈焰', level:'關卡', score:'得分', goal:'目標',
               moves:'步數', cascade:'連擊', back:'返回', restart:'重玩' },
  ja: { title:'ルーンブレイズ', level:'レベル', score:'スコア', goal:'目標',
        moves:'手数', cascade:'コンボ', back:'戻る', restart:'やり直し' },
  ko: { title:'루닉 블레이즈', level:'레벨', score:'점수', goal:'목표',
        moves:'이동', cascade:'콤보', back:'뒤로', restart:'다시하기' },
  es: { title:'RUNIC BLAZE', level:'Nivel', score:'PUNTOS', goal:'META',
        moves:'MOVS', cascade:'COMBO', back:'Atrás', restart:'Reiniciar' },
  'pt-BR': { title:'RUNIC BLAZE', level:'Nível', score:'PONTOS', goal:'META',
             moves:'MOVS', cascade:'COMBO', back:'Voltar', restart:'Reiniciar' },
  fr: { title:'RUNIC BLAZE', level:'Niveau', score:'SCORE', goal:'OBJECTIF',
        moves:'COUPS', cascade:'COMBO', back:'Retour', restart:'Rejouer' },
  de: { title:'RUNIC BLAZE', level:'Level', score:'PUNKTE', goal:'ZIEL',
        moves:'ZÜGE', cascade:'COMBO', back:'Zurück', restart:'Neu starten' },
  ru: { title:'РУНИК БЛЕЙЗ', level:'Уровень', score:'ОЧКИ', goal:'ЦЕЛЬ',
        moves:'ХОДЫ', cascade:'КОМБО', back:'Назад', restart:'Заново' },
  ar: { title:'رونك بليز', level:'المستوى', score:'النقاط', goal:'الهدف',
        moves:'الحركات', cascade:'سلسلة', back:'رجوع', restart:'إعادة' },
  th: { title:'รูนิค เบลซ', level:'ด่าน', score:'คะแนน', goal:'เป้าหมาย',
        moves:'การเคลื่อน', cascade:'คอมโบ', back:'ย้อนกลับ', restart:'เริ่มใหม่' },
};

let LANG = DEFAULT_LANG;
function t(key) {
  return (I18N[LANG] && I18N[LANG][key]) || I18N.en[key] || key;
}

function getLanguage() {
  const fromWin = typeof window.language === 'string' ? window.language : null;
  const fromUrl = new URLSearchParams(window.location.search).get('language');
  const raw = fromWin != null ? fromWin : fromUrl;
  return SUPPORTED_LANGS.includes(raw) ? raw : DEFAULT_LANG;
}

function applyUiFont(lang) {
  if (!LATIN_LANGS.has(lang)) {
    document.documentElement.style.setProperty('--ui-font', 'system-ui, sans-serif');
  }
}

/* ================================================================
 * §1. Native bridge (game-common §1 full compliance)
 * ================================================================ */
function post(msg) {
  try {
    if (window.ReactNativeWebView && window.ReactNativeWebView.postMessage) {
      window.ReactNativeWebView.postMessage(JSON.stringify(msg));
    } else {
      console.log('[runic-blaze → native]', msg);
    }
  } catch (e) { /* ignore */ }
}

function sendMessage(type, opts) {
  opts = opts || {};
  post({
    type,
    level: currentLevelIdx + 1,       // 1-indexed per spec
    result: opts.result   ?? null,
    data:   opts.data     ?? null,
    showModal: opts.showModal === true,
  });
}

function saveData(payload) {
  const data = typeof payload === 'string' ? payload : JSON.stringify(payload);
  sendMessage('save_data', { data });
}

/* ── localStorage (game-common §1.2) ─────────────────────────── */
const LS_KEY = 'runic_blaze_v1';

function saveLocal(payload) {
  try {
    const s = typeof payload === 'string' ? payload : JSON.stringify(payload);
    localStorage.setItem(LS_KEY, s);
  } catch (e) { /* private mode / quota */ }
}

function readLocal() {
  try { return localStorage.getItem(LS_KEY) || ''; } catch (e) { return ''; }
}

/* ── statusBarHeight (game-common §2) ────────────────────────── */
function getStatusBarHeight() {
  const params = new URLSearchParams(window.location.search);
  const fromUrl = params.get('statusBarHeight');
  const fromWin = typeof window.statusBarHeight !== 'undefined' ? window.statusBarHeight : null;
  let h = Number(fromUrl != null ? fromUrl : fromWin);
  if (Number.isNaN(h) || h < 0) h = 0;
  return h;
}

/* ── currentLevel (game-common §3) ──────────────────────────── */
function getInitialLevelIdx() {
  const fromWin = typeof window.currentLevel === 'number' ? window.currentLevel : null;
  const fromUrl = new URLSearchParams(window.location.search).get('currentLevel');
  const raw = Number(fromWin != null ? fromWin : fromUrl);
  if (!Number.isFinite(raw) || raw < 1) return 0;
  return Math.min(Math.floor(raw), LEVELS.length) - 1;
}

/* ── data (game-common §4) ───────────────────────────────────── */
function getInitialData() {
  const fromWin = typeof window.data === 'string' ? window.data : null;
  const fromUrl = new URLSearchParams(window.location.search).get('data');
  return fromWin != null ? fromWin : (fromUrl || '');
}

/* ================================================================
 * §2. Level definitions — 10 levels, score-goal win
 * ================================================================ */
const LEVELS = [
  { moves: 25, goal: 800   },
  { moves: 23, goal: 1200  },
  { moves: 22, goal: 1500  },
  { moves: 20, goal: 1800  },
  { moves: 22, goal: 2200  },
  { moves: 20, goal: 2600  },
  { moves: 18, goal: 3000  },
  { moves: 18, goal: 3500  },
  { moves: 16, goal: 4000  },
  { moves: 20, goal: 5000  },
];

/* ================================================================
 * §3. Rune definitions — 5 colors, SVG symbols
 * ================================================================ */
const COLS = 7, ROWS = 7, NCOLORS = 5;

// CSS class names for glow tints
const RUNE_GLOW_VARS = ['--g0','--g1','--g2','--g3','--g4'];

// 5 distinct rune SVG shapes (100x100 viewBox, fill only for clarity at small size)
const RUNE_SVG = [
  // 0 Crimson — FLAME rune (teardrop with inner circle hole)
  `<path fill="rgba(255,61,90,.92)" d="M50 14 C50 14 26 40 26 57 C26 70.3 36.7 81 50 81 C63.3 81 74 70.3 74 57 C74 40 50 14 50 14 Z"/>
   <circle fill="rgba(10,2,6,.75)" cx="50" cy="61" r="9"/>`,

  // 1 Azure — DROPLET rune (classic water drop)
  `<path fill="rgba(61,159,255,.92)" d="M50 16 C50 16 24 54 24 65 C24 78.8 35.2 90 50 90 C64.8 90 76 78.8 76 65 C76 54 50 16 50 16 Z"/>
   <ellipse fill="rgba(200,230,255,.35)" cx="42" cy="62" rx="7" ry="11" transform="rotate(-20 42 62)"/>`,

  // 2 Emerald — LEAF / DUAL-WING rune (two mirrored leaf shapes)
  `<path fill="rgba(45,255,138,.92)" d="M50 20 C50 20 76 32 78 52 C80 70 64 83 50 83 Z"/>
   <path fill="rgba(45,255,138,.75)" d="M50 20 C50 20 24 32 22 52 C20 70 36 83 50 83 Z"/>`,

  // 3 Amber — LIGHTNING BOLT rune
  `<path fill="rgba(255,184,48,.92)" d="M58 17 L30 57 L50 57 L42 83 L74 43 L54 43 Z"/>`,

  // 4 Violet — CRESCENT MOON rune
  `<path fill="rgba(192,96,255,.92)" d="M68 26 A28 28 0 1 0 68 74 A19 19 0 1 1 68 26 Z"/>`,
];

/* ================================================================
 * §4. Game state
 * ================================================================ */
let currentLevelIdx = 0;
let board      = [];   // board[r][c] = tile | null
let movesLeft  = 0;
let score      = 0;
let goal       = 0;
let busy       = false;
let ended      = false;
let selected   = null; // {r, c}
let cellPx     = 44;
let tileIdCtr  = 0;

const boardEl  = document.getElementById('board');
const wrapEl   = document.getElementById('board-wrap');
const gridBgEl = document.getElementById('grid-bg');

const sleep = ms => new Promise(res => setTimeout(res, ms));
const inb   = (r, c) => r >= 0 && r < ROWS && c >= 0 && c < COLS;

/* ================================================================
 * §5. Tile DOM helpers
 * ================================================================ */
function makeTile(color) {
  const el = document.createElement('div');
  el.className = 'tile tile-' + color;
  el.innerHTML = `<div class="tile-inner"><svg viewBox="0 0 100 100" aria-hidden="true">${RUNE_SVG[color]}</svg></div>`;
  boardEl.appendChild(el);
  return { id: ++tileIdCtr, color, el };
}

function tileTransform(r, c) {
  // +2px offset for board-wrap inner padding (grid-bg is inset:4px, tiles share same origin)
  return `translate(${c * cellPx}px, ${r * cellPx}px)`;
}

function applyTileSize(tile) {
  tile.el.style.width  = (cellPx - 4) + 'px';
  tile.el.style.height = (cellPx - 4) + 'px';
}

function layoutTile(tile, r, c) {
  applyTileSize(tile);
  tile.el.style.transform = tileTransform(r, c);
}

function layoutAll() {
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      if (board[r][c]) layoutTile(board[r][c], r, c);
    }
  }
}

/* ================================================================
 * §6. Resize & layout (game-common §2 statusBarHeight)
 * ================================================================ */
function resize() {
  const sbh    = getStatusBarHeight();
  const envTop = parseInt(getComputedStyle(document.documentElement)
                   .getPropertyValue('--sat') || '0') || 0;
  const topPad = Math.max(sbh, envTop) + 8;
  document.getElementById('topbar').style.paddingTop = topPad + 'px';

  // After layout, measure available space for the board
  requestAnimationFrame(() => {
    const topbar   = document.getElementById('topbar');
    const strip    = document.getElementById('score-strip');
    const usedH    = topbar.getBoundingClientRect().bottom + strip.getBoundingClientRect().height + 12;
    const availH   = window.innerHeight - usedH - 12;
    const availW   = Math.min(window.innerWidth, 520) - 24;
    const boardPx  = Math.min(availH, availW);
    cellPx = Math.max(28, Math.floor(boardPx / COLS));
    const sz = cellPx * COLS;

    boardEl.style.width   = sz + 'px';
    boardEl.style.height  = sz + 'px';
    wrapEl.style.width    = (sz + 8) + 'px';
    wrapEl.style.height   = (sz + 8) + 'px';
    gridBgEl.style.width  = sz + 'px';
    gridBgEl.style.height = sz + 'px';
    gridBgEl.style.gridTemplateColumns = `repeat(${COLS},1fr)`;
    gridBgEl.style.gridTemplateRows    = `repeat(${ROWS},1fr)`;
    gridBgEl.style.left   = '4px';
    gridBgEl.style.top    = '4px';
    boardEl.style.position = 'relative';
    boardEl.style.left    = '4px';
    boardEl.style.top     = '4px';

    // Build slot grid once
    if (gridBgEl.children.length !== ROWS * COLS) {
      gridBgEl.innerHTML = '';
      for (let i = 0; i < ROWS * COLS; i++) {
        const s = document.createElement('div');
        s.className = 'slot';
        gridBgEl.appendChild(s);
      }
    }
    layoutAll();
  });
}

window.addEventListener('resize', () => {
  bgCanvas.width  = window.innerWidth;
  bgCanvas.height = window.innerHeight;
  resize();
});

/* ================================================================
 * §7. Board generation — no match-3 at spawn
 * ================================================================ */
function fillBoard(staggerAnim) {
  board = Array.from({ length: ROWS }, () => new Array(COLS).fill(null));
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      let color, tries = 0;
      do {
        color = Math.floor(Math.random() * NCOLORS);
        tries++;
      } while (tries < 30 && (
        (c >= 2 && board[r][c-1] && board[r][c-1].color === color &&
                   board[r][c-2] && board[r][c-2].color === color) ||
        (r >= 2 && board[r-1][c] && board[r-1][c].color === color &&
                   board[r-2][c] && board[r-2][c].color === color)
      ));

      const tile = makeTile(color);
      board[r][c] = tile;
      applyTileSize(tile);
      // Instant placement (no transition for initial spawn)
      tile.el.style.transition = 'none';
      tile.el.style.transform  = tileTransform(r, c);

      if (staggerAnim !== false) {
        const delay = (r + c) * 22;
        tile.el.style.animationDelay = delay + 'ms';
        tile.el.classList.add('popin');
        tile.el.addEventListener('animationend', () => {
          tile.el.classList.remove('popin');
          tile.el.style.animationDelay = '';
          tile.el.style.transition = '';
        }, { once: true });
      }
    }
  }
}

/* ================================================================
 * §8. Match detection — scan H+V, collect as flat Set of (r*COLS+c)
 * ================================================================ */
function findMatches() {
  const matched = new Set();

  // Horizontal runs
  for (let r = 0; r < ROWS; r++) {
    let c = 0;
    while (c < COLS) {
      if (!board[r][c]) { c++; continue; }
      let j = c + 1;
      while (j < COLS && board[r][j] && board[r][j].color === board[r][c].color) j++;
      if (j - c >= 3) { for (let k = c; k < j; k++) matched.add(r * COLS + k); }
      c = j;
    }
  }

  // Vertical runs
  for (let c = 0; c < COLS; c++) {
    let r = 0;
    while (r < ROWS) {
      if (!board[r][c]) { r++; continue; }
      let j = r + 1;
      while (j < ROWS && board[j] && board[j][c] && board[j][c].color === board[r][c].color) j++;
      if (j - r >= 3) { for (let k = r; k < j; k++) matched.add(k * COLS + c); }
      r = j;
    }
  }

  return matched;
}

/* ================================================================
 * §9. Cascade loop — clear → gravity → refill → repeat
 * ================================================================ */
async function processCascade(matched, depth) {
  if (!matched.size) return;

  const multiplier = Math.min(depth + 1, 3);
  const pts = matched.size * 50 * multiplier;
  score += pts;
  updateHUD();

  // Cascade badge for depth > 0
  if (depth > 0) showCascadeBadge(multiplier);

  // Score fly — centroid of matched tiles
  let sumR = 0, sumC = 0;
  matched.forEach(key => { sumR += Math.floor(key / COLS); sumC += key % COLS; });
  const avgR = sumR / matched.size;
  const avgC = sumC / matched.size;
  spawnScoreFly(avgR, avgC, pts, multiplier);

  // Animate clear
  const removedEls = [];
  matched.forEach(key => {
    const r = Math.floor(key / COLS), c = key % COLS;
    const tile = board[r][c];
    if (tile) {
      tile.el.classList.add('clearing');
      removedEls.push(tile.el);
      board[r][c] = null;
    }
  });

  await sleep(230);
  removedEls.forEach(el => { if (el.parentNode) el.parentNode.removeChild(el); });

  // Gravity — drop tiles down into empty slots
  await applyGravity();

  // Refill from top
  await refillBoard();

  // Detect new matches (cascade)
  const newMatched = findMatches();
  if (newMatched.size) {
    await sleep(80);
    await processCascade(newMatched, depth + 1);
  }
}

async function applyGravity() {
  let anyMoved = false;
  for (let c = 0; c < COLS; c++) {
    let write = ROWS - 1;
    for (let r = ROWS - 1; r >= 0; r--) {
      if (board[r][c]) {
        if (r !== write) {
          board[write][c] = board[r][c];
          board[r][c] = null;
          // Enable transition for fall animation
          board[write][c].el.style.transition = 'transform .2s ease-in';
          layoutTile(board[write][c], write, c);
          anyMoved = true;
        }
        write--;
      }
    }
  }
  if (anyMoved) await sleep(220);
}

async function refillBoard() {
  let any = false;
  for (let c = 0; c < COLS; c++) {
    let spawnOffset = 0;
    for (let r = 0; r < ROWS; r++) {
      if (!board[r][c]) {
        const color = Math.floor(Math.random() * NCOLORS);
        const tile  = makeTile(color);
        board[r][c] = tile;
        applyTileSize(tile);
        // Place above board, no transition
        tile.el.style.transition = 'none';
        tile.el.style.transform  = tileTransform(-(spawnOffset + 1), c);
        spawnOffset++;
        any = true;
        // RAF double-pump to ensure browser paints the off-screen position first
        requestAnimationFrame(() => requestAnimationFrame(() => {
          tile.el.style.transition = 'transform .22s ease-in';
          layoutTile(tile, r, c);
          // Remove popin on fall-in since we're using translate animation instead
        }));
      }
    }
  }
  if (any) await sleep(260);
  // Re-enable smooth transition for subsequent moves
  for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) {
    if (board[r][c]) board[r][c].el.style.transition = '';
  }
}

/* ================================================================
 * §10. Swap — validate, animate, dispatch cascade
 * ================================================================ */
async function doSwap(r1, c1, r2, c2) {
  if (busy || ended) return;
  if (!inb(r1, c1) || !inb(r2, c2)) return;
  if (!board[r1][c1] || !board[r2][c2]) return;

  busy = true;
  deselect();

  const t1 = board[r1][c1], t2 = board[r2][c2];

  // Animate swap (enable transition temporarily)
  t1.el.style.transition = 'transform .16s ease-out';
  t2.el.style.transition = 'transform .16s ease-out';
  board[r1][c1] = t2; board[r2][c2] = t1;
  layoutTile(t1, r2, c2);
  layoutTile(t2, r1, c1);
  await sleep(170);

  const matched = findMatches();

  if (!matched.size) {
    // Invalid — revert
    board[r1][c1] = t1; board[r2][c2] = t2;
    layoutTile(t1, r1, c1);
    layoutTile(t2, r2, c2);
    t1.el.classList.add('shake'); t2.el.classList.add('shake');
    await sleep(240);
    t1.el.classList.remove('shake'); t2.el.classList.remove('shake');
    t1.el.style.transition = '';   t2.el.style.transition = '';
    busy = false;
    return;
  }

  // Valid move — cost 1 move
  movesLeft--;
  updateHUD();

  await processCascade(matched, 0);
  checkEnd();
  busy = false;
}

/* ================================================================
 * §11. Win / Lose (game-common §1.1 + §1.5)
 * ================================================================ */
function checkEnd() {
  if (ended) return;

  if (score >= goal) {
    ended = true;
    // Persist light data (game-common §1.2)
    const newIdx = Math.min(currentLevelIdx + 1, LEVELS.length - 1);
    saveData({ levelIdx: newIdx });
    saveLocal({ levelIdx: newIdx });
    setTimeout(() => {
      if (currentLevelIdx === LEVELS.length - 1) {
        sendMessage('victory'); // game-common §1.5 — level cuối, KHÔNG gửi game_result
      } else {
        sendMessage('game_result', { result: 'win', showModal: true });
      }
    }, 350);
    return;
  }

  if (movesLeft <= 0) {
    ended = true;
    setTimeout(() => {
      sendMessage('game_result', { result: 'lose', showModal: true });
    }, 350);
  }
}

/* ================================================================
 * §12. HUD update
 * ================================================================ */
function updateHUD() {
  document.getElementById('hud-score').textContent = score;
  document.getElementById('hud-moves').textContent = movesLeft;
  document.getElementById('hud-goal').textContent  = goal;

  const pct = Math.min(100, (score / goal) * 100);
  document.getElementById('progress-bar-fill').style.width = pct + '%';

  // Danger color for low moves
  const movesVal = document.getElementById('hud-moves');
  if (movesLeft <= 5 && movesLeft > 0) {
    movesVal.classList.add('moves-danger');
  } else {
    movesVal.classList.remove('moves-danger');
  }
}

function updateLabels() {
  document.getElementById('game-title').textContent    = t('title');
  document.getElementById('level-num').textContent     = `${t('level')} ${currentLevelIdx + 1}`;
  document.getElementById('lbl-score').textContent     = t('score');
  document.getElementById('lbl-goal').textContent      = t('goal');
  document.getElementById('lbl-moves').textContent     = t('moves');
  document.getElementById('back-btn').setAttribute('aria-label', t('back'));
  document.getElementById('restart-btn').setAttribute('aria-label', t('restart'));
}

/* ================================================================
 * §13. Score fly + cascade badge
 * ================================================================ */
function spawnScoreFly(boardR, boardC, pts, mult) {
  const boardRect = boardEl.getBoundingClientRect();
  const x = boardRect.left + boardC * cellPx + cellPx * 0.5;
  const y = boardRect.top  + boardR * cellPx + cellPx * 0.5;
  const el = document.createElement('div');
  el.className   = 'score-fly';
  el.textContent = (mult > 1 ? `×${mult} ` : '') + `+${pts}`;
  el.style.left  = x + 'px';
  el.style.top   = y + 'px';
  document.body.appendChild(el);
  el.addEventListener('animationend', () => el.remove(), { once: true });
}

function showCascadeBadge(mult) {
  const el = document.getElementById('cascade-badge');
  el.textContent = `${t('cascade')} ×${mult}!`;
  el.classList.remove('cascade-anim');
  void el.offsetWidth; // reflow to restart animation
  el.classList.add('cascade-anim');
  el.addEventListener('animationend', () => el.classList.remove('cascade-anim'), { once: true });
}

/* ================================================================
 * §14. Input — pointer events (tap to select + swipe to swap)
 * ================================================================ */
let ptrDown = null;
const DRAG_THRESH = 14; // px — below this = tap, above = swipe

boardEl.addEventListener('pointerdown', e => {
  if (busy || ended) return;
  const cell = hitCell(e.clientX, e.clientY);
  if (!cell) return;
  ptrDown = { x: e.clientX, y: e.clientY, r: cell.r, c: cell.c };
  boardEl.setPointerCapture(e.pointerId);
}, { passive: true });

boardEl.addEventListener('pointerup', e => {
  if (!ptrDown) return;
  const { x: ox, y: oy, r, c } = ptrDown;
  ptrDown = null;
  const dx = e.clientX - ox;
  const dy = e.clientY - oy;
  const dist = Math.hypot(dx, dy);

  if (dist < DRAG_THRESH) {
    handleTap(r, c);
  } else {
    // Determine cardinal direction of swipe
    let dr = 0, dc = 0;
    if (Math.abs(dx) >= Math.abs(dy)) { dc = dx > 0 ? 1 : -1; }
    else                               { dr = dy > 0 ? 1 : -1; }
    deselect();
    doSwap(r, c, r + dr, c + dc);
  }
}, { passive: true });

boardEl.addEventListener('pointercancel', () => { ptrDown = null; });

function hitCell(x, y) {
  const rect = boardEl.getBoundingClientRect();
  const lx = x - rect.left;
  const ly = y - rect.top;
  const c = Math.floor(lx / cellPx);
  const r = Math.floor(ly / cellPx);
  return inb(r, c) ? { r, c } : null;
}

function handleTap(r, c) {
  if (!board[r][c]) { deselect(); return; }
  if (!selected) { select(r, c); return; }

  const { r: sr, c: sc } = selected;
  if (sr === r && sc === c) { deselect(); return; }

  if (Math.abs(sr - r) + Math.abs(sc - c) === 1) {
    doSwap(sr, sc, r, c); // adjacent → swap
  } else {
    deselect();
    select(r, c); // non-adjacent → reselect
  }
}

function select(r, c) {
  selected = { r, c };
  const tile = board[r][c];
  if (tile) tile.el.classList.add('selected');
}

function deselect() {
  if (!selected) return;
  const tile = board[selected.r][selected.c];
  if (tile) tile.el.classList.remove('selected');
  selected = null;
}

/* ================================================================
 * §15. Load level (game-common §3 + §1.3 onNextLevel/onRetryLevel)
 * ================================================================ */
function loadLevel(idx) {
  currentLevelIdx = idx;
  const lv = LEVELS[idx];
  movesLeft = lv.moves;
  score     = 0;
  goal      = lv.goal;
  busy      = false;
  ended     = false;
  selected  = null;
  tileIdCtr = 0;

  // Clear board DOM
  boardEl.innerHTML = '';
  gridBgEl.innerHTML = '';

  fillBoard(true);    // generate board with stagger pop-in animation
  updateLabels();
  updateHUD();
  resize();           // recalculates layout, calls layoutAll() inside RAF
}

/* ── Save current board state to localStorage ─────────────────── */
function saveCurrentState() {
  if (!board.length) return;
  const snap = board.map(row => row.map(t => t ? t.color : -1));
  saveLocal({ levelIdx: currentLevelIdx, movesLeft, score, board: snap });
}

/* ── Try restore state for a level ────────────────────────────── */
function tryRestoreState(idx) {
  const raw = readLocal();
  if (!raw) return false;
  try {
    const obj = JSON.parse(raw);
    if (obj.levelIdx !== idx || !obj.board) return false;
    // Restore board from colors
    boardEl.innerHTML = '';
    gridBgEl.innerHTML = '';
    board = Array.from({ length: ROWS }, () => new Array(COLS).fill(null));
    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        const color = obj.board[r] && obj.board[r][c];
        if (typeof color === 'number' && color >= 0 && color < NCOLORS) {
          const tile = makeTile(color);
          board[r][c] = tile;
          applyTileSize(tile);
          tile.el.style.transition = 'none';
          tile.el.style.transform  = tileTransform(r, c);
        }
      }
    }
    movesLeft = typeof obj.movesLeft === 'number' ? obj.movesLeft : LEVELS[idx].moves;
    score     = typeof obj.score     === 'number' ? obj.score     : 0;
    return true;
  } catch (e) { return false; }
}

/* ================================================================
 * §16. Native callbacks (game-common §1.3)
 * ================================================================ */
window.onAppPause = function () {
  saveCurrentState(); // snapshot on pause
};

window.onNextLevel = function () {
  if (currentLevelIdx < LEVELS.length - 1) {
    loadLevel(currentLevelIdx + 1);
  }
};

window.onRetryLevel = function () {
  loadLevel(currentLevelIdx);
};

/* ── Back button (game-common §1.4) ──────────────────────────── */
document.getElementById('back-btn').addEventListener('click', e => {
  e.stopPropagation();
  saveCurrentState();
  sendMessage('quit');
});

/* ── Restart button (game-common §1.6) ───────────────────────── */
document.getElementById('restart-btn').addEventListener('click', e => {
  e.stopPropagation();
  if (!busy) loadLevel(currentLevelIdx); // no event sent — in-game reset only
});

/* ================================================================
 * §17. Background canvas — floating particle stars
 * ================================================================ */
const bgCanvas = document.getElementById('bg-canvas');
const bgCtx    = bgCanvas.getContext('2d');
let   particles  = [];
let   bgRafId    = null;

function initParticles() {
  bgCanvas.width  = window.innerWidth;
  bgCanvas.height = window.innerHeight;
  const N = Math.min(70, Math.floor(window.innerWidth * window.innerHeight / 10000));
  particles = Array.from({ length: N }, () => ({
    x:       Math.random() * bgCanvas.width,
    y:       Math.random() * bgCanvas.height,
    r:       Math.random() * 1.4 + 0.3,
    vy:      Math.random() * 0.25 + 0.05,
    opacity: Math.random() * 0.45 + 0.1,
    phase:   Math.random() * Math.PI * 2,
    hue:     250 + Math.random() * 60,
  }));
}

function animateBg(ts) {
  bgCtx.clearRect(0, 0, bgCanvas.width, bgCanvas.height);
  const t = ts * 0.0008;
  particles.forEach(p => {
    p.y -= p.vy;
    if (p.y < -4) { p.y = bgCanvas.height + 4; p.x = Math.random() * bgCanvas.width; }
    const a = p.opacity * (0.65 + 0.35 * Math.sin(t + p.phase));
    bgCtx.beginPath();
    bgCtx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    bgCtx.fillStyle = `hsla(${p.hue},90%,80%,${a})`;
    bgCtx.fill();
  });
  bgRafId = requestAnimationFrame(animateBg);
}

/* ================================================================
 * §18. Boot sequence (game-common §3 waitForNativeInjection)
 * ================================================================ */
function bootGame() {
  // Resolve language
  LANG = getLanguage();
  applyUiFont(LANG);

  // Determine start level
  let startIdx = getInitialLevelIdx();

  // Check native data for saved progress (game-common §4)
  const raw = getInitialData();
  if (raw) {
    try {
      const obj = JSON.parse(raw);
      if (typeof obj.levelIdx === 'number' && obj.levelIdx >= 0) {
        startIdx = Math.min(obj.levelIdx, LEVELS.length - 1);
      }
    } catch (e) { /* malformed data → default */ }
  }

  // Start background animation
  initParticles();
  bgRafId = requestAnimationFrame(animateBg);

  // Load level — try to restore mid-game board first
  currentLevelIdx = startIdx;
  const lv = LEVELS[startIdx];
  movesLeft = lv.moves;
  score     = 0;
  goal      = lv.goal;
  busy      = false;
  ended     = false;
  selected  = null;
  tileIdCtr = 0;

  const restored = tryRestoreState(startIdx);
  if (!restored) {
    fillBoard(true);
  }
  updateLabels();
  updateHUD();
  resize();
}

// Poll for native injection, fallback after 200ms (game-common §3)
(function waitForNativeInjection() {
  const start = Date.now();
  (function check() {
    if (typeof window.currentLevel === 'number' || Date.now() - start > 200) {
      bootGame();
    } else {
      setTimeout(check, 10);
    }
  })();
})();
</script>
