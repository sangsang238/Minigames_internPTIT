<!--
  Runic Blaze — QuanKA
  Match-3 ENDLESS HIGH-SCORE (score-attack), dark-fantasy THEME PHẲNG (flat). Single-file HTML (CSS + JS inline).
  Flat: nền đặc 1 màu, tile khối đặc + viền màu mảnh, glyph nét phẳng, nút/panel phẳng, hạt FX đặc — KHÔNG gradient/glow/gloss/đổ bóng/nút-3D.
  Board: 7×7 | Runes: 5–6 màu | Base match-3 thoả mãn kiểu skydom (nổ liên hoàn), KHÔNG level, KHÔNG giới hạn lượt.
  HAZARD "Hắc Ấn" (cursed rune): định kỳ sinh 1 ô nguyền có SỐ đếm ngược, bất động/không ghép/không đổi;
    mỗi lượt −1; ghép/nổ CẠNH nó (4 hướng) → phá (+250). Về 0 mà chưa phá → detonate → THUA.
    Càng về sau: ngòi ngắn dần (7→3) + dày hơn + tối đa 2 cùng lúc.
  EVENTS: Arcane Surge (mốc 5k → tặng 1 Prism) · Blaze Storm (mốc 12k → biến vài ô thành Blaze rồi nổ dây chuyền).
  Specials: Match-4 → Blaze (nổ hàng/cột) · L/T → Nova (3×3, nổ 2 lần) · Match-5 → Prism (đốt 1 màu) · swap 2 special → combo.
  Khung header + vòng điểm-cao (self-popup, best live, Play Again→retry_level) mô phỏng skydom (HaND);
  thẩm mỹ + cơ chế Hắc Ấn/Events là của riêng runic-blaze. Onboarding carousel phủ lên board (1 scene, không chuyển cảnh).
  Engine: single rAF loop + tween engine dt-based (mượt 60/90/120/144Hz)
  Tuân thủ .claude/game-common.md (bridge §1.1 điểm-cao, i18n 23 ngôn ngữ), popup-common.md, zip-common.md.
-->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<title>Runic Blaze</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Google+Sans+Flex:opsz,wght@6..144,1..1000&display=swap" rel="stylesheet" />
<style>
/* ── Reset + mobile tap fixes (game-common §UI) ───────────────── */
*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  -webkit-tap-highlight-color: transparent;
  -webkit-touch-callout: none;
}

:root {
  --ui-font: 'Google Sans Flex', system-ui, sans-serif;
  /* Background palette — deep purple-black nebula */
  --bg-a: #090614;
  --bg-b: #180b2e;
  --bg-c: #0e0822;
  /* Glass panels */
  --glass: rgba(255,255,255,0.06);
  --glass-border: rgba(255,255,255,0.11);
  /* Text */
  --text: #eddeff;
  --text-soft: rgba(237,222,255,0.5);
  /* Rune colors (0 flame, 1 droplet, 2 leaf, 3 bolt, 4 moon, 5 star) */
  --c0: #ff3d5a;
  --c1: #2f7bff;
  --c2: #2dff8a;
  --c3: #ffb830;
  --c4: #c060ff;
  --c5: #7fefff;
  --sat: env(safe-area-inset-top, 0px);
}

html, body { height: 100%; overflow: hidden; }

body {
  font-family: var(--ui-font);
  font-weight: 700;
  color: var(--text);
  background: var(--bg-c);
  -webkit-user-select: none;
  user-select: none;
  touch-action: none;
}

/* Tiếng Ả Rập: chữ nối liền — bỏ letter-spacing ở MỌI phần tử để không vỡ chữ */
body.lang-ar, body.lang-ar * { letter-spacing: 0 !important; }

/* ── Canvases: nền sao/ember (z0) + FX particles (z60, trên board dưới overlay) ── */
#bg-canvas { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
#fx-canvas { position: fixed; inset: 0; z-index: 60; pointer-events: none; }

/* ── App wrapper ───────────────────────────────────────────────── */
#app {
  position: relative;
  z-index: 1;
  width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* ── Header chuẩn chung: Back | SCORE ★ | BEST ♛ | Volume ──────── */
#topbar {
  width: 100%;
  max-width: 520px;
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 0 max(10px, env(safe-area-inset-right)) 0 max(10px, env(safe-area-inset-left));
  /* padding-top do JS bơm = max(statusBarHeight, env-safe) + 8 */
}

.hud-scores {
  flex: 1;
  min-width: 0;
  display: flex;
  gap: 6px;
}
.hud-pill {
  flex: 1 1 0;
  min-width: 0;
  overflow: hidden;
  background: rgba(20, 12, 40, 0.55);
  border: 2px solid rgba(255, 255, 255, 0.16);
  border-radius: 14px;
  padding: 5px 8px 6px 4px;       /* icon ghim sát mép trái (chuẩn chung) */
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 5px;
}
.pill-text { display: flex; flex-direction: column; align-items: center; min-width: 0; flex: 1 0 auto; }
.pill-ico {
  flex: 0 0 auto;
  width: clamp(16px, 4.8vw, 21px); height: clamp(16px, 4.8vw, 21px); display: block;
}
.hud-pill .label {
  font-size: clamp(9px, 3vw, 12px);
  font-family: system-ui, sans-serif;
  font-weight: 600;
  letter-spacing: 0.5px;
  color: var(--text-soft);
  line-height: 1.05;
  white-space: nowrap;
}
.hud-pill .value {
  font-size: clamp(15px, 4.6vw, 22px);
  line-height: 1.1;
  color: var(--text);
  white-space: nowrap;
  font-weight: 800;
}
#best-val { color: #ffd86b; }     /* BEST accent vàng (chuẩn chung) */

/* ── Mid section: HUD strip + board (đổi trục khi landscape) ──── */
#mid {
  flex: 1;
  width: 100%;
  min-height: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* ── Board ─────────────────────────────────────────────────────── */
#board-outer {
  flex: 1;
  min-height: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  width: 100%;
  padding: 8px;
}

#board-wrap {
  position: relative;
  border-radius: 14px;
  background: rgba(255,255,255,.025);
  border: 1px solid rgba(255,255,255,.07);
  padding: 4px;
  will-change: transform;
}

/* vòng tròn rune mờ xoay chậm phía sau board */
#board-wrap::before {
  content: '';
  position: absolute;
  inset: -14%;
  border-radius: 50%;
  border: 2px dashed rgba(160,90,255,.10);
  animation: runeRing 60s linear infinite;
  pointer-events: none;
}

@keyframes runeRing {
  from { transform: rotate(0deg); }
  to   { transform: rotate(360deg); }
}

#grid-bg {
  position: absolute;
  inset: 4px;
  display: grid;
  pointer-events: none;
  z-index: 0;
}

.slot {
  border-radius: 7px;
  background: rgba(255,255,255,.03);
  border: 1px solid rgba(255,255,255,.06);
  margin: 2px;
}

#board {
  position: relative;
  z-index: 1;
  overflow: hidden;   /* clip tile refill rơi từ phía trên board */
}

/* ── Tiles ─────────────────────────────────────────────────────── */
.tile {
  position: absolute;
  border-radius: 10px;
  cursor: pointer;
  will-change: transform;
  -webkit-user-select: none;
  user-select: none;
}

.tile-inner {
  width: 100%;
  height: 100%;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
}

.tile-inner svg {
  width: 72%;
  height: 72%;
  flex-shrink: 0;
  position: relative;
  z-index: 1;
}

/* Nền khối đặc phẳng theo màu rune (viền màu mảnh, KHÔNG glow) */
.tile-0 .tile-inner { background:#2f0810; border:1.5px solid rgba(255,61,90,.55); }
.tile-1 .tile-inner { background:#08132e; border:1.5px solid rgba(47,123,255,.58); }
.tile-2 .tile-inner { background:#082414; border:1.5px solid rgba(45,255,138,.55); }
.tile-3 .tile-inner { background:#241705; border:1.5px solid rgba(255,184,48,.55); }
.tile-4 .tile-inner { background:#180730; border:1.5px solid rgba(192,96,255,.55); }
.tile-5 .tile-inner { background:#04242c; border:1.5px solid rgba(127,239,255,.62); }
/* Prism — tinh thể ám tím, viền ánh bạc-tím */
.tile-p .tile-inner {
  background:#150e26;
  border: 1.5px solid rgba(216,180,255,.65);
}

/* Cursed rune — ấn nguyền đỏ máu với số đếm ngược (không ghép/đổi được) */
.tile-cursed .tile-inner {
  background:#1a0712;
  border: 1.5px solid rgba(255,60,90,.6);
  cursor: default;
}
.tile-cursed .tile-inner svg { width: 86%; height: 86%; }
.tile-cursed.cursed-urgent .tile-inner { animation: cursePulse .5s ease-in-out infinite; }
@keyframes cursePulse {
  0%, 100% { border-color: rgba(255,60,90,.6); background:#1a0712; }
  50%      { border-color: #ff5a7a; background:#3a0a18; }
}

/* Special: nhịp mờ phẳng (opacity, KHÔNG glow) */
@keyframes specialBreath {
  0%, 100% { opacity: 1; }
  50%       { opacity: .86; }
}
.tile.kind-stripeH .tile-inner, .tile.kind-stripeV .tile-inner,
.tile.kind-nova .tile-inner, .tile.kind-prism .tile-inner {
  animation: specialBreath 1.6s ease-in-out infinite;
}
/* mũi tên stripe chạy shimmer */
@keyframes stripeSlide {
  0%   { opacity: .55; }
  50%  { opacity: 1; }
  100% { opacity: .55; }
}
.tile .stripe-arrows { animation: stripeSlide 1.1s ease-in-out infinite; }
/* lõi prism quay */
@keyframes prismSpin {
  from { transform: rotate(0deg); }
  to   { transform: rotate(360deg); }
}
.tile.kind-prism svg .prism-core { transform-origin: 50px 50px; animation: prismSpin 5s linear infinite; }
/* vòng nova phập phồng */
@keyframes novaPulse {
  0%, 100% { transform: scale(1);    opacity: .85; }
  50%       { transform: scale(1.12); opacity: 1; }
}
.tile.kind-nova svg .nova-ring { transform-origin: 50px 50px; animation: novaPulse 1.2s ease-in-out infinite; }

/* Selected state */
.tile.selected { z-index: 6; }
.tile.selected .tile-inner {
  transform: scale(1.1);
  border-width: 2px !important;
}
.tile-0.selected .tile-inner { box-shadow: 0 0 0 2px rgba(255,61,90,.9); }
.tile-1.selected .tile-inner { box-shadow: 0 0 0 2px rgba(47,123,255,.9); }
.tile-2.selected .tile-inner { box-shadow: 0 0 0 2px rgba(45,255,138,.9); }
.tile-3.selected .tile-inner { box-shadow: 0 0 0 2px rgba(255,184,48,.9); }
.tile-4.selected .tile-inner { box-shadow: 0 0 0 2px rgba(192,96,255,.9); }
.tile-5.selected .tile-inner { box-shadow: 0 0 0 2px rgba(127,239,255,.9); }
.tile-p.selected .tile-inner { box-shadow: 0 0 0 2px rgba(255,255,255,.9); }

/* Hint pulse — gợi ý nước đi */
@keyframes hintPulse {
  0%, 100% { box-shadow: 0 0 0 0 rgba(255,240,120,0); }
  50%       { box-shadow: 0 0 0 4px rgba(255,240,120,.55); }
}
.tile.hint .tile-inner { animation: hintPulse 1.4s ease-in-out infinite; }

/* Shake (swap không hợp lệ) — dùng margin-left để không đè transform vị trí */
@keyframes tileShake {
  0%, 100% { margin-left: 0; }
  20%  { margin-left: -6px; }
  40%  { margin-left: 6px; }
  60%  { margin-left: -4px; }
  80%  { margin-left: 4px; }
}
.tile.shake .tile-inner { animation: tileShake .24s ease-in-out; }

/* Shuffle spin */
@keyframes tileSpin {
  0%   { transform: scale(1) rotate(0deg); }
  45%  { transform: scale(.45) rotate(-24deg); }
  75%  { transform: scale(1.1) rotate(8deg); }
  100% { transform: scale(1) rotate(0deg); }
}
.tile.spin .tile-inner { animation: tileSpin .5s ease-in-out; }

/* ── Score fly-up text ─────────────────────────────────────────── */
.score-fly {
  position: fixed;
  pointer-events: none;
  font-family: var(--ui-font);
  font-weight: 800;
  font-size: 15px;
  color: #fff;
  -webkit-text-stroke: .7px rgba(0,0,0,.5);
  z-index: 200;
  white-space: nowrap;
  animation: scoreFlyUp .9s ease-out forwards;
}

@keyframes scoreFlyUp {
  0%   { opacity: 1; transform: translate(-50%,-50%) scale(1); }
  20%  { opacity: 1; transform: translate(-50%,-80%) scale(1.2); }
  100% { opacity: 0; transform: translate(-50%,-150%) scale(.9); }
}

/* ── Combo badge + chữ khen ────────────────────────────────────── */
#combo-badge {
  position: fixed;
  top: 42%;
  left: 50%;
  transform: translate(-50%, -50%);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
  pointer-events: none;
  z-index: 100;
  opacity: 0;
}
#combo-praise {
  font-size: 26px;
  font-weight: 800;
  letter-spacing: 1px;
}
#combo-mult {
  font-size: 15px;
  letter-spacing: 2px;
  color: #ffe9b0;
}
@keyframes cascadePop {
  0%   { opacity: 0; transform: translate(-50%,-50%) scale(.4); }
  25%  { opacity: 1; transform: translate(-50%,-50%) scale(1.22); }
  60%  { opacity: 1; transform: translate(-50%,-52%) scale(1); }
  100% { opacity: 0; transform: translate(-50%,-64%) scale(.9); }
}
#combo-badge.cascade-anim { animation: cascadePop .8s ease-out forwards; }

/* ── Toast (shuffle / thông báo) ───────────────────────────────── */
#toast {
  position: fixed;
  top: 24%;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(20,10,40,.92);
  border: 1px solid rgba(200,140,255,.35);
  color: #fff;
  border-radius: 14px;
  padding: 10px 20px;
  font-size: 15px;
  z-index: 240;
  opacity: 0;
  pointer-events: none;
  transition: opacity .25s;
  white-space: nowrap;
  max-width: 90vw;
  overflow: hidden;
  text-overflow: ellipsis;
}
#toast.show { opacity: 1; }

/* Banner kết quả (Game Over flash) */
#result-banner {
  position: fixed;
  top: 40%;
  left: 50%;
  transform: translate(-50%,-50%);
  z-index: 220;
  pointer-events: none;
  opacity: 0;
  font-size: 30px;
  font-weight: 800;
  letter-spacing: 1.5px;
  text-align: center;
  color: #fff;
  white-space: nowrap;
}
#result-banner.lose { color: #c060ff; }
@keyframes resultPop {
  0%   { opacity: 0; transform: translate(-50%,-50%) scale(.5); }
  20%  { opacity: 1; transform: translate(-50%,-50%) scale(1.15); }
  38%  { transform: translate(-50%,-50%) scale(1); }
  100% { opacity: 1; transform: translate(-50%,-50%) scale(1); }
}
#result-banner.show { animation: resultPop .9s ease-out forwards; }

/* ── btn3d (game-common §1.4 / popup-common §6 — bản kính phẳng) ── */
.btn3d {
  --radius: 12px;
  --surface-color: rgba(255,255,255,.08);
  --surface-text: var(--text);
  --surface-height: 42px;
  --surface-width: auto;
  --surface-padding-x: 16px;
  --surface-font-size: 18px;
  position: relative;
  display: inline-block;
  padding: 0;
  border: 0;
  background: transparent;
  cursor: pointer;
  font: inherit;
  color: inherit;
  -webkit-user-select: none;
  user-select: none;
}

.btn3d-shadow { display: none; }

.btn3d-surface {
  position: relative;
  z-index: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  height: var(--surface-height);
  width: var(--surface-width);
  padding: 0 var(--surface-padding-x);
  border-radius: var(--radius);
  background: var(--surface-color);
  border: 1px solid var(--glass-border);
  color: var(--surface-text);
  font-family: var(--ui-font);
  font-size: var(--surface-font-size);
  font-weight: 700;
  letter-spacing: .5px;
  transition: transform .09s ease-out, background .1s;
}

.btn3d:active { transform: scale(.94); }
.btn3d:active .btn3d-surface { background: rgba(255,255,255,.14); }

.btn3d.btn-icon {
  --surface-height: 42px;
  --surface-width: 42px;
  --surface-padding-x: 0;
}

/* nút mini (Skip trong tutorial) */
.btn3d.mini {
  --surface-height: 30px;
  --surface-padding-x: 12px;
  --surface-font-size: 13px;
  --radius: 9px;
}

.back-ico    { width: 52%; height: 52%; fill: currentColor; display: block; }
.restart-ico { width: 62%; height: 62%; fill: currentColor; display: block; }
.home-ico    { width: 58%; height: 58%; fill: currentColor; display: block; }
.help-ico    { width: 58%; height: 58%; fill: currentColor; display: block; }
.sound-ico   { width: 58%; height: 58%; fill: currentColor; display: block; }
.ico-diamond { width: 58%; height: 58%; display: block; color: currentColor; }
#sound-btn .ico-off { display: none; }
#sound-btn.muted .ico-on  { display: none; }
#sound-btn.muted .ico-off { display: block; }

/* ── Moves danger flash ────────────────────────────────────────── */
@keyframes dangerPulse {
  0%, 100% { color: #ff3d5a; }
  50%       { color: #ff8080; }
}
.moves-danger { animation: dangerPulse .6s ease-in-out infinite; }

/* ── Game Over popup (game điểm-cao tự vẽ — popup-common §1.1) ─── */
.overlay {
  position: fixed;
  inset: 0;
  z-index: 280;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
  background: rgba(4,2,12,.72);
  opacity: 1;
  transition: opacity .25s;
}
.overlay.hidden { opacity: 0; pointer-events: none; }
.ov-card {
  width: min(84%, 340px);
  padding: 26px 24px 22px;
  text-align: center;
  border-radius: 22px;
  background: #1a0c33;
  border: 1.5px solid rgba(170,110,255,.3);
  transform: scale(1);
  transition: transform .25s;
}
.overlay.hidden .ov-card { transform: scale(.9); }
.ov-title {
  font-size: 30px;
  font-weight: 800;
  letter-spacing: 1px;
  margin-bottom: 16px;
  color: #ffcf6b;
}
.ov-title.newbest { color: #ffe27a; }
.ov-scores { display: flex; justify-content: center; gap: 30px; margin-bottom: 20px; }
.ov-k { font-size: 11px; letter-spacing: 2px; color: var(--text-soft); font-weight: 800; text-transform: uppercase; }
.ov-v { font-size: 32px; color: #fff; font-weight: 800; white-space: nowrap; }
.ov-v.best { color: #ffd23f; }
.btn3d.ov-play {
  --surface-height: 52px;
  --surface-padding-x: 34px;
  --surface-font-size: 18px;
  --surface-color: #ffb02e;
  --surface-text: #3a2400;
  --radius: 16px;
}
.btn3d.ov-play .btn3d-surface { border: none; }
.btn3d.ov-play:active .btn3d-surface { background: var(--surface-color); }

/* ── Onboarding carousel (phủ lên board — 1 scene, không chuyển cảnh) ── */
#onboard {
  position: fixed;
  inset: 0;
  z-index: 250;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
  background: rgba(4,2,12,.78);
  opacity: 1;
  transition: opacity .25s;
}
#onboard.hidden { opacity: 0; pointer-events: none; }
.ob-card {
  width: min(90%, 360px);
  padding: 20px 22px 18px;
  text-align: center;
  border-radius: 22px;
  background: #1a0c33;
  border: 1.5px solid rgba(170,110,255,.3);
  transform: scale(1);
  transition: transform .25s;
}
#onboard.hidden .ob-card { transform: scale(.92); }
.ob-illo {
  height: 96px;
  margin-bottom: 12px;
  display: flex; align-items: center; justify-content: center;
  background: rgba(255,255,255,.03);
  border: 1px solid rgba(255,255,255,.07);
  border-radius: 14px;
}
.ob-illo svg { width: 100%; height: 100%; display: block; }
.ob-title {
  font-size: 21px; font-weight: 800; letter-spacing: .5px;
  color: #ffcf6b;
  margin-bottom: 6px;
}
.ob-desc {
  font-family: system-ui, sans-serif;
  font-size: 13px; font-weight: 500; line-height: 1.5;
  color: rgba(237,222,255,.82);
  min-height: 58px;
  margin-bottom: 10px;
}
.ob-dots { display: flex; justify-content: center; gap: 7px; margin-bottom: 14px; }
.ob-dot { width: 8px; height: 8px; border-radius: 50%; background: rgba(255,255,255,.22); transition: background .2s, transform .2s; }
.ob-dot.on { background: #ffb02e; transform: scale(1.25); }
.ob-nav { display: flex; gap: 12px; justify-content: center; }
.btn3d.ob-skip-btn {
  --surface-height: 46px; --surface-padding-x: 22px; --surface-font-size: 15px;
  --surface-color: #3a2b56;
}

/* ── Pause veil ────────────────────────────────────────────────── */
#pause-veil {
  position: fixed;
  inset: 0;
  z-index: 300;
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(6,3,16,.74);
  opacity: 1;
  transition: opacity .2s;
}
#pause-veil.hidden { opacity: 0; pointer-events: none; }
.pv-txt {
  font-size: 19px;
  color: #fff;

/* ================================================================
 * §1. Native bridge (game-common §1–§4 full compliance)
 * ================================================================ */
function post(msg) {
  try {
    if (window.ReactNativeWebView && window.ReactNativeWebView.postMessage) {
      window.ReactNativeWebView.postMessage(JSON.stringify(msg));
    } else {
      console.log('[runic-blaze → native]', msg);
      devSimulateNative(msg);
    }
  } catch (e) { /* ignore */ }
}

function sendMessage(type, opts) {
  opts = opts || {};
  post({
    type,
    level: null,                       // game điểm-cao KHÔNG level → luôn null
    result: opts.result   ?? null,
    data:   opts.data     ?? null,
    showModal: opts.showModal === true,
  });
}

function saveData(payload) {
  const data = typeof payload === 'string' ? payload : JSON.stringify(payload);
  sendMessage('save_data', { data });
}

/* ── localStorage 2 tầng (game-common §1.2) ──────────────────── */
const LS_KEY = 'runic_blaze_v1';

function saveLocal(payload) {
  try {
    const s = typeof payload === 'string' ? payload : JSON.stringify(payload);
    localStorage.setItem(LS_KEY, s);
  } catch (e) { /* private mode / quota */ }
}

function readLocal() {
  try { return localStorage.getItem(LS_KEY) || ''; } catch (e) { return ''; }
}

/* ?reset=1 → xoá toàn bộ dữ liệu lưu, chơi lại từ đầu (best=0, onboarding hiện lại) */
function isReset() {
  try { return new URLSearchParams(window.location.search).get('reset') === '1'; } catch (e) { return false; }
}

/* ── statusBarHeight (game-common §2 — URL ưu tiên) ──────────── */
function getStatusBarHeight() {
  const params = new URLSearchParams(window.location.search);
  const fromUrl = params.get('statusBarHeight');
  const fromWin = typeof window.statusBarHeight !== 'undefined' ? window.statusBarHeight : null;
  let h = Number(fromUrl != null ? fromUrl : fromWin);
  if (Number.isNaN(h) || h < 0) h = 0;
  return h;
}

/* ── currentLevel (game-common §3 — window ưu tiên) ──────────── */
function getInitialLevelIdx() {
  const fromWin = typeof window.currentLevel === 'number' ? window.currentLevel : null;
  const fromUrl = new URLSearchParams(window.location.search).get('currentLevel');
  const raw = Number(fromWin != null ? fromWin : fromUrl);
  if (!Number.isFinite(raw) || raw < 1) return -1;   // -1 = không có → tự quyết theo saved data
  return Math.min(Math.floor(raw), MAX_LEVEL_IDX + 1) - 1;
}

/* ── data (game-common §4 — window ưu tiên) ──────────────────── */
function getInitialData() {
  const fromWin = typeof window.data === 'string' ? window.data : null;
  const fromUrl = new URLSearchParams(window.location.search).get('data');
  return fromWin != null ? fromWin : (fromUrl || '');
}

/** Gộp data nhẹ (native ưu tiên) + trạng thái ván nặng (localStorage). */
function parseInitialData() {
  if (isReset()) {
    try { localStorage.removeItem(LS_KEY); } catch (e) {}
    return null;   // ván sạch: best=0, tutorialSeen=false → onboarding hiện lại
  }
  let nativeObj = null;
  const raw = getInitialData();
  if (raw) { try { nativeObj = JSON.parse(raw); } catch (e) {} }

  let localObj = null;
  const lraw = readLocal();
  if (lraw) { try { localObj = JSON.parse(lraw); } catch (e) {} }

  if (!nativeObj && !localObj) return null;
  const merged = Object.assign({}, localObj || {}, nativeObj || {});
  if (localObj && localObj.game) merged.game = localObj.game;   // ván nặng chỉ có ở local
  return merged;
}

/* ── Dev simulator: mở bằng browser thường thì tự bấm popup app ─ */
let devTimer = null;
function devSimulateNative(msg) {
  if (window.ReactNativeWebView) return;
  // Endless: game tự vẽ popup Game Over → dev tự bấm Play Again sau ít giây
  if (msg.type === 'game_result') {
    clearTimeout(devTimer);
    devTimer = setTimeout(() => { if (typeof window.onRetryLevel === 'function') window.onRetryLevel(); }, 2500);
  }
}

/* ================================================================
 * §3. Audio — WebAudio synth toàn bộ, không file ngoài
 * ================================================================ */
let audioCtx = null, audioMaster = null, bgmOut = null, sfxOut = null;
let bgmTimer = null, bgmNextT = 0, bgmStep = 0;
let muted = false;

function audioEnsure() {
  if (audioCtx) return true;
  try {
    const AC = window.AudioContext || window.webkitAudioContext;
    if (!AC) return false;
    audioCtx = new AC();
    const comp = audioCtx.createDynamicsCompressor();
    comp.threshold.value = -14; comp.knee.value = 22; comp.ratio.value = 9;
    audioMaster = audioCtx.createGain();
    audioMaster.gain.value = muted ? 0 : 0.9;
    audioMaster.connect(comp); comp.connect(audioCtx.destination);
    // Bus SFX riêng — một núm cân bằng SFX↔BGM, chống cascade cộng dồn vỡ tiếng
    sfxOut = audioCtx.createGain();
    sfxOut.gain.value = 0.8;
    sfxOut.connect(audioMaster);
    const lp = audioCtx.createBiquadFilter();
    lp.type = 'lowpass'; lp.frequency.value = 1650;   // BGM tối màu, vẫn đủ thân cho dây
    bgmOut = audioCtx.createGain();
    bgmOut.gain.value = 0.13;
    bgmOut.connect(lp); lp.connect(audioMaster);
    startBgm();
    return true;
  } catch (e) { return false; }
}

function audioUnlock() {
  if (!audioEnsure()) return;
  if (audioCtx.state === 'suspended') { audioCtx.resume().catch(() => {}); }
}

function setMuted(v) {
  muted = v;
  if (audioMaster) audioMaster.gain.value = muted ? 0 : 0.9;
  document.getElementById('sound-btn').classList.toggle('muted', muted);
  persistBest();
}

/** 1 nốt đơn: osc + envelope. dest mặc định = master. */
function tone(o) {
  if (!audioCtx || muted) return;
  const t0 = audioCtx.currentTime + (o.at || 0);
  const osc = audioCtx.createOscillator();
  osc.type = o.type || 'sine';
  osc.frequency.setValueAtTime(o.freq, t0);
  if (o.slide) osc.frequency.exponentialRampToValueAtTime(Math.max(30, o.slide), t0 + (o.d || 0.15));
  const g = audioCtx.createGain();
  const a = o.a || 0.006, d = o.d || 0.15, peak = o.peak || 0.15;
  g.gain.setValueAtTime(0, t0);
  g.gain.linearRampToValueAtTime(peak, t0 + a);
  g.gain.exponentialRampToValueAtTime(0.0004, t0 + a + d);
  osc.connect(g); g.connect(o.dest || sfxOut);
  osc.start(t0); osc.stop(t0 + a + d + 0.05);
}

/** Noise burst qua bandpass (whoosh/hiss). */
function noiseBurst(o) {
  if (!audioCtx || muted) return;
  const t0 = audioCtx.currentTime + (o.at || 0);
  const d = o.d || 0.2;
  const len = Math.max(1, Math.floor(audioCtx.sampleRate * d));
  const buf = audioCtx.createBuffer(1, len, audioCtx.sampleRate);
  const ch = buf.getChannelData(0);
  for (let i = 0; i < len; i++) ch[i] = Math.random() * 2 - 1;
  const src = audioCtx.createBufferSource();
  src.buffer = buf;
  const bp = audioCtx.createBiquadFilter();
  bp.type = 'bandpass';
  bp.frequency.setValueAtTime(o.f0 || 900, t0);
  if (o.f1) bp.frequency.exponentialRampToValueAtTime(o.f1, t0 + d);
  bp.Q.value = o.q || 1.1;
  const g = audioCtx.createGain();
  g.gain.setValueAtTime(o.peak || 0.12, t0);
  g.gain.exponentialRampToValueAtTime(0.0004, t0 + d);
  src.connect(bp); bp.connect(g); g.connect(o.dest || sfxOut);
  src.start(t0); src.stop(t0 + d + 0.02);
}

/* SFX — thang âm lượng THỐNG NHẤT (peak, sau khi qua sfxOut 0.8):
 *   UI nhẹ  ~.05  (select/button/swap/hint)
 *   phản hồi ~.07 (invalid/moves-low/intro)
 *   pop/forge/stripe/prism/rush ~.10–.11
 *   cao trào hiếm ~.17 (nova/win) — có ducking, không lấn cả bản mix
 * Xoá bỏ chênh lệch cũ (nova .4 vs button .06 ≈ 16 dB). */
function sSelect()  { tone({ freq: 760, type: 'triangle', d: .07, peak: .055 }); }
function sSwap()    {
  // lướt mềm 2 bè sine + swish hẹp băng tần — êm, không rít
  tone({ freq: 420, slide: 640, type: 'sine', a: .008, d: .11, peak: .045 });
  tone({ freq: 840, slide: 1280, type: 'sine', a: .008, d: .09, peak: .018 });
  noiseBurst({ f0: 1400, f1: 2600, d: .09, peak: .02, q: 3 });
}
function sInvalid() { tone({ freq: 150, type: 'square', d: .11, peak: .06 }); tone({ freq: 110, type: 'square', at: .07, d: .12, peak: .06 }); }
function sPop(chain) {
  const pent = [0, 3, 5, 7, 10, 12, 15, 17];
  const semi = pent[Math.min(chain - 1, pent.length - 1)];
  const f = 320 * Math.pow(2, semi / 12);
  tone({ freq: f, type: 'triangle', d: .15, peak: .10 });
  tone({ freq: f * 2, type: 'sine', d: .1, peak: .045 });
  noiseBurst({ f0: 2400, d: .05, peak: .03 });
}
function sForge()   { tone({ freq: 1180, d: .28, peak: .10 }); tone({ freq: 1770, at: .05, d: .3, peak: .055 }); }

/* ── BGM — dark cinematic: string bed trầm + pedal Rê + căng thẳng Neapolitan ──
 * Tâm điệu RÊ THỨ. Vòng 4 hợp âm, mỗi hợp âm giữ 16 bước (~7.3s) → 1 vòng ~29s.
 *   i (Dm) → iv (Gm) → ♭II (E♭, màu Neapolitan/Phrygian) → V (A)
 * Không hợp âm trưởng sáng ở âm khu cao, KHÔNG arp giai điệu (2 thủ phạm gây "vui").
 * Pedal Rê giữ LIÊN TỤC dưới mọi hợp âm → nghịch nhẹ ở E♭/A = trọng lực & sức nặng
 * phim ("epic"); pad là 2 saw lệch nhẹ qua lowpass → thân đàn dây tối thay cho sine ngọt. */
const BGM_STEP_S = 60 / 66 / 2;          // móc đơn ≈ 0.45s
const BGM_CH_STEPS = 16;                  // mỗi hợp âm giữ 16 bước
const BGM_LOOP = BGM_CH_STEPS * 4;        // 64 bước / vòng
const BGM_CHORDS = [
  { notes: [146.83, 174.61, 220.00], swell: 293.66 },  // Dm  D3 F3 A3   · swell D4
  { notes: [146.83, 196.00, 233.08], swell: 293.66 },  // Gm  D3 G3 B♭3  · swell D4
  { notes: [155.56, 196.00, 233.08], swell: 311.13 },  // E♭  E♭3 G3 B♭3 (Neapolitan) · swell E♭4
  { notes: [220.00, 277.18, 329.63], swell: 277.18 },  // A   A3 C#4 E4 (V — căng) · swell C#4
];
const BGM_PEDAL = 73.42;                  // Rê D2 — pedal giữ trọng lực xuyên suốt

/* Một nốt "dây kéo": 2 saw lệch nhẹ qua lowpass động → thân đàn dây tối, sử thi */
function padNote(freq, at, dur, peak) {
  if (!audioCtx || muted) return;
  const t0 = audioCtx.currentTime + at;
  const lp = audioCtx.createBiquadFilter();
  lp.type = 'lowpass'; lp.Q.value = 0.7;
  lp.frequency.setValueAtTime(680, t0);
  lp.frequency.linearRampToValueAtTime(1150, t0 + dur * 0.4);   // "mở vĩ" rồi khép lại
  lp.frequency.linearRampToValueAtTime(620, t0 + dur);
  const g = audioCtx.createGain();
  g.gain.setValueAtTime(0, t0);
  g.gain.linearRampToValueAtTime(peak, t0 + dur * 0.28);        // attack chậm ~kéo vĩ
  g.gain.linearRampToValueAtTime(peak * 0.8, t0 + dur * 0.72);
  g.gain.exponentialRampToValueAtTime(0.0004, t0 + dur);
  lp.connect(g); g.connect(bgmOut);
  [[freq, 0.6], [freq * 1.006, 0.4]].forEach(([f, mix]) => {
    const o = audioCtx.createOscillator();
    o.type = 'sawtooth'; o.frequency.value = f;
    const og = audioCtx.createGain(); og.gain.value = mix;
    o.connect(og); og.connect(lp);
    o.start(t0); o.stop(t0 + dur + 0.1);
  });
  const so = audioCtx.createOscillator();     // lõi sine mỏng cho mượt
  so.type = 'sine'; so.frequency.value = freq;
  const sg = audioCtx.createGain();
  sg.gain.setValueAtTime(0, t0);
  sg.gain.linearRampToValueAtTime(peak * 0.45, t0 + dur * 0.3);
  sg.gain.exponentialRampToValueAtTime(0.0004, t0 + dur);
  so.connect(sg); sg.connect(bgmOut);
  so.start(t0); so.stop(t0 + dur + 0.1);
}

/* Trống trầm sử thi — sine tụt dốc + click thân, nhẹ, mỗi lần đổi hợp âm ("nhịp tim") */
function bgmDrum(at) {
  tone({ freq: 100, type: 'sine', at, d: .55, peak: .12, slide: 44, dest: bgmOut });
  tone({ freq: 150, type: 'triangle', at, d: .12, peak: .05, slide: 60, dest: bgmOut });
}

function startBgm() {
  if (bgmTimer || !audioCtx) return;
  startWind();
  bgmNextT = audioCtx.currentTime + 0.15;
  bgmStep = 0;
  bgmTimer = setInterval(() => {
    if (!audioCtx || audioCtx.state !== 'running' || muted) return;
    const now = audioCtx.currentTime;
    if (bgmNextT < now - 0.4) bgmNextT = now + 0.05;     // chống dồn sau khi resume
    while (bgmNextT < now + 0.3) {
      const at = bgmNextT - now;
      const ci = ((bgmStep / BGM_CH_STEPS) | 0) % 4;
      const chord = BGM_CHORDS[ci];
      const inChord = bgmStep % BGM_CH_STEPS;
      const loopOdd = ((bgmStep / BGM_LOOP) | 0) % 2 === 1;

      if (inChord === 0) {
        const dur = BGM_STEP_S * BGM_CH_STEPS * 1.02;    // giữ trọn hợp âm, hơi gối đầu
        chord.notes.forEach((f, i) => padNote(f, at, dur, i === 0 ? 0.05 : 0.042));
        // pedal Rê liên tục — sub luôn có; octave D3 chỉ khi D thuận (Dm/Gm) để tránh nghịch m2 với E♭
        tone({ freq: BGM_PEDAL, type: 'sine', at, a: .9, d: dur * 1.02, peak: .15, dest: bgmOut });
        if (ci === 0 || ci === 1) tone({ freq: BGM_PEDAL * 2, type: 'sine', at, a: 1.2, d: dur, peak: .045, dest: bgmOut });
        bgmDrum(at);                                     // nhịp tim sử thi mỗi lần đổi hợp âm
      }
      // swell cao thưa — 1 nốt dâng-rồi-tan giữa mỗi hợp âm (thay arp giai điệu)
      if (inChord === 6) {
        const sd = BGM_STEP_S * 7;
        tone({ freq: chord.swell, type: 'triangle', at, a: sd * 0.45, d: sd, peak: loopOdd ? .03 : .022, dest: bgmOut });
      }
      // chuông vọng trầm — một tiếng gần cuối mỗi vòng, như chuông xa trong bóng tối
      if (bgmStep % BGM_LOOP === BGM_CH_STEPS * 3 + 8) {
        tone({ freq: 146.83, type: 'sine', at, a: .012, d: 2.4, peak: .026, dest: bgmOut });
        tone({ freq: 220.00, type: 'sine', at: at + .02, d: 1.6, peak: .01, dest: bgmOut });
      }
      bgmNextT += BGM_STEP_S;
      bgmStep++;
    }
  }, 90);
}

/* Gió rít nền — noise loop lọc trầm, cực khẽ, chạy cùng bgmOut (ăn theo mute) */
let windStarted = false;
function startWind() {
  if (windStarted || !audioCtx) return;
  windStarted = true;
  try {
    const len = Math.floor(audioCtx.sampleRate * 4);
    const buf = audioCtx.createBuffer(1, len, audioCtx.sampleRate);
    const ch = buf.getChannelData(0);
    for (let i = 0; i < len; i++) ch[i] = Math.random() * 2 - 1;
    const src = audioCtx.createBufferSource();
    src.buffer = buf;
    src.loop = true;
    const lp = audioCtx.createBiquadFilter();
    lp.type = 'lowpass';
    lp.frequency.value = 260;
    lp.Q.value = 0.6;
    const g = audioCtx.createGain();
    g.gain.value = 0.02;
    src.connect(lp); lp.connect(g); g.connect(bgmOut);
    src.start();
  } catch (e) { /* ignore */ }
}

/* Nhún BGM khi có khoảnh khắc lớn (fanfare thắng/thua) rồi bò lại */
function duckBgm(dur) {
  if (!audioCtx || !bgmOut) return;
  try {
    const t = audioCtx.currentTime;
    bgmOut.gain.cancelScheduledValues(t);
    bgmOut.gain.setValueAtTime(bgmOut.gain.value, t);
    bgmOut.gain.linearRampToValueAtTime(0.035, t + 0.08);
    bgmOut.gain.linearRampToValueAtTime(0.13, t + (dur || 2.2));
  } catch (e) { /* ignore */ }
}

/* ================================================================

const inb = (r, c) => r >= 0 && r < ROWS && c >= 0 && c < COLS;
const $ = id => document.getElementById(id);

/* ================================================================
 * §5. rAF main loop + tween engine (dt-based — mượt mọi Hz)
 * ================================================================ */
const easeOutCubic = k => 1 - Math.pow(1 - k, 3);
const easeInCubic  = k => k * k * k;
const easeOutBack  = k => { const c = 1.70158; return 1 + (c + 1) * Math.pow(k - 1, 3) + c * Math.pow(k - 1, 2); };
const easeOutQuint = k => 1 - Math.pow(1 - k, 5);
const easeInOutQ   = k => (k < .5 ? 2 * k * k : 1 - Math.pow(-2 * k + 2, 2) / 2);
const easeLinear   = k => k;

let tweens = [];
/** tween({dur, ease, update(k), done}) → Promise. Tự đóng băng khi paused. */
function tween(opts) {
  return new Promise(res => {
    tweens.push({ t: 0, dur: Math.max(1, opts.dur), ease: opts.ease || easeOutCubic,
                  update: opts.update || null, done: opts.done || null, res });
  });
}
/** sleep pause-aware — mọi nhịp gameplay đi qua đây. */
const sleep = ms => tween({ dur: ms });

function stepTweens(dt) {
  if (!tweens.length) return;
  const keep = [];
  for (let i = 0; i < tweens.length; i++) {
    const tw = tweens[i];
    tw.t += dt;
    const k = tw.t >= tw.dur ? 1 : tw.ease(tw.t / tw.dur);
    if (tw.update) { try { tw.update(k); } catch (e) {} }
    if (tw.t >= tw.dur) {
      if (tw.done) { try { tw.done(); } catch (e) {} }
      tw.res();
    } else keep.push(tw);
  }
  tweens = keep;
}

/** Huỷ mọi tween ngay (resolve hết để pipeline không treo) — dùng khi loadLevel. */
function flushTweens() {
  const old = tweens;
  tweens = [];
  for (const tw of old) { if (tw.update) { try { tw.update(1); } catch (e) {} } tw.res(); }
}

/* screen shake — biên độ giảm dần theo hàm mũ */
let shakeAmp = 0;
function screenShake(a) { shakeAmp = Math.max(shakeAmp, a); }
function stepShake(dt) {
  if (shakeAmp <= 0.25) {
    if (shakeAmp !== 0) { shakeAmp = 0; wrapEl.style.transform = ''; }
    return;
  }
  shakeAmp *= Math.exp(-dt / 110);
  const dx = (Math.random() * 2 - 1) * shakeAmp;
  const dy = (Math.random() * 2 - 1) * shakeAmp;
  wrapEl.style.transform = `translate(${dx.toFixed(1)}px,${dy.toFixed(1)}px)`;
}

/* score hiển thị đuổi theo score thật (count-up) */
let dispScore = 0;
function stepScoreHud(dt) {
  if (dispScore === score) return;
  const diff = score - dispScore;
  const step = Math.max(1, Math.abs(diff) * Math.min(1, dt / 110));
  dispScore = diff > 0 ? Math.min(score, dispScore + step) : score;
  $('score-val').textContent = Math.round(dispScore);
}

let lastTs = 0, timeMs = 0;
function mainLoop(ts) {
  requestAnimationFrame(mainLoop);
  if (!lastTs) { lastTs = ts; return; }
  let dt = ts - lastTs;
  lastTs = ts;
  if (dt > 100) dt = 100;
  if (dt < 0) dt = 0;

  if (!paused) {
    timeMs += dt;
    stepTweens(dt);
    stepShake(dt);
    stepScoreHud(dt);
    stepIdleHint(dt);
    stepParticles(dt);
    if (pendingRelayout && !busy) { pendingRelayout = false; layoutAllStatic(); }
  }
  if (!menuOpen && !paused) stepBg(dt);   // menu che kín / pause: khỏi vẽ nền
  drawFx();
}

/* ================================================================
 * §6. Rune art — SVG builders (glyph + overlay special)
 * ================================================================ */
/* Sigil khắc PHẲNG — 2 nét: thân màu rune + nét phụ tím nhạt (KHÔNG bloom/glow).
 * Thẩm mỹ dark fantasy phẳng: nét khắc arcane đặc trên đá obsidian, KHÔNG bóng kẹo. */
function glyphStrokes(hex, d, extra) {
  return `<path d="${d}" fill="none" stroke="${hex}" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>`
       + `<path d="${d}" fill="none" stroke="#f4ecff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>`
       + (extra || '');
}

function runeGlyph(color) {
  switch (color) {
    case 0: // FLAME — ngọn lửa gãy khúc
      return glyphStrokes('#ff3d5a',
        'M50 12 L63 35 L55 42 L69 58 L50 88 L31 58 L45 42 L37 35 Z',
        glyphStrokes('#ff8fa3', 'M50 56 L56 66 L50 78 L44 66 Z'));
    case 1: // WATER — giọt kết tinh + gợn sóng
      return glyphStrokes('#2f7bff',
        'M50 12 L67 44 L62 72 L50 84 L38 72 L33 44 Z',
        glyphStrokes('#a9ccff', 'M39 58 L45 52 L50 58 L55 52 L61 58'));
    case 2: // NATURE — rune cây cổ, nhánh vươn lên
      return glyphStrokes('#2dff8a',
        'M50 86 L50 22 M50 42 L32 26 M50 42 L68 26 M50 64 L36 52 M50 64 L64 52');
    case 3: // BOLT — tia sét
      return glyphStrokes('#ffb830',
        'M57 10 L35 48 L49 50 L41 90 L67 46 L52 44 Z');
    case 4: // MOON — trăng khuyết + tinh tú
      return glyphStrokes('#c060ff',
        'M62 13 A37 37 0 1 0 62 87 A29 29 0 1 1 62 13 Z',
        '<circle cx="35" cy="35" r="3" fill="#e0aaff"/><circle cx="29" cy="55" r="2.2" fill="#e0aaff"/><circle cx="35" cy="70" r="2.6" fill="#e0aaff"/>');
    case 5: // STAR — sao 4 cánh
      return glyphStrokes('#7fefff',
        'M50 10 L58 42 L90 50 L58 58 L50 90 L42 58 L10 50 L42 42 Z',
        '<circle cx="50" cy="50" r="4.5" fill="#fff"/>');
  }
  return '';
}

/* Overlay special — nét ether trắng đặc phẳng, cùng ngôn ngữ sigil */
function overlayStroke(d) {
  return `<path d="${d}" fill="none" stroke="#fff" stroke-width="3.6" stroke-linecap="round" stroke-linejoin="round"/>`;
}

function specialOverlay(kind) {
  if (kind === K_SH) {
    return `<g class="stripe-arrows">
      ${overlayStroke('M28 50 L8 50 M16 41 L8 50 L16 59')}
      ${overlayStroke('M72 50 L92 50 M84 41 L92 50 L84 59')}
    </g>`;
  }
  if (kind === K_SV) {
    return `<g class="stripe-arrows">
      ${overlayStroke('M50 28 L50 8 M41 16 L50 8 L59 16')}
      ${overlayStroke('M50 72 L50 92 M41 84 L50 92 L59 84')}
    </g>`;
  }
  if (kind === K_NOVA) {
    return `<g class="nova-ring">
      <circle cx="50" cy="50" r="34" fill="none" stroke="#fff" stroke-width="3.5" stroke-dasharray="9 7"/>
      <circle cx="50" cy="50" r="43" fill="none" stroke="#7fefff" stroke-width="2"/>
      <path d="M50 2 L53 10 L50 18 L47 10 Z" fill="#fff"/>
      <path d="M50 2 L53 10 L50 18 L47 10 Z" fill="#fff" transform="rotate(90 50 50)"/>
      <path d="M50 2 L53 10 L50 18 L47 10 Z" fill="#fff" transform="rotate(180 50 50)"/>
      <path d="M50 2 L53 10 L50 18 L47 10 Z" fill="#fff" transform="rotate(270 50 50)"/>
    </g>`;
  }
  return '';
}

function prismArt() {
  // tinh thể ám tím + vòng phép quay với nan quang phổ mờ — huyền bí, không "kẹo"
  const cols = ['#ff3d5a', '#ffb830', '#2dff8a', '#7fefff', '#2f7bff', '#c060ff'];
  let spokes = '', ticks = '';
  for (let i = 0; i < 6; i++) {
    const a = (i * 60 - 90) * Math.PI / 180;
    const x1 = 50 + 20 * Math.cos(a), y1 = 50 + 20 * Math.sin(a);
    const x2 = 50 + 38 * Math.cos(a), y2 = 50 + 38 * Math.sin(a);
    spokes += `<path d="M${x1.toFixed(1)} ${y1.toFixed(1)} L${x2.toFixed(1)} ${y2.toFixed(1)}" stroke="${cols[i]}" stroke-width="3.2" stroke-linecap="round"/>`;
    ticks += `<circle cx="${x2.toFixed(1)}" cy="${y2.toFixed(1)}" r="2.6" fill="${cols[i]}"/>`;
  }
  return `<g class="prism-core">
      <circle cx="50" cy="50" r="43" fill="none" stroke="#7a5aad" stroke-width="2" stroke-dasharray="7 6"/>
      ${spokes}${ticks}
    </g>
    <path d="M50 24 L66 44 L50 76 L34 44 Z" fill="#5a3a9e" stroke="#e6d2ff" stroke-width="3" stroke-linejoin="round"/>
    <path d="M50 24 L50 76 M34 44 L66 44" fill="none" stroke="#c9b4ff" stroke-width="1.6"/>
    <circle cx="50" cy="47" r="5.5" fill="#fff"/>`;
}

/* Cursed rune — ấn nguyền đỏ máu: đĩa tối viền đỏ, gai + xích, SỐ đếm ngược lớn */
function cursedArt(n) {
  return `<circle cx="50" cy="50" r="41" fill="#1a0712" stroke="#c01a3e" stroke-width="4"/>`
       + `<path d="M50 11 L56 23 L50 19 L44 23 Z" fill="#ff3d5a"/>`
       + `<path d="M21 41 Q13 50 21 59 M79 41 Q87 50 79 59" fill="none" stroke="#ff6a86" stroke-width="3" stroke-linecap="round"/>`
       + `<text x="50" y="67" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-weight="900" font-size="46" fill="#ffd23f" stroke="#5a0616" stroke-width="1.6" paint-order="stroke">${n}</text>`;
}

function tileSVG(color, kind) {
  if (kind === K_CURSED) return cursedArt(0);   // số thật do renderCursed() đặt sau khi morph
  if (kind === K_PRISM) return prismArt();
