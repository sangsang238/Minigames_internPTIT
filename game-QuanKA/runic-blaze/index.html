let idleMs = 0;
let hintCells = [];       // tiles đang nháy hint
let lastSwapCells = null; // [{r,c},{r,c}] của swap gần nhất — đặt special đúng chỗ

const boardEl  = document.getElementById('board');
const wrapEl   = document.getElementById('board-wrap');
const gridBgEl = document.getElementById('grid-bg');

const inb = (r, c) => r >= 0 && r < ROWS && c >= 0 && c < COLS;
const $ = id => document.getElementById(id);

/* ================================================================
 * §5. rAF main loop + tween engine (dt-based — mượt mọi Hz)
 * ================================================================ */
const easeOutCubic = k => 1 - Math.pow(1 - k, 3);
const easeInCubic  = k => k * k * k;
const easeOutBack  = k => { const c = 1.70158; return 1 + (c + 1) * Math.pow(k - 1, 3) + c * Math.pow(k - 1, 2); };
const easeOutQuint = k => 1 - Math.pow(1 - k, 5);
const easeInOutQ   = k => (k < .5 ? 2 * k * k : 1 - Math.pow(-2 * k + 2, 2) / 2);
const easeLinear   = k => k;

let tweens = [];
/** tween({dur, ease, update(k), done}) → Promise. Tự đóng băng khi paused. */
function tween(opts) {
  return new Promise(res => {
    tweens.push({ t: 0, dur: Math.max(1, opts.dur), ease: opts.ease || easeOutCubic,
                  update: opts.update || null, done: opts.done || null, res });
  });
}
/** sleep pause-aware — mọi nhịp gameplay đi qua đây. */
const sleep = ms => tween({ dur: ms });

function stepTweens(dt) {
  if (!tweens.length) return;
  const keep = [];
  for (let i = 0; i < tweens.length; i++) {
    const tw = tweens[i];
    tw.t += dt;
    const k = tw.t >= tw.dur ? 1 : tw.ease(tw.t / tw.dur);
    if (tw.update) { try { tw.update(k); } catch (e) {} }
    if (tw.t >= tw.dur) {
      if (tw.done) { try { tw.done(); } catch (e) {} }
      tw.res();
    } else keep.push(tw);
  }
  tweens = keep;
}

/** Huỷ mọi tween ngay (resolve hết để pipeline không treo) — dùng khi loadLevel. */
function flushTweens() {
  const old = tweens;
  tweens = [];
  for (const tw of old) { if (tw.update) { try { tw.update(1); } catch (e) {} } tw.res(); }
}

/* screen shake — biên độ giảm dần theo hàm mũ */
let shakeAmp = 0;
function screenShake(a) { shakeAmp = Math.max(shakeAmp, a); }
function stepShake(dt) {
  if (shakeAmp <= 0.25) {
    if (shakeAmp !== 0) { shakeAmp = 0; wrapEl.style.transform = ''; }
    return;
  }
  shakeAmp *= Math.exp(-dt / 110);
  const dx = (Math.random() * 2 - 1) * shakeAmp;
  const dy = (Math.random() * 2 - 1) * shakeAmp;
  wrapEl.style.transform = `translate(${dx.toFixed(1)}px,${dy.toFixed(1)}px)`;
}

/* score hiển thị đuổi theo score thật (count-up) */
let dispScore = 0;
function stepScoreHud(dt) {
  if (dispScore === score) return;
  const diff = score - dispScore;
  const step = Math.max(1, Math.abs(diff) * Math.min(1, dt / 110));
  dispScore = diff > 0 ? Math.min(score, dispScore + step) : score;
  $('score-val').textContent = Math.round(dispScore);
}

let lastTs = 0, timeMs = 0;
function mainLoop(ts) {
  requestAnimationFrame(mainLoop);
  if (!lastTs) { lastTs = ts; return; }
  let dt = ts - lastTs;
  lastTs = ts;
  if (dt > 100) dt = 100;
  if (dt < 0) dt = 0;

  if (!paused) {
    timeMs += dt;
    stepTweens(dt);
    stepShake(dt);
    stepScoreHud(dt);
    stepIdleHint(dt);
    stepParticles(dt);
    if (pendingRelayout && !busy) { pendingRelayout = false; layoutAllStatic(); }
  }
  if (!menuOpen && !paused) stepBg(dt);   // menu che kín / pause: khỏi vẽ nền
  drawFx();
}

/* ================================================================
 * §6. Rune art — SVG builders (glyph + overlay special)
 * ================================================================ */
/* Sigil khắc PHẲNG — 2 nét: thân màu rune + nét phụ tím nhạt (KHÔNG bloom/glow).
 * Thẩm mỹ dark fantasy phẳng: nét khắc arcane đặc trên đá obsidian, KHÔNG bóng kẹo. */
function glyphStrokes(hex, d, extra) {
  return `<path d="${d}" fill="none" stroke="#fff" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>`
       + (extra || '');
}

function runeGlyph(color) {
  switch (color) {
    case 0: // FLAME — ngọn lửa gãy khúc
      return glyphStrokes('#ff3d5a',
        'M50 12 L63 35 L55 42 L69 58 L50 88 L31 58 L45 42 L37 35 Z',
        glyphStrokes('#ff8fa3', 'M50 56 L56 66 L50 78 L44 66 Z'));
    case 1: // WATER — giọt kết tinh + gợn sóng
      return glyphStrokes('#2f7bff',
        'M50 12 L67 44 L62 72 L50 84 L38 72 L33 44 Z',
        glyphStrokes('#a9ccff', 'M39 58 L45 52 L50 58 L55 52 L61 58'));
    case 2: // NATURE — rune cây cổ, nhánh vươn lên
      return glyphStrokes('#2dff8a',
        'M50 86 L50 22 M50 42 L32 26 M50 42 L68 26 M50 64 L36 52 M50 64 L64 52');
    case 3: // BOLT — tia sét
      return glyphStrokes('#ffb830',
        'M57 10 L35 48 L49 50 L41 90 L67 46 L52 44 Z');
    case 4: // MOON — trăng khuyết + tinh tú
      return glyphStrokes('#c060ff',
        'M62 13 A37 37 0 1 0 62 87 A29 29 0 1 1 62 13 Z',
        '<circle cx="35" cy="35" r="3" fill="#fff"/><circle cx="29" cy="55" r="2.2" fill="#fff"/><circle cx="35" cy="70" r="2.6" fill="#fff"/>');
    case 5: // STAR — sao 4 cánh
      return glyphStrokes('#7fefff',
        'M50 10 L58 42 L90 50 L58 58 L50 90 L42 58 L10 50 L42 42 Z',
        '<circle cx="50" cy="50" r="4.5" fill="#fff"/>');
  }
  return '';
}

/* Icon special — THAY HẲN glyph rune bằng 1 icon trắng đậm duy nhất (không vẽ
   chồng lên rune nữa): tile giữ MÀU nền, icon nói rõ "đây là special gì". */
function specialIcon(kind) {
  if (kind === K_SH) {
    // mũi tên 2 đầu NGANG — quét nguyên hàng
    return `<g class="stripe-arrows">
      <path d="M8 50 L30 32 L30 42 L70 42 L70 32 L92 50 L70 68 L70 58 L30 58 L30 68 Z"
            fill="#fff" stroke="rgba(0,0,0,.18)" stroke-width="2" stroke-linejoin="round"/>
    </g>`;
  }
  if (kind === K_SV) {
    // mũi tên 2 đầu DỌC — quét nguyên cột
    return `<g class="stripe-arrows">
      <path d="M8 50 L30 32 L30 42 L70 42 L70 32 L92 50 L70 68 L70 58 L30 58 L30 68 Z"
            fill="#fff" stroke="rgba(0,0,0,.18)" stroke-width="2" stroke-linejoin="round"
            transform="rotate(90 50 50)"/>
    </g>`;
  }
  if (kind === K_NOVA) {
    // ngôi sao nổ 8 cánh — vụ nổ 3×3
    return `<g class="nova-ring">
      <path d="M50 8 L56.5 34.3 L79.7 20.3 L65.7 43.5 L92 50 L65.7 56.5 L79.7 79.7 L56.5 65.7 L50 92 L43.5 65.7 L20.3 79.7 L34.3 56.5 L8 50 L34.3 43.5 L20.3 20.3 L43.5 34.3 Z"
            fill="#fff" stroke="rgba(0,0,0,.18)" stroke-width="2" stroke-linejoin="round"/>
    </g>`;
  }
  return '';
}

function prismArt() {
  // tinh thể trắng lớn + 6 chấm màu TĨNH quanh viền — "thiêu 1 màu bất kỳ",
  // không vòng xoay/nan hoa (gọn, phẳng)
  const cols = ['#df5b4c', '#d89a3a', '#5aa85f', '#d76f9c', '#4a86c5', '#8f6fbf'];
  let dots = '';
  for (let i = 0; i < 6; i++) {
    const a = (i * 60 - 90) * Math.PI / 180;
    const x = 50 + 41 * Math.cos(a), y = 50 + 41 * Math.sin(a);
    dots += `<circle cx="${x.toFixed(1)}" cy="${y.toFixed(1)}" r="5" fill="${cols[i]}"/>`;
  }
  return `${dots}
    <path d="M50 18 L70 42 L50 82 L30 42 Z" fill="#eef1f6" stroke="#fff" stroke-width="3" stroke-linejoin="round"/>
    <path d="M50 18 L50 82 M30 42 L70 42" fill="none" stroke="rgba(0,0,0,.3)" stroke-width="1.6"/>
    <circle cx="50" cy="45" r="5.5" fill="#fff"/>`;
}

/* Cursed rune — ấn nguyền đỏ máu: đĩa tối viền đỏ, gai + xích, SỐ đếm ngược lớn */
function cursedArt(n) {
  return `<circle cx="50" cy="50" r="41" fill="#5f2a2f" stroke="#e05a4d" stroke-width="4"/>`
       + `<path d="M50 11 L56 23 L50 19 L44 23 Z" fill="#ffd257"/>`
       + `<path d="M21 41 Q13 50 21 59 M79 41 Q87 50 79 59" fill="none" stroke="rgba(255,255,255,.55)" stroke-width="3" stroke-linecap="round"/>`
       + `<text x="50" y="67" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-weight="900" font-size="46" fill="#ffd23f" stroke="#3a1214" stroke-width="1.6" paint-order="stroke">${n}</text>`;
}

function tileSVG(color, kind) {
  if (kind === K_CURSED) return cursedArt(0);   // số thật do renderCursed() đặt sau khi morph
  if (kind === K_PRISM) return prismArt();
  if (kind === K_SH || kind === K_SV || kind === K_NOVA) return specialIcon(kind);
  return runeGlyph(color);
}

/* ================================================================
 * §7. Tile DOM helpers
 * ================================================================ */
function tileClass(color, kind) {
  if (kind === K_CURSED) return 'tile tile-cursed';
  let c = 'tile ' + (kind === K_PRISM ? 'tile-p' : 'tile-' + color);
  if (kind === K_SH)    c += ' kind-stripeH';
  if (kind === K_SV)    c += ' kind-stripeV';
  if (kind === K_NOVA)  c += ' kind-nova';
  if (kind === K_PRISM) c += ' kind-prism';
  return c;
}

function makeTile(color, kind) {
  kind = kind || K_NORMAL;
  const el = document.createElement('div');
  el.className = tileClass(color, kind);
  el.innerHTML = `<div class="tile-inner"><svg viewBox="0 0 100 100" aria-hidden="true">${tileSVG(color, kind)}</svg></div>`;
  boardEl.appendChild(el);
  const tile = { id: ++tileIdCtr, color, kind, el, x: 0, y: 0, boomed: false };
  applyTileSize(tile);
  return tile;
}

/** Đổi kind tại chỗ (forge special / prism-convert). */
function morphTile(tile, color, kind) {
  tile.color = color;
  tile.kind = kind;
  tile.el.className = tileClass(color, kind);
  tile.el.querySelector('svg').innerHTML = tileSVG(color, kind);
}

function applyTileSize(tile) {
  tile.el.style.width  = (cellPx - 4) + 'px';
  tile.el.style.height = (cellPx - 4) + 'px';
}

const cellXY = (r, c) => ({ x: c * cellPx + 2, y: r * cellPx + 2 });

function setTilePos(tile, x, y) {
  tile.x = x; tile.y = y;
  tile.el.style.transform = `translate3d(${x}px,${y}px,0)`;
}

function placeTile(tile, r, c) { const p = cellXY(r, c); setTilePos(tile, p.x, p.y); }

/** Tween tile tới ô (r,c). */
function moveTileTo(tile, r, c, dur, ease) {
  const p = cellXY(r, c);
  const x0 = tile.x, y0 = tile.y;
  if (x0 === p.x && y0 === p.y) return Promise.resolve();
  return tween({ dur, ease: ease || easeOutCubic,
    update(k) { setTilePos(tile, x0 + (p.x - x0) * k, y0 + (p.y - y0) * k); } });
}

/** Scale/opacity trên .tile-inner (transform ngoài giữ vị trí). */
function tweenInner(tile, from, to, dur, ease, fade) {
  const inner = tile.el.firstChild;
  return tween({ dur, ease: ease || easeOutCubic,
    update(k) {
      const s = from + (to - from) * k;
      inner.style.transform = `scale(${s})`;
      if (fade) inner.style.opacity = String(Math.max(0, 1 - k));
    } });
}

/** Pop-clear: phồng lên rồi sập về 0 + mờ dần. */
function clearAnim(tile, dur) {
  const inner = tile.el.firstChild;
  return tween({ dur: dur || 270, ease: easeLinear,
    update(k) {
      let s, o;
      if (k < 0.38) { s = 1 + 0.4 * (k / 0.38); o = 1; }
      else { const j = (k - 0.38) / 0.62; s = 1.4 * (1 - j); o = 1 - j; }
      inner.style.transform = `scale(${s})`;
      inner.style.opacity = String(o);
    } });
}

function layoutAllStatic() {
  if (board.length !== ROWS) return;   // board chưa dựng (đang ở menu/boot)
  for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) {
    const tile = board[r][c];
    if (tile) { applyTileSize(tile); placeTile(tile, r, c); }
  }
}

/* ================================================================
 * §8. Resize / DPR / landscape (đa ratio + statusBarHeight §2)
 * ================================================================ */
const bgCanvas = $('bg-canvas'), bgCtx = bgCanvas.getContext('2d');
const fxCanvas = $('fx-canvas'), fxCtx = fxCanvas.getContext('2d');
let DPR = 1;

let envSafeTop = 0;
function measureEnvSafeTop() {
  const probe = document.createElement('div');
  probe.style.cssText = 'position:fixed;top:0;left:0;height:env(safe-area-inset-top,0px);width:1px;pointer-events:none;visibility:hidden';
  document.body.appendChild(probe);
  envSafeTop = probe.offsetHeight || 0;
  probe.remove();
}

function sizeCanvas(cv, ctx, dpr) {
  cv.width  = Math.floor(window.innerWidth * dpr);
  cv.height = Math.floor(window.innerHeight * dpr);
  cv.style.width  = window.innerWidth + 'px';
  cv.style.height = window.innerHeight + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}

function resize() {
  DPR = Math.min(window.devicePixelRatio || 1, 3);
  measureEnvSafeTop();   // đo lại — safe-area đổi khi xoay máy
  sizeCanvas(bgCanvas, bgCtx, Math.min(DPR, 1.5));  // nền mờ ảo — không cần DPR cao
  sizeCanvas(fxCanvas, fxCtx, Math.min(DPR, 2));
  initBgItems();

  const topPad = Math.max(getStatusBarHeight(), envSafeTop) + 8;
  $('topbar').style.paddingTop = topPad + 'px';

  document.body.classList.toggle('landscape', window.innerWidth > window.innerHeight * 1.25);

  // đo sau khi layout ổn định
  requestAnimationFrame(() => {
    const outer = $('board-outer');
    const availW = outer.clientWidth - 16;
    const availH = outer.clientHeight - 8;
    const boardPx = Math.min(availW, availH, 520);
    cellPx = Math.max(30, Math.floor((boardPx - 8) / COLS));
    const sz = cellPx * COLS;

    boardEl.style.width   = sz + 'px';
    boardEl.style.height  = sz + 'px';
    boardEl.style.position = 'relative';
    boardEl.style.left    = '0px';
    boardEl.style.top     = '0px';
    wrapEl.style.width    = (sz + 8) + 'px';
    wrapEl.style.height   = (sz + 8) + 'px';
    gridBgEl.style.width  = sz + 'px';
    gridBgEl.style.height = sz + 'px';
    gridBgEl.style.gridTemplateColumns = `repeat(${COLS},1fr)`;
    gridBgEl.style.gridTemplateRows    = `repeat(${ROWS},1fr)`;

    if (gridBgEl.children.length !== ROWS * COLS) {
      gridBgEl.innerHTML = '';
      for (let i = 0; i < ROWS * COLS; i++) {
        const s = document.createElement('div');
        s.className = 'slot';
        gridBgEl.appendChild(s);
      }
    }
    if (busy) pendingRelayout = true;
    else layoutAllStatic();
  });
}

window.addEventListener('resize', resize);
window.addEventListener('orientationchange', () => setTimeout(resize, 120));
if (document.fonts && document.fonts.ready) document.fonts.ready.then(() => resize());

/* ================================================================
 * §9. Board generation — không match sẵn + chắc chắn có nước đi
 * ================================================================ */
const randColor = () => Math.floor(Math.random() * nColors);

function genColorGrid() {
  const g = Array.from({ length: ROWS }, () => new Array(COLS).fill(0));
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      let col, tries = 0;
      do {
        col = randColor();
        tries++;
      } while (tries < 30 && (
        (c >= 2 && g[r][c - 1] === col && g[r][c - 2] === col) ||
        (r >= 2 && g[r - 1][c] === col && g[r - 2][c] === col)
      ));
      g[r][c] = col;
    }
  }
  return g;
}

/** Grid màu thuần có match qua ô (r,c) không (sau swap giả định). */
function gridRunAt(g, r, c) {
  const col = g[r][c];
  let n = 1;
  for (let i = c - 1; i >= 0 && g[r][i] === col; i--) n++;
  for (let i = c + 1; i < COLS && g[r][i] === col; i++) n++;
  if (n >= 3) return true;
  n = 1;
  for (let i = r - 1; i >= 0 && g[i][c] === col; i--) n++;
  for (let i = r + 1; i < ROWS && g[i][c] === col; i++) n++;
  return n >= 3;
}

function gridHasMove(g) {
  for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) {
    if (c + 1 < COLS) {
      [g[r][c], g[r][c + 1]] = [g[r][c + 1], g[r][c]];
      const ok = gridRunAt(g, r, c) || gridRunAt(g, r, c + 1);
      [g[r][c], g[r][c + 1]] = [g[r][c + 1], g[r][c]];
      if (ok) return true;
    }
    if (r + 1 < ROWS) {
      [g[r][c], g[r + 1][c]] = [g[r + 1][c], g[r][c]];
      const ok = gridRunAt(g, r, c) || gridRunAt(g, r + 1, c);
      [g[r][c], g[r + 1][c]] = [g[r + 1][c], g[r][c]];
      if (ok) return true;
    }
  }
  return false;
}

/** Dựng board mới với hiệu ứng nở stagger. Trả Promise xong animation. */
function fillBoard() {
  let grid = null;
  for (let a = 0; a < 40; a++) {
    const g = genColorGrid();
    if (gridHasMove(g)) { grid = g; break; }
  }
  if (!grid) grid = genColorGrid();   // 7×7/5 màu gần như luôn có move

  board = Array.from({ length: ROWS }, () => new Array(COLS).fill(null));
  const anims = [];
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const tile = makeTile(grid[r][c]);
      board[r][c] = tile;
      placeTile(tile, r, c);
      const inner = tile.el.firstChild;
      inner.style.transform = 'scale(0)';
      anims.push((async () => {
        await sleep((r + c) * 20);
        await tweenInner(tile, 0, 1, 230, easeOutBack);
        inner.style.transform = '';
      })());
    }
  }
  return Promise.all(anims);
}

/* ================================================================
 * §10. Match detection — run scan + gộp cụm (L/T) + luật special
 * ================================================================ */
function collectRuns() {
  const runs = [];
  // ngang
  for (let r = 0; r < ROWS; r++) {
    let c = 0;
    while (c < COLS) {
      const t = board[r][c];
      if (!t || t.kind === K_PRISM || t.kind === K_CURSED) { c++; continue; }
      let j = c + 1;
      while (j < COLS && board[r][j] && board[r][j].kind !== K_PRISM && board[r][j].kind !== K_CURSED && board[r][j].color === t.color) j++;
      if (j - c >= 3) {
        const cells = [];
        for (let k = c; k < j; k++) cells.push({ r, c: k });
        runs.push({ cells, horiz: true, color: t.color });
      }
      c = j;
    }
  }
  // dọc
  for (let c = 0; c < COLS; c++) {
    let r = 0;
    while (r < ROWS) {
      const t = board[r][c];
      if (!t || t.kind === K_PRISM || t.kind === K_CURSED) { r++; continue; }
      let j = r + 1;
      while (j < ROWS && board[j][c] && board[j][c].kind !== K_PRISM && board[j][c].kind !== K_CURSED && board[j][c].color === t.color) j++;
      if (j - r >= 3) {
        const cells = [];
        for (let k = r; k < j; k++) cells.push({ r: k, c });
        runs.push({ cells, horiz: false, color: t.color });
      }
      r = j;
    }
  }
  return runs;
}

/** Gộp run giao nhau thành cluster; tính special sinh ra theo luật. */
function findMatchClusters() {
  const runs = collectRuns();
  if (!runs.length) return [];

  // union-find trên runs qua ô chung
  const parent = runs.map((_, i) => i);
  const find = i => (parent[i] === i ? i : (parent[i] = find(parent[i])));
  const cellOwner = new Map();
  runs.forEach((run, i) => {
    run.cells.forEach(({ r, c }) => {
      const key = r * COLS + c;
      if (cellOwner.has(key)) {
        const a = find(i), b = find(cellOwner.get(key));
        if (a !== b) parent[a] = b;
      } else cellOwner.set(key, i);
    });
  });

  const groups = new Map();
  runs.forEach((run, i) => {
    const root = find(i);
    if (!groups.has(root)) groups.set(root, []);
    groups.get(root).push(run);
  });

  const clusters = [];
  groups.forEach(runList => {
    const cellSet = new Map();   // key -> {r,c}
    let maxRun = 0, hasH = false, hasV = false;
    runList.forEach(run => {
      maxRun = Math.max(maxRun, run.cells.length);
      if (run.horiz) hasH = true; else hasV = true;
      run.cells.forEach(cell => cellSet.set(cell.r * COLS + cell.c, cell));
    });
    const cells = [...cellSet.values()];
    const color = runList[0].color;

    let spawnKind = K_NORMAL;
    if (maxRun >= 5) spawnKind = K_PRISM;
    else if (hasH && hasV) spawnKind = K_NOVA;
    else if (maxRun === 4) spawnKind = runList.find(x => x.cells.length === 4).horiz ? K_SH : K_SV;

    // vị trí spawn: ưu tiên ô swap gần nhất ∈ cluster (và là tile thường), rồi giao điểm, rồi giữa run dài nhất
    let spawnAt = null;
    if (spawnKind !== K_NORMAL) {
      const isNormalAt = cell => { const tl = board[cell.r][cell.c]; return tl && tl.kind === K_NORMAL; };
      if (lastSwapCells) {
        spawnAt = cells.find(cl => lastSwapCells.some(s => s.r === cl.r && s.c === cl.c) && isNormalAt(cl)) || null;
      }
      if (!spawnAt && hasH && hasV) {
        // giao điểm của run ngang và dọc
        const hCells = new Set();
        runList.filter(x => x.horiz).forEach(x => x.cells.forEach(cl => hCells.add(cl.r * COLS + cl.c)));
        spawnAt = cells.find(cl => {
          if (!hCells.has(cl.r * COLS + cl.c) || !isNormalAt(cl)) return false;
          return runList.some(x => !x.horiz && x.cells.some(v => v.r === cl.r && v.c === cl.c));
        }) || null;
      }
      if (!spawnAt) {
        const longest = runList.slice().sort((a, b) => b.cells.length - a.cells.length)[0];
        const mid = longest.cells[Math.floor(longest.cells.length / 2)];
        spawnAt = isNormalAt(mid) ? mid : cells.find(isNormalAt) || null;
      }
    }
    clusters.push({ cells, color, spawnKind, spawnAt });
  });
  return clusters;
}

/** Màu phổ biến nhất trên board (cho prism bị nổ lây). */
function mostCommonColor() {
  const cnt = new Array(6).fill(0);
  for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) {
    const tl = board[r][c];
    if (tl && tl.kind !== K_PRISM && tl.kind !== K_CURSED) cnt[tl.color]++;
  }
  let best = 0;
  for (let i = 1; i < 6; i++) if (cnt[i] > cnt[best]) best = i;
  return best;
}

/** Lan kích hoạt: từ tập ô bị xoá ban đầu → specials nổ dây chuyền.
 *  Trả { toClear:Set(idx), activated:[{r,c,kind,color,first}] }. */
function expandClears(initialCells) {
  const toClear = new Set();
  const visited = new Set();   // dedup riêng — toClear.delete (nova sống sót) không mở lại ô
  const activated = [];
  const queue = initialCells.slice();

  while (queue.length) {
    const { r, c } = queue.shift();
    if (!inb(r, c)) continue;
    const idx = r * COLS + c;
    if (visited.has(idx)) continue;
    const tile = board[r][c];
    if (!tile) continue;
    visited.add(idx);
    toClear.add(idx);

    if (tile.kind === K_SH) {
      activated.push({ r, c, kind: K_SH, color: tile.color });
      for (let cc = 0; cc < COLS; cc++) queue.push({ r, c: cc });
    } else if (tile.kind === K_SV) {
      activated.push({ r, c, kind: K_SV, color: tile.color });
      for (let rr = 0; rr < ROWS; rr++) queue.push({ r: rr, c });
    } else if (tile.kind === K_NOVA) {
      if (!tile.boomed) {
        // nổ lần 1: quét 3×3 nhưng bản thân sống sót (rơi xuống, nổ tiếp wave sau)
        tile.boomed = true;
        toClear.delete(idx);
        activated.push({ r, c, kind: K_NOVA, color: tile.color, first: true });
      } else {
        activated.push({ r, c, kind: K_NOVA, color: tile.color, first: false });
      }
      for (let dr = -1; dr <= 1; dr++) for (let dc = -1; dc <= 1; dc++) {
        if (dr || dc) queue.push({ r: r + dr, c: c + dc });
      }
    } else if (tile.kind === K_PRISM) {
      // prism bị cuốn vào vụ nổ → tự thiêu màu đông nhất
      const target = mostCommonColor();
      activated.push({ r, c, kind: K_PRISM, color: target });
      for (let rr = 0; rr < ROWS; rr++) for (let cc = 0; cc < COLS; cc++) {
        const u = board[rr][cc];
        if (u && u.kind !== K_PRISM && u.kind !== K_CURSED && u.color === target) queue.push({ r: rr, c: cc });
      }
    }
  }
  return { toClear, activated };
}

/* ================================================================
 * §11. Nước đi hợp lệ / hint / shuffle chống deadlock
 * ================================================================ */
function swapIsMatch(r1, c1, r2, c2) {
  const a = board[r1][c1], b = board[r2][c2];
  if (!a || !b) return false;
  board[r1][c1] = b; board[r2][c2] = a;
  const ok = liveRunAt(r1, c1) || liveRunAt(r2, c2);
  board[r1][c1] = a; board[r2][c2] = b;
  return ok;
}

function liveRunAt(r, c) {
  const t = board[r][c];
  if (!t || t.kind === K_PRISM || t.kind === K_CURSED) return false;
  const col = t.color;
  const same = (rr, cc) => {
    const u = inb(rr, cc) ? board[rr][cc] : null;
    return u && u.kind !== K_PRISM && u.kind !== K_CURSED && u.color === col;
  };
  let n = 1;
  for (let i = c - 1; same(r, i); i--) n++;
  for (let i = c + 1; same(r, i); i++) n++;
  if (n >= 3) return true;
  n = 1;
  for (let i = r - 1; same(i, c); i--) n++;
  for (let i = r + 1; same(i, c); i++) n++;
  return n >= 3;
}

/** Tìm 1 nước đi (kèm loại): prism-swap và special+special cũng là nước đi. */
function findHintMove() {
  const dirs = [[0, 1], [1, 0]];
  const movable = t => t && t.kind !== K_CURSED;   // blight không đổi chỗ được
  // ưu tiên nước match thường để hint dễ hiểu
  for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) {
    for (const [dr, dc] of dirs) {
      const r2 = r + dr, c2 = c + dc;
      if (!inb(r2, c2) || !movable(board[r][c]) || !movable(board[r2][c2])) continue;
      if (swapIsMatch(r, c, r2, c2)) return { r1: r, c1: c, r2, c2 };
    }
  }
  for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) {
    const a = board[r][c];
    if (!movable(a)) continue;
    for (const [dr, dc] of dirs) {
      const r2 = r + dr, c2 = c + dc;
      if (!inb(r2, c2)) continue;
      const b = board[r2][c2];
      if (!movable(b)) continue;
      if (a.kind === K_PRISM || b.kind === K_PRISM) return { r1: r, c1: c, r2, c2 };
      if (a.kind !== K_NORMAL && b.kind !== K_NORMAL) return { r1: r, c1: c, r2, c2 };
    }
  }
  return null;
}

/** Xáo màu tile thường (special giữ nguyên chỗ) tới khi có nước đi & không match sẵn. */
async function shuffleBoard(ep) {
  const normals = [];
  for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) {
    const tl = board[r][c];
    if (tl && tl.kind === K_NORMAL) normals.push(tl);
  }
  if (normals.length < 4) return;

  showToast(t('shuffled'));
  sShuffle();
  // spin animation toàn board
  for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) {
    const tl = board[r][c];
    if (tl) {
      tl.el.classList.remove('spin');
      void tl.el.offsetWidth;
      tl.el.classList.add('spin');
    }
  }

  let colors = normals.map(tl => tl.color);
  let done = false;
  for (let a = 0; a < 60 && !done; a++) {
    for (let i = colors.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [colors[i], colors[j]] = [colors[j], colors[i]];
    }
    normals.forEach((tl, i) => { tl.color = colors[i]; });
    if (!collectRuns().length && findHintMove()) done = true;
  }
  // áp màu mới vào DOM (kể cả lần thử cuối chưa "done" — hiếm, chấp nhận)
  normals.forEach(tl => morphTile(tl, tl.color, K_NORMAL));
  await sleep(520);
  if (ep !== levelEpoch) return;
  // nếu vẫn bị match sẵn (cực hiếm) → cho nổ như cascade thường, không tính move
  const clusters = findMatchClusters();
  if (clusters.length) await resolveBoard(ep, 0);
}

/** Sau mỗi lần settle: không còn nước đi → tự xáo (miễn phí). */
async function ensureMovable(ep) {
  let guard = 0;
  while (ep === levelEpoch && !findHintMove() && guard++ < 5) {
    showToast(t('noMoves'));
    await sleep(500);
    if (ep !== levelEpoch) return;
    await shuffleBoard(ep);
  }
}

/* ================================================================
 * §12. Background canvas — tinh vân + sao + tàn lửa (dt-based)
 * ================================================================ */
let bgStars = [], bgEmbers = [];
let emberSprite = null;   // sprite vẽ sẵn — không shadowBlur per-frame (đắt trên WebView)

function makeEmberSprite() {
  emberSprite = document.createElement('canvas');
  emberSprite.width = 32; emberSprite.height = 32;
  const c = emberSprite.getContext('2d');
  c.fillStyle = 'rgba(255,140,40,.55)';
  c.beginPath(); c.arc(16, 16, 7, 0, Math.PI * 2); c.fill();
}

function initBgItems() {
  if (!emberSprite) makeEmberSprite();
  const W = window.innerWidth, H = window.innerHeight;
  const nStars = Math.min(90, Math.floor(W * H / 9000));
  bgStars = Array.from({ length: nStars }, () => ({
    x: Math.random() * W, y: Math.random() * H,
    r: Math.random() * 1.4 + 0.3,
    vy: Math.random() * 8 + 2,             // px/s trôi lên
    op: Math.random() * 0.45 + 0.1,
    ph: Math.random() * Math.PI * 2,
    col: `hsl(${Math.round(250 + Math.random() * 60)},90%,80%)`,   // string tính sẵn
  }));
  bgEmbers = Array.from({ length: 14 }, () => ({
    x: Math.random() * W, y: Math.random() * H,
    vy: Math.random() * 26 + 14,
    wob: Math.random() * Math.PI * 2,
    r: Math.random() * 2.2 + 1.2,
  }));
}

function stepBg(dt) {
  const W = window.innerWidth, H = window.innerHeight;
  const s = dt / 1000;
  bgCtx.clearRect(0, 0, W, H);
  const tw = timeMs * 0.001;
  for (const p of bgStars) {
    p.y -= p.vy * s;
    if (p.y < -4) { p.y = H + 4; p.x = Math.random() * W; }
    bgCtx.globalAlpha = p.op * (0.65 + 0.35 * Math.sin(tw * 2 + p.ph));
    bgCtx.fillStyle = p.col;
    bgCtx.beginPath();
    bgCtx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    bgCtx.fill();
  }
  for (const e of bgEmbers) {
    e.y -= e.vy * s;
    e.wob += s * 2.2;
    e.x += Math.sin(e.wob) * 14 * s;
    if (e.y < -6) { e.y = H + 6; e.x = Math.random() * W; }
    bgCtx.globalAlpha = 0.32 + 0.22 * Math.sin(e.wob * 1.7);
    const d = e.r * 7;
    bgCtx.drawImage(emberSprite, e.x - d / 2, e.y - d / 2, d, d);
  }
  bgCtx.globalAlpha = 1;
}

/* ================================================================
 * §13. FX canvas — particles / beam / nova ring / prism arc
 * ================================================================ */
const RUNE_HEX = ['#df5b4c', '#4a86c5', '#5aa85f', '#d89a3a', '#8f6fbf', '#d76f9c', '#ffffff'];
let particles = [];
const MAX_PARTICLES = 420;

function boardCellCenter(r, c) {
  const rect = boardEl.getBoundingClientRect();
  return { x: rect.left + c * cellPx + cellPx / 2, y: rect.top + r * cellPx + cellPx / 2 };
}

function spawnBurst(x, y, hex, n, power) {
  n = Math.min(n, MAX_PARTICLES - particles.length);
  for (let i = 0; i < n; i++) {
    const ang = Math.random() * Math.PI * 2;
    const sp = (Math.random() * 0.55 + 0.45) * (power || 220);
    particles.push({
      type: 'dot', x, y,
      vx: Math.cos(ang) * sp, vy: Math.sin(ang) * sp - 60,
      g: 620, life: 0, max: 500 + Math.random() * 300,
      size: Math.random() * 3.2 + 1.6, col: hex,
      shape: Math.random() < 0.3 ? 'diamond' : 'dot',
    });
  }
}

function spawnBeam(r, c, horiz, hex) {
  if (particles.length >= MAX_PARTICLES) return;
  const rect = boardEl.getBoundingClientRect();
  particles.push({
    type: 'beam', horiz, col: hex, life: 0, max: 430,
    x: rect.left, y: rect.top,
    row: r, colIdx: c, w: rect.width, h: rect.height,
  });
}

function spawnRing(x, y, hex, rMax) {
  if (particles.length >= MAX_PARTICLES) return;
  particles.push({ type: 'ring', x, y, col: hex, life: 0, max: 460, rMax: rMax || cellPx * 2 });
}

function spawnArc(x0, y0, x1, y1, hex) {
  if (particles.length >= MAX_PARTICLES) return;
  particles.push({ type: 'arc', x0, y0, x1, y1, col: hex, life: 0, max: 340 });
}

function spawnFlash(x, y, rMax) {
  if (particles.length >= MAX_PARTICLES) return;
  particles.push({ type: 'flash', x, y, life: 0, max: 300, rMax: rMax || cellPx * 1.4 });
}

function stepParticles(dt) {
  if (!particles.length) return;
  const s = dt / 1000;
  let anyDead = false;
  for (const p of particles) {
    p.life += dt;
    if (p.life >= p.max) anyDead = true;
    if (p.type === 'dot') {
      p.x += (p.vx + 0.5 * p.g * s) * s;
      p.y += (p.vy + 0.5 * p.g * s) * s;
      p.vy += p.g * s;
    }
  }
  if (anyDead) particles = particles.filter(p => p.life < p.max);
}

let fxHadContent = false;
function drawFx() {
  if (!particles.length) {
    // chỉ clear MỘT lần sau khi hết particle — không clear full canvas mỗi frame
    if (fxHadContent) { fxCtx.clearRect(0, 0, window.innerWidth, window.innerHeight); fxHadContent = false; }
    return;
  }
  fxHadContent = true;
  fxCtx.clearRect(0, 0, window.innerWidth, window.innerHeight);
  for (const p of particles) {
    const k = p.life / p.max;
    const a = 1 - k;
    if (p.type === 'dot') {
      fxCtx.globalAlpha = a;
      fxCtx.fillStyle = p.col;
      if (p.shape === 'diamond') {
        fxCtx.save();
        fxCtx.translate(p.x, p.y);
        fxCtx.rotate(k * 4);
        fxCtx.fillRect(-p.size, -p.size, p.size * 2, p.size * 2);
        fxCtx.restore();
      } else {
        fxCtx.beginPath();
        fxCtx.arc(p.x, p.y, p.size * (1 - k * 0.5), 0, Math.PI * 2);
        fxCtx.fill();
      }
    } else if (p.type === 'beam') {
      const grow = Math.min(1, p.life / 130);
      const th = cellPx * 0.85 * (k < 0.5 ? 1 : 1 - (k - 0.5) * 2);
      fxCtx.globalAlpha = a;
      if (p.horiz) {
        const y = p.y + p.row * cellPx + cellPx / 2;
        const cx = p.x + p.colIdx * cellPx + cellPx / 2;
        const half = p.w * grow;
        fxCtx.fillStyle = p.col;
        fxCtx.fillRect(cx - half, y - th / 2, half * 2, th);
      } else {
        const x = p.x + p.colIdx * cellPx + cellPx / 2;
        const cy = p.y + p.row * cellPx + cellPx / 2;
        const half = p.h * grow;
        fxCtx.fillStyle = p.col;
        fxCtx.fillRect(x - th / 2, cy - half, th, half * 2);
      }
    } else if (p.type === 'ring') {
      const rr = p.rMax * easeOutCubic(k);
      fxCtx.globalAlpha = a;
      fxCtx.lineWidth = 4 * (1 - k) + 1;
      fxCtx.strokeStyle = p.col;
      fxCtx.beginPath();
      fxCtx.arc(p.x, p.y, rr, 0, Math.PI * 2);
      fxCtx.stroke();
    } else if (p.type === 'arc') {
      // tia sét răng cưa nối 2 điểm — re-jag mỗi frame cho cảm giác lách tách
      fxCtx.globalAlpha = a;
      const segs = 7;
      const dx = (p.x1 - p.x0) / segs, dy = (p.y1 - p.y0) / segs;
      const len = Math.hypot(p.x1 - p.x0, p.y1 - p.y0) || 1;
      const nx = -(p.y1 - p.y0) / len, ny = (p.x1 - p.x0) / len;
      fxCtx.beginPath();
      fxCtx.moveTo(p.x0, p.y0);
      for (let i = 1; i < segs; i++) {
        const off = (Math.random() * 2 - 1) * 10;
        fxCtx.lineTo(p.x0 + dx * i + nx * off, p.y0 + dy * i + ny * off);
      }
      fxCtx.lineTo(p.x1, p.y1);
      fxCtx.lineWidth = 3.4;
      fxCtx.strokeStyle = p.col;
      fxCtx.stroke();
      fxCtx.lineWidth = 1.4;
      fxCtx.strokeStyle = '#fff';
      fxCtx.stroke();
    } else if (p.type === 'flash') {
      const rr = p.rMax * easeOutCubic(k);
      fxCtx.globalAlpha = 0.5 * a;
      fxCtx.fillStyle = '#ffffff';
      fxCtx.beginPath();
      fxCtx.arc(p.x, p.y, Math.max(1, rr), 0, Math.PI * 2);
      fxCtx.fill();
    }
  }
  fxCtx.globalAlpha = 1;
  fxCtx.globalCompositeOperation = 'source-over';
}

/* ================================================================
 * §14. Wave execution — xoá + FX + forge special + gravity/refill
 * ================================================================ */
function fireActivationFx(activated) {
  (async () => {
    let i = 0;
    for (const act of activated) {
      if (i > 0) await sleep(Math.min(70, 500 / activated.length));
      const ctr = boardCellCenter(act.r, act.c);
      const hex = RUNE_HEX[act.color != null ? act.color : 6];
      if (act.kind === K_SH)      { spawnBeam(act.r, act.c, true, hex);  sStripe(); }
      else if (act.kind === K_SV) { spawnBeam(act.r, act.c, false, hex); sStripe(); }
      else if (act.kind === K_NOVA) {
        spawnRing(ctr.x, ctr.y, hex, cellPx * (act.first ? 2 : 2.6));
        spawnFlash(ctr.x, ctr.y, cellPx * 1.6);
        sNova();
        screenShake(act.first ? 6 : 9);
      } else if (act.kind === K_PRISM) {
        spawnFlash(ctr.x, ctr.y, cellPx * 2.2);
        sPrismCast();
        // vài tia arc toả ra các ô cùng màu
        let shots = 0;
        for (let r = 0; r < ROWS && shots < 8; r++) for (let c = 0; c < COLS && shots < 8; c++) {
          const u = board[r][c];
          if (u && u.kind !== K_PRISM && u.color === act.color && Math.random() < 0.5) {
            const p2 = boardCellCenter(r, c);
            spawnArc(ctr.x, ctr.y, p2.x, p2.y, RUNE_HEX[act.color]);
            shots++;
          }
        }
        screenShake(8);
      }
      i++;
    }
  })();
}

/** Thực thi 1 wave xoá. Trả điểm cộng được. */
async function executeWave(ep, chain, initialCells, clusters) {
  const { toClear, activated } = expandClears(initialCells);

  // giữ lại ô spawn special (không xoá — sẽ morph thành special)
  const spawns = [];
  for (const cl of (clusters || [])) {
    if (cl.spawnKind !== K_NORMAL && cl.spawnAt) {
      const idx = cl.spawnAt.r * COLS + cl.spawnAt.c;
      if (toClear.has(idx)) { toClear.delete(idx); spawns.push(cl); }
    }
  }
  // PURGE: blight kề (4 hướng) bất kỳ ô bị xoá đều được thanh tẩy
  let purged = 0;
  {
    const adj = [];
    toClear.forEach(idx => {
      const r = Math.floor(idx / COLS), c = idx % COLS;
      for (const [rr, cc] of [[r - 1, c], [r + 1, c], [r, c - 1], [r, c + 1]]) {
        if (!inb(rr, cc)) continue;
        const tl = board[rr][cc];
        if (tl && tl.kind === K_CURSED) adj.push(rr * COLS + cc);
      }
    });
    for (const idx of adj) if (!toClear.has(idx)) { toClear.add(idx); purged++; }
  }
  if (!toClear.size && !activated.length) return 0;

  const mult = Math.min(chain, CHAIN_CAP);
  const pts = toClear.size * PTS_PER_TILE * mult + activated.length * SPECIAL_BONUS + purged * CURSE_DEFUSE_BONUS;
  score += pts;
  bumpBest();

  sPop(chain);
  if (chain >= 2) showComboBadge(chain);

  // score fly tại trọng tâm cụm
  let sr = 0, sc = 0, n = 0;
  toClear.forEach(idx => { sr += Math.floor(idx / COLS); sc += idx % COLS; n++; });
  if (n) spawnScoreFly(sr / n, sc / n, pts, mult);

  fireActivationFx(activated);
  if (activated.length) screenShake(Math.min(4 + activated.length * 2, 13));
  else if (toClear.size >= 6) screenShake(2.5);

  // absorb: ô của cluster có spawn bị hút về phía special mới
  const absorbTarget = new Map();
  for (const cl of spawns) {
    const p = cellXY(cl.spawnAt.r, cl.spawnAt.c);
    cl.cells.forEach(cell => {
      const idx = cell.r * COLS + cell.c;
      if (toClear.has(idx)) absorbTarget.set(idx, p);
    });
  }

  const origin = activated.length ? activated[0] : null;
  const anims = [];
  toClear.forEach(idx => {
    const r = Math.floor(idx / COLS), c = idx % COLS;
    const tile = board[r][c];
    if (!tile) return;
    board[r][c] = null;              // model cập nhật ngay — anim chỉ là hình ảnh
    const d = origin ? (Math.abs(r - origin.r) + Math.abs(c - origin.c)) : 0;
    const delay = Math.min(d * 26, 240);
    const absorb = absorbTarget.get(idx) || null;
    anims.push((async () => {
      if (delay) await sleep(delay);
      const ctr = boardCellCenter(r, c);
      spawnBurst(ctr.x, ctr.y, tile.kind === K_CURSED ? CURSE_HEX : RUNE_HEX[tile.kind === K_PRISM ? 6 : tile.color], 7, 240);
      if (absorb) {
        const x0 = tile.x, y0 = tile.y;
        await tween({ dur: 200, ease: easeInCubic, update(k) {
          setTilePos(tile, x0 + (absorb.x - x0) * k, y0 + (absorb.y - y0) * k);
          tile.el.firstChild.style.transform = `scale(${1 - 0.7 * k})`;
          tile.el.firstChild.style.opacity = String(1 - k * 0.8);
        } });
      } else {
        await clearAnim(tile);
      }
      if (tile.el.parentNode) tile.el.parentNode.removeChild(tile.el);
    })());
  });
  await Promise.all(anims);
  if (ep !== levelEpoch) return pts;

  // forge specials
  for (const cl of spawns) {
    const tile = board[cl.spawnAt.r][cl.spawnAt.c];
    if (!tile) continue;
    morphTile(tile, cl.spawnKind === K_PRISM ? 0 : cl.color, cl.spawnKind);
    sForge();
    const ctr = boardCellCenter(cl.spawnAt.r, cl.spawnAt.c);
    spawnRing(ctr.x, ctr.y, RUNE_HEX[cl.spawnKind === K_PRISM ? 6 : cl.color], cellPx * 1.2);
    const inner = tile.el.firstChild;
    tweenInner(tile, 0.35, 1, 280, easeOutBack).then(() => { inner.style.transform = ''; inner.style.opacity = ''; });
  }
  return pts;
}

/** Gravity + refill — thời lượng rơi theo khoảng cách, có squash khi chạm đáy. */
async function gravityAndRefill(ep) {
  const moves = [];
  for (let c = 0; c < COLS; c++) {
    let write = ROWS - 1;
    for (let r = ROWS - 1; r >= 0; r--) {
      if (board[r][c]) {
        if (r !== write) {
          const tile = board[r][c];
          board[write][c] = tile;
          board[r][c] = null;
          const dist = write - r;
          moves.push(moveTileTo(tile, write, c, 130 + dist * 52, easeInCubic).then(() => landSquash(tile)));
        }
        write--;
      }
    }
    const emptyN = write + 1;
    for (let r = write; r >= 0; r--) {
      const tile = makeTile(randColor());
      board[r][c] = tile;
      const p0 = cellXY(r - emptyN, c);
      setTilePos(tile, p0.x, p0.y);
      const dist = emptyN;
      moves.push(moveTileTo(tile, r, c, 160 + dist * 52, easeInCubic).then(() => landSquash(tile)));
    }
  }
  if (moves.length) await Promise.all(moves);
}

function landSquash(tile) {
  const inner = tile.el.firstChild;
  tween({ dur: 130, ease: easeOutCubic, update(k) {
    const s = 1 - 0.16 * Math.sin(k * Math.PI);
    inner.style.transform = `scaleY(${s}) scaleX(${2 - s > 1.08 ? 1.08 : 2 - s})`;
  }, done() { inner.style.transform = ''; } });
}

/** Vòng cascade chính: match/nova-chờ-nổ → wave → gravity → lặp. */
async function resolveBoard(ep, chain) {
  while (ep === levelEpoch) {
    const forced = [];
    for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) {
      const tl = board[r][c];
      if (tl && tl.kind === K_NOVA && tl.boomed) forced.push({ r, c });
    }
    const clusters = findMatchClusters();
    if (!clusters.length && !forced.length) break;
    chain++;
    const initial = [];
    clusters.forEach(cl => cl.cells.forEach(cell => initial.push(cell)));
    forced.forEach(f => initial.push(f));
    await executeWave(ep, chain, initial, clusters);
    if (ep !== levelEpoch) return;
    await gravityAndRefill(ep);
    if (ep !== levelEpoch) return;
    await sleep(50);
  }
}

/* ================================================================
 * §15. Swap + combo 2 special
 * ================================================================ */
function comboOf(a, b) {
  const ka = a.kind, kb = b.kind;
  if (ka === K_PRISM && kb === K_PRISM) return 'pp';
  if (ka === K_PRISM || kb === K_PRISM) {
    const other = ka === K_PRISM ? kb : ka;
    if (other === K_SH || other === K_SV) return 'ps';
    if (other === K_NOVA) return 'pn';
    return 'pc';
  }
  const isStripe = k => k === K_SH || k === K_SV;
  if (isStripe(ka) && isStripe(kb)) return 'ss';
  if ((isStripe(ka) && kb === K_NOVA) || (ka === K_NOVA && isStripe(kb))) return 'sn';
  if (ka === K_NOVA && kb === K_NOVA) return 'nn';
  return null;
}

async function runCombo(ep, type, a, b) {
  // vị trí hiện tại (sau swap)
  let pa = null, pb = null;
  for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) {
    if (board[r][c] === a) pa = { r, c };
    if (board[r][c] === b) pb = { r, c };
  }
  if (!pa || !pb) return;
  const initial = [];
  score += SPECIAL_BONUS;   // thưởng combo swap

  if (type === 'pp') {
    const ctr = boardCellCenter(pa.r, pa.c);
    spawnFlash(ctr.x, ctr.y, Math.max(window.innerWidth, window.innerHeight) * 0.5);
    sPrismCast(); sNova();
    screenShake(16);
    a.kind = K_NORMAL; b.kind = K_NORMAL;
    for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) initial.push({ r, c });
    await sleep(240);
    if (ep !== levelEpoch) return;
  } else if (type === 'pc' || type === 'ps' || type === 'pn') {
    const prism = a.kind === K_PRISM ? a : b;
    const pp = a.kind === K_PRISM ? pa : pb;
    const other = prism === a ? b : a;
    const targetColor = other.color;
    const pCtr = boardCellCenter(pp.r, pp.c);
    sPrismCast();
    // arc tới từng tile cùng màu, stagger; ps/pn: morph thành stripe/nova
    const targets = [];
    for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) {
      const u = board[r][c];
      if (u && u !== prism && u.kind !== K_PRISM && u.kind !== K_CURSED && u.color === targetColor) targets.push({ r, c, u });
    }
    const per = Math.min(60, 700 / Math.max(1, targets.length));
    for (const tg of targets) {
      if (ep !== levelEpoch) return;
      const c2 = boardCellCenter(tg.r, tg.c);
      spawnArc(pCtr.x, pCtr.y, c2.x, c2.y, RUNE_HEX[targetColor]);
      sZap();
      if (type === 'ps' && tg.u.kind === K_NORMAL) {
        morphTile(tg.u, targetColor, Math.random() < 0.5 ? K_SH : K_SV);
      } else if (type === 'pn' && tg.u.kind === K_NORMAL) {
        morphTile(tg.u, targetColor, K_NOVA);
        tg.u.boomed = true;    // nổ ngay full 3×3 trong wave này
      }
      await sleep(per);
    }
    prism.kind = K_NORMAL;   // prism không tự kích hoạt lại trong expand
    initial.push(pp);
    targets.forEach(tg => initial.push({ r: tg.r, c: tg.c }));
    await sleep(140);
    if (ep !== levelEpoch) return;
  } else if (type === 'ss') {
    // đảm bảo chéo chữ thập: 1 ngang + 1 dọc
    a.kind = K_SH; b.kind = K_SV;
    initial.push(pa, pb);
  } else if (type === 'sn') {
    // chữ thập dày 3 hàng + 3 cột quanh vị trí nova
    const nova = a.kind === K_NOVA ? a : b;
    const np = nova === a ? pa : pb;
    a.kind = K_NORMAL; b.kind = K_NORMAL;
    sStripe(); sNova();
    for (let dr = -1; dr <= 1; dr++) {
      const rr = np.r + dr;
      if (rr >= 0 && rr < ROWS) { spawnBeam(rr, np.c, true, RUNE_HEX[nova.color]); for (let c = 0; c < COLS; c++) initial.push({ r: rr, c }); }
    }
    for (let dc = -1; dc <= 1; dc++) {
      const cc = np.c + dc;
      if (cc >= 0 && cc < COLS) { spawnBeam(np.r, cc, false, RUNE_HEX[nova.color]); for (let r = 0; r < ROWS; r++) initial.push({ r, c: cc }); }
    }
    initial.push(pa, pb);
    screenShake(12);
  } else if (type === 'nn') {
    // 5×5 quanh trung điểm
    a.kind = K_NORMAL; b.kind = K_NORMAL;
    sNova();
    const ctr = boardCellCenter(pb.r, pb.c);
    spawnRing(ctr.x, ctr.y, RUNE_HEX[b.color], cellPx * 3.4);
    spawnFlash(ctr.x, ctr.y, cellPx * 2.6);
    for (let dr = -2; dr <= 2; dr++) for (let dc = -2; dc <= 2; dc++) initial.push({ r: pb.r + dr, c: pb.c + dc });
    initial.push(pa);
    screenShake(14);
  }

  if (ep !== levelEpoch) return;
  await executeWave(ep, 1, initial, []);
  if (ep !== levelEpoch) return;
  await gravityAndRefill(ep);
  if (ep !== levelEpoch) return;
  await resolveBoard(ep, 1);
}

async function doSwap(r1, c1, r2, c2) {
  if (busy || ended || paused || onboarding) return;
  if (!inb(r1, c1) || !inb(r2, c2)) return;
  const a = board[r1][c1], b = board[r2][c2];
  if (!a || !b) return;
  if (a.kind === K_CURSED || b.kind === K_CURSED) {   // hắc ấn bất động — không đổi chỗ được
    const t0 = a.kind === K_CURSED ? a : b;
    t0.el.classList.add('shake');
    setTimeout(() => t0.el.classList.remove('shake'), 280);
    return;
  }

  const ep = levelEpoch;
  busy = true;
  clearHint();
  deselect();
  idleMs = 0;
  try {
    sSwap();
    board[r1][c1] = b; board[r2][c2] = a;
    await Promise.all([moveTileTo(a, r2, c2, 150), moveTileTo(b, r1, c1, 150)]);
    if (ep !== levelEpoch) return;

    const combo = comboOf(a, b);
    let valid = !!combo;
    if (!combo) valid = findMatchClusters().length > 0;

    if (!valid) {
      sInvalid();
      board[r1][c1] = a; board[r2][c2] = b;
      a.el.classList.add('shake'); b.el.classList.add('shake');
      await Promise.all([moveTileTo(a, r1, c1, 150), moveTileTo(b, r2, c2, 150)]);
      await sleep(120);
      a.el.classList.remove('shake'); b.el.classList.remove('shake');
      return;
    }

    turnCount++;
    lastSwapCells = [{ r: r1, c: c1 }, { r: r2, c: c2 }];

    if (combo) await runCombo(ep, combo, a, b);
    else await resolveBoard(ep, 0);
    if (ep !== levelEpoch) return;

    lastSwapCells = null;
    if (pendingRelayout) { pendingRelayout = false; layoutAllStatic(); }

    nColors = colorsFor(score);        // thêm màu thứ 6 khi điểm cao
    const boom = tickCursed();         // đếm ngược hắc ấn còn lại
    if (boom) {                        // 1 hắc ấn về 0 → detonate → thua
      ended = true;
      const ctr = boardCellCenter(boom.r, boom.c);
      spawnFlash(ctr.x, ctr.y, cellPx * 3.2);
      spawnBurst(ctr.x, ctr.y, '#df5b4c', 30, 380);
      screenShake(18);
      await sleep(220);
      if (ep !== levelEpoch) return;
      gameOver(ep);
      return;
    }
    maybeSpawnCursed();                // sinh hắc ấn mới nếu tới nhịp
    await maybeEvents(ep);             // Arcane Surge / Blaze Storm ở mốc điểm
    if (ep !== levelEpoch || ended) return;
    await ensureMovable(ep);
    if (ep !== levelEpoch) return;
    checkEnd(ep);
  } finally {
    if (ep === levelEpoch) {
      if (!ended) saveCurrentState();   // persist board sau mỗi nước đi hợp lệ
      busy = false;
    }
  }
}

/* ================================================================
 * §16. Input — tap chọn / swipe đổi ngay khi kéo đủ xa
 * ================================================================ */
let ptr = null;

function hitCell(x, y) {
  const rect = boardEl.getBoundingClientRect();
  const lx = x - rect.left, ly = y - rect.top;
  const c = Math.floor(lx / cellPx), r = Math.floor(ly / cellPx);
  return inb(r, c) ? { r, c } : null;
}

boardEl.addEventListener('pointerdown', e => {
  if (paused) return;
  idleMs = 0;
  clearHint();
  if (busy || ended || onboarding || menuOpen || confirmOpen || howtoOpen) return;
  const cell = hitCell(e.clientX, e.clientY);
  if (!cell) return;
  ptr = { x: e.clientX, y: e.clientY, r: cell.r, c: cell.c, live: true };
}, { passive: true });

boardEl.addEventListener('pointermove', e => {
  if (!ptr || !ptr.live) return;
  const dx = e.clientX - ptr.x, dy = e.clientY - ptr.y;
  if (Math.hypot(dx, dy) < Math.max(14, cellPx * 0.35)) return;
  ptr.live = false;
  let dr = 0, dc = 0;
  if (Math.abs(dx) >= Math.abs(dy)) dc = dx > 0 ? 1 : -1;
  else dr = dy > 0 ? 1 : -1;
  deselect();
  doSwap(ptr.r, ptr.c, ptr.r + dr, ptr.c + dc);
}, { passive: true });

boardEl.addEventListener('pointerup', e => {
  if (!ptr) return;
  const wasLive = ptr.live;
  const { r, c } = ptr;
  ptr = null;
  if (!wasLive) return;
  if (busy || ended || onboarding || menuOpen || confirmOpen || howtoOpen || paused) return;
  handleTap(r, c);
}, { passive: true });

boardEl.addEventListener('pointercancel', () => { ptr = null; });

function handleTap(r, c) {
  if (!board[r][c]) { deselect(); return; }
  if (!selected) { select(r, c); return; }
  const { r: sr, c: sc } = selected;
  if (sr === r && sc === c) { deselect(); return; }
  if (Math.abs(sr - r) + Math.abs(sc - c) === 1) {
    doSwap(sr, sc, r, c);
  } else {
    deselect();
    select(r, c);
  }
}

function select(r, c) {
  selected = { r, c };
  const tile = board[r][c];
  if (tile) { tile.el.classList.add('selected'); sSelect(); }
}

function deselect() {
  if (!selected) return;
  const tile = board[selected.r] && board[selected.r][selected.c];
  if (tile) tile.el.classList.remove('selected');
  selected = null;
}

/* ================================================================
 * §17. Idle hint
 * ================================================================ */
function stepIdleHint(dt) {
  if (busy || ended || onboarding || menuOpen || confirmOpen || howtoOpen || tutorialMode) { idleMs = 0; return; }
  idleMs += dt;
  if (idleMs >= IDLE_HINT_MS) {
    idleMs = -6500;      // hint lại sau ~11.5s nếu vẫn im
    playHint();
  }
}

let hintSeq = 0;
let hintRestore = null;   // {tile, r, c} — snap tile về đúng ô khi hint bị huỷ giữa chừng

function playHint() {
  const mv = findHintMove();
  if (!mv) return;
  sHint();
  const t1 = board[mv.r1][mv.c1], t2 = board[mv.r2][mv.c2];
  hintCells = [t1, t2].filter(Boolean);
  hintCells.forEach(tl => tl.el.classList.add('hint'));
  const tl = t1;
  if (!tl) return;
  const seq = ++hintSeq;
  hintRestore = { tile: tl, r: mv.r1, c: mv.c1 };
  (async () => {
    for (let i = 0; i < 3; i++) {
      if (seq !== hintSeq || !board[mv.r1] || board[mv.r1][mv.c1] !== tl || busy) return;
      // toạ độ đọc lại mỗi vòng — an toàn nếu resize giữa các nhịp
      const x0 = tl.x, y0 = tl.y;
      const dx = (mv.c2 - mv.c1) * cellPx * 0.22;
      const dy = (mv.r2 - mv.r1) * cellPx * 0.22;
      await tween({ dur: 230, ease: easeInOutQ, update(k) {
        if (seq !== hintSeq) return;   // bị huỷ (swap/clearHint) → ngừng ghi vị trí
        setTilePos(tl, x0 + dx * Math.sin(k * Math.PI), y0 + dy * Math.sin(k * Math.PI));
      } });
      await sleep(130);
    }
    if (seq === hintSeq && board[mv.r1] && board[mv.r1][mv.c1] === tl && !busy) {
      placeTile(tl, mv.r1, mv.c1);   // snap theo cellPx hiện tại
      hintRestore = null;
    }
  })();
}

function clearHint() {
  hintSeq++;   // huỷ mọi nudge đang chạy
  if (hintRestore) {
    const { tile, r, c } = hintRestore;
    if (board[r] && board[r][c] === tile) placeTile(tile, r, c);
    hintRestore = null;
  }
  hintCells.forEach(tl => { if (tl.el) tl.el.classList.remove('hint'); });
  hintCells = [];
}

/* ================================================================
 * §18. HUD + hiệu ứng chữ
 * ================================================================ */
/* ── Điểm + Best (endless score-attack) ────────────────────────── */
function renderScore() { $('score-val').textContent = Math.round(dispScore); }
function renderBest()  { $('best-val').textContent = best; }
function bumpBest() {
  if (score > best) { best = score; renderBest(); persistBest(); }
  if (!recordHit && score > runRecord) recordHit = true;
}

/* ── Cursed Runes ("Hắc Ấn") — hazard đếm ngược, càng về sau càng khó ──
 *   Ô nguyền bất động / không ghép / không đổi. Mỗi lượt đếm ngược −1; ghép hoặc
 *   nổ CẠNH nó (4 hướng) → phá (+điểm to). Về 0 mà chưa phá → detonate → thua.
 *   Mỗi lần xuất hiện: ngòi ngắn dần + dày hơn + tối đa 2 cùng lúc. */
let cursedIdx = 0;        // số hắc ấn đã sinh trong ván (tăng độ khó)
let sinceCursed = 99;     // số lượt kể từ lần sinh gần nhất

function cursedTiles() {
  const out = [];
  for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++)
    if (board[r][c] && board[r][c].kind === K_CURSED) out.push({ r, c, t: board[r][c] });
  return out;
}
function maxActiveCursed() { return score >= 14000 ? 2 : 1; }
function cursedCadence()   { return Math.max(4, 8 - Math.floor(score / 4000)); }   // lượt giữa 2 lần sinh
function cursedFuse()      { return Math.max(3, 7 - Math.floor(cursedIdx / 2)); }   // đếm ngược khởi tạo

/** Vẽ lại số đếm ngược trên 1 ô nguyền + cảnh báo đỏ khi ≤2. */
function renderCursed(tl) {
  const svg = tl.el.querySelector('svg');
  if (svg) svg.innerHTML = cursedArt(tl.curse);
  tl.el.classList.toggle('cursed-urgent', tl.curse <= 2);
}

/** Sinh hắc ấn nếu tới nhịp (gọi cuối mỗi lượt hợp lệ). */
function maybeSpawnCursed() {
  sinceCursed++;
  if (turnCount <= CURSE_GRACE) return;
  if (cursedTiles().length >= maxActiveCursed()) return;
  if (sinceCursed < cursedCadence()) return;
  const normals = [];
  for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++)
    if (board[r][c] && board[r][c].kind === K_NORMAL) normals.push({ r, c });
  if (normals.length < 8) return;
  const tg = normals[Math.floor(Math.random() * normals.length)];
  const tl = board[tg.r][tg.c];
  tl.curse = cursedFuse();
  morphTile(tl, tl.color, K_CURSED);
  renderCursed(tl);
  cursedIdx++; sinceCursed = 0;
  sCurse();
  const ctr = boardCellCenter(tg.r, tg.c);
  spawnRing(ctr.x, ctr.y, CURSE_HEX, cellPx * 1.15);
  showToast(t('cursedSpawn'));
}

/** Đầu mỗi lượt: giảm đếm ngược mọi hắc ấn. Trả {r,c} nếu có ô detonate. */
function tickCursed() {
  for (const { r, c, t } of cursedTiles()) {
    t.curse--;
    if (t.curse <= 0) return { r, c };
    renderCursed(t);
  }
  return null;
}

/* ── Events (thưởng ở mốc điểm) ─────────────────────────────────── */
function randomNormals(n) {
  const arr = [];
  for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++)
    if (board[r][c] && board[r][c].kind === K_NORMAL) arr.push({ r, c });
  for (let i = arr.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [arr[i], arr[j]] = [arr[j], arr[i]]; }
  return arr.slice(0, n);
}

/** Arcane Surge — tặng 1 Prism (không tự tạo match → an toàn). */
function arcaneSurge() {
  const pick = randomNormals(1)[0];
  if (!pick) return;
  const tl = board[pick.r][pick.c];
  morphTile(tl, 0, K_PRISM);
  const ctr = boardCellCenter(pick.r, pick.c);
  spawnRing(ctr.x, ctr.y, '#ffd23f', cellPx * 1.4);
  spawnFlash(ctr.x, ctr.y, cellPx * 2);
  sForge();
  showToast('✦ ' + t('surge'));
}

/** Blaze Storm — biến vài ô thành Blaze rồi kích nổ dây chuyền (bữa tiệc nổ). */
async function blazeStorm(ep) {
  const picks = randomNormals(4);
  if (picks.length < 3) return;
  showResultBanner(t('blazeStorm'), false, 1400);
  sStripe();
  const initial = [];
  for (const p of picks) {
    const tl = board[p.r][p.c];
    morphTile(tl, tl.color, Math.random() < 0.5 ? K_SH : K_SV);
    const ctr = boardCellCenter(p.r, p.c);
    spawnRing(ctr.x, ctr.y, RUNE_HEX[tl.color], cellPx);
    initial.push(p);
  }
  screenShake(10);
  await sleep(260);
  if (ep !== levelEpoch) return;
  await executeWave(ep, 2, initial, []);
  if (ep !== levelEpoch) return;
  await gravityAndRefill(ep);
  if (ep !== levelEpoch) return;
  await resolveBoard(ep, 2);
}

/** Kiểm mốc điểm → kích event (gọi cuối lượt, board đã settle). */
let nextSurge = SURGE_EVERY, nextStorm = STORM_EVERY;
async function maybeEvents(ep) {
  if (score >= nextStorm) {           // storm (mốc thưa) ưu tiên
    nextStorm += STORM_EVERY;
    if (score >= nextSurge) nextSurge = (Math.floor(score / SURGE_EVERY) + 1) * SURGE_EVERY;
    await blazeStorm(ep);
    return;
  }
  if (score >= nextSurge) {
    nextSurge += SURGE_EVERY;
    arcaneSurge();
  }
}

function updateLabels() {
  $('score-k').textContent = t('score');
  $('best-k').textContent = t('best');
  $('ov-score-k').textContent = t('score');
  $('ov-best-k').textContent = t('best');
  $('ov-btn-label').textContent = t('playAgain');
  $('ob-skip-label').textContent = t('skip');
  $('pause-txt').textContent = t('tapToResume');
  $('back-btn').setAttribute('aria-label', t('back'));
  $('sound-btn').setAttribute('aria-label', t('sound'));
}

function spawnScoreFly(boardR, boardC, pts, mult) {
  const rect = boardEl.getBoundingClientRect();
  const x = rect.left + boardC * cellPx + cellPx * 0.5;
  const y = rect.top + boardR * cellPx + cellPx * 0.5;
  const el = document.createElement('div');
  el.className = 'score-fly';
  el.textContent = (mult > 1 ? `×${mult} ` : '') + `+${pts}`;
  el.style.left = x + 'px';
  el.style.top = y + 'px';
  document.body.appendChild(el);
  el.addEventListener('animationend', () => el.remove(), { once: true });
  setTimeout(() => { if (el.parentNode) el.remove(); }, 1200);
}

function showComboBadge(chain) {
  const tier = Math.min(chain - 2, 4);
  const badge = $('combo-badge');
  $('combo-praise').textContent = t('praise')[tier];
  $('combo-mult').textContent = `${t('combo')} ×${Math.min(chain, CHAIN_CAP)}`;
  const cols = ['#9fd0ff', '#7dffb0', '#ffd23f', '#ff9a3d', '#ff5a8f'];
  $('combo-praise').style.color = cols[tier];
  badge.classList.remove('cascade-anim');
  void badge.offsetWidth;
  badge.classList.add('cascade-anim');
}

let toastTimer = null;
function showToast(msg) {
  const el = $('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 1500);
}

/* ================================================================
 * §19. Game Over (endless score-attack — corruption nuốt board)
 * ================================================================ */
const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v));

let bannerTimer = null;
function showResultBanner(text, lose, holdMs) {
  $('combo-badge').classList.remove('cascade-anim');   // tránh đè lên banner
  const el = $('result-banner');
  clearTimeout(bannerTimer); bannerTimer = null;
  el.textContent = text;
  el.classList.toggle('lose', !!lose);
  el.classList.remove('show');
  void el.offsetWidth;
  el.classList.add('show');
  // event flash → tự ẩn sau holdMs; Game Over gọi không có holdMs → giữ tới Play Again
  if (holdMs) bannerTimer = setTimeout(hideResultBanner, holdMs);
}
function hideResultBanner() {
  const el = $('result-banner');
  clearTimeout(bannerTimer); bannerTimer = null;
  el.classList.remove('show');
  el.classList.remove('lose');
}

function maybeAds() {
  endCounter++;
  if (endCounter % ADS_EVERY === 0) sendMessage('ads');
}

/* Fallback: hết nước đi (hiếm — auto-shuffle lo trước) → kết thúc ván. */
function checkEnd(ep) {
  if (ended || tutorialMode || ep !== levelEpoch) return;
  if (!findHintMove()) {
    ended = true;
    gameOver(ep);
  }
}

/* Game Over — game điểm-cao tự vẽ popup (popup-common §1.1) */
async function gameOver(ep) {
  deselect(); clearHint();
  persistBest();
  sLose();
  showResultBanner(t('gameOver'), true);
  screenShake(10);
  const W = window.innerWidth, H = window.innerHeight;
  spawnFlash(W * 0.5, H * 0.42, 160);
  await sleep(950);
  if (ep !== levelEpoch) return;
  maybeAds();
  showGameOverPopup();
  // endless (§1.1): result=null, showModal=false — game tự lo Play Again
  sendMessage('game_result');
}

function showGameOverPopup() {
  const isNew = recordHit || score > runRecord;
  const title = $('ov-title');
  title.textContent = isNew ? t('newBest') : t('gameOver');
  title.classList.toggle('newbest', isNew);
  $('ov-score').textContent = score;
  $('ov-best').textContent = best;
  renderBest();
  fitOverlayScores();
  $('overlay').classList.remove('hidden');
}

/* Co cỡ điểm cho vừa card khi nhiều chữ số (popup-common §5b) */
function fitOverlayScores() {
  const row = document.querySelector('.ov-scores');
  if (!row) return;
  const card = row.closest('.ov-card');
  const vals = row.querySelectorAll('.ov-v');
  vals.forEach(v => { v.style.fontSize = ''; });
  const pad = parseFloat(getComputedStyle(card).paddingLeft) || 24;
  const max = card.clientWidth - 2 * pad;
  let fz = 32;
  while (row.scrollWidth > max && fz > 15) { fz -= 1; vals.forEach(v => { v.style.fontSize = fz + 'px'; }); }
}

/* ================================================================
 * §20. Persistence (game-common §1.2) — 2 tầng:
 *   - persistBest: data nhẹ → native + localStorage
 *   - saveCurrentState: board snapshot → localStorage (để restore khi refresh)
 * ================================================================ */
function persistBest() {
  const p = { best, muted, tutorialSeen };
  saveData(p);   // native save_data
  // localStorage cập nhật qua saveCurrentState / clearSavedGame
}
function persistLight() { persistBest(); }

/** Lưu toàn bộ trạng thái ván vào localStorage (game-common §1.2). */
function saveCurrentState() {
  if (ended || !board.length) return;
  const snap = board.map(row => row.map(t => t ? { c: t.color, k: t.kind } : null));
  saveLocal({
    best, muted, tutorialSeen,
    game: { snap, score, turnCount, cursedIdx, sinceCursed, nColors, nextSurge, nextStorm },
  });
}

/** Xoá game state khỏi localStorage (giữ meta: best/muted/tut). */
function clearSavedGame() {
  saveData({ best, muted, tutorialSeen });
  saveLocal({ best, muted, tutorialSeen });
}

/* ================================================================
 * §21. New run (score-attack — không level, không intro)
 * ================================================================ */
function newRun() {
  levelEpoch++;
  const ep = levelEpoch;
  flushTweens();
  clearTimeout(resultTimer);
  tutorialMode = false;
  $('overlay').classList.add('hidden');

  nColors = 5;
  score = 0; dispScore = 0;
  runRecord = best;
  recordHit = false;
  turnCount = 0;
  cursedIdx = 0; sinceCursed = 99;
  nextSurge = SURGE_EVERY; nextStorm = STORM_EVERY;
  busy = true; ended = false;
  selected = null; lastSwapCells = null;
  clearHint();
  particles = [];
  shakeAmp = 0; wrapEl.style.transform = '';
  hideResultBanner();
  $('score-val').textContent = '0';
  renderBest();
  tileIdCtr = 0;
  boardEl.innerHTML = '';
  board = Array.from({ length: ROWS }, () => new Array(COLS).fill(null));
  updateLabels();
  resize();

  (async () => {
    await sleep(30);   // đợi resize RAF tính cellPx
    if (ep !== levelEpoch) return;
    await fillBoard();
    if (ep !== levelEpoch) return;
    await ensureMovable(ep);
    if (ep !== levelEpoch) return;
    busy = false;
    if (!tutorialSeen) showOnboard();   // lần đầu: onboarding phủ lên board (1 scene, không chuyển)
  })();
}

/* ================================================================
 * §21b. Restore ván dở từ localStorage (game-common §1.2)
 * ================================================================ */
function tryRestoreRunState(g) {
  try {
    if (!g || !g.snap || !Array.isArray(g.snap) || g.snap.length !== ROWS) { newRun(); return; }
    levelEpoch++;
    const ep = levelEpoch;
    flushTweens(); clearTimeout(resultTimer);
    tutorialMode = false;
    $('overlay').classList.add('hidden');

    score       = Number.isFinite(+g.score)       ? Math.floor(+g.score)       : 0;
    turnCount   = Number.isFinite(+g.turnCount)   ? Math.floor(+g.turnCount)   : 0;
    cursedIdx   = Number.isFinite(+g.cursedIdx)   ? Math.floor(+g.cursedIdx)   : 0;
    sinceCursed = Number.isFinite(+g.sinceCursed) ? Math.floor(+g.sinceCursed) : 99;
    nColors     = Number.isFinite(+g.nColors)     ? Math.floor(+g.nColors)     : 5;
    nextSurge   = Number.isFinite(+g.nextSurge)   ? Math.floor(+g.nextSurge)   : SURGE_EVERY;
    nextStorm   = Number.isFinite(+g.nextStorm)   ? Math.floor(+g.nextStorm)   : STORM_EVERY;
    runRecord = best; recordHit = false;
    busy = true; ended = false;
    selected = null; lastSwapCells = null;
    clearHint(); particles = []; shakeAmp = 0; wrapEl.style.transform = '';
    hideResultBanner();
    $('score-val').textContent = String(score);
    renderBest(); updateLabels();

    tileIdCtr = 0;
    boardEl.innerHTML = '';
    board = Array.from({ length: ROWS }, () => new Array(COLS).fill(null));
    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        const cell = g.snap[r] && g.snap[r][c];
        if (cell !== null && cell !== undefined && typeof cell.c === 'number') {
          const k = (typeof cell.k === 'number' && cell.k >= 0 && cell.k <= 5) ? cell.k : K_NORMAL;
          board[r][c] = makeTile(cell.c, k);
        }
      }
    }
    resize(); layoutAllStatic();
    (async () => {
      await sleep(30);
      if (ep !== levelEpoch) return;
      await ensureMovable(ep);
      if (ep !== levelEpoch) return;
      busy = false;
    })();
  } catch (e) {
    clearSavedGame();
    newRun();
  }
}

/* ================================================================
 * §22. Onboarding — carousel demo phủ lên board (1 scene, KHÔNG chuyển cảnh)
 * ================================================================ */
let onboarding = false;
const OB_STEPS = ['match', 'special', 'cursed'];
let obStep = 0;

/* mini-tile: ô bo góc + glyph rune bên trong (glyph viewBox 100×100) */
function obTile(x, y, inner, s) {
  s = s || 54;
  return `<g transform="translate(${x},${y})">`
    + `<rect width="${s}" height="${s}" rx="10" fill="rgba(255,255,255,.05)" stroke="rgba(255,255,255,.16)" stroke-width="1.5"/>`
    + `<g transform="translate(${(s * 0.13).toFixed(1)},${(s * 0.13).toFixed(1)}) scale(${(s * 0.74 / 100).toFixed(3)})">${inner}</g>`
    + `</g>`;
}
function obCheck(cx, cy) {
  return `<circle cx="${cx}" cy="${cy}" r="12" fill="#35c26e" stroke="#fff" stroke-width="2.2"/>`
    + `<polyline points="${cx - 6},${cy} ${cx - 2},${cy + 4} ${cx + 5},${cy - 5}" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>`;
}
function obIllo(kind) {
  if (kind === 'match') {
    return `<svg viewBox="0 0 300 96" aria-hidden="true">`
      + obTile(18, 20, runeGlyph(0)) + obTile(80, 20, runeGlyph(0)) + obTile(142, 20, runeGlyph(1))
      + obTile(210, 20, runeGlyph(0))
      + `<path d="M186 10 Q210 -4 234 10" fill="none" stroke="#ffb830" stroke-width="4" stroke-linecap="round"/>`
      + `<path d="M228 2 L236 11 L225 13 Z" fill="#ffb830"/>` + obCheck(280, 47) + `</svg>`;
  }
  if (kind === 'special') {
    return `<svg viewBox="0 0 300 96" aria-hidden="true">`
      + obTile(30, 20, specialIcon(K_SH))
      + obTile(123, 20, specialIcon(K_NOVA))
      + obTile(216, 20, prismArt()) + `</svg>`;
  }
  // cursed: hắc ấn + 2 rune cùng màu kề nó → phá
  return `<svg viewBox="0 0 300 96" aria-hidden="true">`
    + obTile(74, 20, cursedArt(3)) + obTile(140, 20, runeGlyph(2)) + obTile(202, 20, runeGlyph(2))
    + obCheck(168, 10) + `</svg>`;
}

function renderOb() {
  const kind = OB_STEPS[obStep];
  $('ob-illo').innerHTML = obIllo(kind);
  $('ob-title').textContent = t('ob' + (obStep + 1) + 'T');
  $('ob-desc').textContent = t('ob' + (obStep + 1) + 'D');
  $('ob-dots').innerHTML = OB_STEPS.map((_, i) => `<span class="ob-dot${i === obStep ? ' on' : ''}"></span>`).join('');
  const last = obStep === OB_STEPS.length - 1;
  $('ob-next-label').textContent = last ? t('play') : t('next');
  $('ob-skip').style.visibility = last ? 'hidden' : 'visible';
}
function showOnboard() {
  onboarding = true;
  obStep = 0;
  renderOb();
  $('onboard').classList.remove('hidden');
}
function obNext() {
  if (obStep < OB_STEPS.length - 1) { obStep++; renderOb(); }
  else finishOnboard();
}
function finishOnboard() {
  onboarding = false;
  tutorialSeen = true;
  persistBest();
  $('onboard').classList.add('hidden');
}

/* ================================================================
 * §23. Pause (không còn Menu/How-to-play/Confirm)
 * ================================================================ */
function pauseGame() {
  if (paused) return;
  paused = true;
  $('pause-veil').classList.remove('hidden');
  if (audioCtx && audioCtx.state === 'running') audioCtx.suspend().catch(() => {});
}
function resumeGame() {
  if (!paused) return;
  paused = false;
  $('pause-veil').classList.add('hidden');
  audioUnlock();
}

/* nút bấm — kèm hỗ trợ Enter/Space cho div role=button */
function onTap(id, fn) {
  const el = $(id);
  el.addEventListener('click', e => { e.stopPropagation(); fn(); });
  el.addEventListener('keydown', e => {
    if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); fn(); }
  });
}

onTap('back-btn', () => { sButton(); persistBest(); sendMessage('quit'); });
onTap('sound-btn', () => { audioUnlock(); setMuted(!muted); sButton(); });
onTap('ov-btn', () => { sButton(); sendMessage('retry_level'); newRun(); });   // Play Again (§1.1)
onTap('ob-next', () => { sButton(); obNext(); });
onTap('ob-skip', () => { sButton(); finishOnboard(); });

$('pause-veil').addEventListener('pointerdown', () => { resumeGame(); }, { passive: true });

document.addEventListener('pointerdown', audioUnlock, { passive: true });
document.addEventListener('visibilitychange', () => {
  if (document.hidden) { persistBest(); pauseGame(); }
});

/* ================================================================
 * §24. Native callbacks (game-common §1.3)
 * ================================================================ */
window.onAppPause  = function () { persistBest(); pauseGame(); };
window.onAppResume = function () { audioUnlock(); };
window.onNextLevel = function () { /* endless: không có level kế */ };
window.onRetryLevel = function () { newRun(); };   // native gọi Play Again → ván mới

/* ================================================================
 * §25. Boot (game-common §3 waitForNativeInjection)
 * ================================================================ */
function bootGame() {
  LANG = getLanguage();
  applyUiFont(LANG);
  document.documentElement.lang = LANG;
  measureEnvSafeTop();

  const saved = parseInitialData();
  if (saved) {
    if (typeof saved.best === 'number' && saved.best > 0) best = Math.floor(saved.best);
    muted = !!saved.muted;
    tutorialSeen = !!saved.tutorialSeen;
  }

  $('sound-btn').classList.toggle('muted', muted);
  renderBest();
  updateLabels();
  resize();
  initBgItems();
  requestAnimationFrame(mainLoop);

  // Không menu: restore ván dở nếu có, không thì newRun (lần đầu sẽ bật onboarding)
  const g = saved && saved.game;
  if (g && g.snap) tryRestoreRunState(g);
  else newRun();
}

// Poll native inject, fallback 200ms (game-common §3)
(function waitForNativeInjection() {
  const start = Date.now();
  (function check() {
    if (typeof window.currentLevel === 'number' ||
        typeof window.language === 'string' ||
        typeof window.data === 'string' ||
        Date.now() - start > 200) {
      bootGame();
    } else {
      setTimeout(check, 10);
    }
  })();
})();
</script>
