<!--
  Animal Connect — QuanKA
  Onet / Pikachu connect puzzle: tap 2 identical animal tiles, they clear if a
  path with ≤ 2 turns (≤ 3 straight segments) links them through empty cells
  (the path may run through the border ring outside the board).
  Level-based (10 levels): board grows + tiles shift after each match (per-level
  gravity mode) + timer. Single-file HTML (CSS + JS inline).
  Tuân thủ .claude/game-common.md (bridge, level, i18n), popup-common.md (game
  theo level → KHÔNG tự vẽ popup kết quả, showModal:true), zip-common.md.
-->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<title>Animal Connect</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Google+Sans+Flex:opsz,wght@6..144,1..1000&display=swap" rel="stylesheet" />
<style>
/* ── Reset + mobile tap fixes (game-common §UI) ───────────────── */
*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  -webkit-tap-highlight-color: transparent;
  -webkit-touch-callout: none;
}

:root {
  --ui-font: 'Google Sans Flex', system-ui, sans-serif;
  /* Meadow palette — bright & cheerful */
  --bg-a: #a8e6c3;
  --bg-b: #7fd3a8;
  --bg-c: #5fbf96;
  /* Frosted panels on light bg */
  --glass: rgba(255,255,255,.42);
  --glass-border: rgba(255,255,255,.65);
  /* Text */
  --text: #1e4634;
  --text-soft: rgba(30,70,52,.55);
  --accent: #ff8a3d;
  --sat: env(safe-area-inset-top, 0px);
}

html, body { height: 100%; overflow: hidden; }

body {
  font-family: var(--ui-font);
  font-weight: 700;
  color: var(--text);
  background:
    radial-gradient(ellipse 90% 55% at 50% -12%, rgba(255,255,220,.55), transparent),
    linear-gradient(170deg, var(--bg-a) 0%, var(--bg-b) 55%, var(--bg-c) 100%);
  -webkit-user-select: none;
  user-select: none;
  touch-action: manipulation;
}

/* ── Background canvas (drifting leaves & paw prints) ─────────── */
#bg-canvas { position: fixed; inset: 0; z-index: 0; pointer-events: none; }

/* ── App wrapper ──────────────────────────────────────────────── */
#app {
  position: relative;
  z-index: 1;
  width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* ── Header chuẩn (cursed-knives): fixed overlay — Back | SCORE ★ | BEST ♛ | Volume ── */
#topbar {
  position: fixed;
  top: 0;
  left: 0;                       /* left:0;right:0;margin:auto — KHÔNG translateX
                                    (translateX từng gây scroll ngang ở cursed-knives) */
  right: 0;
  margin: 0 auto;
  width: 100%;
  max-width: 520px;
  z-index: 5;
  display: flex;
  flex-direction: column;
  gap: 3px;
  padding: 0 max(10px, env(safe-area-inset-right)) 0 max(10px, env(safe-area-inset-left));
  pointer-events: none;          /* không nuốt tap gameplay */
  /* padding-top do JS đặt = max(statusBarHeight, env-safe) + 6 */
}
#topbar .btn3d, .hud-scores { pointer-events: auto; }

#hud-bar { display: flex; align-items: center; gap: 8px; }

.hud-scores {
  flex: 1;
  min-width: 0;
  display: flex;
  gap: 6px;
}
.hud-pill {
  flex: 1 1 0;
  min-width: 0;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 5px;
  padding: 5px 8px 6px 4px;       /* icon ghim sát mép trái (chuẩn chung) */
  background: var(--glass);
  border: 1px solid var(--glass-border);
  border-radius: 14px;
  backdrop-filter: blur(6px);
  box-shadow: inset 0 2px 6px rgba(255,255,255,.35), 0 3px 8px rgba(23,74,52,.18);
  -webkit-user-select: none; user-select: none;
}
.pill-text { display: flex; flex-direction: column; align-items: center; min-width: 0; flex: 1 0 auto; }
.pill-ico {
  flex: 0 0 auto;
  width: clamp(16px, 4.8vw, 21px); height: clamp(16px, 4.8vw, 21px); display: block;
  filter: drop-shadow(0 1px 1px rgba(23,74,52,.28));
}
.hud-pill .label {
  font-size: clamp(9px, 3vw, 12px);
  font-weight: 700;
  letter-spacing: .5px;
  color: var(--text-soft);
  line-height: 1.05;
  white-space: nowrap;
}
.hud-pill .value {
  font-size: clamp(15px, 4.6vw, 22px);
  line-height: 1.1;
  color: var(--text);
  white-space: nowrap;
  font-weight: 800;
}
#hud-best { color: #e39a12; }     /* BEST accent vàng (chuẩn chung) */

/* Dòng dưới header: LEVEL x (trái) + thanh time đếm ngược (phải) — dài đúng
   bằng & khớp dọc với hud-bar phía trên. */
#hud-sub {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 1px 2px 0;
}
.sub-level {
  flex: 0 0 auto;
  font-size: 12px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--text-soft);
  white-space: nowrap;
}
.sub-level #hud-level { color: var(--text); font-weight: 800; }

#time-bar-bg {
  flex: 1;
  min-width: 0;
  height: 9px;
  background: rgba(255,255,255,.4);
  border-radius: 5px;
  overflow: hidden;
  border: 1px solid rgba(255,255,255,.6);
}
#time-bar-fill {
  height: 100%;
  width: 100%;
  border-radius: 5px;
  background: linear-gradient(90deg, #35c26e, #7fd34f);
  transition: width .25s linear, background .4s;
}
#time-bar-fill.warn   { background: linear-gradient(90deg, #ffb02e, #ffd23f); }
#time-bar-fill.danger { background: linear-gradient(90deg, #ff4d4d, #ff8a3d); }
@keyframes timeDanger { 0%,100% { opacity: 1; } 50% { opacity: .5; } }
#time-bar-fill.danger { animation: timeDanger .6s ease-in-out infinite; }

/* Số giây bên phải thanh timer (khớp dọc header) */
#hud-secs {
  flex: 0 0 auto;
  min-width: 26px;
  text-align: right;
  font-size: 14px;
  font-weight: 800;
  color: var(--text);
  font-variant-numeric: tabular-nums;
}
#hud-secs.danger { color: #d92b2b; }

/* Mũi tên chỉ lên timer (bước dạy đồng hồ trong tutorial) */
#tut-arrow {
  position: fixed;
  z-index: 245;
  width: 26px;
  height: 54px;
  pointer-events: none;
  filter: drop-shadow(0 1px 3px rgba(23,74,52,.4));
  animation: arrowBob .9s ease-in-out infinite;
}
#tut-arrow.hidden { display: none; }
@keyframes arrowBob { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }

/* ── Board ────────────────────────────────────────────────────── */
#board-outer {
  flex: 1;
  display: flex;
  width: 100%;
  padding: 8px;
  min-height: 0;
  overflow: hidden;         /* TUYỆT ĐỐI không cuộn (ngang lẫn dọc) — board luôn
                               vừa khít vùng này; overlay đường nối được clip gọn */
}

#board-wrap {
  margin: auto;             /* căn giữa mà không cắt mất phần tràn khi cuộn */
  position: relative;
  border-radius: 16px;
  background: rgba(255,255,255,.22);
  border: 1px solid rgba(255,255,255,.5);
  box-shadow: 0 10px 34px rgba(23,74,52,.22), inset 0 1px 0 rgba(255,255,255,.5);
  padding: 6px;
}

#board { position: relative; z-index: 1; }

/* Connector line overlay — spills 1 cell outside the board on purpose
   (paths may run through the outer border ring, classic Onet rule) */
#link-svg {
  position: absolute;
  z-index: 3;
  pointer-events: none;
  overflow: visible;
}

.link-path {
  fill: none;
  stroke: #ff8a3d;
  stroke-width: 5;
  stroke-linecap: round;
  stroke-linejoin: round;
  filter: drop-shadow(0 0 6px rgba(255,138,61,.85));
}
.link-path.under { stroke: rgba(255,255,255,.9); stroke-width: 9; filter: none; }

@keyframes linkFade { 0%,70% { opacity: 1; } 100% { opacity: 0; } }
.link-anim { animation: linkFade .34s ease-in forwards; }

/* Đường "quá vòng" (>2 rẽ) trong tutorial — đỏ nét đứt chạy + chấm ở chỗ rẽ */
.bend-path-under { fill: none; stroke: rgba(255,255,255,.92); stroke-width: 9; stroke-linecap: round; stroke-linejoin: round; }
.bend-path {
  fill: none; stroke: #ff4d4d; stroke-width: 5;
  stroke-linecap: round; stroke-linejoin: round;
  stroke-dasharray: 1 11;
  filter: drop-shadow(0 0 6px rgba(255,77,77,.85));
  animation: bendDash 1.1s linear infinite, bendPulse 1s ease-in-out infinite;
}
@keyframes bendDash  { to { stroke-dashoffset: -24; } }
@keyframes bendPulse { 50% { opacity: .55; } }
.bend-dot { fill: #ff4d4d; stroke: #fff; stroke-width: 2.5; }

/* Tick ✓ nổ ra khi nối đúng (nhấn mạnh "connection" trong tutorial) */
#tut-check {
  position: fixed; z-index: 45; pointer-events: none;
  width: 46px; height: 46px; margin: -23px 0 0 -23px; opacity: 0;
}
#tut-check svg { width: 100%; height: 100%; display: block;
  filter: drop-shadow(0 2px 6px rgba(23,74,52,.5)); }
.tut-check-anim { animation: tutCheckPop .7s ease-out forwards; }
@keyframes tutCheckPop {
  0%   { opacity: 0; transform: scale(.3); }
  35%  { opacity: 1; transform: scale(1.15); }
  70%  { opacity: 1; transform: scale(1); }
  100% { opacity: 0; transform: scale(1.05) translateY(-8px); }
}

/* ── Tiles ────────────────────────────────────────────────────── */
.tile {
  position: absolute;
  cursor: pointer;
  will-change: transform;
  -webkit-user-select: none;
  user-select: none;
}

.tile-inner {
  width: 100%;
  height: 100%;
  border-radius: 22%;
  background: linear-gradient(160deg, #fffdf6, #ffeecf);
  border: 2px solid #f5d9a0;
  box-shadow: 0 3px 0 #e3bd7d, 0 5px 10px rgba(23,74,52,.18);
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  transition: transform .12s ease, box-shadow .15s ease, border-color .15s;
}

.tile-inner svg {
  width: 82%;
  height: 82%;
  flex-shrink: 0;
  display: block;
  pointer-events: none;
}

/* Selected: lift + orange ring + wiggle */
.tile.selected .tile-inner {
  transform: scale(1.12);
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(255,138,61,.75), 0 6px 14px rgba(23,74,52,.3);
  animation: tileWiggle .5s ease-in-out infinite;
  z-index: 2;
}
@keyframes tileWiggle {
  0%, 100% { transform: scale(1.12) rotate(0deg); }
  25%      { transform: scale(1.12) rotate(-4deg); }
  75%      { transform: scale(1.12) rotate(4deg); }
}

/* Hint: soft blue pulsing ring */
@keyframes hintPulse {
  0%, 100% { box-shadow: 0 0 0 3px rgba(61,159,255,.85), 0 5px 10px rgba(23,74,52,.18); }
  50%      { box-shadow: 0 0 0 6px rgba(61,159,255,.35), 0 5px 10px rgba(23,74,52,.18); }
}
.tile.hint .tile-inner { border-color: #3d9fff; animation: hintPulse .8s ease-in-out infinite; }

/* Spawn pop-in — animate .tile-inner, KHÔNG animate .tile: keyframe có
   transform sẽ đè inline translate() giữ vị trí grid → tile nhảy về (0,0) */
@keyframes tilePopin {
  0%   { opacity: 0; transform: scale(.3); }
  70%  { transform: scale(1.08); }
  100% { opacity: 1; transform: scale(1); }
}
.tile.popin .tile-inner { animation: tilePopin .26s ease-out backwards; }

/* Clear pop-out — cùng lý do: animation nằm trên .tile-inner */
@keyframes tilePop {
  0%   { transform: scale(1);    opacity: 1; }
  40%  { transform: scale(1.25); opacity: 1; }
  100% { transform: scale(0);    opacity: 0; }
}
.tile.pop { pointer-events: none; z-index: 4; }
.tile.pop .tile-inner { animation: tilePop .3s ease-in forwards; }

/* Invalid pair shake — margin-left thay vì translate/transform:
   transform đang giữ vị trí grid của tile, còn thuộc tính `translate`
   riêng cần Chromium 104+ (WebView cũ sẽ drop → shake câm) */
@keyframes tileShake {
  0%, 100% { margin-left: 0; }
  20% { margin-left: -2.5px; } 40% { margin-left: 2.5px; }
  60% { margin-left: -1.5px; } 80% { margin-left: 1.5px; }
}
.tile.shake { animation: tileShake .24s ease-in-out; }

/* Match burst particle */
.burst {
  position: absolute;
  width: 8px; height: 8px;
  border-radius: 50%;
  pointer-events: none;
  z-index: 5;
  animation: burstFly .45s ease-out forwards;
}
@keyframes burstFly {
  0%   { transform: translate(0,0) scale(1); opacity: 1; }
  100% { transform: translate(var(--bx), var(--by)) scale(.2); opacity: 0; }
}

/* ── Combo badge ──────────────────────────────────────────────── */
#combo-badge {
  position: fixed;
  top: 42%;
  left: 50%;
  transform: translate(-50%,-50%);
  font-size: 28px;
  font-weight: 800;
  pointer-events: none;
  z-index: 100;
  opacity: 0;
  letter-spacing: 1px;
  color: #fff;
  text-shadow: 0 0 26px rgba(255,170,40,.95), 0 2px 6px rgba(23,74,52,.5);
}
@keyframes comboPop {
  0%   { opacity: 0; transform: translate(-50%,-50%) scale(.4); }
  30%  { opacity: 1; transform: translate(-50%,-50%) scale(1.25); }
  65%  { opacity: 1; transform: translate(-50%,-50%) scale(1); }
  100% { opacity: 0; transform: translate(-50%,-60%) scale(.85); }
}
.combo-anim { animation: comboPop .65s ease-out forwards; }

/* ── Lời khen "nối nhanh" (cơ chế giờ ẩn) ─────────────────────── */
#praise {
  position: fixed;
  top: 30%;
  left: 50%;
  transform: translate(-50%,-50%);
  font-size: 22px;
  font-weight: 800;
  pointer-events: none;
  z-index: 101;
  opacity: 0;
  white-space: nowrap;
  color: #fff;
  text-shadow: 0 0 18px rgba(255,120,60,.95), 0 2px 5px rgba(23,74,52,.5);
}
@keyframes praisePop {
  0%   { opacity: 0; transform: translate(-50%,-40%) scale(.6); }
  25%  { opacity: 1; transform: translate(-50%,-50%) scale(1.1); }
  70%  { opacity: 1; transform: translate(-50%,-58%) scale(1); }
  100% { opacity: 0; transform: translate(-50%,-90%) scale(.9); }
}
.praise-anim { animation: praisePop 1s ease-out forwards; }

/* ── Toast (auto-shuffle notice…) ─────────────────────────────── */
#toast {
  position: fixed;
  left: 50%;
  top: 22%;
  transform: translateX(-50%);
  background: rgba(30,70,52,.88);
  color: #fff;
  font-size: 14px;
  padding: 9px 18px;
  border-radius: 20px;
  z-index: 150;
  pointer-events: none;
  opacity: 0;
  white-space: nowrap;
  transition: opacity .25s;
}
#toast.show { opacity: 1; }

/* ── btn3d (game-common §1.4 / popup-common §6) ───────────────── */
.btn3d {
  --radius: 12px;
  --surface-color: rgba(255,255,255,.5);
  --surface-text: var(--text);
  --surface-height: 42px;
  --surface-width: auto;
  --surface-padding-x: 16px;
  --surface-font-size: 16px;
  position: relative;
  display: inline-block;
  padding: 0;
  border: 0;
  background: transparent;
  cursor: pointer;
  font: inherit;
  color: inherit;
  -webkit-user-select: none;
  user-select: none;
}

.btn3d-shadow { display: none; }

.btn3d-surface {
  position: relative;
  z-index: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  height: var(--surface-height);
  width: var(--surface-width);
  padding: 0 var(--surface-padding-x);
  border-radius: var(--radius);
  background: var(--surface-color);
  border: 1px solid var(--glass-border);
  color: var(--surface-text);
  font-family: var(--ui-font);
  font-size: var(--surface-font-size);
  letter-spacing: .5px;
  backdrop-filter: blur(8px);
  transition: transform .09s ease-out, background .1s;
}

.btn3d:active { transform: scale(.94); }
.btn3d:active .btn3d-surface { background: rgba(255,255,255,.75); }

.btn3d.btn-icon {
  --surface-height: 42px;
  --surface-width: 42px;
  --surface-padding-x: 0;
}

.back-ico    { width: 52%; height: 52%; fill: currentColor; display: block; }

#topbar-right { display: flex; gap: 8px; }

/* ── Responsive — thu nút icon khi màn thấp ────────────────────── */
@media (max-height: 640px) {
  #topbar .btn3d.btn-icon { --surface-height: 36px; --surface-width: 36px; }
  #tut-banner { padding: 9px 12px; }
}
@media (max-width: 360px) {
  .btn3d.btn-icon { --surface-height: 38px; --surface-width: 38px; }
}

/* ── Ngôi sao bay từ đường nối lên SCORE (đặc trưng game) ───────── */
.fly-star {
  position: fixed;
  z-index: 40;
  width: 20px; height: 20px;
  margin: -10px 0 0 -10px;        /* neo tâm sao vào toạ độ */
  pointer-events: none;
  will-change: transform, opacity;
  transition: transform .7s cubic-bezier(.45,0,.3,1), opacity .7s ease-in;
  filter: drop-shadow(0 0 5px rgba(255,206,77,.9));
}
.fly-star svg { width: 100%; height: 100%; display: block; }
@keyframes scorePulse { 0%,100% { transform: scale(1); } 40% { transform: scale(1.28); } }
.hud-pill.score-hit { animation: scorePulse .3s ease-out; }

/* ── Nút loa (bật/tắt SFX) trong header ────────────────────────── */
.snd-ico { width: 58%; height: 58%; display: block; }
.snd-slash { display: none; }
#sound-btn.muted .snd-waves { display: none; }
#sound-btn.muted .snd-slash { display: block; }

/* ── Tutorial banner (hướng dẫn từng bước) ────────────────────── */
#tut-banner {
  position: fixed;
  left: 50%;
  top: 80px;                /* JS đặt lại = ngay dưới header (giữa LEVEL-ẩn và bàn) */
  transform: translateX(-50%);
  z-index: 240;
  width: min(88%, 380px);
  display: flex;
  align-items: center;
  gap: 10px;
  background: rgba(30,70,52,.92);
  border-radius: 18px;
  padding: 12px 14px;
  box-shadow: 0 8px 24px rgba(9,40,26,.35);
  transition: opacity .2s;
}
#tut-banner.hidden { opacity: 0; pointer-events: none; }
#tut-text { flex: 1; color: #fff; font-size: 14px; line-height: 1.4; }

.btn3d.mini {
  --surface-height: 32px;
  --surface-font-size: 13px;
  --surface-padding-x: 12px;
  --surface-color: rgba(255,255,255,.18);
  --surface-text: #fff;
}

/* ── Pause veil (not a result popup — game-common §1.3 onAppPause) */
#pause-veil {
  position: fixed;
  inset: 0;
  z-index: 300;
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(23,60,44,.55);
  backdrop-filter: blur(4px);
  opacity: 1;
  transition: opacity .2s;
}
#pause-veil.hidden { opacity: 0; pointer-events: none; }
#pause-veil .pv-txt {
  color: #fff;
  font-size: 20px;
  letter-spacing: 1px;
  text-shadow: 0 2px 8px rgba(0,0,0,.4);
}
</style>
</head>
<body>

<canvas id="bg-canvas"></canvas>

<!-- Header chuẩn (theo cursed-knives): fixed overlay — Back | SCORE ★ | BEST ♛ | Volume, dưới là Level -->
<div id="topbar">
  <div id="hud-bar">
    <div class="btn3d btn-icon" id="back-btn" role="button" aria-label="Back" tabindex="0">
      <span class="btn3d-shadow"></span>
      <span class="btn3d-surface">
        <svg class="back-ico" viewBox="0 0 447.243 447.243" aria-hidden="true">
          <path fill="currentColor" d="M420.361 192.229a31.967 31.967 0 0 0-5.535-.41H99.305l6.88-3.2a63.998 63.998 0 0 0 18.08-12.8l88.48-88.48c11.653-11.124 13.611-29.019 4.64-42.4-10.441-14.259-30.464-17.355-44.724-6.914a32.018 32.018 0 0 0-3.276 2.754l-160 160c-12.504 12.49-12.515 32.751-.025 45.255l.025.025 160 160c12.514 12.479 32.775 12.451 45.255-.063a32.084 32.084 0 0 0 2.745-3.137c8.971-13.381 7.013-31.276-4.64-42.4l-88.32-88.64a64.002 64.002 0 0 0-16-11.68l-9.6-4.32h314.24c16.347.607 30.689-10.812 33.76-26.88 2.829-17.445-9.019-33.88-26.464-36.71z"/>
        </svg>
      </span>
    </div>
    <div class="hud-scores">
      <div class="hud-pill">
        <svg class="pill-ico" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M12 2 L14.9 8.6 L22 9.3 L16.7 14 L18.3 21 L12 17.3 L5.7 21 L7.3 14 L2 9.3 L9.1 8.6 Z"
                fill="#ffce4d" stroke="#e39a12" stroke-width="1" stroke-linejoin="round"/>
        </svg>
        <div class="pill-text">
          <div class="label" id="lbl-score">SCORE</div>
          <div class="value" id="hud-score">0</div>
        </div>
      </div>

/* ================================================================
 * §1. Native bridge (game-common §1 — game CÓ level)
 * ================================================================ */
function post(msg) {
  try {
    if (window.ReactNativeWebView && window.ReactNativeWebView.postMessage) {
      window.ReactNativeWebView.postMessage(JSON.stringify(msg));
    } else {
      console.log('[animal-connect → native]', msg);
      devSimulateNative(msg);
    }
  } catch (e) { /* ignore */ }
}

/* CHỈ chạy khi mở bằng browser thường (không có ReactNativeWebView):
 * giả lập việc app hiện popup rồi bấm Next/Retry, để playtest không bị
 * kẹt sau khi hết ván. Trong app thật hàm này không bao giờ được gọi —
 * app tự hiện popup và gọi onNextLevel/onRetryLevel (game-common §1.1/§1.3). */
function devSimulateNative(msg) {
  if (msg.type === 'game_result' && msg.showModal) {
    showToast(msg.result === 'win' ? 'Level clear!' : 'Time up!');
    setTimeout(() => {
      if (msg.result === 'win') window.onNextLevel();
      else window.onRetryLevel();
    }, 1400);
  }
}

function sendMessage(type, opts) {
  opts = opts || {};
  post({
    type,
    level: currentLevelIdx + 1,        // 1-indexed per spec
    result: opts.result ?? null,
    data:   opts.data   ?? null,
    showModal: opts.showModal === true,
  });
}

function saveData(payload) {
  const data = typeof payload === 'string' ? payload : JSON.stringify(payload);
  sendMessage('save_data', { data });
}

/* ── localStorage — trạng thái ván dở (game-common §1.2) ──────── */
const LS_KEY = 'animal_connect_v1';

function saveLocal(payload) {
  try {
    const s = typeof payload === 'string' ? payload : JSON.stringify(payload);
    localStorage.setItem(LS_KEY, s);
  } catch (e) { /* private mode / quota */ }
}
function readLocal() {
  try { return localStorage.getItem(LS_KEY) || ''; } catch (e) { return ''; }
}

/* ── statusBarHeight (game-common §2 — URL ưu tiên) ───────────── */
function getStatusBarHeight() {
  const params = new URLSearchParams(window.location.search);
  const fromUrl = params.get('statusBarHeight');
  const fromWin = typeof window.statusBarHeight !== 'undefined' ? window.statusBarHeight : null;
  let h = Number(fromUrl != null ? fromUrl : fromWin);
  if (Number.isNaN(h) || h < 0) h = 0;
  return h;
}

/* ── currentLevel (game-common §3 — window ưu tiên) ───────────── */
function getInitialLevelIdx() {
  const fromWin = typeof window.currentLevel === 'number' ? window.currentLevel : null;
  const fromUrl = new URLSearchParams(window.location.search).get('currentLevel');
  const raw = Number(fromWin != null ? fromWin : fromUrl);
  if (!Number.isFinite(raw) || raw < 1) return 0;
  return Math.min(Math.floor(raw) - 1, MAX_LEVEL_IDX);
}

/* ── data (game-common §4 — window ưu tiên) ───────────────────── */
function getInitialData() {
  const fromWin = typeof window.data === 'string' ? window.data : null;
  const fromUrl = new URLSearchParams(window.location.search).get('data');
  return fromWin != null ? fromWin : (fromUrl || '');
}

/* ================================================================
 * §2. Level definitions — VÔ HẠN, sinh theo công thức
 *  cols×rows (số ô, luôn chẵn) | types: số loại thú
 * ================================================================ */
/* ĐỘ KHÓ TĂNG DẦN CẢM NHẬN ĐƯỢC — 2 pha:
 *  • Pha 1 (level 1–5): BÀN lớn dần 6×6 → 8×10 (thấy rõ bàn to ra mỗi màn).
 *  • Pha 2 (level 6+):  bàn giữ MAX 8×10, `perPair` (giây/cặp) SIẾT dần tới sàn
 *    → cùng bàn to nhưng THỜI GIAN GIẢM ĐỀU mỗi màn = tín hiệu khó rõ ràng.
 * Thêm: loại thú 12→14, tỉ lệ cặp-kề `f` giảm (bàn khó tìm hơn), điểm cộng dồn.
 * Tile LUÔN đứng yên; không "màn cuối" → chỉ game_result win/lose. */
const SIZE_RAMP = [[6,6],[6,8],[8,8],[8,9],[8,10]];   // tiles 36→48→64→72→80
const SIZE_MAX  = [8,10];                             // level 6+ giữ ở max

function levelConfig(idx) {
  const [cols, rows] = idx < SIZE_RAMP.length ? SIZE_RAMP[idx] : SIZE_MAX;
  // types cao để ít cặp trùng: màn 1 = 12 loại, từ màn 3 đủ 14
  const types = Math.min(ANIMALS.length, 12 + Math.min(idx, 2));
  // giây/cặp siết từ 4.5 → sàn 2.0 (đạt sàn ~màn 15) → nhịp bắt buộc nhanh dần
  const pairs = (cols * rows) / 2;
  const perPair = Math.max(2.0, 4.5 - idx * 0.18);
  const time = Math.round(pairs * perPair / 5) * 5;   // làm tròn 5s
  return { cols, rows, types, time };
}

/* ================================================================
 * §4. Game state
 * ================================================================ */
let currentLevelIdx = 0;
let COLS = 6, ROWS = 6;
let grid  = [];         // grid[r][c] = type index | -1 (trống)
let tiles = [];         // tiles[r][c] = {type, el} | null (song song với grid)
let pairsLeft   = 0;
let score       = 0;       // ĐIỂM CỘNG DỒN cả run (lvl1 → endgame), reset khi run mới
let best        = 0;       // điểm cao nhất từng đạt (persist qua save_data + localStorage)
let timeTotal   = 90;      // giây của level hiện tại
let timeLeft    = 90;      // giây còn lại (float)
let busy        = false;   // đang animate match/shuffle
let ended       = false;
let paused      = false;
let selected    = null;    // {r, c}
let hintPair    = null;    // [{r,c},{r,c}] đang highlight
let cellPx      = 44;
let comboStreak = 0;
let lastMatchAt = 0;
let lastFindAt  = 0;       // mốc thời gian để đo "tìm cặp nhanh" (giờ ẩn → bonus)
let endCounter  = 0;       // đếm số ván kết thúc → bắn ads mỗi 3 ván
let levelEpoch  = 0;       // tăng mỗi loadLevel — vô hiệu continuation async cũ
let resultTimer = 0;       // setTimeout gửi game_result/victory (huỷ khi loadLevel)
let menuOpen    = false;   // (vestigial) luôn false — không còn màn menu, giữ để các gate còn hợp lệ
let tutorialMode = false;  // đang chạy tutorial tương tác
let tutStep      = 0;
let tutTarget    = null;   // cặp người chơi cần nối ở stage đang "dạy nối"
let tutTimerRunning = false;   // demo timer stage-2 đã chạy chưa (bắt đầu khi thao tác)
let tutorialSeen = false;  // đã qua tutorial chưa (persist qua save_data + localStorage)
let confirmOpen = false;   // (vestigial) luôn false — giữ để các gate còn hợp lệ

const boardEl  = document.getElementById('board');
const wrapEl   = document.getElementById('board-wrap');
const linkSvg  = document.getElementById('link-svg');

const sleep = ms => new Promise(res => setTimeout(res, ms));
const inb   = (r, c) => r >= 0 && r < ROWS && c >= 0 && c < COLS;
/* Chờ hết pause (onAppPause giữa animation match) rồi mới đi tiếp */
const waitWhilePaused = () => new Promise(res => {
  (function chk() { paused ? setTimeout(chk, 100) : res(); })();
});

/* ================================================================
 * §5. Tile DOM helpers
 * ================================================================ */
function makeTile(type) {
  const el = document.createElement('div');
  el.className = 'tile';
  el.innerHTML = `<div class="tile-inner"><svg viewBox="0 0 100 100" aria-hidden="true">${ANIMALS[type]}</svg></div>`;
  boardEl.appendChild(el);
  return { type, el };
}

function tileTransform(r, c) {
  return `translate(${c * cellPx + 2}px, ${r * cellPx + 2}px)`;
}

function applyTileSize(tile) {
  tile.el.style.width  = (cellPx - 4) + 'px';
  tile.el.style.height = (cellPx - 4) + 'px';
}

function layoutTile(tile, r, c) {
  applyTileSize(tile);
  tile.el.style.transform = tileTransform(r, c);
}

function layoutAll() {
  for (let r = 0; r < ROWS; r++)
    for (let c = 0; c < COLS; c++)
      if (tiles[r][c]) layoutTile(tiles[r][c], r, c);
}

/* ================================================================
 * §6. Resize & layout (game-common §2 statusBarHeight)
 * ================================================================ */
function resize() {
  const sbh    = getStatusBarHeight();
  const envTop = parseInt(getComputedStyle(document.documentElement)
                   .getPropertyValue('--sat') || '0') || 0;
  const topPad = Math.max(sbh, envTop) + 6;
  const topbar = document.getElementById('topbar');
  topbar.style.paddingTop = topPad + 'px';

  requestAnimationFrame(() => {
    // Header là overlay fixed → đẩy board xuống dưới header đúng chiều cao của nó.
    // Board GIỮ vị trí tự nhiên (không đẩy vì banner) — banner sẽ canh vào khoảng
    // trống phía trên bàn để nằm CHÍNH GIỮA header & bàn.
    const headH = topbar.getBoundingClientRect().height;
    document.getElementById('board-outer').style.paddingTop = headH + 'px';

    // Tutorial: chừa chỗ cho bảng hướng dẫn phía trên bàn (bàn nhỏ lại chút) để
    // luôn còn khoảng trống canh bảng vào chính giữa, không đè lên bàn.
    const banner = document.getElementById('tut-banner');
    const tutOn = tutorialMode && !banner.classList.contains('hidden');
    const bannerReserve = tutOn ? banner.getBoundingClientRect().height + 28 : 0;

    const availH = window.innerHeight - headH - 16 - bannerReserve;
    const availW = Math.min(window.innerWidth, 520) - 24 - 12;
    // Chừa ~1 ô chiều cao (ROWS+1) làm chỗ cho đường nối vòng ra ngoài biên,
    // để #board-outer overflow:hidden không cắt nét khi màn bị giới hạn chiều cao.
    cellPx = Math.max(16, Math.min(Math.floor(availW / COLS), Math.floor(availH / (ROWS + 1)), 58));

    const w = cellPx * COLS, h = cellPx * ROWS;
    boardEl.style.width  = w + 'px';
    boardEl.style.height = h + 'px';
    // +14 = padding 6×2 + border 1×2 (border-box)
    wrapEl.style.width   = (w + 14) + 'px';
    wrapEl.style.height  = (h + 14) + 'px';

    // Link overlay phủ thêm 1 ô ra ngoài mỗi phía (path đi vòng ngoài biên)
    linkSvg.style.left   = (6 - cellPx) + 'px';
    linkSvg.style.top    = (6 - cellPx) + 'px';
    linkSvg.style.width  = ((COLS + 2) * cellPx) + 'px';
    linkSvg.style.height = ((ROWS + 2) * cellPx) + 'px';
    linkSvg.setAttribute('viewBox', `0 0 ${(COLS + 2) * cellPx} ${(ROWS + 2) * cellPx}`);

    layoutAll();

    // Canh bảng hướng dẫn vào CHÍNH GIỮA khoảng trống giữa đáy header & mép trên bàn
    if (tutOn) {
      const bwTop = wrapEl.getBoundingClientRect().top;
      const bh = banner.getBoundingClientRect().height;
      const top = Math.max(headH + 6, headH + (bwTop - headH - bh) / 2);
      banner.style.top = top + 'px';

      // Mũi tên (stage 2): nằm ngay TRÊN bảng, canh giữa theo thanh timer, chỉ lên
      const arrow = document.getElementById('tut-arrow');
      if (tutStep === 2 && !arrow.classList.contains('hidden')) {
        const tbar = document.getElementById('time-bar-bg').getBoundingClientRect();
        arrow.style.left = (tbar.left + tbar.width / 2 - 13) + 'px';
        arrow.style.top  = Math.max(headH + 2, top - 58) + 'px';
      }
    }
  });
}

window.addEventListener('resize', () => {
  bgCanvas.width  = window.innerWidth;
  bgCanvas.height = window.innerHeight;
  resize();
});

/* ================================================================
 * §7. Board generation — chia đều cặp theo số loại thú
 * ================================================================ */
function shuffleArr(a) {
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

/* Tỉ lệ đặt cặp KỀ nhau theo level: level đầu nhiều hơn (dễ, an toàn), càng về
 * sau càng ít cặp kề → bàn rải rác/khó hơn. Trần hạ xuống ~0.6 để level đầu
 * không bị "quá nhiều cặp kề". */
function levelAdjFraction(idx) {
  return Math.max(0.2, 0.28 - idx * 0.01);
}

/* Sinh grid bằng SINH NGƯỢC (reverse-gen) → bàn LUÔN giải được (đặt từng cặp vào
 * 2 ô nối-được trên bàn đang lấp; thứ tự ngược luôn dọn được). Với xác suất f
 * (theo level) đặt cặp KỀ nhau (domino — an toàn, không gây deadlock), còn lại
 * rải rác cho khó. → gần như không bao giờ phải auto-xáo giữa chừng.
 * Không dựng DOM — dùng chung cho fillBoard & test. */
function genBoardGrid() {
  const lv = levelConfig(currentLevelIdx);
  const f = levelAdjFraction(currentLevelIdx);
  grid = Array.from({ length: ROWS }, () => new Array(COLS).fill(-1));
  let rem = [];
  for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) rem.push([r, c]);
  let tc = 0;
  while (rem.length >= 2) {
    const ai = (Math.random() * rem.length) | 0, a = rem[ai];
    const others = [];
    for (let i = 0; i < rem.length; i++) if (i !== ai) others.push(rem[i]);
    let b = null;
    // Xác suất f: đặt cặp KỀ nhau (2 ô sát cạnh — luôn nối được, không deadlock)
    if (Math.random() < f) {
      const adj = others.filter(x => Math.abs(x[0] - a[0]) + Math.abs(x[1] - a[1]) === 1);
      if (adj.length) b = adj[(Math.random() * adj.length) | 0];
    }
    // Còn lại: RẢI RÁC — đặt vào ô NỐI ĐƯỢC trên bàn đang lấp (đảm bảo giải được)
    if (!b) {
      const cand = shuffleArr(others.slice());
      for (const x of cand) if (findPath(a[0], a[1], x[0], x[1])) { b = x; break; }
      if (!b) b = others[0];   // cực hiếm (bàn gần đầy không còn đường) — chấp nhận
    }
    const ty = tc % lv.types; tc++;
    grid[a[0]][a[1]] = ty; grid[b[0]][b[1]] = ty;
    rem = rem.filter(x => x !== a && x !== b);
  }
}

function fillBoard() {
  genBoardGrid();
  buildTileDom(true);
}

/* Dựng DOM tiles từ grid (stagger: pop-in lần lượt) */
function buildTileDom(stagger) {
  boardEl.innerHTML = '';
  tiles = Array.from({ length: ROWS }, () => new Array(COLS).fill(null));
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      if (grid[r][c] < 0) continue;
      const tile = makeTile(grid[r][c]);
      tiles[r][c] = tile;
      layoutTile(tile, r, c);
      if (stagger) {
        const inner = tile.el.firstElementChild;   // animation chạy trên .tile-inner
        inner.style.animationDelay = ((r + c) * 16) + 'ms';
        tile.el.classList.add('popin');
        tile.el.addEventListener('animationend', () => {
          tile.el.classList.remove('popin');
          inner.style.animationDelay = '';
        }, { once: true });
      }
    }
  }
}

/* Ép tồn tại ít nhất 1 nước đi: đặt 2 tile cùng loại cạnh nhau ngang */
function forceOneMove() {
  const pos = [];
  for (let r = 0; r < ROWS; r++)
    for (let c = 0; c < COLS - 1; c++)
      if (grid[r][c] >= 0 && grid[r][c + 1] >= 0) pos.push([r, c]);
  if (!pos.length) return;
  const [r, c] = pos[Math.floor(Math.random() * pos.length)];
  // tìm 1 tile khác cùng loại với grid[r][c] rồi hoán vị nó về (r, c+1)
  const want = grid[r][c];
  for (let rr = 0; rr < ROWS; rr++) {
    for (let cc = 0; cc < COLS; cc++) {
      if ((rr === r && (cc === c || cc === c + 1)) || grid[rr][cc] !== want) continue;
      const tmp = grid[r][c + 1];
      grid[r][c + 1] = grid[rr][cc];
      grid[rr][cc] = tmp;
      return;
    }
  }
}

/* ================================================================
 * §8. Pathfinding — nối 2 ô bằng ≤ 3 đoạn thẳng (≤ 2 lần rẽ).
 * Tọa độ "padded": ô (r,c) → (r+1, c+1) trong lưới (ROWS+2)×(COLS+2);
 * vành ngoài luôn đi được (rule Onet: đường được vòng ra ngoài biên).
 * Trả về mảng điểm gãy [[pr,pc]…] hoặc null.
 * ================================================================ */
function findPath(r1, c1, r2, c2) {
  const H = ROWS + 2, W = COLS + 2;
  const A = [r1 + 1, c1 + 1], B = [r2 + 1, c2 + 1];

  const passable = (pr, pc) => {
    if (pr < 0 || pr >= H || pc < 0 || pc >= W) return false;
    if (pr === B[0] && pc === B[1]) return true;      // ô đích được phép vào
    const gr = pr - 1, gc = pc - 1;
    if (gr < 0 || gr >= ROWS || gc < 0 || gc >= COLS) return true; // vành ngoài
    return grid[gr][gc] < 0;
  };

  // các ô strictly-giữa p và q (cùng hàng/cột) đều trống?
  const clearBetween = (p, q) => {
    if (p[0] === q[0]) {
      const [lo, hi] = p[1] < q[1] ? [p[1], q[1]] : [q[1], p[1]];
      for (let c = lo + 1; c < hi; c++) if (!passable(p[0], c)) return false;
      return true;
    }
    if (p[1] === q[1]) {
      const [lo, hi] = p[0] < q[0] ? [p[0], q[0]] : [q[0], p[0]];
      for (let r = lo + 1; r < hi; r++) if (!passable(r, p[1])) return false;
      return true;
    }
    return false;
  };
  const samePt = (p, q) => p[0] === q[0] && p[1] === q[1];

  // ── 0 rẽ: thẳng hàng
  if ((A[0] === B[0] || A[1] === B[1]) && clearBetween(A, B)) return [A, B];

  // ── 1 rẽ: góc tại (A.r, B.c) hoặc (B.r, A.c)
  for (const K of [[A[0], B[1]], [B[0], A[1]]]) {
    if (samePt(K, A) || samePt(K, B)) continue;
    if (passable(K[0], K[1]) && clearBetween(A, K) && clearBetween(K, B)) return [A, K, B];
  }

  // ── 2 rẽ: đi thẳng từ A theo 4 hướng tới K1, rồi nối 1-rẽ K1 → B
  const DIRS = [[0, 1], [0, -1], [1, 0], [-1, 0]];
  for (const [dr, dc] of DIRS) {
    let pr = A[0] + dr, pc = A[1] + dc;
    while (passable(pr, pc) && !(pr === B[0] && pc === B[1])) {
      const K1 = [pr, pc];
      for (const K2 of [[K1[0], B[1]], [B[0], K1[1]]]) {
        if (samePt(K2, K1) || samePt(K2, B) || samePt(K2, A)) continue;
        if (passable(K2[0], K2[1]) && clearBetween(K1, K2) && clearBetween(K2, B)) {
          return [A, K1, K2, B];
        }
      }
      pr += dr; pc += dc;
    }
  }
  return null;
}

/* Tìm đường có SỐ RẼ ÍT NHẤT (cho phép >2 rẽ) — để MINH HOẠ vì sao 1 cặp không
 * nối được (cần >2 lần rẽ). 0-1 BFS trên (ô, hướng). Trả {pts (padded), bends, turns}. */
function findMinTurnPath(r1, c1, r2, c2) {
  const H = ROWS + 2, W = COLS + 2;
  const A = [r1 + 1, c1 + 1], B = [r2 + 1, c2 + 1];
  const passable = (pr, pc) => {
    if (pr < 0 || pr >= H || pc < 0 || pc >= W) return false;
    if (pr === B[0] && pc === B[1]) return true;
    const gr = pr - 1, gc = pc - 1;
    if (gr < 0 || gr >= ROWS || gc < 0 || gc >= COLS) return true;
    return grid[gr][gc] < 0;
  };
  const DIRS = [[-1, 0], [1, 0], [0, -1], [0, 1]];
  const key = (pr, pc, d) => (pr * W + pc) * 4 + d;
  const best = new Map(), parent = new Map();
  const dq = [];
  for (let d = 0; d < 4; d++) {
    const nr = A[0] + DIRS[d][0], nc = A[1] + DIRS[d][1];
    if (passable(nr, nc)) { best.set(key(A[0], A[1], d), 0); parent.set(key(A[0], A[1], d), -1); dq.push({ pr: A[0], pc: A[1], d, t: 0 }); }
  }
  let endK = -1, endT = Infinity;
  while (dq.length) {
    const cur = dq.shift();
    const ck = key(cur.pr, cur.pc, cur.d);
    if (best.get(ck) < cur.t) continue;
    if (cur.pr === B[0] && cur.pc === B[1]) { if (cur.t < endT) { endT = cur.t; endK = ck; } continue; }
    if (cur.t > 6) continue;
    for (let nd = 0; nd < 4; nd++) {
      const nr = cur.pr + DIRS[nd][0], nc = cur.pc + DIRS[nd][1];
      if (!passable(nr, nc)) continue;
      const nt = cur.t + (nd === cur.d ? 0 : 1);
      const nk = key(nr, nc, nd);
      if (nt < (best.has(nk) ? best.get(nk) : Infinity)) {
        best.set(nk, nt); parent.set(nk, ck);
        (nd === cur.d) ? dq.unshift({ pr: nr, pc: nc, d: nd, t: nt }) : dq.push({ pr: nr, pc: nc, d: nd, t: nt });
      }
    }
  }
  if (endK < 0) return null;
  const chain = [];
  for (let k = endK; k !== -1; k = parent.get(k)) {
    const d = k % 4, cell = (k - d) / 4;
    chain.push([Math.floor(cell / W), cell % W, d]);
  }
  chain.reverse();
  const pts = chain.map(c => [c[0], c[1]]);
  const bends = [];
  for (let i = 1; i < chain.length - 1; i++) if (chain[i][2] !== chain[i + 1][2]) bends.push([chain[i][0], chain[i][1]]);
  return { pts, bends, turns: endT };
}

/* Có còn nước đi nào không? (quét theo loại, thoát sớm) */
function hasMoves() { return findAnyPair(false) !== null; }

/* Tìm 1 cặp nối được. randomize=true → bắt đầu từ loại ngẫu nhiên (hint) */
function findAnyPair(randomize) {
  if (grid.length !== ROWS) return null;   // guard: board chưa dựng
  const byType = new Map();
  for (let r = 0; r < ROWS; r++)
    for (let c = 0; c < COLS; c++)
      if (grid[r][c] >= 0) {
        if (!byType.has(grid[r][c])) byType.set(grid[r][c], []);
        byType.get(grid[r][c]).push([r, c]);
      }
  const types = [...byType.keys()];
  if (randomize) shuffleArr(types);
  for (const ty of types) {
    const pos = byType.get(ty);
    for (let i = 0; i < pos.length - 1; i++)
      for (let j = i + 1; j < pos.length; j++)
        if (findPath(pos[i][0], pos[i][1], pos[j][0], pos[j][1]))
          return [pos[i], pos[j]];
  }
  return null;
}

/* ================================================================
 * §9. Connector line — vẽ path lên overlay SVG rồi tự mờ
 * ================================================================ */
let linkTimer = 0;
function drawLink(pathPts) {
  // Gốc overlay lệch −1 ô so với board → điểm padded (pr,pc) = tâm ô đó.
  // Điểm trên vành ngoài được kẹp lại để line không văng khỏi mép màn hình.
  const br = boardEl.getBoundingClientRect();
  const xMin = cellPx - br.left + 5,  xMax = cellPx + (window.innerWidth  - br.left) - 5;
  const yMin = cellPx - br.top  + 5,  yMax = cellPx + (window.innerHeight - br.top)  - 5;
  const ptsAttr = pathPts.map(([pr, pc]) => {
    const x = Math.min(Math.max(pc * cellPx + cellPx / 2, xMin), xMax);
    const y = Math.min(Math.max(pr * cellPx + cellPx / 2, yMin), yMax);
    return `${x},${y}`;
  }).join(' ');
  clearTimeout(linkTimer);   // match nối tiếp nhanh: không để timer cũ xoá line mới
  linkSvg.innerHTML =
    `<polyline class="link-path under link-anim" points="${ptsAttr}"/>` +
    `<polyline class="link-path link-anim" points="${ptsAttr}"/>`;
  linkTimer = setTimeout(() => { linkSvg.innerHTML = ''; }, 380);
}

/* MINH HOẠ tutorial: vẽ đường "quá vòng" (>2 rẽ) màu đỏ nét đứt + chấm tại mỗi
   chỗ rẽ → cho người chơi THẤY vì sao cặp này không nối được. */
function drawBendPath(pts, bends, holdMs) {
  const toXY = ([pr, pc]) => [pc * cellPx + cellPx / 2, pr * cellPx + cellPx / 2];
  const ptsAttr = pts.map(toXY).map(([x, y]) => `${x},${y}`).join(' ');
  let dots = '';
  bends.forEach(b => { const [x, y] = toXY(b); dots += `<circle class="bend-dot" cx="${x}" cy="${y}" r="${cellPx * 0.16}"/>`; });
  clearTimeout(linkTimer);
  linkSvg.innerHTML =
    `<polyline class="bend-path-under" points="${ptsAttr}"/>` +
    `<polyline class="bend-path" points="${ptsAttr}"/>` + dots;
  linkTimer = setTimeout(() => { linkSvg.innerHTML = ''; }, holdMs || 2000);
}

/* ================================================================
 * §11. Input — tap chọn 2 tile cùng loại
 * ================================================================ */
boardEl.addEventListener('pointerdown', e => {
  if (busy || ended || paused || menuOpen || confirmOpen || !tiles.length) return;
  const rect = boardEl.getBoundingClientRect();
  const c = Math.floor((e.clientX - rect.left) / cellPx);
  const r = Math.floor((e.clientY - rect.top) / cellPx);
  if (!inb(r, c) || !tiles[r] || !tiles[r][c]) return;
  handleTap(r, c);
}, { passive: true });

function handleTap(r, c) {
  idleAcc = 0;                 // có thao tác → reset đồng hồ auto-hint
  if (tutorialMode && tutStep === 2) tutTimerRunning = true;   // thao tác → demo timer chạy
  if (!selected) { select(r, c); return; }
  const { r: sr, c: sc } = selected;
  if (sr === r && sc === c) { deselect(); return; }

  const same = grid[sr][sc] === grid[r][c];
  const path = same ? findPath(sr, sc, r, c) : null;

  if (tutorialMode && tutStep < 2) {
    if (tutStep === 0) {                         // STAGE 0 — chỉ cho nối cặp được chỉ
      if (path && isTutTarget(sr, sc, r, c)) { doMatch([sr, sc], [r, c], path); return; }
      if (same && path) { tutWrongChoice(sr, sc, r, c); return; }   // cặp giống nhưng sai chỗ
    } else {                                     // STAGE 1 — demo đường "quá vòng"
      if (same && !path) { deselect(); tutShowBend(sr, sc, r, c); return; }  // cặp bị chặn → VẼ 3 rẽ
      if (same && path)  { tutWrongChoice(sr, sc, r, c); return; }           // chọn sai
    }
    // khác loại → nhắc nhẹ, đổi ô chọn
    SND.bad(); shakeTile(sr, sc); shakeTile(r, c); deselect(); select(r, c);
    return;
  }

  if (same && path) { doMatch([sr, sc], [r, c], path); return; }
  // Không nối được / khác loại → rung nhẹ cả hai, bỏ chọn (không chọn tile mới)
  SND.bad();
  shakeTile(sr, sc); shakeTile(r, c);
  deselect();
}

function select(r, c) {
  selected = { r, c };
  tiles[r][c].el.classList.add('selected');
  SND.select();
}

function deselect() {
  if (!selected) return;
  const tl = tiles[selected.r][selected.c];
  if (tl) tl.el.classList.remove('selected');
  selected = null;
}

function shakeTile(r, c) {
  const tl = tiles[r][c];
  if (!tl) return;
  tl.el.classList.remove('shake');
  void tl.el.offsetWidth;
  tl.el.classList.add('shake');
}

/* ================================================================
 * §12. Match flow — line → pop → shift → deadlock check
 * ================================================================ */
async function doMatch(a, b, path) {
  busy = true;
  idleAcc = 0;
  const ep = levelEpoch;   // continuation cũ không được đụng level mới
  try {
    deselect();
    clearHint();

    // Combo: match liên tiếp trong 4s (giữ để đổi cao độ SFX + badge)
    const now = performance.now();
    comboStreak = (now - lastMatchAt < 4000) ? comboStreak + 1 : 1;
    lastMatchAt = now;
    // Đồng hồ ẩn: thời gian TÌM ra cặp này (từ lần nối trước / lúc bàn sẵn sàng)
    const findMs = now - lastFindAt;
    lastFindAt = now;
    SND.match(comboStreak);
    if (comboStreak >= 2) showComboBadge(comboStreak);

    drawLink(path);

    const [ar, ac] = a, [br, bc] = b;
    const tA = tiles[ar][ac], tB = tiles[br][bc];
    grid[ar][ac] = -1; grid[br][bc] = -1;
    tiles[ar][ac] = null; tiles[br][bc] = null;
    pairsLeft--;

    // ★ Đặc trưng game: rải sao dọc ĐƯỜNG NỐI (mỗi ~1 cạnh tile 1 sao) rồi
    // bay lên SCORE. Đường càng dài → càng nhiều sao → càng nhiều điểm.
    // Cơ chế giờ ẩn: tìm cặp NHANH → thưởng điểm + lời khen nhỏ (cân bằng nhẹ).
    // (Tutorial là tập chơi → KHÔNG tính điểm, không rải sao.)
    if (!tutorialMode) {
      const nStars = spawnStars(path);
      let gained = nStars * STAR_POINTS;
      let praise = '';
      if (findMs < 1100)      { gained += 2; praise = t('praiseWow');  }   // rất nhanh
      else if (findMs < 2200) { gained += 1; praise = t('praiseFast'); }   // nhanh
      score += gained;
      updateHUD();
      if (praise) showPraise(praise, gained - nStars * STAR_POINTS);
    }

    spawnBurst(ar, ac); spawnBurst(br, bc);
    tA.el.classList.add('pop'); tB.el.classList.add('pop');

    if (tutorialMode) {
      spawnCheck((ar + br) / 2, (ac + bc) / 2);   // ✓ nhấn mạnh "đã nối"
      tutOnMatch();                                // tutorial: chuyển bước / hoàn thành
    } else if (pairsLeft <= 0) {
      winLevel();
    }

    await sleep(300);
    if (ep !== levelEpoch) return;   // loadLevel đã chạy trong lúc animate
    tA.el.remove(); tB.el.remove();
    if (ended) return;

    await waitWhilePaused();         // onAppPause giữa match → đứng yên chờ
    if (ep !== levelEpoch || ended) return;

    // Bàn tutorial: không auto-xáo (giữ bàn tĩnh để dạy)
    if (tutorialMode) return;

    // Tile LUÔN đứng yên (không còn cơ chế dồn) — giữ nguyên vị trí sau mỗi match.

    // Deadlock → tự xáo (miễn phí)
    if (!hasMoves()) {
      showToast(t('noMoves'));
      SND.shuffle();
      await sleep(500);
      if (ep !== levelEpoch || ended) return;
      await reshuffleBoard();
      if (ep !== levelEpoch) return;
    }
    saveCurrentState();
  } finally {
    if (ep === levelEpoch) busy = false;   // đừng mở khoá input của level MỚI
  }
}

/* ================================================================
 * §13. Hint & Shuffle
 * ================================================================ */
function clearHint() {
  if (!hintPair) return;
  for (const [r, c] of hintPair)
    if (tiles[r][c]) tiles[r][c].el.classList.remove('hint');
  hintPair = null;
}

/* Auto-hint: 5s không thao tác mà chưa nối được → tự nháy 1 cặp nối được
   (thay cho nút Hint đã bỏ). Đồng hồ idleAcc chạy trong mainLoop. */
function showAutoHint() {
  if (busy || ended || paused || tutorialMode || !tiles.length) return;
  const pair = findAnyPair(true);
  if (!pair) return;
  clearHint();
  hintPair = pair.map(p => p.slice());
  for (const [r, c] of pair) if (tiles[r][c]) tiles[r][c].el.classList.add('hint');
  SND.hint();
}

/* Xáo lại các tile còn trên bàn; đảm bảo sau xáo còn nước đi */
async function reshuffleBoard() {
  deselect(); clearHint();
  const pos = [];
  for (let r = 0; r < ROWS; r++)
    for (let c = 0; c < COLS; c++)
      if (grid[r][c] >= 0) pos.push([r, c]);
  if (pos.length < 4) return;

  let vals = pos.map(([r, c]) => grid[r][c]);
  let tries = 0;
  do {
    shuffleArr(vals);
    pos.forEach(([r, c], i) => { grid[r][c] = vals[i]; });
    tries++;
  } while (tries < 60 && !hasMoves());
  // Xáo 60 lần vẫn bí → ép 1 nước; ép xong PHẢI kiểm lại (bàn không có 2 ô
  // kề nhau thì forceOneMoveAmong bó tay) — xáo tiếp tới khi chắc chắn có nước
  let guard = 0;
  while (!hasMoves() && guard++ < 20) {
    forceOneMoveAmong(pos);
    if (hasMoves()) break;
    shuffleArr(vals);
    pos.forEach(([r, c], i) => { grid[r][c] = vals[i]; });
  }

  // Cập nhật hình từng tile tại chỗ + pop nhẹ
  for (const [r, c] of pos) {
    const tl = tiles[r][c];
    tl.type = grid[r][c];
    tl.el.querySelector('svg').innerHTML = ANIMALS[grid[r][c]];
    tl.el.classList.remove('popin');
    void tl.el.offsetWidth;
    tl.el.classList.add('popin');
  }
  await sleep(280);
}

/* Ép 1 nước đi trong tập ô đang có tile (sau xáo bí): tìm 2 ô kề nhau
 * (ngang HOẶC dọc) rồi hoán vị để chúng cùng loại — 2 tile cùng loại kề
 * nhau luôn nối được. Mỗi loại luôn còn ≥ 2 tile (xoá theo cặp) nên hễ
 * có ô kề nhau là ép được. */
function forceOneMoveAmong(pos) {
  for (const [r, c] of pos) {
    for (const [nr, nc] of [[r, c + 1], [r + 1, c]]) {
      if (!inb(nr, nc) || grid[nr][nc] < 0) continue;
      const want = grid[r][c];
      for (const [rr, cc] of pos) {
        if ((rr === r && cc === c) || (rr === nr && cc === nc) || grid[rr][cc] !== want) continue;
        const tmp = grid[nr][nc];
        grid[nr][nc] = grid[rr][cc];
        grid[rr][cc] = tmp;
        return;
      }
    }
  }
}

/* ================================================================
 * §14. HUD + hiệu ứng điểm
 * ================================================================ */
function updateHUD() {
  if (score > best) best = score;                                    // cập nhật kỷ lục live
  document.getElementById('hud-score').textContent = score;
  document.getElementById('hud-best').textContent  = best;
  document.getElementById('hud-level').textContent = currentLevelIdx + 1;
}

function updateLabels() {
  document.getElementById('lbl-score').textContent = t('score');
  document.getElementById('lbl-best').textContent  = t('best');
  document.getElementById('lbl-level').textContent = t('level');
  document.getElementById('pause-txt').textContent = t('tapResume');
  document.getElementById('back-btn').setAttribute('aria-label', t('back'));
  document.getElementById('sound-btn').setAttribute('aria-label', t('sound'));
  document.getElementById('tut-skip-label').textContent = t('skip');
}

/* ★ Ngôi sao bay lên SCORE — rải dọc đường nối, mỗi ~1 cạnh tile 1 sao.
   Trả về SỐ sao (đường càng dài càng nhiều sao → nhiều điểm). */
const STAR_POINTS = 1;   // 1 điểm / sao (điểm = số sao, không còn bội số 10)
const STAR_SVG = '<svg viewBox="0 0 24 24"><path d="M12 2 L14.9 8.6 L22 9.3 L16.7 14 L18.3 21 L12 17.3 L5.7 21 L7.3 14 L2 9.3 L9.1 8.6 Z" fill="#ffce4d" stroke="#e39a12" stroke-width="1.3" stroke-linejoin="round"/></svg>';

function spawnStars(pathPtsPadded) {
  const br = boardEl.getBoundingClientRect();
  // padded (pr,pc) → tâm ô board (pr-1,pc-1) theo toạ độ viewport
  const pts = pathPtsPadded.map(([pr, pc]) => ({
    x: br.left + (pc - 1) * cellPx + cellPx / 2,
    y: br.top  + (pr - 1) * cellPx + cellPx / 2,
  }));
  // Rải 1 sao mỗi ~cellPx dọc polyline, từ điểm đầu tới điểm cuối
  const STEP = cellPx;
  const starPts = [{ x: pts[0].x, y: pts[0].y }];
  let carry = 0;
  for (let i = 1; i < pts.length; i++) {
    let ax = pts[i - 1].x, ay = pts[i - 1].y;
    const bx = pts[i].x, by = pts[i].y;
    let seg = Math.hypot(bx - ax, by - ay);
    if (seg < 0.001) continue;
    const ux = (bx - ax) / seg, uy = (by - ay) / seg;
    let need = STEP - carry;
    while (need <= seg + 0.001) {
      ax += ux * need; ay += uy * need;
      starPts.push({ x: ax, y: ay });
      seg -= need; carry = 0; need = STEP;
    }
    carry += seg;
  }
  const tRect = document.getElementById('hud-score').getBoundingClientRect();
  const tx = tRect.left + tRect.width / 2, ty = tRect.top + tRect.height / 2;
  starPts.forEach((p, i) => flyStar(p.x, p.y, tx, ty, i));
  return Math.max(1, starPts.length);
}

/* Nhịp sao ĐỀU cho mọi độ dài (gần/xa cùng cảm giác), tổng thể chậm ~1.25×:
   sao thứ i hiện tại chỗ đường nối lúc i×STAGGER, đứng DWELL rồi bay lên SCORE. */
const STAR_STAGGER = 60;   // ms giữa 2 sao liên tiếp
const STAR_DWELL   = 300;  // ms sao "đậu" trên đường nối trước khi bay
function flyStar(x, y, tx, ty, idx) {
  setTimeout(() => {
    const el = document.createElement('div');
    el.className = 'fly-star';
    el.innerHTML = STAR_SVG;
    el.style.left = x + 'px';
    el.style.top  = y + 'px';
    el.style.transform = 'scale(1)';
    el.style.opacity = '1';
    document.body.appendChild(el);
    setTimeout(() => {
      el.style.transform = `translate(${tx - x}px, ${ty - y}px) scale(.4)`;
      el.style.opacity = '.15';
    }, STAR_DWELL);
    el.addEventListener('transitionend', e => {
      if (e.propertyName === 'transform') { el.remove(); pulseScore(); }
    }, { once: true });
    setTimeout(() => { if (el.parentNode) el.remove(); }, STAR_DWELL + 1200);
  }, idx * STAR_STAGGER);
}

function pulseScore() {
  const pill = document.getElementById('hud-score').closest('.hud-pill');
  if (!pill) return;
  pill.classList.remove('score-hit');
  void pill.offsetWidth;
  pill.classList.add('score-hit');
}

const BURST_COLORS = ['#ff8a3d', '#ffd23f', '#6cc24a', '#3d9fff', '#ff6b9d'];
function spawnBurst(r, c) {
  for (let i = 0; i < 6; i++) {
    const p = document.createElement('div');
    p.className = 'burst';
    const ang = (i / 6) * Math.PI * 2 + Math.random() * .6;
    const dist = cellPx * (0.7 + Math.random() * 0.5);
    p.style.setProperty('--bx', Math.cos(ang) * dist + 'px');
    p.style.setProperty('--by', Math.sin(ang) * dist + 'px');
    p.style.background = BURST_COLORS[Math.floor(Math.random() * BURST_COLORS.length)];
    p.style.left = (c * cellPx + cellPx / 2 - 4) + 'px';
    p.style.top  = (r * cellPx + cellPx / 2 - 4) + 'px';
    boardEl.appendChild(p);
    p.addEventListener('animationend', () => p.remove(), { once: true });
  }
}

function showComboBadge(streak) {
  const el = document.getElementById('combo-badge');
  el.textContent = `×${streak}`;
  el.classList.remove('combo-anim');
  void el.offsetWidth;
  el.classList.add('combo-anim');
}

/* Lời khen nhỏ khi nối nhanh (cơ chế giờ ẩn) */
function showPraise(text, bonus) {
  const el = document.getElementById('praise');
  el.textContent = bonus > 0 ? `${text} +${bonus}` : text;
  el.classList.remove('praise-anim');
  void el.offsetWidth;
  el.classList.add('praise-anim');
}

/* Tick ✓ nổ ra ở giữa cặp vừa nối (nhấn mạnh "connection" trong tutorial) */
function spawnCheck(boardR, boardC) {
  const br = boardEl.getBoundingClientRect();
  const el = document.getElementById('tut-check');
  el.style.left = (br.left + boardC * cellPx + cellPx / 2) + 'px';

let toastTimer = null;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 1600);
}

let lastTs = null;
let idleAcc = 0;      // giây rảnh (không thao tác) → auto-hint khi ≥5s
let timerUiAcc = 1;   // dồn dt để render thanh giờ ~5 lần/s
let lastTickSec = -1; // tiếng tick mỗi giây ở 10s cuối

/* Đồng hồ đếm ngược (mainLoop, dt độc lập refresh rate). Hết giờ = THUA/endgame. */
function tickTimer(dt) {
  // Tutorial stage 2: demo timer chạy sau khi người chơi thao tác — chỉ đếm
  // xuống + vẽ, KHÔNG gây thua (kẹt ở 0 nếu chưa dọn xong).
  if (tutorialMode) {
    if (tutStep === 2 && tutTimerRunning && !ended && !paused && timeLeft > 0) {
      timeLeft = Math.max(0, timeLeft - dt);
      timerUiAcc += dt;
      if (timerUiAcc >= 0.15) { timerUiAcc = 0; renderTimer(); }
    }
    return;
  }
  if (paused || ended || menuOpen || confirmOpen) return;
  timeLeft -= dt;
  if (timeLeft <= 0) {
    timeLeft = 0;
    renderTimer();
    if (pairsLeft > 0) loseLevel();       // chưa sạch bàn mà hết giờ → thua
    return;
  }
  const s = Math.ceil(timeLeft);
  if (s !== lastTickSec) { lastTickSec = s; if (s <= 10) SND.tick(); }
  timerUiAcc += dt;
  if (timerUiAcc >= 0.2) { timerUiAcc = 0; renderTimer(); }
}

function renderTimer() {
  const frac = timeTotal > 0 ? Math.max(0, timeLeft / timeTotal) : 0;
  const fill = document.getElementById('time-bar-fill');
  fill.style.width = (frac * 100) + '%';
  fill.classList.toggle('warn',   frac <= .35 && frac > .15);
  fill.classList.toggle('danger', frac <= .15 && !ended);
  const secs = document.getElementById('hud-secs');
  secs.textContent = Math.ceil(Math.max(0, timeLeft));
  secs.classList.toggle('danger', frac <= .15 && !ended);
}

/* ================================================================
 * §16. Win / Lose (game-common §1.1). Điểm CỘNG DỒN cả run; hết giờ = endgame.
 * ================================================================ */
function winLevel() {
  if (ended) return;
  ended = true;
  deselect(); clearHint();
  updateHUD();

  SND.win();
  const newIdx = Math.min(currentLevelIdx + 1, MAX_LEVEL_IDX);
  // Thắng màn → sang màn kế, GIỮ điểm cộng dồn
  saveData({ levelIdx: newIdx, score, tutorialSeen, muted, best });
  saveLocal({ levelIdx: newIdx, score, tutorialSeen, muted, best });   // xoá snapshot ván dở
  maybeRequestAds();

  clearTimeout(resultTimer);
  resultTimer = setTimeout(() => {
    sendMessage('game_result', { result: 'win', showModal: true });
  }, 450);
}

/* Hết giờ = THUA = ENDGAME: điểm cộng dồn là điểm cuối; run kế bắt đầu lại từ
 * màn 1, điểm 0. */
function loseLevel() {
  if (ended) return;
  ended = true;
  deselect(); clearHint();
  renderTimer();
  SND.lose();
  if (score > best) best = score;
  saveData({ levelIdx: 0, score: 0, tutorialSeen, muted, best });
  saveLocal({ levelIdx: 0, score: 0, tutorialSeen, muted, best });
  maybeRequestAds();

  clearTimeout(resultTimer);
  resultTimer = setTimeout(() => {
    sendMessage('game_result', { result: 'lose', showModal: true });
  }, 450);
}

/* Bắn `ads` mỗi 3 ván kết thúc (game-common §1.7) */
function maybeRequestAds() {
  endCounter++;
  if (endCounter % 3 === 0) sendMessage('ads');
}

/* ================================================================
 * §17. Persist trạng thái ván (localStorage — game-common §1.2)
 * ================================================================ */
function saveCurrentState() {
  if (ended || tutorialMode || !grid.length) return;   // đừng persist board tutorial
  saveLocal({
    levelIdx: currentLevelIdx,
    score,                                    // điểm cộng dồn của run (top-level)
    tutorialSeen,
    muted,
    best,
    game: {
      grid: grid.map(row => row.slice()),
      score, endCounter, timeLeft: Math.ceil(timeLeft),
    },
  });
}

function tryRestoreState(idx) {
  const raw = readLocal();
  if (!raw) return false;
  try {
    const obj = JSON.parse(raw);
    if (obj.levelIdx !== idx || !obj.game || !Array.isArray(obj.game.grid)) return false;
    const g = obj.game;
    if (g.grid.length !== ROWS || g.grid.some(row => !Array.isArray(row) || row.length !== COLS)) return false;

    grid = g.grid.map(row => row.map(v =>
      (typeof v === 'number' && v >= 0 && v < ANIMALS.length) ? v : -1));
    let count = 0;
    for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) if (grid[r][c] >= 0) count++;
    if (count < 2 || count % 2 !== 0) return false;

    const num = (v, dflt) => Number.isFinite(Number(v)) ? Number(v) : dflt;
    pairsLeft  = count / 2;
    score      = num(g.score, 0);
    endCounter = num(g.endCounter, 0);
    timeLeft   = Math.min(Math.max(num(g.timeLeft, timeTotal), 3), timeTotal);   // giữ giờ còn lại

    if (!hasMoves()) forceOneMove();   // sửa grid TRƯỚC khi dựng DOM
    buildTileDom(false);
    return true;
  } catch (e) { return false; }
}

/* ================================================================
 * §18. Load level
 * ================================================================ */
function loadLevel(idx) {
  levelEpoch++;               // vô hiệu mọi continuation async của ván cũ
  clearTimeout(resultTimer);  // đừng gửi game_result của ván cũ sau khi reset
  currentLevelIdx = idx;
  const lv = levelConfig(idx);
  COLS = lv.cols; ROWS = lv.rows;
  pairsLeft    = (COLS * ROWS) / 2;
  // KHÔNG reset score ở đây → điểm cộng dồn qua các màn (run mới reset ở boot/retry)
  timeTotal = lv.time; timeLeft = lv.time; lastTickSec = -1; timerUiAcc = 1;
  busy = false; ended = false; paused = false;
  selected = null; hintPair = null;
  comboStreak = 0; lastMatchAt = 0; idleAcc = 0; lastFindAt = performance.now();
  linkSvg.innerHTML = '';
  document.getElementById('pause-veil').classList.add('hidden');
  // rời tutorial nếu đang dở (an toàn khi native gọi next/retry giữa chừng)
  tutorialMode = false;
  document.getElementById('tut-banner').classList.add('hidden');
  document.getElementById('hud-sub').style.display = '';   // hiện lại LEVEL

  fillBoard();
  updateLabels();
  updateHUD();
  renderTimer();
  resize();
  saveCurrentState();
}

/* ================================================================
 * §18b. Tutorial — 1 BÀN 5×5 duy nhất, KHÔNG chuyển cảnh.
 * Stage 0: NỐI 2 con giống nhau (chỉ cho nối cặp được chỉ) → ✓.
 * Stage 1: thử nối cặp CÙNG loại BỊ CHẶN → game VẼ đường "quá vòng" (3 lần rẽ,
 *   >2) để thấy vì sao không nối được. Bấm nhầm cặp giống-nối-được → nhắc.
 * Stage 2: DỌN NỐT cả bàn (cặp bị chặn mở ra sau khi dọn blocker) → xong.
 * Bắt buộc lần đầu mở game (tutorialSeen persist).
 * ================================================================ */
const TUT_COLS = 5, TUT_ROWS = 5;
const TUT_CONNECT = [[4, 0], [4, 1]];   // cặp dễ, tách biệt — dạy nối (stage 0)
const TUT_BEND    = [[1, 1], [3, 2]];   // cặp CÙNG loại nhưng cần 3 lần rẽ (stage 1)
const TUT_TILES = [                       // [r, c, type] — bàn 5×5 hơi rối
  [0, 2, 6], [0, 3, 6],                  // H
  [1, 1, 0], [3, 2, 0],                  // B = TUT_BEND (cùng loại, đường 3 rẽ)
  [1, 2, 5], [2, 1, 5],                  // X — chặn quanh B
  [2, 0, 7], [3, 0, 7],                  // Y — chặn cột trái
  [1, 4, 9], [2, 4, 9],                  // I
  [3, 3, 8], [3, 4, 8],                  // G
  [4, 0, 3], [4, 1, 3],                  // E = TUT_CONNECT (cặp dạy nối)
];

function startTutorial() {
  saveCurrentState();               // giữ ván thật trước khi mượn bàn cho tutorial
  levelEpoch++;
  clearTimeout(resultTimer);
  tutorialMode = true;
  COLS = TUT_COLS; ROWS = TUT_ROWS;
  busy = false; ended = false; paused = false;
  selected = null; hintPair = null; comboStreak = 0; idleAcc = 0; tutTarget = null; tutTimerRunning = false;
  linkSvg.innerHTML = '';
  pairsLeft = TUT_TILES.length / 2;

  grid = Array.from({ length: ROWS }, () => new Array(COLS).fill(-1));
  for (const [r, c, ty] of TUT_TILES) grid[r][c] = ty;
  buildTileDom(true);
  document.getElementById('hud-sub').style.display = 'none';   // ẩn LEVEL khi tutorial
  updateHUD();
  document.getElementById('tut-banner').classList.remove('hidden');
  setTutPhase(0);   // set text + highlight + resize (đặt bảng giữa header & bàn)
}

/* Stage 0=nối cặp được chỉ · 1=demo đường 3 rẽ · 2=dọn nốt */
function setTutPhase(n) {
  tutStep = n;
  const txt = document.getElementById('tut-text');
  const sub = document.getElementById('hud-sub');
  const arrow = document.getElementById('tut-arrow');
  clearHint();
  if (n === 0)      { txt.textContent = t('tut1');    tutTarget = TUT_CONNECT.map(p => p.slice()); highlightPair(TUT_CONNECT); }
  else if (n === 1) { txt.textContent = t('tutBend'); tutTarget = null; highlightPair(TUT_BEND); }
  else              { txt.textContent = t('tutClear'); tutTarget = null; highlightPair(findAnyPair(true)); }

  // Stage 2 (dọn bàn): HIỆN timer demo 15s ở header + mũi tên chỉ lên nó
  if (n === 2) {
    sub.style.display = '';                 // hiện dòng LEVEL + timer
    timeTotal = 15; timeLeft = 15;          // demo 15 giây — chạy khi người chơi thao tác
    tutTimerRunning = false; timerUiAcc = 0;
    renderTimer();
    arrow.classList.remove('hidden');
  } else {
    sub.style.display = 'none';             // stage 0/1: ẩn (bảng nằm sát header)
    arrow.classList.add('hidden');
  }
  resize();   // chữ/header đổi → đặt lại vị trí bảng + mũi tên cho khớp
}

function highlightPair(pair) {
  clearHint();
  if (!pair) return;
  hintPair = pair.map(p => p.slice());
  for (const [r, c] of pair) if (tiles[r][c]) tiles[r][c].el.classList.add('hint');
}

function isTutTarget(r1, c1, r2, c2) {
  if (!tutTarget) return false;
  const [a, b] = tutTarget;
  return (a[0] === r1 && a[1] === c1 && b[0] === r2 && b[1] === c2) ||
         (a[0] === r2 && a[1] === c2 && b[0] === r1 && b[1] === c1);
}

/* Chọn SAI (cặp giống nhau nối được nhưng không phải cặp đang dạy) → nhắc + nháy lại */
function tutWrongChoice(r1, c1, r2, c2) {
  SND.bad();
  shakeTile(r1, c1); shakeTile(r2, c2);
  deselect();
  if (hintPair) for (const [r, c] of hintPair) if (tiles[r][c]) {
    tiles[r][c].el.classList.remove('hint'); void tiles[r][c].el.offsetWidth; tiles[r][c].el.classList.add('hint');
  }
  showToast(t('tutPick'));
}

/* Cặp cùng loại bị chặn → VẼ đường "quá vòng" (>2 rẽ) cho thấy, rồi sang stage 2 */
function tutShowBend(r1, c1, r2, c2) {
  SND.bad();
  clearHint();
  const res = findMinTurnPath(r1, c1, r2, c2);
  if (res) drawBendPath(res.pts, res.bends, 2300);
  shakeTile(r1, c1); shakeTile(r2, c2);
  document.getElementById('tut-text').textContent = t('tutBendSee');
  busy = true;                       // khoá input trong lúc minh hoạ
  setTimeout(() => {
    busy = false;
    linkSvg.innerHTML = '';
    if (tutorialMode) setTutPhase(2);
  }, 2400);
}

/* Gọi khi nối THÀNH CÔNG trong tutorial */
function tutOnMatch() {
  if (tutStep === 0) { setTutPhase(1); return; }   // đã biết nối → dạy cặp bị chặn
  if (pairsLeft <= 0) {                             // stage 2 dọn sạch → xong
    clearHint();
    document.getElementById('tut-arrow').classList.add('hidden');
    document.getElementById('tut-text').textContent = t('tutDone');
    setTimeout(() => { if (tutorialMode) finishTutorial(); }, 1100);
    return;
  }
  highlightPair(findAnyPair(true));                 // stage 2: gợi ý cặp kế
}

/* Xong / skip tutorial: đánh dấu đã xem, vào ván thật */
function finishTutorial() {
  tutorialSeen = true;
  tutorialMode = false;
  clearHint();
  document.getElementById('tut-banner').classList.add('hidden');
  document.getElementById('tut-arrow').classList.add('hidden');
  document.getElementById('hud-sub').style.display = '';   // hiện lại LEVEL
  levelEpoch++;

  const lv = levelConfig(currentLevelIdx);
  COLS = lv.cols; ROWS = lv.rows;
  timeTotal = lv.time; timeLeft = lv.time; lastTickSec = -1; timerUiAcc = 1;
  busy = false; ended = false; paused = false;
  selected = null; hintPair = null;
  if (tryRestoreState(currentLevelIdx)) {
    updateLabels(); updateHUD(); renderTimer(); resize();
  } else {
    loadLevel(currentLevelIdx);
  }

  saveData({ levelIdx: currentLevelIdx, score, tutorialSeen: true, muted, best });  // nhẹ → native
  saveCurrentState();                                                        // local kèm cờ mới
}

document.getElementById('tut-skip').addEventListener('click', () => {
  if (tutorialMode) finishTutorial();
});

/* ================================================================
 * §20. Background canvas — lá & dấu chân trôi nhẹ
 * ================================================================ */
const bgCanvas = document.getElementById('bg-canvas');
const bgCtx    = bgCanvas.getContext('2d');
let   bgItems  = [];

function initBgItems() {
  bgCanvas.width  = window.innerWidth;
  bgCanvas.height = window.innerHeight;
  const N = Math.min(26, Math.floor(window.innerWidth * window.innerHeight / 26000));
  bgItems = Array.from({ length: N }, () => ({
    x: Math.random() * bgCanvas.width,
    y: Math.random() * bgCanvas.height,
    s: Math.random() * 10 + 8,           // size
    vy: Math.random() * 0.16 + 0.05,
    vx: Math.random() * 0.1 - 0.05,
    rot: Math.random() * Math.PI * 2,
    vr: Math.random() * 0.004 - 0.002,
    kind: Math.random() < 0.6 ? 'leaf' : 'paw',
    opacity: Math.random() * 0.16 + 0.07,
  }));
}

function drawLeaf(ctx, s) {
  ctx.beginPath();
  ctx.moveTo(0, -s);
  ctx.quadraticCurveTo(s * .9, -s * .2, 0, s);
  ctx.quadraticCurveTo(-s * .9, -s * .2, 0, -s);
  ctx.fill();
}

function drawPaw(ctx, s) {
  ctx.beginPath(); ctx.ellipse(0, s * .25, s * .55, s * .45, 0, 0, Math.PI * 2); ctx.fill();
  for (const [dx, dy] of [[-.55, -.35], [0, -.55], [.55, -.35]]) {
    ctx.beginPath(); ctx.arc(dx * s, dy * s, s * .22, 0, Math.PI * 2); ctx.fill();
  }
}

function animateBg(dt) {
  // Chuẩn hoá theo 60fps: 60Hz hay 144Hz lá đều trôi cùng tốc độ thật
  const k = Math.min(dt, 0.1) * 60;
  bgCtx.clearRect(0, 0, bgCanvas.width, bgCanvas.height);
  bgCtx.fillStyle = '#2e6b4f';
  for (const it of bgItems) {
    it.y -= it.vy * k; it.x += it.vx * k; it.rot += it.vr * k;
    if (it.y < -30) { it.y = bgCanvas.height + 30; it.x = Math.random() * bgCanvas.width; }
    bgCtx.save();
    bgCtx.globalAlpha = it.opacity;
    bgCtx.translate(it.x, it.y);
    bgCtx.rotate(it.rot);
    if (it.kind === 'leaf') drawLeaf(bgCtx, it.s); else drawPaw(bgCtx, it.s);
    bgCtx.restore();
  }
}

/* ── Main loop: nền + đồng hồ chung 1 rAF, dt clamp chống stall ── */
function mainLoop(ts) {
  if (lastTs == null) lastTs = ts;
  let dt = (ts - lastTs) / 1000;
  lastTs = ts;
  // Frame khựng (GC/janky) hay clock lùi → clamp dt (độc lập refresh rate)
  if (dt < 0 || dt > 0.25) dt = 0.25;

  animateBg(dt);
  tickTimer(dt);

  // Auto-hint: 5s không thao tác khi đang chơi thường → tự nháy 1 cặp nối được
  if (!busy && !ended && !paused && !tutorialMode && tiles.length) {
    idleAcc += dt;
    if (idleAcc >= 5) { idleAcc = 0; showAutoHint(); }
  } else {
    idleAcc = 0;
  }
  requestAnimationFrame(mainLoop);
}

/* ================================================================
 * §20b. Âm thanh — Web Audio API, tự tổng hợp (không file ngoài)
 * Chỉ SFX (không nhạc nền). Mở khoá ở cử chỉ đầu tiên (luật autoplay
 * của WebView); nút loa trong menu bật/tắt, cờ `muted` persist trong
 * save nhẹ; app ra nền là im tiếng.
 * ================================================================ */
let muted = false;

const SND = (function () {
  let ctx = null, sfxGain = null;

  function ensure() {
    if (muted) return null;
    try {
      if (!ctx) {
        const AC = window.AudioContext || window.webkitAudioContext;
        if (!AC) return null;
        ctx = new AC();
        sfxGain = ctx.createGain(); sfxGain.gain.value = .5;  sfxGain.connect(ctx.destination);
      }
      if (ctx.state === 'suspended') ctx.resume();
      return ctx;
    } catch (e) { return null; }
  }

  /* 1 nốt với envelope decay */
  function tone(freq, dur, type, vol, opts) {
    const c = ensure(); if (!c) return;
    opts = opts || {};
    try {
      const t = c.currentTime;
      const o = c.createOscillator(), g = c.createGain();
      o.type = type || 'triangle';
      o.frequency.setValueAtTime(freq, t);
      if (opts.slideTo) o.frequency.exponentialRampToValueAtTime(opts.slideTo, t + dur);
      g.gain.setValueAtTime(vol, t);
      g.gain.exponentialRampToValueAtTime(.0001, t + dur);
      o.connect(g); g.connect(sfxGain);
      o.start(t); o.stop(t + dur + .02);
    } catch (e) { /* ignore */ }
  }

  return {
    suspend() { try { if (ctx) ctx.suspend(); } catch (e) {} },
    resume()  { if (!muted) ensure(); },
    ui()      { tone(600, .07, 'triangle', .16); },
    select()  { tone(520, .06, 'triangle', .2); },
    match(n)  {           // n = comboStreak → cao dần theo chuỗi
      const base = [523.25, 587.33, 659.26, 784.0, 880.0, 1046.5];
      const k = Math.min(Math.max(n, 1) - 1, base.length - 1);   // 0..5
      const f = base[k];
      // Tần số cao tai nghe "to" hơn ở cùng biên độ (đường đẳng âm) → hạ biên
      // độ tổng theo tỉ lệ tần số để cảm giác âm lượng giữ nguyên khi combo lên.
      const comp = base[0] / f;
      // Hài quãng năm làm tiếng "sáng"/chói — càng lên cao càng gắt nên mờ dần.
      const bright = 1 - (k / (base.length - 1)) * 0.7;          // 1.0 → 0.3
      tone(f, .16, 'triangle', .3 * comp);
      tone(f * 1.5, .24, 'sine', .16 * comp * bright);
    },
    bad()     { tone(185, .12, 'square', .09, { slideTo: 140 }); },
    hint()    { tone(740, .09, 'sine', .2); setTimeout(() => tone(980, .13, 'sine', .2), 90); },
    shuffle() { tone(900, .26, 'sawtooth', .09, { slideTo: 210 }); },
    tick()    { tone(1050, .045, 'square', .1); },
    win()     { [523.25, 659.26, 784.0, 1046.5].forEach((f, i) =>
                  setTimeout(() => tone(f, .22, 'triangle', .26), i * 110)); },
    lose()    { tone(392, .3, 'triangle', .22, { slideTo: 330 });
                setTimeout(() => tone(294, .45, 'triangle', .22, { slideTo: 240 }), 260); },
  };
})();

function setMuted(m, skipSave) {
  muted = m;
  document.getElementById('sound-btn').classList.toggle('muted', m);
  if (m) SND.suspend();
  else SND.resume();
  if (!skipSave) saveCurrentState();
}

document.getElementById('sound-btn').addEventListener('click', () => setMuted(!muted));

/* Mở khoá audio ở cử chỉ đầu tiên (autoplay policy) */
document.addEventListener('pointerdown', function () {
  SND.resume();
}, { once: true, passive: true });

/* Click nhẹ cho mọi nút btn3d (Back/Volume) */
document.addEventListener('pointerdown', e => {
  const b = e.target && e.target.closest ? e.target.closest('.btn3d') : null;
  if (b) SND.ui();
}, { capture: true, passive: true });

/* ================================================================
 * §21. Boot (game-common §3 waitForNativeInjection)
 * ================================================================ */
function bootGame() {
  // ?reset=1 → xoá hết state (reset to first-open)
  if (new URLSearchParams(window.location.search).get('reset') === '1') {
    try { localStorage.removeItem('animal_connect_v1'); } catch (e) {}
    tutorialSeen = false;
    best = 0;
  }

  LANG = getLanguage();
  applyUiFont(LANG);

  let startIdx = getInitialLevelIdx();
  let nativeHasMuted = false, nativeHasScore = false, bootScore = 0;

  // data nhẹ từ native ưu tiên (game-common §4 + §1.2)
  const raw = getInitialData();
  if (raw) {
    try {
      const obj = JSON.parse(raw);
      if (typeof obj.levelIdx === 'number' && obj.levelIdx >= 0) {
        startIdx = Math.min(Math.floor(obj.levelIdx), MAX_LEVEL_IDX);
      }
      if (obj.tutorialSeen === true) tutorialSeen = true;
      if (typeof obj.muted === 'boolean') { muted = obj.muted; nativeHasMuted = true; }
      if (Number.isFinite(Number(obj.best))) best = Math.max(0, Math.floor(Number(obj.best)));
      if (Number.isFinite(Number(obj.score))) { bootScore = Math.max(0, Math.floor(Number(obj.score))); nativeHasScore = true; }
    } catch (e) { /* data hỏng → mặc định */ }
  }

  // tutorialSeen/muted/best/score cũng có thể nằm ở localStorage (chưa sync lên native)
  try {
    const lobj = JSON.parse(readLocal() || 'null');
    if (lobj && lobj.tutorialSeen === true) tutorialSeen = true;
    if (!nativeHasMuted && lobj && typeof lobj.muted === 'boolean') muted = lobj.muted;
    if (lobj && Number.isFinite(Number(lobj.best))) best = Math.max(best, Math.floor(Number(lobj.best)));
    if (!nativeHasScore && lobj && Number.isFinite(Number(lobj.score))) bootScore = Math.max(0, Math.floor(Number(lobj.score)));
  } catch (e) { /* ignore */ }
  document.getElementById('sound-btn').classList.toggle('muted', muted);

  initBgItems();

  // Nạp level — thử khôi phục ván dở từ localStorage trước
  currentLevelIdx = startIdx;
  const lv = levelConfig(startIdx);
  COLS = lv.cols; ROWS = lv.rows;
  score = bootScore; busy = false; ended = false; paused = false;   // điểm cộng dồn của run
  timeTotal = lv.time; timeLeft = lv.time; lastTickSec = -1; timerUiAcc = 1;
  selected = null; hintPair = null; comboStreak = 0; idleAcc = 0;
  lastFindAt = performance.now();

  if (!tryRestoreState(startIdx)) {
    pairsLeft = (COLS * ROWS) / 2;
    fillBoard();
  }

  updateLabels();
  updateHUD();
  renderTimer();
  resize();

  // Không còn menu → vào thẳng gameplay. Lần đầu mở game thì chơi tutorial trước.
  if (!tutorialSeen) startTutorial();

  requestAnimationFrame(mainLoop);
}

// Poll đợi native inject, fallback sau 200ms (game-common §3)
(function waitForNativeInjection() {
  const start = Date.now();
  (function check() {
    if (typeof window.currentLevel === 'number' || Date.now() - start > 200) {
      bootGame();
    } else {
      setTimeout(check, 10);
    }
  })();
})();
</script>
