<!--
  Animal Connect — QuanKA
  Onet / Pikachu connect puzzle: tap 2 identical animal tiles, they clear if a
  path with ≤ 2 turns (≤ 3 straight segments) links them through empty cells
  (the path may run through the border ring outside the board).
  Level-based (10 levels): board grows + tiles shift after each match (per-level
  gravity mode) + timer. Single-file HTML (CSS + JS inline).
  Tuân thủ .claude/game-common.md (bridge, level, i18n), popup-common.md (game
  theo level → KHÔNG tự vẽ popup kết quả, showModal:true), zip-common.md.
-->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<title>Animal Connect</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Google+Sans+Flex:opsz,wght@6..144,1..1000&display=swap" rel="stylesheet" />
<style>
/* ── Reset + mobile tap fixes (game-common §UI) ───────────────── */
*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  -webkit-tap-highlight-color: transparent;
  -webkit-touch-callout: none;
}

:root {
  --ui-font: 'Google Sans Flex', system-ui, sans-serif;
  /* Meadow palette — bright & cheerful */
  --bg-a: #a8e6c3;
  --bg-b: #7fd3a8;
  --bg-c: #5fbf96;
  /* Frosted panels on light bg */
  --glass: rgba(255,255,255,.42);
  --glass-border: rgba(255,255,255,.65);
  /* Text */
  --text: #1e4634;
  --text-soft: rgba(30,70,52,.55);
  --accent: #ff8a3d;
  --sat: env(safe-area-inset-top, 0px);
}

html, body { height: 100%; overflow: hidden; }

body {
  font-family: var(--ui-font);
  font-weight: 700;
  color: var(--text);
  background:
    radial-gradient(ellipse 90% 55% at 50% -12%, rgba(255,255,220,.55), transparent),
    linear-gradient(170deg, var(--bg-a) 0%, var(--bg-b) 55%, var(--bg-c) 100%);
  -webkit-user-select: none;
  user-select: none;
  touch-action: manipulation;
}

/* ── Background canvas (drifting leaves & paw prints) ─────────── */
#bg-canvas { position: fixed; inset: 0; z-index: 0; pointer-events: none; }

/* ── App wrapper ──────────────────────────────────────────────── */
#app {
  position: relative;
  z-index: 1;
  width: 100%;
  height: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* ── Topbar: Back | title + level | Restart ───────────────────── */
#topbar {
  width: 100%;
  max-width: 520px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  padding: 0 12px;
  /* padding-top injected by JS = max(statusBarHeight, env-safe) + 8 */
}

#hud-center {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  line-height: 1.15;
  gap: 1px;
}

#game-title {
  font-size: 10px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--text-soft);
}

#level-num { font-size: 18px; letter-spacing: .5px; color: var(--text); }

/* ── HUD strip: score chip | time bar | pairs chip ────────────── */
#hud-strip {
  width: 100%;
  max-width: 520px;
  padding: 6px 14px 0;
  display: flex;
  align-items: center;
  gap: 10px;
}

.hud-chip {
  background: var(--glass);
  border: 1px solid var(--glass-border);
  border-radius: 12px;
  padding: 4px 12px;
  display: flex;
  flex-direction: column;
  align-items: center;
  min-width: 56px;
  backdrop-filter: blur(6px);
}

.hud-chip .lbl {
  font-size: 9px;
  letter-spacing: 1.8px;
  text-transform: uppercase;
  color: var(--text-soft);
}

.hud-chip .val { font-size: 17px; color: var(--text); line-height: 1.2; }

#time-wrap { flex: 1; display: flex; flex-direction: column; gap: 3px; }

#time-labels {
  display: flex;
  justify-content: space-between;
  font-size: 10px;
  color: var(--text-soft);
  padding: 0 1px;
}
#hud-clock { color: var(--text); }

#time-bar-bg {
  height: 10px;
  background: rgba(255,255,255,.35);
  border-radius: 5px;
  overflow: hidden;
  border: 1px solid rgba(255,255,255,.55);
}

#time-bar-fill {
  height: 100%;
  border-radius: 5px;
  width: 100%;
  background: linear-gradient(90deg, #35c26e, #7fd34f);
  transition: width .3s linear, background .4s;
}
#time-bar-fill.warn   { background: linear-gradient(90deg, #ffb02e, #ffd23f); }
#time-bar-fill.danger { background: linear-gradient(90deg, #ff4d4d, #ff8a3d); }

@keyframes clockDanger {
  0%, 100% { color: #d92b2b; }
  50%      { color: #ff7a7a; }
}
.clock-danger { animation: clockDanger .6s ease-in-out infinite; }

/* ── Board ────────────────────────────────────────────────────── */
#board-outer {
  flex: 1;
  display: flex;
  width: 100%;
  padding: 8px;
  min-height: 0;
  overflow: auto;           /* màn hình quá lùn vẫn cuộn tới được board */
}

#board-wrap {
  margin: auto;             /* căn giữa mà không cắt mất phần tràn khi cuộn */
  position: relative;
  border-radius: 16px;
  background: rgba(255,255,255,.22);
  border: 1px solid rgba(255,255,255,.5);
  box-shadow: 0 10px 34px rgba(23,74,52,.22), inset 0 1px 0 rgba(255,255,255,.5);
  padding: 6px;
}

#board { position: relative; z-index: 1; }

/* Connector line overlay — spills 1 cell outside the board on purpose
   (paths may run through the outer border ring, classic Onet rule) */
#link-svg {
  position: absolute;
  z-index: 3;
  pointer-events: none;
  overflow: visible;
}

.link-path {
  fill: none;
  stroke: #ff8a3d;
  stroke-width: 5;
  stroke-linecap: round;
  stroke-linejoin: round;
  filter: drop-shadow(0 0 6px rgba(255,138,61,.85));
}
.link-path.under { stroke: rgba(255,255,255,.9); stroke-width: 9; filter: none; }

@keyframes linkFade { 0%,70% { opacity: 1; } 100% { opacity: 0; } }
.link-anim { animation: linkFade .34s ease-in forwards; }

/* ── Tiles ────────────────────────────────────────────────────── */
.tile {
  position: absolute;
  cursor: pointer;
  will-change: transform;
  -webkit-user-select: none;
  user-select: none;
}
.tile.sliding { transition: transform .2s cubic-bezier(.22,1,.36,1); }

.tile-inner {
  width: 100%;
  height: 100%;
  border-radius: 22%;
  background: linear-gradient(160deg, #fffdf6, #ffeecf);
  border: 2px solid #f5d9a0;
  box-shadow: 0 3px 0 #e3bd7d, 0 5px 10px rgba(23,74,52,.18);
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  transition: transform .12s ease, box-shadow .15s ease, border-color .15s;
}

.tile-inner svg {
  width: 82%;
  height: 82%;
  flex-shrink: 0;
  display: block;
  pointer-events: none;
}

/* Selected: lift + orange ring + wiggle */
.tile.selected .tile-inner {
  transform: scale(1.12);
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(255,138,61,.75), 0 6px 14px rgba(23,74,52,.3);
  animation: tileWiggle .5s ease-in-out infinite;
  z-index: 2;
}
@keyframes tileWiggle {
  0%, 100% { transform: scale(1.12) rotate(0deg); }
  25%      { transform: scale(1.12) rotate(-4deg); }
  75%      { transform: scale(1.12) rotate(4deg); }
}

/* Hint: soft blue pulsing ring */
@keyframes hintPulse {
  0%, 100% { box-shadow: 0 0 0 3px rgba(61,159,255,.85), 0 5px 10px rgba(23,74,52,.18); }
  50%      { box-shadow: 0 0 0 6px rgba(61,159,255,.35), 0 5px 10px rgba(23,74,52,.18); }
}
.tile.hint .tile-inner { border-color: #3d9fff; animation: hintPulse .8s ease-in-out infinite; }

/* Spawn pop-in — animate .tile-inner, KHÔNG animate .tile: keyframe có
   transform sẽ đè inline translate() giữ vị trí grid → tile nhảy về (0,0) */
@keyframes tilePopin {
  0%   { opacity: 0; transform: scale(.3); }
  70%  { transform: scale(1.08); }
  100% { opacity: 1; transform: scale(1); }
}
.tile.popin .tile-inner { animation: tilePopin .26s ease-out backwards; }

/* Clear pop-out — cùng lý do: animation nằm trên .tile-inner */
@keyframes tilePop {
  0%   { transform: scale(1);    opacity: 1; }
  40%  { transform: scale(1.25); opacity: 1; }
  100% { transform: scale(0);    opacity: 0; }
}
.tile.pop { pointer-events: none; z-index: 4; }
.tile.pop .tile-inner { animation: tilePop .3s ease-in forwards; }

/* Invalid pair shake — margin-left thay vì translate/transform:
   transform đang giữ vị trí grid của tile, còn thuộc tính `translate`
   riêng cần Chromium 104+ (WebView cũ sẽ drop → shake câm) */
@keyframes tileShake {
  0%, 100% { margin-left: 0; }
  20% { margin-left: -5px; } 40% { margin-left: 5px; }
  60% { margin-left: -3px; } 80% { margin-left: 3px; }
}
.tile.shake { animation: tileShake .24s ease-in-out; }

/* Match burst particle */
.burst {
  position: absolute;
  width: 8px; height: 8px;
  border-radius: 50%;
  pointer-events: none;
  z-index: 5;
  animation: burstFly .45s ease-out forwards;
}
@keyframes burstFly {
  0%   { transform: translate(0,0) scale(1); opacity: 1; }
  100% { transform: translate(var(--bx), var(--by)) scale(.2); opacity: 0; }
}

/* ── Score fly-up text ────────────────────────────────────────── */
.score-fly {
  position: fixed;
  pointer-events: none;
  font-family: var(--ui-font);
  font-weight: 800;
  font-size: 15px;
  color: #fff;
  text-shadow: 0 0 10px rgba(255,150,50,1), 0 2px 4px rgba(23,74,52,.55);
  z-index: 200;
  white-space: nowrap;
  animation: scoreFlyUp .9s ease-out forwards;
}
@keyframes scoreFlyUp {
  0%   { opacity: 1; transform: translate(-50%,-50%) scale(1); }
  20%  { opacity: 1; transform: translate(-50%,-80%) scale(1.2); }
  100% { opacity: 0; transform: translate(-50%,-140%) scale(.9); }
}

/* ── Combo badge ──────────────────────────────────────────────── */
#combo-badge {
  position: fixed;
  top: 42%;
  left: 50%;
  transform: translate(-50%,-50%);
  font-size: 28px;
  font-weight: 800;
  pointer-events: none;
  z-index: 100;
  opacity: 0;
  letter-spacing: 1px;
  color: #fff;
  text-shadow: 0 0 26px rgba(255,170,40,.95), 0 2px 6px rgba(23,74,52,.5);
}
@keyframes comboPop {
  0%   { opacity: 0; transform: translate(-50%,-50%) scale(.4); }
  30%  { opacity: 1; transform: translate(-50%,-50%) scale(1.25); }
  65%  { opacity: 1; transform: translate(-50%,-50%) scale(1); }
  100% { opacity: 0; transform: translate(-50%,-60%) scale(.85); }
}
.combo-anim { animation: comboPop .65s ease-out forwards; }

/* ── Toast (auto-shuffle notice…) ─────────────────────────────── */
#toast {
  position: fixed;
  left: 50%;
  top: 22%;
  transform: translateX(-50%);
  background: rgba(30,70,52,.88);
  color: #fff;
  font-size: 14px;
  padding: 9px 18px;
  border-radius: 20px;
  z-index: 150;
  pointer-events: none;
  opacity: 0;
  white-space: nowrap;
  transition: opacity .25s;
}
#toast.show { opacity: 1; }

/* ── Bottom bar: Hint | Shuffle ───────────────────────────────── */
#bottombar {
  width: 100%;
  max-width: 520px;
  display: flex;
  justify-content: center;
  gap: 14px;
  padding: 2px 12px 14px;
}

.count-badge {
  min-width: 20px;
  height: 20px;
  padding: 0 5px;
  border-radius: 10px;
  background: var(--accent);
  color: #fff;
  font-size: 12px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
}
.btn3d.used .btn3d-surface { opacity: .45; }

.tool-ico { width: 20px; height: 20px; fill: currentColor; display: block; }

/* ── btn3d (game-common §1.4 / popup-common §6) ───────────────── */
.btn3d {
  --radius: 12px;
  --surface-color: rgba(255,255,255,.5);
  --surface-text: var(--text);
  --surface-height: 42px;
  --surface-width: auto;
  --surface-padding-x: 16px;
  --surface-font-size: 16px;
  position: relative;
  display: inline-block;
  padding: 0;
  border: 0;
  background: transparent;
  cursor: pointer;
  font: inherit;
  color: inherit;
  -webkit-user-select: none;
  user-select: none;
}

.btn3d-shadow { display: none; }

.btn3d-surface {
  position: relative;
  z-index: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  height: var(--surface-height);
  width: var(--surface-width);
  padding: 0 var(--surface-padding-x);
  border-radius: var(--radius);
  background: var(--surface-color);
  border: 1px solid var(--glass-border);
  color: var(--surface-text);
  font-family: var(--ui-font);
  font-size: var(--surface-font-size);
  letter-spacing: .5px;
  backdrop-filter: blur(8px);
  transition: transform .09s ease-out, background .1s;
}

.btn3d:active { transform: scale(.94); }
.btn3d:active .btn3d-surface { background: rgba(255,255,255,.75); }

.btn3d.btn-icon {
  --surface-height: 42px;
  --surface-width: 42px;
  --surface-padding-x: 0;
}

.back-ico    { width: 52%; height: 52%; fill: currentColor; display: block; }
.restart-ico { width: 62%; height: 62%; fill: currentColor; display: block; }
.home-ico    { width: 56%; height: 56%; fill: currentColor; display: block; }

#topbar-right { display: flex; gap: 8px; }

/* ── Confirm box (về menu) ────────────────────────────────────── */
#confirm-panel {
  position: fixed;
  inset: 0;
  z-index: 290;
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(23,60,44,.55);
  opacity: 1;
  transition: opacity .2s;
}
#confirm-panel.hidden { opacity: 0; pointer-events: none; }

.confirm-card {
  width: min(78%, 300px);
  border-radius: 18px;
  background: linear-gradient(170deg, #fffdf6, #f0fbe8);
  box-shadow: 0 16px 44px rgba(9,40,26,.4);
  padding: 20px 18px 16px;
  text-align: center;
  transform: scale(1);
  transition: transform .2s;
}
#confirm-panel.hidden .confirm-card { transform: scale(.92); }

#confirm-text { font-size: 16px; color: var(--text); margin-bottom: 16px; line-height: 1.35; }
.confirm-btns { display: flex; gap: 12px; justify-content: center; }
.confirm-btns .btn3d { --surface-width: 76px; --surface-height: 44px; --surface-font-size: 20px; }
#confirm-yes { --surface-color: #ffb02e; --surface-text: #3a2400; }
#confirm-yes:active .btn3d-surface { background: #ffb02e; }
#confirm-no  { --surface-color: rgba(46,107,79,.12); }

/* ── Responsive HUD — co giãn theo bề ngang, gọn lại khi màn thấp ─ */
#hud-center { min-width: 0; }
#hud-center > div {
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  max-width: 100%;
}
#game-title { font-size: clamp(8px, 2.4vw, 10px); }
#level-num  { font-size: clamp(14px, 4.4vw, 18px); }
.hud-chip     { min-width: clamp(44px, 13vw, 56px); padding: 4px clamp(6px, 2.4vw, 12px); }
.hud-chip .val { font-size: clamp(13px, 4vw, 17px); }
#time-wrap  { min-width: 56px; }
#bottombar .btn3d, #bottombar .btn3d-surface { min-width: 0; }
#hint-label, #shuffle-label { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

@media (max-height: 640px) {
  #topbar .btn3d.btn-icon { --surface-height: 36px; --surface-width: 36px; }
  #hud-strip { padding-top: 4px; }
  #bottombar { padding: 0 12px 8px; }
  #bottombar .btn3d { --surface-height: 36px; --surface-font-size: 14px; }
  #tut-banner { bottom: 12px; padding: 9px 12px; }
}
@media (max-height: 480px) {
  #game-title { display: none; }
  #time-bar-bg { height: 8px; }
  #menu-screen { gap: 8px; }
  .menu-mascots { display: none; }
}

/* ── Main menu ────────────────────────────────────────────────── */
#menu-screen {
  position: fixed;
  inset: 0;
  z-index: 260;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 14px;
  background:
    radial-gradient(ellipse 90% 55% at 50% -12%, rgba(255,255,220,.55), transparent),
    linear-gradient(170deg, var(--bg-a) 0%, var(--bg-b) 55%, var(--bg-c) 100%);
  transition: opacity .25s;
}
#menu-screen.hidden { opacity: 0; pointer-events: none; }
#menu-screen { overflow: auto; }   /* màn hình quá lùn vẫn cuộn tới nút được */

#menu-corner {
  position: absolute;
  top: 0; left: 0; right: 0;
  display: flex;
  justify-content: space-between;
  padding: 12px;
  /* padding-top cộng thêm statusBarHeight qua JS */
}

.menu-mascots { display: flex; gap: 14px; margin-bottom: 4px; }
.menu-mascot {
  width: 64px; height: 64px;
  border-radius: 22%;
  background: linear-gradient(160deg, #fffdf6, #ffeecf);
  border: 2px solid #f5d9a0;
  box-shadow: 0 3px 0 #e3bd7d, 0 5px 10px rgba(23,74,52,.18);
  display: flex; align-items: center; justify-content: center;
}
.menu-mascot svg { width: 82%; height: 82%; display: block; }
.menu-mascot:nth-child(1) { transform: rotate(-7deg); }
.menu-mascot:nth-child(3) { transform: rotate(7deg); }

#menu-title {
  font-size: clamp(24px, 8vw, 34px);
  color: #fff;
  letter-spacing: 2px;
  text-align: center;
  line-height: 1.15;
  text-shadow: 0 2px 0 rgba(30,70,52,.35), 0 6px 18px rgba(9,40,26,.35);
  margin-bottom: 8px;
  max-width: 86%;
}

.btn3d.cta {
  --surface-color: #ffb02e;
  --surface-text: #3a2400;
  --surface-height: 54px;
  --surface-padding-x: 46px;
  --surface-font-size: 20px;
}
.btn3d.cta:active .btn3d-surface { background: #ffb02e; }

.ico-diamond { width: 58%; height: 58%; display: block; }

/* ── Info panel (document ngắn: thông tin + cách chơi) ────────── */
#info-panel {
  position: fixed;
  inset: 0;
  z-index: 280;
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(23,60,44,.55);
  opacity: 1;
  transition: opacity .22s;
}
#info-panel.hidden { opacity: 0; pointer-events: none; }

.doc-card {
  width: min(86%, 380px);
  max-height: 72%;
  overflow: auto;
  border-radius: 20px;
  background: linear-gradient(170deg, #fffdf6, #f0fbe8);
  border: 1px solid rgba(255,255,255,.75);
  box-shadow: 0 18px 50px rgba(9,40,26,.4);
  padding: 20px 20px 18px;
  position: relative;
  transform: scale(1);
  transition: transform .22s;
}
#info-panel.hidden .doc-card { transform: scale(.92); }

.doc-card h2 { font-size: 20px; color: var(--text); margin-bottom: 12px; padding-right: 42px; }

/* Sơ đồ minh hoạ (ít chữ, nhiều hình) */
.info-fig {
  background: rgba(46,107,79,.07);
  border-radius: 12px;
  padding: 6px 6px 4px;
}
.info-fig svg { width: 100%; height: auto; display: block; }
.info-cap {
  font-size: 11.5px;
  font-weight: 600;
  text-align: center;
  color: var(--text);
  opacity: .85;
  margin: 3px 0 10px;
  line-height: 1.3;
}
.info-grid2 { display: flex; gap: 10px; }
.info-grid2 > div { flex: 1; min-width: 0; }

.info-chips { display: flex; gap: 8px; }
.info-chip {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  background: rgba(46,107,79,.07);
  border-radius: 10px;
  padding: 8px 2px 6px;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: .5px;
  color: var(--text);
  text-transform: uppercase;
  overflow: hidden;
}
.info-chip svg { width: 40px; height: 26px; display: block; }

#info-close {
  position: absolute;
  top: 10px; right: 10px;
  --surface-height: 34px;
  --surface-width: 34px;
  --surface-font-size: 16px;
}

/* ── Tutorial banner (hướng dẫn từng bước) ────────────────────── */
#tut-banner {
  position: fixed;
  left: 50%;
  bottom: 26px;
  transform: translateX(-50%);
  z-index: 240;
  width: min(88%, 380px);
  display: flex;
  align-items: center;
  gap: 10px;
  background: rgba(30,70,52,.92);
  border-radius: 18px;
  padding: 12px 14px;
  box-shadow: 0 8px 24px rgba(9,40,26,.35);
  transition: opacity .2s;
}
#tut-banner.hidden { opacity: 0; pointer-events: none; }
#tut-text { flex: 1; color: #fff; font-size: 14px; line-height: 1.4; }

.btn3d.mini {
  --surface-height: 32px;
  --surface-font-size: 13px;
  --surface-padding-x: 12px;
  --surface-color: rgba(255,255,255,.18);
  --surface-text: #fff;
}

/* ── Pause veil (not a result popup — game-common §1.3 onAppPause) */
#pause-veil {
  position: fixed;
  inset: 0;
  z-index: 300;

let LANG = DEFAULT_LANG;
function t(key) {
  return (I18N[LANG] && I18N[LANG][key]) || I18N.en[key] || key;
}

function getLanguage() {
  const fromWin = typeof window.language === 'string' ? window.language : null;
  const fromUrl = new URLSearchParams(window.location.search).get('language');
  const raw = fromWin != null ? fromWin : fromUrl;
  return SUPPORTED_LANGS.includes(raw) ? raw : DEFAULT_LANG;
}

function applyUiFont(lang) {
  if (!LATIN_LANGS.has(lang)) {
    document.documentElement.style.setProperty('--ui-font', 'system-ui, sans-serif');
  }
}

/* ================================================================
 * §1. Native bridge (game-common §1 — game CÓ level)
 * ================================================================ */
function post(msg) {
  try {
    if (window.ReactNativeWebView && window.ReactNativeWebView.postMessage) {
      window.ReactNativeWebView.postMessage(JSON.stringify(msg));
    } else {
      console.log('[animal-connect → native]', msg);
      devSimulateNative(msg);
    }
  } catch (e) { /* ignore */ }
}

/* CHỈ chạy khi mở bằng browser thường (không có ReactNativeWebView):
 * giả lập việc app hiện popup rồi bấm Next/Retry, để playtest không bị
 * kẹt sau khi hết ván. Trong app thật hàm này không bao giờ được gọi —
 * app tự hiện popup và gọi onNextLevel/onRetryLevel (game-common §1.1/§1.3). */
function devSimulateNative(msg) {
  if (msg.type === 'game_result' && msg.showModal) {
    showToast(msg.result === 'win' ? 'Level clear!' : 'Time up!');
    setTimeout(() => {
      if (msg.result === 'win') window.onNextLevel();
      else window.onRetryLevel();
    }, 1400);
  }
}

function sendMessage(type, opts) {
  opts = opts || {};
  post({
    type,
    level: currentLevelIdx + 1,        // 1-indexed per spec
    result: opts.result ?? null,
    data:   opts.data   ?? null,
    showModal: opts.showModal === true,
  });
}

function saveData(payload) {
  const data = typeof payload === 'string' ? payload : JSON.stringify(payload);
  sendMessage('save_data', { data });
}

/* ── localStorage — trạng thái ván dở (game-common §1.2) ──────── */
const LS_KEY = 'animal_connect_v1';

function saveLocal(payload) {
  try {
    const s = typeof payload === 'string' ? payload : JSON.stringify(payload);
    localStorage.setItem(LS_KEY, s);
  } catch (e) { /* private mode / quota */ }
}
function readLocal() {
  try { return localStorage.getItem(LS_KEY) || ''; } catch (e) { return ''; }
}

/* ── statusBarHeight (game-common §2 — URL ưu tiên) ───────────── */
function getStatusBarHeight() {
  const params = new URLSearchParams(window.location.search);
  const fromUrl = params.get('statusBarHeight');
  const fromWin = typeof window.statusBarHeight !== 'undefined' ? window.statusBarHeight : null;
  let h = Number(fromUrl != null ? fromUrl : fromWin);
  if (Number.isNaN(h) || h < 0) h = 0;
  return h;
}

/* ── currentLevel (game-common §3 — window ưu tiên) ───────────── */
function getInitialLevelIdx() {
  const fromWin = typeof window.currentLevel === 'number' ? window.currentLevel : null;
  const fromUrl = new URLSearchParams(window.location.search).get('currentLevel');
  const raw = Number(fromWin != null ? fromWin : fromUrl);
  if (!Number.isFinite(raw) || raw < 1) return 0;
  return Math.min(Math.floor(raw) - 1, MAX_LEVEL_IDX);
}

/* ── data (game-common §4 — window ưu tiên) ───────────────────── */
function getInitialData() {
  const fromWin = typeof window.data === 'string' ? window.data : null;
  const fromUrl = new URLSearchParams(window.location.search).get('data');
  return fromWin != null ? fromWin : (fromUrl || '');
}

/* ================================================================
 * §2. Level definitions — 10 levels
 *  cols×rows (số ô, luôn chẵn) | types: số loại thú | shift: hướng dồn
 *  tile sau mỗi match | time: giây | hints/shuffles: lượt trợ giúp
 * ================================================================ */
/* Level VÔ HẠN, sinh theo công thức — không có danh sách cố định.
 * Cùng một idx luôn sinh cùng cấu hình (retry = đúng level đó, nhờ hash
 * deterministic thay vì Math.random); còn cách XẾP tile thì random mỗi
 * lần chơi (fillBoard). Vì không có "màn cuối" nên event `victory`
 * (game-common §1.5) không dùng — chỉ có game_result win/lose. */
const SHIFT_MODES = ['none', 'down', 'up', 'left', 'right', 'in', 'out'];

// 8 màn đầu ramp cố định cho quen tay; từ màn 9 xoay vòng các bàn lớn.
// Mọi kích thước đều cho tổng ô CHẴN (bàn chia hết thành cặp).
const SIZE_RAMP = [[6,6],[6,7],[6,8],[7,8],[7,8],[8,8],[8,9],[8,9]];
const SIZE_LOOP = [[8,10],[8,9],[7,10],[8,8],[8,10],[7,8]];

/* Hash nguyên deterministic theo idx (splitmix-lite) */
function levelHash(idx) {
  let h = ((idx + 1) * 2654435761) >>> 0;
  h = (((h >>> 16) ^ h) * 0x45d9f3b) >>> 0;
  return ((h >>> 16) ^ h) >>> 0;
}

function levelConfig(idx) {
  const [cols, rows] = idx < SIZE_RAMP.length
    ? SIZE_RAMP[idx]
    : SIZE_LOOP[levelHash(idx) % SIZE_LOOP.length];
  const pairs = (cols * rows) / 2;
  // giây/cặp: 8.5 giảm 0.35 mỗi màn, chạm sàn 5.0 → khó dần rồi giữ
  // "căng nhưng công bằng", không thành Dark Souls
  const perPair = Math.max(5.0, 8.5 - idx * 0.35);
  const time = Math.round((pairs * perPair) / 5) * 5;
  // 7 màn đầu đi đủ tour các mode dồn; sau đó bốc theo hash (bỏ 'none')
  const shift = idx < SHIFT_MODES.length
    ? SHIFT_MODES[idx]
    : SHIFT_MODES[1 + levelHash(idx * 7 + 3) % (SHIFT_MODES.length - 1)];
  // types cao để ít cặp trùng: màn 1 = 12 loại, từ màn 3 đủ 14
  const types = Math.min(ANIMALS.length, 12 + Math.min(idx, 2));
  return { cols, rows, types, shift, time, hints: 3, shuffles: 2 };
}

/* ================================================================
 * §5. Tile DOM helpers
 * ================================================================ */
function makeTile(type) {
  const el = document.createElement('div');
  el.className = 'tile';
  el.innerHTML = `<div class="tile-inner"><svg viewBox="0 0 100 100" aria-hidden="true">${ANIMALS[type]}</svg></div>`;
  boardEl.appendChild(el);
  return { type, el };
}

function tileTransform(r, c) {
  return `translate(${c * cellPx + 2}px, ${r * cellPx + 2}px)`;
}

function applyTileSize(tile) {
  tile.el.style.width  = (cellPx - 4) + 'px';
  tile.el.style.height = (cellPx - 4) + 'px';
}

function layoutTile(tile, r, c) {
  applyTileSize(tile);
  tile.el.style.transform = tileTransform(r, c);
}

function layoutAll() {
  for (let r = 0; r < ROWS; r++)
    for (let c = 0; c < COLS; c++)
      if (tiles[r][c]) layoutTile(tiles[r][c], r, c);
}

/* ================================================================
 * §6. Resize & layout (game-common §2 statusBarHeight)
 * ================================================================ */
function resize() {
  const sbh    = getStatusBarHeight();
  const envTop = parseInt(getComputedStyle(document.documentElement)
                   .getPropertyValue('--sat') || '0') || 0;
  const topPad = Math.max(sbh, envTop) + 8;
  document.getElementById('topbar').style.paddingTop = topPad + 'px';
  document.getElementById('menu-corner').style.paddingTop = topPad + 'px';

  requestAnimationFrame(() => {
    const topbar = document.getElementById('topbar');
    const strip  = document.getElementById('hud-strip');
    const bottom = document.getElementById('bottombar');
    const usedH  = topbar.getBoundingClientRect().bottom
                 + strip.getBoundingClientRect().height
                 + bottom.getBoundingClientRect().height + 20;
    const availH = window.innerHeight - usedH - 12;
    const availW = Math.min(window.innerWidth, 520) - 24 - 12;
    cellPx = Math.max(16, Math.min(Math.floor(availW / COLS), Math.floor(availH / ROWS), 58));

    const w = cellPx * COLS, h = cellPx * ROWS;
    boardEl.style.width  = w + 'px';
    boardEl.style.height = h + 'px';
    // +14 = padding 6×2 + border 1×2 (border-box)
    wrapEl.style.width   = (w + 14) + 'px';
    wrapEl.style.height  = (h + 14) + 'px';

    // Link overlay phủ thêm 1 ô ra ngoài mỗi phía (path đi vòng ngoài biên)
    linkSvg.style.left   = (6 - cellPx) + 'px';
    linkSvg.style.top    = (6 - cellPx) + 'px';
    linkSvg.style.width  = ((COLS + 2) * cellPx) + 'px';
    linkSvg.style.height = ((ROWS + 2) * cellPx) + 'px';
    linkSvg.setAttribute('viewBox', `0 0 ${(COLS + 2) * cellPx} ${(ROWS + 2) * cellPx}`);

    layoutAll();
  });
}

window.addEventListener('resize', () => {
  bgCanvas.width  = window.innerWidth;
  bgCanvas.height = window.innerHeight;
  resize();
});

/* ================================================================
 * §7. Board generation — chia đều cặp theo số loại thú
 * ================================================================ */
function shuffleArr(a) {
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function buildTypeBag(total, nTypes) {
  const nPairs = total / 2;
  const bag = [];
  for (let i = 0; i < nPairs; i++) { bag.push(i % nTypes, i % nTypes); }
  return shuffleArr(bag);
}

function fillBoard() {
  const lv = levelConfig(currentLevelIdx);
  let bag, tries = 0;
  do {
    bag = buildTypeBag(COLS * ROWS, lv.types);
    grid = [];
    let k = 0;
    for (let r = 0; r < ROWS; r++) {
      grid.push([]);
      for (let c = 0; c < COLS; c++) grid[r].push(bag[k++]);
    }
    tries++;
  } while (tries < 60 && !hasMoves());
  if (!hasMoves()) forceOneMove();

  buildTileDom(true);
}

/* Dựng DOM tiles từ grid (stagger: pop-in lần lượt) */
function buildTileDom(stagger) {
  boardEl.innerHTML = '';
  tiles = Array.from({ length: ROWS }, () => new Array(COLS).fill(null));
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      if (grid[r][c] < 0) continue;
      const tile = makeTile(grid[r][c]);
      tiles[r][c] = tile;
      layoutTile(tile, r, c);
      if (stagger) {
        const inner = tile.el.firstElementChild;   // animation chạy trên .tile-inner
        inner.style.animationDelay = ((r + c) * 16) + 'ms';
        tile.el.classList.add('popin');
        tile.el.addEventListener('animationend', () => {
          tile.el.classList.remove('popin');
          inner.style.animationDelay = '';
        }, { once: true });
      }
    }
  }
}

/* Ép tồn tại ít nhất 1 nước đi: đặt 2 tile cùng loại cạnh nhau ngang */
function forceOneMove() {
  const pos = [];
  for (let r = 0; r < ROWS; r++)
    for (let c = 0; c < COLS - 1; c++)
      if (grid[r][c] >= 0 && grid[r][c + 1] >= 0) pos.push([r, c]);
  if (!pos.length) return;
  const [r, c] = pos[Math.floor(Math.random() * pos.length)];
  // tìm 1 tile khác cùng loại với grid[r][c] rồi hoán vị nó về (r, c+1)
  const want = grid[r][c];
  for (let rr = 0; rr < ROWS; rr++) {
    for (let cc = 0; cc < COLS; cc++) {
      if ((rr === r && (cc === c || cc === c + 1)) || grid[rr][cc] !== want) continue;
      const tmp = grid[r][c + 1];
      grid[r][c + 1] = grid[rr][cc];
      grid[rr][cc] = tmp;
      return;
    }
  }
}

/* ================================================================
 * §8. Pathfinding — nối 2 ô bằng ≤ 3 đoạn thẳng (≤ 2 lần rẽ).
 * Tọa độ "padded": ô (r,c) → (r+1, c+1) trong lưới (ROWS+2)×(COLS+2);
 * vành ngoài luôn đi được (rule Onet: đường được vòng ra ngoài biên).
 * Trả về mảng điểm gãy [[pr,pc]…] hoặc null.
 * ================================================================ */
function findPath(r1, c1, r2, c2) {
  const H = ROWS + 2, W = COLS + 2;
  const A = [r1 + 1, c1 + 1], B = [r2 + 1, c2 + 1];

  const passable = (pr, pc) => {
    if (pr < 0 || pr >= H || pc < 0 || pc >= W) return false;
    if (pr === B[0] && pc === B[1]) return true;      // ô đích được phép vào
    const gr = pr - 1, gc = pc - 1;
    if (gr < 0 || gr >= ROWS || gc < 0 || gc >= COLS) return true; // vành ngoài
    return grid[gr][gc] < 0;
  };

  // các ô strictly-giữa p và q (cùng hàng/cột) đều trống?
  const clearBetween = (p, q) => {
    if (p[0] === q[0]) {
      const [lo, hi] = p[1] < q[1] ? [p[1], q[1]] : [q[1], p[1]];
      for (let c = lo + 1; c < hi; c++) if (!passable(p[0], c)) return false;
      return true;
    }
    if (p[1] === q[1]) {
      const [lo, hi] = p[0] < q[0] ? [p[0], q[0]] : [q[0], p[0]];
      for (let r = lo + 1; r < hi; r++) if (!passable(r, p[1])) return false;
      return true;
    }
    return false;
  };
  const samePt = (p, q) => p[0] === q[0] && p[1] === q[1];

  // ── 0 rẽ: thẳng hàng
  if ((A[0] === B[0] || A[1] === B[1]) && clearBetween(A, B)) return [A, B];

  // ── 1 rẽ: góc tại (A.r, B.c) hoặc (B.r, A.c)
  for (const K of [[A[0], B[1]], [B[0], A[1]]]) {
    if (samePt(K, A) || samePt(K, B)) continue;
    if (passable(K[0], K[1]) && clearBetween(A, K) && clearBetween(K, B)) return [A, K, B];
  }

  // ── 2 rẽ: đi thẳng từ A theo 4 hướng tới K1, rồi nối 1-rẽ K1 → B
  const DIRS = [[0, 1], [0, -1], [1, 0], [-1, 0]];
  for (const [dr, dc] of DIRS) {
    let pr = A[0] + dr, pc = A[1] + dc;
    while (passable(pr, pc) && !(pr === B[0] && pc === B[1])) {
      const K1 = [pr, pc];
      for (const K2 of [[K1[0], B[1]], [B[0], K1[1]]]) {
        if (samePt(K2, K1) || samePt(K2, B) || samePt(K2, A)) continue;
        if (passable(K2[0], K2[1]) && clearBetween(K1, K2) && clearBetween(K2, B)) {
          return [A, K1, K2, B];
        }
      }
      pr += dr; pc += dc;
    }
  }
  return null;
}

/* Có còn nước đi nào không? (quét theo loại, thoát sớm) */
function hasMoves() { return findAnyPair(false) !== null; }

/* Tìm 1 cặp nối được. randomize=true → bắt đầu từ loại ngẫu nhiên (hint) */
function findAnyPair(randomize) {
  if (grid.length !== ROWS) return null;   // guard: board chưa dựng
  const byType = new Map();
  for (let r = 0; r < ROWS; r++)
    for (let c = 0; c < COLS; c++)
      if (grid[r][c] >= 0) {
        if (!byType.has(grid[r][c])) byType.set(grid[r][c], []);
        byType.get(grid[r][c]).push([r, c]);
      }
  const types = [...byType.keys()];
  if (randomize) shuffleArr(types);
  for (const ty of types) {
    const pos = byType.get(ty);
    for (let i = 0; i < pos.length - 1; i++)
      for (let j = i + 1; j < pos.length; j++)
        if (findPath(pos[i][0], pos[i][1], pos[j][0], pos[j][1]))
          return [pos[i], pos[j]];
  }
  return null;
}

/* ================================================================
 * §9. Connector line — vẽ path lên overlay SVG rồi tự mờ
 * ================================================================ */
let linkTimer = 0;
function drawLink(pathPts) {
  // Gốc overlay lệch −1 ô so với board → điểm padded (pr,pc) = tâm ô đó.
  // Điểm trên vành ngoài được kẹp lại để line không văng khỏi mép màn hình.
  const br = boardEl.getBoundingClientRect();
  const xMin = cellPx - br.left + 5,  xMax = cellPx + (window.innerWidth  - br.left) - 5;
  const yMin = cellPx - br.top  + 5,  yMax = cellPx + (window.innerHeight - br.top)  - 5;
  const ptsAttr = pathPts.map(([pr, pc]) => {
    const x = Math.min(Math.max(pc * cellPx + cellPx / 2, xMin), xMax);
    const y = Math.min(Math.max(pr * cellPx + cellPx / 2, yMin), yMax);
    return `${x},${y}`;
  }).join(' ');
  clearTimeout(linkTimer);   // match nối tiếp nhanh: không để timer cũ xoá line mới
  linkSvg.innerHTML =
    `<polyline class="link-path under link-anim" points="${ptsAttr}"/>` +
    `<polyline class="link-path link-anim" points="${ptsAttr}"/>`;
  linkTimer = setTimeout(() => { linkSvg.innerHTML = ''; }, 380);
}

/* ================================================================
 * §10. Shift modes — dồn tile sau mỗi match (đặc sản Onet)
 * ================================================================ */
function compactSeq(cells) {
  // cells: mảng [r,c] theo THỨ TỰ ĐÍCH (dồn về đầu mảng). Trả true nếu có di chuyển.
  const vals = cells.map(([r, c]) => grid[r][c]).filter(v => v >= 0);
  const tls  = cells.map(([r, c]) => tiles[r][c]).filter(Boolean);
  let moved = false;
  cells.forEach(([r, c], i) => {
    const v = i < vals.length ? vals[i] : -1;
    const tl = i < tls.length ? tls[i] : null;
    if (grid[r][c] !== v || tiles[r][c] !== tl) moved = true;
    grid[r][c]  = v;
    tiles[r][c] = tl;
  });
  return moved;
}

function applyShift(mode) {
  let moved = false;
  const colCells = (c, topDown) => {
    const a = [];
    for (let r = 0; r < ROWS; r++) a.push([topDown ? r : ROWS - 1 - r, c]);
    return a;
  };
  const rowCells = (r, leftRight) => {
    const a = [];
    for (let c = 0; c < COLS; c++) a.push([r, leftRight ? c : COLS - 1 - c]);
    return a;
  };
  const half = COLS >> 1;

  if (mode === 'down') for (let c = 0; c < COLS; c++) moved = compactSeq(colCells(c, false)) || moved;
  else if (mode === 'up')    for (let c = 0; c < COLS; c++) moved = compactSeq(colCells(c, true))  || moved;
  else if (mode === 'left')  for (let r = 0; r < ROWS; r++) moved = compactSeq(rowCells(r, true))  || moved;
  else if (mode === 'right') for (let r = 0; r < ROWS; r++) moved = compactSeq(rowCells(r, false)) || moved;
  else if (mode === 'in' || mode === 'out') {
    for (let r = 0; r < ROWS; r++) {
      const L = [], R = [];
      for (let c = 0; c < half; c++) L.push([r, c]);
      for (let c = half; c < COLS; c++) R.push([r, c]);
      // 'in': hai nửa dồn VỀ giữa (trái dồn về cột half-1, phải về cột half)
      // 'out': hai nửa dồn RA mép (trái về cột 0, phải về cột COLS-1)
      if (mode === 'in') L.reverse(); else R.reverse();
      moved = compactSeq(L) || moved;
      moved = compactSeq(R) || moved;
    }
  }

  if (moved) {
    for (let r = 0; r < ROWS; r++)
      for (let c = 0; c < COLS; c++)
        if (tiles[r][c]) {
          tiles[r][c].el.classList.add('sliding');
          layoutTile(tiles[r][c], r, c);
        }
    setTimeout(() => {
      for (let r = 0; r < ROWS; r++)
        for (let c = 0; c < COLS; c++)
          if (tiles[r][c]) tiles[r][c].el.classList.remove('sliding');
    }, 230);
  }
  return moved;
}

/* ================================================================
 * §11. Input — tap chọn 2 tile cùng loại
 * ================================================================ */
boardEl.addEventListener('pointerdown', e => {
  if (busy || ended || paused || menuOpen || confirmOpen || !tiles.length) return;
  const rect = boardEl.getBoundingClientRect();
  const c = Math.floor((e.clientX - rect.left) / cellPx);
  const r = Math.floor((e.clientY - rect.top) / cellPx);
  if (!inb(r, c) || !tiles[r] || !tiles[r][c]) return;
  handleTap(r, c);
}, { passive: true });

function handleTap(r, c) {
  if (!selected) { select(r, c); return; }
  const { r: sr, c: sc } = selected;
  if (sr === r && sc === c) { deselect(); return; }

  if (grid[sr][sc] === grid[r][c]) {
    const path = findPath(sr, sc, r, c);
    if (path) { doMatch([sr, sc], [r, c], path); return; }
  }
  // Không nối được / khác loại → rung nhẹ cả hai, chuyển chọn sang tile mới
  shakeTile(sr, sc); shakeTile(r, c);
  deselect();
  select(r, c);
}

function select(r, c) {
  selected = { r, c };
  tiles[r][c].el.classList.add('selected');
}

function deselect() {
  if (!selected) return;
  const tl = tiles[selected.r][selected.c];
  if (tl) tl.el.classList.remove('selected');
  selected = null;
}

function shakeTile(r, c) {
  const tl = tiles[r][c];
  if (!tl) return;
  tl.el.classList.remove('shake');
  void tl.el.offsetWidth;
  tl.el.classList.add('shake');
}

/* ================================================================
 * §12. Match flow — line → pop → shift → deadlock check
 * ================================================================ */
async function doMatch(a, b, path) {
  busy = true;
  const ep = levelEpoch;   // continuation cũ không được đụng level mới
  try {
    deselect();
    clearHint();

    // Combo: match liên tiếp trong 4s giữ chuỗi
    const now = performance.now();
    comboStreak = (now - lastMatchAt < 4000) ? comboStreak + 1 : 1;
    lastMatchAt = now;
    const pts = 10 + (comboStreak - 1) * 5;
    score += pts;
    if (comboStreak >= 2) showComboBadge(comboStreak);

    drawLink(path);

    const [ar, ac] = a, [br, bc] = b;
    const tA = tiles[ar][ac], tB = tiles[br][bc];
    grid[ar][ac] = -1; grid[br][bc] = -1;
    tiles[ar][ac] = null; tiles[br][bc] = null;
    pairsLeft--;
    updateHUD();

    spawnScoreFly((ar + br) / 2, (ac + bc) / 2, pts);
    spawnBurst(ar, ac); spawnBurst(br, bc);
    tA.el.classList.add('pop'); tB.el.classList.add('pop');

    // Quyết định THẮNG ngay tại đây (đồng bộ) — để timer không thể chen
    // `lose` vào giữa 300ms animation của cặp cuối cùng
    if (tutorialMode) {
      ended = true;                        // khoá input + chặn continuation (shift/xáo)
      setTimeout(nextTutorialStep, 900);   // qua bước hướng dẫn kế tiếp
    } else if (pairsLeft <= 0) winLevel();

    await sleep(300);
    if (ep !== levelEpoch) return;   // loadLevel đã chạy trong lúc animate
    tA.el.remove(); tB.el.remove();
    if (ended) return;               // vừa thắng, hoặc thua hết giờ giữa chừng

    await waitWhilePaused();         // onAppPause giữa match → đứng yên chờ
    if (ep !== levelEpoch || ended) return;

    // Dồn tile theo mode của level
    if (applyShift(levelConfig(currentLevelIdx).shift)) await sleep(230);
    if (ep !== levelEpoch || ended) return;

    // Deadlock → tự xáo (miễn phí)
    if (!hasMoves()) {
      showToast(t('noMoves'));
      await sleep(500);
      if (ep !== levelEpoch || ended) return;
      await reshuffleBoard();
      if (ep !== levelEpoch) return;
    }
    saveCurrentState();
  } finally {
    if (ep === levelEpoch) busy = false;   // đừng mở khoá input của level MỚI
  }
}

/* ================================================================
 * §13. Hint & Shuffle
 * ================================================================ */
function clearHint() {
  if (!hintPair) return;
  for (const [r, c] of hintPair)
    if (tiles[r][c]) tiles[r][c].el.classList.remove('hint');
  hintPair = null;
}

document.getElementById('hint-btn').addEventListener('click', () => {
  if (busy || ended || paused || tutorialMode || hintsLeft <= 0) return;
  const pair = findAnyPair(true);
  if (!pair) return;
  hintsLeft--;
  clearHint();
  hintPair = pair;
  for (const [r, c] of pair) tiles[r][c].el.classList.add('hint');
  updateToolButtons();
  saveCurrentState();
});

document.getElementById('shuffle-btn').addEventListener('click', async () => {
  // pairsLeft < 2: chỉ còn 1 cặp — xáo không đổi được gì, đừng trừ lượt
  if (busy || ended || paused || tutorialMode || shufflesLeft <= 0 || pairsLeft < 2) return;
  busy = true;
  const ep = levelEpoch;
  try {
    shufflesLeft--;
    updateToolButtons();
    await reshuffleBoard();
    if (ep !== levelEpoch) return;
    saveCurrentState();
  } finally {
    if (ep === levelEpoch) busy = false;
  }
});

/* Xáo lại các tile còn trên bàn; đảm bảo sau xáo còn nước đi */
async function reshuffleBoard() {
  deselect(); clearHint();
  const pos = [];
  for (let r = 0; r < ROWS; r++)
    for (let c = 0; c < COLS; c++)
      if (grid[r][c] >= 0) pos.push([r, c]);
  if (pos.length < 4) return;

  let vals = pos.map(([r, c]) => grid[r][c]);
  let tries = 0;
  do {
    shuffleArr(vals);
    pos.forEach(([r, c], i) => { grid[r][c] = vals[i]; });
    tries++;
  } while (tries < 60 && !hasMoves());
  // Xáo 60 lần vẫn bí → ép 1 nước; ép xong PHẢI kiểm lại (bàn không có 2 ô
  // kề nhau thì forceOneMoveAmong bó tay) — xáo tiếp tới khi chắc chắn có nước
  let guard = 0;
  while (!hasMoves() && guard++ < 20) {
    forceOneMoveAmong(pos);
    if (hasMoves()) break;
    shuffleArr(vals);
    pos.forEach(([r, c], i) => { grid[r][c] = vals[i]; });
  }

  // Cập nhật hình từng tile tại chỗ + pop nhẹ
  for (const [r, c] of pos) {
    const tl = tiles[r][c];
    tl.type = grid[r][c];
    tl.el.querySelector('svg').innerHTML = ANIMALS[grid[r][c]];
    tl.el.classList.remove('popin');
    void tl.el.offsetWidth;
    tl.el.classList.add('popin');
  }
  await sleep(280);
}

/* Ép 1 nước đi trong tập ô đang có tile (sau xáo bí): tìm 2 ô kề nhau
 * (ngang HOẶC dọc) rồi hoán vị để chúng cùng loại — 2 tile cùng loại kề
 * nhau luôn nối được. Mỗi loại luôn còn ≥ 2 tile (xoá theo cặp) nên hễ
 * có ô kề nhau là ép được. */
function forceOneMoveAmong(pos) {
  for (const [r, c] of pos) {
    for (const [nr, nc] of [[r, c + 1], [r + 1, c]]) {
      if (!inb(nr, nc) || grid[nr][nc] < 0) continue;
      const want = grid[r][c];
      for (const [rr, cc] of pos) {
        if ((rr === r && cc === c) || (rr === nr && cc === nc) || grid[rr][cc] !== want) continue;
        const tmp = grid[nr][nc];
        grid[nr][nc] = grid[rr][cc];
        grid[rr][cc] = tmp;
        return;
      }
    }
  }
}

 * §14. HUD + hiệu ứng điểm

function spawnScoreFly(boardR, boardC, pts) {
  const rect = boardEl.getBoundingClientRect();
  const el = document.createElement('div');
  el.className = 'score-fly';
  el.textContent = `+${pts}`;
  el.style.left = (rect.left + boardC * cellPx + cellPx / 2) + 'px';
  el.style.top  = (rect.top  + boardR * cellPx + cellPx / 2) + 'px';
  document.body.appendChild(el);
  el.addEventListener('animationend', () => el.remove(), { once: true });
}

const BURST_COLORS = ['#ff8a3d', '#ffd23f', '#6cc24a', '#3d9fff', '#ff6b9d'];
function spawnBurst(r, c) {
  for (let i = 0; i < 6; i++) {
    const p = document.createElement('div');
    p.className = 'burst';
    const ang = (i / 6) * Math.PI * 2 + Math.random() * .6;
    const dist = cellPx * (0.7 + Math.random() * 0.5);
    p.style.setProperty('--bx', Math.cos(ang) * dist + 'px');
    p.style.setProperty('--by', Math.sin(ang) * dist + 'px');
    p.style.background = BURST_COLORS[Math.floor(Math.random() * BURST_COLORS.length)];
    p.style.left = (c * cellPx + cellPx / 2 - 4) + 'px';
    p.style.top  = (r * cellPx + cellPx / 2 - 4) + 'px';
    boardEl.appendChild(p);
    p.addEventListener('animationend', () => p.remove(), { once: true });
  }
}

function showComboBadge(streak) {
  const el = document.getElementById('combo-badge');
  el.textContent = `×${streak}`;
  el.classList.remove('combo-anim');
  void el.offsetWidth;
  el.classList.add('combo-anim');
}

let toastTimer = null;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 1600);
}

/* ================================================================
 * §15. Timer — rAF, pause được; hết giờ = thua
 * ================================================================ */
let lastTs = null;
let timerUiAcc = 1;   // ≥0.2 để frame active đầu tiên render ngay

/* dt tính bằng GIÂY (đã clamp ở mainLoop) — độc lập refresh rate */
function tickTimer(dt) {
  if (!paused && !ended && !menuOpen && !tutorialMode && !confirmOpen) {
    timeLeft -= dt;
    if (timeLeft <= 0) {
      timeLeft = 0;
      // pairsLeft === 0 nghĩa là cặp cuối vừa match (winLevel đã quyết) —
      // không bao giờ đổi thắng thành thua giữa animation
      if (pairsLeft > 0) loseLevel();
      renderTimer();          // trạng thái chốt hiện ngay
      return;
    }
    // DOM đồng hồ/thanh giờ chỉ ghi ~5 lần/s (transition width .3s làm mượt
    // phần còn lại) — ở 120/144Hz không tốn style-recalc mỗi frame
    timerUiAcc += dt;
    if (timerUiAcc >= 0.2) { timerUiAcc = 0; renderTimer(); }
  }
}

function renderTimer() {
  const frac = timeTotal > 0 ? timeLeft / timeTotal : 0;
  const fill = document.getElementById('time-bar-fill');
  fill.style.width = (frac * 100) + '%';
  fill.classList.toggle('warn',   frac <= .3 && frac > .15);
  fill.classList.toggle('danger', frac <= .15);

  const clock = document.getElementById('hud-clock');
  const s = Math.ceil(timeLeft);
  clock.textContent = `${Math.floor(s / 60)}:${String(s % 60).padStart(2, '0')}`;
  clock.classList.toggle('clock-danger', frac <= .15 && !ended);
}

/* ================================================================
 * §16. Win / Lose (game-common §1.1 + §1.5 — app vẽ popup)
 * ================================================================ */
function winLevel() {
  if (ended) return;
  ended = true;
  deselect(); clearHint();

  // Bonus thời gian còn lại
  const bonus = Math.floor(timeLeft) * 2;
  score += bonus;
  updateHUD();
  if (bonus > 0) spawnScoreFly(ROWS / 2 - .5, COLS / 2 - .5, bonus);

  const newIdx = Math.min(currentLevelIdx + 1, MAX_LEVEL_IDX);
  saveData({ levelIdx: newIdx, tutorialSeen });      // nhẹ → native (§1.2)
  saveLocal({ levelIdx: newIdx, tutorialSeen });     // xoá snapshot ván dở
  maybeRequestAds();

  clearTimeout(resultTimer);
  resultTimer = setTimeout(() => {
    // Level vô hạn → không có màn cuối → không bao giờ bắn `victory`
    sendMessage('game_result', { result: 'win', showModal: true });
  }, 450);
}

function loseLevel() {
  if (ended) return;
  ended = true;
  deselect(); clearHint();
  renderTimer();
  saveLocal({ levelIdx: currentLevelIdx, tutorialSeen });  // bỏ snapshot, retry ván mới
  maybeRequestAds();
  clearTimeout(resultTimer);
  resultTimer = setTimeout(() => {
    sendMessage('game_result', { result: 'lose', showModal: true });
  }, 450);
}

/* Bắn `ads` mỗi 3 ván kết thúc (game-common §1.7) */
function maybeRequestAds() {
  endCounter++;
  if (endCounter % 3 === 0) sendMessage('ads');
}

/* ================================================================
 * §17. Persist trạng thái ván (localStorage — game-common §1.2)
 * ================================================================ */
function saveCurrentState() {
  if (ended || tutorialMode || !grid.length) return;   // đừng persist board tutorial
  saveLocal({
    levelIdx: currentLevelIdx,
    tutorialSeen,
    game: {
      grid: grid.map(row => row.slice()),
      timeLeft: Math.floor(timeLeft),
      score, hintsLeft, shufflesLeft, endCounter,
    },
  });
}

function tryRestoreState(idx) {
  const raw = readLocal();
  if (!raw) return false;
  try {
    const obj = JSON.parse(raw);
    if (obj.levelIdx !== idx || !obj.game || !Array.isArray(obj.game.grid)) return false;
    const g = obj.game;
    if (g.grid.length !== ROWS || g.grid.some(row => !Array.isArray(row) || row.length !== COLS)) return false;

    grid = g.grid.map(row => row.map(v =>
      (typeof v === 'number' && v >= 0 && v < ANIMALS.length) ? v : -1));
    let count = 0;
    for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) if (grid[r][c] >= 0) count++;
    if (count < 2 || count % 2 !== 0) return false;

    const num = (v, dflt) => Number.isFinite(Number(v)) ? Number(v) : dflt;
    pairsLeft    = count / 2;
    timeLeft     = Math.min(Math.max(num(g.timeLeft, 0), 5), timeTotal);
    score        = num(g.score, 0);
    hintsLeft    = Math.min(Math.max(num(g.hintsLeft, 3), 0), 9);
    shufflesLeft = Math.min(Math.max(num(g.shufflesLeft, 2), 0), 9);
    endCounter   = num(g.endCounter, 0);

    if (!hasMoves()) forceOneMove();   // sửa grid TRƯỚC khi dựng DOM
    buildTileDom(false);
    return true;
  } catch (e) { return false; }
}

/* ================================================================
 * §18. Load level
 * ================================================================ */
function loadLevel(idx) {
  levelEpoch++;               // vô hiệu mọi continuation async của ván cũ
  clearTimeout(resultTimer);  // đừng gửi game_result của ván cũ sau khi reset
  currentLevelIdx = idx;
  const lv = levelConfig(idx);
  COLS = lv.cols; ROWS = lv.rows;
  pairsLeft    = (COLS * ROWS) / 2;
  score        = 0;
  timeTotal    = lv.time;
  timeLeft     = lv.time;
  hintsLeft    = lv.hints;
  shufflesLeft = lv.shuffles;
  busy = false; ended = false; paused = false;
  selected = null; hintPair = null;
  comboStreak = 0; lastMatchAt = 0;
  linkSvg.innerHTML = '';
  document.getElementById('pause-veil').classList.add('hidden');
  // rời tutorial nếu đang dở (an toàn khi native gọi next/retry giữa chừng)
  tutorialMode = false;
  document.getElementById('tut-banner').classList.add('hidden');
  document.getElementById('bottombar').style.visibility = '';

  fillBoard();
  updateLabels();
  updateHUD();
  updateToolButtons();
  renderTimer();
  resize();
  saveCurrentState();
}

/* ================================================================
 * §18b. Menu + Tutorial
 * Tutorial tương tác 3 bước, BẮT BUỘC lần đầu mở game (cờ tutorialSeen
 * persist qua save_data + localStorage — game-common §1.2); có thể mở
 * lại từ nút Tutorial dưới nút Play trong menu.
 * ================================================================ */
const TUT_STEPS = [
  // Bước 1: 2 panda kề nhau — chạm 2 con giống nhau
  { key: 'tut1', pair: [[1, 2], [1, 3]],
    tiles: [[1, 2, 3], [1, 3, 3]] },
  // Bước 2: 2 ếch lệch hàng — đường nối rẽ tối đa 2 lần
  { key: 'tut2', pair: [[1, 1], [2, 4]],
    tiles: [[1, 1, 6], [2, 4, 6]] },
  // Bước 3: 2 chó ở 2 góc đáy, bị chặn kín — đường PHẢI vòng ra ngoài bàn
  { key: 'tut3', pair: [[3, 0], [3, 5]],
    tiles: [[3, 0, 0], [3, 5, 0],
            [2, 0, 7], [2, 1, 8], [2, 2, 9], [2, 3, 10], [2, 4, 11], [2, 5, 13],
            [3, 1, 1], [3, 2, 2], [3, 3, 4], [3, 4, 5]] },
];

function openMenu()  { menuOpen = true;  document.getElementById('menu-screen').classList.remove('hidden'); }
function closeMenu() { menuOpen = false; document.getElementById('menu-screen').classList.add('hidden'); }

function startTutorial(returnToMenu) {
  saveCurrentState();               // giữ ván thật trước khi mượn board cho tutorial
  tutorialReturnToMenu = returnToMenu;
  tutorialMode = true;
  closeMenu();
  document.getElementById('bottombar').style.visibility = 'hidden';
  loadTutorialStep(0);
}

function loadTutorialStep(i) {
  const st = TUT_STEPS[i];
  levelEpoch++;                     // vô hiệu continuation của bước trước
  clearTimeout(resultTimer);
  tutStep = i;
  COLS = 6; ROWS = 4;
  busy = false; ended = false; paused = false;
  selected = null; hintPair = null;
  comboStreak = 0;
  linkSvg.innerHTML = '';
  pairsLeft = TUT_STEPS.length - i; // HUD PAIRS = số bước còn lại

  grid = Array.from({ length: ROWS }, () => new Array(COLS).fill(-1));
  for (const [r, c, ty] of st.tiles) grid[r][c] = ty;
  buildTileDom(true);
  resize();

  hintPair = st.pair.map(p => p.slice());
  for (const [r, c] of st.pair) tiles[r][c].el.classList.add('hint');

  document.getElementById('tut-banner').classList.remove('hidden');
  document.getElementById('tut-text').textContent = t(st.key);
  updateHUD();
}

function nextTutorialStep() {
  if (!tutorialMode) return;
  if (tutStep + 1 >= TUT_STEPS.length) {
    document.getElementById('tut-text').textContent = t('tutDone');
    setTimeout(() => { if (tutorialMode) finishTutorial(); }, 1200);
  } else {
    loadTutorialStep(tutStep + 1);
  }
}

/* Xong / skip tutorial: đánh dấu đã xem, khôi phục ván thật */
function finishTutorial() {
  tutorialSeen = true;
  tutorialMode = false;
  document.getElementById('tut-banner').classList.add('hidden');
  document.getElementById('bottombar').style.visibility = '';
  levelEpoch++;

  // Khôi phục ván thật (đã snapshot vào localStorage lúc vào tutorial)
  const lv = levelConfig(currentLevelIdx);
  COLS = lv.cols; ROWS = lv.rows;
  timeTotal = lv.time;
  busy = false; ended = false; paused = false;
  selected = null; hintPair = null;
  if (tryRestoreState(currentLevelIdx)) {
    updateLabels(); updateHUD(); updateToolButtons(); renderTimer(); resize();
  } else {
    loadLevel(currentLevelIdx);
  }

  saveData({ levelIdx: currentLevelIdx, tutorialSeen: true });  // nhẹ → native
  saveCurrentState();                                           // local kèm cờ mới
  if (tutorialReturnToMenu) openMenu();
}

document.getElementById('tut-skip').addEventListener('click', () => {
  if (tutorialMode) finishTutorial();
});

/* ── Menu handlers ─────────────────────────────────────────────── */
document.getElementById('menu-play').addEventListener('click', () => {
  if (!menuOpen) return;
  if (!tutorialSeen) startTutorial(false);   // first open → bắt buộc tutorial
  else closeMenu();                          // đóng menu là timer tự chạy tiếp
});

document.getElementById('menu-tutorial').addEventListener('click', () => {
  if (!menuOpen) return;
  startTutorial(true);                       // từ menu → xong quay lại menu
});

document.getElementById('menu-back').addEventListener('click', e => {
  e.stopPropagation();
  sendMessage('quit');
});

/* ── Nút Menu (home) trong HUD + hộp xác nhận ──────────────────── */
function setConfirmOpen(open) {
  confirmOpen = open;
  document.getElementById('confirm-panel').classList.toggle('hidden', !open);
}

document.getElementById('menu-btn').addEventListener('click', e => {
  e.stopPropagation();
  if (ended || tutorialMode || menuOpen || paused) return;
  setConfirmOpen(true);              // đứng giờ trong lúc hỏi
});

document.getElementById('confirm-no').addEventListener('click', () => setConfirmOpen(false));

document.getElementById('confirm-yes').addEventListener('click', () => {
  setConfirmOpen(false);
  saveCurrentState();                // giữ ván dở — bấm Play là chơi tiếp
  openMenu();
});

document.getElementById('confirm-panel').addEventListener('pointerdown', e => {
  if (e.target === e.currentTarget) setConfirmOpen(false);   // chạm nền = huỷ
});

/* ── Info panel — hình thoi trong hình tròn, góc phải trên menu ── */
document.getElementById('info-btn').addEventListener('click', () => {
  document.getElementById('info-panel').classList.remove('hidden');
});
document.getElementById('info-close').addEventListener('click', () => {
  document.getElementById('info-panel').classList.add('hidden');
});
document.getElementById('info-panel').addEventListener('pointerdown', e => {
  if (e.target === e.currentTarget) e.currentTarget.classList.add('hidden');
});

/* ================================================================
 * §19. Native callbacks (game-common §1.3) + pause
 * ================================================================ */
window.onAppPause = function () {
  pauseGame();
};

window.onNextLevel = function () {
  loadLevel(Math.min(currentLevelIdx + 1, MAX_LEVEL_IDX));   // level vô hạn
};

window.onRetryLevel = function () {
  loadLevel(currentLevelIdx);
};

function pauseGame() {
  if (paused || ended || menuOpen) return;   // ở menu thì không có gì để pause
  paused = true;
  saveCurrentState();
  document.getElementById('pause-veil').classList.remove('hidden');
}

function resumeGame() {
  if (!paused) return;
  paused = false;
  lastTs = null; // bỏ khoảng thời gian đã pause khỏi đồng hồ
  document.getElementById('pause-veil').classList.add('hidden');
}

document.getElementById('pause-veil').addEventListener('pointerdown', resumeGame);

document.addEventListener('visibilitychange', () => {
  if (document.hidden) pauseGame();
});

/* ── Back (§1.4) + Restart (§1.6) ─────────────────────────────── */
document.getElementById('back-btn').addEventListener('click', e => {
  e.stopPropagation();
  saveCurrentState();
  sendMessage('quit');
});

document.getElementById('restart-btn').addEventListener('click', e => {
  e.stopPropagation();
  // ended: app sắp/đang hiện popup kết quả — để onRetryLevel/onNextLevel lo
  if (!busy && !ended && !tutorialMode) loadLevel(currentLevelIdx);   // reset nội bộ, KHÔNG bắn event
});

/* ================================================================
 * §20. Background canvas — lá & dấu chân trôi nhẹ
 * ================================================================ */
const bgCanvas = document.getElementById('bg-canvas');
const bgCtx    = bgCanvas.getContext('2d');
let   bgItems  = [];

function initBgItems() {
  bgCanvas.width  = window.innerWidth;
  bgCanvas.height = window.innerHeight;
  const N = Math.min(26, Math.floor(window.innerWidth * window.innerHeight / 26000));
  bgItems = Array.from({ length: N }, () => ({
    x: Math.random() * bgCanvas.width,
    y: Math.random() * bgCanvas.height,
    s: Math.random() * 10 + 8,           // size
    vy: Math.random() * 0.16 + 0.05,
    vx: Math.random() * 0.1 - 0.05,
    rot: Math.random() * Math.PI * 2,
    vr: Math.random() * 0.004 - 0.002,
    kind: Math.random() < 0.6 ? 'leaf' : 'paw',
    opacity: Math.random() * 0.16 + 0.07,
  }));
}

function drawLeaf(ctx, s) {
  ctx.beginPath();
  ctx.moveTo(0, -s);
  ctx.quadraticCurveTo(s * .9, -s * .2, 0, s);
  ctx.quadraticCurveTo(-s * .9, -s * .2, 0, -s);
  ctx.fill();
}

function drawPaw(ctx, s) {
  ctx.beginPath(); ctx.ellipse(0, s * .25, s * .55, s * .45, 0, 0, Math.PI * 2); ctx.fill();
  for (const [dx, dy] of [[-.55, -.35], [0, -.55], [.55, -.35]]) {
    ctx.beginPath(); ctx.arc(dx * s, dy * s, s * .22, 0, Math.PI * 2); ctx.fill();
  }
}

function animateBg(dt) {
  // Chuẩn hoá theo 60fps: 60Hz hay 144Hz lá đều trôi cùng tốc độ thật
  const k = Math.min(dt, 0.1) * 60;
  bgCtx.clearRect(0, 0, bgCanvas.width, bgCanvas.height);
  bgCtx.fillStyle = '#2e6b4f';
  for (const it of bgItems) {
    it.y -= it.vy * k; it.x += it.vx * k; it.rot += it.vr * k;
    if (it.y < -30) { it.y = bgCanvas.height + 30; it.x = Math.random() * bgCanvas.width; }
    bgCtx.save();
    bgCtx.globalAlpha = it.opacity;
    bgCtx.translate(it.x, it.y);
    bgCtx.rotate(it.rot);
    if (it.kind === 'leaf') drawLeaf(bgCtx, it.s); else drawPaw(bgCtx, it.s);
    bgCtx.restore();
  }
}

/* ── Main loop: nền + đồng hồ chung 1 rAF, dt clamp chống stall ── */
function mainLoop(ts) {
  if (lastTs == null) lastTs = ts;
  let dt = (ts - lastTs) / 1000;
  lastTs = ts;
  // Frame khựng (GC/janky) hay clock lùi → không trừ oan đồng hồ cả cục
  if (dt < 0 || dt > 0.25) dt = 0.25;

  if (!menuOpen) animateBg(dt);   // menu che kín màn → khỏi vẽ nền cho đỡ tốn
  tickTimer(dt);
  requestAnimationFrame(mainLoop);
}

/* ================================================================
 * §21. Boot (game-common §3 waitForNativeInjection)
 * ================================================================ */
function bootGame() {
  LANG = getLanguage();
  applyUiFont(LANG);

  let startIdx = getInitialLevelIdx();

  // data nhẹ từ native ưu tiên (game-common §4 + §1.2)
  const raw = getInitialData();
  if (raw) {
    try {
      const obj = JSON.parse(raw);
      if (typeof obj.levelIdx === 'number' && obj.levelIdx >= 0) {
        startIdx = Math.min(Math.floor(obj.levelIdx), MAX_LEVEL_IDX);
      }
      if (obj.tutorialSeen === true) tutorialSeen = true;
    } catch (e) { /* data hỏng → mặc định */ }
  }

  // tutorialSeen cũng có thể nằm ở localStorage (chưa từng sync lên native)
  try {
    const lobj = JSON.parse(readLocal() || 'null');
    if (lobj && lobj.tutorialSeen === true) tutorialSeen = true;
  } catch (e) { /* ignore */ }

  initBgItems();

  // Nạp level — thử khôi phục ván dở từ localStorage trước
  currentLevelIdx = startIdx;
  const lv = levelConfig(startIdx);
  COLS = lv.cols; ROWS = lv.rows;
  timeTotal = lv.time;
  score = 0; busy = false; ended = false; paused = false;
  selected = null; hintPair = null; comboStreak = 0;

  if (!tryRestoreState(startIdx)) {
    pairsLeft    = (COLS * ROWS) / 2;
    timeLeft     = lv.time;
    hintsLeft    = lv.hints;
    shufflesLeft = lv.shuffles;
    fillBoard();
  }

  updateLabels();
  updateHUD();
  updateToolButtons();
  renderTimer();
  resize();

  // Menu: đổ hình mascot + art thú cho sơ đồ info panel, mở menu lúc boot
  document.querySelectorAll('.menu-mascot').forEach(el => {
    const ty = Number(el.dataset.animal) || 0;
    el.innerHTML = `<svg viewBox="0 0 100 100" aria-hidden="true">${ANIMALS[ty]}</svg>`;
  });
  document.querySelectorAll('#info-panel g[data-animal]').forEach(g => {
    g.innerHTML = ANIMALS[Number(g.dataset.animal) || 0];
  });
  openMenu();

  requestAnimationFrame(mainLoop);
}

// Poll đợi native inject, fallback sau 200ms (game-common §3)
(function waitForNativeInjection() {
  const start = Date.now();
  (function check() {
    if (typeof window.currentLevel === 'number' || Date.now() - start > 200) {
      bootGame();
    } else {
      setTimeout(check, 10);
    }
  })();
})();
</script>
